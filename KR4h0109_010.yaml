body:
  text: 全蜀藝文志卷十明周復俊編詩學校題石室唐裴釧文翁石室有儀型庠序千秋播德馨古柏尚留今日翠髙岷猶靄舊時青人心未肯拋羶蟻弟子依前學聚螢更歎沱江無限水爭流秪願到滄溟益州州學聖訓堂詩宋何郯益為藩捍西南隅物衆地大稱名都擇守來頒兹土政治人頗與他邦殊差跌一有戾條教便宜皆得行黥誅羣姦帖息不敢動無復弄兵覬穿窬任威或謂一時事立政恐非長世圖豈無達識究是否重在改作徒嗟吁仲翁文翁字裔孫有偉度敢決不以常文拘當官勇欲除弊法伊憂內惻仁心孚視人無異逺方意威刑惠政還相須始時歲荒力賑救坐使餓殍成完膚既而為俗思根本其在立學陳師模大開儒庠務誨導秀民聳慕紛來趣遂言謂署鴻生職使演經傳傳諸徒奏函一上聞法座詔劄即日來諧俞詔云信汝辦治蜀緩任威罰先文儒公心感激侈上賜刻在金石尊神謨覆之大厦榜美稱日久傳者期無渝邦人承風為盛事觀者填道來于于嗟嗟多士其聽命勿即邪徑安夷塗師無訿聖生率教信尚姬孔尊唐虞施之鄉黨勵雅俗仁誼得以相持扶漢皇初始盛文學起自蜀國行中區本朝教化視三代建元安可為齊驅吾君訓辭諭萬里義均盤誥兹宣敷吾守教本樹一國學盛洙泗相涵濡臣謀君從協大義聖哲唱和真同符欲歌盛節示萬古才不逮志嗟其愚復修府學故事韓綘文翁石室已千秋世有興衰化自流賢俊相望承學粹朝廷繇此得人優蜀中名士布在顯要太平典禮當傳習盛際文章正講求師友琢磨期不倦岷峨秀氣與雲浮過府學遂謁文公堂喻汝礪間花致幽隱髙槐泛輕涼各姱一時好披風互低昻詎知五月中微陰忽催黃我行魯侯宫獨謁文翁堂若人骨已朽道在斯不亡遂令蜀文章照耀日月傍世事俱腐臭斯文真久長靡顔能幾時蕭條翳墟荒富貴豈不好千載同一傷三歎過泮宫撫已涕自滂府學十詠李石禮殿漢人祀周公為先師故鍾會記云周公禮殿范蜀公鎮云屋制甚古非近世所為秦漢以來有也內翰王素云其屋制絶異今制後之葺者惜其古不敢改作蜀侯作頖錦水湄先聖先師同此室巍然夫子據此座殿以周公名自昔聖人兩兩如一家均是周人先後出東家想見中夜夢猶與公孫同袞舄斯文授受乃關天不為漢唐加損益我時來視俎豆事重是漢人斤斧迹漢宫制度九天上散落人間此其一多因豐屋起我心獨此數椽綿歲厯規摹嶫嵲東魯似氣象縹眇西岷敵竹松猶是斯干詩風雨方知隆棟吉雖然漢獻來至今閲時已多駒過隙中間豈無鳥鼠慮妙斫不知難輒易工師不揆亂如麻敢向殿門言匠石詩書譬彼尚闕文後學如何補遺逸祖龍非意竊登牀科蚪有心來穴壁舊章僅在命如絲誰勒吾詩勝丹漆石室漢孝景時太守文翁始作石室西為文翁稍南為髙朕比文翁石室差大皆有石像朕或為勝宋溫之璋洗石以辨之乃朕字也詩稟切蜀守席口奏秩文翁髙朕于祀典竊疑二室者蜀人所以祠二公之意非必自作來為人所愛去為人所思君看文與髙慈惠蜀之師至今窟中像凛凛建立時知非伯有室定是桐鄉祠蜀人愛二公家奉戶祝之昆池幾灰劫阿房一炬炊保此歲崢嶸不動山四維無為炫金碧瞻拜欽光儀祠前二古柏外乾中不萎勿作剪伐想恐是神明遺森森勢直上峩冠劒拄頥烈士不平氣好在淮西碑殿柱記范蜀公云其柱鍾會𨽻書刻其上按會與鄧艾同入蜀在咸熙元年甲申距漢獻興平元年甲戌凡七十一年矣艾蓋追文翁髙君之美而書也蒼龍甲戌歲修築周公殿文翁至髙君學校已再變順考興平年實紀漢之獻或云鍾會書入木字隱見自獻而至會朔厯斗杓轉會初入蜀時意不止弱禪有如猿猱繫百巧欲伺便殺女不作難機鋒劇刀箭會書固出繇家法素所善至學艾筆迹暮夜走郵傳老昭豈易欺真偽猝難辨欺昭爾尚可蜀士多秀彥當其下筆時寧不愧顏面雖蒙黼藻文不掩糞土賤周公儻有靈白日下雷電鍾會善學人筆迹鄧艾書以誑司馬昭昭遂殺艾左右生題名漢陽江陽寧蜀遂寧晉原以晉志考之江陽蜀置漢陽寧蜀遂寧晉原皆是宣武平蜀後置范蜀公云西漢時諸生姓名文學祭酒典學從事各一人司儀主事各一人左生七十三人右生三十人可考者僅百許人亦載于歐陽文忠公集古録蜀地雖逺天之涯蜀人只隔一水巴自從文翁建此學此俗化為齊魯家頖林春風桑椹熟集鼓坎坎聞晨撾諸生堂奧分左右相比以立如排衙九牧之金充歲貢搜出精礦遺其沙卿雲褒武皆蜀秀虎豹各自雄鬚牙兩京得人廣數路忍使丘中留子嗟不然題名百許輩無一顯者何謂耶我亦典學老從事試向坐中尋孟嘉庾亮版孟嘉為勸學從事亮正旦大會人士率多時彥褚裒問亮江州有孟嘉其人何在亮云在坐卿且自覔今左右生有典學從事意亦嘉所官也禮殿晉人畫耆舊傳云西晉太康中益州刺史張收畫而東晉王右軍已有書問蜀守事知有漢時講堂在知畫三皇五帝以來人物精妙畫闕因摹取得廣異聞則疑非收輩所書耳然畫之後前闕可考則當以收為正嘉祐中王素命摹寫為七卷總闕五十五人為成都禮殿聖賢圖蜀守席益又嘗摹闕位可别識者一百六十八人于石經堂又按元豐闕云虛圖畫見聞志漢文翁學堂在益州昔經頺廢闕是與繕立圖畫古人聖賢之像及瑞物于壁未知孰耆舊傳小異成都名畫窟所至妙宫墻風流五代餘軌躅參隋唐其間禮殿晉畫為鼻祖未數後來鴻鴈行畫者果誰歟或云名收人姓張右軍問蜀守墨帖來縑緗乃知前輩人不愛時世粧范瓊杜措李懷袞仙荒佛怪驅喝雷電筆意窺渺茫不若收所畫上自皮羽之服下至垂衣裳盤古衆支派帝霸皇與王君臣分聖賢有如虎豹龍鳳殊文章視之若有見日月星象空中垂耿光聽之如有聞衡牙玉佩鳴以鏘三古以降歷今世視聽所感猶一堂乃知此畫自神品碌碌餘子非所望吾道久已屈二氏爭頡頏豈唯收也見絀餘子下尚有公議老我雙鬢蒼齊人畫禮器齊永明十年刺史劉悛畫殿壁器服如三禮圖席益模本于石經堂惔或作悛或闕劉悛弟闕之筆今闕矣漆器侈初俗長袖闕都城如何古邃殿天開垂日星竒竒與怪怪戃恍不識名我嘗此闕自齊永明人間無備物未易窮丹青一作因郊丘盛禮嚴天庭闕異數于此集大成仰瞻萬乘聖逺想三代英蟣蝨容著足闕綪西歸放天梅鈞天夢初醒心焉感此畫眼角泫欲零所闕蜀都問君平黃荃畫屏屏已失其左右二屏獨中一山水屏在耳石到官驗問所失月日申府蓋紹興三十年三月二十九日府下兵馬司捕賊不獲阿荃千頃本胸中學道分明畫手同筆削來追麟獲後丹青為洗馬羣空登堂欲與修遺履穴户何由返大弓尚有滄溟垂素壁莫教蠅誤汚屏風古柏二首東坡先生送家安國教授成都云蒼苔髙朕室古柏文翁庭事具成都古今記趙次公詳其事于東坡詩注有妄人請于府恐壞屋欲去之石曰屋壞可修此柏不可復且祠廟古迹林木條禁甚明併舉東坡柏堂詩爭之得全驕榮落盡雪霜浮偃蹇空貽社櫟羞濡沫東家雖借潤風煙西爽亦宜秋皮災已覺神明露心在猶懷剪伐憂鐵鎖何當絆龍腳夜深雷雨起潭湫石欲作鐵索絆之以防風雨之暴未果僅能纍石作籠固其足思人誰復念婆娑窟室崖陰未易磨四十圍間看溜雨三千年後數恆河不堪與世供狙􅍻尚許遺民占鳥窠從此便名夫子樹康人斤斧奈豫何監者王朝辨進士年八十餘矣學官憫其老不忍易之秦城二絶張儀司馬錯所築自錯入蜀秦惠公乙巳歲至皇宋紹興壬午一千四百七十八年雖頺圮所存如崖壁峭立亦學舍一竒觀也泮林堂後面崢嶸不道詩書恨未平瓜蔓深坑餘鬼哭此間學校倚秦城塹成雉堞繞蠶叢漢棧分明蜀徼通只説金牛能誑客已輸巴粟到關中石經室偽蜀廣政七年其相母丘裔按雍都舊本九經命平泉令張德釗書而刻諸石是歲實晉開運甲辰也蜀守胡宗愈作堂以貯石經席益增葺為記我今來登石經堂從以諸生行兩廡諸生讀經半頭白問以始終箝不語我聞此經昔中都中郎所𨽻乃其祖邇來離亂已亡失楷本僅能傳蜀土蜀土閏位無足道獨此仍為盛時取為將嚴鐍守重扄護以繚垣崇邃宇列之學宫豈無意豈但闕文存夏五大開明鏡别妍媸時扣洪鐘諧律吕後生不復事丹鉛抵死唯知守藤楮字音隨口妄霓霓點畫分毫謬魚魯日月當天空委照盲俗相欺紛莫覩石經雖古奈爾何人競傳今不傳古行行矧肯捩眼覷蘚剝苔封費撑拄堅鑱僅免飽蟫魚隘道爭來宅狐鼠此間鄒人儻借問為問石經誰是主一昨敵門肆訶斥幾度向墻誇傴僂登登閣閣隱金捶聒耳散空垂雹雨蠟薰煤染連作卷玉軸錦裝如束杵豈無一物媚權豪幾紙才堪博圭組爾之所得固么麼我則何由寬擊拊一捶只作一字訛訛至萬千那復數石經之害此其大縱有鬼神那可禦憶昔嘗為博士官首善堂中容接武心知不是世間書雲漢森然城百堵恢恢帝所有餘地忍使石經留外府便當連舸下瞿塘飛上三山如插羽縑緗舛謬鐘鼎暗天罅豈容無一補巍巍玉帝殿中央河洛東西翼龍虎雖然斯文屬興廢帝既有心天亦許作詩未用擬韓公考篆庶幾追石鼓雲安監勸學詩并序王日翬湯溪之濱編戶千數百家雲安監在焉其山岌而髙蹲踞相揖環合四面其溪洪且逺清甘湛碧縈回曲折皆秀美也紹興己卯歲八月潼川王日翬捧檄而來周覽氣象因謂知監程公曰豫聞山深而猛獸藏水廣而巨魚遊地靈則人傑出蓋理之常也觀兹氣象必有當世聞人者出焉程公曰唐之季有希玄者官至上柱國偽蜀時有演遜者仕為侍郎皆幸氏豫曰豫言豈不信哉程公曰雖然自是賢能之書亦幾絶矣豫曰百步之內必有茂草豈有數萬家而無一賢一能之可書者邪非父兄不能教子弟則子弟不能從父兄之教矣程公曰此地有三牛馬嶺二山舊傳三牛對馬嶺不出貴人只出井土人用是不以仕進為業唯貨利之從意者非山川所宜雖皓首窮經無益矣豫曰此誰氏語邪程公曰按石刻漢廷尉扶嘉之語嘉母媪遇龍而娠嘉故其言人信之豫不覺喟然曰傳者既誤載諸石者尤識之淺也其言鄙俚如是可傳以為信邪且廷尉既生于靈異亦必賢哲之士安得鄙俚之言哉蓋田夫野老之言後世指以為嘉言非也使其言而可信則幸氏二人得生此土邪斯民不知前賢之慕而惟俚言之信則亦記諸石者罪矣君子不言則已茍有言焉必將有補于世今以鄙俚之言為賢哲之言誣賢哲之言塞人才之路吾知斯人必無後也且蜀之東有鹽泉縣今𨽻綿州而初𨽻梓州見國史亦鹽監之類也有射策為天下第一者曰蘇易簡蜀之西仙井監地曰三嵎亦三牛之類也亦有射策為天下第一者曰何栗二人皆至宰相又仙井鹹泉所出尤多而貴人亦尤多至今顯宦名儒相繼不絶豈謂井之所出則無貴者出邪程公曰然願書之資以為訓豫曰石刻之傳不廢則湯溪之士不振豫其可以不敏辭哉然仕者亦不可不勉凡人之學所以修身而已非先期于必貴而後學也誠能修其天爵則人雖不從不失為君子豈可以貴不可必而遂至于不學是惑矣楊子曰人而不學雖無憂如禽何且夫地之美者嘉禾而農事不至則禾不生山川雖秀而士不知學則貴人不出公須廣諭而勸之俾父詔其子兄詔其弟捨錐刀之末利其髙大于門閭為子弟者從父兄之教勿荒于嬉勿詭于隨隆師親友雖逺不憚博學力文始終不輟則磨以歲月必有英才儒士為時而出中才者亦必能取科第邀富貴貪利之風為衣冠之俗矣程公曰諾乃退而為詩四十韻其詩曰觀風至雲安古者湯溪濱無地不鹽煙無民不樵薪士子獨希少錐刀事艱辛我因公檄來暇日聊咨詢溪山秀且清湛碧髙嶙峋衣冠杳不報敢問夫何因盛言漢廷尉有語貽鄉鄰三牛對馬嶺有井無貴人斯言既篤信詩禮不復聞我聞為咨嗟此語深非仁儒風一旦掃有甚遭浣焚因言廷尉者其生豈不神既稟神靈姿寧非賢聖倫安得鄙俚語千載愚斯民斯民有幸氏貴豈無足稱唐室上柱國偽蜀掌絲綸遺誥尚可考苗裔亦詵詵後生宜可畏况逢堯舜辰如何二百年自棄甘煨塵前賢不知慕俚語常書紳不知非格言野老相因循為言聽我語蜀民初頑嚚文翁為益州化蜀與維新英才出王馬繼世楊子雲詞章耀當世至今藹清芬自爾吾蜀士文學多彬彬乃知湯溪上未必無國珍琢磨始成器匪即為荆榛我雖非文翁志使風俗淳亦非好辨者示勸聊諄諄公侯寧有種自致唯斯文獨學乃孤陋師友須隆親又當聽我語既學須能勤不勤如不學勤學始成身窮兮世巨儒逹兮為名臣唯患學不至學必無沉淪如不學為名不如復煎熏十室有忠信見者希能遵會觀積歲後俊造來誾誾一成詩禮鄉觀光為國賓泮林釋奠偶緣攝事遂獲充員竊觀禮文樂奏之盛不勝欣歎輒成小詩奉呈僚友陳雍春丁逢上日方中涓吉修誠薦泮宫奠璧采璘誠可格代庖越俎數徒充八音合奏東南少一道相傳今古同我輩因文須識本浴沂好詠舞雩風夔州試院呈諸公二首冉居常它年蟲篆老書生謬向文闈預領衡敢使靈鼇嗟屭贔秪愁窪馬賦崢嶸舊傳錦樣心雖愧新揀沙金眼自明收拾美莊逃謗去升沉腳迹任諸英粉袍切勿笑冬烘且踏燒殘鼠尾蹤總是炎蒸同造榜某舊以六月薦不妨衣鉢繼登庸雲移白帝鵬霄近月入清秋桂子濃願得辭鋒倚天劒借君雷雨化蛟龍次韻盧彥德學宫詩楊輔頗怪諸生籍奉常寂寥科目歲年長只今五桂名猶在恐有孤桐曲未忘學校規模新壯觀江山意氣久徊翔分光盧使青瑶句收拾風霆喚阿香漢太常員猶今貢禮部耳全蜀藝文志卷十
