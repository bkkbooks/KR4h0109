body:
  text: 全蜀藝文志卷二十明周復俊編詩贈送上别袁昌州陳江總河梁望隴頭分手路悠悠徂年驚若電别日欲成秋黄鵠飛飛逺青山去去愁不言雲雨散更似東西流贈薛播州十四首隋楊素在昔天地閉品物屬屯䝉和平替王道哀怨結人風麟傷世已季龍戰道将窮亂海飛羣水貫日引長虹干戈異革命揖讓非至公兩河定寳鼎八水域神州函關絶無路京洛化為丘漳滏爾連沼涇渭余别流生郊滿戎馬渉路起風牛班荆疑莫遇贈縞竟無由五緯連珠聚千載濁河清金亡潜虎質閏盡自蛙聲聖期伊旦暮天禄啟炎精霧生三日重星飛五老輕禋宗答上帝改物創羣生道昏雖已朗政故猶未新刳舟洹水濟結網大川濵出遊迎釣叟入夢訪幽人植林雖各樹開榮豈異春相逢一時泰共幸百年身有帛賁丘園生芻自幽谷塵芳金馬路瀾清鳳池澳零露既垂光清風復流穆傾葢如舊知彈冠豈新沐利心金各斷芬言蘭共馥自余歴端揆緝熈恧時彦及爾陪帷幄出納先天睠髙調發清音縟藻流餘絢或如彼金玊嵗暮無凋變余松待爾心爾筠留我箭荏苒積嵗時契濶同遊處閶闔既趨朝承明還宴語上林陪羽獵甘泉侍清曙迎風含暑氣飛雨凄寒序相顧惜光隂留情共延竚滔滔彼江漢實為南國紀作牧求明徳若人應斯美髙臥未褰帷飛聲已千里還望白雲天日暮秋風起峴山君儻遊淚落應無已漢隂政已成嶺表人猶蠧借㓂比方新還珠總如故楚人結去思越俗歌來暮陽鳥上歸飛别鶴還廻顧君見南枝巢應思北風路北風吹故林秋聲不可聴鴈飛窮海寒鶴唳霜臯净含毫心未傳聞音路猶夐唯有孤城月徘徊獨臨映弔影余自憐安知我疲病養病願歸閒居榮在知足栖遲茂陵下優游滄海曲古人情可見今人遵路躅荒居接野窮心物俱非俗桂樹方叢生山幽竟何欲所欲棲一枝禀分豐諸已園樹避鳴蟬山梁遇時雉野隂冒叢灌幽氣含蘭芷悲哉暮秋别春草復萋矣鳴琴乆不聞屬聴空流水秋水魚游日春樹鳥鳴時濠梁莫共徃幽谷有相思千里悲無駕一見杳難期山河散瓊蘂庭樹下丹枝物華不相待遲暮有餘悲銜悲向南浦寒色黯沉沉風起洞庭險煙生雲夢深獨飛時慕侶寡和乍孤音木落悲時暮時暮感離心離心多苦調詎假雍門琴送朱休逺之蜀唐張説求友殊損益行道異窮申綴我平生氣吐贈薄遊人結恩事明主忍愛逺辭親色麗成都俗膏腴蜀水濵如何從宦子堅白共緇磷日月千齡旦山河萬族春懐鉛書瑞府橫草事邊塵不及安人吏能令王化淳杜少府之任蜀州王勃城闕輔三秦風煙望五津與君離别意同是宦遊人海内存知己天涯若比鄰無為在岐路兒女共霑巾重别薛前人明月沉珠浦秋風濯錦川樓臺臨絶岸洲渚更長天旅泊幾千里棲皇共百年窮途唯有淚還望獨澘然艷情代郭氏答盧照隣駱賔王迢迢芊路望芝田眇眇函關限蜀川歸雲已落涪江外還鴈應過洛水瀍洛水傍連帝城側帝宅層甍垂鳳翼銅駝路上栁千條金谷園中花幾色栁葉園林處處新洛陽桃李應芳春妾向雙流窺石鏡君住三川守玉人此時離别那堪道此日空林對芳沼芳沼徒遊比目魚幽徑還生㧞心草流風廻雪儻便姢驥子魚文實可憐擲果河陽君有分貨酒成都妾亦然莫言貧賤無人重莫言富貴應須種緑珠猶得石崇憐飛鷰曽經漢皇寵良人何處醉縱横真如循黙守空名倒提新縑成慊慊翻将故劍作平平離前吉夢成蘭兆别後啼痕竹上生别日分明相約束已坐宜家成誡朂當時疑弄掌中珠豈謂先摧庭際玊悲鳴五里無人問腸斷三聲誰為續思君欲上望夫臺端居懶聴将雛曲沉沉落葉向山低簷前歸鷰並頭栖抱膝當忩看夕兎側耳空房聴曉鷄舞蝶臨堦祗自舞啼鳥逢人亦助啼獨坐傷孤枕春來悲更甚峩眉山上月如眉濯錦江中霞似錦錦字廻文欲贈君劒壁層峰自糾紛平江渺渺分青浦長路悠悠間白雲也知京洛多佳麗也知山岫遥虧蔽無那短封即疎索不在長門守期契傳聞織女對牽牛相望重河隔淺流誰分迢迢經兩嵗誰能脉脉待三秋情知唾井終無理情知覆水也難收不復下山能借問更向盧家字莫愁送殷大夫陳子昂禺山金碧路此地饒英靈送君一為别悽斷故鄉情夏雲生極浦斜日隱離亭坐看征騎沒唯見逺山青送金敬陵入蜀崔信明金門去蜀道玉壘望長安豈言千里足方尋九折難西上君飛葢東歸我挂冠猿聲山硤斷月影落江寒從今與君别花月幾新殘淮南卧病書懐寄蜀中趙徴君㽔李白吳㑹一浮雲飄如逺行客功業莫從就嵗光屡奔廹良圗俄棄捐衰疾乃綿劇古琴藏虚匣長劒挂空壁楚冠懐鍾儀越吟比荘舄國門遥天外鄉路逺山隔朝憶相如臺夜夢子雲宅旅情初結緝秋氣方寂歴風入松下清露出草間白故人不在此而我誰與適寄書西飛鴻贈爾慰離析江上寄巴東故人前人漢水波浪逺巫山雲雨飛東風吹客夢西落此中時覺後思白帝佳人與我違瞿塘饒賈客音信莫令稀送友人入蜀前人見説蠶叢路﨑嶇不易行山從人面起雲傍馬頭生芳樹籠秦棧春流遶蜀城升沉應已定不必訪君平送友人内江范崇凱前人青山横北郭白水遶東城此地一為别孤蓬萬里征浮雲遊子意落日故人情揮手自兹去蕭蕭班馬鳴贈兄崇凱范元凱洛陽紙價因兄貴蜀地紅箋為弟貧南北東西九千里除兄與弟更無人范崇凱内江人奏花蕚楼賦為第一其弟元凱亦自負其才贈兄詩云寄柏學士林居杜甫自胡之反持干戈天下學士亦奔波歎彼幽栖載典籍蕭然暴露依山阿青山萬里静散地白雲一洗空垂蘿亂代飄零予到此古人成敗子如何荆揚春冬異風土巫峡日夜多雲雨赤葉楓林百舌鳴黄泥野岸天鷄舞盜賊縱横甚宻邇形神寂寞甘辛苦幾時髙議排金門各使蒼生有環堵寄常徴君前人白水青山空復春徴君晚節傍風塵楚妃堂上色殊衆海鶴階前鳴向人萬事糾紛猶絶粒一官羈絆實藏身開州入夏知涼冷不似雲安毒熱新贈花卿前人錦城絲管日紛紛半入江風半入雲此曲秪應天上有人間能得幾囘聞人日寄杜二拾遺高適人日題詩寄草堂遥憐故人思故鄉栁條弄色不忍見梅花滿枝空㫁腸身在南蕃無所預心懐百憂復千慮今年人日空相憶明年人日知何處一臥東山三十春豈知書劒老風塵龍鍾還忝二千石愧爾東西南北人送梓州李使君王維萬壑樹参天千山響杜䳌山中一夜雨樹杪百重泉漢女輸賨布巴人訟芋田文翁翻教授不敢倚先賢送嚴秀才還蜀前人寜親真令子似舅即賢甥别路經花縣還鄉入錦城山臨清塞㫁江向白雲平獻賦何時至明君憶長卿送大理正攝御史判凉州别駕苑咸天子念西疆咨君去不遑垂銀棘庭印持斧柏臺綱雲下天山白泉枯塞草黄佇聞河隴外還繼海沂康送姚評事入蜀各賦一物得卜肆張九齡蜀嚴化已乆湛溟空所思常聞賣卜處猶憶下簾時驅傳應經此懐賢儻問之歸來説徃事歴歴偶心期賦得青城山歌送楊杜二郎中赴蜀軍錢起蜀山西南千萬重仙經最説青城峰青城嶔岑倚空碧逺壓峩眉吞劒壁錦屛雲起易成霞玉洞花明不知夕星臺二妙逐王師阮瑀軍書王粲詩日落猿聲連玉笛晴來山翠傍旌旗絲蘿春月營門近知君對酒遥相思送裴頔侍御使蜀前人柱史纔年四十強鬢髯𤣥髪美清揚朝天繡服乗恩賞出使星軺滿路光錦水繁花添麗藻峩眉明月引飛觴多才自有雲霄望計日應追鵷鷺行送友人入蜀前人逺路接天末憐君與我違客程千嶂裏鳥道片雲飛樹色連青漢泉聲出翠㣲錦城花月下才子定忘歸送張郎中還蜀歌盧綸秦家御史漢家郎親專兩印征殊方功成走馬朝天子伏檻論兵若流水曉離仙署趨紫微夜接髙儒讀青史瀘南五将望君還願以天書示百蠻曲棧重江初過雨前旌後騎不同山迎車拜舞多耆老舊卒新營徧青草塞口雲生火候遲烟中鶴唳軍行早黄華川下水交横逺映孤霞蜀國晴筇竹筍長椒瘴起荔枝花發杜䳌鳴囘首岷峩半天黒傳觴接膝何由得空令豪士仰威名無復貧交恃顔色垂楊不動雨紛紛錦帳胡瓶争送君須臾醉起簫笳發空見雙旌入塞雲送宻秀才吏部駁放後歸蜀權徳輿蜀國本多士雄文似相如之子西南秀名在賢能書薄禄且未及故山念歸與迢迢三千里返駕一羸車玉壘長路盡錦江春物餘此行無愠色知爾戀休廬成都送嚴十五之江東前人江都萬里外别後幾悽悽峡路花應發津亭栁正齊酒傾遲日暮川濶逺天低心繫征帆上隨君到剡溪送人赴黔中前人一尊嵗酒且留歡三峡黔江去路難志士感恩無逺近異時應戴恵文冠送栁侍御裴起居武元衡沱江水渌波喧鳥去喬柯南浦别離處東風蘭麝多長亭春婉娩層漢路蹉跎㑹有歸朝日班超奈老何送李正字歸蜀前人已獻甘泉賦仍登片玉科漢官新組紱蜀國舊煙蘿劒壁秋雲斷巴江夜月多無窮别離思遥寄竹枝歌送温况游蜀前人遊人西去客三巴身逐孤蓬不定家山近峩眉飛暮雨江連濯錦映朝霞雲深九折刀州逺路繞千巖劒閣斜因到荘君開卦處将余一為問生涯送栁震歸蜀司空曙白日雙流静西看蜀國春桐花能乳鳥竹節競祠神蹇步徒相望先鞭不可親知從江僕射登榻更何人送䕫州班使君前人魚國巴庸路麾幢漢守過曉檣争市隘夜鼓祭神多雲白當山雨風清滿峽波夷陵舊人吏猶誦兩岐歌送崔校書赴梓幕前人碧峯天柱下鼓角鎮南軍管記催飛檄蓬萊輟校文棧烟朝似雪江霧晚成雲想出褒中望巴庸方路分送龍州樊使君許棠曽見邛人説龍州地未深碧溪飛白鳥紅斾映青林土産惟宜藥王租只貢金政成開宴日誰伴使君吟送友人尉蜀中前人故友漢中尉請為西蜀吟人家多種橘風土愛彈琴水向昆明濶山通大夏深理閒無别事時寄一登臨蜀中将囘留辭韋相公歐陽詹寜體則雲構方前恒玉食貧居豈及此要自懐歸憶在夢關山逺如流嵗華逼明晨首鄉路迢逓孤飛翼奉和淮南李相公早秋即事寄成都武相公劉禹錫八柱共承天東西别隱然逺夷争慕化真相故臨邊並進䕫龍位乃齊龜鶴年相公詩有齊年並進之句也同心舟已濟造膝璧常聨對領專征寄遥持造物權斗牛添氣色井絡静氛煙獻可通三畧分甘出萬錢漢南趨節制趙北賜山川玉帳觀渝舞虹旌獵楚田步嫌雙緩重夢入九城偏秋與離情動詩從樂府傳聆音還竊抃不覺撫么絃始至雲安寄兵部韓侍郎中書白舍人二公近曾逺守故有屬焉天外巴子國山頭白帝城波清蜀材盡雲散楚臺傾迅瀬下哮吼兩岸勢争衡隂風神鬼過暴雨蛟龍生硤㫁見孤邑江流照飛甍蠻軍擊嚴鼓筰馬引雙旌望闕遥拜舞分庭備将迎銅符一以合文墨紛來縈暮色四山起愁猿數處聲重關郡吏散静室寒燈明故人青霞意飛舞焦蓬瀛昔曽在池籞應知魚鳥情送侯侍御黔中充判官劉長卿不識黔中路今看遣使臣猿隨萬里客鳥似五溪人地逺官無法山深俗易淳須令荒徼外亦解懼埋輪黔府王中丞楚孟郊舊説天下山半在黔中清又聞天下泉半落黔中鳴山水千萬逺中有君子行儒風一以扇汙俗心皆平送蜀客張籍蜀客南行祭碧鷄木綿花發錦江西山橋日落行人少時見猩猩樹上啼送客遊蜀前人行盡青山到益州錦城樓下二江流杜家曽向此中住為到浣花谿水頭貽蜀五首并序元稹元和九年蜀從事韋臧文告别蜀多朋舊稹性懶為寒温書因賦代懐五章而贈行亦在其數病馬詩寄上李尚書萬里長鳴望蜀門病身猶帶舊瘡痕遥看雲路心空在乆服鹽車力漸煩尚有髙懸雙鏡眼何由並駕兩朱轓唯應夜識深山道忽遇君侯一報恩李中丞表臣韋門向是舊親賔獨恨潘床簟有塵十里花谿錦城麗五年沙尾白頭新倅戎何事勞專席老掾甘心逐衆人却待文星天上去少分光彩照沉淪盧評事為我殷勤盧子䝉近來無復昔時同懶成積疹推難動禪盡狂心鍊到空老愛晝眠虚夜月病妨盃酒負春風唯公兩弟間因訪徃徃澘然一望公張校書元夫未面西川張校書畫来稠叠頗相于我聞聲價金應敵衆道風姿玉不如逺處從人須謹慎少年為事要舒徐勸君便是酬君愛莫比尋常贈鯉魚韋兵曹臧文處處侯門可曳裾人人争事蜀尚書摩天氣直山曾㧞徹底心清水共虚鵬翼已翻君好去烏頭未變我何如殷勤為話深相感不學馮諼待食魚贈吳士則前人憶昔分襟童子郎白頭抛擲又他鄉三千里外巴南恨二十年前城裏狂甯氏舅甥俱寂寞荀家兄弟半淪亡淚因生别兼行舊回首江山欲萬行贈薛濤前人詩篇調態人皆有細膩風光我獨知月夜詠花憐暗澹雨朝題栁為欹垂長教碧玉藏深處總向紅牋寫自隨老大不能收拾得與君開似教男兒寄薛濤前人錦江滑膩峨眉秀生得文君與薛濤言語巧偷鸚鵡舌文章分得鳳凰毛紛紛辭客多停筆箇箇君侯欲夢刀别後相思隔煙水菖蒲花發五雲髙送武士曹歸蜀白居易花落鳥嚶嚶南歸稱野情月宜秦嶺宿春好蜀江行鄉路通雲棧郊扉近錦城烏臺陟崗送人羡别時榮送蕭處士遊黔南前人能文好飲老蕭郎身似浮雲鬢似霜生計抛來詩是業家園忘却酒為鄉江從巴峽初成字猿過巫陽始斷腸不醉黔中争去得磨圍山月正蒼蒼自京将赴黔南竇鞏風雨荆州二月天問人初雇峡中船西南一望雲如水猶道黔南有四千送友人遊蜀賈島萬岑深積翠路向此中難欲暮多羇思因髙莫逺看卓家人寂寞揚子業凋殘唯有岷江水悠悠帶月寒送朱休歸劒南前人劒南歸受賀太學賦聲雄小路長江岸朝陽十月中芽新抽雪茗枝重集猿楓卓氏琴臺廢深蕪想逕通送李餘及第歸蜀前人知音伸乆屈覲省去光輝津濟逢清夜途程盡翠㣲雲當綿竹叠鳥離錦江飛肯寄書來否原居出甚稀送雍陶及第歸成都寜覲前人不唯詩著籍兼又賦知名議論于題稱春秋對問精半應隂隲與全頼有司平歸去峯巒衆别來松桂生漲江流水凸當道白雲坑勿以攻文㨗而将學劒輕製衣新濯錦開醖舊燒罌同日升科士誰何膝下榮送李評事使蜀王建勸酒不依廵明朝萬里人轉江雲棧細近驛板橋新石冷啼猿影松昏戯鹿塵少年為客好况是益州春寄蜀中薛濤校書前人萬里橋邊女校書枇杷花裏閉門居掃眉才子知多少管領春風總不如送從舅成都丞廣南歸蜀李端巴字天邊水秦人去是歸棧長山雨響谿亂火田稀俗富行應樂官雄禄豈㣲魏舒終有淚還濕甯家衣送何兆下第還蜀前人重河不可涉孤客莫晨装古木沙城小殘霞棧道長裊猿楓子落過雨荔枝香勸爾成都住文翁有學堂西蜀送許中庸歸秦赴舉陳羽春色華陽國秦人此别離驛樓横水影鄉路入花枝日暖鶯飛好山晴馬去遲劒門當石隘棧閣入雲危獨鶴心千里貧交酒一巵桂條攀偃蹇蘭葉藉参差旅夢驚蝴蝶殘芳怨子規碧霄今夜月惆悵上峩眉梓州與温商夜别前人鳳凰城裏花時别𤣥武江邊月下逢客舍莫辭先買酒相門曾忝後登龍迎風騷屑千家竹隔水悠揚五夜鐘明日又行西蜀路不堪天際逺山重送李餘及第歸蜀前人蜀山髙岧嶤蜀客無平才日飲錦江水文章盈其懐十年作貢賔九年多邅廻春來登髙科升天得梯階手持冬集書還家獻庭闈人生此為榮得如君者稀李白蜀道難羞為無成歸子今稱意行所歴安覺危與子乆相從今朝忽乖離風飄海中船㑹合難自期長安米價髙伊我常渇飢臨岐送君别無聲但涕洟神交外不親利交内相違勉子慎其道急若食與衣苦熱道路赤行人念前馳一杯不可輕逺别方自兹送雍陶遊蜀前人春色三千里愁人意未開木梢穿棧出雨勢隔江来荒館因花宿深山羡客囘相如何物在應只有琴臺送林立歸蜀前人迢逓三千里西南是去程杜陵家已盡蜀國客重行雪照巴江色風吹棧閣聲馬嘶山稍暖人語店初明林夢心多感孤吟意不平誰為李白後為訪錦官城送任畹及第歸蜀中覲親前人子規啼欲死君聴固無愁闕下聲名出鄉中意氣遊東川横劒閣南斗近刀州神聖題前字千人看不休送崔珏徃西川李商隐年少因何有旅愁欲為東下更西遊一條雪浪吼巫峡千里火雲燒益州卜肆至今多寂寞酒壚從古擅風流浣花牋紙桃花色好好題詩詠玊鉤寄成都髙苗二從事前人家近紅蕖曲水濵全家羅韈起秋塵莫将越客千絲網網得西施别贈人寄成都髙苗二從事是時二公從事商隐座主府前人紅蓮幕下紫梨新命㫁湘南病渇人今日問君能寄否二江風水接天津送蜀客張祜楚國去岷江西南指天末平生不逹意萬里船一發行行三峡夜十二峯頂月哀猿别曽林忽忽聲斷咽嘉陵水初漲巖嶺耗積雪不妨髙唐雲却藉宋玉説峩眉逺凝黛脚底谷洞穴錦城晝氲氲錦水春活活成都滯遊地酒客須醉殺莫戀卓家壚相如已屑屑送人歸蜀前人錦城春棹泝江源三峡經過幾夜猿紅樹兩崖開日色碧巖千仞漲波痕蕭蕭暮雨荆王夢漠漠春烟蜀帝魂長恐相如流滯處富家還憶卓王孫送楊秀才逰蜀前人鄂渚逢逰客瞿塘上去船峡深明月夜江凈碧雲天舊俗巴歈舞離情蜀國絃不堪渾慘限一涕自澘然送李長史歸涪州前人涪江江上客嵗晩却還鄉暮過髙唐雨秋經巫峡霜急灘船失次叠嶂樹無行好為題新什知君思不常閣中送任畹端公還京畹蜀人前人燕臺上榻玉為人月桂曽輸次第春幾日酬恩坐炎瘴九秋髙駕拂星辰漢庭鳳進鵷行喜隋國珠還水府貧多少嘉謨奏風俗斗牛孤劒在平津贈蜀將一首温庭筠十年分散劒闗秋萬事皆隨錦水流心氣已曽明漢節功名猶自滯吳鉤鵰邊認箭寒雲重馬上聴笳塞草愁今日逢君倍惆悵灌嬰韓信盡封侯奉和門下相公送西川相公兼領相印出鎮全蜀詩十八韻杜牧盛業冠伊唐台階翊戴光無私天雨露有截舜衣裳蜀輟新衡鏡池留舊鳳凰同心真石友寫恨蔑河梁虎騎揺風斾貂冠韻水蒼彫弓隨武庫金印逐文房棧壓嘉陵咽峯横劒閣長前驅二星去開險五丁忙迴首崢嶸盡連天草樹芳丹心懸魏闕往事愴甘棠治化輕諸葛威聲懾夜郎君平教説卦夫子召升堂塞接西山雪橋維萬里檣奪霞江錦爛撲地酒爐香忝逐三千客曽依數仞墻滯頑堪白屋攀附亦同行肉管伶倫曲簫韶清廟章唱髙知和寡小子斐然狂送人入蜀李逺蜀客本多愁君今是勝逰碧藏雲外樹紅壓驛邊樓杜宇呼名語巴江學字流不知烟雨夜何處夢刀州賀裴庭裕登第李搏銅梁千里曙雲開仙籍新從紫府來天上已張新羽翼世間無復舊塵埃嘉祥果中君平卜賀喜須斟卓氏盃應笑戎藩刀筆吏至今泥滓曝魚顋又戯贈裴庭裕曽隨風水化凡鱗安上門前一字新聞道蜀江風景好不知何似故園春答李搏裴庭裕何勞問我成都事亦報君知便納降蜀栁籠堤煙矗矗海棠當户燕雙雙富貴不並窮師子濯錦全勝旱曲江髙捲絳紗揚氏宅時主文寓楊子巷故有此句半垂紅袖薛濤窗浣花泛鷁詩千首静衆尋梅酒百缸若説絃歌與風景主人兼是碧油幢寄王播侍御史求蜀牋鮑溶蜀川牋紙綵雲初聞説王家最有餘野客思将池上學石楠紅葉不堪書送馬向入蜀徐凝遊子去咸京巴山萬里程白雲連鳥道青壁逓猿聲雨露經泥坂煙花望錦城工文人共許應記蜀中行旅次遂州遇裴晤員外謫居因寄鄭谷誰觧登髙問上𤣥謫仙何事謫詩仙雲遮列宿離華省樹䕃澄江入野船黄鳥晩啼愁瘴雨青梅早落帶蠻煙不知幾首南行曲留與巴兒萬古傳送夏侯審遊蜀耿湋暮峰和玉壘囘望不通秦更問蜀城路但逢巴語人石林鶯囀晚板屋月明春若訪嚴夫子無嫌卜肆貧送李餘及第歸蜀前人從得髙科名轉盛亦言歸去滿城知發時誰不開筵送到處人争與馬騎劍路紅蕉明棧閣巴村緑樹䕃神祠鄉中後軰遊門館半是來求近日詩送璧州劉使君前人王府登朝後巴鄉典郡新江分入棧路山見採鞭人舊業孤城夢生祠幾處身知君素清儉料得却來貧將歸蜀留獻恩地僕射二首姚鵠自持衡鏡採幽沉此事常聞曠古今危葉只將終委地焦桐誰料却為琴蒿莱詎報生成徳天馬空懷感戀心明日還家盈眼血定應廻首即沾襟江上長思狎釣翁此心難與昨心同自承丘嶽深恩重已分煙霞舊隠空龍變偶因資巨浪鵬飛誰肯借髙風應憐死節無門効氷炭潛憐逐轉蓬送李潛歸綿州覲省前人朱樓對翠㣲紅斾出重扉此地千人望寥天一鶴歸雪封山崦白鳥拂棧梁飛誰比趨庭戀驪珠耀綵衣寄雍陶先輩前人故人杳何處書札寄無由獨宿月中寺相思天畔樓露凝衰草白螢度逺煙秋悵望難歸枕吟勞生夜愁龍州韋郎中先夢六赤後因打葉子以詩上李洞紅蠟香煙撲畫楹梅花落盡庾樓清光輝圎魄銜山冷綵鏤方牙著腕輕寳帖牽來師子鎮金盃引出鳳凰傾微黄喜兆莊周夢六赤重新擲印成送東宫賈正字之蜀前人南朝獻晉史蜀地瞰巴樓長棧懷宫相踈峰露劒州半空飛雪化一道白雲流若次江邊邑宗詩為遍捜送西川渠常侍之新築龍山城并錫賚兩川刺史及部落酋長等薛逢聖主憂夷貊屯師剪束欽皇家恩眷祐星使忽登臨用命期開國違天必釁碪化須均草樹恩不間飛沉束馬凌蒼壁捫蘿上碧岑瘴川風自熱劒閣氣長隂迅瀬從天急喬松入地深仰觀唯一徑俯瞰即千尋水作新城帶山為故壘襟東開洞君聴南闢納蠻心渥澤濡三部謂三王部落衣冠化兩林帶文雕白玉符理篆黄金鳥道經邛僰星纒過觜參迴軒如一作知睿奬休作苦辛吟送西川杜司空起鎮前人黒眉𤣥髮尚依然紫綬金章五十年三入鳳池操國柄八分龍節付兵權東周城闕中天外西蜀樓臺落日邊莫遣洪鑪曠真宰九流人物待陶甄送人遊蜀馬戴别離楊栁陌迢逓蜀門行君聴清猿後應多白髮生虹霓侵棧道風雨雜江聲過盡愁人處煙花是錦城送友人遊蜀前人劒閣縁空去西過第幾州丹霄行客語明月杜䳌愁露帶山花落雲隨野水流相如曽醉地莫戀少年遊蜀中上王尚書章孝標梓桐花幕碧雲浮天許文星寄上頭武畧劒峯環相府詩情錦浪浴仙州丁香風裏飛牋草邛竹煙中動酒鈎自古名髙閒不得肯容王粲賦登樓送友人歸邛州唐求鶴鳴山下去滿箧荷瑶琨放馬荒田草看碑古寺門漸寒沙上雨欲暝水邊村莫忘分襟處梅花撲酒罇邛州水亭夜讌送顧非熊之官前人寂寞卭城夜寒塘對庾樓蜀闗蟬已噪秦樹葉應秋道路連天逺笙歌到曉愁不堪分袂後殘月正如鈎贈弟洎韓浦十様蠻牋出益州寄來新自浣花頭老兄得此全無用助爾添修五鳳樓贈段文昌無名氏文昌字墨卿有别業在廣都縣之南龍華山常杜門力學於此俗謂之段公讀書堂長慶初朝議文昌少在西蜀諳詳利病詔授劒南節度使有邑人贈詩曰昔日騎驢學忍飢今朝忽著錦衣歸等閒畫虎驅紅斾可畏登龍入紫㣲富貴不由翁祖致文章生得羽毛飛廣都再去應惆悵猶有江邊舊釣磯送李少府之臨邛釋無可邛南方作尉調補一何卑發論唯公幹承家乃帝枝山長風裊棧江䕃石和澌舊井王孫宅過尋獨有期送杜司馬再遊蜀中前人為客應非願愁成欲别時還過蜀國去不惜杜陵期劒水啼猿在闗林轉棧遲日光低峡口雨勢出峨眉川迥逢殘角雲開識逺夷勿令雙鬢髮併向錦城衰上韋相公薛濤聞道邊城苦如今到始知好将門下曲唱與隴頭兒薛濤本長安良家女父鄖因官寓蜀而卒濤以能詩聞外韋臯鎮蜀召令侍酒議以校書郎奏請之䕶軍曰不可乃止濤出入幕府自臯及李徳裕凡歴事十一鎮以詩與濤唱和元稹白居易牛僧孺令狐楚裴度嚴綬張籍杜牧劉禹錫吳武陵張祜餘皆名士凡二十一人濤詩罕傳故附見云上蜀相周庠偽蜀黄崇嘏五代王蜀時有崇嘏者本邛女子黄氏蜀相周庠初在臨邛嘏以詩上謁庠稱之薦攝府縣吏事明敏胥吏畏服逾一載欲妻以女嘏力辭之庠大驚召問具述本末乃黄使君之女未從人惟老妳同居此事尤怪元人傳竒女状元春桃記即其人也一辭拾翠碧江涯貧守蓬茅但賦詩自服藍衫居郡掾永抛鸞鏡畫蛾眉立身卓爾青松操挺志堅然白璧姿幕府若容為坦腹願天速變作男兒全蜀藝文志巻二十
