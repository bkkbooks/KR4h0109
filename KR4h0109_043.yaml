body:
  text: 全蜀藝文志卷四十三明周復俊編檄難牒檄諭巴蜀檄漢司馬相如告巴蜀太守蠻夷自擅不討之日久矣時侵犯邊境勞士大夫陛下即位存撫天下安集中國然後興師出兵北征胸奴單于怖駭交臂受事屈膝請和康居西域重譯納貢稽顙來享移師東指閩越相誅右弔番禺太子入朝南夷之君西僰之長常效貢職不敢惰怠延頸舉踵喁喁然皆嚮風慕義欲為臣妾道里遼逺山川阻深不能自致夫不順者已誅而為善者未賞故遣中郎將往賔之發巴蜀之士各五百人以奉幣帛衛使者不然靡有兵革之事戰鬬之患今聞其乃發軍興制驚懼子弟憂患長老郡又擅為轉粟運輸皆非陛下之意也當行者或亡逃自賊殺亦非人臣之節也夫邊郡之士聞烽舉燧燔皆攝弓而馳荷兵而走流汗相屬唯恐居後觸白刃冒流矢議不反顧計不旋踵人懷怒心如報私讎彼豈樂死惡生非編列之民而與巴蜀異主哉計深慮逺急國家之難而樂盡人臣之道也故有剖符之封析圭而爵位為通侯處列東第終則遺顯號於後世傳土地於子孫行事甚忠敬居位甚安逸名聲施於無窮功烈著而不滅是以賢人君子肝腦塗中原膏液潤野草而不辭也今奉幣使至南夷即自賊殺或亡逃抵誅身死無名諡為至愚恥及父母為天下笑人之度量相越豈不逺哉然此非獨行者之罪也父兄之教不先子弟之率不謹寡廉鮮恥而俗不長厚也其被刑戮不亦宜乎陛下患使者有司之若彼悼不肖愚民之如此故遣信使曉諭百姓以發卒之事因數之以不忠死亡之罪讓三老孝悌以不教誨之過方今田時重煩百姓已親見近縣恐逺所溪谷山澤之民不遍聞檄到亟下縣道使咸喻陛下之意無忽露布天下並班告益州文魏明帝劉備背恩自竄巴蜀諸葛亮棄父母之國阿殘賊之黨神人被毒惡積身滅亮外慕立孤之名而內貪専擅之實劉升之兄弟守空城而已亮又侮易益士虐用其民是以刺閬宕渠髙人青羌莫不瓦解為亮仇敵而亮反裘負薪𠂻盡毛殫刖趾適屨刻肌傷骨反更稱説自以為能行兵於井底遊步於牛蹄自朕即位三邊無事猶哀憐天下數遭兵革且欲養四海之耆老長後生之孤幼先移風於禮樂次講武於農隙置亮度外未以為虞而亮懷李熊愚勇之志不思荆耶度德之戒驅略利民盜利祁山王師方振膽破氣奪馬謖髙祥望旗奔敗虎臣逐北蹈尸涉血亮也小子震驚朕師猛鋭踴躍咸思長驅朕惟率土莫非王臣兵之所處荆棘生焉不欲使十室之邑忠信貞良與夫淫昏之黨同受塗炭故先開示以昭國誠勉思變化無滯亂邦巴蜀將吏士民諸為亮所劫迫公卿以下皆聽束手檄蜀文鍾會往者漢祚衰微率土分崩生民之命幾於泯滅太祖武皇帝神武聖哲撥亂反正拯其將墜造我區夏髙祖文皇帝應天順民受命踐祚烈祖明皇帝奕世重光恢拓洪業然江山之外異政殊俗率土齊民未蒙王化此三祖所以顧懷遺恨也今主上聖德欽明紹隆前緒宰輔忠肅明允劬勞王室布政垂惠而萬邦協和施德百蠻而肅慎致貢悼彼巴蜀獨為匪民愍此百姓勞役未已是以命授六師龔行天罰征西雍州鎮西諸軍五道並進古之行軍以仁為本以義治之王者之師有征無戰故虞舜舞干戚而服有苖周武有散財發廪表閭之義今鎮西奉辭銜命攝統戎重庶𢎞文告之訓以濟元元之命非欲窮武極戰以快一朝之志故略陳安危之要其敬聽話言益州先主以命世英才興兵朔野困躓冀徐之郊制命紹布之手太祖拯而濟之興隆大好中更背違棄同即異諸葛孔明仍規秦川薑伯約屢出隴右勞動我邊境侵擾我氐羌方國家多故未遑修九伐之征也今邊境乂清方內無事蓄力待時併兵一向而巴蜀一州之衆分張守備難以禦天下之師段谷侯和沮傷之氣難以敵堂堂之陳比年已來曽無寧嵗征夫勤瘁難以當子來之民此皆諸賢所親見也蜀相牡見禽于秦公孫述授首於漢九州之險是非一姓此皆諸賢所備聞也明者見危於無形智者窺禍於未萌是以微子去商長為周賔陳平背項立功於漢豈宴安鴆毒懷祿而不變哉今國朝隆天覆之恩宰輔宏寬恕之德先惠後誅好生惡殺往者吳將孫一舉衆內附位為上司寵秩殊異文欽唐咨為國家大害叛主讎賊還為戎首咨困逼禽獲欽二子還降皆將軍封侯咨豫聞國事一等窮踧歸命猶加上寵况巴蜀賢智見機而作者哉誠能深鑒成敗邈然髙蹈投迹微子之蹤措身陳平之軌則福同古人慶流來裔百姓士民安堵樂業農不易畝市不回肆去纍卵之危就永安之計豈不美與若偷安旦夕迷而不反大兵一發玉石俱碎雖欲悔之亦無及也各具宣布咸使聞知為東海王討成都王檄文晉孫惠頴稟性強暗增崇位號阿比奄官専任孟玖遂使恣睢殺活由巳疾諫好讒小人滿側官以賄成位以錢獲囚以貨生獄以幣解百官卷舌朝野隱伏按頴之罪書記未有禍甚叔帶逆隆魯柏為子則不孝為臣則不忠為弟則不順為主則不仁四惡具矣豺狼之性有甚無悛為郗鑒作檄李勢文庾闡告巴蜀士民夫昏明代運否終則泰賢哲覩機以知變不肖滅亡以取禍昔皇運中消乾綱暫弛耀窮凶肆暴神州李劉啓逆竊逼岷川翼以下才任符分陜未能仰宣皇恩招擕以禮而使二巴之民制於犬羊之羣元元之命懸於豺狼之口所以假寐永歎疢如疾首者也凡百黎氓秋毫不犯檄至各勵良圖自求多福無使蘭艾同焚永垂鑒誡信誓之明有如皎日數陳敬瑄十罪檄唐楊師立伏聞庖丁解牛鑒骨節於形闕伏波聚米察山谷於目前若匪通人奚臻妙理師立材非馬援智非庖丁見率土之銜寃為天朝之雪耻今國家以黃巢肆逆宇縣罹災乘輿播越而未安宗廟凌夷而失守凡在臣子孰不痛傷而西川闕使陳敬瑄因守藩維坐觀成敗伏自大駕駐蹕縱令郡盜害人不能行政理以安時但欲示軍功而駭衆只要威權在已冀令朝野歸心惡既貫盈人皆憤惋聊書十罪用去一凶實望此時共垂詳悉夫功髙者祿重德厚者位尊敬瑄本自凡庸素無智略事因際會位極人臣乃至稚女孩童皆霑寵祿閨房皂𨽻並受渥恩使功勳者切齒而不言勞舊者扼腕而懷恨其罪一也獻可替否必在忠言指佞觸邪尤慿直士張侍御正朝廷綱紀暗被誅夷孟拾遺疏陳敬瑄是非橫罹陷害或殞命於滄江之下或亡驅於幽室之間想其強死之寃魂必得申寃於上帝自此中外結憤愚智吞聲其罪二也妄議公事擅許和親挫大國之威風長南夷之僥幸蓋緣陳敬瑄受賂遂令海內興譏其罪三也恭顯弟兄總非勳放皆食厚祿並陟崇階蓋陳敬瑄罔顧刑章黷亂朝憲外姻內族戀貴貪榮其罪四也全無懼謗不識廉隅伹興茍且之心唯恣淫泆之行升徐賡為公座因令奪闕之妻致光庭登甲科只為聘陳敬瑄之女聞之者無不慙耻見之者皆有嘆嗟其罪五也鄭相公運籌於岐隴率衆於邠涇橫控梁闕遂安劔蜀陳敬瑄深懷嫉妒互起讒言其罪六也王藴賤𨽻之徒闕凶狀未具皆被殺戮可鑒幽寃賞罰之權自陳敬瑄出其罪七也闕行威福紊亂規繩除移不白於天書擢闕使牒元闕授官榮扈從六軍曽無優渥其罪八也搜羅闕借彼闕取其金帛三倍折納稅米西川綰節度文妄指贍軍多時潤屋其罪九也東西二巴節制徇意誣君云討韓秀升峽路回戈請髙仁厚當川歇馬不甘下視可驗闕欺如此用心自為得計其罪十也且為臣之首有一于此未或不亡况皆具之何以能久師立今則感人祗之怨怒奮貔武以平除已點驍鋭精兵及八州壇寨共五萬人騎舉義長驅問罪西府志在扶持天子誅滅亂臣止欲生致面奏聖上請行國典以正朝綱應諸道公侯諸州牧伯共期妒惡除姦或義士忠臣或川府將校但能裊敬瑄首級送師立軍前即便卷甲韜弓歸朝謝罪皇天后土實聞此言凡在人臣幸鑒忠懇破吐蕃露布韋臯尚書兵部臣韋臯等言臣聞天討有罪兵應者勝義者王夷不亂華師直為壯曲為老多者助之至四極爰輳貞觀則同羅擊延陀開元則九姓殄默啜曰商莫不來享犯漢雖逺必誅德風翔乎河源武節憺乎月􅀈率寧人之有指先元戎之啓行用信威光祖宗不以賊遺君父恭惟皇帝陛下宣昭義問敉寧武功纘八葉之鴻圗奮四征之雄略懷梟鴟銷祲沴稟承太和剪鯨鯢清郊原掃除羣穢王猶允塞我武惟揚奇幹善芳各修貢職條支若木咸順旨令邈積石之遐陬有吐蕃之醜類侵敗王略倍姦齊盟乘邊將之騁兵瞰戎亭之虛候為蛇豕食上國盡盜河湟帥蝥賊搖我疆再驚畿甸騎􅝙致於深入鑾蹕至于親屯􅏌然授兵協以謀我尚納汚而含垢姑通事以結和清水之盟未乾好畤之師已聚指涇靈而徼賂闖鹽夏以搗虛夷德無厭弗悔袵金之禍楚氛甚惡輒興𠂻甲之謀蠢爾為讎整居匪茹維時南詔慕化王朝先零之質諸羌雖嘗並力麋人之率百濮罔不離心頓顙於邊受令於吏斷胸奴之右臂羈南粵以長纓燕貉輸致騎之勤晉戎成掎鹿之勢彼既失鐵橋之險我遂闕和之郛盍竄匿於龍虎復虔劉於鱗塞戕我守將墮我陴隍修戎兵咸與同仇靡室家不遑寧處臣等請奮其旅以殱乃讎鳯翔振武靈武之騎獵其西邠寧太原涇原之兵震其北率山南熊羆之校暨東川貙虎之師烏蠻撓其腹心回鶻搗其肘腋衆素飽矣一大治之諸將陳洎等統五萬軍出十一道濟師西皓之半策北陸之初蕩平七城斬馘萬級獲鎧械五十萬計燔堡壘百七十餘遂賈勇而圍昆明將決勝而定青海為東境五節度大使論莽熱釋朔方之衆援維州之城九攻九却之計窮七縱七擒之威速連連執訊矯矯獻囚不然我薪而自焚有如破竹之立解拂廬魚潰甌脕兔奔谷靜山空行就焉耆之僇區殫域滅訖聞智聖之降斯皆廟謨淵深神斷天造明見萬里運竒坐上之兵守在四夷制勝目中之虜勒功滇池之柱植表赤嶺之碑一怒安民文之勇也三軍用命克何力焉臣等承帝之明敵王所愾開逺門闕侯坐收西極之舊封紫微殿受俘重覩昆丘之茂績臣等無任慶快激切屛營之至謹遣某官奉露布以聞代成都帥檄宋邵博朝廷既付帥以全蜀兵民之寄帥深念國勢艱危思所以寬上西顧之憂者不敢不力今敵國之禍半天下議者謂敵情終不能忘蜀帥固料之敵人以鐵騎衝突決勝使其出平原易野則勇矣果扼吾蜀將自取禍也蓋天下之險在蜀大山長谷數千里之間自古無路可出梯空為棧以往來行者必棄輿馬腰絙扶杖後先相挽牽或棧壞則墮於萬仞之下不見蹤迹此豈用武之地哉敵之長技廢矣帥比下約束敵之來堅壁清野斷路據險使其鼓勇則不得進示怯則不得退久駐則不得食將盡決四山所溺之水灌百萬之衆可使化魚鱉異物無遺也其能得志哉此不待智謀拳勇之士談笑可辨况有如諸君之髙才絶藝乎今官軍民兵與應募之士已百萬器用犀利糧儲山積斥堠明甚敵之動靜朝夕所知帥有備矣於此責將士焉傳曰師克在和不在衆無輕舉無爭功無信流言無泄祕計無以私事仇皆兵家所忌也帥為成都三年矣環百城之境無風塵草竊之虞朝廷察焉故當更而復留尺寸之功帥未嘗自列也帥之心可見矣以天之道社稷之靈朝廷尊安異時論保蜀之功將以將士之名次第上之不自有焉其或違衆慢令不以帥之言為用罰不敢私尚聽之毋忽難蜀父老漢司馬相如漢興七十有八載德茂存乎六世威武紛紜湛恩汪濊羣生霑濡洋溢乎方外於是乃命使西征隨流而攘風之所被罔不披靡因朝冉從駹定笮存邛略斯榆舉苞蒲結軌還轅東鄉將報至于蜀都耆老大夫縉紳先生之徒二十有七人儼然造焉辭畢進曰蓋聞天子之牧夷狄也其義羈縻勿絶而已今罷三郡之士通夜郎之塗三年於茲而功不竟士卒勞倦萬民不贍今又接之以西夷百姓力屈恐不能卒業此亦使者之纍也竊為左右患之且夫邛笮西夷之與中國並也歷年兹多不可記已仁者不以德來強者不以力并意者其殆不可乎今割齊民以附夷狄敝所恃以事無用鄙人固陋不識所謂使者曰烏謂此乎必若所云則是蜀不變服而巴不化俗也僕常惡聞若説然斯事體大固非觀者之所覯也余之行急其詳不可得聞已請為大夫粗陳其略蓋世必有非常之人然後有非常之事有非常之事然後有非常之功夫非常者固常人之所異也故曰非常之原黎民懼焉及臻厥成天下晏如也昔者洪水沸出汜濫衍溢民人升降移徙﨑嶇而不安夏后氏戚之乃堙洪塞源決江疏河灑沉淡災東歸之於海而天下永寧當斯之勤豈惟民哉心煩於慮而身親其勞躬腠胝無胈膚不生毛故休烈顯乎無窮聲稱浹乎于兹且夫賢君之踐位也豈特委瑣齷齪拘文牽俗循誦習傳當世取説云爾哉必將崇論閎議創業垂統為萬世規故馳騖乎兼容並包而勤思乎參天二地且詩不云乎普天之下莫非王土率土之濵莫非王臣是以六合之內八方之外浸淫衍溢懷生之物有不浸潤於澤者賢君耻之今封疆之內冠帶之倫咸獲嘉祉靡有闕遺矣而夷狄殊俗之國遼絶異黨之域舟車不通人迹罕至政教未加流風猶微內之則時犯義侵禮於邊境外之則邪行橫作放殺其上君臣易位尊卑失序父老不辜幼孤為奴虜係縲號泣內嚮而怨曰蓋聞中國有至仁焉德洋恩普物靡不得其所今獨曷為遺已舉踵思慕若枯旱之望雨戾夫為之垂涕况乎上聖又焉能已故北出師以討強胡南馳使以誚徑越四面風德二方之君鱗集仰流願得受號者以億計故乃關沫若徼牂牁鏤靈山梁孫原創道德之塗垂仁義之統將博恩廣施逺撫長駕使疏逖不閉曶爽暗昧得耀乎光明以偃甲兵於此而息討伐於彼遐邇一體中外禔福不亦康乎夫拯民於沉溺奉至尊之休德反衰世之陵夷繼周氏之絶業天子之急務也百姓雖勞又惡可以已乎哉且夫王者固未有不始於憂勤而終於佚樂者也然則受命之符合在於此方將增太山之封加梁父之事鳴和鸞揚樂頌上咸五下登三觀者未覩旨聽者未聞音猶鷦鵬已翔乎寥廓之宇而羅者猶視乎藪澤悲夫於是諸大夫茫然喪其所懷來失厥所以進喟然並稱曰允哉漢德此鄙人之所願聞也百姓雖勞請以身先之敞罔靡徙遷延而辭退對蜀父老問盧照鄰龍集荒落律紀㽔賔余自酆鄗歸于五津從王事也丁丑屆於升仙橋止送客亭即相如所謂不乘赤車駟馬不出其下者也遇蜀父老皤然龎眉華髮者休於斯謂余曰子非衣冕之族歟文章之徒歟飾仁義以干時乎懷詩書以邀名乎吾聞諸夫子曰邦有道貧且賤焉恥也當今萬方日用九有風靡主上垂衣裳正南面而已矣庸非有道乎而子爵不登上造位不至中涓藜羮不厭裋褐不全庸非貧賤乎吾視子形容憔悴顔色疲怠心若涉六經眼若營四海何其無耻也何其不一干聖主效智出奇何栖栖默默自苦若斯吾聞克為卿失則烹何故區區沉沉無所成名余笑而應之曰井蛙不可以語於海者拘於墟也夏蟲不可以語於氷者篤於時也蓋聞智者不背時以徼幸明者不迂道以干非是以聖賢馳騖莫赦三家之徹匹夫髙抗不屈萬乘之威道在則簞瓢匪陋義存則圭組斯違或立談以邀鼎食或白首而甘布衣或委輅而仕屬論都之會或射鈎以相遇匡霸之機亦有朝為伊周暮為桀跖當其時也襲珩珮之鏘鏘失其時也委溝渠而喀喀故使龍丘先生羞聞擁篲雁門太守不如縫掖孟軻偃蹇為王者師范睢匍匐為諸侯客富貴者君子之餘事仁義者賢逹之常迹來不可違類鴻鴈之隨陽去不可留同白駒之過隙行蘇張之辨於媧燧之年則迂矣用韓彭之術於堯舜之朝則吁矣守夷齊之節於武湯之時則孤矣抱申商之法於成康之日則愚矣彼一時也此一時也易時而處失其所矣大唐之有天下也出入三代五十餘載月竁來庭風闕欵塞金革已偃羽檄已平雖有廉白之將孫吳之兵百勝無遺策千里不留行無所用也社首既禪介丘既封創明堂立辟雍雖有闕里之聖淹中之儒叔孫通之蕝公玉帶之圖將焉設也咸英並作韶武畢用奏之方澤而地祗登升之圜丘而天神降雖有伶倫伯夔延陵子期操雅曲則風雲動激悽音則草木悲又何施也畫衣莫犯囹圄不修雖有咎繇仲甫之器釋之定國之儔金科在握丹筆如流非急務也人歸東户家沐南薰山澤無溪隧雞犬不相聞雖有文翁黃霸之述職子遊子賤之弦歌政成禮讓俗被雍和固無取也干戈巳戢禮樂已興刑罰已措梁父已升公卿常伯庶政其凝雖有鴻才大略麗句一作藻豐詞發言盈乎百代濡翰周乎四時略無益於今日而適足以怫之是故天子恭己羣臣演成攘袂而陵稷卨撫掌而笑阿衡無為而萬物皆遂不言而品彚咸亨莫不稱贊鴻烈揄揚頌聲言殊者招纍行危者相傾效智者輟談於草澤出竒者褁足以山楹許由去而堯臣不少善卷逃而舜德不輕夫周冕雖華猿猴不之好也夏屋雖崇騏驥不之處也載鼷以車馬不如放之藪冗也樂之以鐘鼓不如栖之以深林也此數物者豈惡榮而好辱哉蓋不失其天真也若余者十五而志于學四十而無聞焉詠羲農之化玩姬孔之篇周遊幾萬里馳騁數十年時復陵霞泛月搦札彈絃隨時上下與俗推遷門首張公之霧突面墨子之煙雖吾道之窮矣夫何妨乎浩然今將授子以中和之樂申子以封神疑作禪之篇終眇慙乎措地竊所慕於談天於是蜀父老再拜而謝曰鄙夫瞽陋長自愚惑習俗遐陬不遊上國聞王人之休旨聽皇猷之允塞亦猶獻雉而遇司下銜龍而光有北請終餘論永告邛僰回雲南牒唐髙駢先是雲南遞到木夾督爽牒劒南西川節度使駢復牒云大唐劒南西川節度使牒雲南詔國牒我大唐聖皇帝德配二儀光齊兩曜仁霑動植聖役神龍煦萬國而盡若青天養兆民而皆同赤子東鄰若木西屆流沙北通隂山南抵銅柱莫不貢珍而納賮航海而梯山諸混車書願為臣妾是知卑微螢耀不敢並於太陽齷齪蹄涔焉能踵於神驥且自九夷八狄七戎六蠻雖居要荒盡遵中國力爭不得天使其然所以孔聖云夷狄之有君不如諸夏之亡也縱外夷驕倨索中國等倫是以博古知今但擬率凶逞志雖恃荒陬之獨力背以天時必為寰海之諸蕃哂其僭越力不足憑且以蠓蚋之飛騰不離溝瀆欲追鸞鳯之羽翼擬接煙霄雖是童兒亦知不可且雲南頃者求合六詔併為一蕃與開道途得接邛蜀許賜書而習讀遽降使而交歡禮待情深招延意厚傳周公之禮樂習孔子之詩書片善既如大恩合報忽報窮兵瀆武掠土侵疆再犯郎寧重陷交趾兩俘邛蜀一却黔巴塗炭城池而極多皆為灰燼驅歸士庶而非少盡作闕寃轉闕罔知悛革吞越雋之舊地為相如之故城凌犯不休貪殘轉甚昔時交趾都護不間理兵舊日郎寧元戎未解誅冦黔巫闕師邛蜀儒臣受以侵欺容其殘暴其比者親征海裔充復龍編驅駕三千之師勦除十萬之冦南定縣則全軍陷沒如乾鎮則匹馬不回羅和一空嘉寧俱盡贊衛段首遷安南節度之斬首騎將馬光亮溪同都統之亡軀李膳龍安南城內守將則面縛於軍前張詮行營都統則生擒於陳上闕白衣􅀈命之衆將帥皆白至長行一千餘人衣號歿今軍如赤日消氷殺朱弩佉苴之軍詔王千並親軍三陷安南若烘爐焰熾膏塗草莽骸積丘山士卒覩之而稱心夷獠觀之而快意趙若眉扶耶等在界上道都統三十餘年也而就戮相思縉善門節度供軍兼平官充使亦自裁董鐸龍咸通七年除節度使闕段安南首遷之恓惶范昵些安南行營都統之窘沮每來侵擾無非敗亡江橋則盡底焚燒采筏則從頭覆沒波封瓦解扶耶大隳容易誅鋤若髙原之縱燎等間撲滅如順坂之走丸收復城池掃殄妖孽闕仗睿謀之果斷後資神術而追擒掩韓信滅趙之功吞樂毅定齊之策其於勝負詔國洞知昨日來鎮西川移從汶水仗節而不施𨗳騎單車而直抵坤維大開城門放出人物三軍而遣歸營幕百姓而使返鄉閭此時詔王未離近地固無疑阻直擬誅鋤不比從前帥臣只務姑息凶醜唯將和好便是策謀今則已知天時誓雪國耻前詔王遣張揀成等將領軍位稱是行人未至府城揚言和好身才入境兵以繼來况是詔親行公然詐偽侵欺大國熒惑元戎戮僕之儀須依古典其張揀成等並以軍令處置且詔國前後俘虜約十萬人今獨送杜驤妻言是沒落且杜驤守職本在安南城陷驅行固非沒落星霜半代桎梏幾年李氏偷生闕而空令返國杜驤早沒遺魂而不得還鄉今則訓練蕃兵指揮漢將鐵衣十萬甲馬五千雍交合從黔蜀齊晉昔時漢相有七擒七縱之功今日唐臣藴百戰百勝之術勳名須立國史永書且杜驤官銜李搖門地不是近親但王室疏宗天枝逺派而已李氏并詔國木夾並差人押領進送朝廷訖故牒又胡會駢統益部兼號征南蠻陬聞名預自屏迹然猶時飛一木夾誇兵革犀象之盛駢判回木夾命記室胡會為之辭牒前件木夾萬里離南二朝至北開緘捧讀辭藻煥然奬飾過多欣慰何極實以乍司邊鎮才到藩籬且按此朝之舊儀未悉彼國之新制不知鸖柘唯認苴咩尚呼南詔之佳名豈見天朝之美號要從微耗且是所宜仗承驃信王化風行君德雲被雕題屈膝駃舌折腰卉服來庭毳裘入貢蓋以深明豹略精究龍韜波伏西天草偃南土者然侵軼我華夏無乃不可乎將謂我皇帝有所負於彼邦邊臣有所負於彼國慮彼直我曲獲罪於天是陳木夾申懷用貯榮報及披回示已見事根止於囚繫使令放歸彼國使乎小怨終比深讎吞噬我郎寧虔劉我交趾取我越雋犯我益州若報東門乃及再四夫物居中者尊也處外者卑也是以衆星拱之北辰百谷趨之東海天地尚不能違而况於人乎我國家居天之心宅地之腹四方八表莫不輻湊亦猶北辰之與東海也誠知土地山河歸於有德雖云有德亦須相時茍無其時安可妄動明公博識多聞豈不見仲尼乎仲尼之聖踰堯舜顔子之賢過夔龍也六合茫茫無立錐之地者蓋無其時也適使仲尼生於秦末乘胡亥之亂用顔回閔損為宰相子路冉有為將軍子貢宰我充行人子夏言偃典書檄雖六合鼎沸可期月而定也當此之時劉項只可都頭韓彭不過十將耳聖人雖有帝天下之德而無帝天下之時終不妄動及子路欲使門人為臣以為欺天乎及自嘆曰鳳鳥不至河不出圗吾已矣夫止於負手曳杖逍遙倚門告終而已王莽不識天闕苻堅不知厯數妄恃強富爭帝乾坤莽以百萬鋭師來襲後漢光闕之衆破於昆陽苻以六十萬精兵寇於東晉謝玄以八千闕於夀春豈不為欺天罔地所致者也闕員兵強何足恃也周闕於岐山漢祖脫褐於泗水我髙祖起自隴州蓋明公只知其一不知其二見其形未知其兆也今與明公陳之望審參焉昔周王承公劉之德遇殷紂之暴刳剔孕婦塗炭生靈剖賢人之心斫朝涉之脛三分天下而二歸周文王率諸侯而朝之至于武王觀兵孟津八百諸侯不期而會尚曰彼有人焉未可圖也退歸修德觀乎聖人去就豈容易者哉及微子去比干剖箕子奴民不聊生皇天厭之國人棄之武王方援旗誓衆一舉而滅紂者蓋天奪殷而與周也我皇方宵衣旰食肩堯踵舜父事三老兄友百僚推赤心於比干腹中懸白日於微子頭上諸侯合德百姓歡心唯天下有人聖如周王家有姬旦卒生吕望者乎漢祖承帝堯之德遇秦王無道併吞六國恃宇宙一家焚燒詩書坑滅賢哲築長城於紫塞造阿房於皇州鬼母哭蛇人臣指鹿民不聊生皇天厭之國人棄之是以陳勝一呼天下響應漢祖西入五星都聚者蓋天奪秦而與漢也我皇帝方崇詩書任賢哲卑宫室恤黔黎野無歌鳯之人朝有問牛之傑天下有人英如漢祖家有韓信戶生張良者乎我髙祖承玄元之德遇隋煬荒淫徭役不均徴斂無度竭生民之財産為巡幸之資糧虎噬羣賢猱蒸庶母浮沉遼海疏鑿汴河今年東征明年西伐民不聊生皇天厭之國人棄之是以我髙祖應天順地奄有四海者蓋天奪隋而與唐也我皇方淡薄聲色杜絶巡遊夢卜宰輔倚注藩屏思成垂拱惡習干戈皇天方贊國人方歡天下有人雄如唐祖家有敬德户生玄齡者乎而况越雋新州牂牁故封不在周封之內非居禹迹之中曩日邊將邀勳妄圗吞并得之如手加駢拇失之若頷去贅瘤九牛之落一毛六馬之亡半毳何足喻哉僕雖自絳紗素耽黃石既探師律固識兵機奉詔鎮壓三巴撫安百姓思敦禮樂耻用干戈每傷虞芮之爭田永念姬周之讓路茍不獲巳即須訓戎且蜀地濶數千里郡列五十城户口至闕卒之衆于以揮汗成雨吐氣成雲蓋緣從前元戎皆是儒者有闕機而作但守升平之元規雉分常憂不教民戰是以彼國得以深入無備故也僕示之以三令教之以八陳鼓聲而進鉦動而退甘與之共苦與之均義等塤篪情猶瓜葛説禮樂而敦詩書務農桑而聚穀帛使家藏甲胄户貯干戈賞罰闕行公私共貫就識三略便可七擒不唯喝倒不周亦且擘開太華况彼國自長慶已來搔擾益部殺人之父孤人之母掠人之妾鰥人之夫焚人之廬舍使人暴露剪人之桑麻使人寒凍蜀人怨恨痛入骨髓僕乘其衆怒之勢示其暴怨之門况抱雞搏狸不由人教乳犬敵虎自是物情既仗宗廟之威靈兼統華夏之精鋭若乘流縱棹下坂推車豈勞心哉僕官是宰衡位當侯伯被堅執鋭雖則未曽濟河焚舟平生所貯彼國將帥之強弱邦國之盈虛坐可酌量何煩詢誘且六合之外舟車不及聖人不言彼國在聖人不言之鄉舟車不及之地縱主上英哲人臣俊乂亦猶燭龍銜耀只可照於一方春雷振聲不能過於百里天與不取談何容易夫天有五賊見之者昌彼國縱曉六韜未間五賊而欲泥封函谷水灌晉陽何其謬哉五賊者夏桀張羅殷湯祝網是以仁而賊不仁也殷紂剖生人周文葬枯骨是以德而賊不德也齊國厚徴薄貸魯國厚貸薄徴是以恩而賊不恩也項羽殺義帝漢髙祖舉哀是以義而賊不義也陳後主驕奢隋文帝恭儉是以道而賊不道也能行五賊兼曉六韜方可奪人山河傾人社稷我朝未有五失而彼國徒自陸梁以此推之興亡可鑒何勞逺離庭户始識安危久習韜鈐方明勝負而妄要姑息不務通和回示荒唐一何乖戾罔念孔顔之知命翻效莽堅之覆車文趾喪亡可知人事新都失律足見天時若望降尊便希抗禮但百谷不趨東海衆星不拱北辰則不可議也茍未如是則不可改圖昔管仲入周不受上卿之禮蘇武在虜無虧中國之儀事有前規固難更易况小不事大春秋所誅若彼直我曲恐招天殃既彼傲我謙何患神怒見已訓齊士卒調集糗糧或玉露垂槐金風動栁建鼓數里命闕雋弔民渡瀘會獵繼齊魯之夾谷紹秦趙之澠池便是行人豈遺策策皇帝理旨以具前緘奏聞不復多談恐乖忠告謹牒全蜀藝文志卷四十三
