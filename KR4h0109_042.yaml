body:
  text: 全蜀藝文志卷四十二明周復俊編記癸成都古寺名筆記宋范成大成都畫多名筆散在諸寺觀而見于大聖慈寺者為多今猶具存總而記之左庶幾觀者可考前寺多寶塔壁畫地獄變相待詔左全筆妙格中品畫四天王四堵師子國王一堵釋迦佛一堵小壁勢至觀音一十二堵及塔上壁畫西方變相阿彌陀佛共三堵文殊普賢觀音大悲如意輪共五堵並古迹不知名普賢閣閣外南壁畫南方天王一堵趙溫奇筆妙格上品畫佛會一堵五如來一堵八菩薩釋迦佛一堵并閣後壁畫文殊普賢北畔五髻文殊彌勒下生北方天王并堂內四柱上四天王並辛澄筆妙格中品北方肉甲天王柱敬安壁能格上品鮮于院小閣上壁畫毗盧佛待詔杜齯龜筆妙格下品百部院過廊畫護戒神僧知評筆干部院佛堂壁畫熾盛光佛古迹白馬院佛堂畫十六羅漢古迹近時周忘機畫瀟湘圗王逸民擬任才仲作桃源圖承天院祖堂惠逹國師像孫知微筆妙格上品近年院僧粉去古畫别寫新像尚餘侍者二僧猶在中寺自中三門北至水陸院東至如意輪正覺院係髙力士同僧英幹建中佛殿殿內壁畫維摩居士師子國王變相待詔左全筆妙格中品釋迦佛二堵待詔杜懷玉筆前廡東壁畫起寺金和尚髙力士像古迹西壁畫漢孝明帝蔡愔秦景王遵及摩騰竺法之像童仁益筆妙格中品文殊閣四壁畫北方天王梵王待詔趙溫竒筆妙格上品阿彌陀佛大悲毗盧十大弟子四堵閣外壁畫大悲三十七尊法華經驗大悲菩薩四堵東南方天王西方天王並待詔趙公祐筆妙格上品彌勒釋迦西方變相北方天王變相待詔范瓊筆神格上品報身如來待詔張騰筆妙格上品無量夀佛古迹東方天王待詔趙公祐筆神格上品帝釋待詔趙溫奇筆妙格上品千手眼觀音勢至張布古華閣上周匝壁畫諸佛古迹華嚴閣影壁後畫天花瑞像二其西待詔竹虔筆其東髙興道筆妙格中品忩外兩壁畫大悲待詔張南本筆妙格中品兩畔小壁畫天王並古迹杜琮像張逢筆泗洲和尚小壁畫太子遊雷山古迹當面西壁王波利像吕嶤筆能格上品東西二方天王帝釋梵王待詔趙溫竒筆妙格上品周匝壁畫佛像並古迹文殊閣院門連寺廊畫金剛經變驗二堵待詔左全筆妙格中品院內觀音堂壁畫天王帝釋侍從二堵待詔趙公祐筆神格上品西大悲院佛堂西畫八明王古迹大將院壁畫羅漢二北方天王及大將部屬並帝釋梵王共六堵並待詔范瓊筆神格上品藥師院連寺廊八門兩壁畫菩薩大悲北方天王大悲釋迦變相四堵待詔范瓊筆神格上品殿內釋迦佛帝釋梵王部衆並古迹畫文殊普賢維摩無量夀西方天王十二神共九堵並待詔趙公祐筆神格上品瑞像堂周匝畫像並古迹寺後門向上小壁畫觀音僧智評筆六祖院院門北壁地藏一堵杜措筆妙格上品南壁佛會變相一堵待詔趙義筆妙格上品院內山水四堵唐壁畫古迹保福院門屋畫天王一堵趙德齊筆妙格上品姑蘇臺一堵僧惠堅筆壁著宫一堵僧楚安筆小壁畫竹雀二堵黃筌筆佛殿內羅漢一堂盧楞伽筆記中不載蓋自昭覺殿神霄徙來殿後海山觀音一堵張南本筆亦昭覺移至小壁羅漢一堂古迹法堂上湖山一堵馬二堵近時郭遊卿筆遊卿熙之孫也大輪堂畫壁大輪部屬兩堵金剛二十四尊並待詔趙溫竒筆妙格上品極樂院門外壁畫散花天女范瓊筆神格上品大悲菩薩左全筆神格中品觀音大悲二堵古迹佛殿內十六羅漢盧楞伽筆妙格上品四絶堂壁畫悟達國師真常粲筆妙格上品畫彭州至德山金堂栖賢山二堵李升筆妙格下品石像院門壁香花菩薩一堵門內菩薩一堵並古迹前記不載慧日院門壁畫奉聖國師真齊天大王泗洲和尚宗震筆佛堂內十六羅漢丘文播筆能格上品吉安院畫十二面觀音杜齯龜筆妙格下品夀寧院佛殿內四壁畫熾盛光凡擢孫知微筆柱上小像知微自寫其真也殿內廊畫太子修行古迹東觀音堂畫觀音十六羅漢李德讓筆霧中山出峽圖李升筆樓上盡惠逺送陸道士李翺見藥山孫知微筆妙格上品護法神孫知微筆土地堂孟蜀主真古迹戰勝天王羅漢共三堵趙元晟筆華嚴院殿壁畫毗盧佛張希正筆妙格中品文殊普賢古迹觀音勢至五髻文殊丘文播筆能格上品興善院殿內泗洲大聖一堵常粲筆八明王張南本筆西林院殿內羅漢杜楷筆能格上品壁後彌陀佛二菩薩彌勒羅漢盧楞伽筆妙格上品大悲閣畫觀音十堵楞嚴變相一十八堵並宗道兄弟筆八明王八堵繡毬觀音並古迹實勝院藏殿內外聖像並古迹揭諦院壁畫釋迦佛二菩薩觀音勢至十六羅漢並杜齯龜筆妙格下品彌勒院壁畫十六羅漢文殊普賢張南本筆妙格中品畫故事山水二堵劉國用筆錦津院壁畫釋迦佛十六羅漢劉國用筆能格上品白衣自在觀音李德讓筆東律院壁畫八明王西方變相釋迦如來十六羅漢杜楷子瓌筆能格上品灌頂院壁畫藥師佛十六羅漢張玄筆能格下品如意輪院壁畫花竹六鶴六堵童祥筆半已不存楞巖院壁畫六祖劉國用筆能格上品枯木一堵文與可筆山水十堵蒲水升筆龍虎二堵魯安道筆山水三堵僧延廣筆甘露寺廊壁髙僧數十堵並闕承天院呂相真堂後佛像四堵闕不下金下諸佛如意輪觀音等像超悟院堂頭近周忘機盡闕題蜀名畫記闕費闕蜀多畫工而盛於三孟僣偽之闕其割制一方耽玩圗畫以自娛故一聚焉自西闕將軍黎闕鶴圖闕之孟氏因授雅州刺史其玩物而棄民乃至此闕今取畫藝之髙而家于成都者敘記姓名他則不闕王宰家于西蜀兵元中韋臯闕禮待之畫山水松石出於象外杜甫賦詩有曰十日畫一水五日畫一石能事不受相促迫王宰始肯留真迹宰嘗於席夔廳圖一障臨江雙樹一松一柏古藤縈繞上盤半空下著水面千枝萬葉榮瘁曲直分布不雜又於興善寺畫四時屏風若移造化於座右左全蜀郡人本儒家工畫佛道人物多倣吳生闕筆寶厯中聞海內今大慈寺多寶塔地獄變相全之筆迹也趙公祐成都人工畫佛道鬼神李德裕鎮蜀嘗賔禮之大慈聖興兩寺皆有畫壁子溫奇亦善畫成都寺觀多見其迹其孫德齊襲二世之精藝豪蹤逸筆時輩推重光化中詔許王建於成都置生祠命德齊畫西平王儀仗車輅旌纛法物及朝真殿畫后妃嬪御皆極精麗官翰林待詔常粲成都人畫佛道人物善為上古衣冠路巖鎮蜀頗加禮遇有孔子問禮山陽七賢等圖立釋迦女媧伏羲神農燧人等像傳於世子重胤工寫貌僖宗朝為翰林供奉嘗寫僖宗御容及名臣像又於寶厯寺畫諸塔天王甚妙孫遇初名位自稱會稽山人志行孤潔情韻疏放廣明中避地入蜀遂家成都善畫人物龍水松石墨竹天王鬼神筆力狂怪不以傅彩為工長安蜀川皆有其筆李洪度成都人畫佛道人物大慈寺三學院皆有畫壁李升成都人善畫蜀川山水初得鹿張藻山川圖凝玩數日以為未善後遂心師造化自成一家有武陵溪青城峩眉二十四畫圖傳於世世傳小李將軍即升也或曰李昭道非也杜楷成都人工畫山水多作老木懸崖回阿逺岫有秋日并州路詩意圖傳於世杜子瓌華陽人工畫物道尤精傅彩嘗於龍華東禪院畫毗盧像坐赤圓光中碧蓮花上圓光如初出日輪破淡無迹俗工不到房從真成都人工畫人物蕃馬事王建為翰林待詔嘗於宫中畫諸葛武侯渡瀘水圖甲馬如生兼善潑筆鬼神有寧王射獵陳登斫鱠等圖傳於世宋藝蜀郡人工寫貌事王蜀為翰林待詔常寫唐朝列代御容及道士葉法善一行禪師沙門會海內臣髙力士等像於大慈寺髙道興成都人事王蜀為內圖畫庫使工佛道雜畫用筆神速觸類皆精諺云髙君墜筆亦成畫子從遇事孟蜀為翰林待詔嘗於宫中大安樓下畫天王隊仗甚竒從遇子文進工畫佛道傅彩曹吳之筆蜀平至闕下太宗皇帝在潛邸文進往依焉後以攀附授翰林待詔未幾修大相國寺命文進倣髙益舊本畫行廡變相及太一宫夀寧觀啓聖院開寶塔下諸畫壁率皆稱旨畫院晚學皆宗之阮知誨蜀郡人工畫貴戚子女兼善寫生嘗仕蜀為翰林待詔寫王建像為首出李文才華陽人工畫松石兼善貌闕為翰林待詔廣政中荆南髙王遣人請文才寫義興門街闕焉石恪蜀郡人性滑稽工畫佛道人物始師張南本而筆畫縱逸不専規矩蜀平至闕下嘗被旨畫相國寺壁授以畫院之職不就固請還蜀詔許之有唐諸賢像五丁開山闕新羅人角力等圖傳於世董從誨成都人世襲儒風心遊繪事佛道人物隨意皆精感佛寺有畫壁王道真新繁人工畫佛道人物兼長屋木宋太宗時用髙文進薦授圖畫院祇候嘗被旨畫相國寺玉清昭應宮壁相國寺殿東給孤長園長者買祗陀太子園因緣並殿西闕變十二面觀音像皆其筆迹毛文昌蜀郡人工畫田家風物有江村晚釣村童入學郊居豐稔等圖傳於世李懷衮成都人善畫山水毛翎其常所居及寢處皆置土筆或中夜得意急起畫於地或被上遲明模寫之則優於平日所為蒲永升成都人東坡先生嘗書其畫後曰永升嗜酒放浪性與畫會始作活水得二孫孫位孫知微也筆法闕黃居寀兄弟李懷衮之流皆不及也王公富人或以勢力使之闕輒嘻笑捨去遇其欲畫不擇貴賤頃刻而成嘗與余闕微畫作二十四副每夏日挂之髙堂素壁即隂風龍闕今老矣畫益闕而世之識真者闕往時董羽近日常州戚氏畫水世或傳寶之如董戚之流可謂死闕未可與永升同年而語也其為東坡所重如此王道亨郫人七嵗能畫用筆命意皆過人大觀間肇置畫學自博士而下如大學法聽天下畫工補試肄業而考選焉道亨入學試官以古詩一聨為題曰蝴蝶夢中家萬里子規枝上月三更道亨乃畫蘇武牧羊于北海被氊枕節而卧雙蝶飛揚其上極沙漠風雪之狀又畫樹木枎疏枝有子規月政當午木影在地亭榭樓觀隱隱可辨曲盡一聨之景果入上選翌日進呈宋徽宗奇之命為畫學録全蜀藝文志卷四十二
