body:
  text: 全蜀藝文志卷四十六明周復俊編碑文上漢故朝請巴郡太守樊府君碑君諱敏字叔達肇祖虙犧遺苗后稷為堯種樹舍潜從岐天顧亶甫乃萌昌發周室衰微霸伯匡弼晉為韓魏魯分為揚充曜封邑厥土河東樹漢之陰或居於楚或集于梁君纘其緒華南西疆濵近聖禹飲汶茹汸總角好學治春秋穀氏經貫究道度無文不睹於是國君備禮招請濯冕題輿傑立忠謇有夷史之直卓密之風鄉黨見歸察孝除郎永昌長史遷宕渠令布化三載遭離母憂五五斷仁大將軍辟光和之末京師攘擾雄狐綏綏冠履同囊封袂長驅卑走枕北國復重察辭病不就再奉朝聘十辟外臺常為治中都部從事舉直錯枉談思舊職彈凶糾貪務鉏民穢患苦改俗喜怒作律案罪殺人不顧猖獗告子屬孫敢若此者不入墓門州里僉然號曰吏師季世不祥米巫凶虐續乘青羌姦狡竝起陷附者衆君執一心賴無汙恥復辟司徒道辭不往牧伯劉公二世欽重表擢巴郡後漢中秋老乞身以助義都尉養疾閭里又辟奮義校尉君仕不為入祿不為已桓桓大度禮蹈萁首當窮台齡松喬協軌八十有四嵗在叶洽紀驗期臻奄勿日藏形凡百咸痛士女涕泠臣子裒術刋石勒銘其辭曰於戲樊考經德炳明勞謙損益耽古儉清立朝正色能無撓傾威恩御下持滿慮盈所歷見慕遺歌景形書載俊乂股肱幹楨有物有則模楷後生宜參鼎鉉再建皇靈出經阪險鬼方不庭所戢節足輕寵賤榮故叔天選而捐陪臣晏嬰弼殿留侯距齊非辭福也乃辟禍兮亂曰渾元留像岱瀆冶匠兮金精火佐實生賢兮豈欲救民德彌大兮遭遇陽九百六㑹兮當舉選季今遂逝兮嗚呼哀哉魂神裕兮建安十年二月上旬造石工劉武良鐫書諸葛故壘立碣文李興天子命我于漢之陽聽鼓鼙而永思闕哲之遺光登隆山以闕軾諸葛之故鄉蓋神物應機大器無方通人靡滯大德不常故谷風發而騶虞嘯雲雷升而潜鱗驤摯解褐於三聘尼得招而褰裳管豹變于受命貢感激於由莊異徐生之摘寶識臥龍於深藏偉劉氏之傾蓋嘉吾子之周行夫有知己之主則有佐命之良固所以三分我九鼎跨帶我邊荒抗衡我北面馳騁我魏疆者也英哉吾子獨含天靈豈神之祗豈人之精何思之深何德之清異世通夢恨不同生惟子八陳不在孫吳木牛之竒則非般模神弩之功一何微妙千井齊甃又何祕要昔在顛夭有名無跡孰若吾儕良籌妙畫臧文既沒以言見稱又未若子言行並徵夷吾反坫樂毅不終奚比于爾明哲守冲臨終受寄讓過許由負扆涖事民言不流刑中于鄭教美於魯蜀民知恥河渭安堵匪臯則伊寧彼管晏豈徒聖宣慷慨屢嘆昔爾之隱卜此惟宅知仁所處能無規廓日居月諸時殞其夕誰能不歿貴有遺格惟子之勳移風來世咏歌餘典懦夫將厲遐哉邈矣厥規卓矣凡若吾子難可究已疇昔之乖萬里殊塗今我來思覿爾故墟漢髙歸魂於豐沛太公五世而反周想魍魎以髣佛翼影響之有餘魂而有靈豈其識諸益州德陽縣善寂寺碑唐王勃若夫玉繩髙曜分寶厯於皇階金榜洞開遵蠙暉於帝幄雖復蒼梧北望湘山盈舜后之歌緑荇西浮江漢積文妃之頌未有激揚煩蔭栖妙果於香城揮發蓋纏樹冥基於淨域則紫房丹室猶存燬宅之間朱紱瑶筐未出塵籠之際我國家鳳翔元氣駕黃幄而曽飛龍躍太虛絶蒼根而上傃文皇帝以八才御厯光升代野之榮文德后以十亂乘時恭贊塗山之業握仁王之寶鏡日月重光驅梵帝之金輪雷霆靜祲涅槃甘露睿承渥而宵流般若靈音雜祥風而曉引蛟臺蜃閣俄交震旦之墟月面星毫坐照毗邪之國善寂寺者蓋舊之餘趾梁武帝之所建也爾其碧雞仙宇分絶嶂於金堤石兔遙源控長江於玉峽封畿四㑹龍坰舍衛之壇里閈三分鹿野徑行之地洎蒼鵝上擊銅馬交馳祗園興版蕩之悲沙界積淪胥之痛火炎崑嶽髙臺與鴈塔俱平水浸天街曲岸與猴池共盡山川隱嶙空傳鷲嶺之基灌漭疑莽蕭條非復鶯林之樹武德伊始君子道亨正皇極而撫寰中登太階而平天下函關雲物更逢真聖之期井絡星辰重集㑹昌之運雖開基撥亂獄訟知歸而繼絶興亡經綸未暇先皇帝統業貞觀御宸奉文物於三天布聲明於十地參羅上下充槖籥於襟懷八部神祇薦圗書於掌握皇寶降地花升含生無昏墊之虞法衆有來蘇之望俄而後庭遘癘椒房穆卜六宫震恐三靈愕眙馳瑶展幣有罄於羣宗碧劑𤣥針無徵於衆術帝乃降監回慮屏璧與球追勝跡於靈關事良緣於福地爰紆聖綍重啓禪宫峙璇剎一作玉剎於將傾鎮一作領銀繩於已絶綵一作絲綸既洽棟宇行周坤德用寧隂儀載朗於是林衡授矩周官銓揆日之工梓匠揮斤荆客練成風之巧重楹畫拱坐出天霄復樹文閨俯臨霓宇顯慶中縣令蕭君道𢎞理鈎繩於日用憑藻繢於天成仙宫之妙匠可尋盧舍之神模不墜雕落鶴翥曳珠網於星津繡桷虯伸吐璿璫於月徑緑房丹鎖綵綴晴霞紫閣青疏光含薄霧春風瓊樹香飄席上之蘭秋水銀塘影數軒中之芰晨光轉卉翻寶字之龍花溽露低枝蕩真文於貝葉天童潤色黃珉碧玉之壇海聖彌綸師子龍王之㑹建靈幢於厚夜琢飾年深懸法鼓於迷津規模嵗逺時又於佛堂東壁畫二聖僧丹青未畢大啓神光鄰玉塵之崇輝發金龕之實相朱軒夕朗似遊明月之宮絳宇晨融若對流霞之闕由是岷英蜀秀攀講序以雲趨帶燕裙鸞仰齊庭而霧合貪機大阻淨施旁流綺羅分解珮之因軒蓋得捐金之所靈妃翳日捨翠幄于香筵仙客停雲落霓裳於寶地自非冲姿密契景應潛周豈能照義祉于氤氲動𤣥機於肸蠁者也爰有上座𢎞一節竝沉研性符隱括仁崇凝妙律於神珠肅靈椒於寶印太昊奉楫截苦海而橫流風伯扶輪歷耶山而效駕騰燭龍於慧炬俯鏡重昏奏鳴鳳於天歌下清羣籟摩珍在握遙臨七寶之宫正覺為心俯闢三乘之路湛衢樽於忍地品藻雞園推水砥於言河扶持象化縣令宇文某河南人也帝隋尚書之元孫皇唐侍中之令子爾其虹旗萬里御六氣而鵬翻霜㦸千羣擁三川而鶚視帝葉皇枝之重對越乾坤金縢石匱之功光華宇宙公上流提慶中和育祉見鐘鼎於南陵奉軒寰於北闕雲姿月步下瑶澤而追風雪羽霞臨歷珠田而矯霧芳蘭公子即以地業髙人幽桂王孫即以琴樽待物叙徽猷於禮樂則爼豆縱橫談賞契於林泉則煙霞咫尺自裁聲百里揆化雙川收武成之故事擇中牟之令典仁風易狎候丹翟於春坰惠化難經佇青鸞於曉墅山巨源之逺量嘯傲行藏謝太傅之髙風從容語默縣丞王敬衣簮舊族孝友名家白虹緘抵鵲之光紫電蓄衝牛之氣七年髙秀拂曽漢以非遙六月雄圗擊長波而未逺鄉望等少承榮緒中區勝族門稱東别之標地接西隅之嚮嚴君平之履道盛德家傳秦子整之談天風流代襲咸以為妙圗真諦事出於無名翠琰𤣥碑道凝於不朽弇州北跨猶疏騄驥之銘文石東區尚勒元龜之頌况乎玉衣流慶事屬於仙幃金屋延祥福纏於梵宇爰求勝筆載記芳謡下官弱植少徒薄游多暇薜蘿人事空餘江海之心筆札神交尚有淵雲之氣相如謝病訪詩酒於臨邛丘也棲遲聽絃歌於單父羣公以道之存矣思傳紀德之書下官以文在兹乎願展當仁之筆其詞曰蜀江東漸岷山西積月峽星橋勝金孕碧肸蠁靈兆丘墟梵迹鴈塔摧基鹿苑遺跡肅肅黃運英英文母配乾垂慶儀坤握矩寵照香城仁沾淨土爰光大壯聿求多祚青牛福地白鶴祥林重扄霧敞復殿雲深龕雕翠玉剎樹黃金龜鏡夕照鳳鐸晨吟蕙樓彌望花臺出沒棟列長虹窗栖明月果脣周映蓮眸閒發雨霽猴池煙生龍窟肅穆禪衆優游令宰方駕天衢連舟性海鷲嶽增飾雞林潤彩藻繪相尋丹青盡在我今懷矣窮路何之承風詠德展義陳詞百年心事千載風期東西南北栖遑幾時梓州郪縣兜率寺浮圖碑前人若夫仙樓白玉窈冥崑閬之墟神闕黃金寂寞蓬瀛之浦斯則岡巒髣佛稽鳳冊而空存島嶼憑陵艤龍舟而罕逮至若按皇軒於夏籙考璿構於殷圖周王北洛之宫秦帝南山之閣西京故事下聽雷霆東國餘基俯臨雲雨莫不陵遷谷變共榛灌而丘墟火絶煙沉與風雲而坱莽其有據坤輿之寶位借神道之冥扶占象緯而圗基揆川原而宅址蜂臺映月還臨舍衛之城鴈塔尋雲即對𡺸闍之嶺成而不毁者將斯之謂歟兜率寺者隋開皇中之所建也爾其林泉糾合之勢山川表裏之制抽紫巖而四絶疊丹峰而萬變連溪拒壑所以控引太虛蒸雲架雨所以蕩泄元氣涪江千仭波潮將旭日爭光都城百雉甍棟與晴霞共色信造化之竒模盡登臨之妙境丹房霧轉抗金樞於桂岊之前紺殿星開栖玉剎於闕巖花落沼近拂天衣澗葉低陰斜籠寶座宵汀鶴警乘鼓吹而齊鳴曉峽猿清挾霜鐘而赴節若乃巡碧磴歷𤣥階瑣窗登疑綵瓊鋪洞照神姿滿月疑臨石鏡之峰衆馥揚烟似對香爐之嶽信可下清人境上配天都為勝地之先鳴執名山之右契者也爰有信弟子某乙等夙祛塵網早植慈根悲梵室之未宏悼禪宫之尤褊以為上棟下宇河圖避風雨之災廣榭崇臺時令著髙明之宅是以菩提長者競潔靈境之壇天帝人王爭闢仙宮之塔則知威容下麗羣生鮮悲仰之因材朴重雕黎人有子來之地乃於寺內建浮圖一所某年月日鄉望等兆基𢎞願繼發淨因陵轢中天規模大壯闕髙列砌架軒浮直上千尋周回百步占氛候景神祇叶幽贊之功揆墨端行班倕逞絶羣之思收岱宗之杞梓聚崑山之玉石土兼五色金逾百錬龍蟠萬拱巢屏翳而髙襄鶴矯千楣冠扶搖而獨運重檐藹藹雲將反覆於櫺軒洞宇寥寥風伯栖遑於户牖仙娥去月旅方鏡而忘歸寶婺辭星攀圓璫而未返𤣥甍黮䨴若鵬飛之戾九天丹楹聨鶱如鳳翔之遊千仭每至韶光煦野爽藹晴遙列郊墟於四野開雲氣於千里風恬雨霽煙霧藻天地之容野曠川明風景挾江山之助則有雕簾繡軸排淨域而停輪寶騎銀鞍指珍臺而聳轡於是披岫幌抵巖扃攀翠復而三休步𤣥梁而十憩廊軒外敞淑氣長延陰室中開鮮飈自激俯環瀛而極野積蘇非逺出雲漢而髙踐靈槎可記真福地之殊觀香城之巨麗者乎寺主等沉研二諦振耀三明抵蒼璧於耶山覽𤣥珠於定水挹其流者曲成般若之緣承其風者濬發菩提之願長史河東裴某風神朗潤操履貞勤蕭條江海之心磊砢氷霜之節下岷關而叱馭寄切全都臨蜀野而宣條功深半刺縣令衛𤣥闕河東望族榮髙銅墨任渥絃歌浹辰而風化大行踰月而姦豪屏氣陶潛彭澤自得髙人王吉臨邛仍延重客縣丞胡敬仁三河舊嗣一代良材提鏌鎁而願割局驊騮而待步江湖秩疑作秋至方懷縱壑之圗海浪風髙未接垂天之翼鄉望等竝中和受氣孝友承家方稱江漢之靈地實岷峨之秀或以時良入選擢節鄉鄰或以輿望來儀升名郡縣竝沐康衢之化俱承比屋之封瞻彼岸而同歸登春臺而共樂咸以垣墉遽覆猶傳路寢之歌銀鼎俄窮尚勒靈臺之頌况乎崇基奕奕與天地而爭工層構峩峩配山川而永固豈可使宏規在我空存蔽月之基雄筆同時不借凌雲之氣謹聞命矣乃作銘云二象成紀三才定位開剖太虛導引元氣紛紛化迹飈飈聖致行傑趣約歸同葉疑異法王西眷教迹東遊功超道茂義冠儒流丹青既備棟宇旋周梵宫霞積香閣星浮緬規蓬瀛金臺迥起曠瞻崑閬瑶房峻峙壯矣名都神居攸止大哉英服兹峰誕紀金繩對嶺玉榜分岑松扄委鬱桂幌深沉雲龕菜疑晦煙洞花深重轡霧結復澗泉吟肅肅禪衆遙遙淨境鹿野經文龍宫拂景梵臻金石光來石井峽曉猿清地曛鶴警岷峨舊族江漢英姿爭開法願重峻崇基占雲接廡揆景分墀天人合應幽顯呈期靈思孤出神模獨湧霧積千楹霞長萬栱玉牖星羅璿璫月擁復榭龍蟠重甍鳳聳峩峩峻㞯奕奕崇標雕簾切漢寶綴凌霄深窗閟景洞戶流飈銀釭夕映珠鐸晨搖我辭秦隴來遊巴蜀勝地歸心名都憩足甫逮鄉縣頻移灰燭聿從良友時尋妙躅曠望原陸周流江汜桃李春風芙蓉秋水烟霞四面關山千里他鄉寓目兹焉復幾梓州郪縣靈瑞寺浮圗碑前人若夫神州括地寰中分五嶽之圗巨壑浮天海上擢三山之秀造化之所樞紐靈仙之所窟宅故得昭焯天漢發揮雲氣牛頭山者即廣漢之名峰也圓裔幾乎數里直上逾乎百仭若乃巖泉鐵石之釋風煙卉木之狀傾九圍而得雋環四時而競爽蒼岑隱嶙旁分玉砌之階碧洞逶迤下趜疑金陵之苑實羣聖之所託也隋開皇中王秀作牧益州來窺勝地首旌嘉號闕疏淨域因危列户就嶺磴之成規跨險分榮借岡巒之迥勢工窮雕鏤妙出丹青飛棟神行迥甍靈一作虛構又於山頂别立浮圖隋開皇告運重明首出軒疏雕疑昧基砌煙蕪奄興宣榭之災施及柏梁之燼鄉望等馳心妙律夙契禪居悲梵宇之摧梁痛珍臺之絶構思於法願重緝竒功黨集且千家為巨萬以為玉樓星峙稽閬苑之全模金闕霞飛得瀛州之故事指香城而聳闕臨火宅而危魂參妙範于神明騁良工於宇宙飛亷按轡定樞臬於風衝羲和頓䇿揆鈎繩於日路雕簷畫栱龍回紫漢之間復霤重欒鳳舉丹青之外瓊扉暮敞挂明月於金鋪繡桷晨開落繁星於玉砌每至兩江春返四野晴初山川霽而風景凉林甸清而雲霧絶沙汀送暖落花與新燕爭飛城邑迎寒凉葉共祁疑作初鴻競起則有都人襲賞憑紫檻而延襟野客娛情俯丹櫺而極睇窮百年之後樂寫千里之長懷信可以澡雪神襟清踈視聽澄機意於紛擾置懷抱於冥寂者矣且勃旅逰岷徼漂舉涪鄉年晷一窮時闕已變王陽西上方驚斂轡之心王粲南征實動登樓之思我之懷矣乃作頌曰大塊甄質名山作紀發地龍盤干霄鳳峙風雪萬邑岡巒千里絶域天成珍臺地起揆剎𤣥嶺圖基丹嶠層棟崢嶸重檐䆗窱有隋紊厯重明改照事與時遷迹從原燎義均除舊事切為新如或繼者代有其人聲飛隴蜀望動州鄰爭開淨施競植靈因控險裁標循危列構巖烟接廡峰雲對霤鐸運星衢璫懸月竇紫軒霧合丹梁雲透暮春疏節新秋戒序煦滿暄郊氣銷寒渚樹濃鶯亂川長鴈舉流涕寫懷魂馳意與偉哉靈宇壯矣全模窮髙極麗逺覽長圗賞因時合筆為神驅有情君子誰為捨乎梓州𤣥武縣福㑹寺碑前人若夫閲龍圖而括運撫麟筆以傷時天地閉而賢人隱周孔喪而微言絶豈非太階無象三辰鮮逌叙之因滄海為陵百川有橫流之勢况乎法身長往顧糟粕以空存此迹繁流仰舟航而遂逺雖復功催八正猶迷鶴樹之談道亞三明未覩龍宫之籍則有妙音難遇瞻雪嶺而投軀真諦希聲仰雲山而破骨優填企景新雕白玉之龕般若尋風而疑化黃金之像三千寶座迥出天宫八萬珍臺遙臨淨域非惠圗之冥感孰能臻於此乎福㑹寺者隋開皇中之所建也爾其峰巒地列東分井絡之光樓雉雲橫西覩禺同之奧北彌豐邑里閈千甍南控平江波湖萬里擁亭臯之絶勢得林野之殊形肇開修竹之園式揆旃檀之剎法川髙闢慈宫峻敞文當寶綴環日月於重廊翠栱丹楹起虹霓於復殿真容俯映法衆爰衣梵筵交燭禪房互啓山神獻果還棲交露之臺天女持香即繞飛花之閣輪輝夜滿抽紫焰於金山毫相晨臨發珠華於玉地爰有縣令栁邊河東令族大業之年來光上邑髙人捧檄功為銅墨之先令宰鳴琴課穆絃歌之最眷香城而惻念披道肆而矜魂示懷延奬司疑作思𢎞末教乃於寺內起重閣一所乘煙置臬揆日端繩層榭三休雕簷四注奔星掛廡混珠網而同歸明月窺軒雜璿璫而共貫仍抽麗筆俯刋貞琰詞源迅委振法海之波瀾義宇宏深接禪宮之閫奧昔者陶潜彭澤罔聞仁祠之風潘嶽河陽未入菩提之域兼其美者著在我栁君乎俄而帝隋方否三官失龍鳯之圖皇業未昌九野被豺狼之毒雖復餐砂茹石窺劔道而廽心蜂聚梟勝疑指銅梁而革面自非法雲西眷潜銷火宅之氣慧日東來迥廓昏衢之景則安能冥資福地顯沮魔軍波清於振壑之隅燎息於炎崑之曲洎乎大鈞無事神器有歸清玉户而帝寰中轉金輪而王天下𤣥場佛境與天下而惟新鶯樹雞林共風雲而改旦功既成矣時既貞矣紫宸有裕蒼氓胥恱都人狎至瞻鴈塔而歡心野老相趨尋鹿園而頓顙或至誠冥發爭知不盡之虛或道恩旁流竟委忘緣之施乃於寺內造菩提塑像一座實彭氏絶羣之跡洞參瑶銑體備丹青得延疑作埏範之竒模盡陶甄之能事功分實相變入冥機丹果長春青蓮不染靈儀若動似臨王舍城中神足疑行即坐菩提樹下銀牀地湧寶帳猶懸珍木天成金華不落總章元年又奉為皇帝更造八菩薩像成於淨境别峻崇堂而力寄於羣緣功難獨舉遂令衆情馳騖空懷經始之圖靈座端嚴未得安居之地時有𢎞演上人自丹烏下日昌帝籙於明堂青鶴乘霄降仙苗於太室軒冕將風雲交映鐘鼎與山河共逺法師宿持真諦幼挺殊姿拔五翳於長驅登四禪於迥觀以為德因時建澄什繼踵於西都道冀人𢎞林逺隨肩於南國痛迷生之詭矯悲正覺之後疑作陵夷思欲樹真氣於未萌著崇因於已往遍遊淨境歷騁疑遐方至總章二年憩於兹剎身持寶印口出神珠心動巴南化行蜀右法羅潜舉馴鳥性於慈林慧鏡旁開息猿心於定水亦有情鈎五縛遙騰解脫之川想瘞六塵迥拔沈迷之域名臣長者締玉珮於銀庭苦女靈姬落金環於寶地貪機霧滌法施泉流林衡掄杞梓之材班匠獻鈎繩之巧千欒電糾萬桷霞張飛陸緣甍曽構架景瓊釭杳照乘紺壁而宵分珠箔重華掩青疏而曉亂紅葩植井彩綴河宫丹桂承梁香交列肆天倡梵樂肅然忉利之天藻蓋雕璫煥若摩伽之殿豈精力之𤣥感而神化之曲成乎直嵗寺主等州閭盛族鶖鷺榮因升惠圃而功成踐魔廷而力戰排四門而獨往共極邦緣攀十地而遐征同趨覺路縣令虞洽旌旗百代劍履三朝匡帝座而南征擁台庭而北面星象垂祉川嶽載靈豫章七嵗麒麟千里雄情負俗鬱王佐之宏圗英識邁時得公門之逺氣既而拂衣華族入天邑而觀光列板仙臺出靈關而作宰泉魚狎夜多單父之深思隴翟遊春嗣中牟之善政有條不紊施暖政於繁繩斷訟有神下髙鋒於錯節因以激揚大化潛滋比户之封光啓令圖預積攀輪之慕縣丞裴休家接朱欄譽流丹闕軒裳照緒忠孝榮門鳥鳴有伐木之歌龍文非制蓬之具髙才列務盛德分司翰墨不足留神琴樽申其徇性十旬休沐奄有泉林千里邀迎乃疲風月青驪躞蹀終噴玉而懸雲素鶴徘徊具銜珠而犯露闕以沈研有地題橋八解之津誘勸無方叱馭三乘之路故能使幽明仰德法俗依仁攀海祇而如歸挹衢樽而不疑瞰鄉望等龜靈髙族驥子名家關錦室於中堂分綺疏於甲第或望雄都鄙代列歌鐘業預雲雷門藏璽詔文場促席有江漢之英靈武觀連衡得岷峨之闕氣竝能馳心彼岸臨欲海而褰裳投足化城下悲思而反袂下官薄遊江左旅寄城隅懷道術於百齡接風期於四海依然梵宇欣象教亡言而伯喈雄管叙真宗而罔愧敢巡此義乃作頌云金堤迥邑玉峽長瀾城關紛糾江山聳盤雲屯勝邑霧啓禪壇右縈層雉左控崇巒竹園精舍檀山香閣萬栱騰虬千楣跂鶴晚闕踈翠朝霞泛艧鼓奏泉流鐘鳴霜落時經失道代歷交呈神宫不撓法衆無驚金輪邃曉玉鏡施明功照佛剎化被王城帝圖冥運真儀濬發貝齒含星流毫推月鳥離山面龍還海闕寶樹刑疑留天宫匠設爰有真人式宣慈土發迹江甸馳聲蜀宇望逺連規攀澄襲矩力窮興道功周廊廡羣緣肸蠁衆福氤氲叢楹列電髙棟銜雲銀龕曙撫玉座霄分瓊璣有爛藻繪多文鬱彼巖邑猗歟上宰松桂連華駕鸞集綵禪津有裕至公無待火宅可辭舟航斯在我之飄寓邈矣來遊山川俯仰道義淹留承風郭外撰綴江幽𤣥機勝筆天地相周梓州通泉縣普闕寺碑前人若夫𤣥機密運披睿列於三精素鍵潛融肇神功於萬彚則有靈期肸蠁龜龍負河洛之圗帝緒氤氲賢哲舉乾坤之策雖功懸日月終值軌於寰中業靜雲雷未逃規於象外爾其釋雉林之寶偈詮鷲嶺之貞圖抽紫玉於禪林朗𤣥珠於智水不生不滅光臨妙物之津無去無來濬發乘時之氤伏三明而獨運施洽平分據二諦而同歸功超邃古故能使三千法界向風知袵席之師百億大王聞道失巖廊之貴非釋迦之神化其孰能與於此乎既而正法將隱徵疑作微言不嗣應身既沒遺儀間起恆星夜掩西天銜風霧之悲夢日宵成東漢肅壇場之禮由是庶園曽敞像教旁流宣妙奬於希夷範靈蹤於顯晦瑶龕寶座光華震旦之墟鳳剎霓堂裳藻閻浮之域其寺蓋梁大同年中所建地分彭蜀嶺對岷峨憑廣漢之遺墟藉犍為之舊壤西馳峭崿山連白雉之郊東赴長川江走黃牛之峽崇墉却峙之勢庭衢四㑹勝里九曲之分閭閻萬積危冠祛服參差軒蓋之前露渚風畦隱軫亭一作神皇之望是惟先鏡實啓香城煥若神明恍疑化出紺壇烟屬疏絶閣而三休紫殿雲深徹回廊而四注重欒復棟霧緝霞張繡桷雕楣鸞伸鶴跂珍臺控景羲和獲練轡之因綺榭裁氛屛翳得停鑣之所連甍積翠交玉鎖於星衢洞户流丹綴金鋪於月竇垂珠網露傍傾漢浦之琛列鐸吟飈上合鈞天之樂固以輪奐之美冠真宰以先鳴雕範之竒告靈基而得雋乃造彌勒下生像一座相好端足華姿朗備貞觀末年靈暉繼發房範匝曜疑連不夜之城户牖皆明似出重昏之境自非理參幽贊道叶冥機宣佛鏡於無方演慈燈於已絶豈能寫丹青於實相妙色長存圗銑鋈於真容神光不昧若乃時暄福地低落照於晴暉候肅禪房泛初華於霽景千千寶樹若在雙林一一香城仍分八味山暉傃晚跂葉嶼而相鳴野燕迎晨拂花簾而自樂松楹委蔓曲成蘿薜之衣砌石生蓮直起芙蓉之座則有施身童子戾止巖扃忍辱仙人來儀澗户都人野彥希梵席而投裾趙美燕餘望齊庭而繼履莫不青鳬委實俱欣不捨之檀紫貝兼明共化無緣之力故能使雕形畫塔象設年滋綵帙瑶箱龍編月久豈西州之道備南國之風成者乎爰有寺主等覃機色外錬迹塵間浴甘露於身田集祥風於性宇栖情不二已超初地之權授手大千猶擁彌天之具縣令等或公侯百代𤣥貂列駟之門或文史三冬吐鳯回鸞之客銅章墨綬任切臨人鐵印黃簮功宣陸漸局一作扃牛烹而待價肆蠖屈以求伸揮鋒九折之隅作鏡雙流之外録事栁元等丹軒紫紱家傳方面之勳驥子魚文地列膏腴之右昔承隋運屢委天書爰自皇初顓流帝札等賨渝之奉漢類微濮之匡周咸申白馬之盟竝受飛龍之托故能遺風罔墜代濟其美望重西南功宣法俗咸以為絃歌小政猶篆德而垂芳鐘鼎微榮尚銘勳而作鑒况乎神威自在方傳宰匠之功豈可棟宇常存不勒山河之贊爰託幽鄙奉揚徽猷敢宣此義而為頌曰天地定位君臣作極道在巖廊功霑寰域尚清皇盼猶歌帝力况我能仁惟神不測誕生迦室利見王城機覃有應業㑹無生長驅定境振旅魔營恩兼動植勢絶隨迎燕山傾仭鶴林埋境慧日西沈慈波東騁競窺靈相爭參佛影月殿分城雲龕動嶺長江舊域廣漢遺區川分潼峽塞接岷渝閭閻四㑹亭障威紆爰開寶地實控名都霞牆百雉雲甍四注紫闕尋煙頳樓結霧波流虹起雷奔蠖步網罩星鶉璫栖月兔靈機藻繂禪室安閒雕金範玉舉翠浮丹神功不夜虛室長寒光超有色貺出無端清露花徑飛泉葉户澗緑苔秋山蒼樹古茫茫庶類巍巍淨土鶖鷺同歸華夷共聚第一義諦寥廓法門迹離生滅思舉乾坤情迷則復道在為尊唯名與器萬古長存彭州九隴縣龍懷寺碑前人粵若真元混沌抱一氣於天門象化童䝉構三靈於地户由是金機逆順山河假成器之因玉燭浮沉風火兆流形之蘖懸大明於日月適至泉宫設巨浸於雲雷終迷燬宅太極所以散而為兩洪飈所以吹而為萬雖復卑髙異列俱沈方內之遊坌集橫流共失寰中之契豈夫涅盤深視不背色以求真般一作波若長驅每乘空而得靜則知一名同出陰陽為破道之墟萬象皆空天地即降魔之境莫見其俯仰不知其去就至自於大虛復歸於無物其有建言立德開業成務握大柄而推造化執洪爐而詰元始四門幽闢顧非相而遲回三駕晨嚴臨有為而出頓豈不知羇孤之路終嬰旅泊之虞舟楫中流未釋風濤之苦將以宅心者寂虛室所以合符應物者神明鏡由其不掩故能商𣙜宇宙指麾權實演羣生而非其力存庶品而非其有千欒閉景似居蓬艾之間雙闕臨空若在江湖之上其釋迦之沖用乎龍懷山者井絡之所交㑹岷隅之所控帶攢峯北走吐香嶂於𤣥霄巨壑南馳噴洪濤於赤岸香城寶地左右林泉碧岫丹岑往來烟露時有法㑹禪師者俗姓褚氏吳郡錢唐人也金章錫美河陰傳九命之尊玉鉉乘榮江左受三台之貴地靈人傑自朝野而重光學府文宗冠南都而獨秀法師紫星降彩紅雲授氣應積善於髙門契冥緣於纍世果浮觴引潛圖彼岸之功聚礫延砂即揆為山之業靈樞密運闢仁路而長鳴慧劒髙揮斬邪關而洞照以為冥機體化毫髮莫滯其真執數逐微乾坤不容其算於是四禪幽觀破銅堞而出無明三昧雄圖排鐵圍而泯非相法雲自在吐納龍宫賢聖不仁奔馳象域將使三千塔廟知真實之𤣥津萬億幡幢入虛空之祕藏安心樂土遁影靈關以開皇元年憩嶺靈墟福地已被神功玉榜金繩未先朝命蜀王秀以文昭建國帝子專征仗巴服之尊名裂邛荒之寶命彤騑僣帝蹕萬騎於銅梁皂蓋圖王警千乘於玉宇鏡山南望志狹彭渝錦水西浮恥朝江漢開實沈之壁壘嘯京叔之風塵擁龜堞而託殊方憑爵堂而傲天子威權所制勝兵數十州雄視所臨經塗五千里三英賦雪瞻秋月於梁臺八叟吹風傳朝雲於楚館思𢎞正法廣召名僧振錫雲趨乘杯霧合禪師括囊泉石韜跡煙霞攀紫桂而同塵守青蓮而向晦衝飈蕩嶽寧移忍地之靈烈火焚山不撓堅林之色王心有悟時加優禮順風拜道封山謝失發進財於廣內揆仙室於重幽因嶂為壁憑崖列户以開皇五年始賜額為龍懷寺地鄰綿左遂均綿上之恩山似龍盤即建龍懷之剎爾其崇巒經復復澗縈回髙嶽泄雲長林翳日增瓊垣於下麓揆瑶構於中巖香闕神行珍臺妙立玉虯銜靄絶游氣而負蒼天金鳳連甍排烈風而瞰𤣥圃延緑房於纍巘上拂霞莊蔓丹闕於重磎下披泉户陽開陰闔變霜露於旋回蠖動螟飛起雷霆於指顧玉堂朝亘影襲長虹珠殿宵浮光含列宿禪師歿後爰有孝恭法師智開法師𢎞嚮法師寶積闍黎四上人者竝禪師之上足而法門之領袖也五門衢路控引情宫八解源流朝宗性海其深為寶投白玉於嶄巖無礙居貞得𤣥珠於罔象住持真界栖息妙塗俱探寂滅之源各證菩提之域雖業定人境照已極於無方而道寄生成功遂覃於有相演中乘之奧義增上棟之宏規萬栱不騫千門有闊疑俄而帝隋大法皇家小往天地閉而賢人隱雲雷屯而巨寶衰毒龍橫霧四天沉暗逆之悲醉象驅風三界溺崩離之酷上人慧機幽晤定識潛融知佛日之恆明審王風之尚靜芝歌商嶽揆雞嶺而同歸茅籍磻溪與猴江而共致遁俗無悶因時待闕洎丹陵啓秩赤縣居尊迦維授手波旬革面十千天子先朝帝釋之宫八萬仙人始向毗邪之國一音演而荒景服三聖澄而禮樂備由是巴方舊彥蜀城遺老仰慈門而知户牖叩福田而喜耕鑿雕鞍繡轄瞻燕崿而馳魂黼帶綖裾指鸚林而騖欵寶瓶宵注潤浹堯旬玉柄晨麾風調舜厯或以為假沉其性迷生安視聽之功動亂其心窮人失肌膚之戀江連巫峽始絆心猿山對禺同終維意馬貞觀年中積闍黎等乃昭遺址發揮精舍容成校厯列日用於天經𨽻首陳章算神功於地籙回廊䆗窱自吐風飈列榭崢嶸坐含雲雨圖竭宫之妙質儼盧舍之真容寶珠周映銀龕備色逸多垂足似臨兜率之天師利分身若赴維摩之境靈仙可接藻㑹無施真應南微雕鐫有寄若乃巡積􅀈歷森沉天花照而髙月落地籟驚而幽泉思紫蘭香疑徑香侵柏葉之爐緑草紋茵影入芙蓉之座真童鳳䇿即踐金沙仙女鸞衣還窺石鏡巖莊轉梵杳冥松桂之墟澗戶栖槔寂寞藤蘿之院法鼓奏而寒山曠溪鐘鳴而曉壑靜頳苔翠蘚具不盡之靈衣石乳瓊漿入無生之妙饌肅肅焉遙遙焉信調御之珠庭而列真之甲第也爰有上座𤣥鑒法師等竝六塵無我四諦非他奉乾越之微言守楞伽之奧府法雷潛吼鼓動風煙慧日揚明照臨丘壑青溪坐定得心宅之恆靈丹洞行忘覺身城之每化須彌不動迥鎮閻浮闍崌安居下觀忉利開四生之廣路叙六趣之彛倫足以遵揚真績恭宣來命者矣縣令栁公諱明獻字太初河東人也太𤣥降氣中黃授彩襲周宣之榮基吐河汾之靈液四科髙弟振風馭於三冬萬室崇班局雲驂於百里既而政成黎頌道洽氓謳假無上之幽筌毗不言之景化絃歌在韻將寶偈而齊歸銅墨成章與梵天而共貫瓊波闕淡沃蕩雲霓珠灌蕭條蔽虧煙雨貞機罕應良談放好事之逰朗調多竒髙賞盡名山之曲下走東皋事失南州塗窮歎孔席之栖遑笑楊岐之浩蕩薄遊兹邑喜見髙人三接而定琴樽七縱而擒風月林宗有道相期清濁之間平叔能言見許天人之際從容宴語契闊胸懷欣性情之同冥感形骸之共遣雖禪都妙域已挂於忘言而義孰文場竊申於知己敢作頌曰妙象無倪神功有涉湛淡名器崩騰事業慧路翹車禪河艤楫控引羣品輪回庶劫縱橫宇宙反覆山川言因境立道寄形詮爰稽福地式揆珍田丹溪漏日碧洞栖煙闍都玉檻須彌石室榛灌溟濛風雲蕭瑟睟容乃眷禪徒有謐葉磴三休花嚴疑作巖四密崇巒架殿疊嶂營樓千楣鳳起萬栱鸞浮星開紺髮月湛青眸神宫不夜邃宇長秋户臨重崿窗分絶嶺半迥香浮中天梵警鶴林聖迹龍泉佛影鳥思山空猿悲峽靜森森巨柏落落長松月出東岫霞生北峯山人自狎野老相逢白雲屢斷青溪幾重彭澤之令臨邛之客比得疑山藪重規泉石法宇成言慈門致役糠粃吏隱薜蘿心跡五疑作吾生擾擾與道皇皇殷勤頌詠惆悵津梁投功翠碣助化𤣥場百年之後苔蘚蒼蒼全蜀藝文志卷四十六
