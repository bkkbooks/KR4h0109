body:
  text: 全蜀藝文志巻五十一明周復俊編雜著三世家傳黄楚望先生世家元趙汸先生諱澤字楚望其先長安人唐末有官於蜀者知資州内江縣曰舒藝卒葬資州次子師明留居後遂為資州人先生生有異質日誦数千言年十二三即盡通當代進士經義論䇿之學内附國朝年十闕矣慨然以明經學古篤志力行自勵好為苦思屢以成疾疾止則復苦思如故年二十餘始旁通古今史志别集詩文皆不習而能詩尤超邁清美乆之於周程張朱之書有得作顔淵仰高鑚堅論以自闕是時行省鉅公猶有尊賢敬學者屢以書院山長之祿超先生敎授江之景星洪之東湖考滿即歸閉門授徒以為養悉取六經百氏傳註疑義千餘條離析辯難以致其思不復言仕矣始先生嘗夢見夫子以為適然既而屢夢見之最後乃夢夫子親授所校六經字畫如新其家無一畝之殖而决意歸休以六經絶學為己任蓋深有所感發也時大德甲辰先生年四十五矣自是以來十餘年間屢闕經隱賾之義凡數十處而失傳之㫖以漸可通乃作思古吟十章極言聖人徳容之盛上達於文王周公以致其寤寐不忘之意先生卒於至正六年丙戌某月某日得年八十有七以郡人王儀甫所歸棺歛九江學者蓋少先生又深自韜晦不求聞知唯待人接物則無貴賤長幼一致其誠故死之日逺近聞者莫不哀之先生於經學以積思自悟為主以自然的當不可移易為則故其悟也或得諸幽閒寂寞之餘或得諸顚沛流離之頃或得諸疾病無聊之日或得諸道途風雨之中及其乆也則豁然無不貫通自天地定位人物未生以前等而下之凡邃古之初萬化之原載籍所不能具者皆昭若發䝉如示諸掌然後由伏羲神農五帝三王以及春秋之末其人倫之端禮樂之本皇道帝徳神化宜民之妙井田闕之闕封建自然之勢鬼神祭祀之始神物前民之用起數立象之機聲敎文治之原制作因革之漸忠質文異尚之體世變禮失之由以力假仁之習皆若身在其間而目擊其事者於是易春秋傳註之失詩書未決之疑周禮非聖人書之謗凡歴代聚訟不決數十年苦思而未通者皆氷解釋怡然各就條理蓋由事精積乆而後得之闕為天開其愚神啟其祕也其於易以明象為先以因孔子之言上求文王周公之意為主而其機括則盡在十翼作十翼舉要以為易起於象數設卦因卦立象因象起意因意生辭故孔子曰易者象也立象以盡意居則觀其象而玩其辭聖人言易之為教如此易不可廢象明矣由象學失傳漢儒區區掇拾凡陋不足以得聖人之意而王輔嗣忘象之説興至邢和叔則遂欲忘卦棄畫雖以近代鉅儒繼作理學大明而莫能奪也作忘象辯有一卦之象有一爻之象或近取諸身或逺取諸物或以六爻相推或以陰陽消息而為象者學者猶可求也然有象外之象則非思慮意識所能及矣而况於立例以求之乎李鼎祚綴輯於王氏棄擲之餘朱子發後出而加密丁易東繼之而愈詳聖人立象之妙終不可見作象畧象學既明則因象以得意因意以得辭陰陽消長有一定之機上下貴賤有一定之分善惡吉凶有一定之則位之當者孔子無曰獨言其非卦與爻之小者文王周公固不謂之大然後知三聖人之易一而已矣若舍象而求則人自為易不期於異而自異作辯同論嘗曰易有八卦有六十四卦有三百八十四爻有大象有小象有大傳繫辭有説卦有序卦有雜卦有河圖洛書蓍䇿之數學者當随處用工各詣其極至於一以貫之而後全易見矣其於春秋以事實為先以通書法為主其大要則在考覈三傳以來向上之一而其脉絡則盡在左傳作三傳義例考以為春秋有魯史書法有聖人書而近代闕周闕説是史法與聖法俱失也作元年春王正月辯闕義有虛辭不合史以論事不離傳以求經闕貶泥聖人酌時宜以取中此實闕貴王賤霸尊君抑臣内夏外夷皆古今通義然人自為學家自為闕春秋迄無定論故一切斷以虚辭作筆削本㫖又作諸侯取女通考魯隱公不書即位義殷周諸侯禘祫考周廟太廟單祭合食説丘作甲辯凡如是者十餘通以明古今禮俗不同見虛辭說經之無益嘗曰説春秋須先識聖人氣象識得聖人氣象則一切刻削煩碎之語自然退聽矣其但以為實錄而已者則春秋乃一直史可脩亦未為知聖人也其説易有常變則有經有權易雖萬變而必復於常春秋雖用權而不逺於經各以二義貫一經之㫖嘗曰易象與春秋書法廢失之由大畧相似茍通其一則可觸機而悟矣蓋古者占筮之書即卦爻取物類象懸虚其義以斷吉凶皆自然之理乃上古聖神之所為也文王周公作易時取一二立辭以明敎自九簭之法亡凡簭人所掌者皆不可復見而象義隱微遂為歴世不通之學矣魯史記事之法實有周公遺制與他國不同觀韓宣子之言可見聖人因魯史脩春秋筆則筆削則削游夏不能贊一辭則必有與史法大異者然曰其文則史是經固出於史也今魯史舊文亦不可復見故子朱子以為不知孰為聖人所筆孰為聖人所削而春秋書法亦為􅔦世不通之義矣先生所謂廢失之由有相似者蓋如此又懼夫學者得於創聞不復致思故所著書目雖多皆引而不發乃作易學濫觴春秋指要經㫖舉畧稽古管見示人以求端用力之方而易春秋全解則終身未嘗脱藁示人也其辯釋諸經要㫖則有六經補注詆排百家異議則取杜牧之不當言而言之意作翼經罪言其論周禮以為六官所掌皆循唐虞夏商已行之事雖有因革損益或加詳闕而大體不能相逺非周公創為之制也古今風俗事體不同學者闕變而輙指其一二古逺可疑者以為非聖人之書此不難闕圖之制與孟子不合則所當論蓋孟子所言因殷之制周官乃周家之制也計武王之興殷諸侯尚千有餘國既無功益地亦無罪削地削邑此當仍其舊封百里之下為三等如孟子之説乃若周公太公有大勲勞及其餘功臣當封爵與夫並建宗親以為藩屏豈可限以百里之法哉自當用周制耳諸侯惡其害己而去其籍是書當世學者鮮得見之則周家一代之制雖孟子亦有不能詳也其於官屬多寡之由職掌交互之故錯亂之説發義尤精其祭祀之法則兼戴記而考之作二禮祭祀述畧禮經復古正言其辨王肅混郊丘廢五天帝併崑崙神州為一祭之說曰祭法虞夏殷周皆以禘郊祖宗為四重祭周人禘嚳而郊稷祖文王而宗武王禘祭天地以嚳配即圜丘方澤是也郊祀上帝以后稷配建寅之月南郊祀感生帝以祈穀也四時祭五天帝於四郊以迎氣也祖禘嚳以后稷配尊始祖之所自出也宗祀文王於明堂以配上帝總配五天帝也其後則祖文王於明堂以配五帝宗武王於明堂以配五神凡此皆鄭氏義也故周禮大司樂注以圜丘方澤宗廟為三禘蓋天神地示并始祖之所自出為三大祭皆五年之禘也郊次圜丘社次方澤宗次祖皆常歳所舉之祭也東遷土蹙財匱大禮遂廢所脩惟郊社二祭故圜丘方澤二禘傳記亦罕言之非淺聞所及矣周禮有祀天旅上帝祀地旅四望之文天地主于一故稱祀上帝四望非一神故稱旅肅欲以圜丘為郊可乎司服王祀昊天上帝服大裘而冕祀五帝亦如之既曰亦如之則五帝之祀與昊天上帝非一祭矣肅欲混之可乎孝經稱嚴父配天又稱郊祀后稷以配天宗祀文王於明堂以配上帝易豫卦曰先王以作樂崇徳殷薦之上帝以配祖考上帝亦天神也肅欲廢五天帝而以五人帝當之可乎崑崙者地之頂神州者地之中皆天地之所交也地示生崑崙神州非是設此二祭乃求神於二處大地神靈莫測不知神之在彼乎在此乎故求之於彼亦求之於此也康成以方澤主崑崙北郊主神州北郊不見於經誤分為二王氏由此并崑崙神州為一祭而遂謂北郊為方澤可乎若鄭氏知樂九變之祭為禘而不言及嚳又以為禘小於祫此則其失也故斷之曰鄭氏深而未完王肅明而實淺晉武帝肅外孫也故用其説并方圜二丘而祀一郊歴代無所因襲而周禮天神地示人鬼極盛之祭遂為古今不決之疑矣其變感生帝之説曰姜嫄履帝武敏歆而生后稷周人特闕立廟而祭謂之閟宮君子以為聖人之生異於常人無異義闕况闕生民之初氣化之始五天之精感而為帝王之祖亦何疑乎闕生之祀上世流傳既乆非緯書創為之説也且河圖洛書蓍䇿闕皆緯文也其可盡廢乎其辨胡仁仲以社為祭地曰二社以闕穀之神而配以勾龍稷非祭地也禮天子諸侯羣臣百姓大闕民皆立社故有王社侯社大社國社置社之名其名義高下不同如此而謂之大示之祭可乎殷革夏周革殷皆屋其社是辱之也旱乾水溢則變置社稷是責之也王者父事天母事地其可責可辱乎周禮王祭社稷五祀則希冕以社稷下同五祀而用第五等之服不得與先王先公四望山川比則社非祭地明矣傳曰戴皇天履后土是后土即地也周禮大祝大封先告后土大師旅大會同宜于社又建國先告后土則后士非社矣舜典類于上帝禋于六宗望于山川六宗者上下四方之神即五天帝及地也故其祀在上帝之次山川之前周禮四望與五帝同兆于郊又與祀地同玉又與山川同祭服則四望者祀地之四方也又有分樂所祭五土之示祭地之禮不止于方澤矣而欲以社當之可乎周禮以圜丘對方澤以天神對地示以蒼璧禮天對黃琮禮地以祀天旅上帝對祀地旅四望書及禮記乃多以郊對社蓋郊祀上帝社祭水土之神其禮專圜丘方澤徧祭天神地示其意廣逺分為四祀明矣天地之道高深𤣥逺人神大示不可煩凟故嵗事祈之於郊而水土之變則責闕於社此古人立祀深意也胡氏家學不信周禮故率意立說如此大抵先生之闕以為聖人制禮逺近親疎高下貴賤皆有自然之序必通其本原而後禮意可得蓋圜丘所祭者全體圓轉之天統南北極黃赤道日月星辰所麗者而言故主北辰而曰天神皆降是總祀天神也上帝者高高在上之天以其在上而為主宰故曰上帝分主五方故曰五帝合上下四方而言則曰六宗皆天神之分祀者方澤所祭者全體承天之地總山陵川澤極天所覆者而言故主崑崙而曰地示皆出是總祀地示也地有四方望其方而祀曰四望五嶽四凟之祀曰山川川澤山林丘陵墳衍原隰之祀曰五土水土之祀曰社皆地示之分祀者也所謂自然之序蓋如此其辯趙伯循王者禘其始祖之所自出之帝於始祖之廟以始祖配之而不及羣廟之主曰大傳王者禘其始祖之所自出以其祖配之諸侯及其太祖大夫士有善省於其君干袷及其高祖此以禘與祫對言則禘祫皆合祭通上下文見之也蓋諸侯之祫猶天子之禘諸侯及其太祖大夫士及其髙祖是有廟無廟之主皆在而又上及其太祖髙祖故謂之祫天子則於七廟及祧廟之上更及所自出之帝故謂之禘也若曰禘其祖之所自出而反不及有廟無廟之主寂寥簡短非人情矣故程子曰天子曰禘諸侯曰祫其禮皆合祭也爾雅禘大祭也非大合昭穆何以謂之大祭乎字書訓釋曰禘者諦也審諦昭穆也若非合祭何以有昭穆乎蓋后稷有廟郊既配帝嚳雖配天而無廟不可闕人鬼之享故五年一禘則后稷率有廟無廟之主以共享於嚳所以使子孫皆得見其祖又以世次乆逺見始祖之功徳為尤盛也况后稷之廟毁闕十闕主皆藏焉豈可當享嚳之時而屏置之乎蓋禘祫所以相闕者由天子諸侯之制不明先儒或推天子之禮以説諸侯或推諸侯之禮以説天子不知諸侯之禮有祫無禘天子之禮禘必兼祫雖其意不主合食而率子孫以共尊一帝自然當合食矣禮曰天子犆礿祫禘祫嘗祫烝則是天子祫祭隨時皆用也其辯成王賜魯天子禮樂曰周公相成王制禮作樂為天子諸侯不易之大法身沒而王與伯禽躬為非禮以享周公成王賢王魯公賢君必不至是以魯頌白牡騂剛推之則記禮者之過也禘者殷諸侯之盛祭周公定為不王不禘之法故以禴代之成王以周公有大勲勞於王室故命魯以殷諸侯之盛禮祀周公以示不臣周公之意故牲用白牡白牡者殷牲也騂剛者魯公之牲也又可見魯公以下皆合食於太廟而禮秩初未嘗敢同於周公又以春秋推之則亦非常歳之祀成王斟酌禮意蓋如此而非有祭文王為所自出之禮如或者之云也其禘於羣公之廟則後世始僭之然晉亦有禘蓋文公有勲勞于王室欲效魯禘祭而請于天子故得用之也若夫東周諸侯為所自出之王立廟稱周廟如魯與鄭是也然止謂之周廟不敢以祖廟稱之諸侯不敢祖天子也然則子孫亦不敢與享於廟單祭所自出而已祭用生者之祿則亦用諸侯之禮而已若魯既得禘於周公之廟則周廟亦應用禘禘必有配則固宜於文王廟以周公配也若據趙氏則魯本無文王廟止於周公廟祭文王臨期立文王主與尸而祭之此於禮意實不相似若以為有文王廟則是於文王廟迎尸以入周公廟以父就子以尊就卑必不然也魯之郊大雩則平王之世惠公請之是矣然郊祀蒼帝而三望雖僭而猶未敢盡同於王室也蓋以魯有天子禮樂為成王賜者本明堂位祭統以為惠公所請者出呂氏春秋魯鄭周廟晉有禘祀見左傳先生以經證經而折衷百氏之説多如此其辯説詩之失以為古者重聲教故採風以觀所被之淺深然今三百篇有出於大師所采者周南召南是也有錄於史官而非大師所采者豳風及周大夫所作是也其餘諸國風多是東遷以後之作率皆諸國史官所自記錄方周之盛美刺不興漢廣江沱諸詩雖足見諸侯之美而風化之原實繫於周其後天子不能統一諸侯善惡皆無與於周故不闕美刺皆謂之變風以其不繫於二南而各自為風也周禮王廵守則大史大師同車又其官屬所掌皆有世繫之説方采詩之時大師掌其事而大史錄其時世及廵守禮廢大師不復采詩而後諸國之詩皆其國史所自記錄以考見風俗盛衰政治得失若左傳於高克之事則曰鄭人為之賦清人莊姜之事則曰衛人為之賦碩人必有所據矣序曰國史明乎得失之迹傷人倫之廢哀刑政之苛吟詠情性以諷其上達於事變而懷其舊俗是説詩者不可不辯采詩之時世也黍離降為國風此時王澤猶未竭也故人民忠愛其君猶能若此其後聽者既玩而言者亦厭遂與之相忘則雖國風亦不可復見至此則書契以來文治之迹始剗絶矣以時考之國風止於澤陂在頃王之世當魯文公之時故曰王者之迹熄而詩亡故説詩者尚論其世也先生經學自得之説為多以其書不大傳故掇其關於體要者著之當是時唯臨川吳文正公辯學正誼盡通諸經最為知先生者常拜集賢之命至揚而還養病九江濓谿書院見先生所著易學濫觴春秋指要心大善之題其巻端曰楚望父之著經也其志可謂善矣易欲明象春秋欲明書法蓋將前無古而後無今又得六經辨釋補註觀之謂學者曰今人無能如黄楚望者孟子曰能言距楊墨者聖人之徒也楚望其人乎亦為序以歸之其略曰楚望貧而力學讀易春秋周官禮記為之辨釋補註𢎞綱要義昭掲其大而不遺其小究竟謹審灼有真見先儒舊説可信者拳拳尊信不敢輕肆臆説以相是非用工深用意厚以予所見明經之士未有能及之者也晚年見此寜不為之大快乎予嘆美之不足因以諗于學者蓋必於諸經沈潛反覆然後有以見其用工之不易用意之不茍云然先生雅自慎重其學未嘗輕與人言以為其人學不足以明聖人之心志不以六經明晦爲己任則雖與之言終日無益也學士李公溉之使還過九江請先生於濂谿書院會寓闕縉紳之士躬定師弟子禮闕山受一經之學又將經紀先生家為子孫計先生謝曰以君之才輟朞歲之功何經不可明然亦不過筆授其義而已若予則於艱苦之餘乃能有見吾非邵子不敢以二十年林下期君也李學士為之歎息而去或謂先生幸經道以明於已而又閟於人如此豈無不傳之懼乎先生曰聖經興廢上關天運子以為區區人力所致乎德化縣令王君子翼請刋補註藏先生家先生猶慎重之非其人不傳也荐經冦亂故宅為墟遺書之存者鮮矣悲夫先生寜使其學不傳於後終不肯自枉以授諸人是故能以數十年之勤盡究諸經於闕塞之餘而不能使聖人之心大明於天下後世葢其道若是也豈非天乎昔者吾夫子賛易删詩定書正禮樂修春秋將以為百王大典遭秦焚書滅學帝王經世之法遂斬然湣絶於斯時蓋自開闢以來宇宙横分一大變也鄭康成當專門固陋之世以一家之學纂釋羣經具著成就孔頴達考覈百家大明鄭義雖於聖人之道無聞而博古窮經斯以勤矣自是四百餘年習為定論至宋清江劉原父始以聰明博洽之資據經考禮欲盡排周秦以來傳註之失宋代經學之盛劉公實張之及子朱子出而羣言有所折衷遂定于一猶吾夫子之志闕子於易簡其辭微其義將使學者皆得自致於經晚歲猶拳拳禮學而弗克論著其成書貴闕疑而又深疑古今文之異體春秋獨得書法廢失之由折衷諸傳各極其當矣而門人學者于二經師說不敢有所發明故君子論古今經註以為自朱子詩集傳之外俱不無遺憾也先生乃欲以近代理明義精之學用漢儒博物考古之功加以精思沒身而止此蓋吳公所謂前無古而後無今者也嗚呼其遂不傳也與汸始拜先生于其門請問治經之要先生念其逺來不以為不可敎告之曰在致思而已然不盡悟傳註之失則亦不知所以為思也請問致思之道先生曰當以一事為例禮女有五不娶其一為䘮父長子註曰無所授命近代説者曰蓋䘮父而無兄者也女之䘮父無兄者多矣何罪而見絶於人如此其非先王之意明矣姑以此思之或二三年或七八年倘得其説則知先儒説經其已通者未必皆當其未通者未嘗不可致思也汸退而思之女之䘮父無兄者誠不當與逆亂刑疾之子同棄于世乆之乃得其説曰此蓋宋桓夫人許穆夫人之類爾故曰無所受命註猶未失也若䘮父而無兄則期功之親皆得為主之矣嘗以質于先生先生曰子能如是求之甚善然六經疑義若此者衆矣當務完養而慎思之母輕發遂授以求春秋之要曰楚殺其大夫得臣此書法也當求之於二百四十三年之内夫人姜氏如齊師此書法也當求之於二百四十三年之外汸思之經歲不得其説先生為易置其語曰夫人姜氏如齊師此書法也當求之於二百四十二年之内楚殺其大夫得臣此書法也當求之於二百四十二年之外汸蓋自是始達春秋筆削之權乃知先生於六經之學以其所自得而教人者蓋如此惟易所謂象外之象則有不可得而盡聞者嗚呼悲夫有遺恨矣謹述先生世家文行大㮣與其經學復古之功如右伏惟立言君子以當世斯文為己任者尚克表章之至正十有二年十有一月朔學生新安趙汸狀史母程氏傳袁觕嗚呼余嘗得三夘錄讀之蜀禍之慘誠不忍言也夫朱禩孫之死而復生也蜀民就死率五十人為一聚以刀悉刺之廼積其尸至莫疑不死復刺之禩孫尸積於下莫刺者偶不及尸血淋灕入禩孫口夜半始蘇匍匐入林薄匿他所後出蜀為樞宻使嘗袒示人未嘗不泣下賀靖權成都錄城中骸骨一百四十萬城外者不計嗚呼推是考之蓋可悲者蜀眉州史氏由唐吏部侍郎儼從僖宗幸蜀因家焉其先墓在青神將二十世宋氏號名族其出蜀也今唯居湖州一房讀其遺事益悲之史母程夫人蘇文忠公之母之族也夫人將携其家下峽江以槖金腰纒之兵暴至伏林莽與隣嫗謀曰輸金果可生吾兒無資不復能出蜀史宗誠無噍類矣縱得生旦夕兵復至亦决死均死死以全史兒誠不恨嫗見身死為吾出腰中金告兒使速走須臾兵果執母謝以實亡金遂遇害翼日嫗語于隣告史氏兒兒甫十三從草野得尸如其言窆以歸且亟圖其象識曰史光母年五十有四嘉熈二年十月二十七日申時死兵難兒遂東南來占籍湖州刻意自奮以右科為淛東兵馬鈐轄鈐轄生子圭文嘉定儒學敎授嘉定生子台孫介喜孫台孫儒術通吏文復有子幾人而史氏繇嘉熈至于今且四傳矣噫蜀繇秦帝入中夏至于宋凡一千五百餘年文物大盛絶不知有兵革一旦掃削殆盡迄今百餘年遺墟敗棘郡縣降廢幾半可哀也已可哀也已贊曰婦人内徳不出門房中歌廢戰國而下俱不幸以著非得已也諱莫甚於死從容反復烈士猶難之况士女乎歐陽公傳斷臂婦人以媿馮道夫人以死傳宗承平世澤於是乎見作史者烏得廢諸平蜀傳江邑世𨽻渝郡元末兵亂羣雄角逞至正十二年全蜀為偽夏主明玉珍所據渝即夏都江邑為偽畿甸邑未幾珍殂子昇嗣歳辛亥偽夏開熙五年實我太祖高皇帝金陵登極之四年也時已削平群雄混一疆宇惟明氏依違弗决正月乙亥太祖乃命中山侯湯和為征西將軍江夏侯周徳興為左副將軍徳慶侯廖永忠為右副將軍暨平章楊璟等率荆湘舟師由瞿塘趨重慶潁川侯兵趨隆州五月丙辰湯和師發夔州攻瞿塘以江水暴漲駐大溪口己未傅友徳兵至漢江阻水未渡造舟以濟己夘至漢州欲以軍中消息達湯和而山川懸隔卒莫能通適水漲乃以木牌數千書克階文歳月投漢江順流而下守者見之為之解體六月壬午友徳攻漢州守將向大亨悉兵出戰敗走進克漢州先是夏人聞王師將至悉衆守三峽及階文失守乃分瞿塘守兵以援漢州及至而城已下矣逆戰敗走兩川大震丙戌太祖以湯和師乆逗遛賜詔責之廖永忠聞命奮起率兵先進會得木牌于江和亦進兵自白鹽山伐木通道以趨夔州守將飛天張整衆逆戰大敗退走而出峽水急又阻于鐵索飛橋舟莫可進永忠乃密遣壯士數百人舁小舟踰山渡關以出其上流夏人不之覺也度其將至乃夜率精鋭分水陸為二軍而攻之遂克其陸寨舁舟者出上下夾擊大破之擒斬無算遂入夔明日湯和兵至乃各分兵約會重慶丙申永忠舟師自夔州乗勝直抵重慶是日次銅鑼峽明昇等大懼欲奔成都其母彭氏泣止之曰事勢如此往亦無益况此城之兵膽破心悸區區城守死傷必多不如早降以免鋒鏑也乃遣使納欵請降永徳以湯和師未至辭不受癸卯湯和兵至乃合駐朝天門昇面縛銜璧與母彭氏及諸臣以降東川底定江邑遂入王朝仍𨽻重慶七月庚申傅友德兵圍成都偽丞相戴壽及知院向大亨等驅象載甲士出戰友徳中流矢益奮鋭進擊大敗其兵㑹得重慶報壽等遂請降友徳接兵入自東門壬戌遣兵徇下州郡未附者八月甲子周德興兵下保寧蜀地悉定乙丑明昇至京師賜爵歸義侯賞賚甚厚九月乙未和等班師還京上所佩印綬并所得蜀金印冠冕儀仗及路府州縣宣慰宣撫之數官吏將士牛馬等類太祖頒賞有差蓋自出師至此凡九閲月爾臣彛曰大哉皇靈其丕顯乎古者明王伐不敬取其鯨鯢而封之以為大戮王師伐蜀拯民水火昭義闕哉古者征西將士多不利光武屢隕元戎宋祖兩川反覆視今中山潁川之師風行電逐無一矢隻輪之衂誠帝王之師以全取勝哉征伐之烈振古所無也薄海内外罔不康乂迄今用休是皆高皇開天列聖撫運之所被也於戯賁隙照者仰大明飲勺流者思滄海矧我蜀人韓娥傳明劉惟徳娥姓韓元四川鹽運司副使韓新澤之孫處士韓成之女也母王氏生娥於元至正乙酉娥甫三歳失怙七歳失恃鞠於叔父韓立遭元季之亂歲丙申盗賊蠭起劫奪貨財擄掠婦女無所憚叔母杜氏度娥不能自保宻謂娥曰我夫婦老矣汝年十二必遭㓂手吾不忍視汝受掠吾製男子衣裳汝可服之冦知汝男或可免叔父又哭曰汝本故官之孫吾鞠汝恤汝願汝有家不幸至此時也命也汝宜自裁娥受叔母敎即易其服總其角旦日往拜叔母曰而今而後或違母訓有死無二豈忍不念吾叔母言甘受冦辱求茍活耶未幾果為㓂擄問韓娥姓名娥曰我韓關保也遂與負戈而徃後遇萬户王起巖見而憐之以與千户羅甲甲蜀之敘南人也撫之如已子與征雲南自雲南復歸敘南娥在師旅中與人和睦或有與之嬉戱即正色曰韓關保不能閒戯恐官長怪責無益也每遇祈寒未嘗怨咨暑雨未嘗裸浴至夜則和衣而卧卧常後起常先人問其故曰恐家務不辦乃爾自是甲有軍旅之事事無大小娥皆勉力為之無斯須惰容甲矜其勤謹間與之酒辭曰關保天性不能飲飲輙病甲益重之娥尤兢兢業業惟恐有失而違叔母訓出入軍中一十二年人皆不能窺測又善以父事甲故甲信而不疑甲嘗謂人曰我之關保幹蠱之子也為之婚娶兾其成立娥不得已從而百計避之婦訴其父母父母責娥夫婦不睦娥猶隱諱不言一日娥從王萬户自敘南之成都計事娥微行至城東度緣橋物色得叔父母已不能識娥矣娥具以實告指額上刀傷痕仰天痛哭叔父亦哀其艱苦將以白金贖之王萬户謂娥叔父曰是子羅甲之闕爲爾之女姪事聞有司召媪視之媪曰室女也萬户乃受白闕叔父以娥歸戍士馬復宗生男一人女二人娥夫婦繼殁而男闕洪武奄有全蜀王萬户入京朝授禮部郎中致仕還蜀以聞于蜀闕召見賜寶鈔五錠褒之士君子多爲詩文褒美永樂七年冬十一月余使蜀方外士韓太和立之子娥之弟也以其詳詣余誦之余喜娥之貞烈且孝作韓娥傳劉生曰韓娥少孤遭時多艱受叔母一言微服處軍中一紀人莫辨其為女譬之執玉馳馬馬驟而玉不墜捧盈升車車搖而盈不溢善於執捧故也亦由洞洞屬屬之心堅似金石故能保其身歸于馬氏娥有三善焉智也貞也孝也詩云既明且哲以保其身娥之謂也清風先生傳前人先生姓楊名學可其先世居蜀之新都闕相傳為關西夫子楊震之後至處士某其裔也有隱徳弗仕惟讀書敎子鄉閭稱為善士先生其子也自丱角好語孟書既長就學從鄉先生某受詩書春秋三經學既通丁元季世海内震動四郊多壘先生知蜀不能居乃遁入雲南之昆明邑昆明士君子聞先生來争設臯比席以延之先生講論六經開陳二帝三王治天下之大經大法嘗謂帝王自有真不可僭竊以取荼毒由是名公貴人聞先生之言皆守其分大夫士服先生之訓咸知其義故多敬事先生而心實忌之先生亦知西南夷不可齊以禮又不可屈已以從夷俗尋歸西蜀遭遇明氏强盛以國子助敎逼之先生辭不就職至以法挾之先生堅以抱疾杜門自守逮乎聖朝混一海宇先生與故官宿儒計偕赴京師訴老疾辭歸蜀蜀之士知先生道學之明執經座下者無虛日先生隨其才而敎之皆有造就由是先生之師道益彰彰于逺近矣未幾蜀邸就封崇儒重道乃召先生為蜀中士子矜式士子多躋顯官盡忠相國王知先生有徳賜田宅於國之大安門外駟馬橋北俾先生有終身之樂闕流水畫橋題柱客清風精舍讀書人一十四字列于先生之門士子從學者皆稱為清風先生闕郡顧祿篆書清風精舍扁于室且為文以記大夫士歌詩褒美永樂七年冬十一月余奉使來蜀道經其門得拜先生函丈前入門則喜松竹滿園芳菲繞蹊有隱者之趣焉升堂則喜詩書盈案琴瑟在前有長者之風焉又愛温如崑山片玉者仲子也秀若桂林一枝者季子也茂似芝蘭玉樹者衆孫也貴如瑚璉圭璧者諸生也先生坐定畧見辭色亹亹乎經史雍雍乎禮讓余益喜而敬曰先生少時奔迸遐方先難也命也暮年遭遇賢王錫養老厚恩後獲也命也於是乎先生之清風逺矣高節遂矣宜夫門弟子以清風先生稱之不誣矣作清風先生傳劉生曰晉徵士陶潛居柴桑里於夏月高卧北牕清風颯至自謂羲皇上人先生居精舍子孫闕師上論道清風徐來焚香靜坐陶然為堯舜之民視潛無愧矣全蜀藝文志巻五十一
