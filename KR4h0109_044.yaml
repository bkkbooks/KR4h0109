body:
  text: 全蜀藝文志卷四十四明周復俊編針銘贊益州牧針漢揚雄巖巖岷山古曰梁州華陽西極黑水南流茫茫洪波鯀堙降陸于時八都厥民不隩禹𨗳江沱岷嶓啓乾逺近底貢磬錯砮丹絲麻條暢有粳有稻自京徂畛民攸溫飽帝有桀紂湎沈頗僻遏絶苗民滅夏殷績爰周受命復古之常幽厲夷業破絶為荒秦作無道三方潰叛義兵征暴遂國於漢拓開疆宇恢梁之野列為十二光羡虞夏牧臣司梁是職是圖經營盛衰敢告士夫著官針僞蜀孟昶朕念赤子旰食宵衣託之令長撫養安綏政在三異道在七絲驅雞為理留犢為規寬猛得所風俗可移無令侵削無使瘡痍下民易虐上天難欺賦輿是切軍國是資朕之爵賞固不踰時爾俸爾祿民膏民脂為民父母罔不仁慈勉爾為戒體朕深思講堂針并序宋韓絳嗚呼天地之道逺乎哉聖人之心異乎哉動而任於理則天道是已純然得其性則聖心是已吾謂通其說者必以三才之原未始出乎一者也人之七情中焉而未發也則粹德內融豈不曰天下之大本歟及其發而皆中節也則和理外著豈不曰天下之逹道歟中者性也寂然而有容則與天道合焉和者情也淡乎其若思則與聖心合焉所以八卦九章推明天人相與之際而著為吉凶休咎之符者非三才一原之致邪自古教化之迹或因或殊然而未始不本諸性情而納之皇極者矣貴賤以之位父子以之親兄弟以之友夫婦以之順此皆不待學而後知直出於性理之常分爾况乎學斯學者宜何如哉惟不獨私乎其身而巳為能宏而大之包乎四海而不外詡乎羣侣而不遺使六沴弗得作諸福莫不至是豈非休吉之符歟彼有肆情縱欲暴蔑禮義父子之不保兄弟之不咸矧肯仁于親戚鄉黨乎矧肯憂于鰥寡孤獨乎是皆不反求諸躬自滅天理所以養命之道以取禍敗顯則有金木訊之甚則有鬼神譴之是豈非咎凶之符歟夫學校之法所以養士使適是道而後養乎蚩蚩之氓者也豈徒華言辭以自矜飾聲名以自髙希寵利以自封哉惟知其本者無取于彼而三者亦兼而有之矣成都之學郡國莫先焉士人之衆四方鮮擬者其講堂舊庳隘不足以容諸生僉謂豫曰蔣侯常建西學後輒毁撤其基尚存盍興築焉因相其所圖構廣厦為十有三筵度深稱是以甲辰嵗三月庚申日落成耆幼縱觀咸曰時當於其旦則先生正衣冠帥諸生羣萃于是以習揖讓周旋之儀相與衍聖經以明乎天道治性情以全乎中庸使父父子子兄兄弟弟夫夫婦婦一之乎大順故伸而上之以事其君則臣節于是乎立推而下之以庇其民則事業于是乎成不自德而德隨之不自功而功與之使風化之盛不其凛凛乎然則學校之設將以講求三極之道沉浸先生之澤盡在是矣豈曰無用之地不急之務哉豫慮是堂異時或若西學之廢輒為之針以告當御休哉天民有物有則弗完厥中自肆戕賊聖哀其愚化奚由默圖惟敷施明用俊德學校之興教育有經賢率不肖胥及羣氓豈伊異術一本爾情情之不極淪以蹈刑止邪未發將保爾生靡戢靡正瀆性之靈烏足與齒自禽自棄師生其難思迪於禮在昔有若去座為耻賜不受命萬世攸鄙矧過是者言行之僞敢登此堂寧無內愧斯庭燕閒斯宇閎邃揖讓威儀講聞道義下士背馳君子來視毋或壞隳永錫爾類觀政閣針并序呂大防成都圗開寶以來牧守之像於大慈寺閣圗記其爵位名氏與其在官嵗月而不録其政事之美惡豈居是邑不非其大夫邦人之禮宜如是歟然不足以申勸戒為後來者法余輒采秦漢至于唐領太守刺史節度使之職有政迹可考而畫像存焉者得二十有八人别圗於他閣名其榜曰觀政蓋觀其善足以勸觀其不善足以戒其政事雖可考而像不存者舍之像雖存而僣竊不軌或暗庸無聞者黜之此觀者不可不知也寺僧求文余以謂古者官有針為作針以授之其辭曰蜀于禹貢是為梁州華陽黑水處坤之陬其山四塞氣鬱以遒人矜其技物産其尤牧師之野有功宗周秦始立郡置吏罷侯守冰殖利渠田肇修肆彼一方無衣食憂文翁處後教民文章多士化之傑出馬揚張堪廉惠去而益張五倫清約人監允臧廉范便民警之所當种皓繩姦不以勢妨李膺修設善飾其身髙眣勸學其迹猶新養士之利愈久愈存賢哉孔明討魏扶漢思清以密德順而健其功不克天未厭亂王濬豪俊知略不羣畫策平吳卒賴其勤髙儉循吏為唐元臣象先廷碩嗣美且文嚴武暴厲忿欲並申天寶政繁乃以牧民崔寧繼之以昏易昏壯哉南康橫身扞難種羌方熾力弭其患終朝以安浮議可歎崇文貪殘得不償失兀衡靜安飾以儒術文昌更事逺俗清謐敏哉文饒裕蠱治詳擾弊之後補敗藥傷外禦其侮內教有方嗣復悰謨遵故守成叢孜秕政民無以生駢乎多罪禍積釁盈寃女呼天虐及孤惸瓌瑄信盜俾民卒瘏燼其邦家可不慎歟自秦以還鎮守之臣政有良窳存乎其人牧臣司梁敢告執巾座右銘漢莊遵夫疾形不能遁影大音不能掩響默然託䕃則影響無因常體卑弱則禍患無萌口舌者禍患之門滅身之斧言語者天命之屬形骸之部出失則患入言失則忘身是以聖人當言而懷發言而憂如赴水火復危臨深有不得已當而後言嗜欲者潰腹之矛貨利者喪身之仇嫉妒者亡軀之害讒佞者刎頸之兵殘酷者絶世之殃陷害者滅嗣之場淫戲者殫家之塹嗜酒者窮餧之藪忠孝者富貴之門節儉者不竭之源吾日三省傳告後嗣萬世勿遺劒閣銘晉張載巖巖梁山積石峩峩逺屬荆衡近綴岷嶓南通邛僰北逹褒斜狹過彭碣髙踰嵩華惟蜀之門作固作鎮是曰劒閣壁立千仞窮地之險極路之峻世濁則逆道清斯順閉由往漢開自有晉秦得百二並吞諸侯齊得十二田生獻籌矧兹狹隘土之外區一人荷㦸萬夫趦趄形勝之地非親勿居昔在武侯中流而喜山河之固見屈吳起興實在德險亦難恃洞庭孟門二國不祀自古迄今天命不易憑阻作昏鮮不敗績公孫瓉既沒李氏勢銜璧覆車之軌無或重跡勒銘山阿敢告梁益梓州惠集作慧唐楊炯大辰之嵗正陽之月有郪縣宰扶風竇兢字思眘昭宜令德光闡化猷庶政惟和為人以理閒庭不擾退食自公逺覽形勢處心净域乃與禪師釋智海妄言契道寓目於長平之山援飛莖陟峭􅀈削成千仞壁立萬尋俯觀大地僅如棗葉如集作同下望須彌裁同芥子飛湍滴瀝而成集作生響喬樹璀璨而垂榮玉堂石室千門相似大殿珠毫十方皆現慷慨榱桶集作椽之未立吁嗟棟宇之莫修不捨有為取諸大壯觀夫左龍角右參旗前太微後營室駢羅列以雜沓瑟蕭條而集作以清泠上磊落以晃朗下泓澄而集作以靉靆參參差差森森纚纚干櫨萬栱乍合乍離蒨蒨粲粲絢絢煥煥六采五章或合或散莽如天覆矗似雲平金火含舍于垂珠日月相望于銜璧璇墀扣砌平接太階玉户金扉俯臨閶闔曳紅日舒丹霞豐隆為雷枰集作砰鏗訇於軒檻列缺為電翕􅝉霍于庭除寒暑隔閡于墻垣集作落虹霓回帶于廊廡仰之不極目炫炫而喪精登之無階心遑遑而失度土木集作若土是翔九垓之表仍不逮于上榮文集作人是章窮四海之間猶未離于左城借如梵天之宅集作闕釋帝集作帝釋之宮兩曜城池五雲樓觀輪王所處純金為說法之堂諸佛所遊衆香作經行之地亦未可同年而語也夫黃金鏤榜曽不若四攝之門青石為墻曽不若三空之舍殫百工之力建七寶之樓豈徒然哉良有以也夫何故如來神力且觀嚴净𨗳師方便化作一城事有古而可以質于今言有大而可以銜于小是則毗耶四舍集作繪俱發道心險路衆人咸知寶所其銘曰長平山兮建重閣上穹蒼兮下磅礴紛被麗兮駢交錯儼色集作靈相兮冲寂寞誰所為兮天匠作三教銘張說劉知古成都人兄知新為儒士蓬州儀隴令弟履徹為桑門知古奉道開元天子好神仙事召至京懇丐西歸願捨宅為觀詔從之仍選髙德道士五十人居焉人畫三教像兄弟各行其志正氣生神結虛為實上清遵帝中皇首出華采衣裳虛無宫室紫氣乘斗赤爐飲日十天從化萬靈受律蓮花釋門麟角儒術共不二門心同德一道心惟微守而勿失棧道銘并序歐陽詹秦之坤蜀之艮連髙夾深九州之險也隂溪窮谷萬仞直下集作更下奔崖峭壁千里無土亘隔呀絶巉巉冥冥麋鹿無蹊猿猱相望自三代而往蹄足莫之能越秦雖有心蜀雖有情五萬年間敻不相接且秦之與蜀也人一其性物同所宜嗜欲無餘門集作源教化無餘源集作門貿遷可親昵擘拆地脉暌離物理豈造化之意乎天實凝清而成地實凝濁而形當其凝也如鎔金下鑄騰雲上浮空隙有所不開集作周回翔有所不合澄結既定竅集作窽下同缺生乎其中西南有漏天天之竅缺也于斯有兹地地之竅缺也天地也者將以上覆下幬含蓄萬靈可通必使而通者也茍有可通而未通則聖賢代其工集作功而通之故有為舟以濟川為梯以踰山唯兹地有川不可以舟涉有山不可以梯及粵有智慮以全𤣥造立巨衡而舉追氏縋懸纑以下梓人猿垂絶冥鳥傍危岑鑿積翠集作石以全力梁半控於未用斜根玉壘旁綴青泥截斷岸以虹矯繞翠屏而龍蜿堅徑膠固雲橫砥平總庸蜀之道集作通途統岐雍之康莊都邑之能步山川之無脛若水之决防如鴻之嚮陽南之北之踵武湯湯躋峨峨以自若臨蒼蒼而不懼繇是贄幣以遙集無此字逹人神以集無以字㑹同稽禮樂之短長量威力之汙隆可王者王可公者公而相吹以風或曰受琢之石常存可構之材無窮易刓代蠧斯道也未始有終嗚呼為上懷來在乎德為下昭德在乎義德義之如今日則或人之言有孚其反之則石雖存恐不為琢材雖多恐不為構想夫往昔有時而有有時而無是用惕惕天下嗤嗤一作蚩知聖賢創物之意之人寡明德義固物之道之人稀敢陳兩端之要銘諸斯道之左庶主德義者存今日之所履踵武湯者荷古人之攸作乃為銘曰天覆地幬本亦備集作同設大象難全或漏或缺損多益寡聖賢代工彼雖有缺與無缺同惟北曰秦維南則蜀地缺其間坤維不續斗起斷岸集作岸斷屹為兩區秦人路絶蜀火煙孤天實不通賢斯有造鑽堅剡徑無蹊以道若川非舟若陸非車緣危轉虛步驟交如搆雖有功存亦有德項怫劉怒旋見以踣隋落我營集作榮自顛而植地非革勢材不易林踣植之致惠怨之心勿謂斯道勿常集作恆勿謂斯道可久禮不以禮可有而無恭不以恭可無而有創之之意如彼因之之理若兹彼知不易兹而易知勒銘道左其同我思梓州兜率寺文冢銘并序劉蛻文冢者長沙劉蛻復愚為文不忍棄其草聚而封之也蛻愚而不鋭於用百工之技天不工蛻也而獨文蛻焉故飲食不忘于文晦冥不忘于文悲戚怨憤疾病嬉遊羣居行役未常不以文為懷也適當無事而天下將以文為號文明代生植文粹作殖明晦皆效文用一作明故日月星辰文乎旗常昆蟲鳥獸文乎彞器徐方之土文于侯社夏翟之羽文于旗一本作旌旄登龍于章升玉于藻百工婦人雕礱梁練文粹作涂涷以供宗廟祭祀之用一本作文豈獨蛻生集作固知效用不及時文哉然而意嘗文粹作常獲助於天而不獲助於人故其窮雖窮無憾也常勤意之時不敢嚏不敢咳不敢唾不敢跂集作企倚嗜欲躁競忘之於心其祗祗畏畏如臨上帝故有粲如星光如貝氣如蛟宫之水又有黯集作瘖如屯雲如久隂如枯腐熬燥之色則有如春陽如華川逶逶迤迤則有如海運如震怒動蕩怪異夫十為文不得文粹作滿十如意少如意則豈非天助乎嘗欲使天下聞之而必行勸文粹作觀之而必蹈散之茫洋以為道演之浸潤一本作淫以及物然後為農文之使風雨以時兵文之使戎膚以順文于野文于市使得一夲無此字其所幽隱之士以出口者使之言材者使之用然而自振者無力終知者甚稀豈非不獲人助乎嗚呼十五年矣實得一千文粹作二千一百八十紙有塗者乙者有注揩者有覆背者有朱墨圍者於是以周易筮之遇復坤上震下之同人乾上離下筮者曰鳴於地中殷殷隆隆七日不復文粹作而復復來其文粹作而天下昭融乎他日更召龜而令文粹作合之將聽襲吉卜於火如秦兆惟曰不吉卜於水不成乎河洛兆則亦惟曰不吉卜於木而悶悶集作悶之土叶吉纍纍文粹作纍纍為冢則汲之兆乎峭峭為壁則魯之兆乎且其占曰土之文為阿山一夲作山河為華英將不崩不竭為滋味而傳乎結為丘陵為其設險乎融為川瀆率其朝宗乎華為百穀以潔祭祀之粢盛乎不然使其速腐為墟集作丘壤集有乎字生芻藁以食牛羊乎化塗泥為甄陶以作器乎將塊為五色而分封茅社文粹作茅社分封乎流於樂為土鼓為凷桴以泄其和聲乎夷為都邑以興宫廟乎坎為汙池以澤生殖一作植乎祀為壇竈乎窽為井墓乎吾皆不得而知也嘗文粹作當既不為吾用唯速化為百工之用慎毋朽為芝菌以怪人自媚慎毋堅為金鐵以作貨起爭慎毋潏為醴泉以味諂口慎毋禱為城社以狐鼠憑妖慎毋聳為良材以雕斫傷性慎毋萌為蘭茝以佩服見褻文梓作藝非嗚呼介而為石使之服文粹作能言舒而為蚓使之飲泉既而他年遊魂之未返者亦命巫以巾士家文粹作二命巫師而弔三招之號曰在几閣而來歸兮奄為塵垢在耳目而來歸兮視不汝醜在口吻而來歸兮譽而汝久噫筆絶之年而麟見祟文其無祟乎唅非珠玉斂無裙𥜗後世詩禮之儒無驚吾之幽墟其冢也在莽蒼之野大塊之丘時有唐大中之丁卯而戊戌之季秋銘云一本作曰文乎文乎有鬼神乎風水惟貞將利其子孫乎卜肆銘陸龜蒙蜀莊之託蓍龜也以忠孝仁義後來之託蓍龜也以偷佞險詖美之使怡愈恆之使駭畏小人惟惡是嗜松江本作視惟禍是避惟福是覬惟瞽言二字集作聲是媚曽不究得失之所自故幽贊之蓍前列之龜乃化為庸妄集作妄庸之器嗚呼成都吾不知古為市之地况集作矧君平之卜肆耶强為之銘具刻其意劒州重陽亭銘并序李商隱陪臣未嘗屢覩天子宫闕矧得舞殿陛下耶然下國伏地讀甲乙丙丁詔書亦有以識天子理意尺度堯舜不差毫撮于絶逺人意猶在不然者安得用江陵令使上水六千里挽大小虎牙灧澦黃牛險以治普安闕令既為侯講天子意三年大理田訟斷休市賈平獄户屈膝落民不識胥吏四方濵頗來繫馬縻牛闕樹膚不生乃大鏟險道鯤石見土共平可容考工車四軌建為南北亭以經勞餞又亭東山號曰重陽以醉風日南北經貫若出平郡無有噫闕三年民悉即去遮觀闕請留闕東山實在亭下侯蔣氏名侑文曰仁之為道隆磊英傑天簡其勞羡以事物為君之闕蔣是闕撮取不窮如武有庫蔣之有世以仁為歸伯氏之宜仲氏之思厥弟承之純而不紕以令為侯天子之德汝侯為理劒有盈昃君南臣北父坐子伏飲牛漚菅田訟以直市正獄清謁歸告休朝雨滂滂濕其峭頭民樂以康願有顯庸侯作南亭比亭是闕至于東山乃三其功推險為夷大石是扛亦既三年民乞走留伯氏南梁重弓二矛古有魯衛惟我之曹惟仁之歸有世在下其攄其超尾馬馬鬛惟蔣之融由唐龎蝦惟是亭銘得其粗旦唐大中八年九月一日大學博士河內李商隱撰鏡銘僞蜀王宗衍張君房麗情集蜀王宗衍幸鳳州州將某妻嚴氏有美色衍愛幸之賜以粧鏡其銘曰煉形神冶瑩質良工闕眉寫翠對臉敷紅如珠出匣似月停空綺忩繡院俱涵影中蒙軒銘宋趙抃顔淵聖徒終日如愚伯陽亦云深藏若虛彼無演子少師佛圖翹翹秀整籍籍多譽下筆文采開口詩書大乘探賾頓教咨諏將墜之勢我持我扶有軒孰名以蒙命諸蒙久則亨蒙養以需如砂中金如蚌中珠或取或捨聖人凡夫蒙乎蒙乎寧已矣乎石室銘宋古仁昔夏禹定九州貢法明三壤同異山川草木鳥獸戎狄土地所生財賦所出聲教所暨咸悉載之無一遺者至於天下人性賢愚民心善惡之所係則闕而不載焉三代而下史策所存者咸能著之圖籍而志其地理迹其紀録則於天下人民所係之性亦略而無聞焉聖賢之述亦有所闕乎豈聖賢之志將有所藴乎意者謂人性之上下不常于世隨其教化而移易也故上之教行則民興善上之令嚴則民興暴皆從其上之所為爾語曰如風之偃草又曰若泥之在鈞者豈虛言哉此聖賢所以不可不筆之而傳後世者矣且蜀之開國地逺中夏民性怯懦而多浮侈逮文翁之為守立學校造講堂石室以備其制度遣俊乂之士東受七經還以教授於是風教大行而岷絡之地可比於齊魯厥後相如既沒而淵雲之徒森然繼出兩漢之際舉不乏賢得人之稱逮今攸盛於戲蜀始以僻陋險隘人民夸誑古謂難治暨文翁以儒學教導則其人莘莘然嚮慕于文學而見用于當世者得非上之教化移易于人民故若是哉覽之前記尤美其事觀夫遺迹則石室猶存雖前賢有銘其徽烈者大率言立學興儒而以石室雕琢取學者磨礱之意又欲樹功於不朽也觀其言辭似未盡賢守教化之深意因復廣而銘之曰地有常形民無常性繇上之化所從而正維蜀之郡在天一隅俗尚浮侈人希服儒賢哉文翁來牧兹土爰立石室始興庠序俾此岷絡儒風大行於以兩漢英賢踵生降及我朝得人侔古家慕淵雲學隆鄒魯政教下格文材上通逮今蜀人詠歌德風金堂南山泉銘并序蒲國寶蘭陵錢治嘗作南山泉記實仁宗天聖四年距今蓋一百二十有一年也錢又夸大其言以謂陸羽作茶經第水之品三十張日新煎茶記又增其七毛文錫作茶譜又增至三十有八金堂南山泉當不在蘭溪第二水下然前之三人足跡曽不一履此地宜皆不為所賞鑑故此泉湮沒而無聞方可嘆也先朝時家恬户嬉一時人士往往多以卜泉試茗相誇為樂事至靖康後天下騷然苦兵生民困於征徭邑中之黔惴然方以貨泉供億縣官不給為恐泉之甘否何暇議耶黃君才叔北方之修整士也紹興辛巳於南山之南手披荆棘鋤其荒穢卓江山景物之㑹作屋十數楹極幽居之勝而嵓竇之間泉之湮者復逹引之庭除其聲㳙㳙遇暇日余率二三賔朋登君之堂洗心滌慮便覺煩暑坐變清凉酌為茗飲則又苾甘可愛誠如治之言者余以是知物之興廢通塞亦自有時何獨一泉耶是不可不銘銘曰峽水東注鶴峯北峙幽幽南山為國之紀自冽彼泉出于嵒底清新香潔酌之如醴吾儕小人豈曰知味宜潔而甘即為佳水近世錢治蓋嘗品第方之蘭溪不在第二陸羽既逺無復為紀日新文錫兹亦已矣今之易牙未知孰是一泉小物隱而弗示不有奬鑑孰發其閟勒銘山阿以告吾類月巖銘冉木震黔號古郡地居極邊倅治倚山其山刺天曰有月巖古老相傳視事纍月遍求茫然偶濬溝渠巨石中填深掘視之厥狀㠝岏中竇一穴透明而圓皎如秋月翳絶浮烟旁輔三隙如星之聨拂拭細觀古識存焉爰命僕夫舁置座前負以層石映以灣泉日對其側卷舒簡編凡初遭遇皆有夤緣髙岸深谷知幾變遷惟我月巖存千萬年丞相張公祠堂銘并序田楙大丞相文忠張公以治平三年春初仕為雒縣簿其年冬十有二月來攝華陽縣衡山鎮之征官越明年秋八月丁內艱而去迄今凡九十年鎮之護國寺有堂舊刻公之遺詩紹興乙亥楙來護觀景想風烈良用慨然乃新椽礎以繪公像從公之孫親叙南通守講究家傳記其年月嗟夫公之大節在史官文章在天下勳德在生民是區區者亦何加損于公哉詩云髙山仰止景行行止意其在兹銘曰天為斯民挺生賢哲誰為厲階投而莫合偉哉文忠岷峨之英瑞成鳳皇聲為雷霆熙豐元祐迄于崇觀世故多矣金石不變晚而來歸舜韶一䕫豈不能從愛莫助之抱關擊柝我初不屑粲然珠璣散落遺碣貂衮誾誾凌烟功勳豈真公邪天壤遺文噫天何時復生此老浮逰汗漫固有不朽有斐閣王賞溫江蘇國士企先於東效别墅創為小閣前有修竹後有流水豫銘之曰有斐而為之銘銘曰淇水湯湯緑竹漪漪武公之德託興在兹圭璧之質琢磨成器願子百年惟公是似泮宫達泉銘并序栁夢弼水供滌濯飰食之用民不可一日無惟古信州上倚山下瞰江最苦汲負淳熙癸卯冬大著楊先生奉尺一來領漕事慨然有澄清志趣明年革鹽弊正銓曹平榷酤所以措雕瘵之民於安全之地者無不用其至猶以為未也知民艱于水思得良工相地脉開數井濟之聞泮宫有眢井泄治力必省乃命奉節令孫必益董其役俄而及泉新轆轤具綆缶嘗試嚌啜寒冽芬甘又甃其面屋其顛與此邦士民為永久莫大之利郡文學栁夢弼請名先生曰學井非他比也名逹為宜蓋取孟子之說四端若泉始逹之意先生顧惠多士所以期待者良不淺矣夢弼竊謂嘉量微物盤盂小器猶昭德記功載在銘典矧因民所利與乾造同不言之美逹則兼善使斯民無不被堯舜之澤可喑無一字以紹無窮乃為其銘曰水哉似道日用叵無䕫擁山椒雲頂鄽郛俯瞰蜀江汲負崎嶇無井歎杜無力咏蘇悠悠何載泮宫鑿井水生其芹壇對惟杏青矜裕德朋來造請飲顔一瓢慕黃萬頃谷鮒惟何土石邇堙士困陸沈學以日新挈瓶為知叩戶求人逖想西江疇憫波臣關西夫子道猶四瀆攬轡志清恩波滲漉謂學有源不逺可復試疏導之其逹必速乃任茂宰俾浚其眢九軔倍深天一中寒面以玉甃圍以珠欄今之孟子還取四端名之曰逹言近㫖逺即學諸生盍亦自反志逹而明其流渾渾辭逹而文其初有本下學上逹素王是師兼善天下在推所為是聞非逹亦宜審之愈及愈新徑逹聖涯所謂逹者先王之德巳逹逹人欲同其德一字衮褒要當默識勒銘學官與道無極魚復扞關銘并序李􅌫古梁州域實兼巴漢庸蜀地漢孝武改梁曰益梁州總八郡梁之為言强也益之為言厄也此昔聖賢察其風俗接其形勢而為之名也故其人則彊毅精敏嗜義負勇其地則山屏水塹險介重阻沃野叢傎輻員萬里北以劍門為限東以魚復為守此二物者蜀之襟喉扃闑也戰國交侵楚肅四年始建扞關突在魚復置江關都尉以魚復設尉治東漢省尉而關如故東漢志有扞水扞關不言都尉治秦張儀說楚謂下水而浮不十日而拒扞關蜀李雄說公孫述謂東守巴郡拒扞關之口皆指此魏酈道元注水經謂扞關乃廪君所置唐章懷注范史謂關故基在夷陵巴山縣巴山縣自唐天寶八年為巴山郡界峽州西南五十里二說皆非也蓋魚復之有關尚矣無事則嚴封域察姦軼有急則扼要扞凌暴有國者所宜致謹也雖然常考諸古劍門以漢中武都為屏蔽失漢中武都則劍閣不足賴矣魚復以秭歸夷陵為保障失秭歸夷陵則魚復不可恃矣考秦以下以迄于今舉兵定蜀者凡十有三唯秦司馬錯漢以來歙魏之鄧艾鍾㑹苻秦之楊安後魏之尉遲迥隋之梁睿唐之髙崇文後唐之郭崇韜本朝之王全斌實出劒閣隂平道至若吳漢若岑彭若諸葛亮若桓溫若劉敬朱齡石以及劉光義皆擁舟師西指遡江扣關麾城斬邑易如拾芥何者皆以先秭歸夷陵也漢昭烈襲取劉璋既北收漢中即東爭夷陵嗚呼若昭烈者可謂能知保蜀矣功之不遂此天也然而劉禪繼世猶以茍安者徒以與孫氏交歡也且蜀與吳楚為唇齒之國兩全則固一失則危是以自古欲圖江南者必先奄蜀何者地勢便兵力接也秦取楚晉取吳隋取陳耀兵上逰舫船載卒乘流而東曽不頓一刃折一矢而荆揚之區已望風褫氣矣苻堅伐晉亦分軍而下不幸苻融之兵先敗於淝水故不能成功以此知英雄圖事後先一揆然則蜀之重也審矣自古言蜀人嗜亂喜禍故所以制御操切之者尤盡其術嗚呼何其過也吾觀從昔亂蜀者皆非其國之人率由姦雄乘隙外至因竊據焉而蜀人莫與之抗蓋公孫述著禍于卒正扶風人劉焉蓄姦于州牧竟陵人鍾㑹兆謀于降將潁川人李特奮迹于流人略陽人程道養怨激于苛刻枹罕人劉季連計成于特奪彭城人司馬勳出于王族蕭紀興于帝胄王謙釁于易代太原人劉闢絶亂于留後王建發蹤于椎埋舞陽人孟知祥紹難于違愎邢州人唯東晉譙縱本宕渠人然縱之初起實出逼脅觀其倉皇赴江以逃則知縱本庸人初無異志劫於羣叛不能自還若述焉以下數子者則其險詭睥睨有從來矣彼見蜀之險足恃蜀之富足資䢰然動心逆節萌起蓋有觀劍門之險而追笑劉禪覽甲兵之盛而思效𤣥德而蜀之人形格勢制不能不折而從之其間能截然自固耻汚於僞如青衣之不賔公孫述牂牱之不臣於李特者類有之矣嗚呼一定而不易者地形也難保而易變者人心也故地形惟所守而人心惟所化茍知所守則力約而功倍圉固而敵畏茍知所化則嚚傲革為勇毅柔脆易為信順不知所守則嬴氏家函谷而滅田宗國東海而亡矣不知所化則暴悍踵起於江漢姦醜接迹于洙泗矣魚復與劍閣埒險角壯並為西南鎮昔有銘劍閣者獨此缺諸江出岷山行二千里合蜀衆流畢出瞿唐之口山竦而嵥崒水激而奔迅天下瓌絶偉特之觀至是殫矣是宜有銘琢刻盤石以侈寡匹以厲罔極其詞曰惟梁州域神禹所别有歸其閘險肇天設控引荆襄枕倚牂越岡聨嶺屬以岈嶻嶭洪流下瞰澎滲蕩潏衡灊抗髙華岱嫓桀上柱天倪㫄扼日轄惟斷屏障則恃於峽如户斯闢此為之闑冦來是扞兵勢攸接鏡考前古棋勢輻裂水攻陸擊巗披谷抉𤣥甲熣爛白刃鎗䶪雲舸倐馳羽纛斯揭山奔貙兕壑漬螭霓水姦脫入孰睨旋竊虐環千里炖人於钀曽不逾時宗隕祚拔四方之人王化所逹寧甘嗜亂實首攸脅豈富是怙忍上之觖惟此山川重阻復疊德守者固兵據者蹶惟此黔庶嶷嶷業業力制則離道懷乃協皇帝聖武恩被䎀狘國有至仁九土臣妾勒銘山阿永彰宋烈主一齊銘張栻成都范文叔以主一名齊豫嘉其志為銘以勉之人之心抑何危紛百慮走千岐惟君子克自持正衣冠攝威儀瞻以整儼若思主於一復何之事物來審其機應以専匪可移理在我寧役隨積之久昭厥微靜不偏動靡違嗟勉哉自邇卑惟勿替日在兹鏡硯銘黃庭堅瀘川之桂林有石黟黑硯則宜筆而受墨唐安任君從簡之硯面為鏡而背三足形駭天下山林不若而不得訪諸禹也古硯銘并序唐庚硯與筆墨皆氣類也出處相近任用寵遇相近也獨夀夭不相近也筆之夀以日計墨之夀以月計硯之夀以世計其故何也其為體也筆最鋭墨次之硯鈍者也豈非鈍者夀而鋭者夭乎其為用也筆最動墨次之硯靜者也豈非靜者夀而動者夭乎吾於是得養生焉以鈍為體以靜為用或曰夀夭數也非鈍鋭動靜所制借令筆不鋭不動吾知其不能久逺與硯同也雖然寧為此勿為彼也銘曰不能鋭因以鈍為體不能動因以靜為用唯其然是以能永年泮池銘明黃景䕫湫作陬居僣雍之如誰乖厥初藝風塞荒士訛皇皇言此否臧其乖斯何易以其差匪以其訛制良治堅弓盈月弦首事時遷駕虹飛危石檻雲垂貫虛跨奇春水沄沄風行渙文翠委牽芹山英海靈秀脉潛生肆發光晶一士豪豪氣長明曹德言功髙青矜忭歡我銘緒完列永永觀石室贊宋鄭藏休自張儀諷蜀劍路攸通向者魚鳬未知蠶藂詩書罔設禮樂誰崇征伐不休城池屢空爰暨有漢是生文翁符守此邦鬱為儒宗大開庠序匪我童蒙誦以八索歌以九功化流南蠻德伏西戎豈曰滇筰亦惟巴賨其後相如傳之揚雄岷峨詠靈川瀆氣融石室猶在金聲無窮南鄰孔門北接玉宫千齡萬古永播餘風張尚書寫真贊田况九河張公詠淳化咸平中兩被帝選以全蜀安危付之時冦孽之餘民皆痍傷散流生不自保軍帥復恃功橫驁部下剽脅善良禍甚于冦公賞戮明果以復其事密聞于朝既而易帥旋師民漸安輯以至于治德功茂于蜀表噫當救患庇民時小為偷合畏顧則亂未涯也非賢者處之何以取濟哉逮今諱日遺老善士尚齊集於天慶觀奠拜畫像于前公嘗自為真贊俾蜀人圗于觀之仙逰閣其首云乖則違衆崖不利物遂自目為乖崖公雖外示貶損而內有所激故卒云欲眀此心罪之無斁此其歸也世人隨而稱之豈考其實耶豫恐英聲異績久而湮曖故作真後贊并公之自贊刋石觀中以永蜀人之思時皇祐元年十二月一日序自贊乖則違衆崖不利物乖崖之名聊以表德徒勞丹青繪寫凡質欲明此心罪之無斁後贊乖不離正崖弗厲公名雖自貶有激於𠂻衆隨而稱孰知其功敢明公心以馳無窮府學文翁畫像十贊宋祁按吾曽能改齊漫録云蔣堂字希魯宜興人仁宗時以樞密直學士知成都嘗召髙才碩士㑹試府事親較才等勸成學者於學之側别建西學以廣諸生齊室迄成而公移蒲中其後轉運使毁之以增廨舍既而常山宋公尚書至府聞其事嘆惜久之且使成公意乃即其舊址建文公祠祠之內圖張君平鄭子真司馬相如揚子雲蜀士先賢凡九及公之像而十常山公為之贊漢蜀郡太守廬江文公贊天挺耆俊有德有文漢天子命公往撫蜀人蜀始朴蒙公不謂然選士詣學歸相教言一年而業二年而儒五年大成家詩戶書以勤相矜以惰相耻出有教父入有順子文如馬揚節如嚴李由公教之聲塞天地蜀戴公仁世世奉祠千五百年惟公之思司馬相如字長卿贊蜀有巨人曰司馬氏在漢六葉為文章倡始言必故訓革戰國之弊斫雕混茫從神取祕摛發厥章日星佐華封禪遺篇意極辭奢武用東之紹七十二家行雖小訾後帝賢嗟王褒字子淵贊子淵軒軒洵美有文宵雅鹿鳴帝用攸聞此盛德事讓不克堪頌聖得賢松喬是耽以諫大夫數從幸巡受詔作賦持節迎神未克告猷少謝良臣莊遵字君平贊君平沈冥賣卜肆中子以孝言臣以告忠日足百錢閉門著書十餘萬言黃老其徒李疆牧州喜欲吏君揖風而慙噤語於唇還謂子雲子誠知人九十夀終聲暨髙旻張寬贊惟武嗣位而有荒志厥德靡升神不妥祀婐然靈媛止乎渭濵帝使走咨何所而人媛告七車能為我言君稽首對吾祀弗蠲帝用謝愆改香厥薦天人之交自我而見李仲元贊髙也絶俗雖介不通卑也汙俗雖順不恭淵哉仲元內粹外渾衆不我知揚子識其賢奈何在通恭之間可器有名非行至完彼顯在人吾晦與天天而不人萬世其傳何武字君公贊汜鄉為人鯁固清明嫉惡比周直鞅安行先問儒官巳乃事事望侈德充晚相天子天子倚之姦臣內憎天喪道消卒為賊乘玉折不撓身沒名升揚雄字子雲贊卓哉子雲為漢儒師准易論語同聖是非百家懘淫我獨正聲譎怪縮藏孔道光明歆也致訾謂抵醬蒙惟談有言必傳無窮劇秦詭辭恨死新時曰漢中天果不吾欺後漢蜀郡太守髙瞬贊顯顯若人有政自律摘民耳目尊右儒術晚漢多艱校屋蕩焚經生罔依弦誦不聞君大紹興新堂及廡繪帝皇以還冠服所祖大掖翺翔坐復鄒魯與文偶祠血食千古宋蔣堂字希魯贊蔣侯挺挺天與嚴方健而文明不逢不將始治蜀人政未及孚纎者嫉侯膏吻騰誣侯政已孚蜀人熙熙侯坐徙官逺近驚咨侯始興學紹文之餘百堵增增大度厥居髦俊聿來晝經夜史盎然西南號多君子侯既去州右區即毁侯惠在人已膚而髓子産相鄭先謗後歌來世視之謂侯如何蜀三賢畫像贊張俞益州中興寺有墨池院院有前漢揚子雲莊君平李仲元三賢畫像因各贊之來者觀像讀贊則知三賢之道至焉揚子雲子雲潛真與聖合神龍隱其德鳯耀其文撰法著𤣥統貫天人道德之首談稱絶倫莊君平淵淵蜀莊至人之貌心通蓍龜言必慈孝推道衍德窮神入妙子雲之師孰洞其照李仲元仲元何如貌人心天出方其隱默愈於言道兼夷惠質妙雲淵屈伸猶龍物無纍焉御製蘇軾贊并序宋孝宗成一代之文章必能立天下之大節立天下之大節非其氣足以髙天下者未之能焉孔子曰臨大節而不可奪君子人歟孟子曰我善養吾浩然之氣以直養而無害則塞乎天地之間蓋存之於身謂之氣見之於事謂之節節也氣也合而言之道也以是成文剛而無餒故能參天地之化開盛衰之運不然則雕蟲篆刻童子之事耳烏足以與論一代之文章哉故贈太師諡文忠蘇軾忠言讜論立朝大節一時廷臣無出其右負其豪氣志在行其所學放浪嶺海文不少衰力斡造化元氣淋漓窮理盡性貫通天人山川風雲草木華實千彚萬狀可喜可愕有感於中一寓之於文雄視百代自作一家渾涵光芒至是而大成矣朕萬幾餘暇紬繹詩書他人之文或得或失多所取捨至於軾所著讀之終日亹亹忘倦常置左右以為矜式信可謂一代文章之宗也歟乃作贊曰維古文章言必已出綴詞緝句文之蟊賊手抉雲漢斡造化機氣髙天下乃克為之猗嗟若人冠冕百代忠言讜論不顧身害凛凛大節見于立朝放浪嶺海侣於漁樵嵗晚歸來其文益偉波瀾老成無所附麗昭晰無疑優遊有餘跨唐越漢自我師模賈馬豪奇韓栁雅健前哲典型未足多羡敬想髙風恨不同時掩卷三嘆播以聲詩乾道九年閏正月望選德殿書賜蘇嶠張丰仙像贊惠園若有人兮出世靡常曩自中土移居朔方竒骨森立美髯㦸張距重陽其未逺步虛靖之遺芳飄飄乎神仙之氣皎皎乎氷雪之腸安尋師而問道嵗月亦云其遑遑既受訣於散聖復續派於瓜王全式真之妙理契未判之純陽南流閩楚東略扶桑歷諸天之洞府參化人而翺翔曰儒曰釋曰老曰莊皆漸通而奧㫖乃懷玉而中藏長條短褐至于吾邦吾不知其甲子之幾何但見其毛髮之蒼蒼蓋久從逰於赤松之徒而類夫圮上之子房也宋朝議大夫黎公錞贊吳薦三傳融心六一攸契經術揚庭結知英帝學仕兼優借留斯致箋簡遺言百世爭媚宋右正言節愍張公庭堅贊前人大科傑魁正言清秩諫紙數陳侃侃無匹惟憸弗從三謫匪逸節愍易名百世一日宋宜教郎畏齊遊公桂贊前人三禮正傳濬淵樂絶經學有編日星昭揭猗我文皇治教超越用轉休明大加采列宋少保忠定安公丙贊前人桓桓忠定神發皛然甫占仕版經濟已全霆掃凶逆談笑首傳功流秦蜀千斯萬年自贊吳伯通仁之居廓然義之路坦然此天之所以與我者與聖賢而同然雖余足之履有未遍也而其目之覩已了然惟之死而心亦靡他又能無適而不然則位雖止乎一品而夀亦拘乎百年兹生也庶乎真不徒然益部方物贊宋宋祁益為西南一都㑹左阻劍門右負夷蕃內坦夷數百里環以長江裹以復岑川陸盛氣礙而不得東回薄蜿蜒還負一方為珍木為怪草為烏魚芋稻之饒日暘雨雨去聲噓和吐妍層出雜見不可勝狀殆岷精緼靈闕璚於兹壤也嘉祐建元之明年豫來領州得東陽沈立所録劍南陽物二十八種按名索實尚未之盡故遍詢西人又益數十物列而圗之物為之贊圗視狀贊言生之所以然更名益部方物略記凡東方所無及有而自異皆取之冀禆風土聚丘之一云棕皆褫皮此獨自幹攢葉于顛纛首披散秋華而實其值則罕右海棕大抵棕類然不皮而幹葉叢于杪至秋乃實似棟子今城中有四株杜子美左綿海棕行理緻幹堅風雨不能撼云在土所宜亭擢而上枝枝相避葉葉相讓如向切繁隂可休美幹斯仰右楠蜀地最宜者生童童若幢蓋然枝葉不相礙茂葉美隂人多植之樹甚端偉葉經嵗不雕至春陳新相換有花實似母丁香云厥植易安數嵗輒林民賴其用實代其薪不棟不梁亦被斧斤右榿亦得折宜民家蒔之不三年材可倍常闕薪之疾種闕取里闕以為利杜子美有覓榿栽詩葉與竹類緻理如柏以狀得名亭亭修直右竹柏生峨眉山中葉繁長而澤似竹然其幹大抵類柏而亭直木幹芋葉擁腫盤戾農經弗載不用治厲右海芋生不髙四尺五尺葉似芋而有幹根皮不可食方家號隔皮仙云可用變金或云能止瘧葉圓以澤素花春敷子生莢間纍纍綴珠右紅豆花白色實若大紅豆以似得名葉似冬青蜀人以為果釘竹生三嵗色乃變紫伐幹以用西南之美右紫竹蜀諸山中尤多園池亦種為玩然生二年色乃變三年乃紫根不他引是得慈名中實外堅筍不時萌末或下垂苒弱緣榮右慈竹性叢産根不外引其密間不容笴筍生夏秋閲嵗闕枝葉乃茂别有數種節間容八九寸者曰籠竹一尺者曰苦竹弱稍垂地者曰鈎絲竹或取節修膚緻者用為簟笠葉棕身竹族生不蔓有皮無枝實中而幹右棕竹性亦叢産葉似棕有刺徑不二三寸或曰桃竹未得其詳竹箇皆圓此獨方形厚倍於竅緗節稜圓闕右方竹方者差小碧葉素葩厥􅊶之珍丹衷既披香液飴津右柑生果渠嘉等州結實埒於江南味亦差薄云芋種不一鸇芋則貴民儲於留可用終嵗右赤鸇芋蜀芋多種鸇芋為最美俗號赤鸇頭芋形長而圓但子下繁衍又有蠻芋亦美其形則圓子繁衍人多蒔之最下為槫果芋槫接也言可接果山中人多食之惟野芋人不食本草有六種曰青芋紫芋白芋真芋蓮禪芋野芋西南所宜柔蔓紛衍縹蕙緑實其甘可薦右緑蒲萄北方蒲萄熟則色紫今此色正緑云栗味尤衆此特殊味専蓬若橡託神以貴右天師栗生青城山下他處無有也似栗味美惟獨房為異久食已風有子孫枝不花而實薄言采之味埒蜂蜜右天仙果樹髙八九尺無蕊其葉似荔枝而小子如櫻桃纍纍綴枝間六七月熟味至甘挺幹既修結花滋白㦸外澤中甘可以食右隈支生邛州山谷中樹髙丈餘枝修弱花白實似荔枝肉黃膚甘味可食大若爵卵花跗芬侈叢刺於梗不可把玩艷以妍整右錦被堆花出彭州其色一似薔薇有刺不可玩俗謂薔薇為錦被堆花故以名别名牡丹詳見牡丹花下苒苒其條若不自持緑葉丹英蔓衍紛垂右錦帶花蜀山中處處有之長蔓柔纎花葉間側如藻帶然因象作名花開者形似飛鳥里人亦號鬢邊嬌有苕頴然有蕚敷然取其肖象莫類於蟬右石蟬花始生其苕幹擢長二三尺葉如菖蒲紫蕚五出與蟬甚類緑闕相側蜀人因名之又白者號玉蟬花色與柏類苒苒其莖冬不甚黃故謂長生右長生草山隂蕨也人種之修莖茸葉色似檜柏而澤經冬四尺珍而愛之至冬不雕故號長生翠蔓紺苕回繞可喜蒔之庭土珍以為瑞右瑞草蜀人多種之庭檻蔓延長三四尺珍而愛之故為之瑞草蕉無中幹花産葉間緑葉外敷絳質凝殷右紅蕉花於芭蕉蓋自一種葉小其花鮮明可喜蜀人語闕深紅者謂之蕉紅蓋倣其殷麗云修柯柔蔓濃淺繁總盛則重花不常厥種右重葉海棠海棠大抵數種又皆小異惟其盛者則重葩疊蕚可喜非有定種也始濃稍淺爛若錦章北方所植率枝强花瘠殊不可玩故蜀之海棠誠為天下闕竒艷云花亘四時月一披秀寒暑不改似固常守右月季花此花即東方所謂四季花者翠蔓紅花蜀少霜雪此花得終嵗十二月一開豐粒茂苖豆别一類秋種春斂農不常蒔右佛豆豆􅀈甚大而堅農夫不甚種惟圃花以為利以鹽漬食之小兒所嗜自濃而淺花則常態今顧反之亦反之怪右添色拒霜花生彭漢蜀州花常多葉始開白花明日稍紅又明日則若桃花然人情尚奇賤白貴黃厥英略同實寡于香右黃荼䕷蜀荼䕷多白而黃者時時有之但香減于白花緑實若萸味辛香苾投粒美臛椒桂之匹右艾子艾木大抵茱萸類也實正緑味辛蜀人每進羮臛以一二投之少選香滿盂盞或曰作為膏尤良按揚雄蜀都賦當作藙藙艾同字云翠花對生甚似匹鳥逼而觀之勢若偕矯右鴛鴦草春葉晚生其稚花在葉中相向如飛鳥對翔附陽而生垂若文縚大槩苔類土石所交右仙人縚生大山中與苔同種但巖隂石隈多鮮翠長二三尺叢垂若縚或言深谷有長丈餘者翠莖纎柔稚葉相當逼而歌之或合或張右娛美人草蜀中傳虞美人草豫以虞作娛意其草柔纎為歌氣所動故其葉至小者或動搖美人以為娛樂耳冒寒而茂莖修葉廣附莖作花葉蔽其上以其自蔽若有羞狀右羞寒花蜀地處處有之不為人所愛依莖綴花蔽寒自隱俗曰羞天花豫易曰為羞寒花按本草名曰鬼臼衆跗聚英爛若一房有守繪圖厥名乃章繁而不艷是異衆芳右瑞聖花出青城山中幹闕條髙者乃尋丈花率秋開四出與桃花類然數十跗共為一花繁密若綴先後相闕闕人號豐瑞花故程闕之圖未萎也蜀以間更號瑞聖花然有數闕平白者名玉真闕移寶仙淺紅者為醉太蒔囿中以為尤玩云擢頴挺挺盛夏則榮丹紫合英以寶見名右七寶花條闕大抵玉蟬花類也其生叢蔚花紫質絳云擢條亭亭層層紫丹狀若使節方圖實刋右旗節花條條華碧皆層層而擢正類使所持節然故以名見益州圖經聚葩共房葉附華外根不得徙見偉兹世右娑羅花生峩眉山中類枇杷數葩合房春開葉在表花闕在中或言根不可移故俗人不得為玩葩秀木顛狀若芙渠不實而榮馥馥其敷右木蓮花生峨眉山中諸谷狀若芙蓉香亦類之木幹花夏開枝修茂蔚不為園囿所蒔采狀類翔鳳闕質毛輕翩欲飛動右鵝毛玉鳳花本至卑纎蓬如叉股秋開不花而鬢狀似禽故曰鳯色白故曰玉以其分輕故曰毛蔓附本生實若椹纍或曰浮流南人謂之和以為醬五味告宜右蒟出渝瀘茂威等州即漢唐所謂者葉若王爪厚而澤實若桑椹緣木而蔓子熟時外黑中白長三四寸以蜜藏而食之辛香能溫五藏或用作醬善和食味或言即南方所謂浮留藤取葉合檳榔食之植根水中端若串珠皿而瀹之可以代蔬右真珠菜戎瀘等州有之生水中石上翠縷纎蔓若貫珠蜀人以為蜜熬食之或以醋煮可行數千里不朽也素花碧葉浮秀波面日中則向日入還斂右朝日蓮花色或黃或白葉浮水上翠厚而澤形如菱花差大開則隨日所在日入輒斂而自藏于葉下若葵藿傾太陽之比蟬不能蛻委於林下花生厥首兹謂物化右蟬花二川山林中皆有之蟬之不蛻者至秋則花其頭長一二寸黃碧色治小兒瘈瘲又能已瘧葉能螫人有花無實冒冬弗悴可以祛疾右燖麻自劍以南處處有之或觸其葉如蜂螫人以溺灌之即解莖有刺葉似花葉或青或紫善治風腫按杜詩當作􅣪厥生在石水蕩其液觸挺凝體品亞南舶右水硫黃出資榮州山間中秋潦已收里人布茅水上流沫凝聚取而熬過復投于水則成號真珠黃以淺黃色者為上其次用海舶所采者附堇而生翠莖紫蕤生蜀者良三建則非右附子生綿州彰明縣者最良有一子重及一兩者花色紫本草言附子無正種附烏頭而生然則與烏頭天雄附子共一物耳陶𢎞景以天雄烏頭附子皆出建平謂之三建唐人非之以綿龍二州所生為良今則惟彰明者佳條幹澤葉結實如綴膚解核零可用治痺右石瓜生峩眉山中樹端挺葉肥滑如冬青甚似桑花色淺黃實長不圓殼解而子見以其形似瓜里人名之煮為葉黃善能治痺柔葉美根冬不隕零采而綴之可糝于羮右芎蜀中處處有之葉為蘼蕪楚辭為江蘺者根為芎似雀腦者善成都九月九日藥市芎與大黃如積香溢于廛或言其大若胡桃者不可用人多蒔于園攬葉落時可用作羮蜀少寒莖葉不萎今醫家最貴川芎川大黃云葉大莖赤根若巨皿治疾則多方家所銘音暝右大黃蜀大山中多有之尤為東方所貴苖根皆長盈二尺本草言之尤詳藥市所見大者治之為枕紫地錦文唐人以為産蜀者性和厚沉深可以治病形似牛舌緊緻者善蜀所生藥尚多如川之巴豆峽之椒梓之厚朴尚數十輩黃葩翠葉圓實而澤咀久還甘或號菴勒右餘甘子生戎瀘等州山樹大葉細似槐實若李而小咀之前苦後歆歆有味故號為餘甘核有稜或六或七解伽黃毒即本草所謂菴摩勒者長葉叢生背㸃星布髙醫近識傅疽可愈右金星草生峨眉青城山中葉似萱草其背有㸃雙行相偶黃澤類金星人號金星草亦云金釧草皆以肖似取之今醫家以傅疽創甚良金花之露俗曰鳯類緑羽纎爪藻皆翠尾花落則隱以是見貴右桐花鳯二月桃花始開是鳥翔羽其間丹碧成文纎嘴長尾仰露以飲至花落輒去蜀人珍之故號為鳯或為人捕置樊間飲以蜜漿哺以炊粟可以閲嵗蜀士以繪扇唐李衛公嘗為賦絳質剛啄孱黑于襟因網就羇亦馴厥心右紅桐觜出永康軍山谷中絳體若赭惟羽間差黑人亦蓄之然不能久也緇緑厠采喜荏充膒奮頸陪腮矜健於咮里人裒資以佐其鬬右荏雀每嵗荏且熟是則羣至食其實性好鬬人捕之裒錢使决勝負閭里嘈觀至一雀直數千錢官司惡民贅聚每下符禁叱之茜首黑裳黃駮其羽厥鳴嚶嚶若禁若護名而不情盜者猶懼右護花鳥青城峩眉間往往有之至春則啼其音若云無偷花果髣佛人言云緑衣紺尾一啼百囀可樊而畜為世嘉玩右百舌鳥出中蜀山谷中毛采翠碧蜀人多畜之一云翠碧鳥善效他禽語幾數十種非東方所謂反舌無聲者往往亦矜鬬至死不解然捕者告罕故惜之不使極其擊云狀實猿類體被金毳皮以藉馬中國之貴右狨威茂等州南詔夷多有之大小正類猿惟毛為異朝制內外省以上官乘馬者得以狘為藉武官則內客省使宣微使乃得用羊質而大角繚於首以角之珍軀殘獵手右龍羊出吐蕃及威茂州形似畜羊而大其角繚上重八九兩黑質而白文工以為帶胯其用亂犀玃與猿猱同類異種彼美豐肌登爼見用右玃出邛蜀間與猿猱無異但性不躁動肌質豐腴蜀人炮蒸以為美味有足若鯢大首長尾其啼如嬰緣木勿墜右魶魚出西山溪谷及雅江狀若鯢有足能緣木其聲如兒啼蜀人養之二丙之穴厥産嘉魚鯉質鱒鱗為味珍腴右嘉魚丙穴在興州有大丙小丙山魚出石穴中今雅州水有之蜀人甚珍其味左思所謂嘉魚出于丙穴中比鯽則大膚縷玉瑩以繪諸庖無異雋永右􅫀魚出蜀江皆鱗魚而膚理似玉蜀人以為鱠味美黑首白腹修體短額春則羣泳促罟斯獲右黑頭魚形若鱓長者及尺出嘉州嵗二月則至惟郭璞臺前有之里人欲怪其說則言璞著書臺魚吞其墨故其首黑云長不數寸有駮其文淺瀨曲隈唯沫而羣右沙緑魚魚之細者生隈瀨中狀若鰡大者五寸美味蜀人珍之鯫鱗么質本不登爼以味見録雖細猶捕右石鱉魚狀似􅻚䰲而小上春時出石間庖人取為奇味蟲質甚微翠體金光取而橋之參飾叉梁右金蟲出利州山中蜂體緑色光若金里人取以為佐婦叉環之飾云緑菜贊石刻在蘆山縣古廟中黃庭堅蔡蒙之下彼江一曲有茹生之可以為䔩蛙蠙之衣采采盈掬吉蠲銑澤不溷沙礫芼以辛鹹宜酒宜餗在吳則紫在蜀則緑其臭味同逺故不録誰其發之班我㫖蓄維女博士史君炎玉宋紹興甲戌知縣徐閎中跋云山谷老人緑菜贊刻石于蘆山縣廟不記嵗祀典型儼存贊末有史君炎玉之句讀者多所未喻蓋指言眉陽望族史氏女名琰者琰字炎玉髫丱資頴嗜學蘋蘩線纊一不經意志業専確乃博古善績文雅安張士儀諱誾少卿出守純陽聞其才且賢納為冢嗣子履諱祺之婦炎玉之歸於履性素冲淡不事鉛飾服浣濯之衣日逰心于編簡翰墨平生臨覽之勝燕笑之適與子履詩詞酬唱格調間雅久而盈篋手自叙次目曰和鳴集善用秃筆字體莊徑少卿愛重之殊不責以中饋之職厥後少卿幼子介卿諱祉擢進士第調眉之青神尉是時山谷老人謫居涪城遡流見介卿誦親親之好蓋少卿之室江南黃按察諱廉之女弟於山谷老人姑輩也炎玉配子履實其親表因騰書致緑菜為信山谷珍其品作贊謝之有曰班我㫖蓄惟女博士史君炎玉猶古女校書之褒云盧山楊與權諱巽先生年垂八十炎玉宅相也大觀間以行藝為郡學正每休沐以甥禮侍見相與窮日論文且評課試近題淵源端緒不減謝韞解圍之辨傳播諸生咸推仰焉與權謂其才美秀嘗見許於文章宗匠慮嵗久湮沉無聞詳具本末屬閎中記叙載石勉從其請移建離堆山伏龍觀銘并序馮伉夏書禹貢導江瀆以出岷山秦史河渠鑿離堆以泄沫水懷襄昏墊之瀰平之於前以陂九澤以通百貢於是乎錫圭鑄鼎夏后以膺圖立極瀦洳澒洞之患濬之於後以疏二江以灌萬井於是乎鬬牛沉犀李公以興利除害大惠浹於黎獻豐功遺於億萬其極一也與夫鄭國分渠於渭上西門引漳於河朔思效其博倍將萬矣左思曰指渠口以為雲門灑滮池而為陸澤不其然乎非夫有道之士其孰能勇斯身仁斯民輝照竹帛豐潔祠享如此其光也詳夫驅風雲運神化剪妖厲謀疏鑿功廕萬世夀踰百嵗其在神仙之品得非漢天師許旌陽之徒歟離堆山伏龍觀者風俗傳云誅邪厭怪之所腴田沃野之㑹驚湍湧雷潄瀨飛雪洪流滉其淡薄回波潏乎溶瀜爾其雲壁髙折霜濤中注靈阜嶙峋以磅礴冲淵澎湃而瀺灂硠硠灘滸清振林谷有若長蛟斷於陽羡支祈鎖於淮泗勿復害矣每嵗孟春役徒萬億計太倉為之給粟長吏為之督工築之繩之决之防之乘時以興比月而息枝分派散環縈糾錯連州越郡膏沐千里雖密雲霮䨴愆陽藴隆而田原是濡倉箱是粒書不云乎岷嶓既藝沱潜既𨗳蓋坤維之上游天府之陸海也爰建福地聿崇仙觀旌哲人之餘烈慰生民之報德固其宜矣伉常覽舊史燦然神迹式將王命躬率僝功歷載惟三闕芟草以廣其趾積石以增其窪遷舊宇之翳薈即孤山之顯敞洪流壁轉列峯屏合東臨江口之關故靈基立其左崇功之義也西瞻寶室之穴故仙亭峙其右思𤣥之㫖也正居太上之殿中築朝真之壇喬木蔽乎陽岑闕激乎隂壑石頭虎踞之狀蓬丘鰲冠之奇呂梁縣仞之險吳濤逆奔之勢羅列在目殆非人世之景闕嘯於谷風𤣥鶴幽鳴於浦月白雲生座上拂仙香彩霧依巖下傳天樂聖上凝命穹昊躋人福夀訪道以清中夏軒轅氏之理也望秩以遍羣神有虞氏之勤也兹地也名山周映靈跡孤標僉移集道之宫尊為逆釐之府事非改作功無用勞不革舊名惟崇新宇經構輪奐之狀助揚穆清之化真風奇蹟等天地久不亦盛乎不亦永乎拂石刻銘於彼山趾其辭曰季公英契日貫其誠奇功美利于今有靈仙鳬屹峙𤣥都景明壇殿新製門闥舊名江沱泚泚揚漣玉清岷山峨峨回風雪零桂菌朝蔚漪瀾夜渟乘雲嘯歌浮丘赤城全蜀藝文志卷四十四
