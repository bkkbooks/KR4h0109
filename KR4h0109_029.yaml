body:
  text: 全蜀藝文志卷二十九明周復俊編書上蜀帥韓密諫書宋范鎮鎮聞聖王之治以得賢為首而賢之登必本于鄉也故登于其鄉則知所以為人父知所以為人子知所以為人兄知所以為人弟而慈孝友恭惠聰質仁秀出於衆者可得而官使周之王制家有孰黨有庠遂有序國有學簡帥教者而賔興之故其詩曰濟濟多士文王以寧漢則漸焉繇芻牧而起者有之自賈豎而奮者有之亦已小駁及其下郡國以賢良方正遜讓之詔而班固云大漢文章與三代同風有唐㳂隋制専用詩賦䇿論而升黜爾時美談之尤尚者若同人舉然故開元元和間號稱得人之盛國家順考古道思皇多士四門允穆而畜德積行無壅閉於上數路兼收而藏才韜能絶沉冥於下受大小以咸足象逺近而弗間內有伊周之德之美謨明而告猷外有甫申之才之珍蕃宣而樹教固宜宅巖廊而髙拱造大庭而與稽恭已無為仰成左右而已尚且深詔執事求之如不及豈非首賢而為治乎逖矣西土上當井絡之次下亘坤維之隅江漢炳靈岷峩儲精自司馬相如王褒何武揚子雲之生遺風流聞不絶若線近年移三互之法除限口之令而揚軒戺服王塗者嵗聞起閭閈逰聖閫者日有方朝廷申大比之期而執事當敦遣之職其為書自干薦者以百數至如服儒學之舊屢困不更其守則楊助髙行誼之履懿誠以發于辭則章君陳楊韻李綱何褧趙衆謹子弟之帥美聞已彰於時則李南紀吳師孟李慎修其間事業美中忠信待舉懷良玉以被褐藏穎錐而處囊者豈可勝道哉伏惟執事春風以煦之白日以暴之定鑑以臨之誠衡以平之使其揚芬芳破暗昧定好醜審重輕而後先方物之貢利國光之觀者豈惟諸生幸甚亦西南幸甚若鎮之能薄才謭進之使與計偕可也退之以警不肖可也異日明天子再拜受書三薰而進加地進律以舉上賞之典賜弓若矢以推蕃屏之數褰棠連袵于于而來鎮文陳於此者直以方今濟濟以三代同風之辰而同人之舉或幾於息矣伏望執事憫其狂僣開懷而恕接之干冒台嚴伏深戰懼上田密諫書張俞五月十三日張俞再拜密諫明公閣下四月二十四日郫縣公人至山伏䝉台慈特賜鈞翰并示所撰故九河公真後贊墨圖一本伏讀詳思莫窮文㫖觀夫九河公之治蜀始則平暴亂雪民於湯火俾權臣姦豎側目而不動終則立條教納民於軌物俾遺黎生齒懷德而不忘固乃天下之豪傑宋室之循良也惜乎不遭大用後嗣衰微而讒口囂囂陷為酷吏兹蜀人憤恨之日久矣閣下後其治五十年思以德教綏靜蜀國用能觀其故事不掩厥懿揚其遺風乃作乖崖後序贊夫乖崖者非自譽也而世不通其㫖凡論其美必曰乖崖公其辭章者亦曰乖崖公其甚謬者則曰張乖崖繇是乖崖之號顛倒漂溺不復正之者逮五十年矣今閣下後其贊而辨之曰乖不違正崖而厲公名雖自貶有激於衷繇是乖崖之義判然而明賢者之志炳然而光衆人之言了然而不惑是閣下能盡九河公之心可謂明矣世之人則不然見人之善則忌害掩蔽生其瑕疵蹈人之事則毁詆變更掃其軌迹務成其私不顧笑僇安肯譽前人之尚可道哉閣下獨矯然不私與天下同其說可謂公矣古之人不得志於當年必遺意於後世以俟知音若乖崖者非閣下誰由明之三蜀之人既思九河公之德復愛閣下之頌其斯文良為不朽矣俞愚暗不達亦欲張閣下之文以俟史官修九河公傳得以采焉上蜀帥書前人張俞再拜奉書密諫明公閣下世言古之大聖人必曰三皇氏五帝氏羲農在上古其道不可復行故後世唯以堯舜為法歷百聖莫之能易而學者遂傳禹尚不及堯舜俞謂堯承四聖至治之業在位七十載故能道德行于天地萬物陶乎無為其後洪水暴於九州十有餘年生民流宕彛倫壞亂堯視天下之溺如已之溺乃博咨衆工若臯陶之倫咸不克其事然後舉舜舜亦不能治然後舉禹果能治之遂成大功及舜有天下若堯之治乃美禹曰地平天成六府三事允治萬世永賴時乃功是知滔天之害雖堯舜之聖必待禹而治之茍當時不得禹也生民其如何後世其如何愚恐君臣父子不為魚鱉則九州萬國淪於海矣安有今日之治哉故謂開闢以來羣聖之功唯禹為大由乎此也百川之長有四瀆而江河為大江出蜀之西徼禹乃生於西羌石紐其地也今淫鬼無名叨蜀民之祀者逮將千百郡縣猶能有之而神禹為蜀人江漢為蜀望大功格天地利澤施萬世曾不得享蜀之祀若一淫鬼斯闕禮之甚者俞嘗恨焉伏惟明公治蜀滔滔江漢盡在土宇宜作禹廟用康斯民昔尹吉甫作詩美申伯則曰王命申伯式是南邦因是謝人以作爾庸又美仲山甫則曰德輶如毛民鮮克舉之維仲山甫舉之言政事甚易而人不能行維仲山甫獨能舉而行之明公有申伯法度南邦之德有仲山甫賦政於外之功蜀人愛戴期乎無窮若禹廟之作政之易者衆不能作之明公若能作之可謂存乎聖而順乎民也豈挾太山超北海之為力哉俞近述南賓羣修禹廟碑文一首其道備其事直文雖浮濫理或庶幾方刻廟石以示後世謹録一通上獻謂狂夫之言而棄之不敢逃戾若謂斯言可采斯廟可成宜載事於金石則江漢無盡明公之德亦無盡焉答吳職方書前人俞頓首二三月至𨗳江遂入山復歸治弊廬加以人事久不啓訊辱四月二十七日書良釋思仰之勞相示府公謂俞所作講堂頓為叙已之德於書銜立石禮未便安俾别為記聞之惶恐俞逰天下二十餘年知識士人甚衆然未嘗以文字求卿大夫之知去年十二月何侍郎語僕曰府公興學大作講堂願為之記及行又云記成願示其文今年二月醇翁見語亦如何侯自李伯永趙先之父及諸士大夫纍纍相問講堂記如何思念國家大興學校三十年來凡作孔子廟記州學記者遍天下殆千百數爛漫甚矣古未嘗有也且蜀郡之學最古又世傳其文翁講堂久壞今府公復作之髙明宏壯上可坐五百人非列郡之可擬茍欲作記則土木尚未足稱也且記之名又不足鋪揚講堂之義唯歌頌可以傳於無窮文既成投於府公辱書云求記若銘爾今以頌為貺顧何德以堪之奚可輕示於人僕竊思之以文辭淺陋邪不示於人實惠之大者也茍以府學不可為頌邪則古人作之者多矣自漢至唐文章大手皆採風人之㫖以為賦頌凡宫室苑囿鳥獸草木君臣圖像及歌樂之器意有所美莫不頌之不獨主於天子乃名為頌晉趙文子室成張老賀焉曰歌於斯哭於斯聚國族于斯君子曰善頌漢鄭昌上書頌蓋寬饒顔師古曰頌謂稱美之班固皇甫謐皆曰古人稱不歌而頌謂之賦王延夀曰物以賦顯事以頌宣匪賦匪頌將何述焉馬融長笛賦序曰追慕王子淵枚乘劉伯康傅武仲等簫琴笙頌作長笛頌嵇康琴賦序亦曰自八音之氣歌舞之象歷代才士並為之賦頌又若揚雄有趙充國畫頌史岑有鄧隲出師頌蔡雍有胡廣黃瓊畫頌楊戲有季漢輔臣頌夏侯湛有東方朔畫頌陸機有漢髙祖功臣頌袁宏有三國名臣頌劉伶有酒德頌馬稜為廣漢太守吏民刻石頌之蔡雍美桓彬而頌之崔實為父立碑頌之至若袁隗之頌崔實劉操之頌姜宏李膺陳實之頌韓韶郭正之頌法真趙岐之頌季札若此之類史傳甚衆略舉數者以明體要又沈約之徒文章冠天下其所博見通達古今皆為頌述以美王侯至唐文章最髙者莫如燕許蕭李梁肅韓愈劉禹錫輩未有不歌頌稱賢人之德美草木之異者僕故取其體而述講堂頌焉則頌之義豈有嫌哉且郡府之有學校學校之有講堂乃刺史為國家行教化論道義之所又非刺史之所自有也其於義可頌乎不可頌乎與夫頌一賢人美一草木其㫖如何且自漢已來千數百年通大賢文人史官未有以頌不可施於人美於物而有非之者俞竊推府公謙恭畏讓以頌名為嫌應以鄭康成孔穎達解魯頌之義也故未敢以書自陳今足下見教果以府公之言謂體未便安而云重撰一記鄙人豈敢復欲妄作以取戾乎况夫講堂頌者始稱國朝文章之盛次述府公興勸之遂明學者講勸之義終美宣布之職振天聲於無窮庶乎詞義有可采者也至於鄭康成孔穎達云魯頌詠僖公功德才如變風之美者頌者美詩之名王者不陳魯詩以其得用天子之禮故借天子美詩之名改稱作頌非周頌之流也孔子以其同有頌名故取備三頌又曰成王以周公有太平之勳命魯郊祭天如天子之禮故孔子録其詩之頌同於王者之後又曰頌者美盛德之形容今魯侯有盛德成功雖不可上比聖王是得臣子追慕借其嘉稱以美其人故稱頌凡孔鄭之說支離抵牾如此昔鄭伯以璧假許田春秋非之晉侯請隧襄王弗許于奚請曲縣繁纓以朝仲尼曰唯名與器不可以假人武子作鍾而銘功臧武仲謂之非禮季氏舞八佾於庭孔子曰是可忍也孰不可忍也子路欲使門人為臣孔子以為欺天孔鄭既為魯不當作頌而曰借天子美詩之名而稱頌是名器可以假人也孔子曽無一言示貶反列二頌為經孰謂孔子不如林放乎噫頌而可僣則僣莫大焉亂莫甚焉非聖人刪詩作春秋之意也且孔鄭解經時莫謬妄此之妄作何其甚哉傳曰夫子沒而微言絶七十子喪而大義乖蓋章句之徒守文拘學各信一家之說曲生異義古之作者固無取焉僕亦取焉足下以為如何忽因起豫遂答來諭非逞辨而好勝亦欲釋千載之惑用資撫掌解頥且假一言介于府公可乎如曰未安願復惠教上吳大尹書楊天惠某蜀之淺丈夫也知蜀之故二三䇿而已矣蓋秦宓之論天帝㑹昌之詳神禹石紐之生三皇柢車之出頗譎誕不經而左思之賦兼六合之交㑹總八區之豐蔚跨諸夏之富有復浮夸少實惟是風俗文順自古以然傳記所録者是可觀也其大者漢有司馬相如王褒揚雄唐有陳子昂李白咸以文詞為世宗長然夷考於史相如之文以楊得意而顯雄之文以容之薦而彰子昂之文以上書而達顧不知當時牧伯大人為誰獨無一人能無半語扳數子而發之者蜀去長安東京為險逺計一時牧伯之選必其世議所謂材任公卿乃為之數子既豪傑士其文采艷發初弗自閟又近在宇下宜易知察方且親以身臨之竟不能回一盼之勤為若人寵其他則又何說也且使數子戀戀鄉里不一逰京師則上林之雄麗羽獵之崛竒感遇之頓挫其遂堙矣乎肉食者安忍處此蓋君子之用世莫樂乎得材邇臣之報國無大於薦士夫惟王襄為刺史薦王褒蘇頲為長史厚李白良可人意然漢唐上下數百年獨有二公耳其難得如此嗚呼某之生也後不得與斯人接也而乃今於閣下幸見之閣下道德純明名實奧美以法從之貴主盟斯文以方面之尊愛燾士類自開府以來西南文藝之俊聨薦墨附賔籍者焯焯有聞矣其髙者殆將與之同升金玉於王度其下者猶欲使之有立鼓吹於儒林以故搢紳歸仁人物慕義而某此時以貧寠之故受㕓岷山之陽食指猥衆待耕耨而後飽誠不可一日捨穡事以遊其何日以來雅拜於大君子之前重以不幸有幽憂之疾有癖違之纍先自絶於明時亡所用於天下慙恐遁匿不復自齒於人倫尚敢驤首卬臆希咳唾餘澤於一二英材後邪今者穡事有間舊疾小愈妄自念言前日聨薦墨附賓籍者非某同社之良則皆旁邑之望也此其與某拜賜何以異故願上名謁仰慶門下之多獲俯賀吾人之有遭焉而不敢有所請謹治書具刺載拜奉獻以代將命者之詞伏惟閣下引之斥之前之卻之惟命之須弗敢知也不宣上制置使書黃源源竊惟蜀視中原最險逺最僻陋自古用天下無以蜀為也然秦漢不得蜀則不能東鄉與大小爭衡而吳晉以來立國於江左者每每倚蜀為重蓋漢資蜀富饒以自給山西之形蜀之力勢相半焉當此之時蜀得十二蜀居吳楚上流而吳視楚為西門楚視蜀為巨蔽蜀一動搖而吳楚皆不帖席矣當此之時蜀得百二顧今有秦漢規畫天下之權有江左憑藉江淮之勢資於蜀而恃之以為守其勢與力二者兼取之則蜀在今不翅天下重也天子往嘗以執事鎮瀘又總戎於蜀口今又舉全蜀而畀之執事者總制焉此非天子以蜀重而蜀以執事重故歟自古用蜀者諸葛亮當第一而李德裕次之德裕南抗夷北引天下之力以自重其為功易就而亮獨以蕞爾之國南抗蠻西抗夷東備吳北敵魏無天下之大援而功視德裕過之夫亮為力難矣然而猶未若執事今者之難也昭烈之後亮一步不出大城門者三年而後為渡瀘之役而後為渭上之役夫堂之不植則其本顛大城其堂也故三年而治之藩之不固則有後憂蠻夷其藩也故力戰而服之蜀已安矣蠻夷已服矣於是乎出其兵以與魏人角於其門亮之用蜀本末如此視德裕為難而視今猶易之也當今執事實難焉萬斛之舟順流舉帆一日而千里何則因於水之勢也夫因其勢而順導之則茍有志焉皆可以成事勢不足以自强力不足以有為而求以立大功於當世蓋唯有道者能之而英偉豪傑不世出之才不逮也某愚意今蜀之力其强盛充實不若亮時逺甚而縱橫施設先後次第之功惟吾之所見務在利社稷而不為嫌者又非亮時比夫任大責重與古無以異而憑藉扶持之勢絶不可同日而語則執事之為力顧不難於亮哉雖然執事有道者自始鎮蜀迄今五年於兹譬之一元之運生生化化無一草木不被而道德之威凛然人望而畏之在民則和在軍則肅莫之為而為之者此天人也蓋其力十倍德裕而過於亮天子寧虛鼎席而久勤執事以蜀凡大庇吳楚而勢有不得已也某老矣往嘗以下吏趨走於執事之前既辱知之矣得闕猶逺願備一官於麾下究觀執事德業之萬一退而終身行焉以毋負知遇之渥執事其幸進之否乎俯伏俟命上汪制置書王咨某聞之佚勝勞治勝亂佚與治在我勞與亂在人此非兵說也用國說也勢相衡事相權能得其機而執之則先者勝夫惟在我者無宿憂則其力全力全則有成謀處我於佚與治乘彼之勞且亂有所不動動必有濟譬如人之一身將與人鬬當無事時必思休息屈伸使筋骸之㑹無不舉之處夫是以能待敵於卒然而無後憂如無故而先自勞其身以犯風雨暑寒之變則病將起於腹心而中先潰自謀且不給何有於制人以六國而敵一秦六國之力全秦雖强無奈其為從也而六國者汲汲然不能以一日此其勢不歸秦而何歸天下皆曰晉之東不能濟一甲於長江之北履神州之故封自今觀之有不足怪何者上流之勢皆移於人一變僅止一變隨起所因且藉者皆內自戕賊之自古圖畫中原必兼用蜀而我初不能得既復不能有一失於李雄再失於苻堅三失於譙縱猶初無蜀也我既勞且亂幸彼之亦然故能支四大變于搶攘之餘此天也凡用國必有根本之地培植擁護當使其不搖取之常不盡其財而用之常不盡其力是故愛根本如愛吾命而後可圖也今天下根本在蜀蜀根本在兵與民憂在民則不恤兵憂在兵則不恤民通而一之以故吾國實有統府在及今無戰時當使優遊而不勞靜治而不亂二者朝廷已寄之重臣開府而來一切鎮以清靜凡所施設皆為國家惜大體而壅培其根蒂環數千里之地夜郎牂牁之境前此時斬艾草木以邇吾封乃今帖帖不敢少肆蓋西南一靣可賴矣天子注想名德考朝家登庸龍首故事在公已晚顧宣威虛府未有以畀蜀事者雖然上豈以一方易天下大計哉其自此歸矣而某預為蜀憂何者時方用兵符檄星流急科嚴征民曰不得已不敢怨今號為無戰而所在嗷嗷不異鄉時不知有急復何以加之諸葛孔明用蜀賦養蜀兵閉關息民十五年而後出之師行不能越五丈原國已坐困蜀之力易屈也今宿師十萬幾三十年盡西南之力以給而內郡至無備汶山以西邛筰以南牂牁犍為之壤皆控帶外夷綿亘交趾而髽髻氊喪與我互市雖扼形勢之地無宿儲而有冗兵大抵爪牙脫落無全力矣盜之於人也必其垣墻之不支雞犬之不聞而後得其隙焉今秦川三邑號蜀門戶而無急憂豈不足憂哉天下之險在蜀大山長谷綿數百里梯空棧髙入不可出非騎兵衝突之地敵之長技至此無所施此堅守之國也所可深慮者吾之中枵然而虛問其武備有役之兵有戰之兵問其財賦廩無見糧帑無藏鏹郡縣皇皇日不暇給而民之為生至不足賴非大臣見眇綿之幾誰當憂之往年閣下條邊事三曰舉守臣曰訓土丁曰督軍儲而近者不許縣邑括隱戶之賦此皆深思長慮為保護根本之計所以惠蜀甚厚將次第為上盡言之某尚何所伸其喙雖然嘗試妄論今之急政五一曰嚴戢貪吏之侵漁以杜邊釁二曰大考守兵之赤籍以責實用三曰明絶郡縣之誅求以開民生四曰痛省官吏之冗員以去浮食五曰盡蠲積年之虛額以寬期㑹蓋邊本無事而貪吏生之軍本有籍而姦濫冒之調度既不得已而言利之人欲根株盡之經費至不能給而無益之員又蠶食之至若歲月之虛籍終不天降地出徒使其急征他取以赴期㑹如割股啖口竟亦何益誠莫若為之一洗使民輸以時穫而粟織而帛不至稱貸以重其困與夫上之四者皆以次舉行當此少休庶其佚而不勞治而不亂以備不戒此在執事一露章且卿者兵民之闕闕題失名十一月某謹西鄉再闕中大先生閣下冬寒闕間神衛行府台候動止萬福某山林草野之人自揣愚暗昧於事機平昔絶口未省對人敢談世事然方此變故搶攘之㑹正執事兼收博採不棄芻蕘之時矧傷弓之禽痛罹兵革流離間關僅貰一死於數十萬里之外者嬴三十年矣時安與安時危與危偕兩蜀之人同舟而濟風濤之憂方在汹涌不得晏然髙眠獨謂無事是亦某可以效言之秋也敢不避出位之誅輒以管見塵冒台嚴人微言輕犯上不恭特恃其素䝉知眷言之當否未必加責而執事有愛人之心洞先見之機誠不忍瀕流數百里之民將墜塗炭慷慨一言惟裁察比見州縣承准關報制司已差發州軍一千人用鈐轄甄宣贊將之又勾抽思州田家義軍亦一千人將併屯䕫州當此之時兵不厭多廣張聲援實兵家宜然川軍既是官兵部勒得人緩急之際不為無益師行以律寧有它虞至於田軍有可議者此輩本是化外蠻夷性猶猿猱無復亷恥行無紀律居蔑營陳乍入華地飢窮寒乞見利動心輕生忍死勇於敓攘所過畜牧室廬為之一空又有州縣遊手失業之人負犯亡命之衆亦為之用鼓唱氣焰導之為惡隨衆前驅作孽尤甚又器械濫惡衣服藍縷無長矛大㦸堅甲利兵臨衝兜鍪攻戰之具所習恃蠻牌偏刀手弩藥箭而已其徑弦逺矢發不過三四十步使之跳躑山林䝉蔽草野狙伺間便潜機暗射挈短求長或有可用至禦大敵直兒戲耳竊意建此議者必狃於頃年幸勝王闢於油口便謂足以倚仗此所謂知其一不知其二也殊不知曾無毫髮之利而已有丘山之害矣彼王闢者烏合叛卒敗亡之餘鎧甲不備人馬赤露初以此曹為不足畏易敵輕進數騎輒前不虞草間毒矢竊發卒為見困藥潰淋漓旋踵顛仆其餘倉皇退散山險道狹首尾隔斷不得相救遂為邀截得三二十騎於是張皇事勢妄要功賞所效首虜多殺平人恣為欺罔官司幸其成事便以為然遂以竒功權分故有所扞格而不得行乃今蜀中外之事盡制於統府此非可為之時乎願深念之某西山之鄙人往年不度其賤數袖書請見而下執事降色辭接之調一官躬耕待次日既一年從父老遊而目世之病因六纛之東故敢妄有獻焉去作巖邑甚懦不武預以不治為兢兢然有盟不寒决不至為蠆尾以負所學不自知有庇身所也幸甚幸甚答李悅之榜雲安尉㕔後小堂回馮公書馮時行某再拜奉違之久如想古賢哲日不置也馮某人至備聞啓處之詳足以開慰即日春晚伏審神仙無事之職履况清裕為喜中間䝉惠又使夷叔筆其說刻之石老友何其自得之淺也古之人以友天下善士為未足又尚論古之人誦其詩讀其書謂之論世尚友此孔子以堯舜文王為友孟子以孔子為友其下揚子荀子以孔子為友射者之志於的射而志的猶不能中况又不志的則射東中西矣况士須蓋棺五百年後是非乃定如僕不答老友書幾半年矣老友必思舉其榜與記而棄之作事如此豈理耶吁老友之賢世無有今世士汚穢冗雜以為計而老友忍窮蹈義今世士諂媚茍且而老友獨耿介不屈中心之所得與夫所稟者某贊嘆所不能盡但亦有病病在不容不同類不能沉潜剛克嗚呼人世如此安得不隨波逐流以全真耶故孔子有危行言孫之說堯舜時可謂古矣彼時已有九德之說蓋不相濟不足以為行不相雜不足以為文况寥寥萬世之下耶某有病望老友砭石俱下老友之病亦不敢不相扶持與公相友盡此矣至於希慕望逺追古人勿近取也碎其石火其榜勿取誚於悠悠之人乃所願也匆匆不宣上䕫漕費達可論調田軍書杜柬之許之不知當是之時京西荆楚避地良民散匿山谷二三百里闕為其搜羅夷戮殆盡揆其酷毒百倍闢矣其初自思州進發比至闕屯西遡桐漕小舟凡數百艘凶焰薰蒸逺近愁嘆扶老携幼闕生業竄伏山谷不碎其手者亦幾希矣雖在州縣城市亦敢白晝剽奪官司坐視莫敢誰何某是時方到酆都目見射殺弓手節級蘇選排闥突入人家劫取財物淫穢婦女或驅虜入舟往往不還至今父老言之欷歔流涕不意今日又欲輕蹈覆車之轍不知將以控禦扞關且以䇿應漢沔耶若以守關則帥閫提兵近在歸峽比伏讀詔書且察道路之言虜勢衰弱思漢之民相望風靡捨逆歸順捷音日聞王師一動有征無戰固非前日陸梁之比萬一勝負兵家常事茍或小失支吾則帥閫全師必退保川峽深據天險數千之衆以一當萬足以克事何苦一旦無事自引醜類置之心腹之地天下將有底定之期而一日太平之後瀕江數郡生齒之衆先天下之人獨受此禍豈不惜哉有如萬一虜騎窺關金人自來攻戰必以精兵居先目為闕軍莫不身被重鎧墻進山壓自非神臂弓斬馬刀硬弩巨斧不能却也其勢非王闢之比乃欲以射鼠之機摧折其鋒此所謂怒螳螂之臂當車轍以童子搏賁育雖三尺之童誠未見其可也茍能輕佻故敢當前一為虜騎衝突則必恃其輕趫飛崖踔壁攀蘿引蔓四散驚走間入關內大掠㳂江然後還其巢穴當此之時我又能回戈以事剪伐乎此又其尤可慮者唐蜀人有言曰西戎尚可南蠻殘我不虛語矣大抵施黔瀘戎一帶羈縻熟矣居其鄉土以為邊障一日有變以夷攻夷使自相吞噬耳其習俗器械足以相制若用以當長驅不制之虜其不相侔亦灼然矣則是又不足以為漢沔後繼必也徒殫民力以供億之外憂未除自招內患果何賴焉靖康初王以寧以其先人嘗開邊辰沅又有沅州李允文者以新民擢第因范世雄自桂林入覲道過湖北二人建議以謂洞丁可用遂大發辰沅靖武岡闕邵鼎澧二萬人擢以寧河東節度以援太原虜人見之輒大笑榆次之役以鐡騎張兩翼徐蹙而􅏳籍之無一人還者此不堪用之明驗也紹興初䕫帥張公道從始調此軍張公威望素著力足以制其變亂雖已潜行劫虜猶有所憚間一歲韓公天啓帥䕫再招之即不能誰何矣公然於帥府通衢作過此事未逺尚可詢而知也即今上下人情固非恟恟憂懼某雖迫衣食當權輕重亦捨所圖旦夕遡挈孥纍逺竄矣意謂府城可以覼縷坐末㑹台斾出按不免僣易筆此書密懇雲安吳莭推置中投行府茍未必以為愚不曉事欲望速賜詢訪所至民情若瞽言不誣即乞移報制司與帥閫亟止其行或已符下思州恐蠻夷之情觖望生怨姑令申嚴㸃集以待緩急勾抽可矣昔苻堅南冦桓冲自武昌送卒五千謝安却之以為既不足增損徒令敵人竊我虛實今政使其卷土皆來無益於事况此羸殍餓卒千人非徒無益適足生事者乎且軍興之際百姓雕弊財用芻糧一出其力萬一㳂江遭其毒手瘡痍未合忽有調斂吾民不賴生矣兹執事大人所宜留心者也不勝懸睛西望急迫之情某每不量力嘗論自古夷狄更迭盛衰姑以李唐言之太宗刷渭水之恥逐突厥徙幕北幾犁其庭寢其皮矣未幾𤣥宗逺治閣羅鳳之罪一舉而喪師十萬自此西南兩畨合力拒命終唐之衰卒不能制國朝澶淵講解之後北方無事獨誅叛西鄙用兵幾至百年幸而自儂智髙來南蠻衰弱中間瀘戎雖小倔强旋即革靣然蜂蠆不為無毒狼子野心未保其往而爰自軍興保兩川者或不究事機援引醜類賴以濟功信其誣罔之言縱其殘虐之暴不惜節鉞使相以寵其身官其子弟稍入內地使之目侈城邑之美口極甘脆之味躬被纎麗之服習知山川之要害道里逺近雖其向化之心未遽其他萬一桀驁沉鷙之人出於間隙搖動邊疆未可知也此韋臯聽其遣子入學之弊深可鑒矣况邇來邊吏或非其人失撫綏招懷之道南平清溪連歲相繼小有風塵之警矣可漫不加省耶此又其大者逺者傳曰㳙㳙不止流為江河毫毛不剪將尋斧柯詎可忽耶先事而言類似迂闊狂妄敢於執事輒一發之併惟台察幸甚霜霰日嚴軺車在行敢冀於國家多事之秋為君父生民倍保台重不宣全蜀藝文志卷二十九
