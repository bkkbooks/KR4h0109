body:
  text: 全蜀藝文志巻四十九明周復俊編雜著即位告天文漢先主惟建安二十六年四月丙午皇帝備敢用𤣥牡昭告皇天上帝后土神祗漢有天下厯數無疆曩者王莽簒盜光武皇帝震怒致誅社稷復存今曹操主兵安忍戮殺主后滔天冺夏罔顧天顯操子丕載其凶逆竊居神器羣臣將士以為社稷隳廢備宜脩之嗣武二祖龔行天罰備雖否徳懼忝帝位詢于庶民外及蠻夷君長僉曰天命不可以不答祖業不可乆替四海不可以無主率土式望在備一人備畏天明命又懼漢邦將湮於地謹擇元日與百寮登壇受皇帝璽綬脩燔瘞告類于天神惟神饗祚于漢家永綏四海與羣下教諸葛亮大參署者集衆思廣忠益也若逺小嫌難相違覆曠闕損矣違覆而得中猶棄敝蹻而獲珠玉然人心苦不能盡惟徐元直處兹不惑又董幼宰參署七年事有不至至于十反來相啓告茍能慕元直之十一幼宰之殷勤有忠於國則亮可少過矣又曰昔初交州平屢聞得失後交元直勤見啟誨前參事於幼宰每言則盡後從事於偉度數有諫止雖姿性鄙暗不能悉納然與此四子終始好合亦足以明其不疑於直言也諸葛武侯廟古栢文段文昌是草木有異於草木則靈武侯祠前栢壽千齡盤根擁門勢如龍形舍碧太空散霧虛庭合抱在於旁枝駢梢葉之青青百尋及於半身蓄風雷之㝠㝠攅柯垂隂分翠開明忽如虬螭向空争行上承翔雲孤鸞時鳴下蔭芳苔凡草不生古色天風蒼蒼泠泠曽到靈山老栢縱橫亦有大者莫之與京於惟武侯佐蜀有程神其不昏表此為真斯廟斯栢實播芳馨誡子元膺文偽蜀王建永平二年漢州什邡縣獲銅牌上有六十二字建嗣子更名元膺字昌美符銅牌膺昌之文建以元膺年少權重命文士為文誡之曰吾提三尺劒化家為國親决庶獄人無枉濫恭儉畏慎勤勞慈惠無一事縱情無一言傷物故百官吏民愛朕如父母敬朕如天地汝襁褓富貴不知創業之艱難更汝之名上應圖䜟勿驕勿矜勿盈勿忌惟敬惟誠惟謙惟和内睦九族外安百姓赤心待羣臣恩信愛士卒刑罰人之命也無徇愛憎姦邪國之賊也無信纔構絶畋逰之娛察聲色之禍然後能保我社稷君我民臣吾蚤莫戒朂恐汝遺忘當置於几案出入觀省下蜀國教孟知祥取威定霸乃公侯權變之方捨爵䇿勲乃皇王叙酬之典其或兵屯萬旅地廣三川周環列國之山河奄有全蜀之封部儻不從權而徇衆則稽錄効以報功今禀命於中朝得專制而行賞但念承世家之餘慶受旌鉞之殊榮自領成都于兹半紀窮奢極侈固斷意而不為講武教民在安邊而有作往歳方勤述職務保永圖不幸諸藩構成深隟此際主兵將帥争陳排難之功運䇿兵僚咸展出竒之略因興武旅分蕩渠魁累破竹以焚枯連開疆而拓土其次諸司奉職庶吏推誠咸著勲勞豈忘奬荅一昨聖上以顯分忠佞遂降冊封礪岳帶河銘大君之異寵輅車珠冕表列國之殊榮仍示優崇俾行墨制上自屏藩之任下及州縣之官凡黜陟幽明許先行而後奏自可保不僣不濫之典賞立功立事之人必無患於不均庶有覬於允當布告遐邇咸使聞知錄民詞按此為張忠定公詠作宋阮昌齡景徳三年秋九日蜀民康平上欲天下皆如蜀也遂召我公以歸將行僚吏儒士洎外學之人咸發謌詩以稱道盛徳而民吏謡頌無以上達屬邑吏陳留阮昌齡錄其民詞以獻國無忠貞遐僻孰禦治非禍亂英雄孰覩順賊始平焚溺無主帝聞憫然曰公汝處公不宿命臨機威撫若潦而暘若旱而雨若饑而哺若嬰而乳氛沴廓清餘梟尚翥元戎矜功沉吟翫侮公氣如虹言發樽爼膽肝四落再造蜀宇廻車未停賊熾復舉賢臣迭治秦豎孰愈公在雍都帝憂密諭捧詔秣馬足不入户炎風劒山五日而度公之來尸一從舊矩公之至日衙從雲委旦驅暮警執刃挾矢公曰自疑民疑何弭擯而去之權震千里公至之始獄不容質躬詢親决百不留一禁倖塞姦削枝從實以今方舊年不及日僣闕遺則五門三閾朝西承天規號弗革公為偏署州郡之式盡革舊制以斷民惑玉壘之西禽戎獸夷公爵其帥誠而禮之刻已削俸以懷以綏萬里兇醜縻之軒墀翹翹錯薪歳貢霧臻文翁逺矣蜀秀無聞公薦其三張及李畋張達翩然凌雲企慕承化儒風大振大會舊規革偃波馳公曰頓拒民其怨咨萬衆所集必布姦欺首罪一夫路無拾遺西戎之利星精月駟舊貫峻嚴千不一至公寛其法鵝聨鱗萃蜀蠶奮種葉價日聳公教種桑廕疇庇壠歳不外求懽聲四踴豪居大宅覆溝侵陌輪蹄梗蔽姦宄遁匿公直舊繩廓然四闢周伯麗天帝億宋年訛言勃興咫步萬傳公誅狂魁風清兩川公醼賔友弗皷弗鐘奕棊排星鳴弰疊鋒爾威爾暇權在其中公歸内署弗跣弗寐夜息晝行集寅衙未必躬必親孰敢懈易蜀腰川頭春酣玉柄妙音俊毫惠黠修整公堂蕭然鍊眞弔影雷足蹄金盗機眉針竒名怪狀水陸之琛宮室罄然左書右琴無私於身不欺于人卑高無間毫纎必均逰之如海視之如春吾不知其仁我用既給我倉既溢子孫孝悌牛羊蕃息刑不横及吏不相賊吾不知其徳言發座右事在逺夷法成筆下名行九圍從權約制不間洪微吾不知其機賢愚必察親酬一平見始窮末罄理盡情若有鑑水若經權衡吾不知其明曰帝有詔公拜以愉爰膏其轄爰飼其駒曰鰥曰寡晨不俟夜胥立泣俟縶公之馬曰童曰艾昬不俟晨驚呼踴走招公之轅有曰弗可虛席黃扉彼濟天下我亦隨之兩康吾蜀公豈弗思公馬既逸萬涕交頥願繪神姿願葺生祠青山碧臯願留兩碑錄二叟語何耕立春日通天下郡邑設土牛而磔之謂之班春所從來舊矣其説蓋微見於呂令而詳於續漢禮儀志大抵先王謹農事之遺意也成都大都會自尹而下茗漕二使者之治所在焉將春前一日有司具旗旄金皷俳優侏儒百伎之戯迎所謂芒兒土牛以獻於二使者最後詣尹府遂安於班春之所黎明尹率掾屬相與祀勾芒環牛而鞭之三匝退而縱民磔牛民讙譁攫攘盡土乃已俗謂其土歸置之耕蠶之器之上則蠒孳而稼美故争得之雖一丸不忍棄歳率以為常紹興丙子余往觀焉見二叟立牛側一叟撫牛而歎曰是孰象似汝孰丹堊汝孰引羣吏爼豆而羅拜汝方旗旄金皷俳優侏儒百伎之戱雜然而前陳以導汝至此而空一府之人以觀汝也不亦榮而甚可樂歟俄而挺者競進擊者交下而汝始碎首折骨矣譟者奪者負者趨者而汝始蕩為游塵散為飄風矣嗚呼悲哉今夫富貴之家高明之門倚勢而怙寵役物以自奉嘘吸生風雲叱咤為雷霆偃然自以為莫已若也有不似兹牛之始至者乎及其權移而運去大者隕身赤族小者觸刑抵罪雖三尺孺子莫不聞而哀之有不似兹牛之既磔者乎吾悲夫禍福之無常而慶弔之相躡於俛仰之間也吾又悲夫造物者之戯人胡為而至斯極也吾是以歎一叟局局然笑曰子何言之陋耶是安從生自土而為泥自泥而為牛土不知其為牛也自牛而遭磔磔而復為土土不知其為牛也彼既不知其為牛矣則雖象似之丹堊之爼豆而羅拜之與夫旗旄金皷俳優侏儒百伎之戯迎而致之空一府而觀之彼且何榮而何喜乎哉彼既不知其非牛矣則雖擊之碎之敗之有之彼且何懼而何戚乎哉牛固無所喜愠而世之人方且認外物以為已有其未得也挾術用數以致其必來而其既去則猶殫智極力以幸其少留也可不為之大哀乎其有愧於兹牛多矣而造物者初何與焉莊子曰適來時也適去順也安時而處順憂樂不能入也子無庸歎嘗試以是觀之余竦然異其言追而問之若何為者也二叟皆不告而去余歸而録之蜀固多隱君子哉全蜀藝文志巻四十九
