body:
  text: 全蜀藝文志巻三十八明周復俊編記巳至真觀記隋辛悳源葢聞聖人抱一得一所以為貞君子謀道履道所以稱吉故縉雲訪襄城之任尚曰俱迷則天睹姑射之阿猶云獨歩嗟乘日於善巻𦕈思恭捐歎舍車於柏成顧慙長往方知太極之理元始之宗法于自然是焉名大雖四海之富不足以易其生也百官之榮不足以移其志也又有肆樂池之適警龍驂而載驅暢伊川之遊飜鶴駕而曽舉安期逺遯久淹廵海之勤淮南上征退深遺跡之慕斯亦念悳不怠自誠而明臨渤澥而陋河宫登㤗山而小天下者巳粤若稽古猗歟我皇匿犀戴勝握戈懐斗方堯即同八采類禹不减三寸勲彰歴試恩著登庸潜初飛五俟時而作顧盼而銷黒祲揖讓而處青蒲求衣於未明推食於巳旰研幾鄙城旦之書通奏開反支之日以萬邦之罪為罪故法約而刑清以百姓之心為心故兵動而民讋春路秋方果馬天馬之客榆闗銅柱皮服卉服之賔莫不重譯來庭同軌入貢鴈行魚貫輻輳馳道匡飾之功隆平之化諒足以頡頏軒頊孕毓髙光遐邇鬱搖長為稱首既而委裘多暇垂拱巖廊宴處超然澄懐塵累披九光之寳藴受三洞之真文追蹤繼東户之辰託夢等華胥之夕固以龍漢協期開皇闡其嘉運豈止明神分福勾芒錫其永年而已又乃元良體正維叡居宗光炳重離義髙匕鬯敬愛基乎百行温清備乎三善菀鳯條而振藻降虎闈而肄業含超起誦跨躡荘丕嶽峙淵凝實寧監撫繁椒之實棠棣之華陵陸睟鴻漸之儀藩屛諧麟趾之詠葭莩峻茂表裏禔福允文允武唐哉皇哉昔揚子雲有言曰或千年一聖或三聖一時沓矩循規亶其然矣蜀王秀者皇帝之第四子也禀太華之靈資恒昴之耀挺金氣之英賁玉田之榮天縱其哲日就其美純嘏内融温朗外照顔生殆庶香名肇於佩韘應侯順德嘉譽興於翦桐故能連衡言冉駢驪邢晉才膺俾乂事諧俞往開皇初便封蜀王㝷除上柱國總管益州道二十四州諸軍事益州刺史靈闕設險望重坤維和夷致功實稱天府選徒雲夢帯牛佩犢者風趨袨服菆臺擊轂成帷者霧合塗盈巷飲江滿棹歌水陸攸歸華戎是萃梁世崇文尚侈其失也淫周氏殉武任質其弊也魯暨乎今上帝悳載甄王猷載宣率履不越遂視既發纔質渾衡若被膏雨况復曹參出相重師黄老之術申公誨道更惇周孔之訓正之以幅彪之以文市獄靜而弗擾詞義粲而彌蔚苞姬旦之多藝兼季路之能官二難措而無疑兩條舉而㒺滯為其都鄙而經之闢其閭里而居之取其田疇以伍之修其庠序而教之四民肅然靡雜九逵坦焉如砥穰穰我庾邵父匹而知慙青青子衿文翁比而自媿於是綺襦擊壤連甍諠五袴之謡黄髪觀風同辭訢一變之善家給人足康季孔殷革弊遷訛㤗餘且洽夫聖主之訓紀綱皆在法施乎民明堂辟廱備昭令典矧伊長樂之舍紫書映空青之林扶搖之丘翠葢䕃琅溪之水懸珠若黍天人之衆畢臻浮龜似蓮神仙之侍俱集蹔遊而周六合一誦而懽萬齡其於攘大灾捍大患考諸咸秩尤宜進禮故以開皇二年正月下詔令於益州建至真觀一所云練日維庚瞻星在午王乃沉首怡然旴衡言曰大君有命渙汗斯𢎞佇雲衿於玉庭想鳯笙於金闕増左宫之㝠算極幽夜之重昏㴉濟同氓導俗何莫由此雖東海僊童頳鱗未覿而西州智士白駒可維宜務梓匠之勤妙盡求賢之選爾其前臨逸陌却負長瀛蕙樓接登景之房瓊䑓帯蕩真之室荷珠的皪花落車渠之沼竹色便娟葉埽瑠璃之地祥禽雜囀瑞草羅生神智之所安也薖軸之所般也法師京兆杜詵等並組織亷信礱練嗜慾特招之異士獨行之竒才不敢馮河窺驪龍之頷惟希負笈奉駮麟之駕吞星嚥月拳拳服膺謁帝愉皇孜孜拜首以為顯仁藏用天地忘亭育之功而蒼璧黄琮必陳敬恭之禮移風易俗聖賢遺芻狗之恩而拊石鳴球終致歡欣之樂故不知手之舞之足之蹈之共採他山式旍上善賛大道之根柢美盛徳之形容貽世作範乃為銘曰邈矣乾元悠哉樸散宇宙祏坦𤣥黄剖判氣合而亨物生而難運有因革時移昬旦紀龍名鳥行夏乗殷各炳其瑞逓襲其芬三代爰降九土斯分垂衮引道全徳罕聞惟聖作則惟皇建國混成庶類黙融群慝比景之南戴斗之北舟車所届何思不克英王分陜齊禮化民寛猛互設日輝月新下偃如草上煦如春行有餘力智即歸真肅肅靈觀祁祁吉人長懐緑輦眇覬瓊輪華隂霧曉台嶺霞晨或採芝鏡乍試丹銀東隣錦市竹龍飛轡西矚青城琳堂凝翠勿曰無象莫云無味居後必先處卑而貴謂仁逺乎義存克己謂室邇乎應在千里我祈錫𦙍神胥鑑止藩儀享禄鼎祚延紀子房告退志弗矜功曼倩朝隠史不紀終情深師古思結臨風永言逰衍方寄瀛蓬大隋開皇十二年六月日記再修大慈寺普賢菩薩記唐韋臯真如常寂色相假名法本從縁誠感必應大慈寺普賢像盖大煦和尚傳教沙門體源之所建也儀合天表制侔神工蓮開慈顔月滿毫相昔普賢以𢎞誓願於南贍部州賛釋迦文㧞羣生苦而塵俗昏智莫覩真相雖同諸法究竟寂静而隨所應為現其身即色即空皆菩薩行自昔鎔範於寺之東像成功巨莫能締構危棟洩雨頽墉生榛狐狸梟鷲號嘯昏晝於戲明可以照幽晦教可以達羣迷何廢興之變隂隲於㝠數昔大歴初有髙行僧不知何許人曰斯像後十年而復興我皇帝神聖纂圖詔四方藍宇修舊起廢斯其明效也臯因降誕慶辰肅羣寮戒武旅上崇景福齋於斯寺覩象王雄傑天眼慈矚禮足諦視怳如有神而廢故湫漏殆無人跡將何以招誘沉淪發揮誠敬逆南遷百餘步度宏䂓開正殿奉詔旨諭羣心千夫唱萬夫和奮贔屭荅穹崇横絙運巨力拔始雷殷而地轉􅣐雲旋以山迴面西方而聖教攸歸鎮坤維而蠢類知向于是平坎窞翦䝉籠横空准繩審曲面勢連廊靄以雲屬三橋掲其虹指廓廣庭之漫漫增重門之巘巘是知至道黙存於濁刼元功必啟於康時不然何神像巍巍冠諸有相久而弛廢将有待而興乎觀其左壓華陽之勝中據雄都之盛岷江灌其前趾玉壘秀其西偏足以彰㑹昌之福地𢎞一方之善誘安得不大其棟宇規正神居哉夫像設陵夷去聖彌逺定教者必滯於物遺物者亦住於空将求乎中𢎞我至教乃擇釋子逹眞原之所歸者于以居之臯授命方鎮十有七年求所以贊皇猷禆大化嘗以萬人之心不俟懲誡靡然歸善者釋氏之教𢎞矣况㝠祜昭報大彰于時崇而守之亦同歸於理也是用上承聖意䖍奉天心存像存教以勸其善貞元十七年十一月二十日記寳園寺傳授毗尼新疏記前人真源本於靜習靜者式乎煩情偽生於動制動者存乎簡昔我大聖如來慈救像肅全儀以軌衆持細行以護譏俾外縁不競内䕃皆空壽我法命留乎濁刼者非毗尼之藏歟是以大士優波離傳教引範攝身端矩白月恒滿意珠常凈自是龍象繼世光乎梵倫雖佛日久沉而昏衢不昧其後三百年中五部分流各從師説猶江河競注終合於滄溟耳目殊用同歸乎一體及乎像法淪正餘波東流始以華文傳譯梵字其顯微探奥合異歸同使𤣥闗洞開幽鍵莫閉安得不捜羅二藏派引羣流繁簡之㫖與時而用宜矣自餘光淪化六欲紊緒達摩已失於詞費恵逺未適於深微而太原素公獨得真奥旁求證據辯惑稽疑如立四分宗記猶懼𤣥源未暢妙理或遺引而伸之作開四分宗拾遺抄軸盈廿言成百萬足使迷雲開而聖㫖明邪網壊而羣心定然而學者尚以神分於廣明目倦於勤求道将得而心疲理未究而意殆廣文所以存義文繁而義亡簡言可以趣寂言約而真契大厯中故相國元公以大臣禀教授囑𢎞持慮水雜甘露味亡純正爰命薦福寺大徳如凈以為素公之疏傳矣五師之㫖明矣意已得而象可忘魚其獲而筌奚設将刪彼證諭獨留精真使理契惟一行歸無二法筵清衆匪勞而著功其文彌㝠其道彌廣不亦善歟大德乃歸心契㝠精啟聖意故繁而必削簡不遺眞可以趣𤣥蹤足以端覺行元公由是上聞俾施行乎天下坤隅三府各置律壇斯藍也炳異徵竒著于前昔復建壇宇俟兹𢎞揚屬精義初傳編錄猶少将使函丈請益披文究真臯鎮守方隅軍務之暇躬覽聖教永思𢎞益夫博以寘要世儒猶病簡以隣道真乘所先故曰苾蒭清净令法久住胡可以繁文而撓其靜正則薦福新疏精而易行信矣臯昔嘗莅職屯田佐元公于淮右覩公逹西方至教尚矣而代遷人謝遺志在茲洎余𢎞傳同贊聖意遂以俸錢繕冩新疏四十本兼冩法華疏二十本命寳園律大徳光翌總而行之爰集緇徒志行純深表儀端素二十二人隨給其疏以成其志庶止作雙就純而不襍彼翌上人者往親學于薦福性聰行真儀度可則又於莊嚴寺貞操大徳院聽受法華同契三昧俾兹講授以法幽䝉其有後學履操精全可傳其道者並刋名貞石以示宗歸為寳園靈壇傳授毗尼新疏記貞元十八年十一月一日建鸚鵡舍利塔記前人元精以五氣授萬類雖鱗介羽毛必有感清英純粹者矣或炳耀離火或禀竒蒼精皆應乎人文以奉若時政則有革彼禽類習乎能言了空相于不念留真骨于已斃殆非元聖示現感於人心同夫異縁用一真化前嵗有獻鸚鵡者曰此鳥聲容可觀音中華夏有河東裴氏者志樂金僊之道聞西方有珍禽羣嬉和鳴演暢法音以此鳥名載梵經智殊常類意佛身所化常狎而敬之始告以六齋之禁比及辰後非時之食終夕不視固可以矯激流俗端嚴梵倫或教以持佛名號者曰當由有念以至無念則仰首奮翼若承若聽其後或俾之念佛則黙而不答或謂之不念即唱言阿彌陀厯試如一曽無爽異余謂其以有念為縁生以無念為真際縁生不答以為縁起也眞際離言定本空也每虛室戒曙發和雅音穆如笙竽静皷天風下上成文念念相續聞之者莫不洗然而嘉善矣於戲生有辰乎縁有盡乎以今年七月悴爾不懌終日而甚馴養者知其将盡乃鳴磬告曰将西歸乎為爾擊磬爾其存念每一擊磬一稱彌陀佛洎十擊磬而十念成歛翼委足不震不仆奄然而絶按釋典十念成往生西方又云得佛慧者歿有舍利知其説者固不隔於殊類哉遂命火以闍維之法焚之餘燼之末果有舍利十餘粒炯爾耀日瑩然在掌識者驚視聞者駭聽咸曰茍可以誘迷利世安往而非菩薩之化歟時有髙僧慧觀常詣三學山廵禮聖迹聞説此鳥涕淚悲泣請以舍利於靈山用陶甓建塔旌異也余謂此禽存而由道殁有明徵古之所以通聖賢階至化者女媧虵軀以嗣帝中衍鳥身而建侯紀乎䇿書其誰曰語恠而况此鳥有𢎞於道流聖證昭昭胡可黙已是用不愧直書于詞貞元十九年八月十四日記寳厯寺記前人大覺神用保釐羣生怳乎其若眀皎爾而不昧隨願現革應祈無方茍脩之必誠其効之必速寳厯寺者劔南西川節度觀察處置等使檢校司徒中書令南康王臣臯之所創也臣臯以守司西蜀向二十載奉若睿㫖緝寧遐夷兵休邊陲人獲富庶天寳為徳顧何力焉而位日加崇禄日加厚思𢎞聖教以答昌運遂以俸錢于府之東南擇勝地建仁祠號曰寳厯章表上聞帝俞錫以銀牓天文炳煥昭誠也因締造方新述其經始之志用表貞石永貽将來間嵗以軍府多暇遵奉朝典行春布令渉江而南相彼原阜磅礴鬱起勢雄坤維阻濬流而人民不居盼近郊而黍稷翼翼惟蜀之土薄水淺居常墊隘将利其俗爰圖爾居乃架雙橋通習險規地勢分直繩人遷如歸一日成市豈不由樂我皇道豐其有家崇崇寳刹雄居厥右啟竒致也于是増峻趾列髙墉規梵天而立制集班倕以騁功邃殿耽耽以雲蔚危樓蘧蘧以虹指千楹電烻萬拱翬飛錦江澄明而俯檻雪嶺晴開而入座用能崇福廣化網羅羣情曉鐘清水月之音宵唄警昏沈之耳足以増聞者之慧也列梵文于貞石炳萬字于雲幢所以導仰瞻之目也禪堂究無生之義廣座喻蓮花之㫖所以詮語黙之致也夫如是則飛沉動息十有二倫咸以見聞悟于觀聽孰不歸於正而去其邪心則五福自順五福自順諒可以贊皇猷輔神用期寳厯于無疆也有大徳神捍者𤣥學海蓄惠辯雲涌智足以守正明足以閑邪揚乎德音不在於是爰命統緇張司寳坊俾像法之中復𢎞正見銘曰元真大覺生滅空𢎞誓救物悲知中粤有精誠通寂黙事隨心願迴化力天長寳厯本無窮徒以臣心贊厥庸空門悠逺理難測仁祠誘善表至徳俾歸清净恊厥中殊方詭類聞見同永資福慧庶莫極遐慶太平斯萬億菩提寺置立記叚文昌蜀城正南當二江合流之上萬井連甍之内獨有岡阜逥抱數里地形含秀而高坦木色貫時而鮮澤以氣象言之不有金刹梵宇孰能主其勝勢乎天寳末𤣥宗廵狩此方崇䕶法教度僧建寺大啟休福至徳二年長史盧公元裕奏置此寺以菩提為號焉先是僧衆鄉黨耆舊相厥林野将興塔廟徘徊凝睇漠然無所乃諗于草堂寺無相大師以質之大師傳繼七祖于坐得三昧以不思議之知見破羣心之䝉惑遂指此地宜開法門夫風行地上而萬竅自號大師一言而天人咸悦故得廣輪棟宇版築垣墉翦榛莽以立宏規繚荒墟以羅物象大厯初節度使相國崔公寧以此寺剏名脩建未就乃迎彭州天飭山惠悟禪師以居焉禪師即無相大師之升堂法子也覺照圓融能於實際以方便説化𨗳羣生俗流歸依其衆日倍經始之制於茲復興其後有信心居士薩藏尹偘者生於􅡠峩得其靈秀氣象宏闊宗敬二乘皆能以財發身悟愛為妄捐舍寳貨同脩梵場蚩蚩之徒隨我先唱方構雲起儼如天成觀乎崇殿巍巍殫于宏麗列柱同力以壮趾攅櫨分形以扶拱豁紺宇而色明洞綺寮以霞散金碧絢煥逢倒景而共照珠鐸玲瓏無廻飈而獨響長廊之外江浦悠然髙檻之端雲峰對出有巖壑之松桂是人寰之林藪學無生者得自在攝威儀者無缺落住持之益其何博哉繇是言之非龍駕之廵幸無以建法幢懸雕牓非大師之言授無以識兹地占幽竒非居士之捨財無以集工輸成像設參㑹而來福祥寘感流慶昌運推乎無窮今皇帝纘八聖之耿光奉三無私以端拱則全蜀之保寧法輪之常運庸詎知其際邪徵其建立以來招化檀施者有若寺主惠嚴姓張氏操行端明始終無替綿歴五紀成此茂功押寺臨壇大徳𤣥極徳高宿垣振起律儀上座惠通識敏量寛道藝兼藴都維那行持典座行謙聪悟多聞探詳經論或緇門挺秀戒用清嚴若衆流為川羣材成厦喜日月之既就歎成功之莫紀年代悠緬易為消失不立篆記将何以報多士之有問乎請余為詞用述前迹銘曰時久太平幽陵起兵騎入宫壷塵飛杳㝠翠華西廵旋復天京崇演法梁為濟羣生藹藹崗原于江之涘盤林走壤或隠或起建寺之辰經營于此誅茅破藪夷髙堙埤云誰知之大師所指萬材既構百役濟功日就月将化為蓮宫正殿渠渠觚稜倚空長廊複宇震截雲重乃有二專廻向正法能成香刹摽於濁刼瞻敬自生萬縁皆攝利益𢎞溥偉哉善業西南巨鎮地足寳坊形勝之中愛此清涼逺對前山終古蒼蒼貞珉既刻永播坤方長慶二年記資福院記李徳裕夫威鳯之炳然非海晏則不至卿雲之蔚然非氣和則不耀故君子藏器抱璞含粹毓徳遭遇其時則光明丕著是以干木之退也高于千乘君㬅容之仕也止于六百石先僕射佩虎符而知足視蟬冕而蔑如由斯志矣先僕射苞文武之用有直清之徳良璧美潤徒蓄寳於荆岑喬松幽深不呈材於巖廟知者所以嘆息也丞相鄒平公鍾是餘慶為唐寳臣公天挺竒表角犀特秀居五嶽也稟太華削成之状方四時也得清秋爽朗之氣森矛㦸以耀頴燦珪璋而洞照葢人之傑歟憲宗皇帝以神武之姿墾菑除害睿徳澹以泉黙英威赫而電斷兵權秘計皆中詔决之參神筭者唯公與一二髦士揣摩閏色繄公稱首既而平淮夷盪齊冦四罪咸服八表晏然雖則武力之拘原亦由謀臣之决䇿暨今上之宅憂也衮龍未襲嚮明未位召公于東宫含春殿歔欷前席付以大柄公乃請偃武論道與天下休息上若渉水而有舟檝馭馬而得䘖䇿始拜言以命咎即其時而相説君臣之遇古無儔也公之為政貞以制動􅊭以稱物其志在于識相體𢎞簡易而已嘗以為用京房之法則煩碎而亂理聽嗇夫之辯則捷給而傷化由是遵坦夷之路窒邪枉之門不勤人以務逺恥竭澤以言利矧乎洞虛明之境應必有誠端不言之蹊孰不歸我故舉聖政者稱公為良相焉公之趨丹戺侍紫垣名冠近臣寵加贈典先僕射自珥貂而昇左揆先夫人由趙郡而啟大國金印石窌當代榮之建中初先僕射以柱下史叅梓潼軍計典昌榮二郡益部之内有林居一㕓庾氏誅茅始傷於寄寓仲長樹果終見於繁蔚公年纔佩觹志拾青紫方覃思扵經籍未馳騖於文章遊焉息焉必在于是及鍾家艱乃入為官第韋太尉鎮是邦也公釋褐從事在賔幄之間逮茲抗龍旌佩相印曽未一紀繼為三台公下車逾月訪於舊館邵伯之樹未翦武侯之廬猶在于公邑里遂見髙居龍驤閈閎竟容長㦸公瞻構灑泣循陔永思以為徵壊壁者夫子之居尚毁固朽宅者如來之乘斯逺孰若歸於凈土環以香林乃贖之于官以為精舍又以桑門之上首者七人居之所以證迷途而資夙植也殿堂層立軒房四注鎔金作繢髣髴諸天况乎蜀山䓗蒨下臨於雉堞錦江明㓕近繚於郊坰紅樹倚檻清渠傍砌海雛乍来靈草長秀彼之聽和音者不難于寂慮聞異香者自入於禪薰公之孝思永代作則豈止何充之宅獨入檀那将與文翁之堂俱稱不朽徳裕藐焉孤生留落於代辱公感舊遂不見遺公自内廷陞台司居視草之列二三年間位階先逹由是議人倫者歸公之盛德不陪宻座驟變寒暑迂懸榻之念虛授簡之恩且嘗典綸綍獲偹官屬報徳不讓懼斯文之闕焉長慶二年十月日建新修福成寺記劉禹錫益城石門街大逵坦然西馳曰石笋街街之址有仁祠形焉直啟曰福成寺寺之殿臺與城之樓交錯相輝繡于碧霄望之如崑閬間物太和四年蜀帥非将材不修邊備南詔君長謀帥内空乗隙坌入鬬於城下或縱火以駭衆此寺乃焚高門修廊委為寒燼如是者冄嵗帝命坤維丞相復來山川如近父老相識環視故地寺為焦墟載興起廢之歎爰有植因之碩乃命主俸吏以吾緡錢三十萬為經營之基自公来思蜀號無事時康嵗稔人樂檀施公言既先應如决川乃傾囊楮乃出懐袖勝因化愚慧力攝慳男奔女驟急于徵令匠者度材以指衆徒藝者運思以役衆技斤鋸磨礱丁丁澄澄陶者儲精圬者効能歘自火宅復為金䋲㳂故鼎新因毁成姸華夷縱觀萬目同聳既告訖役公來慶成雲鮮日潤輝映前後于是都人舞抃而謡曰昔公去此福成以燬今公重還福成復完民安軍治亦如此寺庸可勿紀乎公實聞斯言遂折簡見命謹月而日之時太和某月日大檀越具官封爵叚氏其他發大願者程功董事者自中貴人及賔僚将吏若僧徒偕籍之而刻於石䕫州始興寺移鐵像記前人佛薪盡于乾竺而像教東行是法平等故所至為凈土是身應供故隨念如降生先是魚復人有以利金為彌勒像者重千鈞睟容端相人天兩足鳬氏卒事而化工未備故寓于西偏不知其幾年矣寺僧法照瞻禮發信赤肩白足入諸大城乃至聚落無空過者積十餘年得信財無量繇是購工以嘗巧募徒而畢力四輩増増工麾以肱中極外脉隂轉陽動歘如地踴岌如山行大匠無言尊容嚮明青蓮承趺金獸捧持藻井花鬘䓗蘢四垂邑人膜拜如佛出世法照以願力能就泣於佛前因持片石乞詞以示後按此寺始于宇文周初瀕江埤庳皇唐神龍中為水所壊有波那賴耶國僧廣照浮海而至頓錫不去遂移於今道塲所山曰磨刀嶺曰虎崗其經始與克脩皆番僧是力後之有志者豈無人哉法照䕫人姓穆氏年十有五出家依江陵名僧受具肇自貞元二十年甲申歸此寺願崇建有為凡脩大殿立菩薩大弟子侍佛左右逮長慶癸卯有成其善植徳本者歟汶川縣唐威戎軍製造天王殿記元友諒至哉天王之盛徳也若乃嘘大海為川陸扇須彌為塵霧即藥乂衆破脩羅屬赫然天王示其威神也住水晶宫䕶閻浮界那吒捧塔以前峙天女持花以凝睇示其威福也懸轆轤劔秉黄金㦸龍蛇鼓怒以騰目神鬼睢盱而捧足示其威力也天寳中表其神靈衛戎唐土化身于于闐之國摧鋒于百萬之醜使聖聰無勍敵之虞士馬絶奔騰之患示其變通也汶川古塞戎馬之境山雄玉壘軍壮威戎有護國精舍凝翠峰疉甘凉泉湧創立天王殿一座其初也故使惠澄討論之寺主智昕繕成之杜衆精肅崇搆之兩變星霜方盡其美我兵馬使賀若崟雷霆在天威戢戎貊冠簡晶曜山川載清當其門䦨布徳之秋桃李成蹊之日副使彭城劉公令昌輔佐戎軍烜持妙畧昔聞飛将今見輕車判官西河藺公弇風流倩雅文質彬彬阮元瑜書記之能王仲宣從軍之樂汶川縣令太原王公炅水鏡臨人清風偃草邑稱二異名慎四知都虞候及諸大将等弓張秋月劔落繁霜為蜀國之長城作轅門之巨塹杜衆攝州守而判官李建俌等風情廓落文武縱横俱懐奉主之心共守安邊之術故能拔倫騰秀𢎞此聖猷曙作宵興率先勿替遂感祥光迭委靈氣十旬不愆貞質山立金冠照爛寳殿玲瓏山横棟宇之竒花綻霧嵐之異祐我皇也弧弓不能壮其威表其神也靈怪不能藏其用寺主智昕俗姓湯氏梵行沉宻道容真清勾當僧惠則俗姓李氏㓗白虛裏秋潭月照俱能輔贊其美𢎞闡法梁巍峩之勲萬古不革之道也祠吏伏命敢碑斯文德陽龜勝山道塲記鄭宗經維大唐乙酉歳蜀帥薨鎮其倅曰闢盗庫兵脅市人逆命于蜀門毒瀰浸淫軼制踰封自左綿抵黔渝八郡五十城俘掠民産驅逐守吏四面攻焚煙塵晝昏明年皇帝嗣寳位㑹朝神京采衛侯甸蠻夷君長偕集庸蜀不至乃授南平王太乙靈旗玉節油幢統禁衛太原馮翊扶風之師問罪於岷陽越三月師次葭萌賊将宵遁涪潼以避我鋒涪濵萬户隨師而復夏六月賊又成城于鹿頭列栅于此山公遂移師次於山下視其鑿峻址以迴塹架層峯以結櫓旗轉霞光鼓雷雲中謂制勝在德義行權在形勢勝而臨之示建瓴之易也乃召中軍将以短兵二旅魚貫而登闢黨冐鋒而殪者什四奔墮崖谷而斃者又什貮則向之險固反為我資公乃開玉帳以建牙旗列霜㦸以周崇壘下瞰賊城如在掌中與都監使劉公監軍使徐公觀變禦敵分營守要自是兇徒居則魄悸魂落出則輿尸折首面縛倒戈請命轅門因命降者先導鋭師繼襲氛氲氣象遂清岷峨帝授公所封之土以守之所活之氓以字之公威肅其令仁敷其政和氣煦之金痍盡平退食之暇延想所厯以戰骨雖瘞遊魂尚痛非大聖之力不能息苦海非象設之教無以聳善心乃命庀徒鳩工度材揆力紺宇俄就絶如化城嚴鼓息而振金鐘戰聲寂而流梵響慈惠所庇菑疾不生峨峨金界擢秀羣嶺公初宅此營有神龜由壁門來於牙旗之下公命投之逺磵翌日重至議者謂介蟲之長介蟲斯服蜀有龜城其城是師即日乃受降此山既靈及其祥遂以名龜勝山因以山名道塲脩玉局觀記宋彭乘一氣委于化觀化則歸無萬物生于無本無而為有繇是物物自别事事自分不為而成其用弗匱形上形下非柔非剛廣包太虗微在毫末吾不知物各自造而造物者有主耶抑自然爾自然為性虗無為體其道也歟道之用可勝言哉在天地為動静而無動静在日月為晦明而無晦明在雷霆為響震而不響震在山河為融結而不融結在四時舒慘為變而不變在百穀草木為生而不生在八音為和而不聞在五色為彰而莫覩其于人也為誠明之性視聽言貌焉非天下之至道其孰能與於此乎且人在道中道在人中人全道用而能體法雖不可見觀萬物而索之反照自然原其所感無所執系强為之名名有所宗宗其所自也是以名跡分焉名跡分而異途顯故物物紛擾靡所定列人而無别與飛走同故聖人則乾坤明上下順其節因其和而明禮樂禮樂之用其在人神人神必有所宗故壇墠以興牲器以設宗廟以制嶽瀆以崇虞書之始曰禋洪範之陳曰祀必有其具乃能其事焉斯葢人倫之宗政教之始俾人有所向神有所居凡功施生民必盡崇祀實敦本也道為物始不其本歟功德之大詎可名述彼宫廟之列抑由此焉雖三洞九宫杳在上清之境太微紫極自居無色之鄉彼常有聞或難致詰惟太上混元上徳皇帝體自然之用本無始之宗探象帝之前立先天之化武丁之世誕質厲鄉柱下同塵函闗演教以恍惚離形質之表希夷非視聽之端託有寄無申明大道将令萬物自化統歸衆妙之門百姓樂推黙契不言之教其德也溥其用也淵然後各復歸根反其所自故曰消則為氣息則為人非謂妄惑之言葢徴教化之極将見寂寥妙本澄湛淳源脩身者去甚去奢治國者無為無事亦猶宓犧畫卦二儀之徳方明孔子立言百王之法斯在夫如是非崇嚴廟貌豐潔精誠日月所臨咸為崇奉其可得乎至若飛布雲霞穹崇土木深模絳闕邃状丹䑓彼積陽華此取大状止欲極誠于道而率人趣善焉非為禍福報應而設爾益州玉局化者二十四化之一也傳云後漢永夀中老君與張道陵至此有局脚玉座自地而出老君昇座為道陵演正一之法既去而座隠入地因成洞穴故以玉局名之矧當坤維奥區輿鬼之分墨池石室旁資古勝之蹤岷山導江逺供清粹之秀樓䑓屹峙俯瞰郡城紀厯寖遥基構斯在皇帝實崇慈儉業盛盈成以清虛為宴遊以樸素為玩好八元授職五老賡歌耕鑿熈熈莫知何力跂喙蠢蠢但樂至和崆峒攸􅎮于順風赤水久全於罔象豈止非心黄屋讓德紫庭至誠感通天人合契故真祖示儲靈之應寳符錫無疆之休誕告成功備脩墜典祗肅法駕躬謁真源崇懿號以示尊嚴率含靈而底清淨俾物自化與道同功自然三辰駢珠璧之光五靈為池藪之物域中四大貫而一焉有以見游泳淳和出處冲妙帝皇之理指掌而窺乃詔寰區溥崇靈宇将俾混元之道赫赫巍巍知府諌議大夫集賢學士凌公以命世之才布移風之政盡易象黄裳之美得詩人温玉之稱輟自諌垣臨兹藩屛教化周洽仁惠式敷誠格于民民咸知勸和樂之至屢為豐年庶俗既康郡政以簡故靈勝之跡時忽駐遊睇其弗臧必加完葺斯化宻邇府署制度僅存自東漢權輿皇唐崇飾王氏竊據廣其闉闍壊此殿堂并為内禁㝷與府庫悉為灾焚後主因其舊規復創祠宇循其功力亦匪恢宏逮将百齡頺毁相繼不可終否屬于昌期公以國家詔被溥天誠歸真教聿遵䖍奉将務増脩飛章上聞詔允其請揆之以日作于此宫除舊創新闢小為大工無巨細罔不經心人之悦從匪懈其力東西廣七十七歩南北長七十五歩中建三清殿七間東廂三官堂鐘樓暨玉局洞屋西廂九曜堂太宗皇帝御書樓并齋㕔厨庫門屋周廻廊宇共一百三十五間未變槐檀畢新棟宇奢不逾制儉而中規不妨農時不勞民用自然赤城在目何須紫府遊神臺殿霞明想像金樓之影松蘿霧鬱依稀李樹之隂壮麗規模率若神化非我公罄心悉力遵奉明詔曷以臻于此乎化主浦若谷克嗣焚脩偶茲興創愈宜精確以永増崇且将紀嵗時俾存金石式揚巨績宜屬鴻才乗識有津涯文無經緯狂簡類吾黨之子研精非道家者流照靈府以晶明未分日月豁丹田而曠蕩莫貯乾坤强索空筌仰遵嘉命濡毫叩寂良愧斐然大中祥符八年十二月日記天慶觀五嶽真君殿記前人大象無體萬物應化其體也至人藏用萬法感通其用也稽乃體用强之為名無有本源自内而出孰為衆妙由外而来非真精冲寂曠乎虛極不見徼昧㝠于自然者詎能與于此乎自然其神含凝真一無方無物無本住法㑹無渉有散殊萬類清寧于髙厚誠明于性禀氣秀嶽降得其純粹含虛寂照生與道妙繇是精練至行濟道含識行充功格昇列真籍或于清浮濁滓間統名山福地洞宫靈府至若善惡禨祥應感召報率由主宰故尸赤城者瀛洲仙伯職句曲曰紫陽真人赤城洞天則龍蹻寗先生所治也先生嘗為陶官通神幽隠或蹈履烈㷔隨煙上下黄帝順風禮問受龍蹻經得御飛雲術遂封五嶽丈人佩三庭印開元中感夢宸極因立祠于山址嚴飾眞像葢天服朱光春秋崇祀祺祥杳示中和初再封希夷真君坤維奥區峯嶺連屬標靈跡者青城為勝道書云世間有十大洞天此其一也星顛月頂風容雲骨冩影浮翠表裏森秀彌數百里鍾竒毓異蕃靈藪怪實真仙所宅焉宜其保祐生聚奠兹方鎮仰洪䕃報神貺崇廟貌盛祠薦綿世不輟國家所以望秩精意存真飛眷軺闕午苾芬䖍㓗祈褫黔庶介福攸酢益州天慶觀天寳院真君殿者道王明真大師王文正締構也師禀粹清淵熈真妙域誠志劼毖神韻凝靖持符負甲常存備守破環截帯夙謹傳授三一潜運兩半無染咸平中嘗主青城山觀詔加崇飾師勤力事任實有成績故邑屋歸仰言動響効載懐道庇鑒寐䖍㓗如在之想思有所寄凝精心於輪奐存真相於殊好綘臺琳室霄階紫陛鳯構標勝陽華冩制遂于本院齋宫南創建真殿五間及兩掖廊廡憲太微之殊裁壮明霞之寳勢重欒雲蔓夷庭砥闢崢嶸棟宇靚深宏敞彩緻間錯延瞰眩日髙閑洞啟寳座中峙即邑人楊昌義造施真君像及左右掖侍凃髹羃紵鋪金飾彩四規雙理日簪霞髻伏晨偃月蹲龍躍鳯異相具足瞻仰増肅殿内粉堵圖五嶽帝君四凟公像山川縂領神仙部屬環周複宇若趨而暨皆錦江逸士李懐衮善筆里中宿儒王中吉䕫州助教袁琪新安耆艾俞進光華陽信士楊元禎佑財底績也星紀周運衆功迄備其經始也欲造潜山司命廬嶽使者以居右至是潜山容相已備而廬嶽模範尚闕葢坤維九江西南重阻繪事匪肖曽莫髣髴適募能者復議姿状㑹有黄冠李茂臯至自廬阜囊圖簡記來詣師室事與誠契㝠應昭倬至是方具制度成兹志願焉且夫道者道也萬物由之而有深賾不可際擬議莫能盡失其㫖則反誕詭異無所不至聖人所以極深研幾㑹其歸趣虗無恍惚存乎妙淳元本始歸乎模名跡噐象繫乎物感通變化㝠乎神好惡用舍屬乎性彌綸範圍之謂教率性順理清净無為教之用也君師禮樂制度名物教之跡也施用以渉跡循跡以宗本故天地社稷郊廟祭祀示有宗也彼祠宇像設範金埴土香臺法几繕冩刻繪者葢託以寄心存乎歸嚮而底於化也禮曰法施生民以勞定國能禦大災捍大患則祀之猗歟其施厚者其報美至道統天地至人化育于天地間其施厚也故后辟臣庶際極溥率必罄宗奉者以此師以能績汔濟試願載協條其事状匄文紀實旌善申美冝識嵗月故為疏舉第愧汎略云耳嘉祐四年闕月二十六日記金繩院記楊億夫西竺之教被於震旦而像運千嵗塔廟之制興勃東并之絡主於益部而沃壤千里禮俗之化歸厚蠶叢古之建國銅梁天之設險帶二江之流為一都之㑹四民州處萬商成淵稽河圖之文惟福基之慿固疑雞園之舍邈壮棟以迭隆金繩禪院者舊號龍華院唐天復有禪月大師貫休者通内外之學為道俗所宗風什研精名聲籍甚當土徳之季戎車競逐侯王起于無種雲雷以之遘屯拊劔顧盼以稱豪專閫福威而自出燕開碣石之館市駿骨以翹林秦築逍遥之園演貝文而重道纁玉更薦簦笈四臻而師方游所洎久淹荆渚藩牧致禮邑氓傾向時王氏掩據蜀土将為西帝延致千里之客彌農四時之供師乃遐冐重阻往干典謁叩以空寂之禮嗣以篇題之贄虞卿既見殆䝉白璧之頒湯休能詩逈繼碧雲之妙錫之紫金重以賔友請住兹院極其尊禮師自壬戍遊蜀至丙寅定居比壬申入滅凡嵗星一周于天矣上足惠光大師曇域克紹遺䠱弗忘肯構其後有正覺法忍法寳演教四大師繼承世系無廢先烈今住持賜紫釋惠聪者自咸平辛丑始掌院事逈悟宗諦煥發覺明願力攸資信施彌傳逺者來而邇者悦輸貨沓臻即其舊而圗其新胥宇尤盛凡作佛殿齋㕔僧堂浴室及衆舍二百五十餘間礱宻石以化材丁丁畢取側紫金而布地曥曥有華實天界之荘嚴為衆園之依止香象蹴踏並輳霞裓之脩禪靈鷲飛翔無異果脣之住世大中祥符之祀詔賜今名揭彫榜於門楣燭霄輝於海㑹恩綸有煥名香歇而復熏惠命増延祖燄續而無盡善利之績疇可儗哉聪師籍子虛名謂窺秘典丐詞紀實逺不及讓盖㝠煩之未袪頗滅裂而為愧耳覺城禪院記王曙後學乎像設者有心也滯于名相禪般者無心也曽是空寂着空求相此既失矣從無入有彼何得哉我佛所以啟頓漸之門示悟脩之路頓則頓悟言語文字之俱非漸則漸脩六度萬行之不捨權實交映理事互融無一物不統于真如盡十方皆歸于已用大千世界猶若浮漚無餘涅盤有同昨夢葢逹觀之上者豈常談之得乎益州覺城禪院昔李唐明皇奄宅函夏有詔郡國各建伽藍並以開元為名皆一時之壮麗迨中和俶擾守臣負固頭㑹箕斂惟利是視草創竊弄未遑寧居擅茗荈之兼贏據隧肆而帯鬻以兹寺庭宇宻邇市㕓因而有之莫我肯顧雲徒海衆曽何足以少留寳落璇題杳不知其處所陶籬僅隔顔巷潜通若金石之聞乃止不壊何神明所祐巋然得存今此院者即開元之址也孟氏廣政中出女侍為尼俾居其間號延福院後棄而去復為僧坊爰有閬中鐵幢長老擁錫來游載營載葺衆號鐵幢院又有神操紹續紀綱操授道信道授秦人微禪師微歸闗中道信薦主僧務風雨攸蔽禪頌漸興今傳法沙門元信禪師俗姓昝氏本郡華陽人也㓜齡頴悟脱落囂塵辭親出家㝷師訪道不逺千里行詣百城飄然沅澧之間遍遊江漢之域聿來舊楚乃契宿縁得法于郢州芭蕉惠情禪師情嗣南塔南塔嗣先仰山先仰山嗣溈山溈山嗣百丈百丈嗣江西江西嗣南嶽南嶽嗣曹溪即禪師于曹溪為八代嫡嗣于釋迦如來為四十一代法孫師機縁既契更不他之有願還鄉卜居演化言旋舊里求叶初心道信喜師之歸延請入室宻以傳授且俾興脩師音容粹和戒行髙㓗慈悲喜捨而為事行住坐卧以相應由是法衆歸心士庶仰懐乃謀締構乃募檀般卓鄭隆富之家輿金而布地闤闠伎巧之族運斤而成風朴斵爰施丹雘並至人悦来而不絶材襞積而居多遂量工程考廣袤易傾欹為嚴正變湫隘為平夷自經始于辛卯告成于戊午凡嵗星再周天矣壇宇顯敞正殿翬飛户牖重深禪堂岑寂丈室清閑而奥祕僧房􅌄窱以虛徐齋㕔来苾蒭之流厨庫有蒲塞之饌廣博嚴静盈二百間供具􅀈㩼約數千事又為轉輪寳藏繕冩十二部經珠交露縵彌覆其上金姿髹彩錯落其間實福祥之淵源雄都㑹之瞻矚今知樞宻院刑部侍郎樂安任公昔鎮藩服仰師道行且以愛佛付囑悉心䕶持以延福舊稱乃僣偽所署露章上請命詔下臨特賜今名彌光列刹仍錫隙地乃南其門芝檢賁於藂林雲篆揭其標牓而師宴坐一食應病與藥載離寒暑不出户庭初廬師雷公特奏命服亟請開堂師問答隨機扣擊無滯故逺近道俗多所歸依前後王臣靡不欽重曙雅遊若早悟道滋晚被聖明之優渥寄選舉之聲政遽傳而至燭理未康雖嚮師之名莫造師之室偶餘日之怡蕩一欵闗以從容即席而境閑忘言而機契風幡揺颺直指仁者之心庭柏青葱自識西来之意師既而曰夫示有作為方便也撥無因果㫁㓕也方便即濟人無量斷滅則未法疇依惟兹院之紹隆懼後時之湮漫且礱石之斯久願為辭以見紀贊希有事出和雅音胡其幸焉安敢讓矣一来廬阜即是逺公之社人永鎮頭陀欲刻簡栖之碑字聞思三法資脩記晁逈予自少及老以儒學求仕進之外而志於道也久矣非謂分别名相有所偏局但汎觀鼎峙之教歸趣符合者隨意采録實為心要葢知同歸于善而三聖之書以其方言類例各有文質隠顯詳略淺深耳緜歴以來逮今衰朽而崇尚彌切豈非宿習之然乎古先章句其利極博而散在經論孰能和㑹而發明哉自好渉獵援據推而廣之别致曲成之用抑亦事必師古唯以立意為宗不以能文為本區區之誠不自揆也如此予思往嵗嘗接今御史中執法秋㑹貳卿晏公清談偶及南華真經予記公盛稱之語凡三句包含微㫖其句云其動若水其静若鑑其應若響予退歸檢此語出于荘列二子之書大約述至人體用之状而微宻難曉荘子之注太簡於此三句之下都注之云常無情也列子之注稍備各解之云順物而動故若水也應而不唱故若響也予素聞大人先生之論云敏於事者唯變所適滯于物者未可與權是以每遇見聞得一善則拳拳服膺弗忍遐棄姑務㸃化入助道品譬如範良金琢美玉以成器而為利也所愛此三句之語凡十二字深思祖述而下筆惟艱暨乎引年致政獲棲息乎京邑之舊廬闔扉隠几久于恬宴乗興揮翰追叙前志剖析搆綴脗然相參不分内外經典之語混為心法而已處世出世皆可足用始今辨其名理焉其動若水葢表至人周流無擇物大委順也此合乎隠君子書中上善之理竊謂學大道者在無可無不可外順世間法虛縁而葆真當如此矣可目之曰無礙法門其靜若鑑葢表至人洞照無遁形大明徹也此合乎古先生書中寂照之理竊謂内習之證惟靜而明物来斯應心無主宰當如此矣可目之曰無意法門其應若響葢表至人虗應無留閡大曠逹也此合乎黄帝書中谷神之理竊謂觸事而夷物情難著既應即止勿復存餘當如此矣可目之曰無住法門此三法者上根圓智精脩宻詣之妙門也輒杼軸于懐而未有作者庶乎導揚前列訓迪後来可以智窮其理不可以言盡其意夫勤行之士若能黙識馴致殆所謂曲盡其妙乃至中根以上聞而信重加之善誘自他俱利法門洪福未易可量願三復以無煩知百一之有補深愧狂簡幸不以人廢言也天聖七年記重脩照覺寺記李畋妙色非相有相則尊真諦無言有言則大矧夫法林普現帝綱交映寳月破昏于濁際静刹植福於沙界肅五藴之紛擾具十善之荘嚴惠照倒迷無一遺者斯相之尊也法音讚運羣動無妄大雲秘藏于貝闕師子敷座于紺宇攝四大之種性歸一如之總持解脱障纒無一悖者斯言之大也既尊且大則有為之教興無涯之利顯在乎人天交感王臣護持塵刼不遷是曰常住其斯之謂歟昭覺寺成都福地在震之隅先是眉州司馬董常宅舊名建元其締構嗣紹之由具蕭相國碑文悉之矣唐乾符丁酉嵗為了覺大禪師師宴居之所禪師法號大夣姓韓氏京兆萬年人時宣宗興復象教乃應詔誦經對御落采配終南山之捧日寺具大戒于律師神祐悟技若于石霜慶諸參法要于百丈懐海契心印于洞仙俍价初至洞山洞山問近離何處曰湖南又問途中還見異人否曰若是異人不渉塗中价深器之後領㫖寓蜀始立一大寺闢甘露門開堂日僧問净名大士入不二法門㫖趣如何曰山僧未敢舉明又問若是即事理不答云扁舟已過洞庭湖凡言峻機晤以復如是時劔南節度使崔公安漸奏改建元勅賜今額仍給紫衣一襲式光宗教未幾僖宗出狩駐蹕西州召禪師説無上乗若麟徳殿故事由是開沃聖慮握乾綱而不動運輸神力迴天歩而髙引玉鑾反正而帝眷彌深賜禪師紫磨衲衣二事龍鳯氍毹毯一榻寳器盛辟支佛牙一函布展義之澤也越明年王氏建節制兩川于禪師由尊叔之禮奏錫師號曰了覺大師及王氏開國而禪師滅度享年八十二僧臘五十一門人洪福等建窣堵于當寺後庵以令身歸之謚曰真隠之塔爾後宗𣲖傳襲真風炳然至今住持大徳延美上人以了覺大禪師為五代祖陽安郡平泉人姓杜氏禮本寺懐進大徳為出家師依彦通律師授具足戒性惟真實體本虗靜開口無機化不言而鷗狎虛懐善應施不求而谷盈禪林果熟簷蔔彌香覺苑地靈黄金爭布作大利益湏非常人美公之謂歟兹寺自常住沷上三百㕓滌場歛穧嵗入千耦併歸寺廪與衆共之有舟車大賈輸流水之錢山澤豪族捨金穴之利五銖一縷悉歸寺府無敢私者由是搆撲斵之材較班輸之技而興脩之議于是集矣寺之殿宇舊且百間今廣而増者三百建正殿塑金釋迦像一軀墨白板足之地脩經藏挾唱梵之堂四㞖為權實轉輪之所廣方丈之室傳逹摩心備水陸之儀宣梁武教及羅漢六祖翊善大悲各列一堂又分千部經為東西龕續建紀天列宿堂一所仍加壮麗以至安毳侣供公庖局次有叙厨倉寮庫齋㕔浴室重門挾屋啓閉以時上縫瓦以如鱗下宻磚而若砥左瞻右顧俱是道場一起一居無非佛事寺之舊址復于頺垣鞠為茂草近百年矣以至桃蹊樊圃可畏其隣忍牛忘羊莫分其主美公一旦竪版築以繩之興百堵軫舊封葺墻五百餘間周匝園圃而隣里相讓無一違者凡供食之豐㓗法席之華煥時一大㑹期飰千衆累茵敷坐如升虛邑未有一物爰假外求寺之勝跡有僖宗幸蜀於隨駕進士三牓題名記陳太師塑六祖像蕭相國文建寺碑㑹稽孫位畫行道天王浮丘先生松竹張南本畫水月觀音翰林待詔失名氏今寺額始自長安降到模昭覺寺額俱經亂不亡為唐故事斯皆化感利捨護持之力也自大中祥符戊申嵗承領住持迨三十有餘載矣惟食不兼味衣不重繭言必諦信故人無間言行必總持故身無擇行深入無礙物我不二經云雖説種種道其實為佛乘吾見其人矣然能為愛河之舟檝不住中流開覺路之康荘俾求諸道故入其門者如遜般若之崖似升毗尼之室樹繞七重塵無一㸃信花界之勝果錦江之福田者焉尚能韜光晦迹功成不居耳聞讚揚口稱慙愧是謂常住不住所得非得者乎今門人賜紫沙門人遜謂布施迴向嘆未曽有者典教宗尚寧可闕歟遂持了覺禪師誥勅三通脩寺行状數紙訪畋請紀茂實畋且念景徳初與今岳陽牧張都官逵肄業于兹倐爾嵗寒永言夢寐山隂都講曽栽揮麈之松衣錦相公偶鑿偷光之壁及乎嘗醍醐之味目琉璃之色為日久矣徳我既深固不牢讓大成開羣迷之眼俾矚乎大明象設之請也安不動之心俾諧乎一法言教之謂也是故其相則尊所以祛其幻相其言則大由是辯其魔言令蠢動廓然見種種性悟兹實確歸乎一揆付諸佛子厯刼捧持非師釋氏之雄者其孰能與于斯文崇道觀道蔵記范鎮太史公論道家之言而曰使人精神專一動合無形贍足萬物指約而易守事少而功多至于為史記則以韓非申不害與老子同傳豈非後世多事必於有為以至於無為乎班固所志才一十七家九百九十三篇而伊尹太公辛甲鬻熊管子之書在焉至隋乃分經戒􅀈服房中符籙凡四種合三百七十七部千二百一十六巻而不著其目唐有遂家類又合以釋氏而得百三十七家七十四部千二百四十巻以著于録而管子列於法家所謂伊尹太公辛甲者皆沒不傳獨鬻熊之書存自明皇後不以著録者又百五十八家千三百八十三巻則其溢於漢者千五百八十五巻矣老子著書五千言以為盡天地事物之理後世學者寖廣而其書至於如此其多豈以其事虛無其辭難知必支離而後至於簡易如太史公所謂乎宋興祥符天禧中始崇起其教而玉清昭應宫景靈宫㑹靈觀祥源觀皆置使典領又命其徒與諸儒裒其書是正繆訛繕冩以藏於其處而以其餘賜天下宫觀以廣其傳獨劔南一道未遑及焉嘉祐初成都府郫縣道士姚若谷梓州飛烏縣道士朱知善慨然欲盡求其書而莫由得也於是東走於鳯翔府之上清太平宫慶成軍之太寧宫又東至於亳州之太清宫明道宫凡得書二千餘巻太清宫者老子所生所謂厲鄉者也有九井有古檜有丹竈於是縱觀焉又覧唐開元及祥符中行幸故處以歸治平元年今天子既即位若谷又與其徒仇宗正鄧自和列言於府曰釋氏書徧滿州縣而道家所録獨散落不完願至京師得官本以足其傳於是端明殿學士兼翰林侍讀學士尚書户部侍郎韓公知府事以其状聞且言蜀之名山秘洞勝景為多而道家書不完無以奉揚清凈之風有詔即建隆觀給官本以足其傳凡得五百帙四千五百巻溢於唐者又千九百二十二巻可謂完且備矣若谷宗正自和且将益其書為五本蔵於成都之天慶觀郫縣之崇道觀青城山之丈人觀梓州飛烏縣之洞靈觀綿州之洪徳觀使學者優游以求其所謂清虗自然之要而至乎其師之道如太史公所謂者顧不偉歟若谷飛烏以後徙于郫宗正青城人自和綿州人三人者持操堅至而皆有功於其教者後之人觀其勞而不輕其守則其書之傳為無窮矣治平二年十二月日記四菩薩閣記蘇軾始吾先君于物無所好燕居如齋言笑有時顧嘗嗜畫弟子門人無以悦之則爭致其所嗜庶幾一解其顔故雖為布衣而致畫與公卿等長安有故藏經龕唐明皇帝所建其門四逹八版皆吳道子畫陽為菩薩隂為天王凡十有六軀廣明之亂為賊所焚有僧忘其名于兵火中取其四版以逃既重不可負又廹於賊恐不能皆全遂竅其兩版以受荷西奔于岐而寄死于烏牙之僧舍版留于是百八十年矣客有以錢十萬得之以示軾者軾歸其直而取之以獻諸先君先君之所嗜百有餘品一旦以是四版為甲治平四年先君没于京師軾自汴入淮泝于江載是四版以歸既免䘮所嘗與往來浮屠人惟簡誦其師之言教軾為先君捨施必所甚愛與所不忍捨者軾用其説思先君之所甚愛軾之所不忍捨者莫若是版故遂以與之且告之曰此明皇帝之所不能守而焚于賊者也而况於予乎予視天下之蓄此者多矣有能及三世者乎其始求之若不及既得惟恐失之而其子孫不以易衣食者鮮矣予惟自度不能長守此也是以與子子将何以守之簡曰吾以身守之吾眼可霍吾足可斮吾畫不可奪若是足以守之歟軾曰未也足以終子之世而巳簡曰吾又盟于佛而以鬼守之凡取是者與凡以是予人者其罪如律若是足以守之歟軾曰未也世有無佛而蔑鬼者然則何以守之曰軾之以是予子者凡以為先君捨也天下豈有無父之人歟其誰忍取之若其聞是而不悛不惟一觀而巳将必取之然後為快則其人之賢愚與廣明之焚此者一也全其子孫多矣而况能久有此乎且夫不可取者存乎子取不取者存乎人子勉之矣為子之不可取者而巳又何知焉既以予簡簡以錢百萬度為大閣以藏之且畫先君像其上軾助錢二十之一期以明年冬閣成大聖慈寺大悲圜通閣記前人大悲者觀世音之變也觀世音由聞而覺始于聞而能無所聞始于無所聞而能無所不聞能無所聞雖無身可也能無所不聞雖千萬億身可也而况于手與目乎雖然非無身無以舉千萬億身之衆非千萬億身無以示無身之至故散而為千萬億身聚而為八萬四千母陀羅臂八萬四千清浄寳目其道一爾昔吾嘗觀于此吾頭髪不可勝數而身毛亦不可勝數牽一髪而頭為之動㧞一毛而身為之變然則髪皆吾頭而毛孔皆吾身也彼皆吾頭而不能為頭之用彼皆吾身而不能具身之智則物有以亂之矣吾将使世人左手運斤而右手執削目數飛鴈而耳節鳴皷首肯旁人而足識梯級雖有智者有所不暇矣而况千手異執而千目各視乎及吾燕坐寂然志念凝黙湛然如大明鏡人鬼鳥獸雜陳乎吾前色聲香味交遘乎吾體心雖不起而物無不接必有道即千手之出千目之運雖未可得見而現則具矣彼佛菩薩亦然雖一身不成二佛而一佛能遍河沙諸國非有他也觸而不亂至而能應理有必至而何獨疑于大悲乎成都西南大都㑹也佛事寂勝而大悲之像未覩其傑有法師敏行者能讀内外教博通其義欲以如幻三昧為一方首乃以大旃檀作菩薩像端嚴妙麗具慈愍相手臂錯出開合捧執指彈摩拊千態具備手各有目無妄舉者復作大閣以覆菩薩雄偉壯峙工與像稱都人作禮因敬生悟予游于四方二十餘年矣雖未得歸而想見其處敏行使其徒法震乞文為道其所以然者且頌之曰吾觀世間人兩目兩手臂物至不能應狂惑失所措其有欲應者顛倒作思慮思慮非真實無異無手目菩薩千手目與一手目同物至心亦至曽不作思慮隨其所當應無不得其當引弓挾白羽劔盾諸械器經巻及香華盂水青楊柳珊瑚大寳炬白佛朱藤杖所遇無不執所執無有疑縁何得無疑以我心無故若猶有心者千手當千心一人而千心内自相攫攘何暇能慮物千手無一心手手得其處稽首大悲尊願度一切衆皆證無心法皆具千手目金堂縣慶善院大悲閣記黄庭堅真金堂縣南有山如城壁東西行者風雨以為保障是謂金堂山有一峯發於其麓自北而南出絶峯上極得地坦平表裏見其江山縣之爽塏處也縣南故有僧坊曰天王院天聖中賜名曰慶善為舍五百楹成于化僧之師文紀至化之乃度作千手眼大悲菩薩閣峰頂規摹之初智者笑之愚者排之化之意益堅其求于人不避寒暑雨雪其受人施不計貧富多寡積十五年而功乃成于是又即山南北而為宫與大悲閣髙下相望為屋將百楹矣初其匠事未能半而壯麗宏敞動人心目于是笑之者皆助之謀排之者皆借之力也而檀施傾數州其用錢至一千萬然後聖相圓滿千手所持多象犀珠金間見層出無一臂不用不以人功嵗計所能辦也觀者傾動或至懴悔涕泣于是化之自武其功因余外兄張子安乞余文記之子安亦言化之醇樸不雕鐫盡心於佛事所作殊勝可紀也按千手眼大悲菩薩觀世音之化也維觀世音應物現形或至於八萬四千手眼昔楊惠之以塑工妙天下為八萬四千不可措手故作千手眼相曰後世雖有善工不能加也已而果然今之作者皆祖惠之云夫金堂本廣漢郡之新都聚邑至唐咸亨中以金堂山而名其縣化之其縣人也子安通直郎知金堂縣事張君禔也大悲閣作元祐二年之九月將落成于新天子改元之某月卭州鳯凰山新禪院記文同臨卭郡西北皆大山所叢衍迤旁薄深蟠逺走直注大渡限迾巒崗鬱如雲烟涌如波濤晴光隂嵐明昧一屬其間孤峯崒然傑立豪峙首領􅀢巘腹背􅕞阜翼開長巒尾掉高岡繁林茂樹緑蘤纈菜圍擁森合綷若毛羽地志書之曰鳯凰山者葢前人嘗以狀而名之爾唐有契覺道人艾草鑿址搆菴此地日禮華嚴秘典以作佛事嘗汲泉澗下頗念其逺有虎為之擘地出水澄㓗甘美悉異他所發源甚盛于今賴之㑹昌之厄屋撤人遁天成中僧簡栖與錢高二術士築壇營鑪錬丹絶頂不設梁柱窽石以居藥就而去人跡乃滅但有範坪不陷不圯國初道士皇甫氏就其所興之地為上皇觀開寳中廣漢可尚善説脩多羅了義有詩名于蜀與道士善嘗遊此愛之道士亦謂吾教澹泊依嚮者少地方壯猛非列積廬㑹大衆習佛乗演法義者莫敢居此遂以施可尚易名曰草堂蘭若尚傳聞慧慧傳仁映映傳允順凡四世増葺有屋無慮八十楹堂殿寮閣庖庫齋館種種悉具嘉祐三年春順既物故其嗣遂絶法如是者盡輸之官知郡事祠部員外郎秘閣校理李侯大臨惜此伽藍遂入民籍乃以狀聞于大師端明殿學士宋公祁願與本郡白鶴山中谿禪祠師淳淳用主之公隆法嚮善樂受乃請盡舉其地以界于師師梵行髙特有聲南土持大法戒回矚鄉社迅機敏語導接無倦拂䝉去蔀領受者衆山之中日逺月近白黒咸此赴助景氣明霽嵓谷軒豁若有神物躍踴衛䕶螺皷之㑹遂不虛日禪院説法皆大歡喜謂方便之化城解脱之道場于是乎在師以余昔從事此郡嘗歴覧勝境今復倅州事具曉本末謂記此者莫余之詳署狀丐辭所懇精至因語之曰道以人存地由法盛増福持慧圖為永傳師固已知之矣余何暇喋喋哉其或叙山之靈勝述累世傳山人之紀師為第一代住持此畧備矣嘉祐六年五月十五日記新建五符幢記前人事有絓于荒忽茫昧之中繇曠古及下世無俗書以傳凡智䪥狹莾不能究度至詆忌蔽人令弗通思慮所該外物語者率謂狂矞罔誕非經見乃用擯咲不講錄是皆䝉塞自淺豈寥然壹盡大方之理者歟其有導神幾宣靈謀混淪焉行於無形以鎮養乎元元使怪厲不作消祓摧殄不得横泳永旱以肆其姦是術也凡王侯保土社芘羣品當知嚮服而尊高之渠可嫚忽邪其所謂葢太上洞真靈寳五老赤書元按元始至真肇探于太樸之先凝神火庭尋詳曲折煥譯妙勢為天奥寳告瑞響應秀映靈都神杖封固長依跬息大道君玉帝諸真懇請恭受反復難遴傾倒切至始賜矜諭敕詣紫微居齋九旬後有付畀然猶戒禁勿得布下是天所貴重若此不記從何刼運漏墜人世有聖研極䥴胎割魄識其倪緒取安諸隅廣寓泰寧傳云東京桓永夀時正一道陵患魑魅恣襍闢人鬼使異行植幢㟭山誓刻嚴毒自是判然幽明不殽至李唐文缺重琢置昭慶祠嵗乆巋然頗剥爛石泐無所考宋五世天子英文明睿陞用賢畯命侍臣趙公抃鎮蜀公致治未朞民物宜順晹潤孔時川濕生野蠶饒穀登體腹温飫薔訛勃疫淪伏不起冦兵弭消寂無纎譁頌公乎循聲辭邕邕公固以為未然復訪悠逺安保方域俾無虞戾之深計顯效休功件巳設施事可託神亦圖崇脩原掾陳汝玉學廣知博告公具前躬模秘符解鈲論辯公得且喜告下趣輯廼相玉局衍基㓗為靈埸築室繕宫就完種勝初伐石西山偏徑地深材洪執鉅輓致殊力工徒愁嗟求䇿迷所一昔暴洚涌發漂䃂下磵出道平夷遂可筏行既至正晝矞雲叢飛滃然下覆天光明麗景氣晏悦晻藹髙真颯若來况都人繞觀驚歎蹈回頸望公祝若父母云䕶我等亭育撫燾心精神䖍祥報昭露明日授匠短尺礱為觚恭肖神畫鑱勒其上科禁周具供所祈納大坤之維永永䝉祐噫大霄妙章上靈秘篆何此羣兆幸焉遘覿常為投依以挹厥休千萬億年公惠無泯一日公戒部吏文同使紀其事同謹再拜撰辭以獻復類而紀之以與蜀人使長歌咏無窮其辭曰於未物前有氣混茫廓無端崖滉漭汪洋中函神胞孕此威章靈鋩决分飄青墮黄布照大空流精發光乃時玉符獲於元皇自然秘文盤葩屈芒支交岐聯蜿䊸結張皇執焉喜練於洞陽瑩煥九霄瑞應蔚彰書簡刻金輝燭焜煌太陽靈洞俛仰是将惟時諸真肅命以蹡詣皇咨觀析必願償命入太空九光華房廊開金扃動快雲囊戒勿下傳上館乃當何刼墜流降奠五方闕幻獝肆狂虎冠道師得焉其祥植石摹形大㟭之旁隂怪震驚掃滅伏藏後多歴年復殆于唐迄今巍如鏤蹟劣亡治平之君堯舜禹湯詔用趙公付之蜀畺公來民宜齧暴呴尫太和熏蒸百體具康肌燠羸𥜗腹果衍糧境殄雈蒲獄朽桁楊沸舌頌公夀福熾昌顧公光華衮衣繡裳移蜀之為天下以滂公聞曰噫是志曷荒有及後人乃利也長或告真文本先圓蒼可圖營之福招禍攘流䕃西南被賴無央公喜趣為日不暇遑牙譙西禺玉宇是望高宫翼如彩枅繪梁覆幢其間崪然百常先時堪輿與公効祥水媵雲朦異孰爾量蜀人其承永鬲害殃公徳之深萬世曷忘杪哉末兮峴碑陜棠治平四年二月記茂州汶川縣勝因院記前人繇玉壘南下過笮迤西循皂江左折越太平渡行深入曲無慮六十里至茂之汶川有地曰柘平羣山却顧大陸初露畦麻隴稻杳逺空闊披壖帯麓壤土鮮潤景物環麗人物純篤就其佳處有院曰羅漢昔有頭陀徳欽戒操甚嚴嵗臘居久其徒委散是身獨在常懼其所將底墮落願擇髙行屬以香火得永康軍大中祥符寺僧義海者付之至惟簡師凡五世也惟簡性顓潔所趣端慎守僧舍作佛事癯形晦面不避風雨逺近四衆咸宗仰之既主此地乃圖修建伐木鐫崖大輯材礎搆廣厦設像儲秘典納凈侣凡所欲有一一恒具殆將一紀功力方絶以名上列乃錫今號庭堂虛敞檐宇飄動丹明碧照繢繡嵓谷誠歸嚮之福地而莊嚴之道場也惟簡余之邑人逺來求紀其事間嘗謂余曰青城衆峰惟大岷最為高厚然丈人上清之望者乃世俗之所能見爾如吾所居正向其面脉絡表裏散歛出没澗壑鈎蔓巒嶺屈折髙林巨樾巍崗頂晨霞夕靄染繪光耀湍瀑淙激禽蟲啼響一日萬狀無有窮極左右顧盼不知厭倦此方外清絶之境世間竒偉之觀而惟簡輒擅其勝盖吾院之所獲多矣安得君之車馬一至其地以幸吾言之不誣乎夫人世靈境余所喜聞回視此身若處泥穽何時濯洗以從師傲兀於其間哉因舉筆綴次其事使歸琢諸嵓石遂以為記云熈寧二年十月十五日記聖興寺護凈門屋記李大臨成都府城之東偏有寺曰聖興御史大夫王公某之宅也大厯初杜鴻漸領東西川節度使改為永泰寺武宗時殿宇日就傾圯有髙僧定蘭華陽人苦行精進能外形骸蚊蚋嘬膚雖終夜不少倦曰我報慈母恩也宣宗聞之詔至長安得對稱㫖賜予優加尋奉詔西還復搆此寺塔殿堂廊無慮四百楹定蘭之功徳行業唐翰林學士鄭處誨贊序甚詳此不盡紀府城地狹人繁物夥寺宇廹近民㕓實為闤闠故三門之外中除隙地乃溲溺之場耳溷濁委積曽無隔閡人豕馬牛踐蹂習常監寺大師文爽有道行博通經論毎開慈憫心惡其不清淨之甚欲創屋翼張而蔽掩之庶幾寳坊香刹蚤莫焚修祈福于四衆因建白府帥翰林侍讀學士王公素乃命簽書節度判官吳師服度地按視利病昭然若師之説不誣師自發私囊千六百緡造外舍十有八間于三門左右序且以護凈市民占止月僦直萬錢師告予曰底處無田産資給榱桷率皆摧圯今獲月租願以完葺充用决不可為齋蔬之費來者主之不易其承則我之志行矣一有不如是神明殛之當墮無間獄永刼沉淪無有出期可不慎哉可不慎哉予得而書之以深戒後之主者夀寧院記侯溥儒之心迹佛之性相一也道不以心性為體故求道于心性而不可得然所以㝠於道者心性也迹相亦然道不存乎迹相故求道於迹相而不可見然所以行于道者迹相也宇之殿之之謂廟層之累之之謂塔指廟與塔而問人曰此道乎雖至庸俚其答之也必謂之塔廟而不謂之道試反之曰非道也則盍摧之彼其人必將嗚指膜拜而不敢作摧之之意推此則塔廟其佛之所以行道之迹相乎釋氏自永平迄今繇天子公卿士大夫或信而愛或詆而斥或泥而按或毁滅而欲其忘其為更閲多矣葢周唐之二武以君天下之重勢盡力一除之勢宜不得復興方是之時桑門蒲塞涕目洟鼻相與咨憤滅於隠伏之中居未幾而塔廟之嚴復興於天下而厚費生民之力不翅膏油之沃炭雖蹔灰死而卒之逾熾於前也意者禍福縁報必有形驗而生民之震畏忻慕淪浹肌體所不可得去邪佛以静為樂故凡塔廟皆潔精謹嚴屛逺俗紛獨成都大聖慈寺據闤闠之腹商列賈次茶爐藥榜販脂賣漿倡優雜戲之類坌然其中以遊觀之多而知一方之樂也以施予之多而知民生之給也以興葺之多而知太平之乆也此固夀寧院荒蕪於昔而盛於今歟何謂之盛院莫大乎繼承而僧患夫寡今有文皇仁廟之灑翰章聖之文章以恩嵗祴一人師徒綿綿日營日修是故書有完藏象有宏宇入其門而柱石潔然及其中霤而草木修然其為殊尤絶勝而得之天人者有石盈尺而塔之形影􅀈焉發乎蒼蒼之表此得之天也有孫知微之筆鬼神恐其暴形日星恐其運行林木恐其發生濤浪恐其奔鳴瘠者為僧僂者為道趨翔者為衣冠之士此得之人者也其為生者有温江四夫之田始於張忠定公詠之所畀而成於馬忠惠公知節之所奏此其所為日盛也初淳化㓂竊之後院為廢田吏民植碑乎其中以頌上徳於是内臣王繼恩領招安而忠定作鎮乃議蒐擇名行僧使筦是碑而得僧希白遂奏求賜今院名白華陽人也姓羅氏其教外通吾儒經善草𨽻有詩行於時安文惠王元傑始封益見而器之貽之以詩奏授師名文鑒凡院之所繇盛皆文鑒為之也獨完藏經成於其孫文藴大師重巽而藏經之堂繼成於重復之手巽復皆言行謹厚人也復今為都僧正而求予記因書其本末云熈寧元年記靈泉縣瑞應院祈雨記前人府之邑曰靈泉而邑之聚曰洛帯者有佛廟其名瑞應廟之所以名此以祥符中樞直任公中正奏之名之所以得此以開皇中信相菩薩致之信相菩薩名也菩薩隋蜀郡青城縣黒水溪禇氏女也其傳曰麻衣竹笄善説法要㑹嵗饑以龍頭小鼎為粥以飼人日飫千萬不竭不盈人始異之死之日用竺習法火化異香彌山舍利晶瑩㑹擯佛其塔亦圯大中中白丞相敏中節度劔南始命法潤禪師訪其塔之舊石而刻其象自爾迄今其驗益神凡時之旱暵必禱焉今年春二月雨膏弗時甲者弗牙苞者弗葩民吁以嗟知府事大資政諌議南陽公曰久矣吾聞禇菩薩之為靈也盍請禱焉乃命試主將作簿樊靖欵瑞應具香供以菩薩之象歸于府葢十有三日辛巳發自洛帶條風隨車自東而西距府十里宻雨遽作通夕霈灑潤可一尺公前期戒屬吏齋謹越翼日帥屬吏以笙歌皷逆於門外而設供於大慈佛廟炬宻烟繞香溢方丈且告之曰民旱乆矣是以有今日之請願留七日以祈甘澤是夕又大雨越三日乙酉通夕大雨非特一尺之潤而已原隰罅發今合以濡草木焦秃今榮以滋既七日復命靖奉之以歸于瑞應公送之如始逆焉葢嘗思之道無所不在而佛無所不是翠竹黄花同歸妙用故雖塔石之象亦足以為澤於一方夫誠者在我則應者在彼茍我之不誠而求彼之應其亦難矣乎今夫石象之應豈菩薩惓惓於其間哉南陽公之純誠所召耳溥目是靈感輒書其事使人知菩薩之慈與公之誠為表裏不以不誠而專恃於乞靈云熈寧七年五月日記大中祥符禪院記吳師孟一真無相窮理則非空萬法有為要終則不實然而證於無者孰能離相資於有者安得不為諸器世間一切法爾勅賜大中祥符禪院者唐元和聖夀寺二十院之一也然自係勅額不隷於寺焉孟昶為蜀檀越主樞宻使王處回字亞賢之所建也偽廣政九年丙午嵗實晉少帝開運三年也亞賢捨私帑買毗盧百合法寳羅漢七俱眡等五院合而為一其年七月二十四日僝工締構之初鼎新大壯一椽一甓皆不即舊至十三年庚戍嵗二月迄成土木之盛冠諸羅摩號曰崇真禪院佛殿法堂僧堂客館齋㕔净厨乃至波演那舍應用什物及諸磑碓罔不備具自開運以來名人書畫徧滿其間輪奐瀟洒實大殊勝無慮四百楹有竒僧堂北搆二堂二龕蓄秘典兩藏時有一老人自來應募頗矜其能伐石為龍磐繞龕下活狀蜿蜒巧製精絶夜輒光怪觀者駭異而老人不取傭直唯日食魚飱及水中之物功既畢而不知所詣人皆以為龍所化現自鐫其形云僧童之籌七十成都縣文學鄉負郭水田七頃華陽縣金城坊賃院一所皆充常住嵗入租斛月歛僦緡以備蒲尼繕葺之費始亞賢之子曰秘書少監德琦建白知府侍郎吕公餘慶請靈龕山諗諲禪師住持諲傳小師懿爽爽傳徳嚴為都監寺至道乙未順賊既殱徳嚴詣闕陛見之日太宗嘉奨面賜紫衣號圓明大師仍許復歸住持本院祥符元年嵗次戊申轉運使刑部員外郎施公䕶奏賜今額嚴既圓寂院付小師仁璲以管内都僧正主之璲傳崇教教傳守則則傳守謙則謙皆八十餘嵗矣知府龍圖劉公庠以今都表白賜紫帷古净行純裕緇白信向特給符牒俾之住持先是崇教舊巳磐石欲俾師孟紀叙建院賜額之因久而未克今兹古師又能追繼祖師之志復以識文及書丹見屬師孟自念昔者先大父與圓明有方外之契嘗為親題院額於今手澤存焉重媿一師之勤其敢以淺陋為解熈寧十九年記嘉祐禪院記馮京成都府嘉祐禪院古名毗盧本偽蜀近宻王處回所捨宅也兵火之餘有敝屋十數楹在頺墉荒榛間雖邇通衢而門無車馬之迹嘉祜二年端明殿學士宋公守成都始命長老齊海開堂演法十方住持七年詔賜今額初海師之來也召參學門人峩眉紹紀而議曰今吾與爾俱被府命以興梵刹非大法堂不足以倡吾宗非香積食不足以具供施非鉅厦不足以安清衆於是募信者建法堂僧堂香積厨六年而後成治平二年海師移席長松山府尹端明殿學士韓命紀師嗣領其衆紀師營繕日勤一日乃建寳殿以嚴尊像蔵經典以備誦持闢二門以示趣向立丈室以延叩請有太廟齋郎游之才為起藏殿以秘教乘新津張氏夀卒施田七十畆以助嵗供都人王守慶施圃畦八畆以廣院基凡為屋百五十楹居者得所安學者䝉所益始於都㑹號大道場遊方之徒歸者如市逺邇檀信靡然嚮風非紀信智力安能至是况西蜀士民繁多人心樂善禪林之興莫不争赴使繼而主之者皆如師之勤則法㑹有不興乎使釋氏子皆如師之心則祖道有不隆乎紀師以余鄉守是邦屢嘗訪師廢興本末聞見最詳不憚數千里之勞而以記文見託因直書以貽之云元豐三年記天寧寺轉輪藏記吳拭有居士者家住庵峯信脚閒行五湖四海作家相見不免葛藤且道葛藤還有過否靈山古佛四十九年説偈説經如瓶注水少林老子面壁無言隻履西歸一籌不畫方緒饒舌互立門庭殃及兒孫到今未了庵峰箇裏一味葛藤不是瞿曇不非逹麽有人透得許汝同叅若也無人歸堂打睡有善知識號石靜師聞居士言特伸一問事無一向古語有之從上老人隨縁出世舉揚提倡豈得已乎不得已中無非三昧我所住刹賜榜天寧祝我聖人億萬嵗夀凡我佛事種種莊嚴其最莊嚴有大輪蔵是大輪蔵誰始圖之曰純白師實主募事守眞惟選暨彼宗化為白出力鳩構滋辦迨範與勤閲三住持蔵則成就如地中湧鐫刻藻絢匪金則碧海神囬旋天人挾持黄巻赤軸函帙麗好吹大法螺擊大法皷唄音琅琅作薄伽梵于時巨輪其運如風蜀清信衆若雅若文或合其爪亦或胡跪歡喜踴躍歎甚希有我風住刹有是勝縁居士云何不宣此義雖則語静其諦聽之我於過去無數刼中有一比丘問轉法輪我於爾時畫一圖相我且置之隨喜結縁為藏作記願此輪藏常轉不停如天健行日月久照佛秘宻語亦復如是以如是故護大饒益上讚君父願我君父與天齊休如日之升如月之常如西方佛其夀無量静從坐起曰未曽有公作是言契我佛指崇寧乙酉斯蔵圓滿政和辛卯乃克論次時節因縁不可思議請録斯語歸而克之政和元年記利州緜谷縣羊摸谷仙洞記文同熈寧庚戍春余還朝過利州通判寇諲恭甫為余言近事按朝天驛人云去此七八里巖谷中有神仙出見洞口因往觀之自龍洞閣具舟西下過小峽有山嶤然崛起萬仭翠壁如削中闢大門可五六丈時正晴日光下照有二童子先出次有一人白衣皂巾曵杖垂長髯襟帶隨風翻然往來下視久之左右數青衣從行有物若鷄犬若虎若鹿者先後之人有執扇與繖者隱隠若繪畫甚可愛人之長者裁尺餘舉止詳緩如人行二十里許乃不見問其下居民云相傳五代時土人有王姓者種山下盡室歛穫於此因遣婦去求水婦汲還路有病僧創穢甚滿身腥腐不可近輒前索飲婦惡之且懼未始見弛擔走僧遽就器飲殆半遂去婦不能易之隠其事置水田上其家人無長少咸來飲盡之婦以故獨不霑口晚又俾婦致饟既至其所得飲僧餘水者盡飛入此洞婦既不見但號哭奔走􅑧謼跳盪如狂人忽聞在洞口呼婦者婦仰應不得去懊恨至死自後蕘童牧叟常慣見不以為異近毎至天色開霽則出出必盡日就中山間花木盛發時出尤屢冦乃取畫圖示余余曰嚮嘗讀封禪記見祥符中利州路轉運使李允元奏綿谷縣羊摸谷内山洞中有神仙見自言嘗往見凡三數人或立或行衣裾皆有異光至日暮方没蓋此地爾因求其圖之别本以歸壬子秋余移守興元有新府從事賈君瑄自南榮訪余於陵陽見圖屏上乃言其向官洋州時常與太常愽士陸丕考較進士於寧武亦聞之歸日與丕詣洞下同立良久其見果不妄指圖之𡼏壑巒嶺谿谷磴道曲折出没一一盡如此俞侯之彦在座遂巻圖去命工摹之且俾余次其事列之圗上余為記此九月二十三日記朱真人石洞記鄒敦仁靈池之東山巖巒疉循左右而趨者參差若鸞鳯翔翅又其中嶄髙勢若龍驤自分崠而下不知其幾千百仭也若驟若馳迤邐赴深澗曰朱真人洞者正枕此山足境物清曠夐出塵世惜乎舊洞隳圯或堙塞為過路于今四朞矣未有究其所以然者寳鼎蒲叔豹來宰是邑興滯補廢百事修舉因暇日按碑記訪㝷遺址而心黙識焉於是鳩工開治惟二月既望經始越十有五日告成觀其依巖鑿洞洞深而邃甃石引泉泉冽而甘接洞為亭夾以明窓架石為橋次以横磴脩竹環列嵐光掩映風籟披拂與澗溜相應如聽琴筑蓋所謂蓬壺方丈之景者一朝而復矣敦仁時權邑尉毎樂真遊超覽物外輒滌慮而獻言曰夫道無古今物有成壊方數與道交興則是洞之託於數者昔壊而今成豈無所待而然邪易曰茍非其人道不虗行嗚呼盡之矣宣和元年三月日記温江龍興寺無盡圜通㑹記胡叔豹湔江之東有大寳刹髙踞一隅榜曰龍興樓觀巍然下瞰井邑緇黄雲屯仰給一縣四衆欣然無不喜捨各捐所愛以植福田紹興十年有一長者念此精舍金碧剥落欲大莊嚴結清凈因乃率正信踰二百人毎嵗一設圜通大供欲操其贏畢此願力有曰祖元是大導師禪指讃歎善哉此方植聚徳本我與有縁則以如幻脩三摩提焦心勞形不遑食寢無一刹那示怠惰相見者皈依所化如嚮寳殿雲堂以次而就又念衆寮卑陋狹隘中不虗爽非修行地復丐隣田増基築室前為舫齋旁剏經閣未淹嵗月土木崇成髙明靚深可快心目人天和㑹相與縱觀踴躍歡喜歎未曽有於是長者復作是念宫室既備饘粥未充方來衲子何以取給載盟善友益侈前號曰圜通無盡道場復以其餘嵗市稻田増舊所有而為常住俾諸佛子飽滿屬饜身心安穩増長菩提惟此勝利廣大無邊一切布施功徳難比時有居士見聞隨喜而説偈言世尊滅度時勅我大菩薩不令般湼槃誓度無量苦惟諸菩薩中聞思修大士願力最深重夙縁在震旦以是因縁故應現來此方不辭入塵勞撈􅀈生齒聚或梯山航海來傳佛心印或携尺刀佛引導於羣迷或為普照王覺悟諸有情或為通悟師攝化河沙衆或居補陁巖或嫁金沙灘應身無不在詎止三千二波濤無邊方為世作津梁育冥生死夜為世作大炬疾苦極號呼為世作醫王火宅長熾然為世作甘露我觀五濁海皆造無盡業而我大士心悲憫亦無盡衆生一聞名度無量苦惱况作大勝㑹其福無等比而此世間福有為即有盡名為殊勝相䆒竟非真實我今説其實佛子善諦聽堂堂大丈夫各具大人相願以信佛心信我無量佛眼耳鼻舌身一一諸毛孔放無量光明照破大千界與諸佛菩薩等無有差别儻於此㑹中一稱觀世音彈指頭面禮豁然即超證佛境便見前刹刹與塵塵無不逢大士大士初不聖而我亦不凡乃知大士我非一亦非二佛子善信受當作如是觀而無能觀者是真圜通㑹金繩院五百羅漢記姜如晦院在唐名東禪在偽蜀名龍華國朝鳯州太守王䝉正斥而大之梁柱宏壯為諸方冠其建置如禪規外又為大殿三相屬於東偏大中祥符元年始賜名金繩建炎軍興陞成都府路安撫為四川安撫制置使别置官屬三殿繪事雖富而像設缺焉有司便其空闊即用為官屬廨舍院綱坐是頺委幾五十年乾道庚寅上命敷文閣待制廣漢張公震知成都罷制置司官屬一日公顧瞻棟宇雄壯偉麗長太息曰制置司興廢無常安知後日之不復若乗其間嚴像設以補異時缺典杜後日館廨之害不亦善乎於是命僧子文領院事諭意指文以五百大羅漢請閲四嵗像設才二百於其中殿作彌勒像未施金碧而文歸寂今住持懃心公繼之懃以乙未春正月不假方便諸聖推出來住此刹始至有立魔論鼓惑衆者謂懃决不嗣文志懃刻苦經畫錙銖積累儉薄受用之須散文所散用文所使終文所事一毫不易魔論將息未幾何施者雲委不謀而同乃闢前殿以為洞户貫三為一成大寳巖應真妙相周回間錯無量變現龍宫海蔵之㑹儼然未散嵗在戊戍大功德藏相將落大師内翰胡公從佛地位現官寮身具大正見觀察無量夀佛事從三昧起而作是言當來彌勒號稱次補一十二相則已莊嚴云何釋迦大寳覺王世出世為人天師能轉聲聞入佛知見而於此寳刹座從虛譬如公朝千官百辟衮冕巍峩森列殿庭至尊不臨孰為宗主乃即後殿施紫金檀作釋迦像與彌勒像凡諸佛像有不具者俱為足之前佛後佛共轉輪與諸羊車作大教主諸修行事諸化導法周遍寳坊靡不畢具雖我世尊法華㑹上眉間白毫所照世界所現瑞相所作佛事何以過此靡金錢一萬萬而住持足跡未嘗一出户庭自非具本來福德藏修本来福徳性其應於事相者安能如是危危堂堂也哉院枕繁闠酒坑媱穽盗山殺海勢席詐怛財鳩氣蟒惡習盤結周廻四隅境風業火一刹那際摧菩提樹焚般若種鐵圍深固阿鼻暗黒無量苦事種種見成如蟻旋空以苦為樂晝夜觀歴而不覺知是則名為可憐憫者今於其中即事示相因相起信轉大苦海成大善林化愚癡人發智慧心化暴急人發忍辱心化懶墮人發精進心化傲慢人發恭敬心化散亂人發禪定心化淫穢人發清凈心化貪盜人發滿足心化慳吝人發檀施心化嗔恚人發歡喜心化殺害人發慈善心化妄誕人發真實心種種心生種種心滅一彈指頃捨惡趨善其為饒益無有限量無有窮盡諸來觀者彈指讃嘆得未曽有爾時有一居士自凡夫境諦觀凡夫作諸妄業受諸妄報王侯螻蟻共一苦聚心生悲惱未有咨决又聞如是大都㑹中有大業坑復有如是大功徳海懽喜踴躍稽首作禮住持又問之曰昔湏菩提常白世尊阿羅漢道從無諍修無諍三昧人中第一又自世尊我從空生證解空果成無上道即是義觀無諍及空是阿羅漢滅妄證真二大法門我觀世間種種黒業皆從諍起諍心一萌河沙國土微塵衆生各立見界自為同異於普佛境失普物性又觀世間諸不空者皆依麗濁事相而立認賊為子返為賊謀自刼家寳客境窮露無可誰何今子於此有諍界中開示無諍正修行路不空界中開示真空本寂滅體雖則對病設藥猶墮有為但此界中諸有生者染病方深云何勿藥假一切有詣一切無畢竟無中藥病兩亡事理俱冺惟病與藥總成昨夢露地白牛卓然獨立子之所志其在兹乎住持顰蹙而言嗟乎哉是何子之多事也老僧昔者南游諸方至於何山見一威猛大師子王寓名曰辯於千載後無見見中親見臨際我於此老承事供養經歴年嵗寂無所知忽從户外賣菜聲中聞師子吼我於爾時性命俱斷悟本來空無得而得今於此刹作粥飯頭饑來即食飽來即睡十二時中一切平常如子所説我總不知但以前日創始既有其緒成功不毁姑為終之諸世界中及世界法總是大阿羅漢普通道場無用强生分别作善惡想立取捨見何山所得如是居士曰咄龍生龍子鳯生鳯雛四海老懃名不虛得筆集緒言因以為記新繁縣真人祠堂記劉光祖古之僊者或詭服變名姓佯狂市井間人莫測其為或啖食草木土炭諸臭惡物逢人不擇貴賤肆口罵毁至瓦石擊走之或事化丹砂水銀諸不死之藥往來海上遇其徒授之秘方期不泄於人世所傳多此類也或云有隂功者亦得白日僊去是皆不可疑其有無而余常常喜道朱真人事讀茅茨賦悵然知其為隠者也其言有曰壁剥落而通風簷摧頺而㵼日又曰削野藜而作杖巻竹葉而為巾余雖不能然也而意殊欣然慕之至其終篇有曰口無二價日惟一餐於是置巻而歎曰僊者無他惟修心養生二事而已矣惟其純一不變人罕能之使人能終身不二價則赤子之性常全終日不再食則冲虛之氣常集其於僊也何有修心以保真養生以錬神其為道也簡易其為功也悠久余嘗攷唐隠逸傳然後知真人之事非有荒忽詭異之迹而皆可究也裂冠毁服竄匿林莽間彼竇軌者方以多殺戮為治固高人之所鄙而不顧也雖髙士亷粗知安静之理亦烏能識夫人不言之妙哉織芒屩置道上人曰居士屩也以米茗易之輒取去終不與人接其所為如此而傳不言其所終至其迹顯晦不常然而人所共傳者毎毎於夢中以藥石愈人疾本朝崇寧間賜號妙通真人比嵗蜀人信事之益多邑有其祠家有其像今新繁縣隆道觀新作祠堂者鄉貢進士李湀王焯率其邦人為之也余與李氏兄弟交重其能以文學相繼取科第湀之兄潩必欲得余文記立祠本末余魯鈍性不喜外騖竊於真人之道有感焉故樂為李氏兄弟書之若夫祠堂之嵗月有不以廢興為存亡者不必記也淳熈八年六月日記報恩寺佛牙樓記馬永卿世之議者以為天地融結之氣各有所在故水聚於東南而山聚於西北吾江湖人也老游宦於蜀蓋嘗親見之矣自蠶叢魚鳬未有書契之前不知其幾千萬嵗而全蜀之水晝夜滔滔汨汨東注未嘗暫止未嘗告竭然則水之多寡東西南北果安在也吾意水在天地間猶血氣之在人身上下往來無有窮極但造化宻移人不見耳故曰隂陽不測之謂神是豈世之文字人耳目所能究哉䕫當全蜀衆水所匯鎮以灔澦扼以瞿唐山川秀發真天下壯觀也必得古佛眞身舍利以鎮服之普為衆生作大饒益此佛牙樓所以作也或曰舍利在在處處往往有之何也答曰教言十方三世一切諸佛其數如號伽河沙遍十方刹然獨於此土衆生經無量却有大因縁攝取不捨誓願深重慈悲濃厚方佛将滅度時於人天㑹前遺勅真身舍利多留於人間蓋佛之意以謂人不能至天上以修崇而天可至人間以供養此佛之善巧也而我䕫州之區獨為之冠焉然此舍利非得福地則不可安奉非遇信士即不能建立今䕫子之國可謂福地矣而又遇信士為内外護此其所以能成就如是功德莊嚴歟報恩光孝禪寺者䕫之古刹也晉號鐵佛唐稱金輪比年以來嘗廢革布金之地荒茀不治而常住舊有佛牙一枚方寺廢時為老比丘極力收藏如䕶眼睛得不遺失及寺之復也降禪師初至將有為而未能也今璘禪師繼之毎念佛牙久此湮没欲建一樓以崇奉之徧謁檀越未有如給孤獨者豈象教之興真有所待歟紹興十五年冬漕使苻公行中出建外臺一日公至寺循行瞻視間若有神物警發其意者而又聞璘公建樓之言詳其本末公欣然促之即捐俸錢十萬以為之倡人皆響應各獻所有爭助勝縁以故未幾一寺鼎新巨樓居中雄視傑立堂庫廊廡環而翼之觀者皆曰未曽有也一日方丈老人與二客登樓一客曰是蓋如來無量阿僧祗刼之所修證也故有三十二大人相為第八相其數六六絜白平正色如珂貝歴大人聚自然堅剛非金非玉非輕非重是真天人福田而世之談佛者好為大言至盡畧去福之因地名相吾見必極力掙之一客曰是何言之陋也空而已矣吾觀世間有為功僡皆是幻化虚偽不實故學佛者當先庸行勦絶屏當之然後宴坐觀我此身猶如死屍猶如蟲聚猶如行厮汚穢不净見事是已即急捨離心中出火自焚其身然後可見無上菩提今學者不知出此以思惟心生挾劣相吾見必唾罵辱之方丈老人曰二客之言皆非也如前客之言則佛法不離於文字如後客之言即佛法將歸於隕滅且一身不成二佛一佛必具三身今客之所見為佛法身乎佛化身乎佛報身乎又客今在此為過去乎為未來乎為見在乎客若知三時即是三身則諸佛現前矣客又不聞浄名居士之言乎如我觀佛前際不來後際不斷今復不住若能如是始可以觀佛牙矣客應曰唯唯爾時老師復説偈言壯哉縹緲之飛樓巋然下鎮三峽流中有舍利萬億秋玉奩金鑰那能收靈光濬發騰空浮阿迦􅕹吒靡不周魔王積惡招愆尤正如躔度遇羅猴宫殿煤黒天魔愁諸天眷屬時嬉游㑹遇佛光喜不休相與聚集到無憂共議是事同推求四禪梵王列幢旒阿叔迦寳結網儔勝纓絡交相繆作天妓樂風颼颼𦂳那樓王最稱優簫鼓歌咽雜箜篌舍芝夫人妙音喉千二百種聲清修阿素洛王神之酋降伏彊梗解怨仇俯伏互跪貌和柔魚鰓鳥喙狀彌猴殊形詭制森戈矛亦來侍衛列群騶供養既已衆不留但餘兩幸香旦禂吾聞佛事因人修隠顯相逺殊不侔維摩居士佛匹儔應縁示現為公侯二見金輪火比丘受佛記莂為合謀江山針芥偶相投成沈勝事何優游惟佛恩大不可酬何其來此古信州願垂鴻福常庇庥如象如馬峽山頭無礙行客往來舟俗士狹劣言可羞止欲福此西南陬粟散諸國紛蚍蜉不知更有四大州峩眉山普光殿記明懐園普光殿在峩眉山之絶頂峩眉乃普賢大士視現之所也峩眉之勝聞天下其山周匝千里八十四盤於青雲之端有石龕百餘大洞十二小洞二十八又有雷洞坪飛來鐘王泉石金剛臺之境峯巒倚天彩錯如畫與岷山相對實吾封内之巨錯也山之上天霽則圓光大現山之下雲開則聖燈夜明誠為佛之境界成化二年舊殿厄於回禄寺之住持了鑑以事聞於國因憫古佛道塲不可廢毁捐貲命工重為修建越三年己丑而工畢峻傑𢎞麗於舊為加殿中以銅鑄天地水府天君侍者雷電山王之神像以為百千萬年之香火也夫天地之理生生不息成毁也代謝也理勢相因而然也後人不繼前人之為而為之則其跡化為草莾之區也成而毁毁而成亦生生不息之意也斯殿一新因前人之為而為之也四方覩佛者登斯山上斯殿當知普賢願王應變無窮而利澤無盡也殿之䂓制兹不一一焉是為記全蜀藝文志巻三十八
