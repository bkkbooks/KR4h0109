body:
  text: 全蜀藝文志巻三十明周復俊編序志序華陽國志序述晉常璩巴蜀厥初開國載在書籍或因文緯或見史記乆逺隠沒實多疎略及周之世侯伯擅威雖與牧野之師希同盟要之㑹而秦資其富用兼天下漢祖階之奄有四海梁益及晉分益為寜司馬相如嚴君平揚子雲陽成子𤣥鄭伯邑尹彭城譙常侍任給事等各集傳記以作本紀略舉其隅其次聖稱賢仁人志士言為世範行為表則者名挂史録而陳君承祚别為耆舊始漢及魏煥乎可觀然三州土地不復悉載地理志頗言山水歴代轉乆郡縣分建地名改易於以居然辨物知方猶未詳備於時晉方隆官司星列提封圖簿嵗集司空故人君學士䕃髙堂翳帷幙足綜物土不必待本紀矣曩遭阨運函夏滔堙李氏據蜀兵連戰結三州傾墜生民殱盡府庭化為狐狸之窟城郭蔚為熊羆之宿宅逰雉鹿田棲虎豹平原鮮麥黍之苖千里蔑雞狗之響丘城蕪邑莫有名者嗟乎三州近為荒裔桑梓之域曠為長野反側惟之心若焚灼懼益遐棄城陴靡聞廼考諸舊紀先宿所傳并南裔志驗以漢書取其近是及自所聞以著斯篇又略言公孫述蜀書咸熈以來喪亂之事約取耆舊士女英彦又肇自開闢終乎永和三年凡十篇號曰華陽國志夫書契有五善達道義章法戒通古今表功勲而後旌賢能恨璩才短少無逺及不早援翰執素廣訪博采流離困瘵方資腐帛於顛墻之下求餘光於灰塵之中劘滅者多故有所闕猶愈於遺忘焉蜀紀言三皇乗祗車出谷口秦宓曰今之斜谷也及武王伐紂蜀亦從行史記周貞王之十六年秦厲公城南鄭此蜀道之通乆矣而説者以為蜀王因石牛始通不然也本紀既以炳明而世俗間横有為蜀傳者言蜀王蠶叢之間周迴三千歳又云荆人鼈靈死屍化西土後為蜀帝周萇𢎞之血變成碧珠杜宇之魄化為子鵑又言蜀椎髻左衽未知書文翁始知書學按蜀紀帝居房心決事參代參代則蜀分野言蜀在帝議政之方帝不議政則正氣流於西故周失紀綱而蜀先王七國皆王蜀又稱帝此則蠶叢自王杜宇自帝皆周之叔世安得三千歳且太素資始有生必死死終物也自古以來未聞死者能更生當世或遇有之則為怪異子所不言况能為帝王乎碧珠出不一處地之相距動數千里一人之血豈能致此子鵑鳥今云是嶲或曰嶲周今按説文云蜀王望帝淫其相妻慙亡去為子嶲鳥故蜀人聞子嶲鳴皆起云望帝嶲户圭切所言與蜀志所述相似爾雅亦云嶲鳥也出蜀中四海有之何必在蜀昔唐帝萬國時雍虞舜光宅八表大禹功濟九州后稷封殖天下井田之制庠序之教内來逺矣孔子曰述而不作信而好古竊比於我老彭則彭祖本生蜀為殷太史夫人為國史作為聖則僊自上世見稱在昔及周之末服事於秦首為郡縣雖濱戎夷亦有冠冕故蜀紀曰大人之鄉方大之國也至於漢興反當荒服而無書學乎漢書曰郡國之有文學因文翁始若然翁以前齊魯當無文學哉漢末時漢中祝元靈性滑稽用州牧劉焉談調之末與蜀士燕胥聊著翰墨當時以為極歡後人以為惑恐此之類必起於元靈之由也惟智者辨其不然幸也綜其理數或以為西土嶮固衿帶易守世亂先違道治後服若吳楚然故逋逃必萃奸雄闚覦蓋帝王者統天理物必居土中徳膺命運非可資能恃險以干常亂紀雖饕竊名號終於絶宗殄祀何者天命不可以非詭而邀神器不可以僥倖而取也是以四岳三塗陽城太室九州之險而不一姓冀之北土馬之所産古無興國夫恃險憑危不階厯數自能傳國垂世所未有也故公孫劉氏以敗於前而諸李踵之覆亡於後天人之際存亡之術可以為永鑒也干運犯厯破家喪國可以為京觀也今齊之國志貫之一揆同見不臣所以防狂狡杜姦萌以崇春秋敗絶之道也而顯賢能著治亂亦以為奬勸也其序曰先王經略萬國剖分厥甸巴梁式象縣辰九俊述職賦政以均佐周斃紂相漢亡秦實繁其民世載其俊述巴志第一維天有漢鑒亦有光實司羣望表我華陽炎劉是應洪祚攸長述漢中志第二井絡啓耀文昌契符茫茫禹蹟畫為九州功冒普天率土以休光靈遐照慶祚爽流邦家濟濟世徳球球述蜀志第三蠢爾南城在彼要荒漢武徳振蠻貊是攘開州列郡幽裔來王柔逺能邇實須才良甄徳表失以明紀綱述南中志第四赤徳中微巨猾干篡白虜乗釁致民塗炭爰迄靈獻皇極不建牧后失圖英雄迭進覆車齊軌䝉此艱難述公孫述劉二牧志第五政去王室權流二桀瓜分天壤宰割民物舍彼信順任此智計大道既隠詭詐競設並以豪持力爭當世居正慮明名號絶替身兼萬乗籍同列國述劉先主志第六乾坤渾始樹君立王天工人代萬邦是望明不二日地不二皇茍非其器窮髙必亢曚曚後主弗慮弗臧負乗致冦世業以喪述劉後主志第七陽升三九品物始亨帝紘失振任非其良趙倡禍階亂是用長羅州播蕩朱旌莫亢皮張不造戎醜攸行哀哀元黎頋瞻靡望述大同志第八炎精南飄大維弛綱薨薨特流肆其豺狼蕩雄纂承殱我益梁牧守顛摧黔首辛甞三州毁曠悠然以荒絡結王綱民亦流亡述李特雄期夀勢志第九華嶽降精江漢吐靈濟濟多士命世克生徳為世雋幹為時貞略舉士女表諸賢明世濟其美不隕其名述先賢士女總讃論第十皇皇大晉下土是覆化澹教洽誕兹彦茂峩峩俊乂亹亹英秀如嶽之崇如蘭之臭經徳秉哲綽然有裕述後賢第十一博考行故總厥舊聞班序州部區别山川憲章成敗旌招仁賢抑絀虚妄糾正繆言顯善懲惡以杜未然述序志第十二譔曰駟牡騤騤萬馬龍飛陶然斯猶阜㑹京畿麏獲西守鹿從東麋郇伯勞之旬不從辰甞兹珎嘉甘心庶幾中為令徳一行可師璝瑋俶儻貴韜光輝據中體正平揖宣尼導以禮樂教洽化齊木訥剛毅有威有懐鏘鏘宮縣磬筦諧諧金奏石拊降福孔皆總括道檢總覽幽微選賢與能人逺乎哉唐成都記序唐盧求蜀國自秦始通秦遺蜀王五美女蜀亦遣五丁迎之到梓潼見一大蛇入山穴中一人掣其尾不能得五人相助大呼拽之山遂崩五丁及秦女皆死恵王遂遣張儀司馬錯從石牛道滅蜀因封公子通為蜀侯以陳莊為相置巴蜀郡遷秦人萬家實之民始能秦言以蜀令張若為太守前時蜀王開明尚納美女為妃蓋武都山之精也及死葬於城西北遣五丁擔其本山之土以為塚今有二石尚在古老言武丁擔云陳莊既為秦公子相數年遂謀反殺秦公子秦伐蜀誅莊封子惲為蜀侯惲後母誣惲有罪賜劔自殺蜀人以其寃因為立祠又封子綰為蜀侯後復疑綰反誅死自此但置守而已後以李冰為蜀守冰始鑿三江引水以行舟楫岷山多梓栢大竹坐致材木又溉水開稻田於是沃野千里號為陸海置綿絡二水以便溉灌作石犀五以壓毒蛟命曰犀牛後更為耕牛二乂作三石人立水中冰非常人也與江神約曰水竭不致足盛不沒肩大鑿巖崖通沫水道江之龍大怒冰乃持刀入水與龍鬬龍死遂無水害迄今䝉利蜀人稱郫繁為膏腴綿絡為浸沃昭襄王時又白虎為患意廩君之魂也歴四郡傷千二百人王乃募能殺之者邑萬家金帛稱是也巴夷朐䏰瘳中藥何謝作白竹弩於髙樓瞰而射之死王嫌其夷人乃刻石復田頃田不租十妻不算傷人不論殺人不死與之盟曰秦人犯夷輸黄龍一雙夷人犯秦償清酒一鍾其人安之遂號曰武夷其族又有濮賨賨尤武勇居渝水夾水以居為漢髙祖前鋒陷陣善舞巴與蜀代為仇讎蜀甞封弟葭萌於漢中號苴侯命其邑曰葭萌至漢髙祖六年始分置廣漢郡髙后城僰道開青衣文帝末以廬江文翁為郡守穿煎油口溉田千七百頃立文學選吏子弟皆就學令俊乂之士張叔等十八人東詣博士受七經還以教授於是岷絡之地學比齊魯孝景帝嘉歎遣天下郡國皆立文學自文翁始也文翁明天文灾異後以博士徵至侍中揚州刺史孝武帝置四部都尉俾立十八郭於是郡縣多城觀矣又分牂牁置益州是為南益州宣帝地節三年穿臨邛蒲鹽井二十置鹽鐡官自漢興至哀平牧守仁賢宣徳立教英偉命代之士其出如林璽書束帛交馳於梁益之地矣雖魯之洙泗齊之稷下未足多也且漢徵八士蜀預其四髙帝分蜀郡北鄙置廣漢武帝分南鄙為犍為遂有三蜀之號王莽改郡守為帥正以蜀郡為導江公孫叔為帥正治臨邛述僣號後漢光武滅述還為蜀郡順帝即位復為益州郡名依舊州治大城郡治小城靈帝末以劉焉為牧及卒子璋為嗣建安十九年璋迎漢左將軍劉備至遂滅璋稱帝繼漢號先主治成都魏末司馬昭平蜀復為益州晉受魏禪以州領郡武帝末以成都為國封子穎為王其後賨人李雄僣稱王晉穆帝永和初遣桓温滅之復為蜀郡譙縱反安帝命朱齡石討平之至梁分益州更置南北二益州以武陵王紀為刺史紀僣帝號領兵東下為湘王所殺後魏廢帝前二年尉遲迥定益州置總管後迥舉義旗不受代為隋王堅所戮隋開皇元年廢總管置行臺以蜀王秀為西南道行臺尚書令三年復為總管大業元年廢總管為州又改州為郡聖唐武徳元年復為總管三年置行臺改為益州以太尉秦王為益州道行臺總管又改為宋大都督府天后析益州置彭蜀漢三州開元二年始以齊景胄為劔南節度營田兼姚嶲等處置兵馬使自此始有節度使也八年以李濬為使去兵馬使章仇兼瓊兼山南西道採訪使其後或兼或否亦無定制上元二年始分為東西川廣徳二年復合為一大厯二年又分為兩川至今不改天寳三載復為大都督府十四載𤣥宗皇帝廵幸車駕留五月至徳二年改為成都府置尹比東西二京號南都後復停大凡今之推名鎮為天下第一者曰揚益以揚為首蓋聲勢也人物繁盛悉皆土著江山之秀羅錦之麗管絃歌舞之多技巧百工之富其人勇且讓其地腴以善熟較其要妙揚不足以侔其半况赤府畿縣與秦洛並故非上將賢相殊勲重徳望實為人所歸服者則不得居此况控帶蠻落阨戎限羌非文武寛猛包羅法度之君子則不能得中庸以是聖庭慎擇尤難其任使號有三曰節度觀察安撫先時南蠻六部不相臣服天子每有恩賞各頒一詔呼六詔開元末節度使王昱受賄上奏合六為一乃封大酋師越國公蒙歸義為雲南王始獨稱南詔至楊國忠遙領蜀郡太守兼採訪使遂擾邊閫希立功伐乃有瀘南不利之變貞元中韋令公皐為節帥招復雲南背蕃歸漢十一月八日置使安撫兼統押西山八國近界羌蠻等使是為三使韋令公本以竒勲秉旄鉞思立邊効又在鎮且歳乆南詔為其用拓地甚逺公既卒劉闢繼公後以兵守險為不順誅死家籍沒後京兆公為節帥酷易軍政殊不以封域為念戍卒罔代邊蠻積忿至太和三年十二月䝉羗巔遂以兵剽掠至城下杜公填門不敢與爭㑹監軍使矯詔宣諭蠻人遂退工功散失良民殱殄其耗半矣列政補完尚不克稱大中六年四月詔以丞相太原公有驅制羌戍之成績由邠寧節度司徒同平章事鎮蜀蜀為奥壤領州十四縣七十一戸百萬兵士五萬外疆接兩蕃人性勁勇易化以道難誣以智公至以儉約帥之以謹亷不伐臨之以刑賞法制平治之人歡且舞旦夕詠公之徳矣先是西蜀圖經甚備朝野之士多寄聲寫錄主兹務者不勝其煩遂盡削而潜焚之長吏至即據顯者集為一軸以獻繇是百不書一大中八年戸曹參軍藺𢎞宗甚好學且目覩司徒相國之異績願付以傳示於後然不以文自任剪截疎長蕪言朴略相國乃屬於小子令刋益之且曰不以淹徐疾速歸於流布以為不朽之事求受命震怖又不欲以圖經為目乃捜訪編簡目為成都記五巻經與圖之附益願終𢎞宗之職庶以此為助也大中九年八月五日叙蜀檮杌序宋張唐英唐英嘗觀自古姦雄竊據成都者皆因中原多故而閉闗恃險以茍偷一時之安譬夫穿窬之人利於昏暝之夕至於白晝皎然則無能為也且韋臯守蜀二十餘年其材智機權過於王孟逺矣止欲求兼兩川節鉞而不能得劉闢惑術士之言自謂才過項羽不數月已就檻車之縛蓋是時朝廷清明刑政脩舉賢智在位紀綱整葺彼雖欲不臣勢不能為也使臯闢在五代時其為惡必有過於王孟者以此知朝廷治則蜀不能亂朝廷不治則不惟蜀為不順其四方藩鎮之不順亦有不下於蜀者當王衍之入洛也三蜀之人盡喜中國之有聖人而莊宗總制失馭中外繼叛蒲禹卿慟哭曰觀天下事勢如此蜀人豈有安泰之期耶必重不幸爾洎知祥入蜀之後明宗頗以蜀人為疑凡髙貲有力者盡令東徒張中立嘆曰蜀中之叛非蜀人為之也皆朝廷所委用之臣所為也其言蓋有激而云爾善乎田龍㳺之論曰僣偽之主改㕔堂為宫殿改紫綬為赭袍改僚佐為卿相改前驅為警蹕改妻妾為后妃何如常稱成都尹永無滅族之禍耶兹可謂藥石切至之言也王孟父子四世凡八十年比之公孫述輩最為乆逺其間善惡之迹亦可為世之監戒然編録者如耆舊傳鑑戒録野人閒話之類皆本末顛倒鄙俗無取真宗時知制誥潞公振修九國書有前蜀後蜀世家列傳然而煩簡失當尚多踈略如張扶馮㳙張士喬段融蒲禹卿張雲陳及田淳之徒諫諍章疏皆有益於教盡棄而不録此觀者所以惜其有未備也予家舊藏前蜀開國記後實録凡一百三十巻嘗欲焚棄而不忍今因檢閲始終削去煩冗編年叙事分為十巻其間事實未顯如髯須肥遺逺望績長禹粮蒲騷之類各為解其失悮凡五代史及皇朝日厯所載者皆略而不書名曰蜀檮杌蓋取楚史之名以為記惡之戒非徒衍其小説蓋亦使亂臣賊子觀而恐懼耳蜀檮杌後序陸昭迥治平四年夏六月兩當縣尹鄧君惟良顯甫自京師歸傳殿中侍御史裏行張唐英次功前在閬中監征時所編蜀春秋十巻予嘗得而觀之其編年叙事之體若荀悦漢紀之例至於褒貶善惡本末貫穿駸駸乎馳於漢魏作者之間有古良史風初召試祕閣在仁宗時上大水灾異書時政十四事書在英宗朝上慎始書水灾封事二道皆究極乎治亂之變而探索乎天人之際今天子特排羣議而擢為御史以其勇於敢言也方將攄其所藴而大有為於時彼春秋者乃區區龍斷時無所用心而寄之空言以寓勸戒豈比夫陳夀譙周輩齪齪弄筆硯紀一方之事而無補於教耶次功舊有國體總要監今論五巻十巻唐史誅姦發潜論五巻渝南集十巻補正楚書十三篇樂府歌詩千餘篇皆秘而不傳於人而春秋最後出顯甫好事密購以歸予因為刋行以廣其傳昔人得王充論衡藏之以自衒其辯豈予之志哉成都古今集記序趙抃僕繇慶厯至今四入蜀凡蜀中利害情偽風俗好惡瞭然見之不疑嘗謂前世之士編摭記不失於疎略則失於漫漶不失於鄙近則失於舛雜嚮治平末因取續耆舊傳而修正之去年陳和叔翰林以書見貽俾僕酌古凖今别為一書此固僕之夙心而未有以自發也繇此參訪舊老周咨碩生緝以事類成十三巻不始乎蠶叢而始乎牧誓之蜀從經也從經則蠶叢不必書而書之於後何也揚雄紀之吾棄之不可也參取之而已矣事或至於數説何也乆論之難詳也昔日齊太公仕於周司馬遷有三説焉疑以傳疑可也神怪死生之事不可以為教書之何也吾將以待天下之窮理者也書亂臣所以戒小人書冦盜所以警出沒書蠻夷所以盡制禦之本末終之以伐蜀使萬世之下知蜀之終不可以茍竊也其間一事一物皆酌考衆書釐正譌謬然後落筆如闗公墓今荷聖寺闖然有榜焉而仁顯者孟蜀末僧也作華陽記云墓在草塲廟在荷聖此目擊之所當棄而從仁顯者也若夫知之有未至編之有未及則亦一人之功不可以求備然竊意十得八九矣後之君子其亦有照於斯乎成都古今集記序范百禄成都蜀之都㑹厥土沃腴厥民阜繁百姓浩麗見謂天府縑縷之賦數路取贍勢嚴望偉卓越他郡朝廷席五聖之厚基萬齡之泰明燭外遐愛均畿輔凡選建師長必一時名徳中外皆曰可然後以尹兹土其優馭西南之意槩古邈矣非獨隆於今也蜀之所以為重於天下雖窮隅鴂舌咸共知之而其可以文載而永乆者則徃志蹐錯近事缺絶殆不足以彰其重熈寧壬子八月詔以參知政事趙公為資政殿大學士再蒞此府蜀之黔黎夙云易擾小異故常必勤上心是時天子方惻然矜之故不憚諉公以逺公倍道而來下車之初釐所當恤亟即民心平紛解累人乃説懌盡知明天子覆育逺方之意甚厚公亦自謂宜於蜀也㑹翰林學士陳公和叔語之書曰蜀事可觀惜其墜落泯泯不耀公慨然留意每政事間隙延多學博識之士與之講求故實掇採舊聞若耳目所及叅諸老長攷覈是非自開國權輿分野占象州部號名因革之别其鎮其浸岡聨派屬之詳都城邑郭神祠佛廟府寺宫室學宫樓觀囿游池沼建創之自門閭巷市道里亭館方靣形勢至於神仙隠逸技藝術數先賢遺宅碑版名氏事物種種瓌譎竒詭纎嗇畢書繇秦漢已來凡為守令犖犖有風迹者若干人有唐迄今知府事者多閎碩端毅之望又若干人其行事暴於圖史不可勝述其始至若代去之年月序次昭然著矣厥生鉅人千古不乏澤我文化雋逸迭起科選徳進相踵於朝數百年間無一遺者物有其善雖毫釐亦補實足以為一方盛觀自惜僣賊乗民凶菑事變不同乆近亦異悉其致冦之由及王師夷難底平之迹與夫歴世蠻獠叛服不常中國所以驅除羈縻得失之故又足以為不虞不若之明覽嗚呼既有政以孚其恵又為書以憲厥後公之於蜀可謂志得而道備矣書成凡若干篇以類相從為三十巻名曰成都古今集記人之觀之信乎蜀之為重於天下非虚也哉華陽國志後序呂大防先王之制自二十五家之閭書其恭敏任恤等而上之或月書其學行或歳考其道徳故民之賢能衺惡其吏無不與知之者焉漢魏以還井地廢而王政缺然猶時有所考察旌勸而州都中正之職尚修於郡國鄉閭士女之行多見於史官隋唐急事緩政此制遂廢而不舉潜徳隠行非野史紀述則悉無見於時民日益敖俗日益卑此有志之士所為歎息也晋常璩作華陽國志於地方人物丁寧反覆如恐有遺雖蠻髦之民井臼之婦茍有可紀皆著於書自云得之陳夀所為耆舊傳按夀嘗為郡中正故能著述若此之詳自先漢至晉初踰四百歳士女可書者四百人亦可謂衆矣復自晉初至於周顯徳踰七百歳而史所紀者無幾人忠魂義骨與塵埃野馬同沒於丘原者蓋亦多矣豈不重可歎惜哉此書雖繁富不及承祚之精微然議論忠篤樂道人之善蜀記之可觀未有過於此者鏤行諸世庶有益於風教云重刋華陽國志序李􅘊古者封建五等諸侯國皆有史以記事後世罷封建為郡然亦必有圖志以具述蓋以疆域既殊風俗各異山川有險要阨塞之當備郡邑有廢置割𨽻之不常至於一士之行一民之善皆有不可沒者顧非筆之於書則不能也周官職方氏掌天下之地圖辨其邦國都鄙夷蠻閩貊五戎六狄之人民與其財用之數目至於九穀之所宜六畜之所産亦未嘗不佔畢而紀其詳况夫環數千里之地分城置邑殆踰數十中間時異事變徃徃裂為偏方霸國其理亂得失蓋有繫天下大數安可使放絶而無聞乎此晉常璩華陽國志之作所以有補於史家者流也予嘗攷其書部分區别各有條理其指歸有三焉首述巴蜀漢中南中之風土次列公孫述劉二牧蜀二主之興廢及晉太康之混一以迄於特雄夀勢之僣竊繼之以兩漢以來先後賢人梁益寧三州士女總讃序志終焉就其三者之間於一方人物尤深致意雖侏離之氓賤俚之婦茍有可取在所不棄此尤足以𢎞宣風教使善惡知所懲勸豈但屑屑於山川物産以資廣見異聞而已乎本朝元豐間呂汲公守成都嘗刋是書以廣其傳而載禩荒忽刓缺愈多觀者莫曉所謂予毎患此乆矣假守臨邛官居有暇蓋嘗博訪善本以證其誤而莫之或得因摭兩漢史陳夀蜀書益都耆舊傳互相參訂以决所從凡一事而先後失序本末舛逆者則考而正之一意而詞㫖重複句讀錯襍者則刋而去之設或字誤而文理明白者則因而全之其他旁捜逺取求通文義者又非一端凡此皆有明驗可信不誣者若其無所考據則亦不敢臆决姑闕之以俟能者焉較以舊本之訛謬大略十得五六矣鋟木既具輙叙所以冠於篇首好古博雅與我同志者願無以夏五郭公之義而律之嘉泰甲子季夏朔眉丹稜李􅘊叔廑甫謹序續成都古今集記序王剛中昔清獻公刪取張􅒷勾延慶鄭暐盧求周封等書為成都古今集記三十巻凡廢興遷徙及城郭官府坊市庫廏儒宫佛室仙館神祠陵墓渠堰樓臺池苑之名數與風俗之好惡人物之臧否方伯監司之至去蠻夷冦盜之起滅木石之殊尤蟲魚之變怪靡不畢載其采獲貫穿亦勤且詳矣自熙寧訖今凡十九年事當紀述者蓋難遽數而舊記莫或踵繼見聞異辭日月寖乆恐遂湮滅可不惜哉晉陵胡公至常命僚屬論次未究端緒尋遷宣撫使事復中輟余來此將周歳䝉國威靈邊堠幸帖息斯民亦安堵如故因以閒隙捜訪纂緝作續記凡二十二巻前記載古事徃徃有差誤則辨正之脱遺則補足之清獻所云知之有未至編之有未及者余固不免也其亦待於後之君子乎成都古今丙記序范成大前記趙清獻公作於熙寧七年甲寅凡三十巻蜀之始封及分野梁益州劒南西川成都府屬郡縣得名之所自廢置因革之不同攷之詳矣後八十七年當紹興三十年庚辰王恭簡公續為之記有辨其差誤附益其未載者二記今皆具存續記之成距今纔十有八年雖事之當書者不至甚夥然恐自是日月寖乆來者難考乃蒐耳目所及者繼書之名曰丙記其乙記已載者皆不重出云成都古今丁記序胡元質成都古今記起自熙寧甲寅前帥趙閲道集之凡三十巻後八十七年當紹興庚辰王時亨復為續記二十二巻廢置因革纖悉巨細靡不載也又十有八年當淳熙丁酉范至能復為丙記十巻距時亨去日未逺雖不至如前續記之多然二書之所不及者則加詳矣予以是年秋代匱帥蜀四路兵民之寄實在焉蜀乆困於征輸𣙜酤之額雖減鹽茗之課猶重與其他邊防民政事所當行利興害去皆有端緒可覆而考也居三年綴為丁記二十五巻粗成一書惟沈黎蕃部繹騷踰時方定變之所起以迄無事隨宜措畫本末具存姑俟論定别為一編合成都四記而觀之徃事頓前得過半矣成都文類序袁説友天地之袐藏發而為名山大川山川之秀靈歛而為文章華藻二者相為頡頏而光明焉也兩京三都之賦摹寫天地繪繡山川絢道徳掞天庭潤金石諧韶濩與乾坤造化周流盛大於宇宙之間千百萬世下而知有兩京三都者以此文也然則天地山川而可無此文哉而可以不傳此文哉益古大都㑹也有江山之雄有文物之盛奇觀絶景僊游神跡一草一木一丘一壑名公才士騷人墨客窺奇吐芳聲流文暢散落人間何可一二數也凡此者予來三年亦既略睹矣或曰兩京三都以賦而傳使無傳焉斯文冺矣然則繇漢以來其文以益而作者今獨無傳可乎有益都斯有此文此文傳益都亦傳矣爰屬寮士摭諸方䇿裒諸碑識流傳之所膾炙友士之所見聞大篇雄章英詞綺語折法度極眩耀其以益而文者悉登載而彚輯焉斷自漢以下迄於淳熙其文篇凡一千有竒類為十一目釐為五十巻益之文兹備矣嗟乎後世之士豈無浮沅湘由巴蜀闕如司馬子長者乎豈無上瞿唐過䕫梓賦雪錦如杜少陵者乎又豈無自西蜀歴荆楚棲遲山水間如田游巖者乎倘復得如二三公者而訪斯益擥斯文焉則知清寧闔闢至大至廣之内而有所謂蜀蜀六十州亘五千里之内而有所謂益益都無量江漢炳靈之内而有所謂文者其不在此書乎是書也而有傳焉庶幾乎無負於益慶元元年二月望日謹序成都志序元費著成都居全蜀上游其名稱自西漢始按禹貢蜀為梁州之分岷山導江東别為沱今導江與沱名縣鎮於成都此三代而上地志之見書而不可誣者文王之化行乎江漢之域江有沱詠於二南之先然漢統於江以朝宗沱附於江以起興江首四瀆歴代祠其神於成都故成都為江之源而荆揚之江特其委爾考禹迹聲教之所被稽文王美化之所行徵諸武王逖矣西土之誓言論全蜀而泝源於成都上游之道江則孰有逾於詩書之為可信而有據哉謂三代而下秦恵伐蜀而後得與中國通文翁興學於成都而後得與齊魯比不端本於夫子刪定之經惟遷史之言是信亦道者過也若曰周衰而諸侯畔蜀據阻自安職貢廢而文教弛秦恵伐之而後道路通文翁興學而後風化復斯可矣捨詩書繼自秦漢以論蜀則未可也全蜀郡志無慮數十惟成都有志有文類兵餘版燬莫存蜀憲官佐捜訪百至得一二寫本廼參稽訂正僅就編帙凡郡邑㳂革與夫人物風俗亦概可考焉遂鳩工鋟梓以廣其傳若文類之詳則有待於後之好事者至正三年二月費著序四川成都志序明彭韶郡邑之有志猶國有史家有譜一旹雖非所急百世之下終必賴之蓋求脩已之要治民之本志若無取焉然於稽疆理之分合考政治之因革鑒人才之得失與夫民情風土徃迹舊聞皆於是乎徵志惡可無哉况善學者即事反己未必無助也成都古有華陽等志乆而失傳宋熙寧間趙清獻公再知成都始刪脩古今事為集記紹興間制置王恭簡公再集熙豐以來事為續記至淳熙間范石湖胡長文二公相繼帥蜀又集南渡以後事為丙丁二記丙丁言者意以集記為甲續記為乙且次第以俟後人於無窮也凡事目創於集記後三記皆祖述之四記者今皆行於世二千年之蜀中更變故事得不泯者四記之力也自後迄於宋季至元氏二百餘年無有纂脩之者我朝宣徳初故少宗伯五羊陳公廷噐來為四川憲使乃脩成都府志於古事採四記所言而約之於今事依官脩圖志而新之其於淳熙以後至正以前之事則未暇補入亦無序文凡例可稽蓋未成之書也陳公文行髙雅善於著述豈以當時召入之遽而止歟邇來又五十年矣成化丙申春襄城李公公勉及韶偕處藩憲相與慨嘆兹事若緩而急不可終墜乃延禮致仕紀善黎君士紘貢士徐君山甫重加纂集韶於餘力亦為考校間附以鄙見論序一二至是粗完凡二十五巻其義例頗與集記不同不敢以戊巳為差名曰四川成都志惜李公擢貳内臺無從而就正也遺舛之咎其得而辭諸序酆都志目録楊孟瑛右酆都志目録孟瑛所次第武王賜太公履東至於海西於河南於穆陵北於無棣孟子亦曰域民以封疆之界益郡分土守而為邑以是守也故首疆域疆域之内有山有川故次山川山川險阨邑恃以固故次形勝九州皆有分星不以是辨野何以察妖祥故次星野世易物改則邑有併有割故次沿革邑以民為本故次戸口有人此有土故次田賦有財故次土産山川土田戸口貢賦必治以官故次官治三里之城七里之郭與民守之故次城郭街與坊巷皆城中之途市則鄉民市買以粟與械器相易所謂以羡補不足者也故次街市坊巷城有坊鄉有里所以區别民居故次鄉里郵驛宣令津梁通徃來皆政之不可闕也故次郵驛次津梁政有所宜先莫如鰥窮故次恵政歳有豐凶不可無備故次荒政足兵事相維繫故次武備民為貴社稷次之故次祀典民治神事政具修矣又何加焉曰教之故次學校科貢則學校所成也科貢茂才異等或行業名世科貢之英也故次人物教化興行賢哲作則則風動於上習變於下故次風俗風俗大都以㢘恥節義為重故次貞節次隠逸然必一邑之間得賢長貳為之父母師帥休養以厚生化導以敦俗乃有賴焉故次名宦推封所以勸孝賜髙年爵所以敬長皆風化之餘世改人亡遺跡未冺皆人物之餘故次恩典古蹟次丘墓次樓臺惟老釋之教於吾道别為一端故次釋老文所以紀一邑之事詩則咏歌之者也故以為終惟邑有志猶國有史史掌於史官日有録嵗有紀代有書郡邑得人則志修否則廢廢乆則事皆逸文獻不足徴矣豈細故哉吾邑之志毁於兵燹且百年成化甲午教諭陳先生瓛嘗有事編纂未脱稿滿去𢎞治丙辰麻城明侯紳雅意脩輯請於郡宋公甫公以屬孟瑛孟瑛延長夀孔藎臣與同事摭實於稗官質疑於故老事以類分例以義立類例之端各著臆説雖才乏三長而事備條目覽疆域則見經畫閲廢置則見盛衰稽戸口田賦則見貧富考風俗人物則見政教吾鄉之文獻蓋庶幾焉凡治邑者取一編置案牘之間仕優而讀之因文以求義因事以求鑒興廢補敝因革從時吾民尚亦有利向某成是書板行十餘年矣常自病寡陋况多闕遺備官天府特乘餘暇刪定而更刻之序此於目録左方䕫州府志序劉瑞䕫介雍及荆古梁州之東徼自岷峨而下山川流峙若堂奥然䕫其門與而峽又門之隘而髙者峽口有堆曰灔澦孤根峭骨獨抗奔濤於終古而諸石牙撑角觝者奴耳左右二山曰白鹽赤甲硉矹倚天而售竒獻巧如十二峯者其兒孫乎此豈徒哉乃剛柔之變結而為干城以閟夫參井之靈孕府治實臨是徼亦雄矣府下有縣曰奉節曰巫山曰雲陽曰萬曰達以至於建始名凡十二縱横無慮千里其間沿革顯晦地勢人物丕績異行風俗食貨與夫古今文字未之或無不志其誰以傳洪武辛酉改州為府到今無方䇿可考闕事孰大焉正徳己巳臨川吳君顯之起進士冬官郎中出領䕫牧視篆餘慨厥心已顧賊起兩川戎馬騷屑弗暇越壬申林見素公殱賊殆盡而民汔小康君乃移札十二縣俾咨訪所當書者以呈聘文士彚次成志將鏝梓屬予序焉嗚呼䕫其有光也夫先是過䕫者或問志有無曰無殆藐䕫為陋邦矣繼今閲是志而知吳君此舉衆弛畢張雲布星列外煜而中動應歛襟而曰有是哉䕫也可忽諸况形勝交㑹神摩氣盪而偉人迭出焉其志固不止此人稱吳君興學慎罰節材重彛典而膏澤乎民者良厚斯足徵矣嗚呼䕫其有光也夫故序全蜀藝文志巻三十
