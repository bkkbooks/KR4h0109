body:
  text: 全蜀藝文志巻十七明周復俊編詩時序仲春郊外唐王勃東園垂栁徑西堰落花津物色連三月風光絶四隣鳥飛村覺曙魚戲水知春初晴山院裏何處染囂塵奉和鄭公軍城早秋杜甫秋風嫋嫋動髙旌玉帳分弓射虜營已收滴博雲間戍欲奪蓬婆雪外城中秋夜聴歌聨句武元衡元衡在蜀淡于接物而開府極一時選公綽為少尹正一觀察判官備度支判官裴度掌書記盧士玫觀察支使李虚中觀察推官楊嗣復節度推官此夕來奔月何時去上天備雲鬟方自照玉腕更呈鮮度嬿婉人間意飃䬙物外縁公綽上相公詩裁明月扇歌索想夫憐元衡奉盧侍郎暗染荀香乆長隨楚夢偏放㑹當來彩鳳髣髴逐神仙士玫早秋西亭宴徐員外前人鼎鉉辭台座麾幢領益州曲池連月曉横笛滿城秋有美皇華使曾同白社遊今來重相見偏覺艶歌愁競渡曲僧鸞五月五日天晴明楊花繞江啼曉鶯使君未出郡齋外江上早聞齊和聲使君出時皆闕馬前已被紅旗引兩岸羅衣破鼻香銀釵照日如霜刃鼓聲三下紅旗開兩龍躍出浮水來掉形幹波飛萬劒鼔聲劈浪鳴千雷鼓聲漸急標将近兩龍闕目如瞬波上人呼霹靂驚竿頭綵掛虹蜺暈前舩搶水已得標後船失勢空揮撓瘡眉血首爭不定輸岸一朋闕似燒只将輸嬴闕賞兩岸十舟互來徃須㬰戲罷各東西競脱文身請書上吾今細觀競渡兒何殊當路權相持不思得所各休去㑹到摧舟折檝時蜀中春雨鄭谷海棠風外獨霑巾襟袖無端惹蜀塵和暖又逢挑菜日寂寥未是探花人不嫌蟻酒衝愁肺却憶漁蓑覆病身何事晚來微雨後錦江春學曲江春和蜀縣段明甫秋成望歸朝錢起製錦蜀江静飛鳬漢闕遥一兹風靡草再視露盈條旅望多愁思秋天更泬寥河陽專麗藻清韻入歌謡蜀城春望崔塗天涯憔悴身一望一霑巾在處有芳草滿城無故人懐材皆得路失計獨傷春清鏡不忍照鬢毛應更新好時節元稹身騎驄馬峩眉下靣帶霜威卓氏前虚度東川好時節酒樓元被蜀兒眠成都遨樂詩宋田况四方咸傳蜀人好游娭無時予始亦信然之逮忝命守益柅轅踰月即及春游每與民共樂則作一詩以紀其事自嵗元徂景至止得古律長調短韻共二十一章其間上元燈夕清明重九七夕嵗至之類又皆天下之所共豈曰無時哉傳之者過矣蜀之士君子欲予詩聞于四方使知其俗故復序以見懐元日登安福寺塔嵗厯啟新元錦里春意早詰旦㑹朋寀羣游僕騶導像塔峙中霄翬檐結重橑隨俗縱危步超若薄清昊千里如指掌萬象可窮討野濶山勢迥寒餘林色老遨賞空閭巷朅來喧稚耄人物事都閑車馬擁行道顧此懽娛俗良慰羇逺抱第憂民政疎無庸答宸造二日出城初嵗二之日言出東城闉縵騎隘重浮淅車坌行塵原野信滋腴景物爭光新青疇隱遥壩弱栁垂芳津邏卒具威械祭墦列重茵俗尚各有時孝思情則均歸途喧鼔鐃聚觀無富貧坤隅地力狭百業常苦辛設微行樂事何由裕斯民守侯其勉旃亦足彰吾仁五日州南門蠶市齊民聚百貨貿鬻貴及時乗此耕桑前以助農績資物品何其夥碎𤨏皆不遺編䉲列箱筥飭木柄鎡錤備用誠為急舍器工曷施名花藴天豔靈藥昌夀祺根萌漸開發蔂載相參差游人衒識賞善價求珍竒予真徇俗者行觀亦忘疲日暮宴觴罷衆皆云適宜上元燈夕予嘗觀四方無不樂嬉游惟兹全蜀區民物繁它州春宵寳燈燃錦里煙香浮連城悉奔騖千里窮邊陬衯裶合繡袂轣轆馳香輈人聲震雷逺火樹華星稠鼔吹匝地喧月光斜漢流懽多無永漏坐乆凭髙樓民心感上恩釋唄歌神猷齊音祝東北帝夀長嵩丘二十三日聖壽前蠶市龍斷爭趨利仁園敞邃經深年儲百貨有意享千金器用先農事人聲混樂音蠶叢故祠在致祝順民心二十八日謁生禄祠逰浄衆寺千騎出重闉嚴祠浄宇鄰映林沽酒斾迎馬獻花人豔日披江霧香飈起路塵韶華特明媚不似逺方春二月二日㳺江㑹寶厯寺昔日張復之詠字也來乗冦亂餘三春雖宴賞四野猶艱虞遂移踏青㑹登舟恣游娛戍備漸解弛人情悉安舒垂兹五十年材哲不敢踰愚來再更朔遽及仲春初綵斾列城隈畫船滿江隅輕橈下奔瀬縱轡臨精廬因思賢守事所作民恬愉慈惠至今存遺愛其忘諸八日大慈寺前蠶市蜀雖云樂土民勤過四方寸壤不容隟僅能充嵗糧間或容惰孄曷能備凶痒所以農桑具市易時相望野氓集廣鄽衆賈趨寳坊惇本誠急務戒其靡愆常兹㑹良足喜後賢無忽忘寒食出城郊外融和景濃於城市中歌聲留客醉花意盡春紅遊人一何樂歸馭莫怱怱開西園春風寒食節夜雨晝晴天日氣薰花色韶光徧錦川臨流飛鑿落倚榭立鞦韆檻外游人滿林間飲帳鮮衆音方雜沓餘景更留連座客無辭醉芳菲又一年三月三日登學射山麗日照芳春良㑹重元已陽濵修祓除華林程射枝所尚或不同知俗亦足喜門外盛車徒山半列鄽市彩堋飛鏑逺醉席歌聲起囘頭望城郭煙靄相表裏秀色滿郊原遥景落川涘目倦意猶逺思餘情未已登髙貴能賦感物暢幽㫖宜哉賢大夫由斯見材美九日大慈寺前蠶市髙閣長廊門四開新晴市井絶纎埃老農肯信憂民意又見笙歌入寺來二十一日逰海雲山春光澹蕩海雲清滿路遊人語笑聲自愧非才無異績止隨風俗順民情二月十四日大慈寺建乾元節道場赤精流景鑠朱夏向清和紺宇修祠盛華封祝慶多簮裳千載遇鐘梵五天歌逺俗尤熈㤗皇猷信不頗乾元節感帝開鴻緒薰風正阜生億年逢景運萬國贊升平瑞靄承龍闕晨曦啟鳳城臚賔趍陛墄樂佾備韶英譯導来珍貢酺懽洽頌聲曼齡均慶祝闔澤慰羣情地有捫參逺人懐就日誠願将民共樂聊以報皇明四月十九日汎浣花谿浣花谿上春風後節物正宜行樂時十里綺羅青蓋宻萬家歌吹緑楊垂畫船疊鼓臨芳溆綵閣凌波汎羽巵霞景漸曛歸櫂促滿城懽醉待旌旗伏日㑹江瀆池長空赤日真可畏三庚遇火氣伏藏温風淟涊欎不開流背汗浹思清涼江瀆祠前有流水灌注蓄泄為池塘沈沈隆厦壓平岸好樹䕃亞芙蕖香登舟命酒賔朋集莫辭巵酒宜滿觴絲竹聒耳非自樂肆望觀者如堵墻吾儕未能免俗累近日頗困炎景長今晨縱游不覺暮形為外役暑亦忘豈如髙齋滌百慮危坐自造逍遥鄉七月六日晚登大慈寺閣觀夜市萬里銀潢貫紫虚橋邊螭轡待星珠年年巧若從人乞未省靈恩徧得無七月十八日大慈寺觀施盂蘭盆飛閣穹隆軼翠煙盂蘭盛㑹衆喧闐且欣酷暑從兹減漸有涼風快夕眠京洛間俗言過盂蘭盆則暑退重陽日州南門藥市岷峨磅礴天西南靈滋秀氣中濳含草木瓌富百藥具山民采捋知辛甘成都府門重陽市逺近凑集争齎擔市人譎獪亦射利頗覺良惡相追恭旁觀有叟意氣古肌面皯􅀢毛䰐鬖賣藥數種人罕識單衣結縷和隂嵐成都處士足傳記觀誡之外多竒談盛言每嵗重陽市神仙往往臨塵凡愚人妄意覬非分不識妙理徒癡貪惟期徼倖化金術未肯授足棲雲岩吁嗟神仙無所求一離常道非所躭但喜山民藥貨售歸助農業增康安冬至朝拜天慶觀㑹聖慈寺景至履佳辰朝祖著國令黄道啟潜萌紫宇晨䕃映陽徳比君子吾道實可慶矧丁皇運亨遇主堯舜聖坤維最逺方拙者此尸政雅俗舊儒文民牒少訟爭幸足宣上恩惟恐盭物性良時不易得行樂未為併髙㑹縱嬉遨豐嵗愈繁盛與衆助懽欣寄情于俚詠次韻和季長學士正月二十八日出郊見寄之什宋祁雅俗傳祠日州人以二十八日祠保壽侯及唐杜丞相年華重宴辰初陽澹江霧小雨破街塵是日雨而不濘游人皆集客盖浮輕吹齋刀儼後陳林芳催兎目原色换龍鱗壤路歌聲雜褠倡舞疊新持盃徧酬客惟欠眼中人九日宴射前人佳節憑髙駐綵旗亭臯霧罷轉晨曦堋間羽集號猿後臺外塵飛戲馬時芳菊治疴争汎蘂丹萸辟惡徧傳枝明年此㑹知何處醉玉頽山不用辭十日宴江瀆亭節去懽猶在賔來賞更延㬈暾初短日凄𦂳乍寒天霽沼元非漲秋花自少妍蟻留新獻酎蕙續漸殘煙戲鰋衝餘藻游龜避折蓮流芳真可惜從此遂凋年九日藥市作前人陽九協嘉辰期人始多暇藥物㑹廣㕓游肩閙相駕靈品羅賈區仙芬冒閣舍擷露來山阿斸煙去巖罅係道襍提携盈檐更薦藉乗時物無賤貧乏利能射通芩互作主参桂交相假音架曹植謹贗令韓康無二價西南嵗多癘卑濕連春夏佳劑止刀圭千金厚相謝刺史主求瘼萬室繫吾化顧頼惡石功捫衿重慙唶七夕范鎮翠幕瑶梯百尺樓樓前星斗自悠悠天家仙㑹能多少未到平明已别愁踏青梅摯綺場紛紛十里賒望中煙景半春華人遊寳厯青絲騎路隘土橋金犢車緑襯鳳頭垂逕草紅攅鷁首照汀花夕陽敲鐙餘歡在不惜鸘裘泥酒家自和前人龜堞春遊徑路賖青青踏去冒煙華翠停舴艋客尋寺紅卸接䍦人上車亭落五重沽卓酒釵行十二步潘花乗歡醉盡髙陽侶倒戴歸來不認家鹿鳴燕范成大岷峩鍾秀蜀多珍坐上儒冠更逸羣墨沼不憂經覆瓿琴臺重有賦凌雲文章小技聊干禄道學初心擬致君富貴功名今發軔願看稽古䇿髙勲三月二日北門馬上前人新街如拭過鳴騶芍藥酴醿競滿頭十里珠簾都巻上少城風物似揚州游海雲寺唱和詩呉中復成都風俗嵗以三月二十一日遊城東海雲寺摸石於池中以為求子之祥太守出郊建髙旟鳴笳鼔作馳騎之戲大讌賔從以土民樂觀者夹道百重飛葢蔽山野讙謳嬉笑之聲雖田野間如市井其盛如此渤海只公下車朞月簡肅無事從俗髙㑹于海雲酒既中顧謂寮屬曰一觴一詠古人之樂事也首作七言詩以寫勝賞席客亦有以詩獻者更相酬和得若干篇廼命幕下吏㑹稽王霽為之字霽斐薄愧不能文勉從公命夫徘倡絃竹其樂外也吟詠情性其樂内也充諸内則能遺外之樂流于外則内有所䘮今公既推内之樂以樂賔又盡外之樂以樂民可謂得其樂矣錦里風光勝别州海雲寺枕碧江頭連郊瑞麥青黄秀遶路鳴泉深淺流彩石池邊成故事茂林坡上憶前遊予昔常陪樞宻田公遊此緑尊好伴衰翁醉十日殘春不少留和韻范純仁東郊行樂冠西州古寺岧嶤占上頭化俗文翁傳愷悌尋山謝傅繼風流天涯罇酒欣相遇劒外三春得共遊雅興直須窮勝賞年光難使隙駒留和韻勾士良佛土依山福逺州春行繡騎上雲頭補天彩石盈池在朝海清江繞寺流四國仰煩郇伯勞羣生翹望謝安遊早知為礪為霖意惟有西民欲暫留䕫冬暖雪不到地唯山髙處盡白它皆霏雨而已宋肇宻下斜飛片片愁不堪飄泊向西州思家對雪誠何味只與羣山鬭白頭晚晴前人古道遥臨水荒城早閉門亂山啣落照歸鳥下空園江口漁人舫崖腰桑樹村客愁何可奈有酒莫空樽中秋對月用昌黎先生贈張功曹韻前人水精為鑑金為波挂空影寫山與河清光此夜十分好有酒有客宜髙歌去年今日行役苦若宿溪邊宿逢雨傳聞蜀道如天髙崖縣壁絶哀猿號波横劒㦸不易上陸有虎豹何由逃江山舊恃白帝險風俗猶帶烏蠻操驅馳兩月到西塞夢寐萬里還東臯嗅梅踏雪巴子里路入鬼門欣不死飛飛倦鳥惟思還玉筍豈是鹿官班餘生但願閒及酒虚名寜顧觸與蠻良宵佳客十有五雲放月入樽罍間頽然老子興不淺韓詩坡句聊追攀君不見天寳霓裳羽衣歌人間樂舞難同科遺音猶在悲涼多有酒且歌遑恤他不飲如此良夜何上巳從史巫山􅰩飲江臯李􅌫風沙一夕巻冥冥曉色曈曚上翠屛薄宦驅人成老大佳時得酒慰飄零紅餘晚樹迷幽谷緑漲晴波失逺汀却是崇山兼峻嶺看来渾不減蘭亭踏磧張晉䕫國先年有舊風来看踏磧莫怱怱只縁嵗稔民康樂纔到春初氣欎葱生怕背藍挨舞袖不妨腰鼔閙歌鐘元戎小隊臨江滸要與遺黎一笑同次韻宇文紹荘八陣圗前凛古風武侯英烈豈怱怱江流千載長嗚咽山挿孤雲亦蒨葱陡覺新春忘病思喜陪髙論自情鍾典刑前軰今能幾嵗晚相期華髪同次韻費士戣寳釧金釵盛峡風遨頭争逐去怱怱旗標陣磧規模古筵挹晴嵐氣色葱宜有明珠酬白璧空慚瓦缶間黄鐘紛紛雲片呈佳瑞一飽端知萬姓同官舍苦雨黄人傑漫空數日雨傾盆老屋淋漓瓦縫穿七月不虚為巧月今年頼得是豐年泥塗滑滑妨行客煙隴隂隂礙種田我欲乗風干造化盡披雲霧覩青天上元竹枝歌和曾大卿冉居常青春惱人思跰躚女郎市酒趣數錢不道翁家乆留客紅襠幔結賽鞦韆學簫學鼔少年羣凖擬春來奉使君自向琱籠作行隊愛排好曲薦慇懃珍珠絡結繡衣裳家住江南山後鄉聞道使君重行樂争携腰鼔趂年光元宵彭永巴人最重上元時老穉相携看㸃詩行樂歸來天向晚道傍聞得喚蠶絲全蜀藝文志巻十七
