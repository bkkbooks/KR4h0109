body:
  text: 全蜀藝文志卷十七明周復俊編詩時序仲春郊外唐王勃東園垂栁徑西堰落花津物色連三月風光絶四鄰鳥飛村覺曙魚戲水知春初晴山院裏何處染囂塵奉和鄭公軍城早秋杜甫秋風嫋嫋動髙旌玉帳分弓射虜營已收滴博雲間戍欲奪蓬婆雪外城中秋夜聽歌聨句武元衡元衡在蜀淡于接物而開府極一時選公綽為少尹正一觀察判官備度支判官裴度掌書記盧士玫觀察支使李虛中觀察推官楊嗣復節度推官此夕來奔月何時去上天備雲鬟方自照玉腕更呈鮮度嬿婉人間意飄颻物外緣公綽上相公詩裁明月扇歌索想夫憐元衡奉盧侍郎暗染荀香久長隨楚夢偏放會當來彩鳳髣佛逐神仙士玫早秋西亭宴徐員外前人鼎鉉辭台座麾幢領益州曲池連月曉橫笛滿城秋有美皇華使曾同白社遊今來重相見偏覺艷歌愁競渡曲僧鸞五月五日天晴明楊花繞江啼曉鶯使君未出郡齋外江上早聞齊和聲使君出時皆闕馬前已被紅旗引兩岸羅衣破鼻香銀叉照日如霜刃鼓聲三下紅旗開兩龍躍出浮水來掉形幹波飛萬劒鼓聲劈浪鳴千雷鼓聲漸急標將近兩龍闕目如瞬波上人呼霹靂驚竿頭綵挂虹霓暈前船搶水已得標後船失勢空揮撓瘡眉血首爭不定輸岸一朋闕似燒只將輸嬴闕賞兩岸十舟互來往須臾戲罷各東西競脫文身請書上吾今細觀競渡兒何殊當路權相持不思得所各休去會到摧舟折楫時蜀中春雨鄭谷海棠風外獨霑巾襟袖無端惹蜀塵和暖又逢挑菜日寂寥未是探花人不嫌蟻酒衝愁肺却憶漁蓑覆病身何事晚來微雨後錦江春學曲江春和蜀縣段明甫秋成望歸朝錢起製錦蜀江靜飛鳬漢闕遙一兹風靡草再視露盈條旅望多愁思秋天更泬寥河陽專麗藻清韻入歌謡蜀城春望崔塗天涯憔悴身一望一霑巾在處有芳草滿城無故人懷材皆得路失計獨傷春清鏡不忍照鬢毛應更新好時節元稹身騎驄馬峩眉下靣帶霜威卓氏前虛度東川好時節酒樓元被蜀兒眠成都遨樂詩宋田况四方咸傳蜀人好遊娭無時豫始亦信然之逮忝命守益柅轅踰月即及春遊每與民共樂則作一詩以紀其事自嵗元徂景至止得古律長調短韻共二十一章其間上元燈夕清明重九七夕嵗至之類又皆天下之所共豈曰無時哉傳之者過矣蜀之士君子欲豫詩聞于四方使知其俗故復序以見懷元日登安福寺塔嵗厯啓新元錦里春意早詰旦會朋寀羣遊僕騶導像塔峙中霄翬簷結重橑隨俗縱危步超若薄清昊千里如指掌萬象可窮討野濶山勢迥寒餘林色老遨賞空閭巷朅來喧稚耄人物事都間車馬擁行道顧此歡娛俗良慰羇逺抱第憂民政疏無庸答宸造二日出城初嵗二之日言出東城闉縵騎隘重浮淅車坌行塵原野信滋腴景物爭光新青疇隱遙壩弱栁垂芳津邏卒具威械祭墦列重茵俗尚各有時孝思情則均歸途喧鼓鐃聚觀無富貧坤隅地力狹百業常苦辛設微行樂事何由裕斯民守侯其勉旃亦足彰吾仁五日州南門蠶市齊民聚百貨貿鬻貴及時乘此耕桑前以助農績資物品何其夥碎瑣皆不遺編䉲列箱筥飭木柄鎡錤備用誠為急舍器工曷施名花藴天豔靈藥昌夀祺根萌漸開發蔂載相參差遊人衒識賞善價求珍竒豫真徇俗者行觀亦忘疲日暮宴觴罷衆皆云適宜上元燈夕豫嘗觀四方無不樂嬉遊惟兹全蜀區民物繁它州春宵寶燈燃錦里煙香浮連城悉奔騖千里窮邊陬衯裶合繡袂轣轆馳香輈人聲震雷逺火樹華星稠鼓吹匝地喧月光斜漢流歡多無永漏坐久憑髙樓民心感上恩釋唄歌神猷齊音祝東北帝夀長嵩丘二十三日聖壽前蠶市龍斷爭趨利仁園敞邃經深年儲百貨有意享千金器用先農事人聲混樂音蠶叢故祠在致祝順民心二十八日謁生祿祠逰淨衆寺千騎出重闉嚴祠淨宇鄰映林沽酒斾迎馬獻花人豔日披江霧香飈起路塵韶華特明媚不似逺方春二月二日遊江會寶厯寺昔日張復之詠字也來乘冦亂餘三春雖宴賞四野猶艱虞遂移踏青會登舟恣遊娛戍備漸解弛人情悉安舒垂兹五十年材哲不敢踰愚來再更朔遽及仲春初綵斾列城隈畫船滿江隅輕橈下奔瀨縱轡臨精廬因思賢守事所作民恬愈慈惠至今存遺愛其忘諸八日大慈寺前蠶市蜀雖云樂土民勤過四方寸壤不容隟僅能充嵗糧間或容惰孄曷能備凶癢所以農桑具市易時相望野氓集廣鄽衆賈趨寶坊惇本誠急務戒其靡愆常兹會良足喜後賢無忽忘寒食出城郊外融和景濃於城市中歌聲留客醉花意盡春紅遊人一何樂歸馭莫匆匆開西園春風寒食節夜雨晝晴天日氣薰花色韶光遍錦川臨流飛鑿落倚榭立鞦韆檻外遊人滿林間飲帳鮮衆音方雜沓餘景更留連座客無辭醉芳菲又一年三月三日登學射山麗日照芳春良會重元已陽濵修祓除華林程射枝所尚或不同知俗亦足喜門外盛車徒山半列鄽市彩堋飛鏑逺醉席歌聲起回頭望城郭煙靄相表裏秀色滿郊原遙景落川涘目倦意猶逺思餘情未已登髙貴能賦感物暢幽旨宜哉賢大夫由斯見材美九日大慈寺前蠶市髙閣長廊門四開新晴市井絶纎埃老農肯信憂民意又見笙歌入寺來二十一日逰海雲山春光淡蕩海雲清滿路遊人語笑聲自愧非才無異績止隨風俗順民情二月十四日大慈寺建乾元節道場赤精流景鑠朱夏向清和紺宇修祠盛華封祝慶多簮裳千載遇鐘梵五天歌逺俗尤熙泰皇猷信不頗乾元節感帝開鴻緒薰風正阜生億年逢景運萬國贊升平瑞靄承龍闕晨曦啓鳳城臚賔趍陛墄樂佾備韶英譯導來珍貢酺歡洽頌聲曼齡均慶祝闔澤慰羣情地有捫參逺人懷就日誠願將民共樂聊以報皇明四月十九日泛浣花溪浣花溪上春風後節物正宜行樂時十里綺羅青蓋密萬家歌吹緑楊垂畫船疊鼓臨芳溆綵閣凌波泛羽巵霞景漸曛歸棹促滿城歡醉待旌旗伏日會江瀆池長空赤日真可畏三庚遇火氣伏藏溫風淟涊欎不開流背汗浹思清涼江瀆祠前有流水灌注蓄泄為池塘沈沈隆厦壓平岸好樹蔭亞芙蕖香登舟命酒賔朋集莫辭巵酒宜滿觴絲竹聒耳非自樂肆望觀者如堵墻吾儕未能免俗纍近日頗困炎景長今晨縱遊不覺暮形為外役暑亦忘豈如髙齋滌百慮危坐自造逍遙鄉七月六日晚登大慈寺閣觀夜市萬里銀潢貫紫虛橋邊螭轡待星珠年年巧若從人乞未省靈恩遍得無七月十八日大慈寺觀施盂蘭盆飛閣穹隆軼翠煙盂蘭盛會衆喧闐且欣酷暑從兹減漸有涼風快夕眠京洛間俗言過盂蘭盆則暑退重陽日州南門藥市岷峨磅礴天西南靈滋秀氣中濳含草木瓌富百藥具山民采捋知辛甘成都府門重陽市逺近湊集爭齎擔市人譎獪亦射利頗覺良惡相追恭旁觀有叟意氣古肌面皯􅀢毛䰐鬖賣藥數種人罕識單衣結縷和隂嵐成都處士足傳記觀誡之外多竒談盛言每嵗重陽市神仙往往臨塵凡愚人妄意覬非分不識妙理徒癡貪惟期徼幸化金術未肯授足棲雲岩吁嗟神仙無所求一離常道非所耽但喜山民藥貨售歸助農業增康安冬至朝拜天慶觀會聖慈寺景至履佳辰朝祖著國令黃道啓潛萌紫宇晨蔭映陽德比君子吾道實可慶矧丁皇運亨遇主堯舜聖坤維最逺方拙者此尸政雅俗舊儒文民牒少訟爭幸足宣上恩惟恐盩物性良時不易得行樂未為併髙會縱嬉遨豐嵗愈繁盛與衆助歡欣寄情于俚詠次韻和季長學士正月二十八日出郊見寄之什宋祁雅俗傳祠日州人以二十八日祠保壽侯及唐杜丞相年華重宴辰初陽淡江霧小雨破街塵是日雨而不濘遊人皆集客蓋浮輕吹齋刀儼後陳林芳催兔目原色换龍鱗壤路歌聲雜褠倡舞疊新持杯遍酬客惟欠眼中人九日宴射前人佳節憑髙駐綵旗亭臯霧罷轉晨曦堋間羽集號猿後臺外塵飛戲馬時芳菊治疴爭泛蘂丹萸辟惡遍傳枝明年此會知何處醉玉頽山不用辭十日宴江瀆亭節去歡猶在賔來賞更延㬈暾初短日凄緊乍寒天霽沼元非漲秋花自少妍蟻留新獻酎蕙續漸殘煙戲鰋衝餘藻遊龜避折蓮流芳真可惜從此遂凋年九日藥市作前人陽九協嘉辰期人始多暇藥物會廣㕓遊肩閙相駕靈品羅賈區仙芬冒閣舍擷露來山阿斸煙去巖罅係道雜提携盈簷更薦藉乘時物無賤貧乏利能射通芩互作主參桂交相假音架曹植謹贋令韓康無二價西南嵗多癘卑濕連春夏佳劑止刀圭千金厚相謝刺史主求瘼萬室繫吾化顧賴惡石功捫襟重慙唶七夕范鎮翠幕瑶梯百尺樓樓前星斗自悠悠天家仙會能多少未到平明已别愁踏青梅摯綺場紛紛十里賒望中煙景半春華人遊寶厯青絲騎路隘土橋金犢車緑襯鳳頭垂徑草紅攢鷁首照汀花夕陽敲鐙餘歡在不惜鸘裘泥酒家自和前人龜堞春遊徑路賖青青踏去冒煙華翠停舴艋客尋寺紅卸接㒿人上車亭落五重沽卓酒叉行十二步潘花乘歡醉盡髙陽侶倒戴歸來不認家鹿鳴燕范成大岷峩鍾秀蜀多珍坐上儒冠更逸羣墨沼不憂經覆瓿琴臺重有賦凌雲文章小技聊干祿道學初心擬致君富貴功名今發軔願看稽古䇿髙勳三月二日北門馬上前人新街如拭過鳴騶芍藥酴醿競滿頭十里珠簾都卷上少城風物似揚州遊海雲寺唱和詩吳中復成都風俗嵗以三月二十一日遊城東海雲寺摸石於池中以為求子之祥太守出郊建髙旟鳴笳鼓作馳騎之戲大宴賔從以土民樂觀者夾道百重飛蓋蔽山野歡謳嬉笑之聲雖田野間如市井其盛如此渤海只公下車期月簡肅無事從俗髙會于海雲酒既中顧謂寮屬曰一觴一詠古人之樂事也首作七言詩以寫勝賞席客亦有以詩獻者更相酬和得若干篇乃命幕下吏會稽王霽為之字霽斐薄愧不能文勉從公命夫徘倡絃竹其樂外也吟詠情性其樂內也充諸內則能遺外之樂流于外則內有所喪今公既推內之樂以樂賔又盡外之樂以樂民可謂得其樂矣錦里風光勝别州海雲寺枕碧江頭連郊瑞麥青黃秀繞路鳴泉深淺流彩石池邊成故事茂林坡上憶前遊豫昔常陪樞密田公遊此緑尊好伴衰翁醉十日殘春不少留和韻范純仁東郊行樂冠西州古寺岧嶤占上頭化俗文翁傳愷悌尋山謝傅繼風流天涯樽酒欣相遇劒外三春得共遊雅興直須窮勝賞年光難使隙駒留和韻勾士良佛土依山福逺州春行繡騎上雲頭補天彩石盈池在朝海清江繞寺流四國仰煩郇伯勞羣生翹望謝安遊早知為礪為霖意惟有西民欲暫留夔冬暖雪不到地唯山髙處盡白它皆霏雨而已宋肇密下斜飛片片愁不堪飄泊向西州思家對雪誠何味只與羣山鬭白頭晚晴前人古道遙臨水荒城早閉門亂山銜落照歸鳥下空園江口漁人舫崖腰桑樹村客愁何可奈有酒莫空樽中秋對月用昌黎先生贈張功曹韻前人水精為鑑金為波挂空影寫山與河清光此夜十分好有酒有客宜髙歌去年今日行役苦若宿溪邊宿逢雨傳聞蜀道如天髙崖縣壁絶哀猿號波橫劒戟不易上陸有虎豹何由逃江山舊恃白帝險風俗猶帶烏蠻操驅馳兩月到西塞夢寐萬里還東臯嗅梅踏雪巴子里路入鬼門欣不死飛飛倦鳥惟思還玉筍豈是鹿官班餘生但願間及酒虛名寧顧觸與蠻良宵佳客十有五雲放月入樽罍間頽然老子興不淺韓詩坡句聊追攀君不見天寶霓裳羽衣歌人間樂舞難同科遺音猶在悲涼多有酒且歌遑恤他不飲如此良夜何上巳從史巫山􅰩飲江臯李􅌫風沙一夕卷冥冥曉色曈曚上翠屛薄宦驅人成老大佳時得酒慰飄零紅餘晚樹迷幽谷緑漲晴波失逺汀却是崇山兼峻嶺看來渾不減蘭亭踏磧張晉夔國先年有舊風來看踏磧莫匆匆只緣嵗稔民康樂才到春初氣欎蔥生怕背藍挨舞袖不妨腰鼓閙歌鐘元戎小隊臨江滸要與遺黎一笑同次韻宇文紹莊八陳圗前凛古風武侯英烈豈匆匆江流千載長嗚咽山插孤雲亦蒨蔥陡覺新春忘病思喜陪髙論自情鍾典刑前輩今能幾嵗晚相期華髮同次韻費士戣寶釧金叉盛峽風遨頭爭逐去匆匆旗標陳磧規模古筵挹晴嵐氣色蔥宜有明珠酬白璧空慚瓦缶間黃鐘紛紛雲片呈佳瑞一飽端知萬姓同官舍苦雨黃人傑漫空數日雨傾盆老屋淋漓瓦縫穿七月不虛為巧月今年賴得是豐年泥塗滑滑妨行客煙隴隂隂礙種田我欲乘風干造化盡披雲霧覩青天上元竹枝歌和曾大卿冉居常青春惱人思跰躚女郎市酒趣數錢不道翁家久留客紅襠幔結賽鞦韆學簫學鼓少年羣凖擬春來奉使君自向雕籠作行隊愛排好曲薦殷勤珍珠絡結繡衣裳家住江南山後鄉聞道使君重行樂爭携腰鼓趂年光元宵彭永巴人最重上元時老稚相携看點詩行樂歸來天向晚道傍聞得喚蠶絲全蜀藝文志卷十七
