body:
  text: 全蜀藝文志卷十九明周復俊編詩題詠下竹枝宋蘇軾竹枝歌上楚聲幽怨惻怛若有所深悲者豈亦往昔之所見有足怨者歟夫傷二妃而哀屈原思懷王而憐項羽此亦楚人之意相傳而然者且其山川風俗鄙野勤苦之態固已見於前人之作與今子由之詩故特緣楚人疇昔之意為一篇九章以補其所未道者蒼梧山髙湘水深中原北望度千岑帝子南遊飄不返唯有蒼蒼楓桂林楓葉蕭蕭桂葉碧萬里逺來超莫及乘龍上天去無蹤草木無情空寄泣水濵擊鼓何喧闐相將叩水求屈原屈原死已今千載滿船哀唱似當年海濵長鯨徑千尺食人為糧安可入招君不歸海水深海魚豈解哀忠直吁嗟忠直死無人可惜懷王西入秦秦關已閉無歸日章華不復見車輪君王去時簫鼓咽父老送君車軸折千里逃歸迷故鄉南公哀痛彈長鋏三户亡秦信不虛一朝兵起盡歡呼當時項羽年最少提劒本是耕田夫橫行天下意何事棄馬烏江馬垂涕項王已死無故人首入漢庭身委地富貴榮華豈足多至今唯有冢嵯峨故國凄涼人事改楚鄉千里為悲歌竹枝蘇轍舟行千里不至楚忽聞竹枝皆楚語楚言啁哳安可分江中明月多風露扁舟日落駐平沙茅屋竹籬三四家連舂並汲各無語齊唱竹枝如有嗟可憐楚人足悲訴嵗樂年豐爾何苦釣魚長江江水深耕田種麥畏狼虎俚人風俗非中原處子不嫁如等間雙鬟垂頂髮已白負水採薪長苦艱上山採薪多荆棘負水入溪波浪黑天寒斫木手坼龜水重還家足無力山深瘴暖霜露乾夜長無衣猶苦寒平生有似麋與鹿一旦白髮已百年江上乘舟何處客列肆喧譁占平磧逺來忽去不記州罷市歸船不相識去家千里未能歸忽聽長歌皆慘悽空船獨宿無與語月滿長江歸路迷路迷鄉思渺何極長怨歌聲苦淒急不知歌者樂與悲逺客乍聞皆掩泣巴女謡唐于鵠巴女騎牛唱竹枝藕絲菱葉傍江時不愁日暮還家錯記得芭蕉出槿籬蜀箋宋文彥博素箋明潤如溫玉新樣翻傳號冷金逺寄南都豈無意緣公揮翰似山隂萬蝶花宋蘇轍誰唱殘春蝶戀花一團粉翅壓枝斜美人欲向叉頭插又怨驚飛鬢似鴉蜀地海棠前人蜀國天餘煦珍葩地所宜濃芳不隱葉併豔欲然枝襞影分羣蕚均霞點萬㽔回文錦成後夾煎燎烘時蜂蕊迎銜密鶯梢向坐危淺深雙絶態啼笑兩妍姿絳節排煙竦丹釭落帶垂童容鄣畏薄便面到憂遲媚日能徐照暄風肯遽吹蜀少疾風故華愈盛惜歡當晼晚留恨付離披麗極都無比繁多僅自持損香饒麝柏照影次瑶池畫要精侔色歌須巧騁辭舉尊頻語客細摘玩芳期英韶在前徒矜下里之曲風雅未喪豈繁繫轅之音不圗綴綺靡之辭抑將導敦厚之音耳海棠雖盛於蜀人不甚貴因暇偶成五言百韻律詩一章四韻詩一章附于卷末知我者無加誚焉沈立岷蜀地千里海棠花獨妍萬株佳麗國二月豔陽天叢蕚勻如布修㽔巧似編彤雲輕點綴赤玉碎雕鐫瑟瑟光輸瑩猩猩血借鮮淺深相向背踈密遞勾牽輕蒨重重染丹砂細細研蕊纎金粟拱鬚嫩紫絲拳紅蠟隨英滴明璣著顆穿初莖爭裊娜翹幹共蹁躚絶代知無價生香不減􅀢分靈應桂苑鍾粹定星躔木帝經邦相花王入室賢祥颷加剪拂卿靄共陶甄真宰隂推轂勾芒與著鞭不須憂薄命好為惜流年贊翼施生柄扶持煦嫗權主張韶令正調燮淑威宣和氣髙低洽芳心次第還金叉人十二珠履客三千雲雨迷巫峽風波怨洛川娉婷宜住楚妖冶合居燕繡被通宵展華燈徹曙然橫披前檻外半出假山巔暗羡遊蜂採偷輸蟻穴沿瘦嫌蛛網織帚怯女蘿纒蓄恨憑誰訊無言只自憐文君酒罏畔揚子草堂前品格生來别風流到老全繁中生悵望衆裏見喧闐暄暖精神出晴明意態便關關鶯對語兩兩燕髙騫天上宜封殖人間偶佇延共櫻圍别館與杏擁斜阡清暖簾爭卷黃昏幕尚褰低籠金轣􅣗髙映畫鞦韆忽認梁園妓深疑閬苑仙匆匆來蕙圃逺逺别芝田羞隱暝濛霧輕如淡蕩煙乍逢開羽扇初喜下雲軿髣佛回星靨依稀帶翠鈿五銖衣宛轉七寶帳翩翾獨立挨霓節成行列彩旃困宜歆虎枕步好襯金蓮舞定休回袖粧濃不傅鉛蓋張松鬱鬱茵藉草芊芊馥郁蘭供夢枎疏栁伴眠軀輕彌綽約腰細更便嬛婭姹常顒若幽柔自灑然侍兒羅白芷婢子列芳荃口口濃檀注腮腮薄粉填解圍施葉幄買笑有榆錢旖旎環瑶席婆娑匝玳筵嬌依屏曲曲泣對露涓涓南陌輕埃蔽東郊夕照連幾時休縹渺從此識嬋姢是處遺簮珥誰家不管絃妬姬貪恐失戲稚惜何顛折閃搔頭褪擎摐約腕揎戴遮鬟上鳳裝壓鬢邊蟬汲引新歡聚消磨宿忿蠲縱觀須倒載命宴必加籩翻曲教歌媛更詞送酒船鄉心須暫解病眼當時痊迢遞來油璧從容住錦韀雅宜交讓目穠與棣棠聨不憤參朱槿寧甘混木綿酴醿潛矢色躑躅敢差肩紫奈思投迹夭桃恥備貟梧桐愧金井芍藥濫花磚併壓辛夷俗還宜乙夜看天恩無久恃人寵莫長專布影交三徑敷榮遍一㕓凝眸方曄曄回首旋翩翩可忍驚颷挫胡須急景煎珊瑚隨手碎絳雪繞枝旋拂漢霞初散當樓月自圎飄零隨蠛蠓散亂逐漪漣灼灼龜城外亭亭錦水邊抱愁應慘蹙有淚即潺湲午影迷蝴蝶朝寒怨杜鵑物情元倚伏人意莫拘攣擢秀髙羣木稱珍極八埏未開猶脈脈憂落固悁悁别著新文紀重尋舊譜箋共知紅豔好誰辨赤心堅實可陪朱李根宜灌醴泉栽須鄰竹柏樹莫繞烏鳶如託膏腴茂當隨富貴遷為多猶底滯因逺尚迍邅客思易成亂心期未省愆畫思摩詰筆吟稱薛濤箋醉目休頻送詩情豈易緣薛能誇麗句鄭谷賞佳篇止感芳姿美那憐託地偏山經猶罕記方志未多傳巧詠憂才竭冥搜得意填遐陬寡真賞僻境忍輕捐抽祕慚非據探竒敢讓先援毫敘名卉聊用放懷焉海棠石延年君看海棠格羣花品詎同嬌嬈情自富蕭散豔非窮舊縠斑吳苑新羅碎蜀宮錦窠杯裏影繡段隟前烘心亂香無數莖柔動滿叢意分巫峽雨腰細漢臺風盛若霞舒卷鮮於血灑空髙低千點赤深淺半開紅粧面朱才布膏唇檀乍融色焦無可壓體瘦不成豐枝重輕浮外苞疏密閙中難勝蜂不定易入蝶能通答朱公綽牡丹詩宋祁珍花分清賞飛郵附翠籠蹄金點鬢密璋玉鏤跗紅香惜持來逺春應摘後空玩詩仍把酒悵不與君同新繁縣東湖瑞蓮歌王益火雲爍盡大幕醒水光弄碧涼無聲荷花千柄拂煙際傑然秀幹駢天英天敇少昊偏滋榮宵寒仙露饒金莖嫋嫋飄風起天末緑華璫珮來琤琤觥觴式宴資擊賞何人掞藻飛筆精越國亭亭八百里木蘭泛詠稱明媚爭如錦水𣲖繁江孤根擢翠葩分膩紫清合曜流霞暉楚臺無夢朝雲飛韓虢佳人新侍寵溫泉宮裏賜霞衣赫赫曦陽在東井珍房萃作皇家慶流火初晨復育靈連壁更疑唐傑盛眇觀熙政集元和嘉穀重榮田野歌髙宗昔慶劉仁表五色卿雲世其少我今取喻進德流優哉祥蓮出池沼草萊泥滓俱棄捐致君事業殊商皓歸作臯夔稷卨臣同心一德翊華勳和梅摯東湖已月湖水平鱗波暗織簫籟聲中有植蓮一萬本紅漪相照摛繁英地靈氣粹不我測雙葩倐如同一莖黃姑織女渡銀漢霓旗鳳葆羅空青又認英皇立湘渚翠華不返凝怨慕五十哀絃頓發聲駢首低昂泣珠露是時主人集宴喜湖光浸筵霞腳膩朋簮峨峨盡才子椽筆交輝雲藻麗酒酣倚欄惜紅輝煙素徘徊縈不飛魏宮甄后晝方寢髣佛有人持玉衣此邑古今無異政室家瘡痏何由慶三年鼠竊例皆然以薪救火火彌盛自公柅車政克和載途鼓腹騰謳歌歌公用心日皎皎不獨于今古應少因感珍芳兩兩開玉貫珠聨開縣沼况我與公髙適道高歌詎襲商山皓嘉謀嘉猷思入陳願將此美歸華勳蜀箋一軸獻太傅同年葉兄司馬光西來萬里浣花箋舒卷雲霞照手鮮書笥久藏無可稱願投詩客助新篇望日與諸公會於大慈聞海雲山茶合江梅花開遂相邀同賞雖無歌舞實有清歡因成拙詩奉呈前人野寺山茶昨夜開江亭初報一枝梅旋邀座上逍遙客同醉花前瀲灔杯秀色霜濃方潤澤暗香風靜更徘徊仙姿莫遣常情妬不帶東山妓女來蜀花以狀元紅為第一金陵東御園紫繡毬為最范成大西樓第一紅多葉東苑無雙紫壓枝夢裡東風忙裡過蒲團藥鼎鬢成絲紫荷車峽山此樂甚多前人緑英吐弱線翠葉抱修莖矗如青旄節草中立亭亭根有卻老藥鱗皺友松苓長生不暇學聊冀病身輕錦帶花東南甚珍此花峽中蔓生山谷前人妍紅棠棣粧弱緑薔薇枝小風一再來飄飄隨舞衣吳下嫵芳檻峽中滿荒陂佳人墮空谷皎皎白駒詩寶相花前人誰把柔條夾砌栽壓枝萬朵一時開為君也著詩收拾題作西樓錦被堆太平瑞聖花前人雪外捫參嶺煙中濯錦洲密攢文杏蕊髙結綵雲毬百世嘉名重三登瑞氣浮挽春同住夏看到火西流垂絲海棠前人春工葉葉與絲絲怕日嫌風不自持曉鏡為誰粧未辦沁痕猶自宿胭脂十一月十日海雲賞山茶前人門巷歡呼十里村臘前風物已知春兩年池上經行處萬里天邊未去人客鬢花身俱嵗晚粧光酒色且時新海雲橋下溪如鏡休把冠巾照路塵清明日試新火作牡丹會蜀人以洛中千葉種為京花單葉為川花前人再鑽巴火尚浮家去國年多客路賒那得青煙穿御栁且將銀燭照京花香鬟半醉斜枝重病眼全昏瘴霧遮錦地繡天春不散任教簷雨卷泥沙謝人寄蒙頂新茶文同蜀土茶稱聖蒙山味獨珍靈根托髙頂勝地發先春幾樹驚初暖羣籃競摘新蒼條尋暗粒紫蕚落輕鱗的皪香瓊碎髼鬆緑蠆勻漫烘防熾炭重碾敵輕塵惠錫全來蜀乾崤盞自秦十分調雪粉一啜咽雲津沃睡清無夢清吟健有神氷霜疑入骨羽翼要騰身磊磊真賢宰堂堂作主人玉川喉吻澀莫厭寄來頻二色芙蓉前人蜀國芙蓉名二色重陽前後始盈枝畫調粉筆分粧處繡引紅針間刺時落晚自憐窺露沼忍寒誰念倚霜籬主人日有西園客得爾方於勸酒宜孫知微畫前人太古竒偉士精思獨於畫馳心入茫昧萬物赴揮灑當時一名重顧陸非爾亞卓哉青城筆妙絶冠天下寥寥九天仗一一若神寫吾恐千載後是終無繼者玉局洞石恪畫仙人四壁喻汝礪真人何年下紫清目睛飄墮如流星至今玉洞通窈冥蕭然紫室之威靈杖履而來六月望赤臯裂石風淒泠屹然四壁呀欲動神怪夭嬌目喪睛道與之貌非丹青馭風而行誰使令雲飛電掣集帝所超然得意皆天人異哉石子偉丈夫胸中磊磊怪所儲元圃之山帝所居子遊其間墮雙鳬不然安知天上有此樂秃筆一掃凌方壺細看毛骨分錙銖偉形傑狀人人殊古來列真誰所摹前稱關同後張圗近之豪者郭忠恕落筆拂戾如奔諸兩公軼蕩不拘束筆力磊砢相劘扶我來慿欄聊一呼隨翁聨軒上清都錦屏山暮景前人暝色輕煙罩郡城漁舟燈火倒觀星寒山逺水江村暮自在粧成水墨屏題龍岩寺石刻文與可墨竹程壬孫風雨勞先别敢辭樽酒深一梢墻上竹留作嵗寒心同前李元應淺梢疏節任蕭郎正向祁寒敵曉霜清興未窮僧已老自餘山色與溪長蜀酒歌陸遊漢州鵝黃鸞鳳雛不鷙不搏德有餘眉州玻璃天馬駒出門已無萬里塗病夫少年夢清都曾賜虛皇碧琳腴文德殿門晨奏書歸局黃封羅百壺十年流落狂不除遍走人間尋酒壚青絲玉瓶到處酤鵝黃玻璃一滴無安得豪士致連車倒瓶不用杯與盂琵琶如雷聒坐隅不愁渴死老相如偶過浣花感舊遊戲作前人憶昔初為錦城客醉騎駿馬桃花色玉人携手上江樓一笑鈎簾賞微雪寶叉換酒忽徑去三日樓中香未滅市人不識呼酒仙異事驚傳一城説至今西壁餘小草過眼年光如電掣正月錦江春水生花枝闕處小舟橫間倚胡床吹玉笛東風十里斷腸聲浣花賞梅前人老子人間自在身插梅不惜損烏巾春回積雪層氷裏香動荒山野水濵帶月一枝低弄影背風千片逺隨人石家樓上貪吹笛肯放朝朝玉樹新蜀苑賞梅前人十里溫香撲馬來江頭還見去年梅喜開剩欲邀明月愁落先教掃緑苔跌宕放翁新醉墨淒涼廢苑舊歌臺盛衰自古無窮事莫向昆明嘆劫灰席上作前人緑波畫槳浣花船清簟疏簾角黍筵一幅葛巾林下客百壺春酒飲中仙散懷絲管繁華地寄傲江湖浩蕩天浮世升沈何足計丹城碧落珥貂蟬故蜀别苑在成都西南十五六里梅花至多有兩大樹夭矯若龍相傳謂之梅龍豫初至蜀嘗為作詩自此嵗常訪之今復賦此前人昔年曾賦西郊梅茫茫去日如飛埃即今衰病百事懶陳迹未忘猶一來蜀王故苑犂已遍散落尚有千雪堆珠樓玉殿一夢破煙蕪牧笛遺民哀兩龍臥穩不飛去鱗甲脫落生莓苔精神每遇雪月見氣力苦戰氷霜開羇臣放士耿獨立淑姬靜女知誰媒摧傷雖多意愈厲直與天地爭春回蒼然老氣壓桃杏笑我白髮心尚孩微風故為作嫵媚一片吹入黃金罍綿州録事參軍廳觀楚公畫鷹少陵為作詩者前人我來訪古涪之濵不辭百罔冀一真走馬朝尋海棕館斫鱠夜醉魴魚津越王樓髙亦已換俯仰今古堪悲辛督郵官舍最卑陋棟撓楹腐知幾春巋然此壁獨無恙老槎徑翮完如新向來劫火何自免叱呵守護疑有神妖狐九尾穴中國共置不問如越秦此時此物合致用下鞲指呼端在人會當原野灑毛血坐令萬里清煙塵老眼還憂不及見詩成肝膽空輪囷龍挂前人成都六月天大風發屋動地聲勢雄黑雲崔嵬行風中凛如鬼神塞虛空霹靂迸火射地紅上帝有命起伏龍龍尾不卷曳天東壯哉雨點車軸同山灌水溢路不通連根拔出千丈松未言為人作年豐偉觀一洗芥蒂胸銅馬歌王灼郫城村民鑿古墓得銅馬高三尺許制作精妙前簡池守景季淵取以歸風雨輒聞嘶聲怪之不敢留移送佛寺紹興丙子豫以事至成都黃伯淵見索作銅馬歌君不見武皇逸志凌九垓追風躡影思龍媒魯班門外立銅馬天廄萬匹皆塵埃又不見伏波將軍破交賊歸來殿前獻馬式據鞍習氣殊未衰想見老子真矍鑠兩京翻覆知幾秋只有山河供客愁孤煙落日蠶叢國出此神物於荒丘千年黃壤誰作主猶把歸心泣風雨但恐一朝去無蹤有似豐城寶劍化雙龍張飛刁斗上有八分飛所書也張士瓖天下英雄只豫州阿瞞不共戴天仇山河割據三分國宇宙威名丈八矛江上祠堂嚴劒珮人間刁斗見銀鈎空餘諸葛秦州表左袒何人復為劉杜鵑宋肇暖雲無定半隂晴茅屋紙窗深復明喬木參天竹千莖巴山欲曉風露清杜鵑飛鳴繞江城魚復四月江水生林花落盡空含情瀼東瀼西朝暮聲次韻袁升之遊海雲寺鴻慶院山茶之作蒲瀛山茶兩本上連空疊葉棲枝占佛宫雀尾有金輸紺碧鶴頭無火讓殷紅優於峽茗稱呼異劣與梅花氣候同誰識諸天雨花外道人宴坐雪霜中梅林分韻詩有序杜謹言紹興庚辰十二月既望縉雲馮時行從諸朋舊凡十有五人携酒具出西梅林林本王建梅花苑樹老其大可庇一畝中間風雨剝裂仆地上屈盤如龍孫枝叢生直上尤怪古者凡三四酒行以舊時愛酒陶彭澤今作梅花樹下僧為韻分題賦詩客既占韻立者倚樹行者環繞仰者承薌俯者拾英吟態不一皆可圗畫是行也余被命造朝行事薄遽重以大府衣冠謁報主人饋勞酬對奔馳形神為之俱敝諸公導以斯遊江流如碧玉平野秀潤竹塢桑疇連延彌望民家十十五五籬落雞犬比閭相親不愁不嗟余散䇿其間蓋不知向之疲苶厭苦所在也昔人謀于野則獲間暇清曠有爽於精神思慮遊不可廢如此哉又况所與遊皆西州名俊喜事者即詩成次第不以長少以所得韻之後先聨成軸客十有五韻止十四呂義父别以詩字為韻又有首眩詩不成者缺樹字一韻余過沉犀樊允南監鎮稅語允南補之諸公又屬時行為之序十五人者成都楊仲約施子一呂周輔義父智父澤父宇文德潛呂默夫杜少訥房仕成楊舜舉綿竹李無變潼川于伯永正法寶印老縉雲馮當可得舊字竹村喜紆徐江雲迷昏晝踟蹰馬上語嫩寒入衣袖天公惜梅花破臘開未就留以待君來春風本如舊一尊既相屬勿辭作詩瘦明年用和羮請為使君夀得時字李流謙巾冠墮城府桔橰無停時胸脾貯黃埃空慕林壑姿涎流方外勝秦人望軒羲萬金買間日駕言一舒眉冒踏衆俊場更從百代師食魚得河魴熊蹯佐其滋西林煙雨村霜條出氷㽔鳥鵲噪寒瞑玉立交參差置尊枎踈下老幹虬蛟馳落蘂不動塵初無犀駭雞羞我木石資鬭公瓊琚詞深酌起自勸滕莒吾封圻公行對宜溫雲霧生攀躋能來玩墟落匹馬却蓋麾蟠胸萬螮蝀寰區眇毫絲以兹接羣動白羽坐指撝笑彼豢外者組紱為之鞿它年駟馬還梅花當十圍識此黃公壚下車挽客衣未覺邈山河一醉也大奇得愛字呂及之去城十里南郊外突兀老梅餘十輩玉雪為骨氷為魂氣象不與凡卉對我來窮冬煙雨晦臨風把酒從公酹人言此實升廟堂埋沒荒村今幾嵗清芳不為無人改捐氣何妨本根在瑰章妙語今得公國色天香真有待歸路從公巾倒戴俗物汚人非所愛我公行向日邊歸此段風流入圗繪得酒字宇文師獻平生慕英遊望公如山斗一見開心誠已落諸人後龍門豈甄擇大小俱容受聨轡尋勝踐春風倚尊酒惟公對江梅端若同志友土色洗塵沙幽姿出藜莠命客花下坐相與沃醇酎非公無此客譬諸草木臭向晚入深巷蒼根欹甕牖始知水西頭臥梅勝臥栁有客三嘆息此樹驚老醜一笑客誠癡萬法要經久竒卉如尤物過眼不必有惠我終日香重來香在否但從此理悟那復長搔首念公捧召節修名當不朽艤舟未忍去招尋訪林藪中心甚虛明外慕厭紛糾杖履循古岸細話猶開誘再拜誦公詩一洗芻豢口得陶字楊大光蟠根寄荒絶擢幹空櫹椮鄉來聞妙語剪拂到兒曹垂老猶叵堪開落幾徒勞不謂勤杖屨惠然排蓬蒿尚能領諸生相就醉澄醪真賴旁輝映并覺標韻髙酒闌興未已分韻看揮毫籍湜俱可人冥搜爭過褒乃知天地間一等為賢豪橫飛與陸沉亦各繫所遭受命起窮邊國柄行當操盡期如此花曉夕幸甄陶得備和羮用寧不出伊臯百年幾春風勿令心忉忉得彭字于格庭柯臥蒼虬閲世如聃彭朔風破檀蕊零露滋玉英江空人響絶影落千丈清今代文章籙縉雲生齊明躍馬覘春色觴客江上亭三嗅韻勝華霜霰飽曾經及時剝其實可用佐八烹幸因輶軒使錫貢充廣庭王明儻豫燭和羮登簋鉶得澤字僧寶印江路嵗峥嶸酸風更蕭瑟發興訪梅花主盟得詩伯孤芳有餘妍初不帶脂澤香度竹籬短影搖溪水碧同時飲中仙著我林下客春槽沸滴紅滿坐喧舉白澆胸獨茗碗臭味曽不隔公今日邊去陛下正前席請看枝頭春中有和羮實反騷試與提不礙心鐡石得今字楊凱蘭亭久陳迹修竹空自隂龍山亦淒涼鮮花誰與簮英遊曠千載盛事新梅林四海馮黎州未妨鐡石心提携到諸子遍賞江之潯房亭姑射仙玉立何森森謝氏六君子對飲香滿襟西郊訪老龍竒怪尤可欽宛然如先生髙臥嵗月侵從兹飽薰風佳實共鼎鬵正味悅天下妙用無古今去去好著鞭江南春已深得作字呂商隱一樹知獨秀十里方出郭江流浩清泠露氣疑淒薄胡為此行色疲馬外踴躍玄冥正擅令植物困搖落身心縱未改佳意久已惡喜見南北枝粲然秀氷壑千林色暉映百畝香磅礴首破春風荒獨傲清雪虐坐令芳信傳芬菲到羣蕚如一君子信茹連俱有託相期飲此意浩蕩放杯酌更應護攀折嘉實須若若終收調鼎功傅巖真可作持問縉雲老一尊笑相酢得梅字馮時行霜朝馬蹄無纎埃錦城城西江之隈金蘭合香俱明來白沙鱗鱗江水洄梅花傍江髙崔嵬人言猶是王建栽豪華過眼浮雲哉下馬酌酒聊徘徊飛英送香來酒杯酒酣疾呼竹籬開走尋屋角如龍梅梅龍雖多此其魁睡龍屈盤肘承胲風欺雪虐封蒼苔孫枝迸出誰胚胎天公撫摩春為回慎勿變化隨風雷年年開花照尊罍我欲結茅買芋煨與梅周旋送衰頽得花字呂凝之出郭豈憚逺滿城無此花新枝開玉雪老樹臥龍蛇臨水互蔥蒨傍籬忽橫斜詩聲寫竒怪畫本出槎牙老子晉彭澤諸公賈長沙不尋龍李盟來嗅霜露華杖履穿茒舍壺觴倩酒家飢餐香馥郁醉藉影參差月白鴈成字江清魚可義風流一時勝野意十倍加祇恐天上去迹陳錦江涯歸來馬蹄疾驚飛滿林鴉沈黎使君與客飲王建梅林分韻作詩過沉犀以詩相示闕樹字令漢廣補之樊漢廣墻頭冉冉新陽露忽作玲瓏玉千樹老蛟偃蹇獨避人卷回飛雪江臯暮何處鳴禽來好音四月枝垂起黃霧摧折霜餘初不懼笑看春光等間度百年夢幻欲無言吹落吹開豈風故時來薦鼎真偶爾小住疏籬非不遇我知天地絶茫茫無為展轉獨多慮為花悽斷却回頭爾亦微酸若難茹得下字施晉卿郊原宿雨餘雪重雲垂野春信初動搖欲往豈無駕使君早著鞭問路逢耕者深尋煙雨村共作詩酒社庭荒得老樹氣象自儼雅一笑呼酒來大盆注老瓦最後看枯株何意當大厦夭矯待風雲有年天實假須知羮鼎調嘉實名用捨我欲夀使君樽罍更傾瀉明朝得楚騷健甚無屈賈君今有賜環詔落九天下蜀江雪浪來棹趂船人把留滯以諸生斯文要陶冶惟應郢中歌倡絶和自寡更聞督熊兒夜賦燭餘灺它年看無雙聲譽出江夏却笑昌黎公阿買字能寫賦成都碧雞坊李氏石君事見成都古今記中蓋湖石之最大而竒者著名舊矣孫松夀造化小兒斫山骨幾年流落蛟龍窟太湖一碧浸玻璃瀾吞浪吐窮奔突瑰竒未許困泥沙漂出江臯空㟮屼清寒偃蹇如髙人肯向蓬蒿念埋沒曩聞上苑饒竒珍千形萬狀髙嶙峋當年搜索困山海氊包席裹車轔轔規模豈但肖五嶽氣象直欲凌三神一朝戎馬窺城下例隨矢石荒荆榛憐君分落幽人手不逐爾輩汙塵垢首陽寂寞伯夷清瀟湘冷落三閭瘦李侯胸中飽雲夢得君不用斯瓊玖館之舊隱與周旋竹士松賔三益友相看一洗名利心眉宇更清元德秀君今幾世德未衰霜寒玉立癯而夀咄嗟世眼多嗜好玩形忘理十八九竒章所蓄森琅玕名標甲乙空紛然到溉竒礓髙崒嵂一擲徒為負進錢石君于汝非不厚較其所得無何有願公世濟此君為不朽鴈詩朱乘八月新霜岸草枯數聲哀怨鴈來初憑君試向沙汀看恐帶胸奴二帝書髙宗皇帝聞之嘆曰此人頗有愛君之心彌牟鎮孔明八陳圗詩王剛中我稽八陳圗規模載方册朅來鎮西蜀夔門觀疊石賦詩百數字字字究來歷進涉漢川西彌牟鎮之北平原列堆阜灘石同一式細思作者意孔明有深䇿髙岸或為谷灘石存遺迹江海變桑田平原猶可覓故今兩處存千載必一得再歌遂成篇當有智者識題陳去非王摩詰嘉陵圗王安中干戈已暗大同殿管絃猶喧凝碧池别寫嘉陵三百里右丞心事欲誰知邛州青霞嶂青霞嶂與石城山相連張愈霧山環合自雲川户有清溪種玊田萬本桃花不知處幾人曽得問秦年萬安驛張縯徑兵重作付胸奴毆雀毆魚計自踈地入萬安知幾許却憐此邑始回車縯詠萬安驛明皇幸蜀至此嘆曰一安尚不可得况萬安乎題柯敬仲畫前人豫先世居隆州州治之後山石室翁守郡時隆為陵州州事簡時來就吾家拾故紙背作芧蘭竹木之屬所得頗多吾幼時尚收得數紙今亦亡之丹丘生用文法作木竹而坡石過之近又以新意作墨花甚妙從子悅有眉山學官之行立為作此豫愛而賦之昔者老可守陵州守居北山吾故丘太守時來看山雨每畫紙背成滄州老蒲松煙色過重揮霍隂崖交劒矛百年離亂亡故物敝篋江南誰復收新圗篔簹枝葉修使我不樂思昔侯碧雞祠前杜宇叫五女井上叢篁幽裳梨樹髙青子落碧花翠蔓縈牽牛揚雄無家不歸老蠨蛸蟋蟀寒相求丹丘先生東海客何以見我空山秋蕭條破墨作清潤殘質刋落精英留陂陀重復分細草山石縈紆生亂流眉山學官莫厭冷言歸故鄉非逺遊石田茅屋儻可得萬里欲上東吳舟百花潭深濯新錦持報以比珊瑚鈎題商德符蜀山圗前人每愛商公寫蜀山蒼崖直下竹林間錦城雨後江沙白劒閣霜餘木葉殷何處揚雄池盡墨誰家杜甫月臨關釣鼇海上天空濶待得仙槎一往還蜀人鎦夢良效楊補之掀篷圗一首前人錦屏山下花如錦却愛清江野水邊放筆豈能無直幹掀篷方欲鬭清妍最憐半靣欹歌扇更笑輕身障舞筵君看上林千樹雪繁枝何處獨姢姢題王庶山水前人蜀人偏愛蜀江山圗畫蒼茫咫尺間駟馬橋邊車蓋合百花潭上釣舟間亦知杜甫貧能賦應嘆揚雄老不還花重錦官誰得見杜鵑啼處雨斑斑題秋日蜀棠前人野棠青子來青鳥霜日清妍欲近人忽見嬌然紅數蕚劇憐秋色勝於春酒肆明晏鐸半幅青簾栁外斜甕頭春色泛桃花遙思昔換金龜處知是長安第幾家詠栁邊驛前棕樹劉成得雲林秋盡葉齊凋棕樹臨風翠羽搖江上人家欲聽雨故栽濃緑當芭蕉毗橋兩渡盧雍橋斷毗江路殘霞水底天渡邊還有渡莫怪急呼船桂湖夜月前人月白湖光淨波寒桂影繁人間與天上兩樹本同根全蜀藝文志卷十九
