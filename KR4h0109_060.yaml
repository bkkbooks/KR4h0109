body:
  text: 全蜀藝文志卷六十明周復俊編尺牘與周益州書周撫為益州刺史永和三年凡八則王羲之足下今年政七十耶知體氣常佳此大慶也想復勤加頥養吾年垂耳順推之人理得此以為厚幸但恐前路轉欲逼耳以爾要欲一逰目汶領非復常言足下但當保護以俟此期勿謂虛言得果此縁一叚竒事也去夏得足下致卭竹杖皆至此士人多有尊老者皆即分布令知足下遠惠徃在都見諸葛顒曾具問蜀中事云成都城池門屋樓觀皆是秦時司馬錯所修令人逺想慨然具示為廣異聞云譙周有孫高尚不出今為所在其人有以副此志否令人依依足下具示省足下别疏具彼土山川諸竒揚雄蜀都左太冲三都殊為不備悉彼故為多竒益令其逰目意足也可得果當告卿求迎少人足耳至時示意遲此期眞以日為嵗想足下鎭彼土未有動理耳要欲及卿在彼登汶領峨眉而還實不朽之盛事但言此心已馳於彼矣知有漢時講堂在是漢何帝時立此知畫三皇五帝以來備有畫又精妙甚可觀也彼有能畫者不欲因摹取當可得否信具告嚴君平司馬相如揚子雲皆有後不彼鹽井火井皆有否足下目見不為欲廣異聞與謝安書法帖不載蜀中舊有石刻前人蜀中山川如岷山夏含霜雹校之所聞崑崙之仲也與某帖王獻之益部耆舊傳令送想催驅寫取了慎不可過淹留米元章釋為益郎非與蕭紀書梁元帝蜀中斗絕易動難安弟可鎮之吾自當滅賊又别紙云地擬孫劉各安境界情深魯衛書信常通與孫叔靜簡宋蘇軾眉山人有巢谷者字元修曽應進士武舉皆無成篤於風義已七十餘矣聞某謫海南徒步萬里來相勞問至新興病亡官為藁殯録其遺物於官庫元修有子䝉在里中某已使人呼䝉來迎䘮頗助其路費仍約過永而南當更資之但未到耳旅殯無人照管或毁壊暴露願公愍其不幸因廵檢至其所特為一言於彼守令得稍修治其殯常戒至者保護之以須其子之至則恩及存亡耳死罪死罪答蜀僧幾演幾演大士䝉惠蟠龍集向已盡讀數冊廼文筆力竒健深増闕伏闕嘗觀貫休齊已詩尤多凡陋而遇知得名赫奕如此盖時文凋弊故使此二僧為雄强今吾師老於吟咏精敏豪放而汨没流俗豈亦有幸不幸耶然此道固亦澹泊寂寞非以蘄人知而鼔譽也但鳴一代之風雅而已既承厚貺聊奉廣耳與巢元脩日日望歸今日得文甫書乃云昨日始與君瑞成行東坡荒廢春笋漸老餅餤已入未限聞此當俟駕耶老兄别後想健某五七日來苦壅𠻳殊甚飲食語言殆廢矧有樂事今日漸住近日牢城失火燒蕩十九雪堂亦危潘家皆奔避堂中飛熖已燎簷天幸而先生兩瓢無恙四石亦吐芽矣答佛印禪師塵勞衮衮忽得來書讀之如蓬蒿藜藿之逕而聞謦欬之音可勝慰悦且審即日法履輕安又重以慰也某䝉恩擢置詞林進陪經幄是為儒者之極榮實出禪師之善禱也餘熱千萬自重重答佛印人至承誨示知俶裝聚道㑹見不遠豈勝欣慰向冷跋涉自愛與家復禮復禮眉州人前日辱訪别悵戀不已隂寒起居佳否送行詩别寫得一本都勝前日書者復納去遠道萬萬自重黔中與人簡頃承惠香極清淡可喜毎與範道人同之耳比來絕無香材時時焚降真甲籛淺俗零霍虛躁非主人深静不能調制此物耳聞元叔苦瘡瘍遂平復否焚香何不見寄如王所獻天女惟我能受可以與我呵呵答唐彦道比因三家作酒皆美以飲客因作三頌謾往一笑有金桃棕栮二頌熱倦未暇録也王廣道有舉業言行有常可喜人也言欲㳺富義謁入關齎欲倚公一言為重如何答從聖使君此帮茶乃可飲但去城或數日土人不善制度焙多帶煙耳不然亦殊佳今往㸃州都濡月兎兩餅施州入香六餅試將焙碾嘗都濡在劉氏時貢炮也味殊厚恨此方難得真好事者耳與曹使君伯逹再拜啓伏承手誨分惠荔子色香動人眼鼻誠與山煙溪露俱來乃知䕫峽荔枝已勝嶺南珎香眷與之意無以為論黔中與人帖十五則升菴臨庭堅頓首竊觀鎮静足以安夷獠清節足以服吏民郡閣宴閑時與僚佐歌舞以謝江山當亦無不樂時别後未嘗不思英對也齋中小宴歌舞中更得新進否此邦樂籍似皆勝渝瀘㣲有成都之風也餘甘乃有一種大者如李其質味甘脆與常見者絶不類或云蠻中有之西域傳云餘甘二種大者生青熟黃小者始終青色盖信然矣惠酒殊佳斤燭甚如法弓弢通裙亦精緻併佩珎貺昨仲牖過此盛稱亞室之秀惠纎濃合度笑語不可忘女功尤妙公濟來又言作瓠羹極道地故奉麺一石作瓠羹也一噱昨日舍弟荷招喚時暑煩二姬叙挿大似不識好惡然䝉眷與之厚感愧不可言有竹紙乞數十但恐亦竭矣承惠伊蒲之饌感刻感刻比辱寵顧匆匆不得欵停車馬甚愧得手字承侍奉萬福為慰昨日市中已見蠟梅開者數枝矣惠紫蓴金山豆豉皆佳物手寒研凍道謝不能十一笋甚竒庭堅再拜喜承起居清安閣中小閣皆佳勝東樓碾茶豈作堰閘處耶尚阻參承千萬珍重四月十三日庭堅頓首元長元度等書亦是一時之傑但鄙性不甚悦之若有所譏評則二公方失勢不若不評之兩得也盛暑奉報草率悚仄悚仄望之去後令弟必將汧國入城其人亦肯調伏成家否無縁㑹面聊寄一笑所喻快一時之語好事者將以為美談此至言也敬佩玉音服之無斁承諭小李數問動静想瑯瑘不見問也一噱瑯瑘秀慧清歌有出藍之聲比得數新曲恨未得新教耳鄂渚亦有二三子可與娯毎至樽前未嘗不懐清對也王環中時得近履舄否圓通道人諸山之冠也時請見接清談否小樂府至今未成盖數月不作文字如井泥不食徒費井綆耳秋月晴徹頗得淺斟低唱之樂否恨不見小粧與常娥争暉人還奉書草率八月十六日庭堅頓首德修都監在藏仁觀辱垂顧甚惠放逐不齒因廢人事不能奉詣甚愧來辱之意所須拙字天涼意適或能三二帋門下生輙又取去六十老人五月揮汗今實不能辦此想聰明可照察也承晚涼遂行千萬珍愛象江皆親舊但盛暑非近筆研時未能作書見者為道此意來人索索作此所謂草草輟慧中之簾甚愧孫子曰將欲奪之必姑與之此倒用司農印耳余嘗愛山谷刀筆其蒼古如商彛周鼎其壯健如陣馬風檣不獨度越當時實能凌跨往昔今兹數帖集中所未載觀夫命辭醖藉用筆遒勁且升菴逼真之臨風骨宛然可不謂之三絕矣乎反覆展玩弗覺心醉神降隋珠趙璧恐不足為寳矣嗚呼望厥影孰若覩厥形安得韓叅將家藏真跡一寓目耶聞已化去莫知所在然異物胡能自秘斗間紫氣試於中夜候之容可得其珍收處也全蜀藝文志卷六十
