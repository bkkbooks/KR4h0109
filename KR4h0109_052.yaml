雲外尊師碑在雲升宮唐杜光庭文見九城志今名棲霞宮人物碑所勒皆車馬人物或云古者修車馬備器械之圖也興元府碑記張騫墓碑墓在城固縣西二十三里有碑文字磨滅不可辨李固墓碑墓在城固縣西三十里唐韋臯撰碑記檢玉觀碑在西縣一里本津口化按舊經云昔有褒氏女并陳安民於此上升仙有唐會昌中鐫石題記重修安逺城碑在西縣城內中間門東漢司𨽻校尉楊君頌集古録𨽻書不著書撰人名氏文為韻語碑在興元漢公昉碑集古録𨽻書不著書撰人名氏及年月在興元唐公碑在城固縣北三十里唐公廟前碑文缺落其略云唐公城固人也有仙人與公藥妻子六畜倐然與之俱去餘皆不可識諸葛武侯行廟碑在西縣唐貞觀十一年置永平間石門記羊州志云在今興元褒縣石門有記云高祖受命興自漢中道由子午出散入秦梁蕭懿墓碑劍南詩藁云興元姚節度園以所碑為石筍文尤可識蓋梁蕭懿墓碑簡文為太子時撰書法遒徑可愛褒城驛記唐孫樵撰在雙林驛山南西道額李陽冰撰山南西道新修驛路記集古録唐劉禹錫撰栁公權書李陽冰篆額號三絶碑開成中山南節度使歸融自散關南至劒門鑿山石棧道千餘里以通驛路碑不著所立年月在興元張將軍新廟記集古録唐李巨川撰唐彥謙書楊守亮重修張魯廟也以龍紀元年立在興元魏石門碑永記二年太歲己丑梁秦典籖王遂書洛陽縣武何仁鑿刻武侯碑陰孫樵撰唐山南西道節度使廳壁記開成二年劉禹錫撰棧道銘歐陽詹撰興元新路記有石刻凡七十字其側曰太康年案其刻乃晉武平吳時蓋晉由此路耳文宣王廟庭松記節度使令狐楚命掌書記鄭從誨作從誨餘慶之孫幹之子也圖經李宗諤書舊志閻倉舒序利州碑記唐南池新亭碑劒南詩藁云唐長慶中南池新亭碑在漢高帝廟側亭已失所在唐李義山碑在籌筆驛舊有碑近經兵火不存棧道銘歐陽詹文有銘蘇頲利州北佛龕前重題在佛龕山谷紀行碑在嘉川縣靈溪寺元豐三年題圖經寧武志鄒卿序楊炎正編閬州碑記唐貞觀碑王蜀咸康碑並在太霄觀其石光瑩前後可鑒人號透明碑顔魯公磨滅記在新政縣離堆岩下歐陽公集古録唐顔真卿撰并書碑以寶應元年立在閬州元稹留題唐元稹以諫官責通判司馬今達州也曾遊雲臺山書行紀於山之鍾樓枋上新政縣大厯碑在新政縣江崖之次顔魯公書碑傍有佛老孔子像像傍有一小記皆大中之所建也王徽留題唐僖宗朝丞相王徽未第時曽經閬中次南部合符寺登高念逺因賦詩李後主書南唐李主煜尤善書元祐二年太守李孝直乃煜族孫也家藏得親書李白古風模勒於石江之普通院崔善德政碑王蜀武城中崔善為刺史有惠政里人為德政碑今在衙門之東鮮于氏神道碑一在二教院崖上一在墓田其文與書皆出顔魯公又有奬諭仲通碑亦在墓田非魯公之文亦魯公之筆也裴晉公銘南部裴迪唐丞相晉公之後國初為新政令因家南部至今尚收得晉公之像及纍任告身自撰真贊墓銘亦並存焉唐道襲墓碑在報恩寺汝南令神道闕在閬中縣郡守張晦辨云於東西得𨽻字十有二缺不可識有七冦萊公詩公嘗過本州闕井慈光院留海棠詩云喧風花雜滿欄香盡日幽吟嘆異常翻笑牡丹虛得地玉階開落對君王今龕於縣廳柱上司馬公留題本路運使司馬池丞相光父也天聖九年遊台星巖君實侍題於崖上末云司馬捧硯閬苑記朱涉文前記何水文續記曹無忌文新記王震序隆慶府碑記李業闕在梓潼縣西五里舊經云前漢侍御史李業葬此遭赤眉毁破二闕臨關路其破亦漢𨽻後漢趙相國雍墓石闕在梓潼縣北二里前有石闕石麟其文曰漢趙相國雍府君之墓漢沛國范伯文墓石闕在梓潼縣東六里有墓闕上有文曰丨丨丨丨丨丨丨丨丨晉張載劒閣銘王隱晉書云昔張載隨父入蜀作劒閣銘益州劒史張敏見其文乃表天子刻石於劒閣焉魏太尉鄧公神廟記唐長慶四年劒州刺史邢册題鄧艾衛聖侯碑在普安縣北十五里唐中和五年八月劒州刺史郭淮立石唐李商隱重陽亭銘在郡東山之陽唐大中八年太守蔣公侑創亭李商隱序而銘之石刻今存悟本寺碑寺有盧照鄰所撰碑歲月既久其文缺焉清義何氏古碑在劒門縣有登高臺存一古碑唐光宅中建其間所載有名墓者於此生四子孝弟義遜家八十口不異居儀鳯二年敕賜清義門陰平縣記唐大中六年周芮撰開元寺重修中和極樂院銘大順三年劉崇望記唐韋表微劒閣銘劉國均石刻在普安縣報國寺靈泉昔唐僖宗巡幸至此有微恙飲其泉頓覺清愈名為報國靈泉今有石刻存焉宣詔亭內碑以天成四年四月二日記在本州郭璞縣路讖石刻在武連縣據郭璞云縣路翠武功貴縣路清武功榮其後青城何居琰宰是邑遂刻石於縣治之門內以詔邦人景福院石碑在梓潼縣二十五里葛山之景福院始州碑在劒門縣二十里許有二古州基自縣至彼攀木緣壁至此稍平有一豐碑字多磨滅開皇三年李德林文土人謂之丨丨丨蓋隋時以此為始州也巴州碑記唐守巴州裴禕修廨宇記會昌四年甲子歲立今在郡廳唐古佛龕石刻在城南二里有大書石刻載唐乾元三年山南西道嚴武奏臣頃牧巴州其州南二里有古佛龕舊石鐫五百餘伏望特賜洪名敕以光福為額北山老君影迹詩正望山舊名北山山半石壁隱出老君像唐人為賦北山老君影迹詩唐張禕題擊甌樓唐中和四年尚書右丞相户部張禕記賦在樓下唐巴州紫極宮記大中元年軍事州官進士蕭珣記在迎真宮唐嚴將軍廟記廟在城西門內碑在本廟唐貞元元年韋曽為廟記南龕題詩石刻在州南二里之廣福寺自唐迄今名公題咏皆刻之於石唐兜率寺碑在東龕寺廢而碑存碑字不可辨集州兩角山記唐集州刺史楊師謀書今在難江縣集州紫極宮記唐開元二年兵部尚書牛仙客作在難江縣唐李繼顔誥詞刻於郡廳唐光化三年中書舍人錢珝行放生潭字州東五里有一潭潭一石上刻丨丨丨丨每水落石出方見意亦唐時刻也薛史君布政碑唐乾符年間璧州刺史裴置辭作石作乾符間立唐人題西龕櫻桃詩在西龕其名磨滅成王李雄讀書臺石碣今在梓潼縣七曲山顯德中璧州神廟石刻今在通江縣北四十步有元光三年制書刻于石龍興寺碑在通江縣南一里龍興寺唐璧州刺史鄭凝讀之父鄭畋作乾符中鄭凝讀侍養其父畋於璧時所作也璧州山寺記大唐中和歲次癸卯丞相鄭畋書菖蒲澗記唐開成四年或云集州刺史蘇味道遺迹也石古峽記趙寅為集州刺史作丨丨丨丨在難江縣唐貞元石刻恩陽縣南渡江登石梯數百級上義陽舊縣治石梯之側懸崖下有刻字云唐貞元之四年十月二十日再修此路餘皆磨滅不可辨南隆州牟縣界碑在恩陽縣西北百里有斷碑刻云南隆州牟縣界十里北集州難江縣界五里縣令李昱所立唐韋蘇州詩丨丨丨丨送令狐岫宰恩陽詩刻石於縣之驛亭唐難江公山威惠廟記唐天寶改元田彥識撰廟在難江縣神乃漢張魯之神也唐嚴武乞賜山南寺表乾元三年南山記唐中和四年尚書右丞相户部張禕題巴南新置屋宇什物石記會昌四年巴州刺史裴禕記孫氏園石刻在通江縣二十里龍灘之側唐末監察御史盧仲阜率璧州刺史辛巢父等六人分韻賦詩有石刻在焉瘞麟銘淳化中牛生竒章於集州山民魏臯家鹿首魚尾魚鬛而龍鱗四趾始生身五色民以為妖而斃之乃瘞於縣北十五步楊義仲為之銘修路記鄭子信撰城牙樓記圖經云李楫為記有舊碑二其一偽蜀廣政己未之記其一天聖乙丑之記七佛龕圖經云乃唐張禕扈從僖宗入蜀時經此所鐫龕名公巨卿題咏甚多皆刻之於石沙􅀈渡碑在難江縣唐集有刺史蘇味道題字云嚴侍御暮春五言在西龕寺史俊寄嚴侍御楠木詩在南龕郗昂陪嚴使君墓春五言二首在南龕詩甚典麗蕭珦建天王堂記在天王堂羊士諤十四咏在東龕折栁詩十絶嘉祐五年太守鄭淵賦栁詩十絶刻石其自序見折栁亭下流杯十四咏流觴亭在西龕寺上唐乾元戊戌嚴鄭公武所創大厯間盜起地遂廢開成丙辰刺史唐元封復修蓋取羊士諤流杯十四咏以自序為證云巴南十七景蘇欽以閬中望江南十首記郡景别駕使彭永仍賦丨丨丨丨丨闕清化前志教授劉田闕編續志教授李鈞闕編蓬州碑記隋蒙州普光寺碑歐陽集古録云蒙州普光寺碑蒙州耆漢南陽郡之育陽縣也碑以仁壽元年建碑無書撰人名氏而筆畫遒美玩之忘倦蓋開皇仁夀以來碑碣字畫多妙而往往不著名氏惟闕道護所書嘗著之然碑石在者尤少余每與蔡君謨惜之自大業已後闕更與虞世南書妙盛既接於唐遂大顯周萬歲通天碑報恩光孝觀在石泉縣有丨丨丨丨丨丨前內供奉書手王惠元書其石擊之清亮全類玉音碑陰有段文昌留題西天佛人碑在大聖廳院唐僖宗碑圖經云今碑子渡有唐僖宗道碑云乾符四年漢陰縣助修道施主云云安康志郡守家子缺序大安軍碑記九井灘記九井灘有大石三其名魚梁龜堆芒鞋觜危參差相望於波間操舟之人力不勝舟而輒為石所觸故抵於敗誠令絶江為長堤度其南别為河道以分水勢則北流水益減而石出矣以火煅醯沃金鎚隨擊之宜可去如其言治之明年三大石不復見而九井遂平元祐五年轉運使陳鵬云龍洞記自三泉西二里見有若觀闕者當其前迫而視之則洞也其深七十三步廣半之其兩旁石壁之嵌空突怒者若目鼻口指甲跟肘甚具其下皆平石為底水文其上若鋪管簟石隨其間若設爼豆其兩顔皆瘦木翠蔓間石蘿生萎蕤下覆若綴纓絡木蔓之間布水之道後先交映若垂冕流水落石底其勢跳瀉與石相鬬若濺玉雪其聲鏘鳴與洞相應若響琴築寒清幽邃殆非人境劒門關碑記修關石刻在天成五年四月又有五代敕牒甚多皆天成長興廣政間牒也唐碑在劒門山巔有一寺曰梁山寺産茶亦為蜀中竒品東坡南行録題木櫪觀詩有云飛簷如劒寺之語其下注云出劒門東望有一寺山巔樓閣隱隱可見有二三碑皆磨滅上丨丨也劒門銘李文饒集云丨丨丨注劒門當中有一岑峻嶺橫峙望若蕭屏北一峯最竒而説者未嘗及也故銘云羣山西來波積雲屯地險所會斯為蜀門層岑峻壁森若戈戟萬壑奔東雙飛髙闕翠嶺中橫黯然黛色樹若雄屏以衛王國唐叔明題劒門貞元二年張允書碑在關之棄繻亭之南百步唐劒門山記有碑在關之內棄繻亭之南百步唐盧照鄰悟本寺記在故臨津縣悟本寺唐劒門制置之記廣明元年立碑在關之內棄繻亭之南百步唐劒閣碑李復撰趙清獻公留題在志公寺龍州碑記𢎞真觀古碑在江油縣南一百三十四里太華山之登真觀此記最古不記撰人姓名牛心山靈異記在牛心之顯濟廟即李龍仙廟也碑不載撰人姓氏龍門志楊嘉序續志朱之源序全蜀藝文志卷五十二
