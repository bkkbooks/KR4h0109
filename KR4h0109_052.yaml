body:
  text: 全蜀藝文志卷五十二明周復俊編宋王象之輿地紀勝碑目成都府碑記漢蜀太守何君造尊楗閣碑容齋隨筆云在成都其末云建武中元二年漢王渙墓碑在新都縣北五里渙字稚子東漢循吏也冡前有二石闕其一題漢故兖州刺史雒陽令王君稚子之闕其一題云漢故先零侍御史河內縣令王君稚子之闕漢文翁學生題名集古録不著書人名氏文翁題名可見者凡一百十二人碑在益州漢文翁石柱記集古録云漢𨽻不著書撰人名氏永初中火災被焚惟廟內兩闕存太守高瞬重立又於其東别築周公禮殿碑以初平五年立益州殿柱記舊謂鍾會書非也鍾會是晉咸熙元年始入蜀距漢興平初祀已七十一年不應追書也今在禮殿東漢學殿歲月記繫年録云紹興六年成都教授范仲殳奏疏言本府學殿建于東漢之初平漢人以大𨽻記其修築歲月刻于東楹至今九百四十三年蓋天下棟宇之古無過于此者高宗皇帝御書大成殿榜繫年録云紹興六年上書大成殿榜賜成都府府學左右生題名歐陽公集古録謂為晉宋間碑晉益州刺史羅君碑在碑隂晉朱齡石刻宋高祖檄譙縱文在石室館學廟堂記唐永徽元年賀公亮撰集古録謂不著撰人名氏不同州學廟堂頌唐神龍二年史夀撰唐太平公主出家敕在天慶觀孔子廟堂碑唐開元中周灝撰唐平蠻碑集古録云唐蕭晉用撰開元十九年刻石紀功在成都昭烈帝廟又容齋隨筆云成都有丨丨丨丨開元十九年南蠻為邊患明皇遣內常侍高守信為南道招慰處置使以討之拔其九城此事新舊唐書及野史皆不載肅宗以魚朝恩為觀軍容處置使憲宗以吐突承瓘為招討使議者譏其以中人主兵柄不知明皇用中人之有以啓之也先主廟碑貞元四年蘇端撰在昭烈帝廟中韋臯寶國寺記政元中立段文昌元和中律師銘共為一碑見在府學蠶市記韋南康文在華陽縣寶厯寺寺有南康像最得其真武侯碑陰記集古録云唐崔備撰元和二年武元衡刻及其寮屬題名於武侯廟碑陰古柏行長慶四年段文昌文重寫前益州五長史真記李文饒撰云益州草堂寺列畫前長史一十四人代稱絶迹余嘗於數公子孫之家獲見圖狀乃知草堂繪事靡不造真者余以精舍甚古貌像將頓乃選其功德尤甚者五人模於郡之廳記資福院記集古録云唐李德裕撰長慶二年立石諸葛武侯碑在昭烈帝廟中長慶四年裴度撰栁公綽書總綰大學碑周益州刺史齊國公宇文憲頌德碑也石室贊唐維州刺史鄭藏休撰大厯十年殿中侍御史李樞篆修文宣王廟碣會昌五年裴坦撰唐栁公權書金剛經在城嘉祐禪院唐僧大辨修功德碑元和十五年立在文殊閣唐韋南康碑二並在大慈寺福殿中石本九經在府學容齋隨筆云皆孟昶時所刻其書淵世民三字皆闕畫蓋高祖太宗諱也龍興寺碑容齋隨筆云乃前蜀王氏時所立及唐諸帝皆平闕闕高駢築城記唐中和四年翰林王徽記在城忠信相院孟知祥修城記後唐天成二年李昊記唐明皇追諡孔子册文本朝太平興國五年府尹辛仲甫立石十賢贊今存其七姚崇贊冉伯牛宋璟贊冉有源乾耀贊閔子騫韋抗贊子貢陸餘慶贊子路盧從願贊子遊裴璀贊子夏觀政閣記秦漢至唐闕太守刺史節度使之職有功績可考而畫像存焉得二十八人考别圖於他閣而榜曰觀政呂大功丨丨丨丨成都志云畫像存焉一十有八人李泉文翁王遵張堪第五倫廉范种皓李膺高瞬諸葛亮王濬髙八陸象先蘇頲嚴代翟寧韋臯髙崇文武元衡段文昌李德裕楊嗣復杜琮魏謨牛叢夏侯孜高馴陳敬瑄文翁等畫像十贊宋祁撰祠之內圖文翁莊君平鄭子真司馬相如揚子雲蜀土先賢凡九及公之像而十常山公贊蘇文忠公留題成都志云極樂院有蘇文忠公壁間留題至和丙申季春二十八日眉陽蘇軾與弟蘇轍來觀盧楞伽筆迹今存成都古今前後記眉山人孫汝聽修成都古今前後記六十卷見眉州江鄉志趙清獻公成都記見張有成光福寺記成都志袁説友序崇慶府碑記蜀府主碑在晉原縣西南二里唐房琯文唐李百藥碑在江原縣之萬歲寺文字殘缺唐開元碑唐天寶八年碑在晉原常清觀鮮于仲通文唐開元皇帝送趙仙甫尊師歸蜀詩碑見在新津縣寶真觀唐樊知遷碑在江原縣淨居寺唐顔師古文今頗殘缺翠圍山碑在永泰之翠圍寺文字殘缺萬歲寺碑碑記具存見萬歲寺注善頌堂留題見趙抃注范公鎮留題在太平院范公入蜀遊岷山過此紀闕於寺之經閣上云熙寧公年三月遊青城間四日趍峨眉俱過此與百世相見百朋百嘉侍行蜀郡公記法天寺留題見法天寺注蜀州刺史廳壁記唐紀事詩云貞元十四年皇甫徹刺蜀州時賦四相詩序云蜀州刺史廳壁記云居相位者前後四公謨明弼諧遷轉歷比顧已無取忝迹於斯景行遺烈嗟嘆不足也謹述其行事詠其休美庶將來君子知聖朝之德云爾眉州碑記漢刻黃龍甘露之碑在彭山之黃龍鎮楊洪碑漢犍為太守丨丨丨在今彭山縣北小板橋楊中云五十年前餘洪字其它皆磨滅不可考究今三字竟無矣北平山碑在彭山縣之北平山大書北平山治之碑餘不可讀碑陰書大唐闕元闕年道士尹侍衡等字南康郡王紀功碑唐貞元十三年建碑元在龍興寺乃皇太子誦書天聖五年移在州衙門外唐眉州創羅城記唐大順一年盧極撰文眉州新移彭山縣記唐會昌五年樓旦撰文唐丹稜縣龍鶴山成鍊師植松碑唐元寶元年歲次庚寅建城東貢院佛殿中唐碑及五代碑城東寺殿宇建於唐時今為貢院中有石碑二堵象耳山李白留題夜來月下卧醒花影零亂滿人襟袖疑如濯魄於氷壺也李白書杜子美兩川夔峽諸詩石刻黃庭堅書舊見大雅夷獠誓碑寰宇紀云在洪稚縣市中大池院題去眉山縣一十里蘇文忠公嘗過之今柱上有手書云自老翁井還偶憩治平丁未十二月某日子瞻凡十八字州園十詠紹興間邵博眉州古志孫汝聽編通義編家安國編江鄉志張伯虞編劉光祖序簡州碑記後周宇文泰紀功碑碑在本州界首云泰數遣都督入蜀一治石罔縣一治懷逺縣見簡池志郡守壁記名氏始唐貞觀十三年見劉左史折栁亭記韋南康紀功之碑在周治頒春亭側碑甚巨乃御製皇太子臣誦奉敕書唐乾符修城碑在州之城隍廟天光觀唐碑觀在陽安縣東三十里有唐碑可讀者云天和初三洞道士王君賜因張文舉施地基創建羅漢院石刻在陽安縣有僧繼暉斬木開基而岩石呈露見石鐫羅漢等像有碑曰唐興元年禪師道明鐫刻以為禪宮靈巖院石刻在平泉縣西南二十五里院中石刻字乃元和長慶間周文王廟碑在陽安縣西北七十五里即後周高祖文帝之廟舊碑題額云大周植其碑元年歲次丁丑造元年即後周閔帝之初元也今石刻存焉北巖院碑院有唐碑其歲月乃大厯時重修云聖居院碑唐申和年建嘉定府碑記漢楊宗暢墓碑墓在夾江縣東十里墓前兩闕其左𨽻書漢故益州太守楊府君諱德字仲墓道十六字漢和帝時開道碑在夾江縣西蜀郡青衣越嶲道界中有永和七年永和八年等字漢靈帝時張道陵碑在洪稚縣易俗鄉上有嘉平二年三月一日等字沐川古碑唐垂拱三年玉津令馬元慶等殺馬湖夷賊紀功今存李德裕石闕舊市鎮有名灘曰墨崔其上有唐李德裕領重兵過此九字孝女碑在犍為清溪口楊洪山下東漢永建初孝女叔先雄以父泥和墜湍水口喪不歸雄於父溺處自投水死後五日與父尸相持浮江上郡表言為雄立碑國朝至元祐中重立都安王廟碑碑載隋開皇九年置青衣縣後周保定三年置青州宣政二年始為嘉州靈鷲山碑唐貞元中僧乾老為其師道真令徐崇彛撰碑而碑刻於長慶中韋南康大像碑在凌雲寺大像之左郭璞移水記記謂世主播遷戎羯亂華於是優遊笑傲放意於山水間仍於嘉州城東百步烏丸山鑿書嵓而蘇子由詩亦指其注爾雅於此史謂入蜀之文謹按移水記有嘉州二字則非璞之手筆恐後人之附會耳蓋嘉州之名始於後周而自周已前止曰漢嘉郡曰龍逰縣耳安得有所謂嘉州哉或者後人書則未可知耳當考張無盡沐川寨記其略云南蠻東北接境常秋吐蕃以為中國患蓋其路一出大渡河一出沐川源一出馬湖江等其狹邪之徑曰榮涇曰八靣箐曰黑水曰中鎮曰賴因曰龍水曰陰川而沐川之路常為嘯集之地申孝友西南會要孝友論唐自開元之際始有南詔之憂蓋合六詔而南詔最強連吐蕃而蜀患乃酷降及太和之際李德裕作籌邊樓南詔頗有所憚而蜀賴之以安令西南諸蕃自祖宗以來以迄于今阻隔大蕃之要道賓為蜀部之藩籬是致雲吐之二蕃不復疥疽於中國今邊夷近屬雖衆且微然而勢合則強力分則弱必離其黨使不得親分其勢使不得不弱斯可矣嘉定志郭公益編續志林潔已編嘉定詩岑參編雅州碑記漢蜀郡太守治道記其碑在榮經縣西二里建武中元二年立羊竇道碑在嚴道縣東三十里漢永初六年碑也漢故檢校巴郡太守樊府君碑建安十年三月上旬造髙孝廉墓碑在嚴道縣東二十里按其碑年月乃漢建安十四年高君兄弟皆孝廉有二大闕其一曰故益州太守武陰令上計吏舉孝廉諸部從事高頤字貫方其一曰漢故益州太守陰平縣都尉武陽令北府丞舉孝亷高君實字貫光又一大碑其首云故益州太守高君之碑邛崍關開路記天寶六年章仇兼瓊記龍興寺碑在州城外有咸通四年再建丨丨丨丨吳行魯建又有二蘇先生墨迹亦在本寺平羌江繩橋碑在嚴道縣平羌江有唐咸通十年上官朴所撰碑字亦𨽻體今在江瀆廟兩面碑在盧山縣南五里與府君碑甚近碑靣闕與背皆有篆文歲久訛闕不可識或辨其文曰盧上縣闕碑尊健閣記建武中元二年其碑在榮經縣西三十里景峪縣崖間闕巽嵓李燾有跋以辨正年譜且言按後漢紀建武二十三年夏四月後為中元無建武字又按祭祀志改建武二十三年為建武中元元年以此知記與志合而紀失之矣神水閣記在榮經縣東二十里銅山峽中碑字磨減今已不復可考故老相傳其體大率如尊健閣字云李白月下帖在郡治楊凝式詩帖在郡治魯直木蘭歌帖在郡治魯直梁甫吟帖在郡治雅安志李嗣文序威州碑記鼓角樓記唐維州軍事判官高測文乾符五年十月十五日維州刺史闕光置天寶寺碑唐咸通六年建軍事判官陶師文伏波廟碑唐咸通八年左武衛兵曹參軍崔遂文茂州碑記唐回車院碑唐刺史蓋巨源撰大中十三年立唐刺史題梁黃唐梁記有寶厯元年刺史竇季餘大中三年刺史劉成師咸通三年刺史蓋巨源題張延賞修城記董守愚兩路記載唐大厯十四年吐蕃大下火焚豫郊館興元元年張延賞重修其後别駕大夫修建城宇堡壁雉堞茂州治平寺碑寺舊在外緣叛羌董阿丹焚元豐初移入城滋茂池善應廟碑張商英無盡居士闕其神或傳姓吳或傳姓郭頗有異同西山記紹聖中茂守曹坦作更生閣記政和丁酉倅二跨鼇先生李新目擊靜州之變記載其事甚詳圖經郡守史憲序隆州碑記漢黃龍甘露之碑在籍縣江口上鋭下方其狀如鍾大書丨丨丨丨丨丨丨文字餘不可讀其可識者羣臣將軍位號蓋為龍紀也豔陽洞石碑在洞之顔書曰豔陽仙洞四字字體兼篆不知何代書旁有欵識歲久磨滅東南貴人見此碑本寶而藏之以為真漢𨽻也唐金剛經碑在佛龕山磨崖唐真觀中率更令歐陽詢書道超和尚精德碑在石城山平等寺天寶四載薛兼金撰開國王碑在唱車山貞元元年貴平令王覺紀張天師靈廟碑元和十五年知陵州李正卿撰貴平縣牟尚書墓記見在報恩寺開成四年吳商撰篆字心經碑在小大悲