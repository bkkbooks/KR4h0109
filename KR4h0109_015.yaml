body:
  text: 全蜀藝文志巻十五明周復俊編詩懐古八陣圗見唐語林晋桓温訪古識其真尋源愛徃跡恐君遺事節聊下南山石蜀四賢詠宋鮑照渤渚水浴鳬春山玉抵鵲皇漢方盛明羣龍滿階閣君平因世間得還守寂寞閉簾注道德開卦述天爵相如達生㫖能屯復能躍陵令無人事毫墨時灑落褒氣有逸倫雅繢信炳愽如令聖納賢金璫昜羈絡良遮神明游豈伊覃思作𤣥經不期賞蟲篆憂散樂首路或参差投駕均遠托身表既非我生内任一作甚豐薄登琴臺梁簡文帝蕪階踐昔徑復想鳴琴游音容萬春罷髙名千載留弱枝生古樹舊石染新流由來遞相嘆逝川終不收蜀城懐古劉希夷蜀上遶水行呉天積風霜窮覧通表裏氣色何蒼蒼舊國有年代青樓思豔粧古人無嵗月白骨宜丘荒寂歴彈琴地幽流讀書堂𤣥龜埋卜室采鳳滅詞場陣圗一一在柏樹雙雙行鬼神清漢廟鳥雀恭秦倉歎世已多感懐心益自傷頼䝉靈丘境時當明月光巫山懐古前人巫山幽隂地神女艶陽年襄王伺容色落日望悠然歸來髙唐夜金缸熖青煙頽想臥瑶席夢魂何翩翩揺落殊未已榮華忽徂遷愁思瀟湘浦淒凉雲夢田猿啼秋風夜雁飛明月天巴歌不可聴聴此益潺湲白帝懐古唐陳子昂日落滄江晚停橈問土風城臨巴子國臺沒漢王宮荒服猶周甸深山尚禹功巗懸青壁斷地險碧流通古木生雲際歸帆出霧中川途去無限客坐思何窮陳拾遺故宅杜甫拾遺平昔居大屋尚修椽悠悠荒山日惨澹故園煙位下曷足傷所貴者聖賢有才繼騷雅哲匠不比肩公生揚馬後名與日月懸同遊英俊人多秉輔佐權彦昭超玉價郭振起通泉到今素壁滑灑翰銀鈎連盛事㑹一時此堂豈千年終古立忠義感遇有遺編漢州月夕遊房太尉西湖李徳裕丞相鳴琴地何年閉玊徽房公以好琴聞于海内偶因明月夕重敞故樓扉桃李蹊空在芙蓉客暫依南史安陸侯與王書仲玉長史庾杲之稱泛渌水依芙蓉何其麗也誰憐濟川楫長與夜舟歸重題前人晚日臨寒渚微風發櫂謳鳳池波自閲魚水運難留亭古思宏棟川長憶夜舟想公髙世志祇似冶城遊奉和劉禹錫太尉留琴地時移重可尋徽絃思掩抑風月助登臨榮駐清油騎髙張白雪音祇言酬唱美良史記王箴重題李徳裕静對烟波夕猶思棟宇清臥龍空有處馴鳥獨忘情顧步襟期逺参差物象横自宜雕樂石爽氣際青城奉和劉禹錫木落漢川夜西湖懸玉鈎旌旗還夜次舟楫泛中流目極想前事神交如舊遊瑶琴乆已絶松韻自悲秋重題李徳裕林端落照盡湖上逺風清水榭芝蘭室仙舟魚鳥情人琴乆寂寞烟月似平生一泛釣璜處如聞流水聲房公舊竹亭聞琴緬慕風流神期如在因重題此作李徳裕流水音長在青霞意不傳獨悲形解後誰聴廣陵絃奉和鄭谷石室寒颷警孫枝雅器裁坐来山水操絃斷弔餘哀奉和劉禹錫尚有竹間露永無碁下塵一聞流水曲重憶飡霞人經杜甫舊宅雍陶浣花溪裏花多處為憶先生在蜀時萬古只應留舊宅千金無復換新詩沙崩水檻鷗飛盡樹壓村橋馬過遲山月不知人事變夜米江上與誰期觀八陣圗劉禹錫軒皇傳上略蜀相運神機水落龍蛇出沙平鵝鸛飛波濤無動勢鱗甲避餘威㑹有知兵者臨流指是非詠張柬之柬之曽為蜀郡守今崇慶州也皇甫澈周厯革元命天步値艱阻烈烈張漢陽左袒清諸武休明神器正文物舊儀覩南嚮翊大君西宮朝聖母茂勳鑄鐘鼎江山食茅土至今稱五王卓立邁千古詠鍾紹京紹京曽謫守蜀州前人清宮閶闔啓滌穢氛沴滅紫陌重昭回皇天新日月從容廟堂上肅穆人神悦唐元作命功輝煥何烈烈武擔蜀事補亡宋宋京君不見蜀王妃子墓突兀成都城中若山積墓頭寒鏡澁無光妬月欺煙化為石鴻荒無根馮野史直謂山妖化妃子臨終未免懐闕運土山中葬於此闕錦江邊用是得名闕空翠老大闕穴西山出捲簾化闕如汲冡書免使後人疑徃昔龜化蜀事補亡前人君不見秦時張儀築少城土惡易敗還顛傾力疲智竭築未就神龜為爾開其靈龜行所至城不圮板築之功從此已功成隱去智且賢城下于今祇流水殷勤髙謝余且網不夢元君寜自放儀兮儀兮奈爾何口舌縱横飾欺妄天使神龜籠爾術不言而行功自畢安得人靈若爾靈照見百為心暇逸禮殿蜀事補亡前人君不見漢人制作禮殿存法度嚴廣分卑尊祇今年數不可考列盡古帝丹青昏晉人遺書刻柱邊字畫刓缺骨氣全衣冠真不異闕里事業直笑銘燕然鏘鏘似有環珮聲七十二子羅簮纓閉藏濁世如有待開眼今日觀文明陳倉石鼓歸辟雍大成門閥何穹崇安得貌取禮殿制太學西有宣尼宮石室蜀事補亡前人君不見西漢文翁為蜀守蜀學不居齊魯後諸生競欲保翁名石室鐫磨貴難朽東漢髙公又幾時作為石室還如兹至今二室堅且乆文公髙公名不衰世間可傳唯鐡石石終可裂鐡終蝕古人好事留其名石室存亡竟何益漢水沉碑知在不叔子名存空峴首安得眼看石室銷要知二字名終有玉局蜀事補亡前人君不見青陽老人飛下天口宣至道朝羣仙地中神人捧玉局異事秘怪于今傳龜城坤隅地有穴俗説西與岷山連嵯峩古觀森偉像老柏惨澹含風煙令威已去城郭在人物自改名依然亳州宮庭煥星斗真皇行幸祥符年所託得地近京邑地獨隱晦遐方偏安得老人洗此心還我澹泊同古先嚴真蜀事補亡前人君不見荘遵賣卜成都市市中仙隱無人值百錢度日復何求猶有沉冥見文字不因問著牛女星下世安能知姓名雲中鷄犬㧞家去舊宅寂寞秋蕪平搘磯石在年年長藥鼎空留閉黄壤前時發掘篆籀新明水神丹光滉瀁金鴈橋邊臺觀存神仙遺事渺難論安得先生為我卜俗骨庶可窺天閽琴臺蜀事補亡君不見成都郭西有琴臺長卿遺跡埋黄埃千年免為狐兔窟化作佛廟空崔嵬黄鬚老人猶記得昔時荒破樵蘇入鉏犂畏淺牛脚蹴古甕耕開數逾十乃知昔人用意深甕下取聲元為琴人琴不見甕已掘唯有鳥雀來悲吟一朝風流隨手盡况復千年何所訊安得雄辭弔汝魂寂寞秋蕪耿寒燐墨池蜀事補亡前人君不見子雲草𤣥西郭門一逕秋草閒朝昏何須筆冡髙百尺池墨黯黯今猶存童烏侯芭竟零落𤣥學無人終寂寞漢家執㦸知幾年垂老身投天禄閣俗兒紛紛重劉向思苦言艱動嘲謗漢已中天雄亦亡不較空文從覆醤如今却作給孤園吐鳳亭前池水寒安得斯人尚可作㑹有竒字令君看書臺蜀事補亡前人君不見孔明書臺遺廟旁古書不見臺荒凉臥龍未起蜀天逺茅廬日日空南陽赤符光寒白水涸秣陵王氣猶能作璋若嬰兒操虎狼脱去荆州殊不惡十倍竒才安用書此臺昔時知有無蜀人思君識故處未若江水存兵圗黄冠所居門第改祇有臺名今尚在安得臺邊見古人秋草重生類書帶草堂蜀事補亡前人君不見少陵草堂背西郭浣花溪水流堂脚竹寒沙白自凄凉莫問四松霜草薄入門好在烏皮儿公去不歸換鄰里西嶺千秋雪未消舍北泥融飛燕子祇今榿木平橋路籠竹和煙雜江霧野僧作屋題草堂不是柴門舊時處詩壇今古誰能将艷艷文章光萬丈安得英才擅品量當使公居摩詰上訪古房偉訪古城西話劫灰子雲相如安在哉成都萬事變亦盡惟有石笋雙崔嵬遊山上廢寺有段文昌種松石刻云乾坤毁則無以見寺寺不可毁四松其逺乎寺今廢木亦亡矣感而賦之楊甲木落石出荒山臺上有佛寺孤崔嵬斷椽碎瓦無四壁古佛已倒何人推野蜂占窠挾肩背山䑕出穴銜髯䰄老僧見我欲愁哭野葛蔽路官能來文昌種松有斷刻石柱半裂荒莓苔舊時老翁無一在獨樹晚出非耆鮐乾坤未變已先滅幾見賊火飜征雷至今野叟鑿山破石窟尚有龍筋骸當時手種意已逺欲與草木為渠魁八陣磧蘇軾平沙何茫茫髣髴見石蕝縱横滿江上嵗嵗沙水齧孔明死已乆誰復辨行列神名非學到自古不留訣至人心已悟後世徒妄説自從漢道衰蜂起盡姦傑英雄不相下禍難久連結驅民市無煙戰野江流血萬人賭一擲殺盡如沃雪不為乆逺計草草常無法孔明最後起意欲掃羣孽﨑嶇事節制隱忍乆不决志大遂成迂嵗月去如瞥六師紛未整一旦英氣折惟餘八陣圗千古壮䕫峡八陣磧蘇轍漲江吹八陣江落陣如故我來苦寒後平沙如匹素乗髙望遺迹磊磊八十四遥指若布碁就是不知處世稱諸葛公用衆有法度區區落襃斜軍旅無濶歩中原竟不到置陣狭無所茫茫平沙中積石排隊伍獨使後世人知我非莽鹵奈何長蛇形千古竟不悟惟餘桓元子乆視不能去灘石八陣圗行王剛中我生孔明後相望九百載我想孔明賢巍然伊呂配竒謀勇略號雄師大節英風葢當代木牛流馬何足言八陣遺蹤千古在我行已度瞿塘門長灘石壘参差分洪纎髙下尺寸等猶有當年節制存四頭八尾觸處首敵衝中央兩皆救握竒如樞運無窮七縱七擒仍敢攻規模黄帝已垂文後來得者惟将軍唐宗李靖拾遺意樂舞旛表徒繽紛長江之上石蟠結江波洶湧石不滅使君何事遽剗除一夜風雷吼天闕明朝依舊石縱横神物䕶持人始驚向來守蜀用此法誰知石壘真金城嗟乎孔明遇不遇遇則劉公恢大度國險地狭民力㣲法出萬全勢未具嗟乎孔明以此用於呉長江内固魏可圗嗟乎孔明以此用於魏掃平三分歸一篲祇應所遇勢不同勢既不同功亦異嗟乎孔明之心如石堅欲扶漢室還中原事之不就則天耳安肯俯首從曹袁嗟乎孔明如生石不老後世用兵無草草忽然變作六花看使夫中原難按考請觀壘石韜機籌江流東去自悠悠英豪得此石外指長與君王靖邊壘觀八陣圗有感李興宗江從岷來觸瞿塘夏潦潰烈怒勢張霜溝水落洲渚露纍纍江石堆作行半斜半直半踈宻方營周匝門東出相傳呵䕶有鬼神驚波不能移寸尺想見當年諸葛公綸巾羽扇揮愁風令嚴部伍寂如水出沒變化機無窮乾坤不足當經理寫留古法艮岑趾上灘下峡一千年多少英雄測𤣥㫖小兒元子強多知常山蛇勢吾能窺㶚上枋頭真絶倒空使虬髯論倔竒斵輪不可傳其子此公天機緘骨髓奈何螟蝗生蝮蝎炎劉已灰吹不起天教三馬食一槽老馬蹄囓暫咆哮渭陽巾幗勢将蹶大星夜隕西軍號嗚呼興廢盡天意中原擾攘今六紀不堪骨月自相殘欲拯塗炭嗟誰使大官酣燕芻豢餘小官跼蹐塵埃裏舉目厭厭九泉人誰訪草廬談世事向來韜畧機莫投而今投機欠良籌君不見峡山深深茅舍底有人抱膝髙聲謳奉陪安撫大卿登八陣臺覽忠武侯諸葛公遺像偶成長句張縯白帝城西魚復浦十月江平見津滸當年累石紛成行此地臥龍經講武轅門外建儼中權陣有壁壘一門東出列陣相承存後伍八陣相承又列數陣于後何人蛇勢識常山未數魚麗矜鄭拒懸知精神貫金石尚想號令嚴鉦鼓老兵料敵應疑生川后澄波其敢侮向令赤伏有餘符下睨皇州真指取云何遺跡司神明獨靳豐功被寰宇髙城置酒共臨眺徃事興懐増嘆撫巍然王佐三代前信矣名言照千古巨埜李訦謁丞相祠登開濟堂俯八陣圗覩新帥張卿與侍郎林公舊題倡和皆慨想當時英烈嘆誦乆之惟瀼東流囓城入江且為民病願以不能轉石者一轉兹水輒借韵賦之前人人言忠孝不磨滅神物䕶持以終古千年陵谷幾變遷此石不後自章武本由黄帝占兵法六十四以八為伍髯孫且懼生逹走賊操遊魂何敢拒刻露銘沙状水底教戰石存山下鼓山下有石鼓相傳為教戰之鼔一片丹心天地開萬世聞風猶禦侮我來起敬凛如生再拜一言公必取瀼流東截陣圖前寖隳城壁頽民宇能安拳石止波流願回瀼患思民撫常使䕫人知感公踏磧年年弔千古八陣圗陳謙武侯陣法洞萬古所至累石傳岷嶓意令他時人共識不輕蜀血丹秦戈沔陽舊壘己草草道元徃記空摩娑廣都鄉名至今在鄉老相戒不敢磨八八成行被隆土兩陣二首形無頗乾坤門户取法象未顯竒正相交加惟有江流魚復浦因水成勢堆平沙前方壁門儼營制後如偃月不可俄七八為經分㦸立九六為緯標鱗差妙哉隆中先天學陣規八卦森包羅六十四陣極卦變縱横入出無聱牙更参禮經得深㫖畫前丘井分八家及其變動不可常𤣥前八佾舞象和四頭八尾法制定四正四竒合變多紛紛紜紜未易亂渾渾沌沌誰能遮晉家将軍最倔强到此驚見常山蛇既識端中相應法何為征北復成訛乃知天𤣥與地秘竒才不世空咨嗟緬懐牧郊釣潢客止齊歩伐聲無譁隂經軍志八為用指麾昧爽趨朝歌春秋蒐乗慚蕪率猶有魚麗恭鸛鵝樓煩秃騎到中國紛披誰恤狐鮐髽長平埋肉滿山谷昆陽積骸如亂麻自注孫經雜水陣華容道上宵焚葭茍無法制驅市人参肉偃首胡定呀蠶鳬宇令此荒廢直到分鼎成山河雜耕未盡星斗泣節制惜不開中華觸之可勝不可敗侮亡取亂明羲娥英雄相待得英衞翻為圎陣鋪六花功成演作破陣樂八舞校隊猶餘葩貞觀以來遽絶筆潼闗散卒奔濤斜古人紙上己糟粕况乃沙石喧江沲天公幸自惜人命約束澒湧嚴誰何捐國尋跡望千載嵩雲晝鎻髙嵯峩遊東屯關耆孫呼船渡西瀼䇿馬行東屯猶有竹下屋依然柴作門林深多鳥雀山對有猱猿世隔券猶在堂非基自存稼雲迷曠野屛翠隨層軒土厚疑吾里溪清何處源飡英金有種飯粒玉為根蘆笋戀春渚蕨芽蕃故園山名竊諸葛城榜為公孫雲雨峡前夢琵琶山後村留人惟野趣隔市絶塵喧墻度鳥飛影泥留兎走痕漁樵老嵗月藜莧過朝昏槎漢我初返梯参君暫捫車徒今附驥行列舊同鵷休沐因閒日携持訪古原摧頽一弊節走逐雙朱轓凉飈薄巾袂佳氣浮酒樽出游有此樂相視而無言則為樵夫嘲甚於人言煩取君古錦囊盛我浣花畨歸去待星上隨江看月翻二月晦游東屯拜少陵像陳邕飛飛鳴梟啄金屋孔雀飲泉牛扺觸杜䳌喜免百巢嗔鷦鷯強息一枝足燭天光焰幾許長日眩東極升朝陽世人謾作詩老看肩拍呂葛心羲皇玉珂金鑰裁通籍錦水銅梁俄浪迹兩戎磔裂甲欲洗四壁呻吟飯無喫萍漂蓬轉客䕫門栖遲瀼西復東屯羣峰竦壁水縈帶有怪膴膴如周原縱横豺虎深稂莠熊兒執耒驥子耨除芒落杵未流匙問有長安消息否峡雲巴月困宴捜去醉洞庭湘浦秋溪山留得金石響定應騎氣時神遊捫參歴井甘飛轍端為穿花聴鳥設簿書叢裏掣舟來風雨聲中與春别仰窺層閣俯平川想見杜曲桑麻田更起鳴酬儻可待一彈指頃三千年題臥龍查籥山顛祠貌儼丹青十載懐人為一登隱隱故營連白帝茫茫恨水向西陵石根蘭芷香無價雲頂松杉翠作層人事天機古難料詩成試語定中僧訪蘇黄遺墨前人檻外㴞㴞水嵓前冉冉雲行人舟似葉題墨蘚生紋嵗月帆檣去山川楚蜀分十年三艤棹永愧北山文傷廢國詩蜀僧逺公樂極悲来數有涯歌聲纔歇便興嗟牽羊廢主尋傾國指鹿姦臣盡破家丹禁夜凉空鎻月後庭春暖漫開花兩朝帝業空成夢陵樹蒼蒼噪暮鵶詠古前人西蜀稱天府江山秀而竒肇開人皇世繼封軒轅支杜宇傳鼈靈怪誕良足疑世代已云逺是非誰復知大禹奠梁州故績昭可稽岷嶓既云藝江漢亦東之誰謂闗塞通始自嬴秦時豈知秦所開金牛一路岐我登岷之椒欲和梁山詩揚雄戴錦雄謂藏心於淵噫心藏矣而身獨不藏乎食新禄而投閣心果不在於身乎莽之簒其來也漸矣曽不以太𤣥卜之而擇夫閴乎不可見者藏之誓不使莽涎垂鼎而汚我之槧乎然禄薄而官也累嵗不遷殆以貧故至禍已廹而不能去乎論其世文髙而行朴視孟氏焉醇大而疵小也議者槩以投閣藐之亦過矣茍處其地何如而藏焉曰豫雲嶺矗玉筆錦江洄練文山川發靈氣蜀郡生子雲寂寞性所忍雄談坐不聞墨池染竒字可但書八分法言凖論語太𤣥索羲文始也食漢禄駸駸近妖氛天械脱已晚投閣非其君愧乏太乙杖吹嘘縱殱焚執是論出處幽蘭斷竒芬臨風重太息俗轍何紛紛東溪驛前人登登山路髙還下馥馥香林淺又深何處斜陽重回首東溪寥落百年心東溪先生書屋也全蜀藝文志巻十五
