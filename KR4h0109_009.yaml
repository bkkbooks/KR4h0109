body:
  text: 全蜀藝文志卷九明周復俊編詩江山下巫山高齊虞羲南國多竒山别巫獨靈異雲雨麗以桂陽臺重怨一作千里思勿言在可一作可再得特美君王意高唐一斷絶光隂不可遲同前劉繪高唐與巫山參差鬱相望灼爍在雲間氤氲出雲一作霞上散雨收夕臺行雲卷晨帳出沒不易期嬋娟似一作以惆悵同前梁元帝巫山高不窮逈出荆門中灘聲下濺石猿鳴上逐風樹雜山如畫一作盡林暗澗疑空無因謝神女一為出房櫳同前梁王泰迢遞巫山好一作竦遠天新霽時樹交涼去逺草合影開遲谷深流響咽峽近猿聲悲只言雲雨狀自有神仙期同前梁范雲巫山高不極白日隱光暉靄靄朝雲去溟溟暮雨歸巖懸獸無迹林暗鳥疑飛枕席竟誰一作空薦相望日一作空依依同前陳蕭詮巫山映巫峽高高殊未窮猿聲不辨處雨色詎分空懸崖下桂影一作月深澗響松風别有仙雲起時向楚王宫同前唐鄭世翼巫山凌太清岧嶤類削成霏霏暮雨合靄靄朝雲生危峯入鳥道深谷㵼猿聲别有幽棲客淹留攀桂情同前陸敬巫岫鬱岧嶤高高入紫霄白雲抱危石玄猿迥挂一作挂迥條懸崖激巨浪脆葉殞驚飈别有陽臺處風雨共飄飄一作飄颻同前李元操荆門對巫峽雲夢邇陽臺燎火如奔電墜石似驚雷天寒秋水急風靜夜猿哀枕席無由薦朝雲徒去來同前盧照鄰巫山望不極望望下朝氛莫辨啼猿樹徒看神女雲驚濤亂水脈驟雨暗岑一作峯文霑裳即此地况復逺思君同前閻立本君不見巫山高高半天起絶壁千尋畫相似君不見巫山磕匝翠屏開湘江碧水繞山來緑樹春嬌明月峽紅花朝覆白雲臺臺上朝雲無定所此中窈窕神仙女仙女盈盈仙骨飛清容出沒有光輝欲暮高唐行雨送今宵定入荆王夢荆王夢裏愛穠華枕席初開紅帳遮可憐欲曉啼猿處説道巫山是妾家同前喬知之巫山十二峯參差互隱見潯陽幾千里周覽忽已遍想像神女姿摘芳共珍薦楚雲何逶迤紅樹日蔥蒨楚雲沒湘源紅樹斷荆門郢路不可見况復夜聞猿同前沈佺期巫山峯十二合沓一作環合隱昭回俯眺琵琶峽平看雲雨臺古槎天外倚瀑水日邉來何忍猿啼夜荆王枕席開同前張九齡巫山與天近煙景常青熒此中楚王夢夢得神女靈神女去已久白雲一作雲雨空冥冥唯有巴猿嘯哀音不可聽同前皇甫冉巫峽見巴東迢迢出半一作半出空雲藏神女館雨到楚王宫朝暮泉聲落寒暄樹色同清猿不可聽偏在九秋中同前李端巫山十二峯皆在碧虛中回合雲藏日霏微雨帶風猿聲寒過澗樹色暮連空愁向高唐去清秋見楚宫同前張循之巫山高不極合沓一作沓沓狀竒新暗谷疑風雨幽巖若鬼神月明三峽曙潮滿二江春為問陽臺客應知入夢人同前李沇沒天心開地脈浮動凌霄拂藍碧襄王端眸望不及似睹瑶姬長嘆息巫粧不治獨西望暗泣紅蕉抱雲帳君王妬妾夢荆宫虛抱金沉印仙掌紅濤迅激如相助十二獰龍怒行雨崑崙謾有通天路九峯正在天低處同前李賀巫山叢叢髙插天巴江翻瀾神曵煙楚魂尋夢風颸然曉風飛雨生苔錢瑶姬一去一千年丁香笻竹啼老猿古祠近月蟾桂寒椒花墜紅濕雲間同前陳陶玉峯青雲一作靈十二枝金母和雲賜瑶姬花宫磊砢楚宫外一作列列仙一作仙客八面星斗垂秀色無雙怨三峽春風幾夢襄王獵青鸞不在懶吹簫斑竹題詩寄江妾飄飄散絲巴子天苔裳玉轡紅霞幡歸時白帝掩青瑣瓊枝草草遺湘煙同前羅隱下壓重泉上千仭香雲結夢西風緊縱有精靈得往來狖軛鼯軒亦顛隕嵐光􅑨􅑨雷隱隱愁為衣裳恨為鬢暮灑朝行何所之江邉日月情無盡珠零冷露墮丹楓細腰長臉愁滿宫人生對面猶異同况在千巖萬壑中巫山高并序宋范成大余舊嘗用韓無咎韻題陳季陵巫山圖考宋玉賦意辨高唐之事甚詳今過陽臺之下復賦樂府一首世傳瑶姬為西王母女嘗佐禹治水廟中石刻在焉濕雲不收煙雨霏峽船作灘梢廟磯杜鵑無聲猿呌斷惟有飢鴉迎客飛西真功高佐禹迹斧鑿鱗皴倚天壁上有瑶簪十二尖下有黃湍三百尺蔓化蚪木風煙昏蘚珮翠帷香火寒靈斿飄忽定何許時有行人開廟門楚客詞章元是諷紛紛餘子空嘲弄玉色朱顏不可干人間錯説高堂夢後巫山高一首前人疑真宫前十二峯兩峯娟妙翠插空餘峯競秀尚多有白壁蒼崖無數重秋江潄石半山腹倚天削鐵荒行蹤造化鍾竒矗瑶瓛真靈擇勝探珠宫朝雲未罷暮雲起隂晴竟日長冥濛瑶姬作意送歸客一夜收繚仍回風仰看館御飛楫過回首已在虛無中惟餘烏鴉作使者迎船送船西復東初入巫峽前人鑽火巴東岸摐金峽口船東江岸欲合潄石水多漩皂午二竿日中間一罅天偉哉神禹迹疏鑿此山川瞿唐行七月十九日至夔子灔澦撒髮不可犯是夜水漲及山腹詰且視灔澦則已在水中土人云此青草薺也可以冒險而入遂鼓棹略其頂而過郡中遣候兵立山上每一舟平安則搖幟以召後舟白鹽赤甲皆峽口大山黃嵌黑石皆峽中至險處入峽西岸有聖泉舟人或向之疾呼曰人渴也泉即迸下一杯許復乾余舟過甚急未之試也前人川靈知我歸有程一夜漲䀶千丈生中流擊楫洶作氣夾岸簸旗呀失聲不知灔澦在船底但覺瞿唐如鏡平鑿峽疏川狠石破號山索飲飛泉驚白鹽赤甲轉頭失黑石黃嵌拚命輕草薺增肥無泊處竹枝凝咽空餘情人間險路此竒絶客裏驚心吾飽更劒閣翻成蜀道易請歌范子瞿唐行嘲峽石前人峽山江濵亂石萬狀極其醜怪不可形容舉非世間諸所有石之狀走筆戲題且以紀異峽山狠無情其下多醜石頑質賈憎唾傀狀發笑啞粗類墳壤黃沉漬鐡矢黑或如溝泥涴或如凍壁坼堆疑聚廪粟陊若壞城甓槎牙鏤朽木狼藉委枯骼礧砢包螺蚌淋漓錮鉛錫縱紋瓦溝壠橫疊衣摺襞鱗皴斧鑿餘坎窞蹴踏力云何清淑氣孕此譎詭迹我本一丘壑嗜石舊成癖端溪紫琳腴洮河緑沈色階册截肪膩泗磬鳴球擊嵌空太湖底偶立韶江側真陽劖千嵓營道剷寸碧倦遊所閲多未易一二籍朅來兹山下刺眼昔未覿或云峽多材竒秀鬱以積絶代昭君村驚世屈原宅東家兩兒女氣足豪萬國山石何重輕奚暇更融液我亦味其言作詩曉行客十二峯詩望霞峯閻伯敏東皇君來流曉霞暮看西北王母家雲華夫人王母女肯為廟食留三巴翠屏峯秋山黃落春山青不識仙家雲錦屏六銖天衣下拂石香風馥郁朝真亭朝雲峯山頭行雲自朝朝陽臺暮色連雲霄朝來暮去變雲雨送老行客無回橈松巒峯舟船搖搖大巫前松間絲蘿望纒綿屏風角轉恰匝背心在山頭人倚船集仙峯緑簔鞋繫青行纒束薪緼火問山田雲間似聽仙佩響蓬鬢拂掠燒畬煙聚鶴峯望夫石女春復秋巴歌初舞隨遨頭夜深九臯清唳響仙禽亦替離人愁淨壇峯山頭枝枝竹掃壇舟子竹枝歌上灘炷香上廟擲杯珓但乞如願舟平安上升峯黃魔白馬功告成雲華夫人朝玉京禹后夏后引音節高低峽船搖櫓聲起雲峯叉頭嫋娜山花枝裙尾舊纈山麻衣朝隨雲起采薪去暮趂女伴穿雲歸栖鳯峯山頭鳯鳴求其凰山前家家背鳯筐竹花結實未忍食刀耕火種五里香登龍峯散而成章合為龍回風混合遊鴻濛舟人上下神女供俗粧鉛粉胭脂紅聖泉峯靈泉一派瑶池分灑落掉石隨東奔楚人但愛香溪水溪邊為有昭君村十二峯古風二十五韻袁説平生酷嗜岩壑姿竒峯怪石貪成癡雲煙變幻瞥眼過張皇戄覔惟憂遲東南名山半遊厯就中所欠巫山竒巫山之峯冠巴峽竒峯十二相參差昔年圗畫嘗一見欲見此山無路之扁舟西泝上三峽千嵓萬壑爭追隨終朝應接不已暇心目洞駭俱忘疲驀然鉦鼓高唐上峯巒二六排旌旗一峯霞彩炯在望一峯展翠開屏帷望霞峯翠屏峯無心出岫雲吐色偃蓋平巒松並枝朝雲峯松巒峯仙蹤鶴駕羽衣近壇石瑶臺閶闔低集仙峯聚鶴峯淨壇峯上升峯白雲一起鳯凰下清泉四合蛟龍嬉起雲峯聖泉峯栖鳯峯登龍峯羣峯角立變態異一一大巧乾坤為外堪擊拊試聲律中含造化分四時天下名山亦多矣未有列岫竒如兹九華一景固天巧惜與江流相背馳南北兩峯喧衆口粧抹却恨同西施何如此峯何限好行行列列橫江湄煙雲漠漠出寸碧風雨時時勻黛眉舟人漁子謾回首騷士墨客勞支頥我來穿水入天去貂裘章甫生塵緇昻頭見此大竒特躋攀不上空嗟嘻吾將欲訪三島登九嶷上蓬萊道山之壁絶泰華終南之嵋飛鳬去舄嘯滄海却來巫峽溫前詩次韻錢鏊文昌仙伯天人姿愛山尋勝如書癡忽摩台符歷參井麾幢泝峽春遲遲山靈川后總效職萬壑千嵓俱獻竒就中巫山絶雄勝插天紫翠相參差神妃來下珮聲逺駐此名地相安之峯旋地轉自前後屹立萬馬如追隨兩山有川幻天巧禹功到此神應疲仰天照眼如匹練舟行電掣翻雲旗迅帆競惜峯巒過艅艎望眼裳褰帷懸崖下有欲落石古木上有參天枝龍登鶴聚仙既集雲升雨暗天如低從來三峽號至險高牙穩泛如遊嬉揚旌一覽天下勝詞源倒峽知優為嘗聞竒觀天亦惜遇賢輒與因其時少陵寓此雖窮寂妙語驚人多在兹雕鐫萬象發大閟衙官屈宋聲爭馳公今曳履星辰上調元妙手行將施天教來作東道主歡聲和氣生江湄公來頓覺雪山重青城增氣連峨嵋首驅巫陽入新句一洗前作堪解頥英詞從此遍蜀道迥出塵表無纎緇嘗憂此地難久駐轉首絶景成嗟嘻直欲使拂素練圖翠嶷寫松巒起雲之狀模翠屏栖鳯之嵋終朝誦公有聲畫却來看此無聲詩次韻毋丘恪縑素巧貌溪山姿寶藏昔笑虎頭癡何人夜半胠篋去信為羽化無疑遲魏明不惜萬夫力鑿山纍土誇神竒景陽突起芳林苑穀城文石光參差葉公好龍廣射虎大方安能不笑之至人於物特寓目逺象過眼心弗隨我公看山正如此肻趂無窮腳力疲胸中五嶽鎮地軸眼底三辰昭旌旗文星仙伯寵分鉞來撫蜀土初褰帷巫山一覽窺妙處寫入長歌賡竹枝坐令十二峯增重已覺氣壓嵩華低太室少室敢輩行小孤大孤何兒嬉岱宗日觀峻徒爾崑崙天柱高安為出雲作雨均有是泥金鏤玉彼一時所謂造化一尤物不住九華真在兹中山前言恐遂廢公之妙論已四馳半語尤存大公正蟠胸經濟看設施要令利澤均四海無論山崖與水湄只今蒼生方屬望休戚在公顰伸眉願公更為天下重所養自養觀諸頥量陂誰復能澄撓德表居然無磷緇巖石巍巍具瞻在孰不嘆仰聲噫嘻又何必東望瀛南望嶷北有天後之劍嶺西有雲表之峨嵋與公高名並不朽配以今日巫山詩次韻黃人傑文昌老仙絶俗姿愛山成癖非兒癡胸中况自有丘壑檻結瑰異當恐遲坤維謀略出分閫江山致助爭出竒尋幽選勝上巫峽斷崖怪石懸參差十二峯前弭征楫枝藤直上窮所之雲煙變態千萬狀過眼神動驚天隨人疑躋攀欲力盡公自樂此良不疲瑶華真妃似風駕風馬盡下揚幡旗層巒好處起蒼壁丹霞望門開赤幃登壇定可拾瑶翠却老未應無玉枝仰天一笑睨廖廓俯視培塿丘陵低頗疑遊龍出飛躍恍若栖鳯猶娛嬉喬松跨鶴逺近集雲雨濟人朝暮為壇維野翠有餘潤泉拖修帛無窮時一經盻睞便改觀陽臺價重當由兹惜哉牙纛不久駐鷁首未轉檣烏馳輕縑素練欲摹寫摹畫難著五采施筆端機杼始濳運悠然寄興滄洲湄章成密簡繡衣使繡衣翰墨今白眉珠酬玉唱兩相和三嘆盡解騷人頥好刋蒼珉示千古磨而不磷涅不緇紛紛我輩小巫耳健讀數過徒噫嘻待從兩公奠西極安南嶷收關河百二之險劖岷峨萬仭之嵋大書有宋中興頌東還更和巫山詩客有自成都來者傳制帥華學尚書年丈巫山詩輒次韻奉寄許及之巖壑豈是鐘鼎姿出處相較黠與癡我家浙東山水窟間窺壺中日