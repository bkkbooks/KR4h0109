極出雲端暮雨晴歸少啼猿渴下難一聞神女去風竹掃空壇巫峽曹松巫山蒼翠峽通津下有仙宫楚女真不逐綵雲歸碧落却為暮雨撲行人年年舊事音容在日日誰家夢想頻應是荆山留不住至今猶得覩芳塵望巫山張喬溪疊雲深轉谷遲暝投孤店草蟲悲愁連遠水波濤夜夢斷空山雨雹時邉海故園荒後賣入關玄鬢夜來衰東歸未必勝羇旅况是東歸未有期巫山神女廟劉禹錫巫山十二鬱蒼蒼片石亭亭號女郎曉霧乍開疑卷幔山花欲謝似殘粧星河好夜聞清佩雲雨歸時帶異香何事神仙九天上人間來就楚襄王酬人貽巴峽圖薛濤千疊雲峯萬丈湖白波分去繞荆吳感君識我枕流意重示瞿唐峽口圖巫山宋曾慥巫山不可見翠岫幾重重雲外藏三島江頭認九峯淡煙迷暝色踈雨浥秋容目斷凝貞路松風傳暮鐘離巫山晚泊掉石灘下李􅌫黃昏風雨阻江濱翠綰羣峯暮色勻一夜子規啼到曉孤舟愁殺未歸人入峽蘇軾自昔懷清賞今兹得縱探長江連楚蜀萬𣲖㵼東南合水來如電黔波緑似藍餘流細不數遠勢競相參入峽初無路連山忽似龕縈紆收浩渺蹙縮作淵潭風過如呼吸雲生似吐含墜崖鳴窣窣垂蔓緑毶毶冷翠多崖竹孤生有石楠飛泉飄亂雪怪石走驚驂絶澗知深淺樵童忽兩三人煙偶逢郭沙岸可乘籃野戍荒州縣邦君古子男放衙鳴晚鼓留客薦霜柑聞道黃精草叢生緑玉篸盡應充食飲不見有彭聃氣候冬猶暖星河夜半涵遺民悲昶衍舊俗接魚蠶版屋漫無瓦巖居窄似菴伐薪常冒險得米不盈甔歎息生何陋劬勞不自慙葉舟輕逺泝大浪固無諳矍鑠空相視嘔啞莫與談蠻荒安可駐幽邃信難耽獨愛孤棲鶻高超百尺嵐橫飛應自得逺揚似無貪振翮遊霄漢無心顧雀䳺塵勞世方病局束我何堪盡解林泉好多為富貴酣試看飛鳥樂高遁此心甘入峽蘇轍舟行瞿唐口兩耳風鳴號渺然長江水千里投一瓢峽門石為戶鬱怒水力驕扁舟落中流浩如一葉飄呼吸信奔浪不復由長篙捩舵破濆旋畏與亂石遭兩山蹙相值望之不容舠漸近乃可入白鹽最雄高草木皆倒生哀呌悲玄猱白雲繚長袖零露如飛毛緬懷洚水年慘戚病有堯禹益決岷水屢與山鬼鏖摧岡轉大石破地疏洪濤巉巉當道山斬截肩尾銷峭壁削下趾連峯斷修腰破處不生草上不挂鳥巢水怪不盡戮下有龍與鼇遼哉千萬年禹死遺迹牢豈必見河洛開峽斯已勞峽口宋肇萬里西南路瞿唐居上遊峽分山對立江合水爭流蛟鰐從來患風波自古愁幾時飛兩槳歸去幔帆秋瞿塘峽陳謙庸蜀諸羌水荆吳萬里渾不將崖約束焉免壑崩奔線引溫湯浦觴浮雪水源槎程疑欲盡西望氣魂魂氣魂魂見山海經瞿塘峽二首李石我行江南上峽來繫舟夜泊雲雨臺行到西川一萬里杜鵑聲急桃花開花開歸去客在船人道雲安有杜鵑峽山無路續百丈胡獼上樹拊連天峽中前人峽水方中駐歸舟泝蜀門竹枝聲處處梅葉雪村村來去山蠻笑啼號地主恩幸然窮性命不必賦招魂峽山古調詩杜曾濫觴岷山側此江出岷山朝宗蓋自然沸沸出幽竇滔滔成巨川深流疑徹地逺勢欲浮天萬石攢若鬬一流㵼如懸二蜀通貨博三峽為防堅上下比入聲艱險往來爭泝沿衝高濆氣盛轉急洶形圓行人戒仲夏招子尚耆年主舟人謂之長年三老風波雖滅裂灘磧且叢駢湍聲混蠻市漲浼入畬田傍臨股且栗順下目無前浮沫逢槎聚垂瀑依岸穿哀猿藏森上聲聳渴鹿聽潺湲幽勝祠宇密傾危村舍連寒沙淹宿雨暖溆罩春煙青蕪隨逺曲白鳥戲輕漣常經祗名利舊隱多神仙至清逃鰌鱔極奧容鱘鱣楚臣忠義鬱屈原也巫女威福專巫山廟人多祈祀龍驤戰具敏鯀嗣導功全瞿塘十里暗灧澦一丘偏底柱不足擬吕梁誠浪傳伊豫非智者被命徒勉旃尺短糾列郡寸進乘孤船一步一竿探百丈百夫牽通夕但耿耿終日惟乾乾廢職罹罪罟委命推化甄寄言千金子狂狷可間焉雲安下偶成邵傳輕波颭鴨頭小艇翔燕尾風沙三十程雲水一千里雪盡晚寒輕日長春睡美汀蕪翹碧茅岸樹裹紅蘂江潭清鏡中山入翠屏裏蜀鳥已驚心巴猿猶側耳竹節數名灘桃花驗新水谷鶯歌尚慵檣燕舞何喜落日浪鎔金殘花風翦綺斯遊興最多了不知行止泊雲安下大風驟雨作柏梁體一篇前人晴空赤日飛丹霞扁舟春熱汗且呀寒溫之候無乃差朝猶挾纊莫著紗祝融暴橫勢莫加驟將炎赫移韶華東皇遊冶窮豪奢未終節序還其家忍驚猛吹揚白沙煙雲四起相邀遮空中轣轆鳴雷車樅樅白雨懸亂麻風師雨將相矜夸干力萬槊爭囂譁玄旌皂纛何紛葩勢搖兩蜀掀三巴須臾雨止雷停撾蒼雲掃盡天無瑕恍如脫兔離輕罝回頭已見羲輪斜山開水盡風色嘉喜翔燕雀嬉魚蝦紅顚白倒粉殘花披張林葉舒草芽隂陽變化誰咄嗟風雲乃爾相喧拏大氣一氣通幽遐彼蒼高逺安能涯倚峯吟望心目賖碧雲千里號啼鴉雲安龍脊灘楊濟洞庭老龍時出沒萬斛舟航俱辟易此龍脊背已鐵石肯逐時好作人日我呼邦人來踏磧恍然如見紅圖出大巫雞卜占雲吉小巫竹枝歌轉激飄石揚沙障江色塵埃何處不相襲摩挲石刻聊偃息恐有老人來橫笛雲安下巖杜柬之濤江翻雪卷湖灘晚泊巖扉暫解顔夙有淨緣逢寺善老無生理作僧間殘雲已斷獨飛雨落日將沈却照山半夜秋聲驚客夢一簾珠貝冷珊珊下巖避暑留題楊邁古寺重來興轉添舟中午暑正炎炎野僧引客登山閣稚子穿雲映水簾熱得清涼身暫健老便間靜意難厭人間劫火方撩亂法雨何如為普沾下巖唐末有劉道者定州無極人聞道於雲居膺祥師為開巖第一祖法號道微自鑿石龕曰死便藏龕中不用時日門人奉其命二百年矣來遊者題詩不可勝讀莫能起此開巖者故豫作二篇表見之其一用楊子安韻其一用王定國韻黃庭堅空巖靜發鐘磬響古木倒挂藤蘿昏莫道蒼崖鎖靈骨時應持鉢到諸村又寺古松楠老巖虛塔廟開僧緣蠶麥去官數荔支來石空無心室雲鋪稱意苔若為劉道者拽得鼻頭廽按部留小詩命男明復同賦郭印地涉雲安境山名燕子龕簾垂看急溜蓋偃得修楠牢落前賢迹光明有佛庵幽禽知客至一一解玄談又郭明復道人昔日來開山山鬼悔泣門不關一時梵宇借嵓麓千載絶景歸人間松蘿鬱勃樹旌纛水泉丁東鳴珮環兩蘇寂寞涪翁死杖屨誰與同躋攀僕既與子應賦觀瀑詩矣頃之而定瀑小疏為水簾驚變態之不窮也復記之以詩張灝朝來雨急飛瀑雄黑雲壓屋江挂虹晚來雨定瀑亦小散作水縷鏘簷櫳垂簷初似玉成綴觸石但見珠跳空嗟哉山泉一物耳朝態暮狀不爾窮乃知造物解戲人千變萬化頃刻中吾恐文章要如此好把泉源驅筆鋒嵓下觀瀑早晚異狀子文有詩輒次其韻何麒瀑色清明氣猶雄非煙非雲非白虹兜羅綿光透罘罳琉璃吹影搖簾櫳風吹銀潢灑蒼壁月照玉柱擎青空誰言物象要有盡我覺端倪殊不窮思湧回翔掀舞時句在縹眇空濛中更將七字寫亭午倚天長劍拖芒鋒水簾虞大博疏水成簾造化功冷光千丈半巖風層霄螮蝀正鋪地蒼海珠璣却墮空天下竒觀更何處騷人幽詠未全工要知出壑爭流意不向三巴直向東遊卧龍山丁謂日長春老職司間縱轡因尋負郭山花氣半飄青靄外泉聲多在白雲間香燈肅肅嚴僧事鐘梵泠泠爽客顔坐有詩人樽有酒擬拋朝市宿禪關出郊題瀼東人家屋壁二絶馮時行入坐山如屏障捲簾風滿衣襟正是梅花時候怡融渾似春深風引晴雲度去臘催殘葉飛來短景餘寒幾日安排都放花開到夔州曽慥衆水歸三峽悠悠萬古情白鹽無路到赤甲罕人行西瀼泉尤勝東屯穀有名豐年公事少飽暖荷恩榮夔州冉居常縹渺飛樓壓舊城年年來聽峽猿吟衣裳慣見秋風冷夢寐常愁塞日隂霜露園林千古事波濤鷗鷺一生心秪應庾信頻飄泊且坐江關緣分深夔州歌簡朝子西王從道白帝夔州萬古城全蜀東門下相控瞿塘灔澦勢嶄絶赤甲白鹽形澒洞峽雨關雲朝暮征煙葉水花洲渚共少使冥寞減光輝山川草木人誰諷明知風月待組織可笑可笑浪嘲弄逸亭野老泛舟來迫立蒼茫遊覽縱旋提燕拂呵物象試吐清音激鸞鳳江頭一見朝廣文客裏新詩如供奉天生之子映昭代清才突出萬人衆一來道合事襟期有作正須形淮頌下瞰一隅會萬景豈無江靈為供送請君作詩如畫圖收拾形容未宜空清江曲送宋尚德自峽中回明詹同清江水清峽水黃清江之上多緑楊浣花女兒立沙際青裙白足如秋霜蜀山雪消十日雨一夜扁舟欲齊樹兩岸猿聲不肯休送君流向峽州去長江萬里圖楊基我家岷山更西住正見岷江發源處三巴春霽雪初消百折千回向東去江水東流萬里長人今漂泊尚他鄉煙波草色時牽恨風雨猿聲欲斷腸先生原籍蜀中嘉州人因祖仕江左生長吳中遂家焉峽中作安磐水下夔門灔澦堆一山中斷兩屏開昭君村抱琵琶峽神女祠連雲雨臺側壁倒崖無鳥過古藤昏樹有猿哀懸燈夜泊風波惡賴此深山月下杯全蜀藝文志卷九
