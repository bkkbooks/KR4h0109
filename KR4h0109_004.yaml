  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0109_WYG_004-1a, image: WYG1381/WYG1381-0045c.png}
body:
  text: 全蜀藝文志卷四明周復俊編楚辭九懷漢王褒九懷者諫議大夫王褒之所作也懷者思也言屈原雖見放逐猶思念其君憂國傾危而不能忘也褒讀屈原之文嘉其溫雅藻采敷衍執握金玉委之汚瀆遭世溷濁莫之能識退而愍之故作九懷以禆其詞史官録第遂列于篇極運兮不中來將屈兮困窮余深愍兮慘怛願一列兮無從乘日月兮上征顧逰心兮鄗酆彌覽兮九隅倣徨兮蘭宫芷閭兮藥房奮搖兮衆芳菌閣兮蕙樓觀道兮從橫寶金兮委積美玉兮盈堂桂水兮潺湲揚流兮洋洋蓍蔡兮踊躍孔鶴兮回翔撫檻兮逺望念君兮不忘怫鬱兮莫陳永懷兮內傷匡機天門兮地戶孰由兮賢者無正兮溷厠懷德兮何覩假寐兮愍斯誰可與兮寤語痛鳯兮逺逰畜鴳兮近處鯨鱏兮幽潛從蝦兮逰渚乘虬兮登陽載象兮上行朝發兮䓤嶺夕至兮明光北飲兮飛泉南采兮芝英宣逰兮列宿順極兮倣徉紅采兮騂衣翠縹兮為裳舒佩兮綝纚竦余劒兮干將騰蛇兮後從飛駏兮步旁微觀兮玄圃覽察兮瑶光啓匱兮探莢悲命兮相當紉蕙兮永詞將離兮所思浮雲兮容與道余兮何之逺望兮阡眠聞雷兮闐闐隂夏兮感余惆悵兮自憐通峰林不容兮鳴蜩余何留兮中州陶嘉月兮總駕搴玉英兮自修結榮茝兮逶逝將去蒸兮逺逰徑岱土兮魏闕歷九曲兮牽牛聊假日兮相佯遺光耀兮周流望太一兮淹息紆余轡兮自休悕白日兮皎皎彌逺路兮悠悠顧列孛兮縹縹觀幽雲兮陳浮巨寶遷兮砏磤雉咸雊兮相求泱莽莽兮究志懼吾心兮懤懤步余馬兮飛柱覽可與兮匹儔卒莫有兮纎介永余思兮怞怞危俊世溷兮冥昏違君兮歸真乘龍兮偃蹇髙回翔兮上臻襲英衣兮緹緁披華裳兮芳芬登羊角兮扶輿浮雲漢兮自娛握神精兮雍容與神人兮相胥流星墜兮成雨進瞵盼兮上丘墟覽舊邦兮滃鬱余安能兮久居志懷逝兮心懰栗紆余轡兮躊躇聞素女兮徴歌聽王后兮吹竽魂悽愴兮感哀腸回回兮盤紆撫余佩兮繽紛髙太息兮自憐使祝融兮先行令昭明兮開門馳六蛟兮上征竦余駕兮入冥歷九州兮索合誰可與兮終生忽反顧兮西囿觀軫丘兮崎傾橫垂涕兮泫流悲余后兮失靈昭世季春兮陽陽列草兮成行余悲兮蘭生委積兮從橫江離兮遺推下夷兮擠臧伊思兮往古亦多兮遭殃伍胥兮浮江屈子兮沈湘運余兮念兹心內兮懷傷望淮兮沛沛濵流兮則逝榜舫兮下流東注兮礚礚蛟龍兮道引文魚兮上瀨抽蒲兮陳坐援芙蕖兮為蓋水躍兮余旌繼以兮微蔡雲旗兮電騖倏忽兮容裔河伯兮開門迎余兮歡欣顧念兮舊都懷恨兮艱難竊哀兮浮萍泛淫兮無根尊駕秋風兮蕭蕭舒芳兮振條微霜兮眇眇病夭兮鳴蜩玄鳥兮辭歸飛翔兮靈丘望溪兮滃鬱熊羆兮詬嘷唐虞兮不存何故兮久留臨淵兮汪洋顧林兮忽荒修余兮袿衣騎霓兮南上乘雲兮回回亹亹兮自強將息兮蘭臯矢志兮悠悠紛藴兮黴黧思君兮無聊身去兮意存愴恨兮懷愁蓄英登九靈兮遊神靜女歌兮微晨悲皇丘兮積葛衆體錯兮交紛貞枝抑兮枯稿枉車登兮慶雲感余志兮慘栗心愴愴兮自憐駕玄螭兮北征嚮吾路兮蔥嶺連五宿兮建旄揚氛氣兮為旌歷廣漠兮馳騖覽中國兮冥冥玄武步兮水母與吾期兮南榮登華蓋兮乘陽聊逍遙兮播光抽庫婁兮酌醴援匏瓜兮接糧畢休息兮逺逝發玉軔兮西行惟時俗兮疾正弗可久兮此方寤辟摽兮永思心怫鬱兮內傷思忠覽杳杳兮世惟余惆悵兮何歸傷時俗兮溷亂將奮翼兮髙飛駕八龍兮連蜷建虹旌兮威夷觀中宇兮浩浩紛翼翼兮上躋浮溺水兮舒光淹低徊兮京沚屯余軍兮索友覩皇公兮問師道莫貴兮歸真羡余術兮可夷吾乃逝兮南娭道幽路兮九疑越炎火兮萬里過萬首兮嶷嶷濟江海兮蟬蛻絶北梁兮永辭浮雲鬱兮晝昏霾土忽兮塺塺息陽城兮廣厦衰色罔兮中怠意曉陽兮燎寤乃自診兮在兹思堯舜兮襲興幸咎繇兮獲謀悲九州兮靡君撫軾歎兮作詩陶壅悲哉于嗟兮心內切磋欵冬而生兮凋彼葉柯瓦礫進寶兮捐棄隨和鉛刀厲御兮頓棄太阿驥垂兩耳兮中坂蹉跎蹇驢服駕兮無用日多修潔處幽兮貴寵沙劘鳯皇不翔兮鶉鴳飛揚乘虹驂霓兮載雲變化鷦䳟開路兮後屬青蛇步驟桂林兮超驤卷阿丘陵翔儛兮溪谷悲歌神章靈篇兮赴曲相和余私娛兹兮孰哉復加還顧世俗兮壞敗罔羅卷佩將逝兮涕流滂沱株昭亂曰皇門開兮照下土株穢除兮蘭芷覩四佞放兮後得禹聖舜攝兮昭堯緒孰能若兮願為輔懷東坡先生詞宋楊萬里吹赤壁之月笛兮曕黃州之雲堂彈湘妃之玉瑟兮織天孫之錦裳招先生其來歸兮何必懷眉山之故鄉歷九州而猶隘兮誕置祝融之汪酌乳泉以當醴兮飱荔子以為糧葺榕葉以作屋兮托桄榔之蔭以為堂驅海濤以入硯滴兮挽南斗文星于筆鋩昌黎兮歐陽視先生兮雁行韞不泄兮忠憤煙不掩兮文章乞鏡湖兮九關營莵裘兮是邦豫之來兮云暮與先生兮相望視履永兮焉在問故宫兮就荒俯仰兮永懷渺山川兮蒼蒼祝融之汪謂南海也左傳尸諸雍氏之汪服虔注停水曰汪楚謂之汪閩謂之洋全蜀藝文志卷四
