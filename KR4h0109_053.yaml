body:
  text: 全蜀藝文志卷五十三明周復俊編譜氏族譜宋羅泌巴海內南經有巴國所謂巴賨彭濮者伏羲後生巴人郭璞云三巴國今巴縣是也𨽻恭州秦漢之巴郡本𨽻渝有古巴地在泯江之北漢水之南蜀將李嚴修古巴城者三巴記云閬白二水東南曲折三面如巴字而名禆鯈魚左傳庸蠻叛楚楚莊王伐之七遇皆北惟禆鯈魚人實逐之杜預曰禆鯈魚三巴也魚今魚復縣江水祝庸之封地今朱提泜水𤣥囂國若之下流泜水也今蜀州若水昌意國今越嶲之臺登盟會圖疏以為都故世本云允姓國昌意降居為侯非也詳高陽記資陳留風俗傳云資姓黃帝后姓纂云益州資中今資州資陽有資川江然古資陽城在簡之陽安而祈之有極有資河衛之北糾山潭之益陽有資水出縣左流入資口即益水酈云即資水之殊目武岡又有資水出唐或其派裔酉即酉陽今黔之彭水漢酉陽也有酉水閭叢漆從征記高平東陽北北有漆鄉東北十里有閭叢鄉䕫歸熊姓子爵歸是楚滅之僖二十六寰宇記䕫之巫山縣䕫子能摯治多熊姓今秭歸城東二十有故䕫子城荆州記秭歸西有陽城即孫繹所居賨芈姓子宗也頃王四年居執宗子遂圍巢十六國春秋常璩志云宕渠古賨國寰宇故賨城江流縣東北八十四古賨國都又廣安軍渠江縣北十二即始安城宕渠今入伏虞賨城見存蓬州中興書云廩君後非巫人今之巫山歸之巴東故漢巫縣利州其北境􅀈民經有巫人人􅀈民盻姓帝俊後廣韻有􅀈國集音替蜀支於封蜀侯國自益昌西南至蜀皆其地張儀滅之蜀王八戰不勝而滅赧王元年秦惠封公子通為蜀王苴蜀王封其弟葭萌於漢中為苴侯後命其邑曰葭萌今利州縣一曰吐費城流黃辛姓在三巴之東山海經云廣三百里亦見鴻烈等書蜀山今成都見揚子雲蜀記等然蜀山氏女乃在茂詳後妃后國蠶蠶叢氏國今彭之導江有蠶崖而漢之蠶陵縣在翼之翼水縣西有蠶陵山導江魚鳬治今眉之彭山縣北東津南北八郡志云犍為有魚鳬津廣數百步𦙍侯爵風俗通曰夏諸國侯今利之𦙍山乾德三年曰平蜀天寶元年曰𦙍山出舞衣今川錦有𦙍氏嗣氏鄧氏云國諱改䝉山岷山桀伐䝉山氏即岷山氏今䝉州䝉山郡非晉陽之蒙山庸庸氏伯爵助武伐紂今房之竹山漢之山庸文十六楚滅之楚饑率諸蠻叛楚也寰宇記土庸故城在州西二百五十楚子為庸補之役者說襄十三蜀地文鄘南夷國寰宇記金州周庸國地戰國將為楚附庸後滅之楚使盧戢黎侵庸有禆鯈魚三巴髳庸蜀羌髳微盧彭濮皆西南夷助伐紂者微盧盧戎也古文作纑齊之長清南五十里盧城齊鄭尋盧之盟者然非此記每為盧今襄之中盧寰宇云中廬廬戎國文十六年楚師自廬以往者彭黔之彭水縣又有彭在忠之臨江即咢溪賨彭濮者非䝉陽矣氏族譜元費著前記五載人物不載氏族自今記晉常璩嘗記蜀大姓成都有栁杜張趙郭楊朱郫有何羅郭繁有張新都有楊董汝鄭其它不一著列皆可槩見是數十姓果大曽不記人物豈喬木之謂乎司馬文園遺藁僅得之妻楊墨池有子曰烏能與𤣥文裁九齡夭然則人物有其傳尤可重矣記今自人物外載氏族不徒以補前之缺亦以表宋朝以來世系之盛凡第次以起家後先而見之今者書其名不書其事皆法也吳氏吳氏入蜀以唐左武衛兵曹參軍為始祖四世孫藂僞蜀時最顯至衮六世矣仕宋朝至太子舍人贈都官員外郎七世孫季良弟端拱闕年進士至都官郎中贈中大夫九世諸孫師孟第進士官至左朝議大夫門望始大王公安石當國謂師孟同年生也自鳯州别駕擢為梓州路提舉常平倉兼農田水利差役事師孟疏力言法不便寧罷歸故官後知蜀州又論茶法害民繼謝事去蘇文忠公軾刺新法書有曰吳某乞免提舉如逃垢穢至言茶病民以矯矯六君子稱之師孟其一也子縝以世科官至左朝議大夫知邛蜀庠萬四州子景知漢州官至朝散大夫景之子嶙如遷蜀州今崇慶府惟師孟從兄弟師益三世猶居成都其嘗應賢良科廢老死布衣族最盛子孫亦蕃十世皆葬成都繪於寶厯寺之水陸凡數十人今録其槩范氏范氏自杜溫叔奔晉四世食采於范遂為氏世逺譜落唐相履氷下十有一世曰隆廣明間入蜀家成都孫紹溫處唐季厯丕孟僞蜀雖不仕三世巳能有立為著姓子曰昌佑有全德二子曰瑑曰璨瑑贈太保公也太保生二子曰度曰祥度贈太師公也太師生三子長曰鎡以進士甲科終隴城令次曰鍇終衛尉丞贈太尉季曰鎮是為蜀忠文公子孫曽三世登科曰百揆曰祖淳曰塤塤官至左中大夫歷使蜀移使荆湖北路卒太尉有子曰百祿位至中書侍郎贈榮國公榮公有從子曰祖禹位至翰林學士兼侍講有從孫曰冲位至翰林學士曰溫位至明堂班朔郎有曽孫曰仲芑故為右諫議大夫曰仲藝今為中書舍人曰黼前為著作郎兼禮部郎中皆世其官曰仲較曰仲綸曰仲藝以辭章世其門不克顯𤣥孫曰子長曰子垓又世其科子長今為飛烏宰被命召榮公兄曰百祉不但有如祖禹孫如冲如溫而諸孫曰洄諸曽孫曰仲圭仲殳仲循仲徽仲南各以文學行義政事名四世諸孫謨故國子監丞孫嘗位於朝今知邛州榮公之仲兄曰百朋有子曰祖睿諸孫曰游諸曽孫曰仲愷仲侃獨不第三子後先登科曰子修子奕子庚典州除節矣翁無恙稠人中莫覺有貴子賢德蓋相襲也蜀父子兄弟登科至聨四世諸子登科世又掌絲綸人共推范氏論其世德皆有傳大抵其積也逺其施也博其傳也不已凡范氏父兄子弟名位雖不盡皆通顯而施為率從厚為部刺史為郡守相門第蓋相望三歲一舉中選者多記不勝書至以賞以恩以封以贈又略焉它族什如其二三號曰盛至范氏則人人以為當然實自太保以下而太保之弟璨四世孫寥寥徽宗時有功避不以自名官猶至右武大夫寥從孫仲壬武舉中第裁八年出知金州今為利路鈐轄按譜璨尚俠氣鄉里敬服故其後又以武聞云郭氏郭氏自及為廣都令家焉其自敘系出子儀子儀六世孫甫為御史中丞從僖宗幸蜀及其弟也故中丞死因以葬廣都石子山及三孫曰同介鈴同之孫震以詩名號漁舟先生李畋序其詩淳化四年先生詣闕上書言蜀將有變未幾順賊作亂先生留中原不歸無子皆畋云鈴諸孫早著鈴生貞時孟氏納土朝廷謂西州豪右可任郡檄補貞吏貞稱疾不就子仁渥當順賊亂率卒黨保别墅獲免均賊繼起道遇害贈職方員外郎二子軫輔軫子子定子安皆以賞以恩得官孫衢亨登崇寧上第終宣教郎曽孫南義以詩名死布衣輔起家登天聖乙科范公仲淹龎公籍韓公琦皆表見其丰器可任自鳯州擢知興元平均金虜叛卒有功璽書褒美繼二持節後以梓州轉運使皇祐二年平涓井痍死賞延三子中子子臯最知名子臯知大邑均三邑灌溉人號為平歷知昌劒利三州子㻞瑜皆以賞得官瑜獨顯嘗提學京東後知懷州諸孫曰眉夀曰暘諸孫曰僙曰偉曰俟曰億曰傑眉夀俟億皆登第餘以世賞或以舉恩惟傑在介諸孫轔輯輊軾轔生由儀登慶厯第終南浦令由儀生忱登元豐第以博學名通判恭州年五十會蔡京用事忽忽不樂丐祠遂老生時敏終通直郎時敏生晞嘗為大金留豫司幹辦公事受金人所歸疆進二秩佐劉公錡為東京留守司幹辦公事順昌之捷不肯上功當時韙之從子垕傳皆登第垕終通直郎傳今從事郎子堪均皆世賞堪終通直郎均今從事郎輯曽孫綱輊三世諸孫畋國寶惟肖僅疇四世諸孫樗年震湘畋國寶震湘登第餘以舉恩或以賞銓又有七世孫漸九世孫光選皆登第叔宜今迪功郎光選今丞議郎爰自廣都散居雙流獨成都為多李氏李氏唐胄也大唐四十子少郎曹王五子少郎武衛大將軍偲武氏擅政偲入蜀來眉丹稜伏民間五世孫瑜明皇西幸時抗表言狀得通屬籍尋拜長江令卒官歸葬丹稜瑜四世曰逺逺二世曰同為始建令籍葬縣同生全始居華陽又三世曰惟吉惟吉三子曰莊曰允曰毅莊以學行名毅以科第顯又一世盛矣莊子大厚博學工文辭從兄天章公大臨自謂不如大厚及長子升同登第後三年子降亦登升五典州號循吏降行義克著范公鎮薦之朝為金部郎中宣和間提學秦鳯路列郡刺史拜宣撫使童貫降獨長揖曰我師儒官也遂丐祠去力致仕陪大厚季子也有子時亮伯父升欲官之辭治命又以遺長官之章已上會升子從政郎時任卒時亮亟追還以與時任之子識後時亮二子登第三子以恩得官諸孫一以舉恩得官一登第去允子大臨第進士宋朝仕至天章閣待制事在國史知制誥時繳李定辭頭其一也子陶隲陶從司馬公光於洛當時大老皆喜之在錢塘蘇公軾送之詩忠文文正二大老蘇李廣平三舍人喜見通家賢子弟因言得邑少風塵其趣逺矣隲通達明敏吏事有能名尤工於書子時雍時敏皆世其學時雍高廟稱之弟兄多顯者賞延凡二世毅嘉祐二年進士李氏初起家者仕至殿中丞子大昕大昕生公濟公濟生謨謨生嵩凡四世登科大昕學行謨能文章謨以下徙導江族盛時仕者不能悉書此其概也曰頊者亦出自逺與同並世孫丞璨三世孫謹修謹交謹微謹思能登進士第謹修位至郡守三子賞皆傳嚴卿最顯官至朝散大夫䣊又與謹微子椿登第䣊官至朝議大夫丞炳三世孫彤四世孫觀登第丞哲四世諸孫象先厚登第象先應賢良方正科厚位至鴻臚少卿厚五子皆官孫洋亦登進士第族大子孫衆多近世多有以世科名聞其世一曰自逺而下邵第進士四子樵孫楰孫材父今興州矣凡散居異邑者多不書張氏張氏韶州曲江人至唐相九齡顯九齡弟九臯九臯子抗抗七子仲方仲孚子孫在蜀可譜仲孚孫奉常博士隨扈僖宗幸蜀傳三世曰載陽資産巨萬豪待四方士子維峻待士益厚悉散之或相戒止笑曰吾遺子孫者不在是也以子起贈大理寺丞起寶元中登進士第官至太常博士是故族也起家尤難如此三子太初太寧太和太寧登治平四年第知邠漢渭等州四入為尚書郎三持使節遷陜西路為都轉運使二子察宇察以大小篆名入為左司郎中出知鼎州宇初名犯欽廟諱易名宇三丞司監使淮西東路知濟榮果合四州娶榮國公百祿女故其學得之范氏子晦侍學中原有外家典刑筆法尤工歷知雅恭簡三州子仲堅是則家成都者太初家於崇慶之新津太和家於眉州之眉山仲方之後徙漢州之綿竹族尤大宋氏宋氏唐季有任崇文館校書郎諱玘者隨僖宗西幸因家成都玘生綿州團練副使可思可思生太子舍人皓皓第進士仕唐皓生武信軍節度推官格格仕宋朝生惟吉惟亮號無為先生生太常博士世修世修生球球與從兄弟璋後先登第球終職方員外郎按譜惟吉惟亮子孫衆多相似也惟吉後為盛璋球諸從兄弟子孫相似也球後為盛按家傳無為先生嘗授經任公玠晚究易球仕至郡守潔身早退子先因世賞至縣令亦中年退休子昌宗典榮資二州將曹東蜀會鹽酒法弊坐籍沒者又所在繫捕充斥獨論列為不可法為之改猶申言不已由是罷歸諸子曰訓曰誨諸孫曰邈曰述曰逌曰運邈運登進士第邈終宣教郎餘皆至郡守運總理財賦四川未及卒蜀士為當時惜之元豐末昌宗初仕時尚富强名為千者為宰相執政過用天下告病軍興征取析秋毫病益痼宋氏家法雖尚嚴獨於民寬如爭鹽酒法亦一事也故昌宗至誨皆退居享上夀至曽孫復名以祖為行亦多在官非徒曰人事其亦天理歟勾氏勾氏𨽻新繁𨽻華陽勾龍氏𨽻華陽𨽻郫𨽻溫溫皆祖勾望孔氏七十子曰井疆三國蜀曰符其裔也唐末有曰惟立以扈衛僖宗為將軍二子弇會王建攻彭州弇與勇烈侯楊晟死之會匿新繁民間遂𨽻新繁四世孫士良登慶厯六年第官至朝請大夫七子以賞以第皆有官第二子宗顔官至朝奉大夫第四子宗召與顔之長子濤迭登進士第濤貴在高廟時宰相趙鼎實薦之鼎言蜀有鴻儒可充載筆之任然姓與御名同音臣未敢薦高宗曰古之有勾龍氏遂自涪陵召濤而勾氏著矣濤言事稱上意繇郎曹間歲除給事中大抵以薦士為己任士因濤薦召凡數十人後多為名臣唐公文若其一也序其外制集云爾以是為權相忌遂出除潭州力辭乞祠許之乞歸不許寓居秀華亭卒子躍從子距路蹈躒典三州兩持使節除職帥夔卒餘以賞任官官至孫云曰詠登宣和第第二其子輔登紹興第嘗為四川類省第一亦族子也𨽻成都者自居體始著三世以上惟曰出井疆莫可考居體登熙寧第官至朝請大夫王公素使東蜀知其賢延請權領懷安軍事卒懷安居體素號鄉先生著書為多諸生從之廣多知名九子二以賞得官棓獨久游太學以恩得官二子昌世昌泰皆登第昌世官至朝散大夫位至郡守昌泰為四川類省第一嘗除太學博士後徙將作丞又丞太府兼户曹郎出提學常平浙東移節浙西旋報罷歸起知利州除職帥夔卒從子子皆有官即成都溫江以勾為氏猶曰勾惟立唐末入蜀即其祖亦曰避高宗諱改為復姓而世次率不合曰亷登進士官至朝議大夫諸子皆有官從子震雱同登進士即自郫𨽻成都者溫江則以中立為祖曰是在雍熙間以宗學名曰宗正之兄也中正生希仲亦世其學以科第位至光祿卿王公安石銘其墓曰勾宗華陽世實兆京其援據云爾而世亦莫可考又如眉之鈎嘉普之勾永康榮之勾龍其先皆稱同族然永康勾龍紹興間為御史中丞曰如淵其復姓亦有旨至今諸族莫能一大抵氏族學廢今為甚識之以勸來者常氏京兆常氏為蜀人自宥始衮相唐母兄偕偕三世孫官户部郎中扈衛僖宗駕入蜀者宥也謫授蜀川户掾卒葬江原二子包荒包䝉包荒子達選達子延昱負其才雷公有終來平蜀冦一見竒之率從之謀有終守蜀數以書招致之延昱始來有功家成都卒鄉人諡曰亷貞先生子禧禧四子珙琭琮玘皆登科珙守三州長子景修守彭州景修二子時中執中為郡守相自景以下名從中從才者為一世從士者為一世城垍蓋珙諸曽孫城知均州垍有隱操蚤與薦以親喪不復就類皆隱居東山餘四十年蜀人大帥欲識之不可聲聞於今隱然珙弟琮之子績禧弟利涉之子鎮踵登崇寧二年第初延昱出從雷公選子守元留邛其後多通顯以𨽻他郡故不書房氏房氏以重為入蜀之祖重丞相𤣥齡八世孫也終新都令子諤為蜀太常少卿子四人皆以從為名從之諸子八人皆以知為名知之諸子亦八人皆以昭為名曰昭應號虛谷子有傳家文無名詩皆詣理曰昭庶洞曉樂道學仁宗朝以大臣為薦得旨賜對特授祕書郎今樂書行世國史有傳昭之諸子十八人皆以審為名審能審基皆舉進士審能官至朝議大夫審權著大樂演義即昭庶子也審之庶子三十八人皆以希為名希聲甫冠與貢常官至太學希參登元豐第官至通議大夫希之諸子六十四人或薦或第或蔭或恩或贈而名率不齊其知名者五人曰淵太學上舍生充太學録曰偉以恩得官而博學文辭知名西州又審權孫有曰璣曰永登政和宣和第曰時中贈官至通議大夫又一世諸子踰百人名尤不齊曰與之曰軹曰子申曰子邵曰震仲曰巨皆登科與之視諸從弟行獨年高宣和進士官至中奉大夫持節潼州路故諸從弟今多在子邵典州官至朝請郎震仲官朝請郎又一世諸子踰二百人惟大亮以典三州顯咸以世科顯餘子及諸孫以賞得官者五今在官者二曰燾曰夀卿呂氏呂氏自眉彭山遷成都三世始著曰懷玉曰公立曰陶世以風節聞陶遂為元祐名臣三子傳嗣延嗣緣嗣緣嗣坐黨人子不達終右通直郎子焯當用給事遺奏補官靖康多難格不行商隱宜之凝之皆登第商隱第雖晚以四川類省第一與素望合胡公元直鎮蜀薦之禮部侍郎李公燾以自代召入除國子博士兼國史院編修官遷宗正丞兼史院如初凝之以才為茶馬使者陳公彌作宣撫沈公復見知後由茂州除閬州入對又以易學受知孝廟留為大府寺丞與商隱同時㑹凝之卒商隱亦乞歸除守崇慶卒子盧宜之登第最早所至有治聲而坎壈率多異除通判彭州改辟通判茂州移黎州丁母憂辟通判成州除知簡州擬通判綿州黎州簡州罷非其罪復積二年迭聞兄弟喪卒於綿兄弟皆不得中夀子孫官學故家聲為不長全蜀藝文志卷五十三
