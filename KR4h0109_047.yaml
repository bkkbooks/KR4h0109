body:
  text: 全蜀藝文志卷四十七明周復俊編碑文下唐左拾遺翰林學士李公新墓碑并序唐范傳正騏驥筋力成意在萬里外歷塊一蹶斃於空谷唯餘駿骨價重千金大鵬羽翼張勢欲摩穹昊天風不來海波不起塌趐别島空留大名人亦有之故左拾遺翰林學士李公之謂矣公名白字太白其先隴西成紀人絶嗣之家難求譜牒公之孫女搜於箱篋中得公之亡子伯禽手疏十數行紙壞字缺不能詳備約而計之涼武昭王九代孫也隋末多難一房被竄于碎葉流雜散落隱易姓名故自國朝以來編於屬籍神龍初潛還廣漢因僑為郡人父客以逋其邑遂以客為名髙卧雲林不求祿仕公之生也先府君指天枝以復姓先夫人夢長庚而告祥名之與字咸所取象受五行之剛氣叔夜心髙挺三蜀之雄才相如文逸瓌竒宏廓拔俗無類少以俠自任而門多長者車常欲一鳴驚人一飛沖天彼漸陸遷喬皆不能也由是慷慨自負不拘常調器度𢎞大聲聞于天天寶初召見於金鑾殿玄宗明皇帝降輦步迎如見園綺論當世務草答蕃書辨如懸河筆不停綴玄宗嘉之以寶牀方丈賜食於前御手和羮德音褒美褐衣恩遇前無比儔遂直翰林專掌密命將處司言之任多陪侍從之遊他日泛白蓮池公不在宴皇歡既洽召公作序時公已被酒於翰苑中仍命髙將軍扶以登舟優寵如是既而上疏請還舊山玄宗甚愛其才或慮乘醉出入省中不能不言溫室樹恐掇後患惜而遂之公以為千鈞之弩一發不中則當榷撞折牙而永息機用安能效碌碌者蘇而復上哉脫屣軒冕釋羈韁鎖因肆情性大放宇宙間飲酒非嗜其酣樂取其昏以自當作詩非事於文律取其吟以自適好神仙非慕其輕舉將不可求之事求之欲耗壯心遣餘年也在長安時祕書監賀知章號公為謫仙人吟公烏栖曲云此詩可以哭神鬼矣時人又以公及賀監汝陽王崔宗之裴周南等八人為酒中八仙朝列賦謫仙歌百餘首俄屬戎馬生郊逺身海上往來於斗牛之分優遊沒身偶乘扁舟一日千里或遇勝境終年不移時長江逺山一泉一石無往不自得也晚嵗渡牛渚磯至姑孰恱謝家青山有終焉之志盤桓庀居竟卒於此其生也聖朝之髙士其往也當塗之旅人代宗之初搜羅俊逸拜公左拾遺制下於彤庭禮降於玄壤生不及祿歿而稱官嗚呼命歟傳正生唐代甲子相懸常於先大夫文字中見與公有潯陽夜宴詩則知與公有通家之舊早於人間得公遺篇逸句吟詠在口無何叨蒙恩奬廉問宣池按圗得公之墳墓在當塗邑因令禁樵採備灑掃訪公之子孫欲申慰薦凡三四年乃獲孫女二人一為陳雲之室一乃劉勸之妻皆編户氓也因召至郡庭相見與語衣服村落形容朴野而進退間雅應對詳諦且祖德如在儒風宛然問其所以則曰父伯禽以貞元八年不祿而卒有兄一人出遊一十二年不知所在父存無官父歿為民有兄不相保為天下之窮人無桑以自蠶非不知機杼無田以自力非不知稼穡况婦人不任布裙糲食何所仰給儷于農夫救死而已久不敢聞於縣官懼辱祖考鄉閭逼迫忍恥來告言訖淚下余亦對之泫然因云光祖志在青山遺言宅兆頃屬多故殯於龍山東麓地近而非本意墳髙三尺日益榷圯力且不及知如之何聞之憫然將遂其請因當塗令諸葛縱會計在州得諭其事縱亦好事者學為歌詩樂聞其語便道還縣躬相地形卜新宅于青山之陽以元和十二年正月二十三日遷神于此遂公之志也西去舊墳六里南抵驛路三百步北倚謝公山即青山也天寶十二載勑改名焉因告二女將改適於士族皆曰夫妻之道命也亦分也在孤窮既失身於下俚仗威令乃求援於他門生縱偷安死何面目見大父於地下欲敗其類所不忍聞余亦嘉之不奪其志復井稅免徭役而已今士大夫之葬必志於墓有勳庸道德之家兼樹碑於道余才術貧虛不能兩致今作新墓銘輒刋二石一置于泉扃一表於通路亦峴首漢川之義也庶芳聲之不泯焉文集二十卷或得之於時之文士或得之於宗族編緝斷簡以行于代銘曰嵩嶽降神是生輔臣蓬萊譴真斯為逸人晉有七賢唐稱八仙應彼星象唯公一焉晦以麴糵暢於文篇萬象奔走乎筆端萬慮泯滅乎樽前卧必酒甕行惟酒船吟風詠月席地幕天但貴乎適其所適不知夫所以然而然至今尚疑其醉在千日寧審乎夀終百年謝家山兮李公墓異代詩流同此路舊墳卑庳風雨侵新宅爽塏松柏林故鄉萬里且無嗣二女從民永於此猗歟琢石為二碑一藏幽隧一臨岐岸深谷髙變化時一存一毁名不虧梓州射洪縣武東山陳居士碑陳子昻君諱嗣字𢎞嗣其先陳國人也漢末淪喪八代祖祉自汝南仕蜀為尚書令其後蜀為晉所滅子孫避晉不仕居涪南武東山與唐胡白趙五姓置立新城郡部制二縣而四姓宗之世為郡長蕭齊之末有太平者兄弟三人為郡豪傑梁武帝受禪網羅英豪拜太平為新城郡守尋加本州别駕弟太樂太濛文粹作蒙下同濛為黎州長史督護二字集作都督護南梁二郡太守太樂為本郡文粹作州司馬即君之髙祖父也生曽祖方慶好道不樂為仕得墨子五行祕書集有而字于武東山生烈祖湯仕郡為主簿遇梁季喪亂避世不仕生皇考廣文粹無此字迥迥早卒君即迥之第二子也少孤而有純德恭已飭一本作飾行一日三省家世本以清白崇德逮君之孤素業空矣君有仁兄養母以孝君克順至行同勤苦節夏不避暑冬不避寒蒸蒸服事行年四十有五入則孝出則悌謹而信泛愛衆而親仁無餘力也以是不優於道逮親終沒春秋已髙從仕一本作事不可以養矣乃輟干祿之學修養生之道山壑髙居農野永嵗雅聞漢有王丹者放居不仕家纍千金以自奉田稼勤者載酒肴從之鄉里承化以相懲沮乃歎曰彼王丹者足以集無以字為政矣奚其為政也由是始考林澤闢良田習山書務農政天道時變地道化成丘陵泉文粹作淵藪星嵗雲物靡不用心也文粹無也字原田莓莓粳黍稷稷文粹作黍稷漢漢汶陽之稼如雲矣春日一本作也載華嵗聿其秋白露時降百穀收熟君常乘平肩輿省農夫饋田畯刑以肅惰恱以勞勤若孫吳之用兵鷙鳥之搏擊也倬彼碩文粹作甫田歲取十千倉廩實崇禮節恤惸寡賑窮乏九族以親之鄉黨以歡之居十餘年家纍千金矣其鄰里有偷衣食帶刀劍椎埋胠篋之類鬭雞走狗之豪莫不靡下風馴雅業文粹作素節集作雅素曰里有仁焉吾何從文粹有之字也遂頓浮窳之節肅恭儉之規修孝悌飭一本作飾亷恥將欲較君二字文粹作效君子之素業也君時年已耳順素無經世之情林園遺老玄默忘嵗遂保先君武東山之故居行不由徑非公事未嘗至於州縣也昔襄陽有龎德公谷口有鄭子真東海王霸西山蜀才皆避集有世之二字人養德退耕集有以字求志軒冕不可得而羈憂患不可得而纍逮于我君作者五人矣於戲古者至人不利茍得不務近貴量腹而食度身而衣非其道萬鍾不足豐也匪一本作非其榮五鼎不足飪也躬勤耕稼植其杖而耘不答子路之問者其集無其字豈我君之徒歟綿綿羅網冥冥髙鴻籊籊竹竿穆穆幽龍其與禍敗之遼絶胡楚集無此字越文粹作如胡越哉然則兩龔不免於蘭焚二老不免於薇歎其近貴利耶夫上無憂悔下無飢寒合集作含道以制嗜欲逹命以順生死仁以憂身智以養德俾爾耆而艾俾爾昌而熾君子保之以永夀考非我君者文粹無者字乎享年八十五太嵗壬辰五月十三日考終厥命誡曰啓余手啓余足我聞古人有言珠玉而瘞之是暴骸於中原古者不封不樹後代聖人易之以棺槨吾不敢違聖人可具棺槨而已斂以常服墳無丘壠吾將庶幾以奉先人之清業也有子某乙等皆能祇奉遺訓聿從先志長夀二年龍集癸巳某月某朔日玄月載踰小兆時吉始啓殯昭告奉遷於舊塋武東山之陽禮也鄉望會葬者千餘人皆涕泣號慕悲純德之不見咸曰君子沒矣仁文粹作人何以名陵壑集作谷不朽匪唯頌聲小子不敏謹文粹作請述鄉人之教其辭曰肅肅我祖國始於陳中裔淪喪洎集作泊此江濵山川隆鬱旗鼎氤一本作氛氲挺生君子集作生我君子於鑠元真唯孝肅悌唯仁善鄰樂我耕稼忘我搢紳藝藝一本作茫茫田藪嵗也其春農事方作一本作農人肅事君子犒勤孰為夫子植杖而耘弋者何慕集作篡鴻冥集作飛髙雲楚狂懼世夷叔求仁良圗文粹作時終矣不考于身我異於是非隱非淪撫化隨運安排屈伸大一本作天年既沒長夜何辰聖達不免宇宙同塵桐棺三寸豈我窶貧自古有禮文粹作死非吾從聖人嗟爾百代子子孫孫驕奢自咎天道無親思我松柏恭儉是遵奉議郎張君説墓志銘豫大觀元年以維揚執事被出廢處於家越明年故人君説之子澥狀君説之行來求豫銘惟嚴君説之才每與士大夫談之無不敬愛考其平生固有可銘者夫何辭君説張氏姓名咸字君説本長安人七世祖遭晚唐衰亂避地於蜀寓居成都淳化中曽祖徙於廣漢之綿竹故君説為綿竹人曽祖諱庭堅祖諱文矩贈大理評事父諱紞以殿中丞致仕君説升朝贈奉議郎母趙氏贈靈夀縣太君王氏封華陽太君未及拜命先君三年卒朝奉君捐館諸兄相繼以亡君説年未冠家徒四壁伯兄之子濩淮與其女弟煢煢無依君説力學一舉登元豐二年進士第遂攜諸孤之官撫養教育訖于婚嫁視之猶君説子也初釋褐除蜀州新津簿繼遷仁夀令再遷睢州百丈令改闕學教授元祐初詔復六科君説慨然曰吾先君嘗應是詔可不終成其志耶於是晨夕探討披閲寒暑飢渴未嘗釋卷故六藝百家歷代文史無不該貫一旦再預閣試遂對大庭哲宗皇帝擢居第一改宣德郎僉書成都節度判官公聽事轉奉議郎昔我宗祖分設六科以籠絡天下雄俊故士有事名以闕者未淹嵗月遂躋華要名卿巨相由此途出十常三四得人之盛闕世逮神考者為超然逺覽既患道德之不一又閔士夫之闕也故闕以經書造之而詞賦與六科俱罷及其中闕三闕而君説與什邡王君普王君與君説亦相隨淪落闕科闕廢興與夫人物盛衰偶相值耶抑人事天理故有闕也嗟乎以君説疏敏之才宏贍之學與其經世之志假之以年則功名冨貴闕前人何歉君説長於序事稽參古今按文相質歷歷可取年方齠闕覩闕妙盡其闕士夫夫罕能及之其天資頴悟若此闕三娶任氏贈仙原趙氏贈仙居計氏封仁和並縣君生五子曰淵曰潮曰滙曰漣曰浚女二人長適進士陳佾次適進士王恂孫男三人枃棐桂元符二年五月初四日以疾終於成都普福僧舍享年五十一大觀二年三月初十日葬於浦閏鄉柔逺里之新水澥編類所為雜文二十卷藏之於家銘曰挺妙質馳駿聲大廷發策超羣英胸中夙藴超滄溟文采燁燁垂天星哀哉造物不我營胡不假以闕齡奄忽順化人所驚幸聽雛鳳髙岡鳴慰我感慨遺芳馨碑文漫滅淳熙十三年孫朝散郎權尚書兵部侍郎兼知臨安軍府事兩浙西路安撫使枃得遺本於故庋中重新謄寫曽孫通直郎新差知潼川府飛烏縣兼來調官俾石立於墓下敷文閣學士通奉大夫致仕贈少師李文簡公神道碑宋周必大韓愈以天刑人禍歸咎史筆栁宗元隨闢其説後人終致疑焉今以李文簡公驗之何疑且左氏紀諸國之事史記上下數千載是是非非利害不專及當世若公續司馬光資治通鑑為本朝長編上關國體下涉諸臣之家非異代比使天刑人禍可信不能結知明主見推多士生歷清要沒定美諡諸子繼踐世科歷二千石光顯未艾如李氏者乎况公出入中外見為忠直盡言交遊藐視強禦雖微作史自當齟齬難合然讒間不行於朝士大夫鮮含怒者何也守道正蒞職公事上不欺應物無心天人交助其在兹乎既沒十八年蜀多文士其子不近求銘誄而逺屬耋老非以同朝久相知深也歟是宜序而銘之公諱燾字仁甫一字子真係出唐曹恭王季子右武衛大將軍偲武右斥為民徙眉州之丹陵縣遂家焉六世孫瑜始復屬籍仕至長江令公長江十一世孫曽祖夔祖鳳贈奉直大夫考中朝奉大夫知仙井監纍贈宣奉大夫妣碩氏史氏公生政和乙未天資頴異博覽經傳獨不樂王安石學甫冠已著兩漢鑒明年追念靖康變故著反正議十四篇人皆竒之紹興八年第進士調成都府華陽縣主簿未上講書本縣龍鶴山命曰巽岩自記云子真子三卜居乃得此山向東南面西北其位為巽為乾蓋處已非乾則無以立應物非巽則無以行易六十四卦仲尼掇其九而三陳之起乎履止乎巽此講學之序也語曰可與共學未可與適道可與適道未可與立可與立未可與權夫人各有所履善惡分焉惟能謙可與共學惟能復可與適道知所通而無以自立則莫能久故取諸恆常久於其道或損之或益之至於困而不改若井未始隨邑而遷則所以自立者成矣雖然吉凶禍福橫發逆起有不可知將合於道其惟權乎然非巽則權亦不可行學而至於巽乃可與權此聖賢事業也年方二十四其志趣學問如此久之赴華陽時宰秦檜知公名公不與通曽詔群國舉賢良公攜五十策謁成都帥張燾不果薦秋滿外銓復職教授缺公亦不就注嘉州軍事推官丁父憂二十年服除再注雅州軍事推官作當直司針諷郡守用私情背公法者總領財賦符行中屬公增簡州鹽莢公移書力拒之舊相張浚謂有臺諫風二十四年改宣議郎知成都府雙流縣日坐聽事訟至立決前致政李文會自瀘州徙益府下九縣供張加倍公用常儀李由他道去仕族張氏子競家資公曰汝方在喪忍墜先訓盍歸思三日復來果悔過自新大姓李雱市丘成之産業公以成之不白所生母追正之雱讕辭訴府公引經議律文致雱法豪右斂迹邑庭如水日翻史册彚次國朝實事謂司馬光修史先為百官公卿表十五卷後頗散逸乃遍求正史實録傍採家集野史增廣門類起建隆迄靖康合新舊官制書一百四十二卷其重編完者僅七之一長編之書蓋始於此二十九年四川制置使王剛中辟公幹辦公事三十二年知榮州州因山為城川為池夏秋常患水溢公築防禦之隆興二年除潼川府路轉運判官入境劾守令四人州縣多橫斂公選官置局括一道財賦列其名色使有無相補酌三年中數而為帳遍示官吏計擲不當更定名為科約至今不廢母憂去官乾道三年召赴行在八月入對上太祖故事乞以為法請許六察言事又言軍興三十年蜀賦一錢折變百之願自此勿增取况蜀兵已多宜罷招刺嚴揀汰禁大將毋張虛籍倍部曲孝宗嘉納除尚書兵部郎中以父諱不行員外郎兼國史院編修官又兼禮部會慶節上夀在效禮散齋內議權作樂公言漢唐事天地散齋四日致齋三日我藝祖初郊亦然自崇寧大觀法周禮分祭天地故前十日誓戒今既合祭宜復漢唐及本朝舊制庶幾兩得詔垂拱上夀止樂正殿為北使權用十二月正除禮部員外郎公言中興祭典未備嶽鎮海瀆先農先蠶風雲雷師九祠以酒脯代牲牢近者雨暘失節郡國水災殆或以此詔復舊占城國入貢依崇寧五年敕書用白背金花綾紙貯以金鍍帳匣公請如近例學士院謂禮部不當預公曰典禮先有司部兼掌客豈侵官耶長編卷帙漸成蜀帥汪應辰乞下臨安府給筆札繕寫藏祕閣公遂進國初至治平一百八卷特遷兩官公意時文卑弱乞令考官取學術醇正切於世用之文茍涉虛浮必行黜落明春省試敕榜戒諭上方勵精為治事或中出公輪對言唐虞三代專倚輔弼漢唐或謀卿士今捨二途近習必進此治亂之機惟聖明深慮過防蓋有所指也又奏省闈取士本不立額乞參皇祐四百之限稍加裁定舊特奏名雖賜出身罕授職任近兩榜至八百五十餘人放選注官而賢良方正則寂無應詔當貢舉者讀畢遂言天下有變經營北方未見可付之人上曰朕當自將公曰聖諭及此與真宗濟澶淵合矣上曰此朕家法太祖平澤潞取睢陽太宗平太原皆是也公謂先自治以待時上聳聽不倦近侍跛倚明日諭三省議省額特恩二事有沮之者乃以五年四月遷祕書少監太史言八月日當食公上疏曰災異所以警戒人主今經筵不訪問言路罕論奏大臣趙普補綴奏目杜衍封還內降之風臣恐憂不在疆埸惟陛下進衆正消羣陰以應天變是冬擢起居舍人六年雷震上元後一日公録仁宗景祐三年正月甲辰求言寬賦斂二詔以進直乞刋定徽宗實録之疏舛者因言臣方修闕治平後長編若就加討論他時可助正史詔復開實録院四月首命公為檢討官汪應辰進公子闕賢良詞業上曰卿有子矣范成大除右史升攝起居郎議者誤引元豐八年十月詔欲廢二浙保正止存耆長又宰相以蜀人帥蜀工部並除二侍郎武臣提典刑獄皆違舊制公援證再三上曰卿論事根據極當朕心左相陳俊卿出知福州右相虞允文既任恢復未免更張公言二典若稽古夏有典則商云成憲周云舊章漢云故事子孫莫之敢變王安石變更法度厲階可鑒時上欲除公兵部侍郎公自攝記注數論事宰相頗不樂公遂請去六月除直顯謨閣湖北路轉運副使陛辭以欲速變古為戒又奏禹貢九州荆田第八賦乃在三人功既修遂超五等今田多荒蕪賦虧十八上委公條進至則言創耕憚科斂且畏爭奪宜寬月占廣激勸如太祖乾德四年許見佃者止輸舊稅更不通檢詔如所請其妄執契爭奪毋受理守令能勸課者賞之總賦呂遊問奏計公攝其職嵗飢發户部大軍倉賑民僚佐爭執公曰吾自任責不以纍諸君尋如數償之遊問歸劾公專輒請上令具祈而已七年后上中制科八年以舊官趨召會虞允文由左丞相宣撫四川自詭北伐疑公異議預白上改直寶文閣帥潼川兼知瀘州首葺石門堡置戍以扼夷人敘州舊市羈縻馬價頗平比嵗增其尺寸償直不以時公言國計邊防胥失之乞戒茶馬司互市毋溢額仍勿於夷漢禁山內伐木造舟尋皆報可守邊踰嵗淳熙元年被召適城中火公上章自劾既放罪矣提刑何熙志奏公不親至火所併指長編記魏王食肥彘語涉誣謗上曰此載皇宋事實何害上命成都提刑李繁體量火事公行及國門及祠待辦除江西轉運副使且許臨遣公進治平四年至元符三年長編四百一十七卷或勸公方被讒勿及時事公曰聖主全度如此竭忠所以報也遂奏近者日食地震夷狄小人不可不慮又上快針引太祖退朝悔乘快決事以諫上曰朕當揭之坐隅進祕閣修撰旋坐火役不盡書焚室貶秩一等而熙志以輒議史事削兩官公至江西置一路財賦都簿如潼川科約未幾召還乞令本路毋以臣去廢此書上曰卿不為髙論務在便民甚善擢祕書監權同修國史權實録院同修撰蓋專付公以史事故用侍從之禮三年正月也公前數言南郊明堂大禮自宜迭行適轉對申前説上令集議嬖近謂德夀宫有嫌沮不行及豫為禮部尚書與諸儒議周成王宗祀文王漢武帝陟配髙祖所謂嚴父指周公也晉唐及本朝名臣皆有是説非出於燾發之耳其議遂定三月除權禮部侍郎賜服金紫七月壬戌雷震太廟柱壞螭尾有司隨加繕治公奏此非所以祗天變當應以實上諭大臣燾愛朕屢有讜言公嘗請正太祖東鄉條上熙寧元符紹興議論其後卒行之進四繁録記女真契丹起滅自紹聖迄宣和靖康凡二十卷上曰朕可一日忘此虜哉九月兼侍講以經筵少開録趙師民勸講針以諷拜及仇士良不欲人主讀書近儒生之説會改潛邸為佑聖觀創璇璣殿於太乙宫公密疏二千餘言上褒答之四年春駕幸太學命公執經特轉一官堅辭不聽公自郎春官已極論科舉及特奏名去冬又乞依紹興二十七年二月詔書用經義詩賦論䇿四場如元祐時仍採蘇軾議量收恩科至是力請變文體取正學以致人才上袖公奏付三省下學官議國子司業鄭伯熊等請如公言而老生晚學譁言不便議遂格八月真拜侍郎仍兼工部徽録直院久公薦吕祖謙為祕書郎兼檢討官審訂增削數百條書遂成特遷一官或請升降兩學從祀衆議不同第去王雱像用公説也元符靖康長編成上謂公無愧司馬光後有表云豫席恩言比迹先正指此夜直宣引奏近者蒙氣蔽日厥占不肖者祿股肱耳目宜謹厥與賜坐欲起上再留賜飲賜茶恩意甚寵尋詔監視太史測驗天文公為郎時已言乾道新厯不可用因舉差失數十條詰太史局官皆無以對卒無知厯者公又參酌開寶通禮政和五禮新儀為一書雖下禮官亦不能成九月丁酉日當夜食公為社壇祭告官伐鼓禮廢公舉行之先是垕入祕書為正字旋兼國史編修實録檢討遷校書著作父子同典史事縉紳榮之公感上知論事益切每集議衆未發言公條陳可否無所避會近臣復舉公次子孰應科目黜於閣試垕適考校上舍生發䇿云云為御史所劾語併及公垕降一官罷公以本官知常德府初正和七年鼎澧辰沅靖州置營田刀弩十司給田募人開邊范世雄張察等附會擾民建炎三年亟罷之乾道末守臣劉邦翰請復行於辰沅靖三州公為轉運謂不當復已而提刑引機迫郡縣行之田不能給公至靖度田立額事下諸司公獨約帥臣張栻具奏上即從之境多茶園異時禁切商賈甚至交兵公曰官捕茶賊豈禁茶商聽其自如迄無犬吠警六年乞間提舉江州太平興國宫是秋行明堂大禮上以公首建議特除敷文閣待制頃之垕孰繼亡上欲公以吏事銷憂起知遂寧府用蔡挺涇原衙教法闢勤武堂親閲士卒其雜居市廛者葺營聚之七年史院進四朝正史經修官在外者例減磨勘二年宰執奏正史頗採李燾長編地里一志又出其手詔減年外别轉一官公自奉議郎年涉典籍積官朝議大夫避父名遇遷秩寄理者三於是轉通議大夫公以酒課加重奏榷酤起王莽而成於德宗本朝郡釀有教監司尚不許今乃設法勸飲以斂民財縱未能盡弛猶當用買撲舊法罷去官監上意鄉之而計司迫贍軍日減三千緡而已公節度停茶錢官府肅然前代旨長編或有增損依熙寧修三經義法具奏至是上四千四百五十餘條又以一百六十八年事散九百八十卷一覽難周别為舉要六十八卷總目五卷修事目十卷時詔命已下公控辭久之上數詢來期十年六月對延和殿邇英方讀陸贄奏議公托贄言切今者數十事勸上酌行且曰贄雖相德宗其實不遇今可謂千載一時上曰惟不遇於當世是以言垂後世公又奏陛下即位二十餘年志在冨強而兵約財匱與教民七年可以即戎異矣上有無功業之嘆公曰功業見於變人事既修天應乃至上曰卿宿德耆儒宜在左右任史職進敷文閣直學士提舉佑神觀兼侍講同修國史七月久旱公進避殿損膳求言故事上亟施行命侍從臺諫兩省卿諫館職實封言事趙彥中草詔云意者委任或非其人公奏陛下委任不過三四大臣神宗語冨弼云唐太宗與魏徵議政全以爭競宜敇二府以魏為法毋若元豐王圭號三旨相三旨者謁上有可否圭曰領聖旨諭軍國事曰誠如聖旨啓擬曰取聖旨也又謂户部不足南庫有餘請如唐建中罷瓊林大盈庫歸左藏上以奏付外讀者失色丁丑遂雨一日宣對公言外議陛下多服藥罕御殿宫嬪無時進見浮費頗多上曰感卿忠愛然朕春秋已髙安得此聲近唯葬李媫妤用三萬緡他無費也上憂熒惑嘗入斗公言天道逺惟正厥事可以弭災類次漢元鼎至宣和四十五事以進十一月朔日當食心八分公曰心為宋分為天王位潛陽將復陰氣乘之小人害政夷狄窺中國之象復條上古今日食是月者二十四明日對延和又及晉何曽譏武帝無經國逺圗上甚嘉奬是嵗公賦詩云明年七十吾歸矣預買北關門內舟至冬疾作三省請給告十日上曰老者不以筋骨為禮可半月十一年春表乞致仕優詔不允上數問宰執公疾增損何如萬里召來豈容輕去丞相王淮曰燾知進退宜從所請上曰脫不幸有故於道路奈何可諭其鄉人給事中宇文價留之價傳上旨公曰臣子戀闕非老疾忍乞骸骨因詢價時事勉以忠藎聞四川制道事留正總領馮憲論減酒額猶手劄贊廟堂行之二月病棘甲子除敷文閣學士轉一官致仕命下喜曰事了矣口占遺表云臣年七十死不為夭所恨報國缺然願陛下經逺以藝祖為師用人以昭陵為法辭氣安定俄卒上聞嗟惻賻銀絹三百匹兩贈光祿大夫令臨安治後事沿江漕司津置歸舟他日語宇文價曰朕嘗許燾大書續資治通鑑長編七字且用神宗賜司馬光故事為序冠篇不謂止此也公孝友誠實性無嗜好惟潛心經史有易學五卷春秋學十卷故其出處本於潔靜精微著述則評論今古别白善惡得褒貶之旨所至求奧篇隱帙傳録讎校雖陰陽小説亦無遺者家藏積數萬卷為文語道而理備考蜀類試參詳南省多得名士薦人輒削藁前兩入朝適虞允文暨趙雄當路士大夫爭談兵二公皆蜀人雅敬公公一無所徇晚在經筵人頗懷安公為上言前日紛紛今日默默俱非自治其持論不隨時類此公著五經傳授尚書百篇圗大傳雜説七十二子名籍各一卷文籍三十卷奏議二十卷四朝史藁五十卷通論十卷南北攻守録二十卷七十二候圗陶潛新傳並詩譜各三卷歷代宰相年表二十三卷唐宰相譜一卷江左方鎮年表六卷晉司馬氏本支齊梁本支王謝世表五代三衙將帥年表各一卷本朝事始兩卷建隆遺事辨趙普别傳科場沿革集賢學士并賜帶典故各一卷范韓文冨王歐陽司馬三蘇及六君子年譜各三卷明年七月乙酉即葬巽岩之陽妻碩人楊氏同邑贈朝散大夫素之孫黃庭堅為記大雅堂者後公八年卒祔焉七子謙早死垕終奉議郎主管成都府玉局觀􅹅今為朝請郎權發遣忠州孰終承務郎垈亦亡壁􅌫皆登科壁為朝散郎壁發遣漢州􅌫承議郎主管華州雲臺觀六女均適朝散郎知果州曹執中坑適朝奉大夫知崇慶府帥祖慶壇適迪功郎漢州學教授任阜腆適謝純頴增適承議郎充雲安軍使兼知縣事張伸堪適朝散大夫利州路提點刑獄公事范子庚孫十一人鏜宣議郎錫修職郎彭州九壠縣主簿鏗銶錟周鋂鑣銓積簡其三今亡銶周鑣也女三人長馴早夭次真適修職郎孫剛亦不在從適迪功郎新雅州蘆山縣簿尉劉成季曽孫十一人公爵丹稜縣開國伯食邑七百户諸子升朝贈少師而贈楊氏福國夫人銘曰尚書記言春秋闕事經列以六史居其二漢太史公儀尊相臣我朝大典亦歸宰庭時政有記起居有注東觀石渠諸儒所聚設官分職上下相維合力纂修猶懼闕遺公生遐方初筮州縣間於朝會屈首鉛槧祖功宗德業巨事嚴政有因革論多異同禮樂制作夷狄叛服原始要終咸舉綱目三入承明乞用奏篇帝擬以光士惟如遷問胡云然多聞諒直舞禮文姦視若仇敵以正事君忠讜不欺出而臨民敬簡無私赫赫榮名畨畨夀考慶流子孫殃則何有螭首龜趺刻以銘章申勸剛者公為不忘塗山古碑元賈易巖考長夀志名元至正十五年三月初四日涪陵賈易巖撰華陽志云渝郡塗山禹后家也古廟廢宋至壬辰郡守費著仍建廟堂考娶于塗山之説一謂在此一謂在九江當塗東漢郡志云塗山在巴郡江州杜預考曰巴國也有塗山禹廟又古巴郡志云山在縣東五千二百步岷江東城髙七里周圍二十里酈道元水經云江州塗山有夏禹廟塗山祠九江當塗亦有之杜預所謂巴國江州乃今重慶巴縣則江州非九江之江州漢史蜀志可稽至今洞曰塗洞村曰塗村灘曰遮夫后曰啓母復合帝王世紀蜀本紀華陽國志元和志等書參考之禹乃汶山郡廣柔人其母有莘氏感星之異生禹於石紐廣柔隋改廣柔為汶川石紐在茂州域𨽻石泉軍所生之地方百里夷人共營之不敢居牧靈異可畏禹為蜀人生于蜀娶于蜀古今人情不大相逺道江之役往來必經過門不顧為可憑信先是帝曽大父曰昌意為黃帝次子娶蜀山氏生帝顓頊顓頊生鯀鯀生帝帝之娶于蜀又有自來又謂蜀塗山肇自人皇為蜀君掌塗山之國亦一徵也至會諸侯于塗山當以九江郡者為是東漢郡志云山在當塗杜預云在夀春東北今有禹會村栁子有銘蘇子有詩且於天下稍向中會同於此宜矣通鑒外紀亦云禹娶塗山之女生子啓南巡狩會諸侯于塗山如是則娶而生子生子而後南巡南巡而後會諸侯娶則在此會則在彼次序昭然會稽乃致郡臣之地或崩葬之所故有禹穴所謂塗山一曰棟山一曰防山紛紛不一太平乃晉成帝世當塗之民徙居於此故亦名其縣曰當塗好事者援此以為説而實非塗山世次綿逺地名改易煩亂傅會不足徵况會稽當塗在禹時未入中國禹安得娶彼哉今特辨而正之庶祠廟之建得其本真而禹后受享于誕生之地尤不可闕爾賜修蜀堰碑揭徯斯江水出蜀西南徼外東至于岷山而禹導之秦昭王時蜀太守李氷鑿離堆分其江以灌川蜀川蜀以饒自秦歷千數百年所置衝薄蕩囓大為民害有司嵗治隄防百三十二所役兵民多者萬餘人少者千人其下猶數百人人七十日不及七十日雖事治不得其休息不役者日三緡富屈於資貧屈於力上下交病會其費嵗不下七萬緡毫髮出於民十九藏於吏概其所入不足以更費今上皇帝即位之明年僉四川廉闕司事吉當普巡行周視得要害之處三十有二餘悉罷之且召灌州判官張𢎞計曰若甃之石則役可罷民蘇弊除胡憚而莫之為𢎞曰公慮及此生民之福國家之幸萬世之利也𢎞請出私錢試以小堰堰成水暴漲堰不動乃具文書會行省及蒙古軍七翼之長郡縣守宰鄉遂之老各陳便宜皆曰便復禱於氷祠與神約昔鑿離堆以冨川蜀建萬世之利神功也今水失其道民失其利吏乘其弊若此而神弗之救是神之惠弗終也神克相豫于治弗豫相請與神從事卜之吉於是徵工發徒以至元改元十有一月朔肇事於都江堰都江即禹鑿之處分水之源也鹽井關據其西南江南北皆東行北舊無江氷鑿以避沫水之害中為都江堰少東為大小釣魚磯又東跨二江為石門以節北江之水又東為利民臺臺之東南為侍郎楊栁二堰其水自離堆分流入于南江南江東至鹿角又東至金馬口又東過大安橋入於成都俗稱大皂江江之正源也北江少東為虎頭山為鬭雞臺臺有水則尺為之畫凡有一水及其闕其民喜過則憂盡沒其則則民困乃書深淘灘低作堰六字其闕治水之法皆氷所為也又東為離堆又東過淩虛步雲二橋又東至三石洞釃為二渠其一自馬騎東流過郫縣入於成都古謂之內江今府江是也其一自三石洞北流過將軍橋又北過四石洞折而東流過新繁入於成都古謂之外江即氷所穿二江也南江自利民臺有支流東南出萬工堰又東為駱駝又東為確石繞青城而東鹿角之北涯有渠曰馬埧東流之成都入于南江渠東行二十餘里水決其南涯四十有九嵗疲民力以塞之乃自其北涯鑿二渠與楊栁渠合東行數十里復與馬埧渠合而渠始安流自金馬口之西鑿二渠合金馬渠東南入新津罷藍闕黃水千金白水新興至三利十二堰北江三石洞之東為外應顔上五斗諸堰外應顔上之水皆東北流入於外江一闕之水南入於馬埧渠皆內江之支流也外江東至崇寧亦為萬工堰堰之支流自北而東為三十六洞過清白堰東入於彭漢之間而清白堰水潰其南涯延袤二里餘有司因潰以為堰堰壞乃疏其北涯舊渠直流而東罷其堰及二十六洞之役嘉定之青神有堰曰鴻化則授成其長吏使底其功應期而畢若成都之九卑堤崇寧之萬工堰彭之堋口豐潤千江石洞濟民羅江馬腳諸堰工未及施而召亦責長吏農隙為之諸堰都江及利民臺之役最大侍郎楊栁外應顔上五年次之鹿角萬工駱駝確石三利又次之而都江又居大江中流故以鐵萬六千斤鑄為大龜貫以鐵柱而鎮其源以捍其浮槎然後即工諸堰皆甃以山石範鐵以闕其中取桐實之油刀麻為絲和石之灰以苴罅漏禦水潦岸善崩者密築江石以護之上植楊栁旁種蔓荆櫛比鱗次賴以為固蓋以數百萬計所至或疏舊渠而導其流以節民力或鑿新渠而殺其勢以益民用遇水之會則為石門以時啓閉而泄蓄之凡智力所及無不為也初郡縣及兵家共掌都江之政延祐七年其兵官奏請獨任郡縣乃以其民分治小流諸堰廣其增修而大其役民苦之至是復合焉常嵗獲水之用僅數月堰輒壞今雖緣渠所置碓磑紡績之處以千萬數四時流轉而無窮其始至都江水深廣莫可測忽有大洲湧出其西南方可數里人得用事其間入山伐石崩石已滿隨取而足用所向皆然蜀故多雨自初役至工畢無雨雪故力省而工倍而民不知勞若有相之者亦其忠誠所感如此致使天子賜酒之使相望於道臺省觀工之檄不絶于使所溉六州十二縣之民咸歌舞焉而下自郡縣上至藩部惡其害已且疾且怨或決三洞之水以灌其次或毁都江之石以壞其成撓之百計不拔益固甫五越月大功告成百一恆費民永休饗古未有也而吉當普會以監察御史召臺上其功詔臣徯斯紀之於碑臣聞水先五行食首八政九疇之敘其次可觀矣夫水者衣食之源也然所以為利亦所以為害在善導之而已禹平水土猶已溺之后稷播種猶已飢之萬世有稱焉是故為政不本於農不先於水是為不知務是謂冥行之臣李氷一作離堆民受其賜吉當普一修其業神且不違彼失其利而廢之不亦卑乎惟吉當普才大而敏德愛深而知逺不枉其道不屈其志臨難忘身為國忘家安於命而勇於義而知所先務故事可立而功可建其在四川請罷鹽運司正鹽井之法以去姦利置安撫司以撫四方流寓之民使安其耕鑿及居臺端知無不言言無不合誠國之寶也判官張𢎞殫智竭慮終始克相其志雖百折而不悔亦今之賢有司乎是役也石工金工皆七百人水工一百五十人徒三千九人而蒙古軍居其二工糧為石千有竒石之材取于山者百萬有竒石之灰以斤計六萬有竒油半之鐵六萬五千麻五千最其工之直物之賈以緡計四萬九千有竒皆出於民之庸積而在官者餘二十萬一千八百緡責灌守以貸于民嵗取其息以備祭祀若淘灘修堰之供仍蠲灌之兵民常所隆役以專供堰事嗚呼後之蒞此土者尚永監于兹勿怠其政隳其事以為民病以為國家憂臣謹拜手稽首而作頌云廣祐英惠王父子碑銘天一濬靈多原於西岷山導江禹績可稽民生之初惟水利賴夫既利之胡忍貽害運有推遷事有因革保制安危神實任責於穆英惠藩屏坤維於赫仁祐駿烈四馳自秦徂漢祀以千計維王父子蜀境是庇江源自蜀王鑿其阻蜀溉餘波厥施乃溥江趨而東勢通蜀山春夏暴深橫潰是間既遏其衝又決其支以漫以灌惟堰是資昔王受命司我芻牧為兹惠利以阜我蜀今我蜀民作堰嵗勞殫智疲力以扞江濤僉憲有謀將息斯患王實誘之肯遺以艱史籲于王願授指教王繇之詞繼導之珓詢謀允孚百役以興厥志無一惟王之憑象鼻之漲茫無津涯湧為淺瀨有礫有沙匠陟彼巘言鑿其堅山夜發洪冗不待穿匠取彼石既磊既砢撝錐運斤惟右惟左蜀山不雲蜀日且出涉冬屆春民就愛日彼犍彼災昔水今石其崇言言永固爾墌民聽鼛鼓追思往年富民醵錢耕者廢田今兹永逸孰究我圗顯允二神作我蜀郛聖神在御懷柔百神封章來上亟命詞臣錫以徽稱華以晝命以旌王功以致朕敬渙號于庭揭虔于詞朕命不褻神惟顯思登瀛有臣復請誄賜俞音自天寵命荐至嗟彼嬴民百郡列署惟兹蜀守勳烈昭著異趨殊歸惟德與力王初庇民顧盡乃職豈謂異世猶耀厥靈俾王初志炳乎丹青王不恃力務德是勤有偉斯績益光前聞詞臣作歌守吏眂刻江流沄沄昭彼無極全蜀藝文志卷四十七
