body:
  text: 全蜀藝文志卷五十八明周復俊編譜歲華紀麗譜元費著成都遊賞之盛甲於西蜀蓋地大物繁而俗好娛樂凡太守歲時宴集騎從雜沓車服鮮華倡優鼓吹出入擁導四方竒技幻怪百變序進於前以從民樂歲率有期謂之故事及期則士女櫛比輕裘袨服扶老擕幼闐道嬉逰或以坐具列於廣庭以待觀者謂之遨床而謂太守為遨頭宋朝以益州重地嘗謀帥命宋公祁宰相對曰蜀風奢侈祁喜遊宴恐非所宜宋朝不從卒遣之公先奉詔修唐書因以書局自隨自成都每宴罷盥漱闢寢門垂簾燃二椽燭媵婢夾侍和墨伸紙望之者知公修唐書若神仙焉嘗宴於錦江偶微寒命索半臂諸婢各送一枚公視之慮有厚薄之嫌訖不服忍冷以歸舊俗傳誇以為談本田公况嘗為成都遨樂詩二十一章以紀其實而薛公奎亦作何處春遊好詩一十章自號薛春遊以從其俗且欲以易尹京之舊稱公知開府專以嚴治人謂之薛出油此皆可以想承平之遺風也至清獻公為記乃曰曩宴會皆牙校掌之蓋榷酤之利有餘人樂於為役公帑歲入亡慮千萬貫有竒自新法頒行酒坊為官所鬻牙校雖得劵錢不足自贍乃者議置成都市易務方遊觀時人情瞿然減常歲之半及浣花後始聞罷去乃復朋聚遊江今公使錢歲給三萬貫常凛凛慮不足譬之巨人以狹衾寢覆趾則露肩擁左則闕右甚可笑也今盤饌比舊從省樂優之給亦復過殺設遂廢之則非天子所以付畀一隅惠保遠人之意而小民之鬻肴果者但營慕供藉以為養此遊晏之不可廢也觀公此言則蜀人之貧富欣戚可以知政矣今以元日為始而第其事正月元日郡人曉持小綵幡遊安福寺塔粘之盈柱若鱗次然以為厭禳懲咸平之亂也塔上燃燈梵唄交作僧徒駢集太守詣塔前張宴晚登塔眺望焉二日出東郊早宴移忠寺舊石碑婁院晚宴大慈寺清獻公記云宴罷妓以歌詞送茶自宋公祁始蓋臨卭周之純善為歌詞嘗作茶詞授妓首度之以奉公後因之五日五門蠶市蓋叢氏始為之俗往往呼為蠶叢太守即門外張宴上元節放燈舊記稍稍唐明王上元京師放燈甚盛葉法善奏曰成都燈亦盛遂引帝至成都市酒於富春坊此方外之言存而勿論咸通十年正月二日街坊點燈張樂晝夜喧闐蓋大中承平之餘風由此言之則唐時放燈不獨上元也蜀王孟時間亦放燈率無定日宋開寶二年命明年上元放燈三夜自是歲以為常十四十五十六三日皆早宴大慈寺晚五門樓甲夜觀山棚變燈其斂散之遲速惟太守意也如繁雜羅燈火之盛以昭覺寺為最又為錢燈會會始於張公詠蓋燈夕二都監戎服分巡以察姦盜既罷故作宴以勞焉通判主之就宣詔亭闕舊以十七日今無定日仍就府治專以宴監司也十三日聖壽寺前蠶市張公詠始即寺為會使民鬻農器太守先詣寺之都安王祠奠獻然後就宴舊出萬里橋登樂俗園亭今則早宴祥符寺晚宴信相院十八日俗傳為保壽侯誕日出笮橋門即候祠奠拜次詣淨衆寺邠國杜丞相祠奠拜畢事會食晚宴大智院二月一日踏青節初郡人遊賞散在四郊張公詠以為不若聚之為樂乃以是日出萬里橋為綵舫數十艘與賔僚分乘之歌吹前導號小遊江蓋指浣花為大遊江也士女駢集觀者如堵晚宴於寶厯寺公為詩有曰春遊千萬家美人顔如玉三三兩兩映花立飄飄似玉乘煙霞公鐵心石腸乃賦此麗詞哉後以為故事清獻公為記時綵舫至增數倍今不然矣八日觀街藥市早宴大慈寺之設廳晚宴金繩院三月三日出北門宴學射山既罷後射弓蓋張伯子以是日即此地上升巫覡賣符於道逰者佩之以宜蠶辟災輕裾小蓋照爛山阜晚宴於萬池亭泛舟池中九日觀街藥市早晚宴如二月八日二十一日出大東門宴海雲山鴻慶寺登衆春閣觀摸石蓋開元二十三年靈智禪師以是日歸寂邦人敬之入山逰禮因而成俗山有小池士女探石其中以占求子之祥既又晚宴于大慈寺之設廳二十七日大西門睿聖夫人廟前蠶市初在小市橋田公以禱雨而應移於廟前太守先詣諸廟奠拜宴於衆淨寺晚宴大智院寒食出大東門早宴移忠院晚宴大慈寺設宴廳曩時寒食太守先設酒饌於近郊祭鬼之無依者謂之遙享後至廣仁院以葬死而無主者乃遣官臨祭之而民間上冢者各蟻集於郊外天僖二年趙公稹嘗開西樓亭榭俾士庶遊觀自是每歲寒食闢園張樂酒壚花市茶房食肆過於蠶市士女從觀太守會賔僚凡浹旬此最府廷逰宴之盛近歲自二月即開園踰月而後罷酒人利於酒息或請於府展其日府尹亦許之四月十九日浣花佑聖夫人誕日也太守出笮橋門至梵安寺謁夫人祠就宴于寺之設廳既宴登舟觀諸軍騎射倡樂導前泝流至百花潭觀水嬉競渡官舫民船乘流上下或幕㡩水濵以事逰賞晏為出郊之勝清獻公記云往昔太守分遣使臣以酒均給逰人隨所會之數以為斗升之節自公使限錢兹例遂罷以遠民樂太平之盛不可遽廢以孤其心乃以隨行公使錢釀酒畀之然不逮昔日矣五月五日宴大慈寺設廳醫人鬻艾道人賣符朱索綵縷長命辟災之物筒飯角黍莫不咸在六月初伏日會監司中伏日會職官以上末伏日會府縣官皆就闕讀廟設廳初文潞公建設廳以伏日為會避暑自是以為常早宴罷泛舟池中復出就廳晚宴觀者臨池張飲盡日為樂趙清獻公使限錢但為初伏會今因之七月七日晚宴大慈寺設廳暮登寺門樓觀錦江夜市乞巧之物皆在焉十八日大慈寺散盂蘭盆宴於寺之設廳宴已就華嚴閣下八月十五日中秋玩月舊宴於西樓望月於錦亭今宴於大慈寺九月九日玉局觀市宴監司賔僚於舊宣詔堂晚飲於闕二日官為幕㡩棚屋以事遊觀或云有恍惚遇仙者冬至節宴于大慈寺後一日早宴金繩寺晚宴大慈寺清獻公記至前一日太守領客出北門石魚橋具樽豆觀樵已乃即天長觀晚宴蓋文潞公始為之後復罷全蜀藝文志卷五十八
