body:
  text: 全蜀藝文志卷五十七明周復俊編譜錢幣譜元費著蜀古用銅錢漢文帝時賜鄧通蜀嚴道銅山鑄錢是也公孫述據蜀始廢銅錢置鐵官錢百姓貨幣本行其謡曰黃牛白腹五銖當復好事者竊言王莽稱黃述自稱白五銖漢貨也言天下當還劉氏後述雖滅猶用鐵錢以二當銅錢一劉備攻劉璋拔成都士卒皆赴庫藏取寶貨軍用不足乃鑄錢一當百平諸物價文曰直百南齊永明八年劉悛啓帝曰闕家山故嚴道地有古銅坑可以經略帝從之遣使入蜀鑄錢得闕功費多乃止後周得蜀雜用古錢交易隋文帝時詔蜀王秀於益州立五爐錢字文輕重如開通元寶之制後王衍末年改元咸康又鑄咸康錢然不及闕舊錢遠甚孟氏廣政間增鑄鐵錢於外郡邉界參用每錢千其四百為銅六百為鐵逮至末年流入成都率銅錢十分雜鐵錢一分大盈庫錢往往有鐵錢相混莫辨蓋鑄之精工光明與銅錢相類也孟昶失國乾德四年知府官公餘慶轉運使沈公義倫奏揀銅錢計綱以發蜀地上行鐵錢以千二百易銅錢千文索銅器鑄錢附發仍增鑄銅錢市金上供然失於裁制物價滋長鐵錢彌賤至以五千易銅錢一千太平興國四年詔兩稅及諸課利錢率十分輸銅錢一分時舊銅錢已竭民騷然以擾北客乘時銅錢入蜀以一錢易鐵錢十四大利商賈有以銅錢三五毁發古冢剔取神像犯刑者衆朝廷察知詔仍舊止輸鐵錢人心乃安淳化五年詔令兩川以銅鐵錢兼行銅錢一當鐵錢十民頗便之咸平三年西京左藏庫使楊允恭言川陜民田之稅昔輸銅錢一今亦鐵錢一吏卒俸給舊銅錢一今鐵錢五若交易則鐵錢十為銅錢一且饒信之銅積數十萬若舟運自荆達蜀素多銅俾䕫益遂各置監鼓鑄嵗用均給不及十年悉用銅錢議雖未果行然自是吏卒俸給改用十小鐵錢之一矣景德二年張公詠上言受詔與轉運使黃觀同裁度嘉卭二州所鑄景德元寶大錢十參用甚便從之三年行用新鑄銅錢初益卭嘉眉等州嵗鑄鐵錢五十餘萬貫同兩稅課利收市物帛上供因李順亂罷鑄僅十年又以兵大耗壞至是鑄大錢民以為利大中祥符七年諫議凌公束等請鑄大鐵錢每貫重一十二斤十兩以一當十先是蜀中小鐵錢每十當一貿易非便其後别鑄大錢貫重二十五斤每一當小錢十三司言民有盜鎔大錢一千範為器用鬻錢二千故盜鎔者衆䇿言錢輕則行者易齎鐵少則鎔者鮮利故請改鑄嘉祐中趙公抃任轉運使以蜀錢甚多嘉卭州嵗科衙前以鐵科民以炭頗為煩擾奏乞罷鑄十年以寬民力四年祫享赦書許之熙寧六年五月轉運司嘉卭州罷鑄錢久民間闕錢乞减半鑄與錢引相權從之建炎二年轉運司以鑄錢數多難於流轉造引數少其價益髙奏乞依嘉祐四年赦文權罷鑄錢十年椿留鼓鑄本錢稱提引價不待報遂行自是引日益多錢日益銷議者以為恐非經久相權之制紹興三十一年臣僚奏請復置嘉卭二監鼓鑄夾錫錢詔下制置司總領所商榷乃具奏以謂嘉州所用錢係撥於眉州鐵場其數不多難以復置錢監止就卭州置監鼓鑄經久可行利州紹興監仍歲鑄大小錢共九萬貫尋報可遂於卭州歲鑄折二錢一萬貫小錢一萬貫總領所給其費淳熙六年總領李昌圖奏利卭州兩監所鑄錢官費本錢倍於息且鼓鑄有限而民間鉟銷無窮若不更革錢重引輕必壞引法乞罷鑄兩監折一小錢比折二錢稍增銖兩改鑄折三大錢及將崇寧大觀折二大錢並作三行使詔從其請逮今行之以為利焉楮幣譜前人蜀民以錢重難于轉輸始製楮為劵表裏印記隱密題號朱墨間錯私自參驗書緡錢之數以便貿易謂之交子凡遇出納一貫取三十錢為息其後富民十六户主之尋亦資衰不能相償爭訟數起大中祥符末薛公田為轉運使請官置交子務以權其出入下報冦公瑊守蜀乞廢交子不用㑹瑊去而田代之詔田與轉運使張若谷度其利害田若谷議以廢交子為非便請為置務禁民私造條奏甚悉又詔梓州路提刑王繼明與田若谷共議田等議如初詔從之始置益州交子務時天聖元年十一月也自二年二月為始至三年二月終凡為交子一百二十五萬六千三百四十貫其後每界視此數為凖交子舊以二月二十日起界清獻公為記時以遷至七月也熙寧五年續添造一界其數如前作兩行使從監官戴䝉之請也每道初為錢一貫至十貫寶元二年以十分為率其八分每道為錢十貫其二分每道五貫若一貫至四貫六貫至九貫更不書放熙寧元年始以六分書造一貫四分書造五百重輕相權易於流轉於是蒙又請置抄紙院以革僞造之弊引有兩界與官自抄紙皆自䝉始大觀元年五月改交子務為錢引務為鑄印凡六曰勑字曰大科例曰年限曰背印皆以墨曰青面以藍曰紅團以朱六印皆飭以花紋紅團背印則以故事監官一員元豐元年增一員掌典十人貼書六十九人印匠八十一人雕匠六人鑄匠二人雜役一十二人廪給各有差所用之紙初自置場以交子務官兼領後慮其有弊以他官董其事隆興元年始特置官一員蒞之移寓城西净衆寺紹熙五年始創抄紙場於寺之旁迄官治其中抄匠六十一人雜役三十人凡引一界滿納舊易新率千人取錢六十四曰貫頭錢天聖初止三十建炎初增八紹興十一年乃增今數其納換不盡者曰水火不到錢今一界所收併貫頭錢凡一百九十萬道總領所推取以供軍儲所印之數自元豐元年兼放兩界之後紹聖元年增一十五萬元符元年增四十八萬道祖額每界以一百八十八萬六千三百四十為額以交子入陜西轉用故也崇寧間用兵陜西開拓境土通行引法以助兵費元年增二百萬二年增一千二百四十三萬五千四年增五百七萬五千大觀元年增五百五十四萬五千六百六十六比至換界以新引一當舊引四引法大壞尋有詔自四十二界至四十三界更不許換四十四界止依天聖舊額仍不得越銅錢界建炎二年罷鑄錢復用元符所增之額三年增一百萬紹興元年增六十萬二年增一百四十萬三年增五百萬四年增五百七十萬五年增二百萬六年增六百萬皆以給利䕫兩路軍費七年有㫖不許泛印八年以邉報急闕增三百萬充糴買九年以移屯陜西合給糴本及陜西六路新復州軍衣賜增二百萬增數既多僉書樞密院事樓照奉使陜西奏禁泛科始定著刑章十年以贍軍急闕增五百萬十三年以都運司之請增四百萬二十九年以增招軍兵椿辦犒賞總領所請增一百七十萬詔從之自後纍增五百餘萬凡兩界共為錢引四千六百四十七萬二千六百八十紹興二年有㫖將八十三界錢引展一界行使增印一百九十萬以償總領所兊引貫頭水火不到錢之數慶元三年總領所奏以成都潼川利州三路旱傷制置司减免民間租賦乞增印錢引以備對補有餘以充賑濟詔增一百萬逮今合四千九百三十七萬一千六百八十道矣而又僞造竊行足以亂真引日益增錢日益銷子母不能相權然有稱提之法以錢稱提者引價低則官出藏繦增價與民市引是也以法稱提者凡民以錢輸官當折引則以一貫二百八十為限是也蓋有錢則有引天聖所印之數視錢以為凖者也自軍興增科鑿空為錢天下大計仰給於紙猶幸守和議引之出納有常半藏諸司之庫半流轉於民維持不壞識者有憂其在軍旅之際乎貼勑青紅年一五書放額數界年頭字面團限貫百五花花故花故故行紋紋事紋事事分號科印印印印背背例印印第辛巳至金合龍三吳隱王祥書放錢引二千七紹興富雞歡龜耳之酌孝感三百七十三萬十十一國捧萬負卣飲貪躍六千二百四十界年財勑國圖龍泉賦飛雀貫文并藤書文詩第癸未利慶攀寶上天皮書放錢引二千七隆足雲枝鼎苑馬幣二百七十二萬十興以捧百圖太來薦六千三百四十一元生日男物平西圭貫文界年民花極璧第乙强金唇漢卜書放錢引一千七酉本花樓朽堯循吏式上二百七十二萬十乾而捧去粟階增書六千三百四十二道節滄紅蓂秩獻貫文界元用海腐莢賜家年金財第丁亥舊雙方孟六子青書放錢引二千七乾法龍圓嘗八罕錢二百七十二萬十道行捧錦還毬辭學六千三百四十三三為勑地珠路寶士貫文界年便第己丑事團鳳王逸諸葛千周兩書放錢引二千七乾序捧超孔明葉宣王階三百七十三萬十道貨勑衆羽扇石修車舞六千四十貫文四五之左臯果指揮榴馬備干界年源右荔䕫枝三軍器械羽第辛善川孟書唐太七卯治九心龜子壘水火宗時書放錢引一千十乾立重紋見壘金木外戶二百七十三萬五道經捧玉梁如土穀不閉六千三百四十界七常勑連惠意惟米斗貫文年環王修三錢第癸巳化雙龍祖逖百舜作伯夷書放錢引二千七乾國龍牙中流合五絃太公三百七十三萬十道日捧黃擊楫太之琴二老六千三百四十六九舒勑草誓清平歌歸文貫文界年長花中原花南風王第乙未維盤魚同連武傅書放錢引二千七淳幣龍跳律環候說二百九十三萬十熙通捧龍度萬木牛版六千三百四十七二農勑門量嵗流馬築貫文界年商衡藤運第丁道纏漢勝文百七酉御龍枝高帝金王雞姓書放錢引一千十淳之鳳太捧玉鎖鳴至遮道三百七十三萬八熙而捧平巵為甲寢門願借六千三百四十界四王勑花太上紋問安寇貫文年皇壽否恂第己亥國金金堯纏周李書放錢引二千七淳以吾枝舜枝宣王德裕二百七十三萬十熙義捧玉垂衣金修車建六千三百四十九六為勑葉治天蓮馬備籌邉貫文界年利花下子器械樓全蜀藝文志卷五十七
