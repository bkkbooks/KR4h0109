body:
  text: 全蜀藝文志巻二十六明周復俊編詔策赦文勅漢先主封張飛策章武元年遷飛車騎将軍領司𨽻校尉封西鄊侯策曰朕承天序嗣奉洪業除殘靖亂未燭厥理今冦虜作害民被荼毒思漢之士延頸鶴望朕用怛然坐不安席食不甘味整軍誥誓将行天罰以君忠毅侔蹤召虎名宣遐邇故特顯命髙墉進爵兼司于京其誕将天威柔服以徳伐叛以刑稱朕意焉詩不云乎匪疚匪棘王國來極肇敏戎功用錫爾祉可不勉歟封馬超策章武元年遷驃騎将軍領梁州牧進封斄鄊侯策曰朕以不徳獲繼至尊奉承宗廟曹操父子世載其罪朕用惨怛疢如疾首海内怨憤歸正反本暨于氐羌率服獯鬻慕義以君信著北土威武並昭是以委任授君抗颺虓虎兼董萬里求民之瘼其明宣朝化懐保逺邇肅慎賞罰以篤漢祜以對於天下許靖策建安十九年先主克蜀以靖為左将軍長史先主為漢中王靖為太傅及即尊號策靖曰朕獲奉洪業君臨萬國夙宵惶惶懼不能緩百姓不親五品不遜汝作司徒其敬敷五教五教在寛君其朂哉秉徳無怠稱朕意焉後主告諭伐魏詔建興五年春丞相亮出屯漢中營沔北陽平石馬後主下詔曰朕聞天地之道福仁而禍淫善積者昌惡積者䘮古今常數也是以湯武修徳而王桀紂極暴而亡曩者漢祚中微網漏凶慝董卓造難震蕩京畿曹操階禍竊執天衡殘剝海内懐無君之心子丕孤豎敢尋亂階盗據神器更姓改物世濟其凶當此之時皇極幽昧天下無主則我帝命隕越于下昭烈皇帝體明睿之徳光演文武應乾坤之運出身平難經營四方人鬼同謀百姓與能兆民欣戴奉順符䜟建位易號丕承天序補弊興衰存復祖業誕膺皇綱不墜于地萬國未靖早世遐殂朕以幼冲繼統鴻基未習保傅之訓而嬰祖宗之重六合壅否社稷不建永惟所以念在匡救光載前緒未有攸濟朕甚懼焉是以夙興夜寐不敢自逸每崇菲薄以益國用勸分稼穡以阜民財授才任能以参其聴斷思降意以養将士欲奮劍長驅指討凶逆朱旗未舉而丕復隕䘮斯所謂不然我薪而自焚也殘類餘醜又支天禍恣睢河洛阻兵未弭諸葛丞相𢎞毅忠壮忘身憂國先帝託以天下以朂朕躬今授之以旄鉞之重付之以専命之權統領歩騎二十萬衆董督元戎龔行天罰除患寜亂克復舊都在此行也昔項籍總一彊衆跨州兼土所務者大然卒敗垓下死扵東城宗族如焚為笑千載皆不以義陵上虐下故也今賊效尤天人所怨奉時宜速庶憑炎精祖宗威靈相助之福所向未克吴王孫權同恤災患潜軍合謀掎角其後凉州諸國王各遣月支康居胡侯支富康植等二十餘人詣受節度大軍北出便欲率将兵馬奮戈先驅天命既集人事又至師貞勢并必無敵矣夫王者之兵有征無戰尊而且義莫敢抗也故鳴條之役軍不血刃牧野之師商人倒戈今旌麾首路其所經至亦不欲窮兵極武有能棄邪從正簞食壺漿以迎王師者國有常典封寵大小各有品限及魏之宗族支葉中外有䏻規利害審逆順之數来詣降者皆原除之昔輔果絶親扵智氏而䝉全宗之福微子去殷項伯歸漢皆受茅土之慶此前世之明驗也若其迷沈不反将助亂人不式王命戮及妻孥罔有攸赦廣宣恩威貸其元帥弔其殘民他如詔書律令丞相其露布天下使稱朕意焉後主復諸葛丞相策建興六年亮使馬謖督諸軍與魏張郃戰于街亭謖違亮節度舉動失宜大為郃所破亮戮謖以謝衆上疏曰臣以弱才叨竊非據親秉旄鉞以厲三軍不能訓章明法臨事而懼至有街亭違命之闕箕谷不戒之失咎皆在臣授任無方臣明不知人恤事多闇春秋責帥臣職是當請自貶三等以督厥咎于是以亮為右將軍行丞相事所搃統如前冬亮復出散闗圍陳倉破魏軍斬王雙七年遣陳式攻克武都隂平魏郭淮率衆欲擊式亮自出至建威淮退還遂平二郡詔策亮曰街亭之役咎由馬謖而君引愆深自貶抑重違君意聽順所守前年耀師馘斬王雙今嵗爰征郭淮遁走降集氐羌興復二郡威震凶暴功勛顯然方今天下騷擾元惡未梟君受大任幹國之重而乆自挹損非所以光揚洪烈矣今復右丞相君其勿辭唐僖宗賜髙駢築羅城詔勅髙駢省所奏修築羅城畢功并進畫圗事具悉卿天平急召井絡専征臨邛夢叶於四刀按部恩覃扵兩劍上言大鎮空有子城殊百雉之環逥是千年之曠闕便依陳奏未隔寒暄每日一十萬夫分築四十三里皆施廣厦又砌長磚城角曲収逸迭攻而勢勝甕門直截容拒守之兵多利及後人智髙前古繼孔明扵掌内坐張儀扵腹中是以輕笑木牛感通金馬增上頭之埤堄架當面之䦨干橋象七星不移舊岸錦逢三月可濯新壕役徒九百六十萬工計錢一百五十萬貫卓哉懋績固我雄藩罄府庫之資儲捨隂陽之拘忌但為國計總忘身謀並無黎庶之怨嗟不請朝廷之接借忽聞進奏言巳畢功見圗寫之甚明舉神化而急速方念處身廉潔報國忠貞始終能協于一心清美乆聞于萬口欲人檢驗具見公忠朕巳知臣何勞請使便欲寵渥恐卿自往雅州既發師徒方勞館驛且留賞典専俟逥軍蜀川既及扵春風蠻冦盡離扵河岸便酬勲績各進官階未間勉効七擒佇聞三㨗故兹詔示想宜知悉冬寒卿比平安好遣書指不多及王衍試制科策文乾徳四年炎漢致治始策賢良巨唐思皇爰求茂異講邦國治亂之體陳天人精祲之原豈角虚文盖先碩徳朕念守器之重識為君之難思得賢才以凝庶績因舉故事以紹前修子大夫抱道逢時投策應詔必有長策以副虚懐何以使三農樂生五兵不試刑獄無枉賦歛無加以何策可以定中原以何道可以卜長世朕當親覽汝無面從白衣蒲禹卿對策其略曰今朝廷所行者皆一朝一夕之事公卿所陳者非乃子乃孫之謀暫偷目前之安不為身後之慮衣朱紫者皆盗跖之輩在郡縣者皆狼虎之人姦佞滿朝貪淫如市以斯求治是謂倒行執政皆切齒欲誅之衍以其言有益擢為右補闕孟昶勸農桑詔明徳元年十二月刺守縣令其務出入阡陌勞来三農望杏敦耕瞻蒲勸穡春鶊始囀便具籠筐蟋蟀載吟即鳴機杼宋太祖納降蜀主敇敇蜀主省上表率文武見任官望闕瀝懇歸命事具悉朕自皇天睠命率土樂推将期徳服萬方不恃威加四海乃睠益部僻處一隅茍黎庶之獲安非經營之在意一昨災纏蜀地釁自并門既興王者之師遂授将軍之鉞事非獲巳須至用兵我且直詞彼衆自敗下劍門而賈勇指井絡而長驅中宵喟然兆庶待罪徑馳驛嚴誡前鋒廣宣來者之懐遍諭弔民之意果䏻率官属而効順拜表疏以祈恩託我慈親述乃寝廟封府庫而待命保生靈而輸誠朕方示信懐柔不逼人險保無他慮當體優隆國有舊章己從前請所宜悉也春寒想比清休書㫖不多及賜程琳収獲劫盗逃兵奨諭詔敇程琳省益州路轉運司奏云云卿居風憲之司捴翰垣之政因逋逃之為患縦盗掠而累年宻遣追胥盡擒隠伏既詰誅扵醜類致肅静扵鄊閭翳乃忠勤副予寄任攸司上奏宣力可嘉故兹奨諭想宜知悉賜王鬷父老借留奨諭詔敇王鬷省益州路轉運司奏云云眷兹右蜀素號名藩委任非輕事權尤劇卿門望兼著中外荐更爰自近班出分重寄奉揚寛大之詔茂宣愷悌之風洽威恵扵吏民載歌謡于道路輿情胥恱列奏爰來減予宵旰之憂稱乃循良之選其在嘉嘆不忘于懐故兹奨諭想宜知悉夏熱卿比平安好遣書指不多及國家眷井鬼之分梁益之區拒上國千里之遥為西蜀一都之㑹控制蠻獠撫遏邊陲利害所生安危是繫非道積廊廟名髙搢紳萬里隱乎金城五兵森乎武庫長謀足以經逺厚徳可以鎮浮文有緯俗之方武有安民之略者不得預焉今府尹樞宻直學士太原王公負經濟之才挺誠明之性運沈機而察物韞精識以照微髙表竦乎百尋雅量汪其萬頃按刑梓部黎庶扵是不寃掌憲栢臺佞倖因之知懼自兹紫宸選賢若雲之從龍丹陛告猷如石之投水暨参延閣之賢屢膺出境之命皇上嘉其亮節恵彼逺方亟陞宥宻之嚴施委藩方之寄公飲氷祇命叱馭遵途過劍山而物得陽春渉錦水而嵗逢甘雨暨黄堂布政彤禧問俗始乃明教化示詔條逖揚愷悌之風誕變輕浮之俗次則恤民隠革吏姦訟清而叢棘常空令正而寒霜自凛終則誡浮情戢兵帥力田而曠土皆耕以律而私門不犯然又招延秀異旌勸良平殄奸宄之徒苖之去莠籍孤惸之户網之舉綱巳而董之以威示之以信懐之以徳綏之以仁導之以詩書訓之以禮讓迄至羣心帖泰庶物休和多稼豐登連年富夀兩川安堵固無夜户之虞千里嚮風盡有春臺之樂一旦乃有十邑之叟四郭之彦惜鳳書之将至恐熊軾之斯邁乃與瀝誠于外計入功于中扆列牘以上當宁稱嘆迺降璽書以勞之示聖主得賢而逺方受賜也宸章昭晰睿㫖淵沖煥乎日月之麗天皦如金石之薦廟宜揚兊澤誡告神方仰觀惟睿之辭實勸事君之節既而闔府衙挍耆耋緇黄等諏曰聖主示十行之札形一字之褒雖聞紀勒郡齋庶傳于不朽豈若標題仙觀用勸扵後来而又罔棄顓䝉懇求紀述然念叙賢人之事業雖學之扵師察聖后之刑章幸居之扵職復乃得實状寜假飾辭時景祐三年冬十月二十日益州路提刑李定記賜程戡修城池奨諭詔敇程戡省益州路轉運司髙良夫奏云云蜀自漢唐以来國之西屏控臨撫理専用財用器望者處之卿往甞屬任復當眷付下教如昨布政猶新矧乃恤戎畧以安邊憺威名而寜逺繕完壁壘經度溝池謀不踰時士皆罄力訖能集事人匪告勞刺部提封剡章指状備虞暇豫允頼毗維申念勤庸弗忘嘉寵故兹奨諭想宜知悉賜張方平父老借留奨諭詔勅方平省益州轉運使髙良夫奏云云坤維一隅二蜀為大慎擇良守時謂才難卿迺者輟宸朝祕寵之班委寰輔宻陪之鎮特更近屏専及逺邦此朕意欲撫御彈壓以寛西願果能厚政化以懐和孚教條而恱穆甄善疾非而人愛其舉發姦摘伏而吏畏其神墨攘告登里封去盗内無繫獄外無繫訟恩育惸獨恵窮康乏而乃鄊居獻状刺部奏陳或以奏計之期預希一借或以解歸之次願畢三周惟漢有文翁㢘范飭厲之規惟唐有徳裕元衡約束之略詳觀休績何愧前修勉樹令圗以光来譽省循嘉嘆彌切眷懐故兹奨諭想宜知悉賜趙抃父老借留奨諭詔勅趙抃省成都府路轉運提刑司奏云云蜀逺在西南最要部也朕常患吏不能究宣徳澤以被于逺民故其擇守非慈良簡重者不以命之卿在蜀甫踰年而使者以其治迹尤異上于朝廷夫吏所以治民也能盡其治民頼之豈不汝嘉乎故兹奨諭想宜知悉秋熱卿比平安好遣書指不多及龍圗閣直學士天水公治蜀甫閱嵗府之黎老士民舉千百數伏使者車前曰蜀之壤陿衆夥俛首輸賦風尚纎靡怯不鷙立自公問俗布政濶畧法禁緒正綱目坐格醇茂仁義道徳衍為教化徭賦均節俗安生業人人自愛以重犯法風雨時若粒米狼戾民惕然懼朝廷之召遷而父母去我矣願上書借公留語聞上上以手迹細札奨朂褒嘉之都人頓首伏讀欣喜蹈舞恭惟天詔有慈良簡重治迹尤異之稱公恕物以仁約己以禮表俗以信鎮浮以徳故上知公之深如此漢膠東相成潁川守霸皆有璽書勉厲異等効著在篇簡今公之拜休寵者當有以掲金石刻永傳無窮而為西南藩維之光華也書不云乎敢對揚天子之休命詩云虎拜稽首天子萬年盖報上歸美所宜侈大也治平二年九月一日秘書丞閻灝謹序賜王剛中訓諭詔朕軫念坤維逺在一方徳意雖深利澤未究故臨遣詞臣往分閫寄卿其深體至懐務先養恵民間有疾苦官吏有貪殘悉以上聞夫涖政在寛寛宜有制足用在儉儉宜中禮撫馭将士先之以和肅寜邊陲鎮之以静則朕無西顧之憂矣佇聞報政嗣有寵嘉紹興一十八年秋九月蜀以闕帥聞皇帝陛下諭㫖遣從臣出鎮臣是時方代匱詞掖庚辰以臣制置四川兼治成都臣聞命震恐固辭不獲越十月庚寅引對便殿上宣諭四川利病至悉臣退而謹書之甲午正謝䝉恩賜臣御寳帶象笏併賜行貲庚子朝辭復䝉宣賜御筆訓諭詔書臣伏觀雲漢之章奎筆之書心目悸眩大懼無以承盛徳稱明詔者竊甞謂自古人君如漢光武命帥以詔敇從事徒見扵征討艱難之日而唐太宗賜羣臣御敇乂皆燕閒無益之辭豈若皇帝陛下軫念坤維去朝廷數千里将使利澤周浃扵六十一城之廣肆親灑宸翰訓敇微臣察民間之疾苦糾官吏之貪殘涖政尚寛猛之中足用制禮儉之節與夫撫輯将士肅静邊陲皆閫寄之大方吏治之至要而臣起自諸生驟膺委寄内揆庸淺實無他長惟當夙夜奉行詔㫖庶㡬有補一方不負聖神所以拔擢臨遣之意臣載惟堯言布扵天下而舜詔岳牧辭列典謨臣既到官是用敢刻諸堅珉昭示徳意垂範無窮臣王剛中拜手稽首謹記賜晁公武奨諭詔敇公武朕聞蜀漢沃野有蔬食果實之饒民食稻魚亡凶年憂而比歳以来穀糴常貴民有飢色故易以為盗豈民不務本吏苛刻之所致耶朕聞憫焉卿服在從班習知徳意乃裁公帑之餘行平糴之政以復天聖守臣之舊蹟其用心亦勤矣夫廣畜積以實倉廪備水旱此郡國之所先務也卿䏻知此朕復何憂載覽奏封良深嘉嘆故兹奨諭想宜知悉冬寒卿比平安好遣書指不多及賜范成大奨諭卿逺鎮坤維兼總戎律究心夙夜朕甚嘉之所進内教將兵外修堡寨團結土丁三説皆善益勉旃務在必行早見成效以副朕倚毗之意臣不肖日者待罪桂林䝉恩徙鎮蜀道次於荆州詔問西南邊事臣愚無識知嘗試妄論大要練兵丁繕保障儻事力弗給可若何行及廣漢則昧死上其説制下尚書其給劍南西川度牒五百為緡錢三十五萬八千有竒以贍工費而賜臣八月二十五日璽書如前臣謹拜手稽首言曰昔堯舜之于羣臣聞其言善則俞之必有訓敇之辭繼之曰懋哉曰往欽哉二典之書是已今陛下過聴擇于芻蕘又勉之以底績此堯舜之法二典之所以書也臣何足以得此雖貪天子之命以為己榮而一介齷齪狗馬蚤衰罷軟不自勝恐終無尺寸補益大懼隕越于下無以仰副聖天子之至意兹榮也秪所以為懼哉敬奉賜書被之琬琰以旦夕瞻仰于前其敢侈臣之榮識臣之懼而巳宋贈蘇軾為太師勅朕承絶學于百聖之後探微言扵六籍之中将興起于斯文爰緬懐于故老雖儀刑之莫覩尚簡策之可求掲為儒者之宗用錫帝師之寵故禮部尚書端明殿學士贈資政殿學士諡文忠蘇軾養其氣以剛大尊所聞而髙明博觀載籍之傳㡬海涵而地負逺追正始之作殆玉振而金聲知言自况扵孟軻論事肯卑于陸贄方嘉祐全盛甞膺特起之招至熈寜紛更迺陳長治之策歎異人之間出驚讒口之中傷放浪海外而如在朝廷斟酌古今而若斡造化不可奪者嶤然之節莫之致者自然之名經綸不究于生前議論常公扵身後人傳元祐之學家有眉山之書朕三復遺編乆欽髙躅王佐之才可大用恨不同時君子之道闇而彰是以論世讜九原之可作庶千載以聞風惟而英爽之靈服我衮衣之命可特贈太師餘如故明諭御史大夫丁玉勅洪武前者大将軍入西羌萬山将松州巳行攻取修城守禦了當甚是威鎮西夷今議得松州地方山多田少所種不足所用若令四川人民供給守禦廢有用之民守無用之地符到之日可設法抽出軍来四川撫養一㑹或扵保寜立一衛或揀何處𦂳要所在立一衛鎮静四川又舊嵗命爾西征以今觀之非人事必然甚有天意乃者四川妖人盤踞結黨潛伏造孽己有年矣若非命爾率丁氏舊日土兵出境其四川之禍又非淺淺若丁氏土兵未出境土聞妖作亂乘時蜂起以四川各衛守都司官機謀調遣甚有不足安能止亂遏邪今禍亂己平國之福也卿跋渉崇山究心日夜甚為艱勤然卿未至四川指揮音亮等師軍不律近聞李指揮律如軍法其栁音尚未典刑特差人詣四川斬二指揮必不可恕亦當律以軍法夫國之用将也以備捍大患而禦奸侮如斯不律者安能食祿受官刑不輕恕扵法無疑如敇施行諭参政張紞右参政韓鑰洪武古之尚志之士必立身行道而道行名成而後己所以然者何貴身榮家以顯父母卿效賢人之道方始當日省月覺以觀下愚造殁身之計今命卿西南方面重任君子道興之所然且雲南諸夷雜處之地若欲治安非出羣之才不可卿必忠可格天誠可㑹人生靈是幸故兹勅諭全蜀藝文志巻二十六
