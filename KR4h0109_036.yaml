body:
  text: 全蜀藝文志卷三十六明周復俊編記丁進士題名記宋田况蜀自西漢教化流而文雅盛相如追踪屈宋揚雄參駕孟荀其辭其道皆為天下之所宗式故學者相繼為與齊魯同俗然世有治亂化有隆薄士之出處貴賤實繫于此唐季五代政紀昏微斯文與人幾至墜絶國家之起海內統一堯文舜明寖昌以大其設科考士擢取之多則前王之所未有益州自太平興國以來登進士第者接踵而出天聖景祐中其數益倍至慶厯六年一榜得十八人皇祐元年得二十四人他州來學而登第者復在數外其盛也如此豈非世化治隆人隨而興乎主學者議建榮名堂于宣聖殿之東北盡題皇朝及第進士名刻于石柱以示來者豫喜聞而遂其請又為之序時皇祐二年五月一日也經史閣記吕陶蜀學之盛冠天下而垂無窮者其具有三一曰文翁之石室二曰髙公之禮殿三曰石壁之九經蓋自周道衰微鄉校廢壞歷秦之暴至漢景武間典章風化稍稍復講時文翁為蜀郡守起學于市減少府用度以遺博士遣諸生受業京師招子弟為除繇且以補吏或與之行縣民用向化幾比齊魯自爾郡國皆立學實文翁倡之所謂石室者存焉至東漢之李四海板蕩兵火相仍延及校舍絃誦寂絶儒俗不正興平中郡將陳留髙瞬修舊補廢作為廟堂模制閎偉名號一新所謂禮殿者見焉至五代之亂疆宇割裂孟氏茍有劒南百度草創猶能取易詩書春秋周禮禮記刻于石以資學者吾朝皇祐中樞密直學士京兆田公加意文治附以儀禮公羊穀梁傳所謂九經者備焉始漢景末距今凡十六代千二百四十餘年崩離變革理勢不常而三事之盛莫易其故然則冠天下而垂無窮非夸說也考實以議也惟經史閣之成基勢崇大棟宇雄奧下視衆屋匪隘即陋聚書萬卷寶藏其間斯亦近類三事傳千百年而不可廢者乎龍圖閣直學士濮陽吳公因其成也㑹僚佐與蜀之士大夫及其講師徒弟凡若干人飲酒以落之德風洋洋頌聲愈愈布宣于一方有若闕里弟子集雩壇之下歌咏先王道德而歸諸聖門又若魯侯至泮水之上國人望其車旗和鸞而樂見之視其顔色笑語而有感恩向化之意嗚呼其盛矣哉公純誠好善治有本末所至以勸學為先見一士可以語道誘進之常若不及乃詩人所謂能長育人才則天下喜樂之也陶于是推明公意而言焉夫治性修身以及國家天下大略本之仁義其文莫詳于經監見古之人注措發施正邪粹駁與其生民幸不幸其迹莫著于史世之學者不矜誦數而率履其言不競多聞而慎擇其是則為有得亦庶幾善學歟初閣之營建皆幕府太常博士王君霽之謀君修潔有文嘗典吳興郡學潔其規範來遺諸生匪獨諸閣也御書大成殿額記席益紹興六年十一月左迪功郎新成都府學教授范仲殳言臣所任成都府府學大成殿建于東漢初平間天下棟宇之古無過此者而未有題榜願陛下萬幾之間親御翰墨揭之殿額以示人文化成流道德之富覃及逺方之意上可其請即命仲殳乘傳以賜次年九月辛巳仲殳至自輦轂下臣益備位牧守率籲僚佐出迎于郊拜受于先聖祠下圜冠方領之士濟濟翔翔閭巷阡陌黧老黃幼聳觀歡呼咸用欣戴天子闡融文教遐方作人之盛德罔不奮勵感激興于禮義嗚呼懿哉晉丞相王導有言方今戎虜煽熾國耻未雪忠臣義夫所共扼腕撫心宜正人倫設庠序使俎豆之事幽而更彰以著淳風流德化天子不以蜀之遐濶僻陋越在裔壤肆頒宸筆光裕黌宇烟霏露結之形鸞翔鳳翥之勢煥乎如日月麗天雲漢昭回可謂甚盛舉矣昔苖民逆命虞舜舞干羽于兩階七旬而來格宣王興衰撥亂命召公以平淮夷其詩曰矢其文德洽此四國臣雖駑劣敢不推廣上意聳動蜀之士大夫說禮樂敦詩書和衆安民慎固封守以仰禆中興之業追蹤前古無忝聖神樂育之惠臣益頓首幸甚紹興七年十月十日記府學石經堂圖籍記前人蜀儒文章冠天下其學校之盛漢稱石室禮殿近世則石九經今皆存焉自孝景帝時太守文翁始作石室至東漢興平元年太守髙瞬作周公禮殿于石室東圖畫邃古以來君臣聖賢然亦有魏晉名流以故世傳西晉太康中刺史張收始畫非也殿有畫自髙瞬始殆收嘗增益之今壁間又有東晉人士蓋收之後繼有畫者不知誰氏也齊永明十年刺史劉悛益以禮家器服制度僞蜀廣政七年其相毋昭裔按雍都舊本九經命平原令張德釗書而刻諸石本朝因禮殿以祀孔子為宫其旁置學官弟子講習傳授故蜀帥尚書右丞胡公宗愈作堂于殿之東南隅以貯石經益之先人鎮蜀奏秩文翁髙瞬于祀典又請樂工于朝教士以雅聲而後頖宫之禮樂文物粹然近古自國家三雍之外無與比者鄉者中州陸沉惟蜀賴天子神聖威武保得生聚邑屋而吏視軍賦為急春秋釋奠守者不親行敕下吏攝事以故風雨鳥鼠之虞不至黌舍蓋自東漢興平元年嵗在甲戌始作禮殿逮我宋紹興六年丙辰歷年九百四十有三其間僞蜀刻石經之嵗是為晉開運甲辰至是一百九十三年矣益實受命盡護全蜀兼行太守事兹嵗八月諏日在丁郡文學藏儀吏以不圯板築之功雖垂軒皇之衣裳舞有虞之干羽自當功成于理外如其不然則伏諶行鄉射于東京征伐之間王導興學校于江左草創之始是真迂闊者矣聞此而猶未喻吾將賦子襟之三章悲原氏之將落也尚友君子者知此心哉紹興七年記石經始末記范成大石經已載前記朝子止作考異而為之序考異之作大抵以監本參校互有得失其間顛倒缺訛所當辨正然古今字畫雖小不同而實通用耳考異并序凡二十一碑具在石經堂中子止之序曰鴻都石經自遷徙鄴雍遂茫昧于人間至唐太和中復刋十二經立石國學而唐長興中詔國子博士田敏與其僚校諸經鏤之板故今世大學之傳獨此二本爾按趙清獻公成都記僞蜀相毋昭裔捐俸金取九經琢石于學宫而或又云毋立裔依太和舊本令張德釗書國朝皇祐中田元均補刻公羊髙穀梁赤二傳然後十二經始全至宣和間席升獻又刻孟軻書參焉今考之僞相實毋昭裔也孝經論語爾雅廣政甲辰嵗張德釗書周易辛亥嵗陽鈞孫逢吉書尚書周德正書周禮孫朋吉書毛詩禮記儀禮張紹文書左氏傳不志何人書而詳字闕其畫亦必為蜀人所書然則蜀之立石蓋十經其書者不獨德釗而能盡用太和本固已可嘉凡歷八年其石千數昭裔獨辨之尤偉然也公武異時守三榮嘗對國子監所模長興板本讀之其差誤蓋多矣昔議者謂太和石本校寫非精時人弗之許而世以長興板本為便國初遂頒布天下收向日民間寫夲不用然有訛舛無由參校判知其謬猶以為官既刋定難于獨改由是而觀石經固脫錯而監本亦難盡從公武至少城寒暑一再易節暇日因命學官讎校之右本周易說卦乾健也以下有韓康易注略例有邢璹注禮記月令從唐李林甫改定者監本皆不取外周易經文不同者五科尚書十科毛詩四十七科周禮四十二科儀禮一十一科禮記三十二科春秋左氏傳四十六科公羊傳二十一科穀梁傳一十三科孝經四科論語八科爾雅五科孟子二十七科其傳注不同者尤多不可勝紀獨計今文猶三百二科迹其文理雖石本多誤然如尚書禹貢篇夢土作乂毛詩日月篇以至困窮而作是詩也左氏傳昭公十七年六物之占在宋衛陳鄭乎論語述而篇舉一隅而示之衛靈公篇敬其事而後食其祿之類未知孰是先儒有改尚書無頗為無陂改春秋郭公為郭亡者世皆譏之此不敢决之以臆姑兩存之亦鐫諸樂石附于經後不誣方將必有能考而正之者焉子止又刻古文尚書于堂而為之序曰自秦更前代法制以來凡曰古者後世寥乎無聞書契之作固始于伏羲然變狀百出而不彼之若者亦已多矣尚書一經猶有古文在豈非得于壁間以聖人舊藏而天地亦有所護不忍使之絶滅中間雖遭漢巫蠱唐天寶之害終不能晦蝕今猶行于人間者豈無謂耶况孔氏謂尚書以其上古之書也當時科斗既不復見其為𨽻古定此實一耳雖然聖人逺矣而文字間可以概想則古書之傳不為浪設豫抵少城作石經考異之餘因得此古文全編于學官乃延士張真倣吕氏所鏤本冊刻諸石是不徒文字足以貽世若二典曰若粵之類學者可不知與嗚呼信而好古學于古訓乃有獲蓋前牒所令方將配孝經周易經文之古者同附于石經之列以故弗克第述一二以示後之好竒字者識又安知世無揚子雲時乾道庚寅仲夏望日序修成都府府學記馮時行紹興二十八年冬天子命中書舍人鄱陽王公出鎮全蜀明年四月至成都下車謁孔子廟顧見學宫圯毁不治喟然而嘆且言皇上撥亂反正易干戈為俎豆開立政化純用儒術常以萬幾餘間手抄六經論語孝經孟子戰國樂毅晉羊祜列傳及圖孔子與門弟子七十二人像躬為叙贊頒之郡國藏之學宫以示惇勸以幸斯文德至渥也成都西南大府當是時學校薦祭無位肄習無所其何以仰承聖明休德亟命度材計工涓吉肇事力不民役費不民取易腐敗而新之與新作而補其闕凡四百楹皆敞豁靚深精堅嚴賁公來視成諸生東自荆䕫西極梁洋分集廡下歡喜鼓舞咸願記載傳之將來公以命其屬部沈黎守吏縉雲馮某俾叙其興作之由且繫以辭公名剛中字時亨其治蜀純用儒術其有得于經術者豈弟樂易之政無愧于前人詞曰梗楠于山魚龍于囦物生有元彬彬學宫蓄儲其中登為卿公聖神宅尊滌除妖氛煥以堯文夏校周庠達于四方聲教洋洋皇曰岷蜀詩書之俗誰歟其屬振其殫竭孕其俊傑繄豫近列西南巨屏綿絡參井惟公是命皇曰往哉惟撫惟懷實惟汝諧漢有文翁千載吏宗汝惟其同公拜于庭皇亟其行虎熊旗旌公來祁祁致其肅祗先聖先師顧瞻頽傾心經目營亟命鼎新刋山浮川巨桴雲連徒旅闐闐己卯仲冬日旦氐中涓吉嘯工千趾俱升趨之蒸蒸各奮而登翔然其成煥然其明杳然其深公其省之邦人從之岌岌嶷嶷公升于堂而色而康嘉言孔揚諄復誨語如父如母邦人鼓舞歡傳萬口父兄師友更相進誘一日二日化行洋溢如風之疾惟皇作極貴儒尚德百王之式惟公之賢受命于藩皇澤遐宣斡旋樞機皇曰來歸蜀人其思樂石峩峩矢詩不多千古不磨謹記大成井記李石外學吏李石作二井于成都先筮得巽揲之六三三九而老之三坎焉曰此井祥也陽搖其精陽開其明水湛乎深土溢乎津順所殁以免于險吾井其濟乎乃闕地三尋有咫得食焉分東西為亭以大成名据象詞也嵗大荒落日清明大餘一十二小餘一千七百七十一銘曰一竒而精六偶而盈此天地合水所未形我浚其原如海之溟派挹華滋分注以清我則不驟待其淵渟有綆之修此險之行爾汲爾學無敗厥成修學記楊甲成都學宫自漢至今千餘嵗祠殿講堂巋然獨存其西屬延三百楹壯麗廓大是為崇寧新學而嵗久弊漏汚甚蜀連帥所統治繁夥月率一入學見諸生為故常講席徹即上車去不暇按行或有意苴補破敗吏緣為姦厚費府廪圬墁枝撑目所及以誣不察故雖數加葺亦易壞淳熙二年六月敷文閣待制范公自桂林移鎮全蜀始至謁先聖率諸生列拜庭下覽古歎息顧見屋室陊剝木老石腐則慨然欲興廢于是諏畫講度核經費虛實選吏程督刮絶蟊蠧自禮殿石室與今學官講誦之舍師儒之堂黝暗缺落風雨入而鳥鼠宅者皆徹新之蓋踰年而役休沈沈翼翼嚴靚宏固為西南冠公來新學延見多士與耆儒宿師考難疑義訓誨熟復自左右序生與四方之觀遊若弟若子望公辭氣容色揚厲奮發願識嘉績顯刻以毋忘公德公使甲記載本末甲辭不獲命則具著公惇本勸學委訓示後與蜀人所欲聲公無窮者為詞綴語下公名成大字至能吳郡人以儒長者治蜀有大惠利及民然其政發源實始興學其辭曰逺哉兹學循吏所作鋤荒鑄頑爰初維囏築室考宫誘民其間被之書詩惠我後人聖有廟祀士有攸宇相其喬木曰此千嵗孰傾不扶以雨以風掃除壞汙起自今公庀材鳩工左規右程執斤從之役徒蒸蒸乃崇乃治毋有庳腐廓焉新宫以就爾士士曰樂哉其來翼翼誦歌講讀金石屋壁公往視成辨服在門揖之畢升進退齊平公曰士子吾敬誨汝聖作斯學惟汝擇取蓋古有訓自本自根餘力則文以華其身滔滔利聲則非我徒毋墮爾修愧此學廬士拜稽首載銘公言敢有斁遺公參在前井絡之區槁乾既濡民以順賴士勸毋怠公歸廟堂我思維勩毋壞于成以詔來者新修四齊記李燾蜀郡文學掾李浩蘇詵具書告丹稜李燾曰成都學者日增統帥陳侯懼學宫不足以容乃即公堂之左右更築崇寧廢趾新為屋二十八楹分為四齊疏為四十八窗髙爽靖深學者益趨焉總其成為錢一萬九千緡有竒經始于去冬落成于今春而秋毫弗以煩民此美事也諸生咸願有所紀述敢以告燾再卻而再至已乃喟然歎曰營繕齊屋事固甚美雖勿記豈不粲然陳前而燾私竊有感焉不可不為諸生評之蓋聞古之士皆自學學必有講習之處在家曰孰其曰庠曰序曰校蓋各因所處而立之名初未嘗有大小升降之殊也嵗時朋萃羣集有司于是取賢斂才推而上之其不率教者屏之夫推而上之亦必有講習之處焉斯總名曰大學大學惟王者之都得有是名非王都則名曰學而已故鄉黨莫不有學謂國乃有學固已失之且庠序及校皆所以名其講習之處云爾未始訂某處為序某處為校也亦未始曰庠不得名序序不得名校校不得名庠也昔孔子射矍相之圃蓋以魯君之命致衆而論士然則圃亦學矣豈必曰庠曰序曰校而後為學云乎哉若孔子固未嘗言庠序其言庠序則自孟軻氏始孟氏雖列三代學名而其義則専在養教及射修吾孝弟忠信而已故曰學則三代共之皆所以明人倫也又嘗分東北西南上下左右或在廟或在國或在郊春秋冬夏所居各異詩書禮樂所教亦不同如大小戴所記鄭康成蔡伯喈輩所箋注紛然交加雖巧辨曲通之成理考正求定終須掊擊况又增以成均米廪瞽宗辟雍膠射與夫三靈五府别號異辭叢脞雜還混為一條不可致詰先儒悟其齟齬難以位置則從而為之說曰周兼四代之制蓋一處並建四學非四學各為四處也然其說要未允當姑置周勿問彼區區之魯而亦兼四代之制乎泮水詩今且存米廪瞽宗辟雍膠射不少概見不知漢儒何所依憑而公倡異端彊入它類疑誤學者蓋其甚病在溺心以博未識古書之正僞更怵世資傅㑹緯說錯亂經言遂使後世人主惑其名而不究夫學之實籠絡牽聨惟恐漏落崇侈土木贅聚冠履于孝弟忠信所當修者則未始致意焉其言豈不諄諄特其意倜倜然逺矣漢武帝幸從董仲舒等議建大學置五經博士舉孝廉增弟子員或獻雅樂則對三雍當時抑亦可謂彬彬矣然孝武實急功利士之精通秀穎者皆不肯遊學游學者特章句之儒初無益于成敗之數也逮孝昭欲救民間疾苦乃更召天下賢良文學以訪之則其所養竟非所用此不究實之害也光武創業未及五載于傾側擾攘之間亟立大學雖不免以䜟决事而崇尚儒術有意其推本之也孝明孝章是承是繼其後稍怠學舍鞠為蔬園永建六年更造黌宇開拓房室舉郡國明經耆儒以充入之大將軍下至六百石悉遣子弟游學逮本初之元編牒數踰三萬郭林宗申屠子龍雖髙尚其事亦復周旋其間奬拔人物扶樹道教為諸生倡范孟博等與聞國政深議不諱自公卿以下皆折節下之假托如黃子艾晉文經稱疾卧家士大夫請見弗許三府辟召輒加詢咨隨其臧否以為豫奪當時倘非假托得不謂盛乎要不可與先漢同日語曽無幾何旋遭鉤黨之禍議者反歸過于大學若是則學終無益于政祇有損爾是不然學之為王者事久矣化民成俗匪學莫繇顧用之何如耳後漢之學猶近古及其末造聲教廢于上風俗清乎下百餘年間亂而不亡匪學之力與若郭有道名冠大學而超然塵垢之外不為好爵所縻正言直節嶢嶢獨全彼子艾文經終賴符偉明及林宗輩排斥計不得售禍發鉤黨大學何與也惜漢儒但指經術為祿利之路而不推本于孝弟忠信俾人自進修所用者狹爾本朝遍天下立學肇慶厯極于崇寧其得失之速有目共覩而三舍升降月書季考之法纎悉備具大率誘以祿利故未見豪傑之士卓然自大學興起者此則士所共歎也夫修其天爵而人爵從之又何俟于誘若誘之空激令躁競不安命分是不耘苗而又揠之長者也獨明道景祐間胡翼之治湖州學其規模去古差近弟子往來常數百人莫不以仁義禮樂為學其出辭氣動容色人忽遇之不問可知其師為翼之也磨礲浸灌之功多矣慶厯更新大學有司請下湖州取翼之法以為大學法焉抑嘗聞翼之弟子各以經相傳授又别置齊舍榜曰治道凡欲明治道者肄業于兹如治民治兵治溝洫治算數之類咸因其性而肄業焉劉彛蓋治溝洫者至今猶以水利著夫豈茍然純用科舉為學哉及元祐欲革元豐三舍詆訐苛擾之敝初命程正叔與顧子闕孫莘老同更定學制三人議别置尊賢堂及待賔吏師等齊實用翼之故事㑹胡完夫與正叔異趣事不果行今天下立學皆遍師生相與言惟作文義詩賦論䇿爾是猶日不給而况敢及科舉外事且徒飲食之而不于是取賢斂才無怪乎自怠自棄者之多也今多有是說欲減鄉舉十二三以其額畀郡國之學使學者繇是發身其得人未必不愈于三嵗驟舉于其鄉者是或一道也而朝廷憚于改絃易調然好學者亦豈因是而遂輟其所好乎燾鄉侍講席嘗從容為上言乞稍變試文體格無若今之煨釀熟爛庶幾豪傑有以自見上甚鄉納趣令就直廬條具既得㫖須再試即行㑹燾去位事亦隨寢若試文體格不變又不于是取賢斂才則郡國之學誠徒立爾必不得已翼之故事尚可倣依而馳騁使學者不妨課試如式復于科舉外専精讀書且有以自食無復營求擾亂優游厭飫日知其所亡月無忘其所能比及成就則自當與古為徒謂學果無補于當世吾不信也昔文翁初起學宫于成都市及元朔五年詔天下郡國皆立學宮蓋天下郡國學宮實自成都倡之後之為成都者于學宮不敢不致力雖迷國誤朝若崇寧宰相其致力尤甚異時縱不說學亦必枝柱邪傾圬墁赤白蓋虛矜僞以干縫掖之譽今陳侯獨能躬行節儉削浮冗之費罷誇詡之燕日積月纍創成大厦其視文翁減省少府用度以成就蜀諸生無不及焉其為德厚矣諸生盍亦思所以報之乎司馬相如雖文章冠天下然弗張四維似非吾黨揚子雲金口木舌真漢大儒而出處之際未免跋㚄彼莊君平李仲元沈潜自遂莫我繫維乃可敬仰爾嗚呼繇文翁以來仕而顯者固多矣何君公趙志伯謙溫等雖登三公君子弗貴也惟范景仁起寶元終元祐其進退雍容實光于莊李若景仁斯不負玉堂石室云燾無德之齒猥杖于鄉稱道不亂則燾何敢其私竊有感焉者蓋具此姑以復諸生其尚交警戒哉重修至聖文宣王廟記蒲宗孟夫茫昧窈眇浮于空虛運于兩間充牣于萬類而不息天地之氣氣有逆順然而其施于物也無厚薄光明盛大橫于古今亘于日月籠絡于萬世而不絶者孔子之教教有興廢然而其被于人也無逺近氣無厚薄而百穀之生有不齊焉者過在播殖之人非氣之異也教無逺近而四方之學有不同焉者失在倡勸之人非教之弊也枯原瘠野可使為豐壤裔夷窮貊可使為中國䎩鋤之不勤闢鑿之不工地雖美求其茨梁之收嬉戲孺子皆知其不可禮義之不修忠信之不行人雖材求其聖賢之歸委巷小人皆知其不能告于人曰地不足殖而不耕是棄其地也告于人曰人不足治而不教是棄其人也棄地者將引而入于飢寒棄人者將引而使為禽獸飢寒至禽獸之性發何所不有今四方學可謂至盛而持其術者可謂不棄其人矣然猶教化之所浹風俗之所尚與其講磨養育之具獨完于京師浸漬于齊魯閩益而盛大于吳越惟䕫為西南之陋當天下學者翕然嚮勸之時此邦之人尚不識書至慶厯詔郡縣立學今龍圖閣直學士廬江何公郯為郡别乘始能用文章理道感悟其俗于是人漸知讀書逮十餘年方有進士後又有以進士得科名者廬江公既去歷二十載傳至于今秀民稍稍輩出而為之倡者待其人尚如枯甬墝塉而䎩鋤闢鑿之不復加故窮嵗月更寒暑終莫能豐乎所獲治平三年兵部郎中吳興陳公由三司判官出領本路轉運使入境之日悒然傷孔子之教不大被于一方乃下令風動諸郡使其守長招集學子以德義錯磨其人守長承命處不敢懈各飭僚吏以尸教化䕫州刺史長沙賈侯率先諸郡整治序宇完壞補缺設為規程郡之人喜聞而樂從日謀于其家告于其父兄奔走入學惟恐後時而不得羣于其間既至服勤詩書出入時又謀于其友告于其子弟率德勵行恥其身之不尊名之不髙而孝父忠君之說不聞于耳日夜講解疲不知倦四逺之人執業而就學者交足在境學既盛諸生以孔子之廟卑隘毁墜階不容立堂不容處奠獻之際設席無地宿燎無所又謀于其鄉告于其常所往來而聞于郡曰汙宫敗室安足為孔子之所居而稱吾陳公所以尊事聖人之意耶願輸財以新之是年冬孔子之四十六世孫以尚書員外郎來為轉運判官樂陳公之不鄙擯其人能均齊人之教剔刮愚瞶不以逺近為間使皆議忠信守仁義以自治也歡然協力以終厥事又以其家之廟像及冕服之制合顔淵而下衣冠之飾授于刺史賈侯明年二月賈侯相址擇吉率其屬日從事于廟庭親畀匠指俾營俾搆官工私庸雜作衆治六月廟乃成豐宇廣厦明敞廓大中嚴孔子之座冕旒服章悉用本廟之制而顔淵已下從燕居之儀翼侍左右并圖周漢巳來及唐之大儒二十餘人于壁間邊豆罍樽盡易去舊器使就潔嚴諸生將考于新宫又謀于其徒告于其長有請于學官曰始者入于學懼無承陳公之賜故羣趨而朋來既就講肄又恐無以謝陳公之教故勤行而力修術業既専所趣既明又嗟無以充陳公尊德事聖之意故率財以為廟今廟成而無傳諸生不任其責責在學官學官當有以施其職也宗孟曰然是誠學官之所宜為昔者魯作泮宫邦人是歌鄴侯修廟韓公有詩宗孟典領學事實司文詞其初其卒又皆與諸生游泳于其間敢拜稽首刻詩廟碑詩曰䕫于西南有國自昔人罕詩書士罕縫掖誰為豐腴獨此墝瘠簡簡陳公初顧嗟戚曰人則然其瞶可剔教無逺近人自損益豈不在我示以標的使之得涂安往不適下令諸郡風動邦伯庶邦守長䖍命踧踖䕫實有府庠序先闢方疏淵源灌溉枯瘠旋不踰時芃芃其稷既穫既耘乃漸乃獲公日來觀驄馬白額旗旐䒫䒫紫綬纁舄溫潤其音以勉其畫杠梁其湍以拯其溺與之酬酢升降同席與之坐起左右接膝匪棄伊教咸樂親炙四逺承風笈負墳籍爭來于䕫奔走交迹人侈公惠衎衎晨夕相視廟貌毁墜頽窄曰吾聖人是豈來宅輦財輸金願就更革吉日辛卯爰始斯役衆工勤事不待繩迫衆板勤㭬其均歷歷簷阿斯翬稜廉斯㦸像貌有嚴堂塗有赫是奠是饗神降無射公來在廟禮容莊惕公來在泮天語恱懌克明克嘉有警陋僻凡公之仁浸漬灑滌孰為父兄不舞公澤邦人孔懷懼或淪失學官宗孟實任斯責作詩記始以鏤金石重建州學記徐粹中世無不可成之材亦無不可善之俗舄鹵之地可使為良疇九夷之陋可使為洙泗其以為難者亦誠有所未至焉耳惟天下之至誠為能成天下之化天下之化育可贊也况于人乎君子之于天下也不患材之不成俗之不善患吾之誠或有未至是以無所不用其誠亦無往而不化䕫之有學本末載于舊紀嵗久屋老常有震陵之憂紹興二十三年春吳興沈公自宗伯翰苑均逸侯藩由東蜀移鎮于䕫㑹夏大水屋被漂墊公命相土更築于舊學之兆得髙明爽塏之地并其廟遷焉橫經有堂肄業有舍藏書有閣膳羞有所背山面江廟居其中肇工于秋九月戊申告成于明年夏五月辛巳總百三十四楹有來羣士其至如歸相率摳衣願識其實粹中嘗讀易之觀曰觀盥而不薦有孚顒若且盥而不薦者為化之誠也有孚顒若下觀而化之誠也是以為彖辭則曰聖人以神道設教而天下服為爻辭則曰觀國之光利用賔于王於戲公之化于䕫誠既至矣諸生其勉之異時觀光上國進用于朝人知勸勉相率以從善駸駸乎入于鄒魯之化孰不曰自今日始謹拜手為之頌曰䕫之為州介于巴楚民生其間魚鹽商賈慶厯治平始為黌宇逮夫崇觀俊造接武我皇中興嗣復疆土闡揚文教增光烈祖建侯作屏以綏以撫二十七年禁從分虎政未及施勸先庠序來相其居榱椽敗腐顧將新之候時而舉㑹夏大水漫為洲渚卜築惟新奐輪有度民初墊溺未遑安堵公命賑之爰發倉庾泮宫之修子來樂胥日者夜郎稱兵嘯聚三嵗興戎未克攻取泮宫既作因越為虜鴟梟革心好厥音吐在昔僖公修泮東魯爰服淮夷頌聲鼓舞今也沈公道尊學古樂育人材不問淳鹵達以至誠化如時雨乃㑹其入乃豐其貯士不家食于焉遊處匪命匪携率規蹈矩利用賔王陵我鴻羽豈不自公肇開義府昔者孟軻聖道是輔韓愈稱之功不下禹粹中於公亦云斯語紹興一十四年八月初一日謹記補䕫州大晟樂記張震宋興百餘載文物具舉惟樂律之議紛然歷數大儒莫能定卒至大晟而百家盡廢于是鑄金尚方採石泗濵以班諸天下校學異時諸生類以時肄習春秋釋奠合堂上下之樂翕然雜奏以饗先聖先師盛矣自中原遭變城邑為墟雖東南郡縣還定安集之餘而禮樂器用無一存者蜀獨以不被兵僅全而數十年間吏唯簿書獄訟兵食之為故謂儒者事特無訾省甚者竊取資几案娛玩之用此其于幸中又得不幸者也始䕫有賜樂視諸故府十闕五六雲安舊為軍亦有賜取而合之不足則又搜取于他州鐘磬正聲中聲凡五十有六按圖為簨簴置諸學宫每嵗祀陳于庭雖備而不作尚庶幾存其意此夫子不忍去告朔羊之志也嗟夫古之禮樂不可復見矣使器無廢壞猶有考焉而併與是去之獨何心哉助豫為是舉者通判鮮于侃晉伯教授宋明孫晞亮隆興甲申十月甲子廣漢張震記黔江修學記竇敷紹興戊寅春二月西魏公僖被命守黔始至之日祇謁先聖顧學宫不治荒陋狹隘固已憮然及跪觀上所賜宸翰匣而藏之蔀室中則尤震懼不自安明年遂有意改建心思手畫度地辨方無不用其志乃取養士之餘鳩工積材斫石陶瓦動以千計而無所擾于民又明年首建宸奎閣崇顯壯麗氣象宏廓而經天緯地之文驚鸞回鳯之筆卓越煥爛光被江山又摹上所題大成字揭之禮殿之榱椽闓其蔽障飾聖像正十哲顔孟位築東西二序繪七十二賢于壁闢四齊設明窗净几更講堂以嚴涵養正門閭以快衆目未逾年而工畢既畢屬敷書其事敷曰學校者乃禮義之所出政治之所本而公議之所在也古者獻囚馘于是受成于是論政于是一官一職以至公卿將相皆出于是真為國者之先務也然鄭人遊于鄉校以議執政者或謂子産毁鄉校子産曰不可善者吾行之不善者吾改之是吾師也孔子聞而謂子産仁嗚呼人有賢愚事有當否則世有謗譽當否在我謗譽在彼君子修其在我者而已奚恤于彼哉若逆畏其議已而欲毁鄉校則其為人可知也黔舊有學學者不减旁近郡不以教養為急故散居郊野此豈知子産之言哉能無愧于孔子之謂仁者哉頃嵗科舉朝廷禁挾燭之弊嚴其科條敷嘗督其事棘闈一開白袍百餘輩裹飯而前寂寂無譁須㬰坐定不窺一冊文賦自成日未斜而出敷心異之以為士固未可輕料也今公盡力于學又謹春秋二祀禮樂具備文物皆新前所無有當見千里之間父誨其子兄友其弟正衣冠事語言爭相洗濯磨淬來集于斯目覩雲章口誦王言其不負上樂育之賜異時升薦必能起遐方而瑞天朝至于學問有暇欲議公之政其必曰尊主庇民奉法循課新學校肅教化而我之父子兄弟誓不忘公他復何言大貢院記關耆孫國家用唐制以進士取士二嵗大比士由州縣升者曰鄉貢詔有司進退之此貢院之始也太宗覽進士榜喜曰天下英雄盡在是矣當時以為美談余則曰自周鄉舉里選之法壞而士失其寓猶賴春秋戰國之間齊晉鄭衛之君以君子多寡為盛衰而田文趙勝之徒客多則彊士雖失周之寓然各隨其所寓而安至秦則忌之忌之則殺之以為之窖可以盡掩天下士而不知蕭何曹參陳平張良之徒則秦不能掩之也漢用秦士起漢則先收士于是惠文而下有選舉之法曰賢良曰力田曰孝廉曰明經皆其目也漢以選舉寓士故亦不失其寓王莽曹操睨先後之弱而欲襲之則又忌士士遇莽操如遇秦然秦不能殺蕭何曹參陳平張良之徒于前而莽操亦不能殺冦恂鄧禹周瑜諸葛亮之徒于後士之未易籠絡如此漢揚子雲曰周之士也貴秦之士也賤謂周貴士可也謂秦賤士則秦豈得而賤之哉唐因隋舊以進士取士其始也得士如狄仁傑張九齡姚崇宋璟裴度則亦能為唐彊而其末也如鄭朴楊知至則為唐之亡矣取士一也何始末之異也余觀太宗初興本有忌天下英雄之心既不能用秦之殺則欲以進士為餌而銷之吾取士欲以此銷士而乃誑人曰以此取士士不識吾心且已識則南山之南北山之北矣吾將幾萬鍾幾千駟可要而來之哉識吾心者不來則來者宜其為鄭朴楊知至之徒也國家取士用唐制纍聖待士則非太宗之心所以得士上勵精求治思欲得天下士與共大功業今取士一塗而貢院實為進士取士之始則其容略乎䕫一路十五郡而合六都進士試于䕫初無貢院以破寺寓之寺破尚可也而䕫一城惟一寺一嵗而天申㑹慶兩節郡臣子舍是可無以東向而祝堯也豈可又以之為貢院而二年一殘破之乎䕫則寓貢院于此歷幾嵗乎而不問也嵗庚寅前侍御史王君伯庠來鎮䕫下車之明日慨然嘆曰託釋氏以見臣子之尊君貢多士以示諸侯之報國豈細故事而弊于前不問于後可乎况今取士惟進士一塗吾待進士試不薄俾士亦不自薄進士而後得士則貢院為郡第一事也下令創新之然退而顧公帑視民力則敝不可仰欲遲之則已下令郡進士鵠立待也于是公私之須皆一歸于節専力治之凡五閲月而成為屋一百一十間一毫不取于民民但見其成而不知其為力也則相與歌之以為君曽為上耳目官知國體者君不薄進士是欲士不自薄進士得士而貢上也君之為政可謂知其本矣君濟南人君之考君諱次翁嘗參大政事光堯夀聖太上皇帝君自立不以公卿子弟官而世進士科今守一藩能不忘本如此視古以曲江題名為非以家有文選為過者何啻九牛毛耶貢院落成郡士屬余書輒記其月日云成都贍學田記元羅夀皇元誕受天命奄有萬方列聖繩承詔郡國崇學給田養士以風天下成都在蜀為㑹府昔以武定故所授多萊田少中大夫趙公世延使指蜀慨士習之頽弊教養未備無以承流宣化乃選秀民年二十上下者復其身補弟子員定章程樹令于學以明經治行為業步其地得其田經其畝制其域如市地法㑹其利入嵗以為贍永業所輸入廪師弟子有度所司時其出納焉路總管張保同實總學政問以論語且曰兹學校之經賦也請記諸石碑固不獲讓曰成都自丙申蕩于兵文物泯盡搆治學舍才二十八年倚席不講士子怠散不能恆其業蓋所授學田僻逺未墾無所仰哺而然也才之不立則有司將何以奉揚天休諸大夫可謂知所先矣教養之道可謂周且恆矣既而惟之周官鄉大夫嵗時登夫家之賢者能者莫得考其羣居族食以養以教之道其或授田而自食其力大比禮而賔興之者非授之民也與何治績之凝隆平之久也漢興崇儒興學增廣博士弟子縉紳之盛至于環橋門者億萬計吾見其士類之多于周也未見其比隆于周也其故何哉噫燼秦之餘非六學之實也百家之言非聖道之純也修潔博習非道德之藴也冠帶委蛇非力田之質也文學賢良非夫家之秀也方領矩步非樂舞之節也傳疏章句非躬行之確也胡周之比隆也然猶察舉于鄉閭也不果其行者猶鮮也降漢而下學校修而教樹戾文辭侈而士習浮矣科目盛而其進狹矣合而論之道與利而已矣上以道求士之學也為道上以利誘士之學也為利上之所好下必有甚焉者豈不信與是以漢之士不能并乎周後之求者亦莫漢之愈也蜀有材漢文翁始也前乎文翁也固不能洽先王之化厥後如鄉雲波頴之賢代見時出豈特比齊魯而已哉由是言之漢之士未始異乎周蜀之材亦未嘗不炳然于漢也顧上之人所以造之何如耳方今車書大同厲學興化源流濓洛理道開明士不力田而得飽學于官不待察舉鄉閭而可受知于公上無百家之雜科舉之纍以荒其志矧少中公開教化之有則廪食養成之有資士之食于學者曷亦諒之公篤志勵行彊力不反何往先之愧也哉故既紀其實以告將來因著一言思講評于博聞之君子廟學門記鮮瑨廟學三門之制禮經無明文瑨嘗踰巴蜀浮荆襄漢沔適梁宋鄭衛歷趙代晉蒲秦陕之學周咨弗能得元貞初職教成都視綿州學瓦礫中得宋故石碑修學門記磨滅殆半而門制可考云古營造法式以上天帝座前三星曰靈星王者之居象之故以名門先聖為萬世絶尊古今通祀衮冕南面用王者禮樂廟門之制悉如之世所謂櫺星及凌霄者承誤也今總府命大建此門凡柱礎門槸丹雘陛暨石牆陶甓黝堊之飾具如法經歷夏從仕實贊襄之厥功告成復請書其義于石以昭示永久俾無惑云全蜀藝文士心卷三十六
