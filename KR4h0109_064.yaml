body:
  text: 全蜀藝文志卷六十四明周復俊編行紀題名簡版附朐䏰縣鈐記漢扶嘉前漢扶嘉朐䏰人也初嘉母於湯溪側遇龍後生嘉巧發奇中高祖為漢王與嘉相遇獻定三秦策高祖以其志在扶翊賜姓扶氏為廷尉臨終有言云云今刻于石一牛對馬嶺不出貴人出鹽井流江縣紀功題名蜀張飛漢將張飛率精兵萬人大破賊首張邰于八濠立馬勒石新都縣真多山題名王方平采藥此山童子歌玉爐三澗雪信宿乃行鶴鳴山銘記李膺益州記張道陵為蝮蛇所吸門人以為登仙矣眉山象耳山題名舊有石刻今亡唐李白夜來月下卧醒花影零亂滿人襟袖疑如濯魄於氷壺也李白書渠州冲相寺題名崔塗中原黃賊煽亂前進士崔塗避地于渠州春日獨遊冲相寺由此登眺翌日北歸赤水縣龍多山唐人刻字在今合州北山高明窈深變態萬狀下視涪水如帶烟雲出沒山之偉觀也流溪縣鐵冠仙人鈐記大洲連小洲此地出公侯黎州西林寺壁間題回道人日行一千五百里謁全菴上人不遇而去摩圍山唐人石刻士人謂天曰圍巴黔路途濶遠亦無館舍凡至宿泊多倚溪巖就水造餐鑽木出火嘉州舊市鎮石闕九字李德裕唐李德裕領重兵過此峨眉山普賢殿簡板天真皇人諭道之地楚狂接輿隱迹之鄉閬中台星巖題名司馬池闕路運使司馬池天聖九年遊台星巖司馬光扶下嵓行記蘇軾子瞻子由與侃師至此院僧以路惡見止不知僕之所歷有百倍於此者矣丁未正月二十日書香山寺行記黃庭堅太守高仲本率南昌黃魯直墊江談處道同來遠水喬木僧房高下景物清絶為䕫路第一建中靖國元年二月庚申微雨中來庭堅書卧龍行記前人天水張茂先世家南昌黃庭堅魯直弟叔向嗣直建中靖國元年三月丁卯同來時左綿道人思順開法席於此山道俗歸心荆棘草萊化為金碧新雨晚晴同登中閣觀白鹽之崇崛想杜少陵之風流歎大雅之不作裴回久之魯直書石笋上行記江通濟道吕珣東玉黃庭堅魯直同來建中靖國元年三月卧龍行記劉均國頴川劉均國邀古雍李紹隆雒陽邢仲時陽翟衛師闕黃山韓次阮游卧龍山咸平院歸至天寧寺謁長老忍禪師建炎闕年闕月晦日均國之子瓖侍涪翁以文學名世學徐浩書而婉美一時名士之逰者皆文義卓然間有得筆法之妙者涪翁死三十年矣今人見其翰墨及從之逰者莫不欣然景慕之都運徽猷久從涪翁游而文學翰墨皆造其妙步趨之相若模範之相承譽望闕乎其能肖也後之人茍未知涪翁之賢請觀於公可知矣茍有未知公之賢請觀於涪翁可知矣樂是師友之道光華之因書子留題之後建炎五年正月日門生從政郎䕫州奉節縣令主管勸農公事王行謹跋龍春灘留題馮時行建炎戊申正月上巳日判官李造道司户趙執權知縣母丘元望縣尉馮當可陪郡侯謁武烈公祠遂泛江而下散步此磧老杜詩云元日逢人日未有不隂時議者謂天寶之季此詩盡之今日天宇清明江國熙然太平之期指日可俟又獲與諸公偕遊所謂人日也馮當可書香積院行記蔡懌東萊蔡懌樂道出師瀘南子興雅侍行兄郡守惇元道弟安度子憲㮤松年姪典宗伯世興詩仲志興禮仲圭興邦嘉言頴川趙昌弼子俊作别于此建炎戊申四月九日祥雲寺行記劉昉紹興戊申正月中浣出郊勸耕至東屯因落少陵故居祠堂之成聞祥雲寺之後有瑞石歸路就往觀之䇿杖行山澗亂石間踰里許石果異也事無大小必先難而後獲是日自東屯還過瞿唐已將暮任賔僚之去留其同至者趙沂詠道闕定國公才鄧高叔誼王鼎子新李驥元駿家茂秀實張聿述之朱齊卿醇甫李宗臣元慶楊譽時美真勝賞也劉昉方明書報恩寺行記唐文若紹興歲丙子七月峽中久不雨秋暑熾甚己巳晦連夕雱霈水復大漲余繫舟瀼中杖䇿同二子輅軫來遊道人定觀迎謁欣然乃漢中舊職憩食方丈登佛牙閣愛其江山鮮明草木秀潤頓失三峽之陋寺本晉鐵佛院距今八百祀屢易而不廢良有以也聞方丈法堂輪藏皆創建始事者曉公禪師曰道隆曰永璘嗣成之二傳餘卅載金碧鼎新觀嘗相其事至是欲余為記惜方行役未暇也曉隆實傳法師資而璘觀及曉皆漢中人鐵佛像以中更神霄徙他所觀主寺事既修三門方營建東西挾閣議復迎置故處云充朝散郎新除光祿寺丞眉山唐文若記卧龍山記王十朋永嘉王龜齡少城周行可海陵查元章載酒來遊時凍雨初霽風日清美山谷明秀煦人道傍雜花盛開籃輿徐行應接不暇寺有荼䕷羅絡松上如積雪崇蘭數百本秀發巖石間微風透香所至芬郁東榮牡丹大叢雨前已開道人植蓋護持留以供客飲罷縱步泉上瀹茗賦詩而歸乾道丙戌清明前四日瞿唐關行記關耆孫乾道庚寅中元日關耆孫約李時雨陳彥嶽建壽宋嵩李晉張徽之雍大椿飲于三峽堂晚擕餘觥下瞿唐關訪䕫刺史舊治客曰今之司關者之居是也遂飲於此茂林修竹間小亭縈紆客曰此唐劉夢得故址也夢得遺墨舊有石好事者取去飲關上高齊誦少陵薄雲巖際宿孤月浪中翻之詩歎此老具眼如此䕫江山元粗惡惟少陵新紀處獨異高齊其一也高齊故基在屋隘而陋豫惜之方欲為太守王君言客陳彥辛景賢出席願出力董役更築之僕謂不可隘而陋亦不可侈而大此少陵誅茅避世意也併書以告二子云景賢今司瞿唐關者是日後至之客也曲水留題李燾或言雲安之西三十里許有自然曲水閏月甲午朔泊舟橫石灘上擕子􅀢􅘊孰垡壁堲及劉甥卞子道子步訪之水極峻急不可流觴巖顔有永和三年及六年刻字十五六行剝落已不可讀細辨其文但昔人捐金以事仙佛識金數於石爾殆非禊飲處也好事者因年號遂增飾之當時必置屋廬象設今變滅無餘然水石要可喜姑取酒酌其旁賞晤良久乃去乾道九年眉山李燾書三峽堂行記吕商隱商隱被命赴闕大卿李先生實帥䕫門作三峽堂成而未考也因相率置酒作樂其上同來者商隱及郡僚張悅之陳子長員仲文謝邦彥堂據峽口俯瞰洪流震搖灔澦真為偉觀歲淳熙己亥八月二十三日成都吕商隱周父書侍郎閻公運使張公同遊卧龍紀行閻蒼舒余初自宣威幕府送季長奏事北闕入道山為學士後三年余始被命造朝遂玷論思之列今丐祠得請而歸㑹季長護漕䕫門相與道舊故握手驚嘆蓋闊别已十年矣辱通家燕欵浹辰亡倦最後游卧龍山松風肅爽雲日蔽虧千載英靈恍若來下晚趨躍馬城赤甲白鹽峻極天半晴光返照濆浪帖伏慈明行酒道韞誦詩至大醉而去不圖天涯為樂之至於斯也淳熙九年二月癸巳唐安閻蒼舒才元書高齊題灔澦水側成鏞開封成鏞子韶寄瞿唐關懷安寋渥澤民成都郭公臨舜卿東去過高齊覽形勝遣人撑舟垂繩墜石則灔澦上水猶三十四丈子韶曰夏中江漲灔澦上水猶三十餘丈可想見矣澤民之子慶胄侍淳熙乙巳正月二十五日古書巖留題楊輔䕫州守楊輔去官過萬户驛故朐䏰縣治泊舟游古書巖見刻石滿其上意當時或有像設屋室蓋縣人常所往來之地縣徙歲月不復可考而石刻亦漫闕就盡詳者但為臆創乃屬雲安大夫劉申遍摹巖上下石刻試考詳庶幾其猶有獲也同來者雲安大人鄭邦基郝奚仲作從姪有聲淳熙十五年八月十六日紀異單䕫神怪之事聖人所不語而獲麟退鷁之書聖人亦不廢然天壤之間容有此理耶部使者揚舲東下而有若鱗蟲之異豫翌日語别江干猶復見之豈使者新節光華江神世情出靈怪以護舟楫歟不然當與信心而不信目者評之題名後一日錢唐單䕫書州學留題前人郡守錢唐單䕫同漕使濩澤張玠以紹熙元年六月初吉祇謁先師因言肄業之士别駕漢嘉張子震郡文學三山柯甲皆在施方大寧文學掾錢塘李廷光九華湯巖起三衢毛憲實與焉遂㑹食明道堂規模一新見國子録范仲黼經營之美啜茗於共學觀三峽圖聽水琴清話久之翛然忘暑遐想詠歸之風名教之樂其有既耶卧龍行記李􅌫眉山李季允同漢嘉王申父襄陽爰亞夫來遊時春陽驟驕風埃四起酌泉松石間意頗愜無何雷雨忽至晚登寺閣望赤甲白鹽山色如洗相與舉酒樂甚遂留宿山房季允書此紀歲月慶元六年五日江月亭留題何異癸亥燈夕前一日臨川何異同叔招王鈐轄飯次日當用故事邀漕使巨野李誠之訖同至江月亭鈐轄録示梅溪舊題預有所請方辭以老罷無復强啜語言姑許記歲月云是夕五鼓形於夢寐得二十字其辭曰月湖湖上月到處有光輝既解相隨出當須照我歸覺而甚喜歸日可期既登兹亭水月相得愈切刀頭之夢故併書以遺之鈐轄名光遠字宏文是為江月主人卧龍紀行黃人傑帥帳跨鼇陳損之繡衣具茨王璆聯轡登卧龍置酒高㑹賔客從者十有六人是日金虎嘯風丹雲蔽日凉生樽俎興在江山獻酬賡唱之餘挹大士泉訪海仙像塵慮息而神瞿唐晝漏垂盡乃去真勝游也慶元己未七月十有四日魯齊黃人傑書全蜀藝文志卷六十四
