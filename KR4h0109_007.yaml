body:
  text: 全蜀藝文志卷七明周復俊編詩宫苑宣華苑宫詞僞蜀王衍輝輝赫赫浮玉雲宣華池上月華春月華如水浸宫殿有酒不醉真癡人玉雲王灼碧雞漫志作五雲宫詞一百首花蕊夫人五雲樓閣鳯城間花一作草木長新日月閒三十六宫連內苑太平天子住昆山㑹真廣殿約宫墻樓閣相扶倚太陽净甃玉階橫水岸御爐香氣撲龍牀龍池九曲逺相通楊栁絲牽兩岸風長似江南好風景畫船來往碧波中東內斜將紫氣通龍池鳯苑夾城中曉鐘聲斷嚴粧罷院院紗窗海日紅殿名新立號重光島上亭臺盡改張但是一人行從一作幸處黃金閣子鎖牙牀安排諸院接行廊水檻周回十里强青錦地衣紅線一作頌毯盡鋪蘭麝一作龍腦鬱金香夾城門與內門通朝罷巡逰到苑中每日日髙祗候處滿堤紅豔立春風厨船進食簇時新侍坐一作宴無非列近臣日午殿頭宣索膾隔簾一作花催喚打魚人立春日進內園花紅蕊輕輕嫩淺霞跪到玉階猶帶露一時分一作宣賜與宮娃三面宫城盡夾墻苑中池水白茫茫只一作直從獅子門前入旋見亭臺繞岸傍離宮别院繞宫城金版輕敲合鳯笙每夜一作夜夜月明花樹底傍池長有按歌聲旋移紅樹斫青苔宣使龍池更鑿開展得綵波寬似海水心樓殿勝蓬萊御製新翻曲子成六宮才唱未知名盡將觱篥來抄譜先按君王玉笛聲修儀承寵住龍池掃地焚香日午時等候大家來院裏看教鸚鵡念新一作宫詩一作詞六宫官職總新除宫女安排入畫圗二十四司分六局御前相見錯相呼才人出入每相一作參隨筆硯將行繞曲池能向綵箋書大字忽防御製寫新詩春風一面曉粧成偷折花枝傍水行却被內監一作遙覷見故將紅豆打黃鶯小毬場近曲池頭宣喚勳臣試打毬先向畫廊一作樓排御幄管絃聲動立浮油梨園弟子簇池頭小樂擕來候宴逰試一作旋炙銀一作紅笙先按拍海棠花下合梁州殿前排宴賞花開宫女侵晨探幾回斜望苑門遙舉袖傳聲先一作宣喚近臣來供奉頭籌不敢爭上名一作棚専喚近臣名內人酌酒爭一作繞宣賜馬上齊呼萬嵗聲殿前宫女總纎腰初學乘騎怯又嬌上得馬來才似走幾回拋鞚抱一作把鞍橋自教宫娥學打毬玉鞍初跨栁腰柔上棚知是官家認遍遍長嬴第一籌翔鸞閣外夕陽天樹影花光逺接連望見內家來往處水門斜過罨一作畫樓船內人追逐採蓮時驚起鳬鷗兩岸飛蘭棹把來齊拍水並船相鬬濕羅衣新秋女伴各相逢罨畫船飛别浦中旋折荷花伴歌舞夕陽斜照滿衣紅少年相逐採蓮回羅帽羅衣巧製裁每到岸頭長拍水競提纎手出船來早春楊栁引長條倚岸緣墻一面髙墻一作堤稱與畫船牽錦纜暖風搓出綵絲縧媫妤生長帝王家常近龍顔逐翠華楊栁岸長春日暮傍江行困倚桃花月頭支給買花錢滿殿宫人近數千遇著唱名多不語含羞走一作急過御床前數千一作二千太虛髙閣凌波殿背傍一作倚宮墻面枕池諸院各分娘子位羊車到處不教知寒食清明小殿旁綵樓雙夾鬬雞場內人對御分明看先睹紅羅十擔床熙寧五年臣安國奉詔定蜀楚秦氏三家所獻書可入三館者令令史李希顔料理之其書多剝脫得一敝紙所書花蕊夫人詩共三十二首乃夫人親筆而辭甚奇與王建宫詞無異建自唐至今誦者不絶口而此獨遺棄不見取前受詔定三家書者又斥去之甚為可惜也臣謹令令史郭祥繕寫入三館而歸日誦數篇于丞相安石與中書語及此而王圭馮京願傳其本於是盛行於時夫人僞蜀孟昶侍人事具國史臣安國謹題逸詩水車踏水上宫城寢殿簷頭滴滴鳴助得聖人高枕興夜深長作逺灘聲平頭船子小龍床多少神仙立御傍旋刺篙竿令過岸滿池春水蘸紅粧苑東天子愛巡逰栁岸花堤枕碧流新教內人工射鴨長將弓箭繞池頭羅衫玉帶最風流斜插銀箆慢裹頭閒向殿前騎御馬掉鞭橫過小紅樓沉香亭子傍池斜夏日巡逰歇翠華簾畔玉盆盛淨水內人手裏割銀瓜薄羅衫子透肌膚夏日初長板閣虛獨自慿欄無一事水風凉處讀文書金畫香臺出露盤黃龍雕刻繞朱欄焚修每遇三元日天子親簮白玉冠六宫一例羅冠子新樣交鐫白玉花欲試淡粧兼道服面前宣與唾孟家三月櫻桃乍熟時內人相引看紅枝回頭索取黃金彈繞樹藏身打雀兒小小宫娥到內園未梳雲鬢臉如蓮自從配與夫人後不使尋花亂入船錦城上起凝煙閣擁殿遮樓一面高認得聖人一作顔遙望見碧欄杆映赭黃袍大臣承寵賜新莊梔子園東栁岸旁每日聖恩親幸到板橋頭是讀書堂東院開府輔政餘暇每到苑中聖人特賜新莊以修逰宴之所舞頭皆著畫羅衣唱得新翻御製詞每日內廷聞教隊樂聲飛出到龍池春早尋花入內園競傳宣㫖欲黃昏明朝隨駕逰蠶市暗使氊車就苑門半夜船搖載內家水門紅蠟一行斜聖人正在宫中飲宣使池頭旋折花春日龍池小宴開岸邊亭子號流杯沉檀刻作神仙女對捧金尊水上來慢梳鬟髻著輕紅春早爭求芍藥叢近日承恩移住處夾城裏面占新宫别色宫司御輦家黃衫束帶臉如花深宫內苑參承慣常從金輿到日斜日髙房裏學圍棊等候官家未出時常為一作為賭金錢爭路數専憂女伴怪來遲樗蒲冷淡學投壺箭倚腰身約畫圖盡對君王稱妙手一人來射一人輸慢揎羅䄂指纎纎學釣池魚傍水邊忍冷不禁還自去釣竿長一作常被别人拈宣徽院約池南畔一作岸粉壁紅忩畫不成總是一人行幸處徹宵聞奏管絃聲丹霞亭浸池心冷曲沼門含水腳清傍岸鴛鴦皆著對時時出向淺沙行楊栁隂中引御溝碧梧桐樹擁朱樓金陵城共滕王閣畫向丹青也合羞曉來隨駕上城逰行到東西百尺樓回望苑中花栁色緑隂紅豔滿池頭牡丹移向苑中栽盡是藩方進入來未到末春緣地暖數般顔色一時開明朝臘日官家出隨駕先須㸃內人回鶻衣裝回鶻馬就中偏稱小腰身盤鳳鞍韉一作鞍􅀈盤龍閙色裝黃金腰胯一作壓胯紫遊韁自從揀得真龍種别置東頭小馬坊翠輦每隨城畔出內人相次簇池邊嫩荷花裏搖船去一陳香風送水仙髙燒紅蠟一作燭點銀燈秋晚花池景色澄今夜聖人新殿宿後宫相近覓祇承苑中排比宴秋宵絃管挣摐各自調日晚閣門傳聖㫖明朝盡放紫宸朝夜深飲散月初斜無限宫嬪亂插花近侍媫妤先過水遙聞隔岸喚船家宫娥小小豔紅粧唱得歌聲繞畫梁緣是太妃新進入座前頻賜小一作綵羅箱池心小樣釣魚船入玩偏宜向晚天挂得綵帆教便放急風吹過水門邊傍池居住有漁家收網搖船到淺沙預進活魚供日料滿筐跳躍白銀花秋晚一作曉紅粧傍水行競將衣袖撲蜻蜓回頭瞥見宫中喚幾度藏身入畫屏御溝春水碧於天宮女尋花入內園汗濕紅粧行漸困岸頭相喚洗花鈿昭儀侍宴足精神玉燭抽看記飲巡倚賴識書為録事燈前時復錯瞞人後宫阿監裹羅巾出入經過苑囿頻承奉聖顔憂誤失就中長怕內夫人管絃聲急滿龍池宫女藏鈎夜宴時好是聖人親捉得便將濃墨掃雙眉密室紅泥地火爐內人冬日晚相呼今宵駕幸池頭宿排比椒房得暖無三清臺近苑墻東樓檻層層映水紅盡日綺羅人度曲管絃聲在半天中髙亭百尺立春一作當風引得君王到此中床上翠屛開六扇折枝花綻一作檻花初綻牡丹紅內人新一作承寵賜新房紅粉泥窗繞畫廊種得海柑才結子乞求自進與君王翡翠簾前日影斜御溝春水浸成霞侍臣向晚隨天步共看池頭滿樹花金碧闌干倚岸邊捲簾初聽一聲蟬殿頭日午搖紈扇宫女爭來玉座前嫩荷香撲釣魚亭水面文魚作隊行宮女競來池畔立一作看傍簾呼喚勿髙聲新翻酒令著詞章侍宴初開意却忙宣使近臣傳賜本總教諸院遍抄將畫船花舫總新粧進入池心近島傍松柏鏤忩楠木版暖風吹過四圍香西毬場裏打毬回御宴先從苑內開宣索教坊諸伎樂傍池催喚入船來年初十五最風流新賜雲鬟使上頭按罷霓裳歸院裏畫樓雲閣總重修春天睡起曉粧成隨侍君王觸處行畫得自家梳洗樣相憑女伴把來呈寢殿門前曉色開紅泥藥樹間花栽君王未起翠簾捲宫女更畨一作又發宫人上直來海棠花發盛春天遊賞無時列御筵繞岸結成紅錦帳暖枝低拂畫樓船晚日宫人外按回自牽驄馬出城隈御前接得髙義手射得山雞喜一作且進來朱雀一作䗶門髙苑外開毬場空濶淨一作沒塵埃預排白兔兼蒼狗等候君王按鶻來㑹仙觀裏玉清壇新㸃宫人作女冠每度駕來羞不出羽衣初著怕人看老大初教作道人鹿皮冠子淡黃裙後宮歌舞全拋擲每日焚香事老君法雲寺裏中元節又是官家降誕辰滿殿香花爭供養內園先占得鋪陳酒庫新修近水傍撥醅初熟五雲漿殿前供御頻宣索一作搜進入花間一陳香白藤籠搯白銀花閣子門開一作當寢殿斜近被宫中知了事每來隨駕使煎茶金章紫綬選西班每每東頭近聖顔材藝足當恩寵别只堪供奉一場閒安排竹柵與巴籬養得新生鵓鴿兒宣受內家教一作専餵飼花毛問著總皆知內人深夜學迷藏遍繞花叢水岸傍乘興忽一作或來山洞裏大家尋覓一時忙小院珠簾著地垂院中排比不能一作相知羡他鸚鵡能言語窗裏偷教鸜鵒兒島樹髙低約浪痕島中斜日已一作欲黃昏樹頭未刻雙飛鶴揚起晴空映水門今補入宫詞三首小雨霏微潤緑苔石闌紅杏傍池開一枝插向金瓶裏捧進君王玉殿來錦鱗躍水出浮萍荇草牽風翠帶橫恰似金梭攛碧沼好題幽恨寫閨情鴛鴦瓦上忽然聲晝寢宫娥夢裏驚元是吾王金彈子海棠窠下打流鶯鴛鴦瓦上一首趙與時賔退録云不知名李珣瓊瑶集以為王衍宫人李玉籌作晚步宣華舊苑宋范成大喬木如山廢苑西古溝臨水靜鳴池吏兵悉率更畨後樓閣崔嵬欲暝時有露冷螢猶照草無風驚鵲自還枝歸來更了程書債目眚昏花燭穗垂全蜀藝文志卷七
