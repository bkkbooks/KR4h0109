body:
  text: 全蜀藝文志卷五明周復俊編詩都邑蜀國弦梁簡文帝銅梁指斜谷劒道望中區通星上分野作國下為都雅歌因良守妙舞自巴歈陽城嬉樂盛劒騎鬱相趨五婦行難至百兩好逰娛牲祈望帝祀酒酹蜀侯誅江妃納重聘貞女愛將雛停弦時繫瓜息吹治脣朱脫衫湔錦浪回扇避陽烏聞君握節返賤妾下城隅蜀道難前人巫山七百里巴水三回曲笛聲下復髙猿啼斷還續蜀道難梁劉孝威玉壘髙無極銅梁不可攀雙流逆巇道九坂澀陽關鄧侯䇿馬度王生斂轡還斂轡懼身尤叱馭奉王猷若吝千金重誰為萬里侯戲馬吞珠界揚舲濯錦流沉犀厭水怪握鏡表靈丘禺山金碧有光輝遷亭車馬尚輕肥彌想王褒擁節反更憶相如乘傳歸君平子雲閴不嗣江漢英靈信已衰蜀道難陳隂鏗王尊奉漢朝靈關不憚遙髙岷長有雪隂棧屢經燒輪摧九折路騎阻七星橋蜀道難如此功名詎可要蜀道難唐張文琮梁山鎮地險積石阻雲端深谷下寥廓層巖上鬱盤飛梁架絶嶺棧道接危巒攬轡獨長息方知斯路難蜀道難李白噫吁嚱危乎髙哉蜀道之難難于上青天蠶叢及魚鳬開國何茫然爾來四萬八千嵗不與秦塞通人煙西當太白有鳥道可以橫絶峨眉巔地崩山摧壯士死然後天梯石棧相鈎連上有六龍回日之髙標下有衝波逆折之回川黃鶴之飛尚不得過猿猱欲度愁攀緣青泥何盤盤百步九折縈嵓巒捫參歷井仰脅息以手撫心坐長歎問君西遊何當還畏途巉巖不可攀但見悲鳥號古木雄飛呼雌繞林間又聞子規啼月落愁空山蜀道之難難于上青天使人聽此雕朱顔連峯去天不盈尺枯松倒挂倚絶壁飛湍瀑流爭喧豗砯崖轉石萬壑雷其險也若此嗟爾逺道之人胡為乎來哉劒閣峥嶸而崔嵬一夫當關萬夫莫開所守或匪人化為狼與豺朝避猛虎夕避長蛇磨牙吮血殺人如麻錦城雖云樂不如早還家蜀道之難難于上青天側身西望長咨嗟龍州前人嵐光深院裏傍砌水泠泠野燕巢官舍溪雲入古㕔日斜孤吏過簾捲亂峰青五色神仙尉焚香讀道經巴州前人巴水急如箭巴船去如飛十月二千里郎行幾嵗歸成都蕭遘月曉已聞花市合江平偏見竹簰多好教載取芳菲樹剩照岷天瑟瑟波賦得蜀都褚亮列宿光輿井分土跨梁岷沉犀對江浦駟馬入城闉英圖多霸跡歷選有名臣連騎簮纓滿含章詞賦新得上仙槎路無待訪嚴遵成都府杜甫翳翳桑榆日照我征衣裳我行山川異忽在天一方但逢新人民未卜見故鄉大江東流去逰子去日長曽城填華屋季冬樹木蒼喧然名都㑹吹簫間笙簧信美無與適側身望川梁鳥雀夜各歸中原杳茫茫初月出不髙衆星尚爭光自古有羇旅我何苦哀傷上皇西巡南京十首李白胡塵輕拂建章臺聖主西巡蜀道來劒壁門髙五千丈石為樓閣九天開九天開出一成都萬戶千門入畫圖草樹雲山如錦繡秦川得及此間無德陽春樹似新豐行入新都若舊宫栁色未饒秦地緑花光不減上林紅誰道君王行路難六龍西幸萬人歡地轉錦江成渭水天回玉壘作長安萬國同風共一時錦江何謝曲江池石鏡更明天上月後宫親一作新得照蛾眉濯錦清江萬里流雲帆龍舸下揚州比地雖誇上林苑南京還有散花樓錦水東流繞錦城星橋北挂象天星四海此中朝聖主峨眉山上一作下列仙庭秦開蜀道置金牛漢水元通星漢流天子一行遺聖跡錦城長作帝王州水渌天青不起塵風光和暖勝三秦萬國煙花隨玉輦西來添作錦江春劒閣重關蜀北門上皇歸馬若雲屯少帝長安開紫極雙懸日月照乾坤䕫州歌絶句十首取七杜甫中巴之東巴東山江水開闢流其間白帝髙為三峽鎮䕫州險過百牢關白帝䕫州各異城蜀江楚峽混殊名英雄割據非天意霸王并吞在物情赤甲白鹽俱刺天閭閻繚繞接山巔楓林橘樹丹青合復道重樓錦繡懸瀼東瀼西一萬家江南江北春冬花背飛鶴子遺瓊蘂相趂鳬雛入蔣牙東屯稻畦一百頃北有澗水通青苗晴浴狎鷗分處處雨隨神女下朝朝蜀麻吳鹽自古通萬斛之舟行若風長年三老長歌裏白晝攤錢髙浪中武侯祠堂不可忘中有松柏參天長干戈滿地客愁破雲日如火炎天凉成都曲張籍錦水近西煙水緑新雨山頭荔枝熟萬里橋邊多酒家逰人愛向誰家宿井絡李商隱井絡天彭一掌中漫誇天設劒為峰陳圖東聚燕江石邊柝西懸雪嶺松堪嘆故君成杜宇可能先主是真龍朅來為報奸雄輩莫向金牛訪舊蹤中元甲子以辛丑駕幸蜀羅隱邪氣奔屯瑞氣移清平過盡到艱危縱饒犬彘迷常理不奈豺狼幸此時九廟有靈思李令三川悲憶恨張儀可憐一曲還京樂重對紅蕉教蜀兒蜀中三首鄭谷馬頭春向鹿頭關逺樹平蕪一望間雪下文君沽酒市雲藏李白讀書山江樓酒恨黃梅後村落人歌紫芋間堤月橋燈好時景漢庭無事不征蠻夜多無雨曉生塵草色嵐光日日新蒙頂茶畦千㸃露浣花箋紙一溪春揚雄宅在唯喬木杜甫臺荒絶舊鄰却共海棠花有約數年留滯不歸人渚逺江清碧簟紋小桃花繞薛濤墳朱橋直指金門路粉堞髙連玉壘雲窗下斫琴翹鳯足波中濯錦散鷗羣子規夜夜啼巴樹不並吳鄉楚國聞錦城曲溫庭筠蜀山攢黛留時雪簝笋嶡芽縈九折江風吹巧剪霞綃花上千秋杜鵑血杜鵑飛入巖下叢夜叫思歸山月中巴水漾情情不盡文君織得春機紅怨魄未歸芳草死江頭學種相思子樹成寄與望鄉人白帝荒城五千里新都行歐陽詹縹眇空中絲蒙籠道傍樹翻兹葉間吹惹彼花上露悠揚絲意去苒弱花枝住何計脫纏綿天長春日暮益昌行并序前人貞元年中天子以工部郎中興元少尹吳興陸公長源牧利州其為政五年子旅逰由于利覩人安俗阜欽所以美作詩一章利州故益昌郡也目曰益昌行詩曰驅馬至益昌倍驚風俗和耕夫壟上謡負者途中歌處處川復原重重山與河人煙遍餘田時稼無閒坡問業一何修太守德化加問身一何安太守恩懷多賢哉我太守在古無以過愛人甚愛子理邦如理家雲雷既奮騰草木遂萌芽乃知良二千德足為國華今時固精求漢帝非徒嗟四氣有青春衆植佇揚葩期當說霖雨天下同滂沱蜀國弦李賀楓香晚花靜錦水南山影驚石墜猿哀行雲愁半嶺凉月生秋浦玉沙鱗鱗光誰家紅淚客不忍過瞿塘蜀國偶題錢珝忽憶鑾輿西幸時暗傷前恨竟誰知佩蘭應語宮臣道莫向金盤進荔枝黔中書懷竇羣萬事非京國千山擁麗譙佩刀看日曬賜馬傍江調言語多重譯壺觴每獨謡沿流如著翅不敢問歸橈成都宋楊億五丁力盡蜀川通千古成都緑酎濃白帝倉空蛙在井青天路險劒為峰漫傳西漢祠神馬已見南陽起卧龍張載勒銘堪作戒莫矜函谷一丸封前題劉筠鏤膚剽俗恣邊遨或得蹲鴟號富饒井絡共知天與險蠺叢無奈世興妖杜䳌積恨花如血諸葛遺靈柏半燒才似文園何足道一生琴意秪成痟前題錢思公武侯千載有餘靈盤石刀痕尚未平巴婦自饒丹冗富漢庭還負碧砮征雨經蜀市應和酒琴到臨邛别寄情知有忠臣能叱馭不論雲棧更峥嶸悼蜀詩張詠蜀國富且庶風俗矜浮薄奢僣極珠貝狂佚務娛樂虹橋吐飛泉煙栁閉朱閣燭影逐星沉歌聲和月落鬬雞破百萬呼盧縱大噱逰女白玉璫驕馬黃金絡酒肆夜不扃花市春漸作禾稼暮雲連紈繡淑氣錯熙熙三十年光景倐如昨天道本害盈侈極禍必作當時布政者罔思救民瘼不能宣淳化移風復儉約情性非方直多為聲色著從欲竊虛譽隨俗縱貪攫蠺食生靈饑作威恣暴虐佞罔天子聽所利唯剝削一方忿恨興千里攘臂躍火氣烘寒空雪彩揮蓮鍔無人能却敵何暇施擊柝害物黷貨輩皆為白刃爍瓦礫積臺榭荆棘迷城郭里第鎖苔蕪庭軒喧燕雀斗米金帛市束芻羅綺博悲夫驕奢民不能飽葵藿朝廷僉元戎帥師蕩凶惡虎旅一以至梟巢一何弱燎毛焰晶熒破竹鋒熠爚兵驕不可戢殺人如戲謔悼耄皆麗誅玉石何所度未能剪强暴爭先謀剽掠良民生計空賖死心殞穫四野搆豺狼五畝孰耕鑿出師不以律餘孽何由却俾夫熾蜂蠆寡術能籠絡邊陲未肅清胡顔食天爵世方尚奔競誰復振謇諤黃屋逺萬里九重髙寥廓時稱多英雄才豈無衛霍近聞命良臣拭目觀奇略成都書事百韻詩并序薛田金躔奧壤玉壘名區風物尚饒曠古稱最僕守茲職任五年載至初則木牛流馬馳八使以均財次則皂蓋朱幡奉一麾而作鎮歷覽勝異慷慨興懷古人曰非感發不可以言詩非聲詩不可以導志故言成志激流為美談偶因公退輒作成都書事七言一百韻止陳乎益都事蹟罔暇以外景加諸庶幾謬發于斐然詎敢芳揚于作者其詩曰混茫丕變造西阡物像熙熙被一川易覺錦城銷白日難歌蜀道上青天雲敷牧野耕桑雨栁拂旗亭市井煙院鎖玉溪留好景坊題金馬促繁絃風流鋪席堆紅豆瀟灑門庭映碧鮮表狀屢言同穎穗敇書頻奬並生蓮旋科杞樹炊香稻剩種豌巢沃晚田仁宅不隳由政立義闈無取任情遷民知禮遜蠺叢後俗尚奢華邃古先繞郭波濤來浩浩歸朝岐路去綿綿乍回黑水將成道潛到青羊恐遇仙靚女各功翻樣繡袨商兼制砑綾箋壚邊泛蟻張裙幄江上鳴鼉簇綵船石筍崚嶒衙對峙琴臺恢闊寺相連羣葩艷裏珍禽語百草香中瑞獸眠喜趣必臻尤佇望勝逰爭倦更遷延早荷葉底蹲鴟伏棕樹梢頭亂蝶穿鹺發牢盆渾棄鹵鐵資圜法免鈈鉛豐饒物態寧殊越美麗姝姬酷類燕西海號雄彰傳紀南康辭健積銘鐫良工手技髙容學妙隱丹方祕不傳倚劒靈關凌絶頂夢刀孤壘削危巔金華巷陌遺三品石鏡伽藍露一拳信落荆州隨鼓枻檢頌芝闕聽搖鞭若量內地寒暄異且在遐陬水陸全渝舞舊云傳樂府巴談誰曰繫言詮九苞綰就佳人髻三閙裝成子弟韀欲辨坤維尋地理才臨益部認郊廛文翁室暗封苔蘚葛亮祠荒享豆籩貨出軍儲推賑濟轉行交子頌輕便氣蒸蒟蒻根鬚潤日罩楩柟樹影圓藥市風光蟲蟄外花潭遨樂鵙鳴前聚源待擬求梟氏貯怨那能雪杜鵑衆植森榮還蓊蔚夾流湍迅回潺湲鮮明機杼知無算細碎錐刀不啻千合伴鴉鬟齊窈窕對陪霓袖競翩翾五門冷映岷峨雪千里爰疏灌堋泉茂盛八弦宜得最膏腴十道北俱偏袁滋不到生無分段相重來宿有緣款召相如登苑驟遷太白步花甎葳蕤草木時為瑞竒秀江山代産賢曉後細風紅灼灼夜中微雨碧芊芊錦亭焰燭明歌障繡閣香毬暖尉氈寶塔徘徊停隼旟觀街雜㳫擁輜軿酴醾引架家家郁躑躅攀條處處妍重愛魯儒提德柄威降曹將董戎旃歡謡少負賨人勇長講多經楚客禪似簇綺羅偏煥耀如流車馬信喧闐搘機顯綽名堪録題柱芬芳事莫捐李特鋒錯徒恃險張儀規畫自持顛鷹揚器業成悠久鳥合奸雄敗轉旋漫向鼎分澄霸道却當龜化驗都廛強貪楚滅悲傾轍廣洽堯詢喜慕羶側辨猖狂拋玉斝歸鞍酩酊墜金鈿氛埃屏息雲常覆稼穡繁滋澤靡愆睿聖宵衣垂乃眷貴臣馳日每傳宣石牛邁路加歆饗江瀆隆區助潔蠲避暑亭臺珍簟設縱閒池沼釣絲牽遮蠻帶礪長能固捍蜀金湯逺益堅何武甲科曽繼踵嚴真十兆罕差肩儲書競甲諸家集博識咸修百氏箋紙碓暮舂臨岸滸瓜樽春注截河壖華嚴像閣凉堪愛淨衆松溪僻可憐學射崔嵬橫罨靄放生寬廣媚漪漣蘚庭嫩筍青篸篸風檻新荷緑扇扇守戍貔䝗千萬騎采葑簮筍兩三員清江瀉勢方流巽大面盤形正壓乾電掃谷風藏虎嘯雷瞑宫樹灑龍涎郃占逖應星舒彩欒噀端聆火撲燃令範式驅民缺缺咨謀疇倚道平平性寒甘蔗猱偷齧體膩芭蕉蠧莫沿志讀備興重掩卷史看唐幸懶終篇雕盤姹女呈酥作水巷癡童揚紙鳶初下鹿頭迷鄠柱暫來犀浦誤伊瀍變秦言語生皆㑹戀土情懷死不悛結廈斧斤宗簡易入神丹艧厲精専柳隄夜月朱簾捲花市春風繡幕搴十縣版圖分戶籍一城牌肆係民編受辛滋味饒薑蒜劇饌盤餐足鮪鱣月季昌霜秋肯挫荔枝衝瘴夏宜然幾番藂箐鳴虛籟是箇園林噪懶蟬蠢動乘時先飬育菁英屆候别陶甄地丁葉嫩和嵐採天蓼芽新入粉煎平代唘闈聞繼岌監軍憑軾見劉焉蕙蘭馥裛幽蹊畔菱芡交鋪曲島邊繪網晚晴誇蹴踘畫繩寒食戲鞦韆氤氲紫霧濛都邑縹渺彤霞聚偓佺螭伏自然銷劒㦸螻翻幾度起戈鋋宦逰止歎音塵闕鄉飲何驚嵗月遄靈夀桃枝奇共結金砂銀鑠貴相聨埋輪昔按均輸命吒馭今分太守權徒為行春飛皂蓋詎能許國報青錢政經旋考尤多僻民瘼深求尚未痊雖愧袴襦非叔度且期毫墨有馮沿僶遵廉察思從訓克謹操修敢好畋南市醉過攢幟隊西樓歡坐列瓊筵煩囂謹畏傷淳厚慧黠周防近巧諞重祿省心宜致冦薄材莊貌若臨淵扶危頗異巢居幕勸善還同矢在弦叨蒞一麾康逺俗等閒光景又三年成都宋祁風物繁雄古奧區十年傖父巧論都雲藏海客星問石成都有一石人傳嚴君平所辨星石今在嚴真觀花識文君酒處壚兩劒作關屏對繞二江聨派練平鋪此時全盛超西漢還有淵雲杼頌無成都行陸遊倚錦瑟擊玉壺吳中狂士遊成都成都海棠十萬株繁華盛麗天下無青絲金絡白雪駒日斜馳遣迎名姝胭脂褪盡見玉膚緑鬟半脫嬌不梳吳綾便面對客書斜行小字密復疏墨君秀潤腴不枯風枝雨葉蕭蕭殊月浸羅襪清夜徂滿身花影醉索扶東來此歡墮空虛坐悲新霜㸃鬢鬚易求合浦十斛珠難覓錦江雙鯉魚夢至成都悵然有作二首前人春風小陌錦城西翠箔珠簾客意迷下盡牙籌閒縱博刻殘畫燭喜分題紫氍毹暖帳中醉紅叱撥驕花外嘶孤夢凄凉身萬里令人憎殺五更雞宦途元不羡飛騰錦里豪華壓五陵紅袖引行逰玉局華燈圍坐醉金繩階前汗血洮河馬架上霜毛海國鷹世事轉頭誰料得一官南去冷如冰雪中懷成都前人憶在西州遇雪時繡筵處處百花圍烏絲闌展新詩就油壁車迎小獵歸感事鏡鸞悲獨舞寄書筝䧹恨慵飛愁多自是難成醉不為天寒酒力微成都書事前人劒南山水盡清暉濯錦江邊天下稀煙栁不遮樓閣斷風花時逐馬頭飛芼羮筍似稽山美斫鱠魚如笠澤肥客報城西有園賣老夫白首欲忘歸涪州前人古壘西偏曉繫舟倚闌搔首思悠悠欲營丹竈竟無地不見荔枝空逺逰官道近江多亂石人家避水半危樓使君不用勤留客瘴雨蠻烟我欲愁涪州十韻馬提幹地踞襟喉重城依雉堞堅東漸鄰楚分南望帶夷邊舟楫三川㑹封疆五郡連人煙繁峽內風物冠江前溪自吳公邑園由妃子傳許雄山共峻馬援壩相聨灘急羣瀦沸崖髙落馬懸石魚占嵗稔鐵匱驗晴天地暖冬無雪人貧嵗不綿巖標山谷子觀塑爾朱仙涪州宋輸錦繡洲猶在熊羆夢已無文風齊兩蜀仙洞接三都白石從天設青崖見地圖荔支妃子國不復曩時輸彭山縣君居文同公館靜寥寥園亭景物饒溪光明短彴樹影䕃危譙山鳥忽雙下溪魚時一跳主人王事簡文酒日逍遙廣安何志熙欲說賨城好先誇方物妍金羮收稻後紅臘落梅前照坐梨偏紫堆盤荔更鮮雪藤尤異産應不數花箋蜀國弦明劉基胡笳拍斷𤣥氷結湘靈曲終斑竹裂為君更奏蜀國弦一彈一聲飛上天蜀國周遭五千里峨眉迢迢連玉壘岷嶓出水作大江地砉天浮戒南紀舒為五色朝霞暉慘為虎豹號隂霏翕為千嶂雲雨入噓為百里雷霆飛白鹽雪消春水滿谷鳥相呼錦城暖巴姬倚歌漢女和楊栁壓橋花纂纂銅梁翠氣通青蛉碧雞啼落天上星山都號風寡鵠泣杜鵑嗚咽愁幽冥商悲語怒聽未了窮猿三聲巫峽曉瞿唐浪波翻九淵倒瀉流泉喧木杪樓頭仲宣羇旅客故鄉渺渺音塵隔含悽更聽蜀國音不待天明頭盡白全蜀藝文志卷五
