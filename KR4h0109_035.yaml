body:
  text: 全蜀藝文志卷三十五明周復俊編記丙禮殿柱記失名漢初平五年蒼龍甲戌旻天季月修築周公禮殿始自文翁應期鑿度開建頖宫立堂布觀廟門相鈎缺一字司幔延公辟相承至于甲午故府梓潼文君增造吏寺二百餘間四百年之際變異蜂起璇璣離常玉衡失統強桀并兼人懷僥幸戰兵雷合民散失命烈火飛炎一都之舍官民寺室同日一朝合為灰炭獨留文翁石室廟門之兩觀禮樂崩壞風俗混亂誦讀已絶倚席離散夫禮興則國化郡將陳留髙君節符典境迄斯十有三載會缺一字椱亂缺一字慮匡救濟民塗炭閔斯缺一字虛缺三字冠學者表儀缺三字大小推誠興復第館八音克諧鬼方來觀為後昌基缺一字神不周公禮殿記漢初平五年蒼龍甲戍旻天季月修舊築周公禮殿始自文翁應期鑿度開建泮宫立堂布觀至于甲午故府梓潼文君增造吏寺二百餘間四百年之際璇璣離常玉衡失統豪傑并兼人懷僥幸戰兵雷合民散失命烈火飛炎一都之舍官民寺室變為灰燼留文翁石廟門之兩觀禮樂崩壞風俗混亂誦讀已絶四字不明夫禮興則民惇樂興則國化郡將陳留髙君四字不明典境迄斯十三載七字不明救民塗炭二十字不明興復學舍八音克諧鬼方來觀右周公禮殿記前所載見洪適𨽻釋後所載見史子堅𨽻格中有數字不同載之以備參考益州夫子廟碑記唐王勃述夫帝車南指遁七曜于中階華蓋西臨藏五雲于太甲雖復星蕩越三元之軌躅可尋雷雨沸騰六氣之經綸有序然則撫銅渾而觀變化則萬象之動不足多也握瑶鏡而臨事業則萬機之湊不足大也故知功有所服龜龍不能謝鱗介之尊器有所歸江漢不能竊朝宗之柄是以朱陽登而九有照紫泉清而萬物覩粵若皇靈草昧風驪受河洛之圖帝象權輿雲鳯錫乾坤之瑞髙辛堯舜氏沒大夏殷周氏作達其變遂成天下之文極其數遂定天下之象衣冠度律隨鼎器而重光玉帛謳歌反宗禋而大備洎乎三川失御九服蒙塵爼豆喪而王澤竭鐘鼓衰而頌聲寢召陵髙會諸侯輕漢水之威踐土同盟天子窘河陽之召三徽制度乘戰道而橫流千載英華與王風而掃地大業不可以遂絶由是河洛兆朕素王開受命之符天地氤氲玄聖舉乘時之䇿興九圍之廢典振六合之頽綱有道存焉斯文備矣夫子姓孔氏諱丘字仲尼魯國鄒人也帝天乙之靈苗宋微子之洪緒自玄禽翦夏浮寶玉于南巢白馬朝周戴旌旗于北面五遷神器琮璜髙列帝之榮三命雄圖鍾鼎冠承家之禮商丘誕睿下屬于防山泗水戴靈遙馳于汶上禮樂由其委輸人儀所以來蘇排禍亂而搆乾元掃荒屯而樹真宰聖人之大業也若乃承百王之丕運總千聖之殊姿人靈昭有作之期嶽瀆降非常之表珠衡玉斗徴象緯于天經贊像龍尊集風雲于地紀亦猶三階瞰月恆星知太紫之宫八桂衝霄羣嶺辨中黃之宅聖人之至象也若乃順時而動用晦而明紆聖哲于常師混波流于下問太陽亭午收爝火于丹衡滄海浮天控涓涔于翠渚西周捧夾仙公留紫氣之書東海摳衣郯子敘青雲之袂接輿非聖詢去就于狂歌童子何知屈炎涼于詭問聖人之降迹也若乃參神揆訓鍊道和倪辱太白于中郊絆乘黃于下邑湛無為之迹而衆務同并馳不言之化而群方取則雖復霓旌羽斾齊人張夾谷之威八佾三雍桓氏逼公宫之制洎乎歷階而進宣武備而斬俳優推義而行肅刑書而誅正卯用能使四方知罪爭歸舊好之田三家變色願執陪臣之禮聖人之成務也若乃乘機動用歷聘栖遑神經幽顯志大宇宙東西南北推心于暴亂之朝恭儉溫良授手于危亡之國道之將行也命道之將廢也命歸齊去魯發浩歎于衰周厄宋圍陳奏悲歌于下蔡聖人之救時也若乃筐篚六藝笙簧五典折旋洙泗之間探賾唐虞之際三千弟子攀睿化而升堂七十門人奉洪規而入室從周定禮憲章知損益之源反魯裁詩雅頌得絃歌之首備物而存道下學而上達援神敘教降赤製于南宫運斗陳經動玄符于北洛聖人之立教也若乃觀象設教三百八十四爻四十有九窮神知化應萬二千五百五十有五成變化而行鬼神觀隂陽而寄天地以鼓天下之動以定天下之疑索衆妙于重玄纂羣微于太素聖人之讃易也若乃靈襟不測睿視無涯石砮昭隼集之庭土缶驗羵羊之井稽山南望識皓骨于封禺蠡澤東浮考丹萍于夢渚麟圖鑒逺金編題佐漢之符鳯德鉤深玉䇿筮亡秦之兆聖人之觀化也時義逺矣能事畢矣然後拂衣方外脫屣人間奠楹興夕夢之災負杖起晨歌之迹撓虹梁于大厦物莫能宗摧日觀于魯丘吾將安仰明均兩曜不能遷代謝之期序合四時不能革盈虛之數適來夫子時也適去夫子順也為而不有用而不窮五教逺而微言絶十哲喪而大義乖九師爭大易之門五傳列春秋之幅六體分于楚晉四始派于齊韓淹中之妙鍵不追稷下之髙風代起百家騰躍攀戶牖而同歸萬匠驅馳仰陶鈞而共貫猶使絲簧金石長懸闕里之堂荆棘蓬蒿不入昌平之墓聖人之遺風也道揚十聖光被六虛乘素履而保安貞垂黃裳而獲元吉故能貴而無位履端于太極之初髙而無名布政于皇王之首千秋所不能易百代所不能移萬乘資以興衰四海由其輕重雖復質文交映瞻禴祀而長存金火遞遷奉琴書而罔絶蓋易曰觀乎人文以化成天下又云聖人觀神道設教而萬物伏焉豈古之聰明睿知神武而不殺者夫國家襲宇宙之淳精據明靈之寶位髙祖武皇帝以黃旗問罪仗金䇿以勞華夷太宗文武皇帝以朱翟承天穆玉衡而正區宇皇上宣宗祖之纍洽奉文武之重光稽厯數而坐明堂陳禮容而謁太廟八神齊饗停旒太史之宫六辨同和駐蹕華胥之野文物隱地聲明動天樂繁九俗禮盛三古冠帶混并之所書軌八紘閭閻兼匝之鄉煙火四極竭河追日夸父力盡于楹間越海陵山豎亥塗窮于廡下董腴廣被景貺潛周乾象著而常文清坤靈滋而衆寶用溢金膏于紫洞雨露均華栖玉燭于玄都風雷順軌丹蓂翠菌藻繪軒庭鳯彩龍姿激揚池禦殊徴肸蠁不召而自至茂祉昭彰無幽而不洽雖復帝臣南面降衢室而無為岱畎東臨陟名山而有事靈命不可以辭也大典不可以推也由是六戎宵警橫紫殿而摐金五校晨驅蹴玄雲而噴玉星羅海運嶽鎮川渟登碧墠而會神祇御玄壇而禮天地金箱玉册益睿算于無疆玳檢銀函署靈機于不竭功既成矣道既真矣歷先生之舊國懷列聖之遺漉翔赤驥而下云亭吟翠虬而望鄒魯泗濵休駕杳疑汾水之陽尼岫凝鑾暫似銅山之典乃下詔曰可追贈太師託鹽梅于異代鼎路生光寄舟楫于同時泉塗改照咸亨元年又下詔曰宣尼有縱自天體膺上哲合兩儀之簡易為億載之師表顧唯寢廟義在欽崇如聞諸州縣孔子廟堂及學館有破壞并向來未造生徒無肄業之所先師闕奠祭之儀久致飄零深非敬本宜令諸州縣官司速加營葺九隴縣學廟堂者大唐龍朔三年鄉人之所建也爾其州分化鳥境徇蹲鴟贏錦室于中區託銅梁于石地玉輪斜界神龍蟠沮澤之雲石鏡遙臨寶牒祕禺山之影天帝會昌之國上照乾維英靈秀出之鄉傍清地絡庠序由其糾合纓辨所以會同文翁之景化不渝智士之風猷自逺于是雙川舊老攀帝奬而翹心三蜀名儒相成均而變色探周規于舊宅詢漢制于新都開基于四會之躔授矩于三農之隙土階無級就擊壤于新歡茅茨不剪易曽巢于故事莊壇文杏即架椽欒夾谷幽蘭爰疏戶牖儀刑莞爾似聞沂水之歌列侍誾如若奉農山之對緇帷曉闢橫組帶于西河絳帳宵懸聚青襟于北海雖秋禮冬詩之化以洽于齊人而宣風觀俗之規實歸于上宰銀青光祿大夫譙國公諱崇義大武皇帝之支孫河間大王之長子髙秋九月振玉贙于唐丘寶算千齡躍璇虯于太渚我國家靈命東朝抗裘冕之尊宗子維城南面襲軒裳之重析玄元之緒擁朱虛之位拜玉節于秦京輝金璋于蜀郡玄機應物潛銷水怪之災丹筆申寃俯絶幽精之訟魏文侯之擁篲道在而謙尊董相國之垂帷風行而俗易司馬宇文公諱純河南洛陽人也皇根帝緒列五鼎于三朝青瑣丹梯跨千尋于十絶仲舉澄清之轡未拯夷塗士元卿相之材先登上佐氷壺精鑒遙清玉壘之郊霜鏡懸明下映金城之域縣令栁公諱明字太易河東人也梁嶽之英長河之靈沐江漢之粹精待天衢之元亨旌旗赫奕于中古圭組陸離于下葉鳯巖抽律擢曽秀于龍門驪穴騰姿吐榮光于貝闕自朱絲就列光膺令宰之榮墨綬馳芬髙踐郎官之右仙鳬旦舉影入銅章乳翟朝飛聲含玉軫臨邛客位自髙文雅之庭彭澤賓門猶主壺觴之境曠懷足以御物長䇿足以服人重泉之意訓大行單父之謳謠遂逺猶為夏絃春誦俗化之樞機西序東膠政利之根夲上祇朝憲下奉藩維爰搜復廟之儀載闡重欄之制三門四表煥矣維新十哲宗師肅焉如在將使圓冠方領再行鄒魯之風鋭氣英聲一變賔渝之俗于是侍郎幽思摛鳯藻于瓌林丞相髙材排龍姿于璧沼遺榮處士開簾詮孝悌之機頌德賢臣持節聽中和之樂其為政也可久其為志也可大方當變化立極儀刑萬宇豈徒偃仰聽事風教一同而已哉勃幼乏逸才少有竒志虛舟獨泛乘學海之波瀾直轡髙驅踐詞場之閫閾觀質文之否泰衆矣考聖賢之去就多矣自生人以來未有如孔子者也嗚呼今古代絶江湖路逺恨不得親承妙旨攝齊于遊夏之間躬奉德音攘袂于天人之際撫身名而永悼瞻棟宇而長懷嗚呼哀哉故為銘曰五帝既沒三王不歸天地震動隂陽亂飛山崩海竭月缺星圍禮樂無主宗禋遂微大哉神賢與時回博應運而生繼天而作龍躍浩蕩鵬飛寥廓奄有人宗遂荒天爵尼山降彩泗濵騰氣志匡六合神經萬類夾谷登庸中都歷試睿情貫一玄猷絶四栖遑教迹莫覯河圖違齊出宋歷楚辭吳風衰俗毁禮去朝無麟書懷卷鳯德終孤杳杳靈命茫茫天秩吾道難行斯文易失式宣六藝財成四術虛往實歸升堂入室邈矣能仁悠哉化主力制羣辟權傾終古陸離彩燦蟬聫茅土涉海輕河登山小魯皇家載造神風四極檢玉題祥繩金署德聿懷聖迹同亨天則乃睿台庭爰升衮職玉津同派金堤茂坂智士髙風文翁灘逺氓淳壤沃聲和俗願載啓仁祠遂光儒苑沈沈壼奧肅肅扃除靈儀若在列配如初槐新市密杏古壇疏楹疑置奠壁似藏書泛泛寰中悠悠天下徇名則衆知音蓋寡碝石參瓊遂風亂雅仲尼既殁天何為者大唐益州大都督府新都縣學先聖廟堂碑文并序楊炯序曰銀衡用九天門壓西北之荒銅蓋虛三地戶拆東南之野迥七星于上列大清不能潛混茫之機環四海于中州巨塊不能祕生成之業聖人有以見天下之賾擬諸形容聖人有以見天下之動行其典禮靈圖廣運百姓日用而不知神理潛行萬方樂推而不厭古者熊山南眺金崇桁上帝之居鳯穴西臨玉室考爰皇之宅五龍乘正按天讖以希微六羽提衡驗星謠而罕漫洎乎尊盧赫胥之代驪連栗陸之君皇名邁乎上玄帝圖始于中葉莫不憑三靈之寶位鼓舞隂陽籍六合之尊名財成宇宙未有貴而無位博而無名大禮由其再造大樂出其一變蕩蕩乎人無得而稱焉巍巍乎其有成功也若夫司徒立勳于天地還承帝嚳之家微子開國于商周仍纂成湯之業雖玄禽厯數推移于景宅之都而白馬旗裳赫奕于風丘之國由是千年有屬萬物知歸乾坤合而至德生日月會而明靈降奎婁胃昴風馳白虎之精角亢房心雲鬱青龍之祉君王異表儀石紐而法丹陵輔相宏姿狀臯陶而圖子産豈上鑿乾象摛光芒于北斗之宫括成地形騰粹氣于東山之曲非天下之至精其孰能與于此神冥造化德合陶鈞獲沖用于生知運幽幾于性道窮庶事之終始協庶品之自然覩者不識其靈仰者不知其德步三光于太極照曜三門含萬象于中區聲明萬國惟深也能通天下之志惟幾也能成天下之務非天下之至神其孰能與于此道尊德貴挫鋭同塵始于中都宰終于大司冦能使長幼異節男女别途路無拾遺器不雕偽姦雄獨立初明兩觀之誅正教未行仍赦同狴之罪盟齊侯而歸四邑夷不亂盟黜季氏而覆三都家無藏甲非天下之至剛其孰能與于此青光歇滅赤籙衰微一注為海岱之尊一戰有河防之霸故得三王不相襲禮亡于冦戎五帝不相沿樂入于河海是以哀生靈之板蕩痛宇縣之分崩歷聘諸侯栖遑異國其為大也法象莫之能容其為髙也黎元莫之能覩時非我與遂厄宋而圍陳道不吾行終樂天而知命非天下之至柔其孰能與于此太山不辭土壤故能成其髙滄海不讓細流故能成其大自季孫之賜我也交益親矣自敬叔之乘我也道彌尊矣于是歷郊社之所考明堂之則金人右對仍觀太祖之階斧扆前臨還訪周公之位然後刪詩書而讀易象動天地而感鬼神運百代之舟車開千齡之戶牖是故雷精日角聞道德而樞衣月頰山庭奉琴書而撰杖非天下之至文其孰能與于此智以藏往有感而必通神以知來無微而不照論五行于帝輔潛觀大皥之光揆七廟于天災預察釐王之過星流十月徴厯象于衰周日泛三江採謳謠于霸楚神無方而易無體聖人通變化之津河出圖而洛出書聖人悟興亡之兆非天下之至明其孰能與于此極天蟠地之禮俯仰揖讓之規百神于是會昌二儀以之同節非禮無以别父子兄弟親疏之序非禮無以辨君臣上下長幼之位本之于元氣徴之于太古聖足以法于九圍道足以用于八極服先王之制度黜紅紫而無施欽上帝之明威遇風雷而有變非天下之至恭其孰能與于此五行四氣十二月還相為本五聲六律十二管還相為宫至音將簡易同和廣樂與神明合契盛于中國還陳武像之容奄有四方自得文王之操南風奏雅知大舜之溫北里宣淫體殷辛之暴非天下之至和其孰能與于此悲夫日中則昃動靜之常也月滿則虧盈虛之數也自太平王佐委龍翰于芳年禮義霸臣摧獸文于華月則知天之將喪也則知道之將廢也雖復頽山壞木兆悲歌于兩楹夏棟周牆陳盛則于三禮猶使文明昭爛百王知察變之機鐘石鏗鏘萬代挹希聲之樂信可謂備物致用立成器以為天下利者莫大于聖人也既而三河失統九州之寶幣不歸四塞提衡萬里之長城繼作星祅日祲乾象暗而恆文乖禮壞樂崩彛倫斁而舊章缺洎夫碭山休氣潛膺赤帝之圖沛國真人密召黃星之録尊褒成之厚級殷崇聖之榮班學校于是大興文武由其不墜年當晉宋運拒周隋太山覆而崑崙倒天柱傾而地維絶三重赤暈還開爭戰之端千里黃埃荐有干戈之務亂離瘼矣黔首何依王室蠢然蒼生無主閭閻匝地今來為講武之場荆棘參天何日作談經之市皇家撥亂反正應天順人鼓之以雷霆潤之以風雨馳攙搶而掃穢上廓鵬雲決河海以澄姦下清鼇極今天子握大象運洪爐星重輝海重潤乾回北列垂衣裳于太紫之垣日出東方備法駕于中黃之道溟滓之無天無地盡入提封伯陽之有物有象咸乘禮節太階三襲明瑞氣于朱符中極四遊法祥光于玉燭東膠西序雲閣逢丘國號陶唐家成鄒魯遂使西山童子陳歌謠于璧水之前南國老人受几杖于環林之下乾坤之大德行矣皇王之盛節明矣江茒鄗黍晨昏薦帝之祥鳯穴麟州晷刻因天之瑞乘輿乃選吉日協靈辰詔風伯以行觀促雷師而出豫房為天駟仍施列缺之鞭斗為帝車即動招搖之柄奠玉帛奏金絲登介丘下梁甫擁神休而尊明號莫之與京按玉册而考銀繩于斯為盛于是回輿轉斾臨曲阜之郊畿駐蹕停鑾訪雲壇之軌迹若使九原可作大君得廊廟之才千載有知夫子記風雲之會即以乾封元年追贈太師禮也咸亨元年又詔曰宣尼有縱自天體膺上哲合兩儀之簡易為億載之師表顧惟寢廟義在欽崇諸州縣廟堂及學館有破壞并先來未造者遂使生徒無肄業之所先師闕奠祭之儀久致飄零深非敬本宜令州縣速加營葺新都學廟堂者奉詔之所立也因三農之暇陳復道之規考幃帳于西京訪埃塵于東魯海梁桂柱深沈風雨之津鏤檻文㮰曠望江山之表納流雲于上棟白日非遙披濁霧于中階青天在矚雕鐫暐曄窮妙飾于重欄山海髙深盡靈姿于岌宇門生侃侃如陪文杏之壇胄子鏘鏘若預崇蘭之室每至南方二月草樹華滋北陸三秋風煙搖落莫不列蘋蘩于上席行禮敬于質明奠椒桂于中樽敬神明于如在爾其邑居重復原野平蕪出江干之萬里入參星之七度龜城藹藹煥繁霞于百尺之樓蛟浦澄澄洗明月于千秋之水文翁舊學日往年歸劉禪平堂煙荒霧慘武侯龍伏猶觀八陳之圖壯士蛇崩仍辨五丁之石左巴右獠之勝域陸海三江之奧壤大都督周王皇第八子也玄元繼天而作降仙才于玉斗之庭武昭應運而生開霸業于金城之域五潢髙瑛流滋液于咸池十日旁羅散光華于若木星懸帝子遙澄井絡之郊嶽列天孫逺控彭門之野姬公以明德之重行寶化于周南曹植以懿親之賢發金聲于魯北通議大夫長史南陽來恆隨十二衛大將軍榮國公之元子申侯太嶽鎮其靈襟傅説長河昭其神彩龎士元蓄西申之逸羽始踐題輿管公明絆東道之雄姿初臨别乘朝議大夫守司馬宇文純左衛將軍靈州都督之次子台門鼎族傳呼棨戟之榮玉質金相海若河宗之寶庾氷清識得嚴令而非常桓溫貴遊無車公而不樂縣令鄭玄嘉榮陽人也東周玉裔北海金宗列矛戟之森森吐風流而蒨蒨尺兵不用瑕丘有上德之君枹鼓無聞洛陽有神明之宰丞京兆韋德工主簿扶風馬仁礪尉清河張嗣明北地傅懷愛等荆藍灼爍鄧杞枎疏許玄度入風月之清關郭林宗獲神仙之妙境南昌晦迹共梅福而齊衡左部韜真與喬玄而等列博士張玄鑒助教費仁敬等碧雞雄辨則江海沸騰白鳳宏辭則煙霞噴薄一州聞道親居典學之官四子乘風來聽中和之曲圓冠列侍執巾􅀢于西階大帶諸生受詩書于北面泮宫之上更開通德之門小學之前復見華隂之市鄉望等魚文驥子震曜于平原漢文巴姬駢羅于甲第杜陵亭長終成輔相之才桐鄉嗇夫且著亷平之號莫不公私務隟即聽絃歌隂雨時間仍觀俎豆逍遙城郭拜夫子之靈祠髣佛風塵見夫子之遺像天道之機衡莫測下問書生陽精之逺近未知來求小子當仁不讓思齊于上古之名遊聖難言有愧于中郎之石其辭曰太虛寥廓洪爐噴薄上綴二宫旁清八絡玄津獨化聖人攸作蛇柱為居龍門是託爰清爰淨惟寂惟寞龜讖韜名魚圖表靈火紀雲紀天正地正君臣禮制宇宙輝明文武既沒成康遂行羣飛海水若羽天星玉筐魯裔金符逺系鐘石雖遷山河不替乾坤降德隂陽合契虎嘯風清龍騰雲逝三元載停萬方攸濟魯道既昏綿綿若存祿移公室政在私門學而方仕謙而彌尊聽之也厲即之也溫義責齊國刑懲季孫多能惟聖道廢惟命天下莫容諸侯走聘至于是國必聞其政仁義立身溫恭成性不圖為樂終悲擊磬九野八方栖栖遑遑從周返魯考夏觀商先王道術夫子文章可久可大為龍為光星衡入室月準升堂智周通塞神兼語默幾然而長黯然而息漢承周運胡亡秦國察往知來研精茂德無必無我自南自北萬象皆宗千靈共同惟變所適居常待終樂天知命匪我求蒙北辰之北東海之東百王遺訓萬世餘風時亡玉斗運鍾陽九周井龍沉秦原鹿走生人卷舌道路鉗口禮樂崩頽典章殘朽萬邦請命三靈授手日角升圖星精應符載揚風教重闡規模數遷三紀年當五湖星芒夜指日暈朝枯環林摧折璧沼荒蕪赫矣髙祖粵若稽古丕哉文皇照臨下土坤維旁綴乾紘上補鯤化三千龍飛九五爰及列聖重規襲矩我君文思念兹在兹金鏡八海珠囊四時三雍九室秋禮冬詩絳帳語道青襟質疑載垂仙謨廣創靈祠披圖按籍逺求陳迹玉檻煙開金窗雨闢睟儀侃侃雲居寂寂弟子摳衣門人避席階列簠簋庭羅絲石地接臨邛山橫劍峯滇池躍馬沮澤蟠龍中望擊節髙門扛鐘隂靈肸蠁文雅雍容書池必變諜席常重今還古往寂寥無尚太山既頽吾將安仰梁木斯壞吾將安倣異代風行殊塗影響敢立言而徴聖冀得意而忘象全蜀藝文志卷三十五
