body:
  text: 全蜀藝文志卷三十三明周復俊編記甲南門記唐張延賓崇高莫大於君親嚴莫大於父君有覆幬父有訓育逮於夷貊生知禽獸性感不俟教解也而肖形之內戾氣間存觸瑟生災夢牛成患何代不有可勝言哉賊昢焚門亦由是也族滅門覆為愚者鑒誡所以書其所由來其餘則詞存於左右壁矣興元元年記創築羅城記王徽皇帝改元之六年諸道鹽鐵轉運兼鎮海軍節度等使開府儀同三司檢校司徒同中書門下平章事燕國公高駢奏臣前理成都築大城請記其事上命翰林學士承旨臣王徽授其功狀臣徽承詔再拜上言夫外户不閉雖前聖之格言設險以居乃有國之雄制用是則光昭振古勢讋逺夷不有高墉曷稱巨屛我之奧區粵惟井絡繁阜昌熾標出宇內先是蜀城既卑且隘象龜行之屈縮據武擔之形勝里閈錯雜邑屋填委慢藏誨盜城而弗羅矧乎西束江山南控烏滸疆理澒洞密邇舊貫因循日居月諸殆逾千祀漢魏以還英豪迭處至若公孫述之桀黠諸葛亮之經營曾不指顧留心乘機制禦斯蓋天藏盛烈神貯嘉謀俾集元功式耀雄武自二紀以降邊部戒嚴有虧懷柔或阻琮賮雖負山川之險且乏金湯之固上顧相臣曰朕以不德化罔被於四夷惟是西南載罹俶擾深軫豫𠂻將若之何丞相進曰陛下以睿哲照臨臣輔理臣不能敷聖澤以懷異俗俾流毒於益人臣之罪也然黃帝有版泉之役放勳興丹浦之師周逐玁狁漢備胸奴是知猾亂自古皆有其所以滌厲梗致時雍乃在進任忠賢馳驅英雋耳臣伏見今天平軍節度使駢即威武公崇文之孫也威武在元和中屬闢以蜀叛憲祖殷憂擇其所以伐之者由是允膺聖奬能以部兵復梓州統大軍平玉壘大節大忠煥乎典册駢能不墜其業益大其門既席勳烈之資克擅匡扶之志材超衛霍氣蓋關張忠孝兩全河山繼誓聿修厥德自成名家馳譽石麟焯有美稱出守天水邊塵不驚戎律既申將略克舉俄而交趾淪陷有命遄征既復土疆遂錫斧鉞則馬援銅柱楊僕樓船步驟之間莫得倫比固以威張惠浹後徑中權五年於兹海波不動朝廷方期拔用不可久留爰命徵還彌增寵澤時屬龎勛始潰鄆方未寧駢則再登師壇復開將幕士絶朝飢犬無夜驚威加鄰部化敷屬城相印以之疇庸和門為之增氣恭以憲宗録崇文定蜀之勳也既如彼陛下念駢復交理鄆之勤也又如此俾榮舊履重建高牙必致師貞可期俗阜上曰俞爾惟代天其行之於是詔駢復以丞相擁節去汶陽趨錦里至則詬問疾苦樹置紀綱巡按封域周覽郛郭且曰夫療疾者必在藥乎心腑然後可以堅四支植木者必嘗澤乎本根然後可以茂柯葉今城之於蜀其由心乎其由本乎則知不理於近曷能致逺不固其內安能保外未有不謀而能成不壯而能威不勞而能逸者也於是擇將量材拓開新址分命支郡以令屬邑乘時就役靡不適中吏不敢欺人不敢怠岷峨之下欣欣子來昔梁伯亟城人疲弗處子囊築郢見誚於時曷若駢能度其宜樂用其士圖難於易去危即安環以大城用冠諸夏其功固已相萬矣惟蜀之地厥土黑黎而又磽確版築靡就前人之不為非不為也蓋不能也惟駢果得衆心克大成績鳩工揆日不愆於素十旬之中屹若山峙南北東西凡二十五里擁門却敵之制復八里其高下蓋二丈有六尺其下廣又如是其上則袤丈焉陴四尺斯所謂大為之防俾人有泰山之安矣而甃碧塗塈既麗且堅則制磁飾頳又奚以異其上建樓櫓廊廡凡五千六百八間㮰梠櫛比闉闍鱗次綺疏挂斗鴛瓦凌霄若翔若飛如偃如仰栖息烏炫熀虹霓龍然而縈霞然而橫望之者莫不神駭而氣聳目眙而魂驚其始也咸謂冥助似非人力其外則繚以長堤凡二十六里或因江以為塹或鑿地以成濠則方城以為城漢水以為池又何以加焉是知摩壘者不復矜其能擊柝者足以抗其敵所謂能禦大災能捍大患者也其舊城周而復始蓋八里髙厚之制大小之規較其洪纎可得而辨矣况乎扼束都會襟帶地形險易之狀斯呈強弱之力可見自秦惠王疏翦山林以通中夏及李冰為守始鑿二江以導舟楫決渠以張地利斬蛟以絶水害沃野千里號為陸海由冰之功也漢文翁置學校勸人受業行爼豆獻酬之禮於是儒雅之風作洎威武伐叛擒大憝而新其人玉石不得俱焚焉兩蜀至今稱之駢之來鎮肇興武備俶有禦衝之事夫然後不為外羌之所窺矣惟蜀之人自冰與翁自威武暨駢乃獲佑於天者四天之於蜀厚矣長雲斷岸莫得而隳古往今來何嘗能覿傳不云乎人保於城城保於德觀駢之政可謂保城與人矣向非挺生俊傑來弼聖神則孰能建絶代之遺功創一時之偉績者乎况夫高不可踰堅不可觸俯瞰天表方駕馬足銷吞祲沴亘壓咽喉訖使豺狼耳之而色沮目之而膽禠是謂不爭而勝不戰而服者也新城成詔加大司徒封燕國公旌殊休也重以雈苻充斥荆楚傷夷遂假威望兹用底寧弓矢専征銅鹽劇任安危攸繫一以委之往哉荆渚荆渚既清又徙金陵金陵以平救鄢郢之剽殘拯江湖之焚溺期月之內罔不樂康若乃考其才稽其用所至難息所施利興智無不周技無不達韜鈐捭闔固自生知詩禮幾微雅當師逸雖羽書疊至應用如神加以詞鋒莫前筆力遒徑屢獻平戎之䇿每陳憂國之忱抑又城府坦夷器宇沖邃祿利不盈於私室夙宵無怠於公家段熲在邊未嘗蓐寢羊侃待士靡顧囊裝崕岸不可得而臻波瀾不可得而際矣所謂社稷柱石川嶽英靈者也則知駢如何臣城如何功嗚呼天贊其謀地襲其固非吾君不能用其材非臣誠不能就其事故曰為可為於可為之時則勳乃見城由駢而成駢由君而聲城既牢矣人既休矣宜乎讃盛德之形容敘勳賢之丕烈恭以操觚載事作者為難臣非其人何以稱此將欲刋諸貞石置彼坤維垂於無窮期乎不朽屬詞愈拙染翰增慙銘曰惟蜀之疆擁抱岷梁斗絶諸夏裂為一方啓達上國肇自秦強壯者五丁導彼青冥鑿岩而梯飛棧以行動猶鳥逝舉若猿輕漢人既遷言語乃通眇邈千祀遂參華風界彼邛滇靡設鍵關在古侵殘為蜀之艱唐被聖德間仍凶慝猖狂逾紀吞噬無已芟獮焚驅氓不寧居皇帝踐阼驚嗟震怒爰擇藎臣推轂以付時惟燕公撫俗訓戎碩畫宏規神輔其衷經始新城心術潛形乃告編人版築雲興相彼井鄽觀於封部調兹郡邑量其户賦劃界指期莫敢踰度蜀人未安待城以歡蜀土方危待城而威阡陌繩直門閭棊布外聳風雲內扃貔虎卉木蔥蒨麗譙輝映戎馬夜寧戈鋋書靜蜀山嶅嶅蜀江滔滔寇不敢窺人不知勞險而不煩峻而不譁去來出入嬉嬉一家燕公之德其誰與鄰燕公之功式利於人德入人深功流不極勒銘天隅為臣表則中和四年記創築羊馬城記李昊粵若蠶叢啓國魚鳬羽化於湔山望帝開基鱉靈復生於岷水然則疏鑿巫峽管鑰成都而猶樹木柵於西川跨土田於南越其後兼并梁漢睥睨巴賨獵騎奔馳會秦王於褒谷石牛來去闢蜀路於劍門空驚化玉之微寧獲糞金之利爰自朔分秦厯聲接華風代有雄豪迭為侯伯運當竒特子陽乘虎踞之機時遇非常昭烈負龍蟠之勢若乃張儀之經營版築役滿九年楊秀之壯觀崇墉功加一簣洎我唐臨御聖德昭融武威雷駴於百王文德日暉於四海惟兹益部扼彼邛關蒙王包豕突之心坦綽肆鴟張之志時或窺吾卧鼓覘我韜戎彎弧學射之山飲馬沉犀之水玉帛子女漂流鑿齒之鄉珠翠綺羅散失雕題之域纍朝是忘逸樂深軫殷憂夢卜良臣控彈巨屛南康王以儒術柔服教習詩書燕國公以將略威懷淬磨斧鉞息波瀾於錦水創制度於羅城踰百雉之恆規補一隅之闕事有備無患庇蜀人以金墉避亂蒙塵安僖皇之玉輦雲蠻稽顙遣使來朝航滇河以獻珍越沉黎而納欵當廟社阽危之際鑾輿出狩之秋坐制南荒終無北寇乃燕公之力也往以蒼穹告變天祿中微夷門方轉其斗魁王氏遂分其鼎足既而莊宗繼絶皇祚中興靈旗西指於巴庸蜀主東朝於伊洛先帝以初復地方懷逺人須仗權謀乃眷勳戚於是詔飛丹鳳召何晏於并門節立蒼龍封杜悰於井絡即我大尉侍中平原公分茅金闕受瑞彤庭帳移竹馬之邦輪輾木牛之路星馳十乘霧廓三川宣皇風於上事之初慰人望於下車之日且以城邑自經尅復勢尚搔搖公來如太華之安帝寄得磐石之固益民多福而遇賢侯公曠度涵空英風擴古襲門胄則重侯纍將保勳榮則帶河礪山會族而象簡盈牀奕葉而貂冠滿座其為盛也無得名焉頃者以龍戰玄黃虎爭區夏殺氣晝昏於日月陳雲宵蔽於星辰天柱傾欹海波動蕩鼓鼙未息干戈日尋公是時斡運璇樞端持瑶鏡贊神謀於不測斷人事以無疑獻替經綸折衝樽爼決勝廟堂之上制敵掌握之間借筯為籌舉無遺算內則翊戴天子外則承寧諸侯言正色莊有犯無隱成少康祀夏之德弼光武興炎之功再造巨唐削平新室厯數允集神器知歸皆由公叶和元勳光輔洪業是知取威定霸崇文教以興隆安上治民修理容而鎮靜足以神交旦奭事侔平參力致大同宜亨廣運以之首揚紅斾式遏錦川古有遺機待乎作者公鎮臨之始年中興之四載也嵗在丙戌春正月十有一日杖鉞而至無何期月逆帥康延孝自普安竊兵叛亂矯詔窺覦犯我鹿頭營於雒縣勢將率衆必寇近郊公曰清野待敵於民何罪堅壁而守謂我無謀况城雖大而弗嚴隍已平而可步衆情憂洶公意晏如飛羽檄以會兵伐林木而立柵森然簇戟密爾橫簫環以深溝屹如斷岸五日之內四面尋周民一其心士百其勇於是精選將領分部熊羆電激妖巢火熏狡窟一鼓而元凶氣喪載攻而同惡疲頽擒鄧艾於轞中斬龎涓於樹下長蛇碎首封豕析骸獻捷功於王廷掃逋穢於侯甸一除牙孽大定疆陲公於是提振紀綱恢𢎞典法六條巳正七德皆修言出令行家至日見未幾先皇厭世今上纂圖聖政惟新睿思求舊不改山河之寄永繄社稷之臣一年而加弭貂再嵗而升掌武將軍幕下列虎豹之爪牙丞相府中非鴻鵠之腹背猶且爵盈而不飲肴乾而不食診療生靈討論獄訟固以忠為令德孝出因心力奉國家勤修職貢琛賮縈紆於劍棧包茅旁午於玉京史不絶書府無虗目閲其庭實標出羣芳推晉文尊奬之誠紹齊桓糾合之業天子得以居南面之貴銷西顧之憂萬里長城岋然存矣公一旦謂諸將吏曰夫華陽舊國宇內奧區地稱陸海之珍民有沃野之利郛郭則樓臺疊映珠碧星輝江山則襟帶牽連物華秀麗閭閻碁布鄽陌駢羅不戒嚴陴是輕武備耳亂臣賊子何嘗不窺南詔西羌曾聞入寇將沮豺狼之意須營羊馬之城吾巳揣之衆宜協力封章上奏揆日量功分界繩基辨方畫址百城酋壯呼之響答以雲來十萬貔貅令之風行以霧集杵聲雷震版級雲排王猛鬻畚於城隅傅説飛鍬於巖下公間日巡撫役者忘疲周給米鹽均頒牢酒如般五丁之力才踰三旬而成克就厥功不愆於素逺而望也象衆山之迤邐俯而瞰也若峭壁之斗懸掘大濠以連延增長隄以固護鷙鳥搏兮可越武夫勇兮莫干摩壘者諒之摧心守陴者由之示暇舊城崢嶸而後竦新城崨嶫以前蹲並而言之若泰嶽之與梁甫亞而稱矣若夫子之與顔回重門開而洞深危樓亘而翼展至若八月之江澄寒碧七星之橋架晴虹偉乎津梁成兹壯麗公以羅城雖設智有所虧重築大敵鎮於四角嶔岑挂㟮屼栖烏儼樓櫓於泬寥懸刁斗於天表其東南也直分象耳回眺峨眉雲霞斂吳楚之天煙水送夔黔之棹其西南也旁連玉壘平望金隄宵瞻火井之光曉望雪峰之彩其東北也樹遙雲頂氣鬱金堂雨收而疊嶂屏新靄薄而重巒晝暗其西北也襟袖廣漢肘腋天彭魚龍躍萬嵗之池鸞鶴舞陽平之化其或碧雞啼曉金馬嘶風擁旄戟以登臨覩山川之形勝有以見公心同軒鏡竄讋鬼神手秉漢鈞錙銖造化能於昭代樹此豐功鄙金甌為漏巵小鐵甕為凡器其興也已當農隙其罷也不害蠶時帝旨咨嗟王綸奬録詔書敕知祥省所奏重修葺當府城池已取十二月一日興功事具悉卿寵分玉節榮鎮錦城守富貴以無疆慕功名於不朽特峻金湯之固以威蠻貊之邦况屬年豐復當農隙既暫勞而永逸亦預備於不虞益見廟謀允符朝寄省閲陳奏嘉歎殊深公猶歸善於君讓功於下諸軍馬步軍都指揮使光祿大夫檢校太保守彭州刺史上柱國李仁罕左廂馬步軍都指揮使金紫光祿大夫檢校司空守漢州刺史上柱國趙廷隱右廂馬步軍都指揮使金紫光祿大夫檢校司空守簡州刺史上柱國張知業等家傳義烈世襲丕勳托弓而霹靂聲乾揮劍而魚麗陳破曹景宗鼻頭火出薛孤延髭尾煙生英毅無儔智謀咸博左都押衙金紫光祿大夫檢校司空守蜀州刺史上柱國潘在迎等或鼎鍾舊族或書劍名門佩鞬執弭以從戎憑軾搴帷而至理至於華皓不墜忠勞是能領袖雄藩表儀會府而皆躬臨卒列統攝庶工無楊干之亂行絶趙羅之辭役明興晦息日就月將巨績告終羣才協贊自天成二年丁亥嵗十二月一日起工版築至三年正月八日畢手公再飛章上奏詔曰敕知祥省所奏修治城濠畢功事具悉百堵皆興四旬而畢亘羅城而雲矗引錦水以環流外禦蠻夷中權幃幄公家之事相業可觀備覽陳奏殊深嘉奬於以表綸綍褒揚之寵知朝廷倚注之恩其新城周圍凡四十二里竦一丈七尺基濶二丈二尺其上濶一丈七尺別築陴四尺鑿壕一重其深淺濶狹隨其地勢自卸版日構覆城白露舍四千九百五十七間內門樓九所計五十四間至三月二十五日停運斧斤其版築採造軍民共役三百九十八萬工其執事餱糧及役罷賞賚斗支稱給緡貫囊裝其數凡費一百二十萬其諸將大校出良駒於皂棧解重帶於腰圍選其纎柔釋其好玩曾無顧愛一以頒酬其縣大夫及寮佐巳下或賞之器帛或給以緡錢咸有等差不無均普公即奢從儉節事省財馬如羊而不入私門金如粟而不藏私槖悉肆公家之利盡充王事之資圖有謂之功非無度之費也公誠欲為而不載朴而無文衆意未然墻進固請四民喧闐於衙閫萬口號沸於階墀父老曰公侯政洽神明慈如父母前年定延孝之亂今嵗防蠻蛋之虞盡力城隍務安井邑遂使我等保家庇族養老寧沖如是者功德在民憂勤報國安可不敘述休烈雕篆貞珉豈不美歟何容辭也公謂諸賓佐曰抑聞乘人之約義士猶或不為貪天之功智者宜然不取所修邉備式耀國威將欲罄臣節於一時彰帝猷於萬古殊非已力難遏人情誰當遊夏之才請紀見聞之事昊相門牢落堂構蕭條翁歸文武之材明時待問荀息忠貞之志暗室不欺寐酣而白鳳昂藏染翰而墨龍夭矯嗟乎鄧禹秉鈞之嵗雖慶承家陸機赴洛之年不堪觀國空餘壯節退卜良知驅車幸返於故園提筆謬登於華館金臺玉帳敢差俊彥之肩緑水紅蓮獲繼鵷鸞之踵酷慙薄技莫贊雄猷杜征南以矜大平吳沉碑漢水竇車騎以章明出塞勒碣燕山猶能炳著簡書發揮功業寧偕巨制永固坤維尚乏黃絹之辭孰拂白圭之玷受恩稟命紀事表年巍巍乎不騫不崩何患於為陵為谷城地記明安磐吾州介山水中西北刋山為城東南濱水而堤堤即城也城東一水自北來曰江水城南一水自西來曰青衣水自西南徼外來曰沫水三水皆迅急皆會州東南皆能為州城患而沫為最夏秋之交常平城秦李冰鑿離堆以避其患唐韋臯鎮蜀時伐凌雲以殺其怒宋麴紹作斗門以走其暴凡以節兹三水也嘗聞之父老云永樂中州學在岸南數十步以今計之正當中流決囓遷徙可知矣正統中郡守段公鑑防以杉柵成化中郡守魏公瀚障以石隄自是乃得不徙州人賴焉者數十年嵗久而木朽石傾而地削州人於是復有憂色正德六年安成胡侯凖以能名自維摩移守兹土屬搗賊亂東北重以內水之變州縣戒嚴吾州人之可憂者又有出於三水之外侯時調集兵餉日不暇給乃别駕秦隴胡侯纘宗奉檄修城城立而盜不敢近别駕升秩去雨水壞城十六七侯曰豫辱守土其可使兹無城乃謀父老及大參童公瑞侍御徐公文華暨磐曰豫將城焉又曰自用兵來所在皆城然輒壞屢役不止豫將城焉而俾可久又曰州人病矣公帑有金儲倉有穀豫惟藉其力焉童公而下咸曰惟侯幸惠我嘉人乃上其事總制少保彭公澤巡撫都御史馬公昊巡按侍御王公鏜方伯胡公宗道大參邵公賁少參盧公綸僉憲郭公東山悉從侯議而郭公主張助成為尤力侯乃率執事者矢之神曰必期率事無踈緩乾沒者有幽罰八年中冬望日始事掘地深八尺萬杵齊下砌石厚凡八尺以附於上編柏為柵以附於石柵之外仍衛以土石自柵而上東城高凡十有四尺南城高凡十有六尺厚則以漸而殺上置女墻高凡五尺延袤凡六千餘尺凡石必方整合石必以灰一石不如意者雖纍數十石其上必易如其令者賞違者罰人人感侯之義莫有毫毛茍且為心者功半大水卒至叫跳衝擊漫浸者三日州人相視失色既水落城石無分寸動移者民益歡呼牽引赴事或至夜分重以澧陽汪侯儉受侯代至亦相與成之於是兹城凡八閲月而成其西北二方之未城者則汪侯之任也四方來觀者咸曰壯哉斯城未見也父老曰段侯以木魏侯以石胡侯實兼之城如是焉世世夫何憂且侯用財當而運謀審待物誠而集衆惠又能不畏騰口成兹大功不可不記以垂無極因以記委磐謂侯在州之政皆可書而兹其大者故記之是役凡用萬人木工百人鐵工五十人石工一千三百人皆計日而給餼與直鐵萬斤柏萬株灰百萬石石百萬餘片運石之舟百艘白金二千五百餘兩米一千餘斛帑儲之外侯之區畫居三之一焉於時别駕南安郭君廣徽山任君倫賓贊秦州趙文峨眉主簿章丘閻惠威逺訓導茶陵李悰或參其謀或理其事皆於兹城有功而執事董率之官與民皆遴選而勤勞者則以名姓附之碑隂梓潼移江記唐孫樵涪繚於郪迫城如蟠淫漲於秋狂瀾陸髙突堤囓涯包城蕩壚嵗殺州民以為官憂滎陽公始至則思所以洗民患頗聞前觀察使欲鑿江東壖地别為新江使東北注流五里復匯而東即堤墟舊江使水道與城相逺以薄江怒遂命武吏發卒三千迹其前謀役興三月功不可就有謁於滎陽公曰公開新江將扶民憂然江勢不可決訛言不可絶公將何以終之滎陽公曰吾欲厚其直以勸其卒可乎對曰飢卒賴厚直民惜其田以覬得不可滎陽公曰吾欲戮其將以動其卒可乎對曰代之將者必苦吾卒卒苦叛不可滎陽公曰奈何對曰夫民可與樂終難與圗始固自役興已來彼其民曰夏王鞭促萬靈以導百川今果能改夏王迹耶非徒無功抑有後災羣疑牽綿民心蕩搖前時觀察使欲鑿新江中輟議而罷豈病此耶公即能先堤民言新江可度日而決也滎陽公諾明日視政加猛決獄加斷又明日杖殺左右有所二事鞭官吏有所阻政者遂下令曰開新江非我家事將脫郪民於魚禍耳民敢橫議者死郪民以滎陽公嘗為京兆既憚其猛及是民心大栗羣舌如斬未幾而新江告成滎陽公歡出臨視班賞罷卒巳而嘆曰民言不堤新江其不決耶新江長步一千五百闊十分其長之二深七分其濶之一盤堤既隆舊江遂墟凡得田五百畝其年七月水果大至雖踰防稽陸不能病民其績宜何如哉滎陽公既以上聞有司劾其不先白詔奪俸錢一月之半樵嘗為褒城驛記恨所在長吏不肯出毫力以利民覩滎陽公以開新江受譴豈立事者亦未易耶是嵗開成五年也龍多山記前人梓潼南鄙越五百里其中有山崛起中天即山之趾得徑委延舉武三十北出其巔氣象鮮妍孕成隂煙屹石巉巉别為東巗槎牙重復爭先角逐若絶若裂若缺若穴突者虎怒企者猿踞橫者木仆挺者碑豎又有似乎飛簷連軒櫟櫨交攢欹撑兀柱懸棟危礎殊狀詭類愕不得視下有畝平砥若户庭攄乳側脈膏渟泓石俯對絶壑杪臨蘭薄仙臺標異藂石負起屹與山别猿鳥迹絶腹竇而空路由其中齗齶相望攀緣上下闖然而出曜見白日始時永嘉飛真益羅相傳永嘉中有益羅者於此臺上學道益羅於此白日上升今臺下有碑志存焉者也玄蹤斯存石刻傳聞丹成而蛻駕鶴騰天一去遼廓千載寂寞澄泉傳靈别壑絶明風間境清寂寞無聲嘉木美竹岡巒交植風來恕黑雷動崖谷山禽嵓獸捷翮互鶩曉吟暄啼聽之悽悽回環下矚萬類在目因山帶川青縈碧聨莽蒼際天杳杳不分月上於東日薄於泉魄朗輪昏出入目前其或宿霧朝雲糊空縛山漠漠漫漫莫知其端陽曜始浴徹天昏紅輪高而赤洪流激射濃透薄釋綿裂綺拆千態萬狀倐然收霽樵起來而遊泊車而休登降信宿聞見習熟始曰山乎曾未始有得乎無處夸世釣名者汚此巖扃乎且欲聞於潁陽之徒乎導水記宋吳師孟蕞爾小邦必有通流之水以濟民用藩鎮都會顧可闕歟雖有溝渠壅閼沮洳則春夏之交沈鬱湫底之氣漸染於居民淫而為疫癘譬諸人身氣血并凝而欲百骸之條暢其可得乎伊洛貫成周之中汾澮流絳郡之惡書之濬畎澮禮之報水庸周官之善溝防月令之導溝瀆皆是物也按史記蜀守冰鑿離堆穿二江成都之中皆可行舟有餘則用溉然則成都水行其中尚矣自高燕公駢乾符中築羅城堰糜棗分江水為二道環城而東雖餘一脈如帶潛流於西北隅城下之鐵窗涓涓然閏黷所及不能并蒙於一府嵗久故道迷漫遂絶以故氣象枯燥而草木亦少滋澤其五門之南江及錦江二水之名最著而渠稍廣且汙瀦填閼或瀐或潐則編户夾街之小渠可知矣間有鬱攸災以無水故艱於撲滅嚮雖以甕貯水為備然器小而善壞非應猝救焚之具故水不足用當平居無事時遑恤氣象湮塞之生疾而火災之為害歟自丞相吕公及今户部尚書蔡公深惻民患欲尋故道以達之而所遣吏類皆茍簡不能體二公之意中作而罷今寶文王公勤恤民隱目睹水事􅍀然疚懷博訪耆艾得老僧寶月大師惟簡言往時水自西北隅入城纍甓為渠廢址尚在若迹其原可得故道遂選委成都令李偲行視果得西門城之鐵窗之石渠故基循渠而上僅十里至曹波堰接上遊溉餘之棄水至大石橋承以水樽而導之其水樽即中原之澄槽也自西門循大逵而東注於衆小渠又西南隅至窰務前閘南流之水自南鐵窗入城於是二渠既釃股引而東派别為四大溝脈散於居民夾街之渠而輻輳於米市橋之瀆其委也又東滙於東門而入於江衆渠皆順流而駛有建瓴之勢而無潄齧之虞回祿之患隨處有備又頗得以潄浣湔濯焉嵗或霖潦脫有湓溢唯徹澄槽則衆渠立潐矣凡為澄槽二木閘三絶街之渠二木井百有餘所而民自為者隨宜增減不可遽數焉經始於仲春迄成於季秋言時計功盡如其素不妨民田不勞民力不逆地勢而興除亡窮之利害古之所謂有功德於民者宜無間然彼王褒紀三篇之績亷范播五袴之謠乃一時褒德之美言與夫千載澤民之實惠可同日而語哉謹書其可以備來者之詢考云淘渠記席益唐白敏中尹成都始疏環街大渠其餘小渠本起無所考各隨徑術枝分根連同赴大渠以流其惡故事首春一導渠嵗久令瀆遂懈而壅大觀丁亥冬益之先人鎮蜀城中積水滿道戊子春始講溝洫之政居人欣然具畚鍤待其行部使者議於臺俗子之無識者謗於里令既不知不可遏則又曹耦相與語曰祗論開濬積泥通逵可若何先人聞之笑不為衰止既汙泥出渠農氓爭取以糞田道無著留至秋雨連日民不告病士夫交口稱嘆多向之議而謗者也後三十年益忝世官以春末視事夏暴雨城中渠湮無所鍾泄城外堤防亦久廢江水夜泛西門由鐵窗入與城中兩水合洶湧成濤瀨居人歡趨高阜地亟遣官楗薪土塞窗決小東門水口而注之江僅保廬舍又春夏之交大疫居人多死衆謂汙穢熏蒸之咎嗣嵗春首修戊子之令邦人知疇昔便利無異辭且補築大西門外隄役引江水入城如其故而作三斗門以節之舊走馬承受廨舍之南克寧第一營疊之北有汙池積水日深大南則吞街衢為一池行人不戒誤蹈犯嵗有死者鑿此池挹池之盈以滙於大渠築短垣以護池岸兹患遂弭是嵗疫癘不作夏秋雨過道無塗潦邦人滋喜益謂僚吏嵗二月循行國邑通達溝瀆母有障塞此王者之政令長民之所當務也且前事可師獨廢之何對曰淘渠之令嵗亦一舉行里胥執府符為醉飽左契爾如豪舉之室屋權要之官寺誰敢掊視其通塞者編戶細人慮不及逺每早夜呌呼於門得所欲即去間有欲問者患不知其原委詢諸吏民各懷私意莫肯以實告故因循至此益曰今嵗繪為圖以從事矣圖可據乎皆曰圖如不可據則時雨既降必有受弊之處今積隂如霽衢路如汜掃是圖之功也益曰邑之有溝渠猶人之有脈絡也一縷不通舉體皆病按圖而治之則􅊏毫無敢鬱滯者矣益刋圖以示後之君子如有志於民意誠欲令信於斯圖也將有考焉後溪記李新大皂之水由羌域中來裂地擘山下闕岷水東分為沱西北注成都離為內外二江其一自小橋入都市有篤淵建昌安樂龜化等八橋跨水高駢廣羅城徙內江繞浮闕南之萬里橋回內江自洛陽闕三字東郭俱滙於合水尾其後溝闕二字塞圃亡灌溉人多闕厲天災流行萬井皆涸不舒不泄物無精闕二字師魯公曩鎮全蜀使治水者循大皂之源得會仁濯錦二鄉使闕二字水自曹公堰導小渠承以木樽環武庫至西樓獨府第有水而闕中無水太師魯公曰城皆吾家民皆吾子一草一木皆國中之利闕清流不闕何示不廣復鑿水溪於閲武堂後入諸郡使者之寺與闕帑藏所在園闕衡闕三字派決均受漏泉之賜逭前日桔橰抱雍瓦闕三字隋闕四字涇數斗之泥風回漪漣過靈河九里之潤公闕三字歸闕帝舜遊石闕二字三十年矣後人簡闕溪亦不治闕龍學上闕下事布政咨闕四字作新竒盡循太師魯公之治數月而政成濬開後溪故道水行如昔邦人驚喜再還舊觀且楚為掩闕三字鳩闕六字堰瀦町原防以授子木君子猶以為禮是溪之成忌者闕修怠者不修乃指為燕遊張本決不知廣澤一方備豫後世前人自有妙意某江山禠魄老不能書事槩論始終以待久逺考闕公闕十七字梓州中江縣新闕九字文同闕六字縣為江州所環因名之其闕五字綿之闕二字鹿爬山初若二帶其深財漸車至神泉始與諸谷闕三字會為闕西至於羅江南至於陽平闕東南復吞旁流乃浩漾為洪波闕於縣之西郊歷闕二字勢闕頗闕二字南注折而東斗且閼逐㢋擊左岸闕二字善崩嵗嵗內蝕若刳以刃若掃以帚邑人懦恐弗安厥居治平二年春河內廖君子孟為闕今將解去尚訪遺敝及此即行視嘆曰是將禍闕後者夫吾下為地陂而民魚有日矣於是料材課工趣闕成期補垣墊漏填築堅闕以循公而推乾之其夏大雨洚潦屢闕至此力一闕乃迤讓行復闕二字道闕三字譟踊躍闕三字德闕八字之闕七字利遺民民至於今神祀之吾廖君殄水害於吾邑吾邑之人又將何以報之哉謹當戒告子孫即其地以祠世世不敢忘也君聞之笑曰過矣此非所以盡吾之所為者曷足以云爾之德耶貢士賈汝竒等二百人還然進而言曰曰夫古之賢者凡是建立豈與夫蒙其利者必固徼其所以見思者耶蓋仁惠浹人其久愈深雖欲己之自不能矣竊謂君之懿迹與古何愧當附之金石以信於萬年君又笑曰過矣愚何當此願母言謹以謝諸君汝竒等退以圖以書詣余來文其言具如此余受之曰是可紀也乃為論次其所以云隄凡大小五其長共百三十七丈高一丈廣倍其高用人三萬計日四十五堤既成無有一人議之曰不可者噫如君者賢令矣梓州永泰縣重建北橋記文同上即位之明年永泰縣重建北橋既成其令郭君經與其佐史君潤辭有請於邑人文同曰經潤辭不佞竊廪食於此伏自念終無施短才立異效鄉者議與斯民興是役以利其往來此前人憚勞畏譏久而不克為之者工今休矣問諸左右約諸所以調用民實不艱其供而咸謂其且當然者經潤辭輒不愧宜其文紀其工敢以纍執事庶因之以傳乎無窮經潤辭幸矣同曰唯唯二君之治端幹明以潔便人謹已聞之長老舊無有也均徭賦平訴訟他人蓋亦有能之者夫何足書是舉也同嘗觀二君之為乃有志於行愛惠之深者勞躬率心旦夕惕勵暴外風露曾不以懈勤王事恤民隱古之賢吏凡不過此是可書爾二君雖不見屬同亦將件次休績揭諸華表之末以視於後人况二君所以來之意誠且願耶謹不避遜為之詞云維縣為梓之所領西上府治蓋百有三十里叢岡沓嶺圖聚邑屋疆畛蹙狹號最險下然賓旅還過此焉要隙大氏閬中清化始寧符陽諸郡所仰二川産殖繒綿絺紵荈茗刺繡雕刻鏤治之物與所市易牛騾絲繭椒蜜之貨日夜旁午絡繹駝負羸羯抗蹄裂肩如水上下故北出之道路踵相織近郭有澗自東迤西橫滙曲決峭絶傾斷自昔經制有橋甚偉以利其涉逾五十祀至和甲午夏潦洚溢逺溪逆讓噎滀不寫鎸豗嵦岸級礎崩納角楹翹虛羣版散墮日欹日陷以至大壓庸吏數易一不省問人擠溝馬還濘間則有矣維汾陽君為令之二年慈惠宣浹民實信賴諸敝已救回力圖此因倡於衆曰是橋廢圯爾所痌悼豫其爾復謂豫何者萬口一和令謀我協不煩令指願進諸辦材糧交委日謁就事於是集斤鋸會錐錚治木伐石均功授巧維武昌君適調此尉喜相厥役與令鳬藻昏旭臨視犒餉豐美作息時節咸樂其用無少倦􅚏始癸卯仲冬之丁未訖甲辰孟春之壬子幠棧杇堊一已絶手觀其橫虛亘逺夭矯虹截巨載鉤擢攢扶鎖綰覺直如削堅鞏如鑄崖亷縟緻阿榮跂竦湍瀨塘激無以泐其固風日掀暴無以液其壯百數十年之利過莫知爾既而行者止居者起田野氓𨽻閭閧賈儈提引稚幼扶翼耆耋聨行散走環擁登降睨高窺深歎息欣喜如是纍日始肯罷靜爰有杖老倚柱而歌曰昔政之鄙浸以毁兮今治之賢倐以全兮興事以時罔齎咨兮取用有度胡怨怒兮無貸之仁濟斯民兮不朽之利安此地兮同既為二君委以論撰以詳言之矣復取杖者之歌系於後刻石道下以永行人之思治平元年二月二日記通惠橋記袁輝益之南簡之西陵之北吾鄉在焉衝三洲之會民閻僅千室而商賈輪蹄往來憧憧不減大郡俯市門有長江潄其址江出源餘霜山經龍淵歷漢陽而南趨岸蹙勢迅水驟至即湍悍不可禦昔之虹梁鶴表可恃以固者輒飄蕩無幾吏苦興廢雖古遺愛至是亦多倦色民病涉久鄉僧士賢奮然以緣化從事即舊址架石磴而廣之巨石鼇背過者如步堂上又積石兩涘翼為長堤延亘凡數十尋經費不資未嘗以聞有司借民力而功成水患遂弭經始於崇寧三年十月甲子落成於大觀元年二月丁酉士賢請鄙文以志余戲謂賢曰凡物載形象閲時數寧保勿壞况石有時以泐濟凡庸悟昏憒出之沉淪俾造聖域其功利孰與是多賢曰若然豈可無相亦安用子言為土圯木朽繩絶船危石且然爾吾且妄作之子其為我妄言之余嘉僧之誠能遊戲成如是功德竊願絺繪章句華艷其事為來者勸適預能書隨計偕方伯戒行甚邇聊書嵗月云大觀元年記萬里橋記劉光祖維蜀慕王化通中國最為古逺載籍之傳尚矣至周武王牧野之誓史官書之曰庸蜀羌髳微盧彭濮人則其附聲教識仁暴槩見於經矣獨秦見伐資以取楚儀錯之爭是也而儀城具存至今自秦置守李冰通二渠為蜀萬世利今萬里橋之水蓋秦渠也是則蜀號陸海蕭何藉之以基漢漢興五六十載文翁守蜀始取蜀秀民立學官教之學比齊魯而司馬相如之文遂擅天下晚有揚雄氏續孟荀之絃於漢之既衰漢祀中絶公孫述竊據蜀蜀人以死抗述者班班風節又凛乎東京之首也其後諸葛孔明用蜀以公信仁義懷而服之法度修明禮樂幾於可復夫歷周秦兩漢千有餘年至孔明而以蜀通吳抗魏三分天下存漢社稷雖號霸業實宣王風蓋孔明學探伊傅而迹并管樂蜀人到今矜而誦之不忘今羅城南門外笮橋之東七星橋之一曰長星橋者古今相傳孔明於此送吳使張溫曰此水下至揚州萬里後因以名或則曰費禕聘吳孔明送之至此曰萬里之道從此始也孔明沒又千載橋之遺迹亦粗具非有所甚壯麗偉觀也以千載之間人事更幾興廢而橋獨以孔明故傳之亡窮其説雖殊名橋之義則一厥今天下兼有吳蜀朝廷命帥其逺萬里蓋受孔明之任以來由蜀走闕道亦如之其於此橋孰不懷古以圗今追孔明之道德勳庸而思髣佛其行事侍御趙公之鎮蜀也始至謁古相祠即命葺之明年作祠廟於其故營又明年新其故宅廟貌每曰諸葛公三代遺才也用法而人不怨任政而主不疑非天下之至公其孰能與於此今其遺迹所存尚多而萬里橋者乃通吳之故事前帥沈公常修廣之猶陋弗稱且易壞久將莫支則命增為石魚釃水為五道梁板悉易以木而屋之橋成耽耽屋成繩繩嚴嚴翼翼都人大和會觀所未有民不知役而公亦樂之風煙渺然岸木秀而川景麗公與客登此蓋未嘗不徘徊而四顧也雖然兹橋也過而弗能玩玩而弗能思者衆矣如公所懷風景抑末耳神交千古又安知諸葛公通吳之志亦未嘗一日不在於中原也乎光祖忝公元僚公命光祖為之記記其大者而遺其細蓋將以大者望公俾公之功名垂千萬世若曰橋美名公又與之為美觀非知公者知公莫如光祖駟馬橋記京鏜出成都城北門不百步有橋舊名清逺凡自他道來成都者必經焉清獻趙公所編成都集記最為精詳余因究清逺得名之自則成都有橋七謂象應七星獨清逺不與及究司馬長卿題柱之所名升仙者乃在數然其説謂當在上流五里今之名升仙者在下流七里集記巳疑其非古矣余謂長卿負飄飄凌雲遊天地之意氣發軔趨長安時欲與蜀山川泄其不平其操筆大書當於萬目睽睽之地決不在三家市無疑也况象應七星之義必其屈曲連屬不應升仙獨與他橋相遼絶陵谷有變移册牘有缺逸竊意近時之清逺即昔日之升仙不然九逵之衝百堞之旁一杠梁如此反不載於成都集記何耶集記作於國朝使清逺之名果得於古清獻公豈肯略之於簡編之外余久欲訂正之而無其因先是橋𨽻邑尉邑尉多茍且逭責疊石編木工不精良不惟簡陋視會府弗稱嵗久石泐木且折勢將圮敗過者病焉乃於農隙水涸時撤而新之取長卿題柱之語扁以駟馬因去清逺不經之名記其辨也不廢升仙相仍之地存其疑也或曰是則然矣無亦以貴富期待蜀士耶曰余何敢淺待蜀士余所期待又在貴富外名當傳信稽事考迹曰駟馬為宜粵自六丁開蜀參井岷峨之英靈恥秦不文德不忍度劒關者百七十有餘年至漢文翁守蜀始振發之長卿實鍾其英靈者首入帝京以雄麗溫雅之文動萬乘震一時其後蜀士接軫以進者皆長卿破其荒議功當為文翁亞文翁創興之學長卿經行之橋事雖不侔迹皆不當蕪沒余來成都學宫欹傾欲壓已改築棟宇人謂自成均而下無此壯觀似足以侈文翁化俗之萬分兹建橋以駟馬名自是長卿之遺蹤亦不泯矣若曰長卿非全德不為蜀士所多則非余訪古名橋之意也橋石其址以釃水如堆阜者二屋其背以障風雨如樓觀者十有五楹板其虛距江底高二十有二尺其修十有七丈其廣二丈甃南北兩涘以禦衝決翼東西兩亭以便登覽經始於故嵗十二月之戊戍告具於今嵗四月之庚辰是役也取餘於公帑則民不知擾責成於寮宷則官無妄費易名以辨千古之疑則所傳或不朽持是以紀於石尚庶幾無愧辭云王公隄記韓已百梓襟帶二江嵗病泛溢大抵武弱而患小涪悍而患大此王公隄之所以築也涪脅東山迮不得肆蛇行西折薦蝕城址月積嵗漲故其患視武相絶先是府牧繼植長堤橫遏江要母使西顧己未仲秋一夕暴溢高出隄背十有八尺平睨城闉州民惴恐江落隄潰中流之揵蓋僅有存者閭丘公泳議新厥圖營度甫畢以命入覲謀用中格逮提刑王公通攝府事躬相其宜乃度水所嚮退依江堧伐石為隄三分其役臺任其一凡役之𨽻於臺者幕屬董之府任其一凡役之𨽻於府者職寮董之郪任其一凡役之𨽻於邑者令佐董之部分既定以次受地人競於功不戒而勸隄成北自劉公隄之缺南至考功隄之址其長上下總二千六百尺有竒自是嵗十月辛丑至明年三月癸亥其程得百四十日有竒役以工計凡三萬八千四百錢以緡計十分工役之數而一之糧以石計五分緡錢之數而二之隄崇十有六尺級而兩之以防圯跌沿壕起土為堤崇八尺廣稱之以備泛溢江獲安行無所迫厄寂如循牆緩驅徐去隄亦屹嶫延袤霞截虹卧堅不可犯父老縱觀歡呼舞手知環城萬室自今足倚此以為命矣於公虛心體道於世無纍植德不計於物利物不計於功仁風惠澤洋溢蜀左且無幾微見於顔面是區區者磨東山之石以侈不朽於公何有惟夫規畫之詳金粟之耗工役之度使寂寥無述來者莫考是無以永邦人之賜於無窮也用敢特書以詔世世俾勿壞公名勳字有功崇慶人蓋今日西南宿德云慶元庚申六月初八日門生文學掾韓已百記門生府簽判許奕書灌縣治水記明盧翊蜀守李公冰鑿離堆以利蜀刻深淘灘淺作堰六言於石立萬世治水者法所以制水出入為旱潦計者至矣其用功緩急踈密之序意自較然漢晉以來率用是法永嘉間李公嬴深韙之唐宋相承世享其利元始肆力於堰無復深淘之意無乃公言不足法歟假令沙石湧磧水不得東潤則雖鎔金連障高數百尺牢不可拔亦何取於堰哉矧所謂鐵龜鐵柱糜費幾千萬緡者曾未幾何輒震蕩湮沒茫無可賴方諸籠石亷省今古便焉者孰得比來民受其困宜坐諸此豫竊少之乃檄府司置鑱钁巨蘲役夫三千從事灘磧以導其流堰則仍民之便而已顧工多日少羣力告瘁未能勉其所欲為究其所當止如公法言者恥也舊刻相傳在虎頭山鬭雞臺水側其旁嵗久剝落索弗獲慮後之君子無考焉因磨石重鎸碑側云景州曹侯開道濬川序陳南賓梁居荆揚上遊其山連峰接岫道狹僅容足其難如登天行者或四步五步六步七步乃止憩焉氣促汗流竟日不一二程山谷之水會而為川奔悍奮擊篙師一失舟楫不可復救羌夷憚於輸貢商旅怯於往來而拊膺之歎鏟嶂之意所以不能已於李杜之詩之感也然自有天地即有此山川不知其幾千萬年禹治洪水别九州第梁於八岷嶓之既藝沱濳之既道蔡蒙之旅平和夷之底績功無以加自時厥後若五丁之開峽李冰之鑿山亦足尚矣景川曹侯承天子命來蜀以開道濟川為己任凡東跨永寧西抵松茂南接雲貴北連棧道分方命官指畫規略曰某水也若是而導之某道也若是而闢之某石也若是而鑿之其思慮皆出人表官屬奉命惟謹經始於洪武辛未訖工於壬申中以農事輟者凡三月四塞之險官屬各有攸司而永寧建昌則又險之險者侯親視之運巧思鑿巨石通河道為灘者一百九十有三運土木塞險阻以取直徑為橋者五十有四故至雲南大理西畨箐原其驛鋪皆堅固縝密不為一時茍且計其用心亦勤矣既而西北皆以成功告悉如侯指於是輸貢者無難色往來者無愁歎聲使李杜生於今日豈無詩歌以美之哉噫人情可與樂成而不可與慮始當侯之經營也衆莫不曰蜀之險阻天造地設自開闢以來未之或治今兹之舉無異於愚公之移山也徒斃民耳惟侯不惑於衆人之議而決諸一心躬任其責雖暑雨祁寒不避以八月之勤勞而成千百年之利蓋智者之所為衆人固不識則聖皇之所特命而責成者夫豈偶然之故哉宜勒諸堅岷以示來者侯名震鳳陽人渠縣重修琅琊四橋記吳伯通渠古邑也地介夔梓之間而𨽻於果凡泝沿巴峽往來於蜀者或捨棹於萬而西上或振䇿自益而東下必道渠渠亦蜀之要衝也其東崇山亘千里自北而南渠江循山西四十里與並馳山中之水破山旁出西走而奔注焉官道出江山間故多涉溪澗入渠境凡涉溪四琅琊其大者每山雨則湍流澎湃怒號而激撞橋輒壞阻溺震駭沾濕行道病焉成化丙午春洪都秦侯自諫垣出二守廣安道出於兹目橋之圯閔行之難其心惻焉思濟其難下車未幾適承檄往攝渠治視篆之日選於衆舉義官邵君本乾及吳某以作橋事委之侯膚敏闓爽樂易近民敷政聽訟既明且恕務不咈乎人情浹旬彌月渠人翕然順之而邵等忠勤幹固克濟其謀悅以先民而鼓舞之相與捐資鳩工伐石於山治以為梁琅琊功大費博其上下三小溪省三之二肇功於夏五月及農隙也不踰時而四橋成侯率邑文學偕往落之喜邵等之急於趨事以能有成功也賦詩奬之首尾云隱隱虹橋卧急湍平平官道雨初乾行人欲問經營事白髮烏紗兩義官蓋不有其功而歸諸下可謂有功而不德能謙君子也邵不敢居捧詩謁豫山中為道顛末且曰是役也勞心者我侯勞力者我民吾輩受命率衆終其事勞何有焉願為記之以彰我侯之德我民之良能無忘今日也夫子嘗曰君子學道則愛人小人學道則易使也吾聞其語矣今見其人也安可無言易曰天施地生其益無方蓋天地之交隂陽之應一施一受氣通德合故萬物以成君臣天地也上下隂陽也君施臣承上令下從相交相應志符道洽故萬事以成凡父子夫婦之相與以成厥家皆是理也明乎此而行之謂之學道是故以上則愛以下則順侯之愛一生於心遂發於事克承君施而且能令學道之功不可誣也田野之民初未嘗學一令之以道其順上命以共成其事乃知此道在人心信其固有而非逺也獨恨無以咨之者則凡違令豈皆民之罪哉方今聖君大德猶天施至溥也慨夫臣工有學焉有弗學焉或學焉而不知道鮮克順承而致之民以牖其心使知順上之道故政事日隳而上貽國家之憂豈有他哉利欲汨其心耳夫人臣惟利為懷則獵取漁奪何所不至至於怨訴並興猶昧自反而槩曰民頑忿疾橫加焉於是民無樂生之心災害作矣嗚呼俗焉弊也久矣可勝言哉蓋吾見亦夥矣若侯是舉殊異常事真可以愧衰俗而振勵之也據春秋重用民力法當得書而事可訓又不可不書故書侯南昌人名某字叔熙乙未進士刑科給事中以言事謫官出二吾郡云中江縣余嶺新道記張翀中江當兩川雲貴秦隴行旅之衝實劍外劇縣縣西二十里有山曰高崖壁立雲矗俯瞰羣峰勢與青城大峨伍山之麓故有鋪曰雙魚踰雙魚五里溪水自北下夏秋交輔以行潦其悍滋甚有司者常橋之號曰高橋橋西上數里為鋪曰飛黃之上十里曰方基又十里曰走馬自雙魚而上逆坂重峴時相勾連巨細石鋩贔屭齒齒行者必擇地然後可投步至走馬稍巳又所在乏水泉當溽暑時公私往來無以濟渴不死則病循縣西五里出雙魚之北歷兩河口蠻洞直距方基走馬之間一徑弦直可通轍迹而少迂回演迤艱難攀跨之狀夾徑有井或寒泉錯出石罅沕潏漫羡其聲淙淙疑所謂井泄不食者官道不出於此而出於彼何也新建余侯祺來令之五年不為苛皎之政縣以無事乃屬其土人而告之吾聞道茀不治司空不視塗澤不陂川不梁周單子所以知陳之亡也今官道之利害前人之智非不能及此而不肯一舉手或有意舉手而奪於羣咻憚而不為智及之而不為不仁憚於人言而不為不勇吾無以令為也兹將舍其迂而就其直棄其險而從其易僉其謂何皆應之曰然遂以嘉靖四年十有一月庚申刋木夷穢鑿兩河蠻洞之道而通之下上連延僅二十里廣加故道三之一并徙雙魚飛黃方基三亭於形勢之便區取南之直以易北不傷於民撤舊亭之材以為新不費於財首尾兩閲月厥工告成而縣之人忘其勞塗之人始得便周行之安也兩河當高橋上遊十里其患差小乃廢高橋舊趾改創石橋二於其上為橋之空各三橋之陽為亭一不侈不陋亢爽可喜榜之曰仰止以休行役之士大夫凡所規畫悉適人意旄倪歡呼如出一口按察使吕君道夫適以入覲過而嘉之更舊鋪之名雙魚者曰余嶺飛黃曰平易方基曰便民用慰山靈而視後來君子於是知余侯之善為政也豫方戍瞿門縣博士李載陽不惜二千里走書曰願有記按周禮合方野廬二氏皆以道路為職凡舟車轚互敘而行之不使窒閡而月令以季春之月周視原野開通道路為訓三代之有司治其職以待四方之賓旅者詳矣蓋秉禮立制而授之官師細大具舉而纎悉無恨此所以為先王之法非後世所及也去古益逺士之工於取名者贏詘之不知而敝所恃以侈耳目之觀其齪齪者視民之利害恬然不以動其心偷得避嫌以茍朝夕要之二者其操心之私均也然則為今之吏能舉事以貽百世之利非役志以干譽而求益也而民不以為病蓋仁者之勇矣於先王之法又深得其遺意雖欲不記其可乎侯字原貞宋尚書襄公靖之後丁卯鄉進士其興學慎獄懾姦惠民之政皆有明法往嵗寧賊之亂潔身以去志操凜凜薦紳間多能誦之者載陽雲南趙州人及典史徐朝進皆嘗贊是役法得附書平蟇頥灘記安磐蜀之灘以千計戎州之西最險戎以西灘以百計犍為之蟇頥最險灘在犍為四十里石闕中橫江水走其上前壅後迫勢不得不起而立衝撞噴薄呌號怒激聲聞十數里外舟人上下咸重足變色睜目屏氣以幸無事一失其勢輒破壞漂溺不可救人死是灘者嵗以千數也昔李冰守蜀鑿豚崕以避沫水之害豚崖在嘉州犍為犍為嘉屬邑也相去不遠不應舍之不治然冰之治水也多沈犀以彈壓湍急揵為故有沈犀驛豈冰嘗治之而無成歟抑江流變遷當時水由他道而無是險歟不可知也正德丙子蘄陽張公思齊以憲僉行縣邑人赴訴萬口一辭時適有幾公可與事公進諸生而語之吾受天子命官以水利為名豈一一利之去害乃所以為利也計度安出諸生曰濬其西岸水析而西灘其可夷公曰然吾意如是驗其同耳具事委曲得俞監臨監臨者巡按監察御史盧公雍也乃卜乃虔臨江用牲萬夫齊奮身自為督壅石為堤以木為捍既鑿既疏自下而上時天大寒雪雨交集公撤去麾蓋勞來巡行率至夜乃息凡在役者益感公意併力趨事兩月告成導江之日人士走觀空其一邑歡呼嗟嘆不圖成功乃至於此由是灘險遂虛而夜亦可航矣州倅任君倫邑令王君大衢於斯役與有勞者率諸生余恭周德詣磐曰代來之險平之一日積嵗纍年無一舟覆公功大矣記其可無磐辱公同年與聞始議用紀成事曷其敢辭聞之活千人者其後必大公之所活何止千人大不大於公無與而吾人之頌功受賜家户尸祝當與此江終矣公去蜀之十年始得次而書之屬邑簿王君某刻石以垂無極城東新泉記黃景夔城東新泉故泉也故泉曷曰新日以其故之辱也始浚之若新焉曷曰故之辱出城東百餘步大凃之旁維泉之源脈長而甘城中井鹵人莫汲汲城之外東門之人資斯泉顧獨出石間僅勺挹不受巨器浸漬溪流泛淖沮洳牛馬之過飲之且溲焉汲者守泉不得則於溪匪注盈汰澄不可汲踵踵競次旱則復於泉沍冬尤艱剖氷取饔人息爨俟水之至不及則于北泉又逺難致論者咸病東泉云豫郊行過泉而喟曰泉哉泉哉曷居於此爾資之深而功不溥質甚美而蒙不潔斯非爾泉辱哉乃心惻而新斯泉曷曰新役夫雲集下具如雨巉穿嵯斫深入齒齒泓然成池汲者如攜不次不勞不獨利東門城之中咸汲焉崇之方臺庇之峩亭曲闌四周㽎如間如幽蔭寒冽炙燠之所不及牛馬之迹無緣而來觀者顧嗟不識其故故曰新既成飲亭下顧泉而賀曰嘻泉哉自有天地即有爾泉豈無主翁咸莫爾顧兹維新在我慶爾泉之遭繆豫理守罔敢茍安濬清濯汚託風在泉竊志焉抑謂我留情事外不急簿領迹亦似之知我乎將由爾泉乎罪我乎將由爾泉乎爾乃扁亭曰城東新泉而刻語於石樹亭中全蜀藝文志卷三十三
