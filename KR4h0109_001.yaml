body:
  text: 全蜀藝文志卷一明周復俊撰賦一蜀都賦漢揚雄蜀都之地古曰梁州禹治其江渟臯彌望鬱乎青葱沃壄千里上稽乾度則井絡儲精下按地紀則川宫奠位東有已賨綿亘百濮銅梁金堂火井龍湫其中則有玉石嶜岑丹青玲瓏邛節桃枝石䲛水螭南則有犍牂潛夷昆明峩眉絶限㟍嵣嵁巖亶翔靈山揭其右離堆被其東於近則有瑕英菌芝玉石江珠於逺則有銀鉛錫碧馬犀象僰西有鹽泉鐵冶橘林銅陵邙連盧池淡漫波淪其㫄則有期牛兕旄金馬碧雞北則有岷山外羌白馬獸則麙羊野麋罷㹈貘貒􅪲鹿麝户豹能黃獑胡雖玃猿蠝玃猱猶豰畢方爾乃蒼山隱天汾崯回叢增嶄重崒􅰗石􅵏崔􅱕􅱓嶵㟴霜雪終夏叩巖嶺嶙崇隆臨柴諸徼崼􅒈五矹參差湔山巖巖觀上岑嵓龍陽纍峗漼粲交倚􅞐崒崛崎集嶮脅施形精出偈堪􅨅隱倚彭門嶋㟅􅛜嵃嵑㞹方彼碑池􅲡􅴁輵􅦌礫乎嶽嶽北屬崑崙泰極涌泉醴凝水流津漉集成川於是乎則左沉犂右羌庭漆水浡其胸都江漂其涇乃溢乎通溝洪濤溶洗千湲萬谷合流逆折泌瀄乎爭降湖潧排碣反波逆濞􅀈石冽巘紛􅀢周溥旋溺寃綏頽慚博岸敵呷祽瀨磴巖摚汾汾忽溶闛沛踰窘出限連混陀隧銍釘鐘涌聲歡薄泙龍歷豐隆潛延延雷扶電擊鴻康􅀈逺逺乎長喻馳山下卒湍降疾流分川並注合乎江州於木則楩櫟豫章樹榜􅀈櫖禪柙青稚雕梓枌梧橿櫪㯕楢木㮨丫信楫叢俊幹凑集􅫩㭈楬圠樘椅從風推參循崖撮捼涇淫溶繽紛幻靡泛閎野望芒芒菲菲其竹則鐘龍䇣􅀢野篠紛鬯宗生族撍俊茂豐芙洪溶忿葦紛揚㮻合柯與風披夾江緣山尋卒而起結根才業填衍􅂒野若此者方乎數十百里於汜則汪汪漾漾積土崇隄其淺濕則生蒼葭蔣蒲藿芧青蘋芊葉蓮藕茱華菱根其中則有翡翠鴛鴦裊鸕鷁鷺雙鶤鷫鷞其深則有遍獺沈鱓水豹蛟蛇黿蟺鱉龜衆鱗鰨􅰋爾乃其都門二九四百餘閭兩江珥其市九橋帶其流武擔鎮都刻削成蘝王基既夷蜀候尚叢邛籠石岓岑倚從秦漢之徙元以山東是以隤山厥饒水貢其獲苴竹浮流龜鱉磧石蝎相救魚酌不收􅵑􅳰鴝䳨風胎雨鷇衆物駭目殫不知所禦爾乃其祼羅諸圃􅀈緣畛黃甘諸柘柿桃杏李枇杷杜樼栗奈棠梨離支雜以梴橙被以櫻梅樹以木蘭扶林禽爚般關㫄支何若英絡其間春機楊栁裊弱蟬抄扶施連卷􅀈貕螳蛦子􅶟呼焉爾乃五穀馮戎瓜匏饒多卉以部麻往往薑梔附子巨蒜木艾椒蘺蒟醬酴清衆獻儲斯盛冬育筍舊菜增伽百華投春隆隱芬芳蔓茗熒郁翠紫青黃麗靡螭燭若揮錦布繡望芒兮無幅爾乃其人自造奇錦紌繏􅳴䋶縿緣盧中發文揚采轉代無窮其布則細都弱折綿繭成衽阿麗纎靡避晏與隂蜘蛛作絲不可見風筒中黃潤一端數金雕鏤鉛器百伎千工東西鱗集南北並凑馳逐相逢周流往來方轅齊轂隱軫幽輵埃㪍塵拂萬端異類崇戎總濃般旋闤闠齊􅀈楚而喉不感槩萬物馳凑四時迭代彼不折貨我罔之械財用饒贍蓄積備具若夫慈孫孝子宗厥祖禰鬼神祭祀練時選日瀝豫齊戒襲明衣表𤣥縠儷吉日異清濁合疏明綏離旅乃使有伊之徒調夫五味甘甜之和勺藥之羮江東鮐鮑隴西牛羊糴米肥䐗􅬨􅝤不行鴻􅀈􅰄乳獨竹孤鶬炮鷁被紕之胎山􅍪隨腦水遊之腴蜂豚應鴈被鴳晨鳬戮鶂初乳山鶴既交春羔秋􅔺膾鮫龜肴粳田臑鷩形不及勞五肉七菜勝厭腥臊可以練神養血腄者莫不畢陳爾乃其俗迎春送於百金之家千金之公乾池泄澳觀魚于江若其吉日嘉㑹期於倍春之隂迎夏之陽候羅司馬郭范畾楊置酒乎榮川之間宅設坐乎華都之髙堂延帷揚幕接帳連岡衆器雕琢藻刻將星朱緑之畫邠盼麗光龍蛇蜿蜷錯其中禽獸竒偉髦山林昔天地降生杜鄠密促之君則荆上亡尸之相厥女作歌是以其聲呼吟靖領激呦喝啾戶音六成行夏低徊胥徒八冥及廟噆吟請連單情舞曲轉節踃馺應聲其佚則接芬錯芳襜袩纎延􅟩淒秋發陽春羅儒吟吳公連眺朱顔離絳脣眇眇之態吡噉出焉若其遊怠魚戈郤公之徒相與如平陽􅀈巨沼羅車百乘期㑹投宿觀者方隄行船競逐偃衍㯳曳絺索恍惚羅畏瀰澥蔓蔓沕沕蘢睢䁨兮罧布列枚孤施兮纎繁出驚雌落兮髙雄蹶翔􅀈挂兮奔縈畢爼飛膾沉單然後别蜀都賦晉左思有西蜀公子者言於東吳王孫曰蓋聞天以日月為綱地以四海為紀九土星分萬國錯跱崤函有帝王之宅河洛為王者之里吾子豈亦曾聞蜀都之事歟請為左右揚榷而陳之夫蜀都者蓋兆基於上世開國於中古廓靈關而為門包玉壘而為宇帶二江之雙流抗峨眉之重阻水陸所凑兼六合而交㑹焉豐蔚所盛茂八區而菴藹焉於前則跨躡犍牂枕輢交趾經途所亘五千餘里山阜相屬含溪懷谷岡巒糾紛觸石吐雲鬱葐蒀以翠微崛巍巍以峨峨干青霄而秀出舒丹氣以為霞龍池􅘝瀑濆其隈漏江伏流潰其阿汨若湯谷之揚濤沛若濛汜之涌波於是乎邛竹緣嶺菌桂臨崖旁挺龍目側生荔枝布緑葉之萋萋結朱實之離離迎隆冬而不凋常曄曄以猗猗孔翠羣翔犀象競馳白雉朝雊猩猩夜啼金馬騁光而絶景碧雞倏忽而曜儀火井沈熒於幽泉髙爓飛煽於天垂其間則有琥珀丹青江珠瑕英金沙銀礫符采彪炳暉麗灼爍於後則却背華容北指昆崘緣以劒閣阻以石門流漢湯湯驚浪雷奔望之天回即之雲昏水物殊品鱗介異族或藏蛟螭或隱碧玉嘉魚出於丙穴良木攢於裦谷其樹則有木蘭梫桂杞櫹椅桐棕椰楔樅楩楠幽藹於谷底松柏蓊鬱於山峯擢修幹竦長條扇飛雲拂輕霄羲和假道於峻岐陽烏回翼乎高標巢居栖翔聿兼鄧林穴宅奇獸窠宿異禽熊羆咆其陽鵰鶚鴪其隂猿狖騰希而競捷虎豹長嘯而永吟於東則左綿巴中百濮所充外負銅梁於宕渠內函要害於膏腴其中則有巴菽巴㦸靈夀桃枝樊以葅圃濵以鹽池􅨧蛦山棲黿龜水處潜龍蟠於沮澤應鳴鼓而興雨丹沙赩熾出其坂蜜房郁育被其阜山圖采而得道赤斧服而不朽若乃剛悍生其方風謡尚其武奮之則賨旅玩之則渝舞鋭氣剽於中葉蹻容世於樂府於西則右挾岷山湧瀆發川陪以白狼夷歌成章坰野草昧林麓黝倏交讓所植蹲鴟所伏百藥灌叢寒卉冬馥異類衆夥于何不育其中則有青珠黃環碧砮芒消或豐緑荑或蕃丹椒蘪蕪布濩於中阿風連莚蔓於蘭臯紅葩紫飾柯葉漸苞敷蘂葳蕤落英飄颻神農是嘗盧跗是料芳追氣邪味蠲癘痟其封域之內則有原隰墳衍通望彌博演以潜沫浸以綿雒溝洫脉散疆里綺錯黍稷油油粳稻莫莫指渠口以為雲門灑滮池而為陸澤雖星畢之滂沱尚未齊其膏液爾乃邑居隱賑夾江傍山棟宇相望桑梓接連家有鹽泉之井户有橘柚之園其園則有林檎枇杷橙柿梬楟榹桃函列梅李羅生百果甲宅異色同榮朱櫻春熟素奈夏成若乃大火流凉風厲白露凝微霜結紫梨津潤樼栗罅發蒲桃亂潰石榴競裂甘至自零芬芳酷烈其圃則有蒟蒻茱萸瓜疇芋區甘蔗辛薑陽蓲隂敷日往菲微月來枎疏任土所麗衆獻而儲其沃瀛則有攢蔣叢蒲緑菱紅蓮雜以藴藻糅以蘋蘩揔莖柅柅裛葉蓁蓁蕡實時味王公羞焉其中則有鴻儔鵠侣䳲鷺鵜鶘晨鳬旦至候鴈銜蘆木落南翔冰泮北徂雲飛水宿哢吭清渠其深則有白黿命鱉𤣥獺上祭鱣鮪鱒魴鮷鱧鯊鱨差鱗次色錦質報章躍濤戲瀨中流相忘於是乎金城石郭兼匝中區既麗且崇實號成都闢二九之通門畫方軌之廣塗營新宫於爽塏擬承明而起廬結陽城之延閣飛觀榭乎雲中開髙軒以臨山列綺窗而瞰江內則議殿爵堂武義虎威宣化之闥崇禮之闈華闕雙邈重門洞開金鋪交映玉題相暉外則軌躅八逹里閈對出比屋連甍千廡萬室亦有甲第當衢向術壇宇顯敞髙門納駟庭扣鐘磬堂撫琴瑟匪葛匪姜疇能是恤亞以少城接乎其西市廛所㑹萬商之淵列隧百重羅肆巨千賄貨山積纎麗星繁都人士女袨服靚粧賈貿墆鬻舛錯縱橫異物詭譎竒於八方布有橦華麵有桄榔邛杖傳節於大夏之邑蒟醬流味於畨禺之鄉輿輦雜沓冠帶混并纍轂疊跡叛衍相傾喧譁鼎沸則哤聒宇宙嚻塵張天則埃蒙曜靈闤闠之裏伎巧之家百室離房機杼相和貝錦斐成濯色江波黃潤比筒籝金所過侈侈隆富卓鄭埒名公擅山川貨殖私庭藏鏹巨萬鈲摫兼呈亦以財雄翕習邊城三蜀之豪時來時往養交都邑結儔附黨劇談戲論扼腕抵掌出則連騎歸從百兩若其舊俗終冬始春吉日良辰置酒髙堂以御嘉賔金罍中坐肴核四陳觴以清醥鮮以紫鱗羽爵執競絲竹乃發巴姬彈弦漢女擊節起西音於促柱歌江上之􅥝厲紆長䄂而屢舞翩躚躚以裔裔合樽促席引滿相罰樂飲今夕一醉纍月若夫王孫之屬郤公之倫從禽于外巷無居人並乘驥子俱服魚文𤣥黃異校結駟繽紛西踰金隄東越玉津朔别期晦匪日匪旬蹴蹈蒙蘢涉躐寥廓鷹犬倐眒罻羅絡幕毛羣陸離羽族紛泊翕響揮霍中網林薄屠麖麋剪旄塵帶文蛇跨雕虎志未騁時欲晚追輕翼赴絶逺出彭門之闕馳九折之坂經三峽之峥嶸躡五屼之蹇滻㦸食鐵之獸射噬毒之鹿皛貙氓於葽草彈言鳥於森木拔象齒戾犀角鳥鎩翮獸廢足殆而朅來相與第如滇池集于江洲試水客艤輕舟娉江斐與神游罨翡翠釣鰋鮋下髙鵠出潜虯吹洞簫發櫂謳感鱏魚動陽侯騰波沸涌珠貝汜浮若雲漢含星而光耀洪流將饗獠者張帟幕㑹平原酌清酤割芳鮮飲御酣賔旅旋車馬雷駭轟轟闐闐若風流雨散漫乎數百里之間斯蓋宅土之所安樂觀聽之所踊躍也焉獨三川為世朝市若乃卓犖奇譎倜儻罔已一經神怪一緯人理逺則岷山之精上為井絡天帝運期而㑹昌景福肸蠁而興作碧出萇𢎞之血鳥生杜宇之魄妄變化於非常唴見偉於疇昔近則江漢炳靈世載其英蔚若相如皭若君平王裦韡曄而秀發揚雄含章而挺生幽思絇道德摛藻掞天庭考四海而為雋當中葉而擅名是故游談者以為譽造作者以為程也至乎臨谷為塞因山為障峻阻塍埒長城豁險吞若巨防一人守隘萬夫莫向公孫躍馬而稱帝劉宗下輦而自王由此言之天下孰尚故兼諸夏之富有猶未若兹都之無量也辨蜀都賦以其與左思辨故賦宋王騰人物習性有忠有邪有智有愚出於才行而不由土産自趙諗狂圖好事者類指以疵蜀人蜀之衣冠含笑强顔無與辨之者余嘗切齒焉及讀左思賦見其薄蜀陋吳諂魏以諛晉之君臣茍售一時之聲價而滅天下之忠義晉之公卿一口稱譽風俗頽矣士無特操以陷四朝於五胡卒貽萬世之愧夫魏者漢之賊也原思之詞似欲尊正統而黜偏方然不顧正氣之淪溺乃知蜀之橫被枉抑其所由來者久矣故作辨蜀都賦以申蜀人之憤氣其商略土風採托人物不該乎治亂興廢之變邪正是非之理者不在鋪布之限非若前輩之詞主於類聚山川毛羽動植以煥文彩之美觀悅讀誦之利口而已辨疑先生核理儲思欲析蜀都未繹其辭客有東方者過而問之曰昔者太冲搆十稔之意搜三都之奇文成示人張華見推士安序焉盛傳于時豈其猶有未盡而夫子欲糾其所違先生曰嘻子未之知也吾蜀立極之初域民之始井邑山川之秀人物風俗之美是則左思備言之矣然而論列人材詳明上類第言文藻之華掞不及蜀人之忠義遂與吳俗例加抑忌非特沒其實美且沮之以橫議川靈為之扼腕嶽鎮為之憤氣吾以此為有遺恨故中言其所以夫品物流形九土分敷惟有蜀為極險之區羊腸繞其垠鍔鳥道駕於至虛行者却履以視棧乘者投繩而鈎車驗太白之所賦蓋未髣其錙銖真天限而地隔故山峭而川迂宜若與中夏否閉而不通其車書也然而朝宗之水浩浩而南傾內附之山峨峨而東蹙口呀雙劒若邠岐虎啖之吻尾拽終南乃咸雍金城之麓以其有所附屬而不能自立故命名者號之曰蜀自西而東昔本無途金牛詐言五丁是除吾人由之既艱且虞一夫舉足十夫荷儲食黃白以骨立卧氷藜而裂膚蜀士逺於進取蜀民疲於轉輸嘆天閽之已邈望秦隴以長吁然且連綱之運應聲穿領之牛係路陟長阪以猶及繞大江而不誤指日而物不緩期按籍而民無逋戶邊餉以需上供有裕悉陸海之攸産飽神囷之所聚五季之厄王朴獻謀謀先取蜀以阜兵餱餱足兵强乃征方州時乏逺御朴言不酬及我太祖算如朴䇿蜀定國富次平諸國蜀於是時興王有力嚮者孟氏撫傴矜憐惠愛其人捐租五年及我王師宣威三川卒無一夫東嚮而控弦蓋傾心於正統視私恩猶缺然是使僞命牽羊偏方銜璧顧旌纛以涕泗仆逵衢而思積感恩之意則誠效順之心自直豈若他邦之蠢悍怒螳臂於車轍由古而來可得而聞李雄劉闢季連公孫因仍世難割據坤靈盜蜀而王踵起而霸類非蜀人三國之際異方鼎峙若南若北輔吳崇魏惟我蜀人不私非類雖輔璋戴備以自固猶謂吾君之子而卒臣劉氏晉宋而下南北風馬南鬱屈以遊魂北陸梁而騁駕衣冠稽首於左袵濟洛順風於氐霸惟此西土爰歸南化豈赴弱以背强蓋惡夷而即夏逮蕭紀之不令泝岷江而僣正梁人召冦以救亂魏氏懷姦而託信彼實包藏此惟附順逆施不惠於宜都內潰爰從於遲迥豈瞻顧於北風蓋欽恭於王命不惟蜀人不盜蜀都歷代以來亂離間起在內在外為姦為宄董卓桓氏元載朱泚龎勛劉闢樊崇韓遂懷凶扇悖言不詳紀試考譜牒按其閭里茍揮羿浞之戈悉匪岷蟠之士在唐中弱齊蔡幽并諧結諸鄰唇齒相因叛主之師逐帥之黥陸梁百年不為王臣是亦何嘗連吾蜀民帝室內訌孽牙匪彛震動萬乘再狩于西民與其帥開關迓之天王蒞止百官六師國用告乏衆艱于飢與其吏民縑粟輸之比其還歸恬不知危兹蓋處平則率理以奉京邑之靈遭變則自完以待中原之睦欲㩦之則難叛欲一之則易服豈特文有餘而武不足耶亦其天資正順而敦篤近者趙諗圖結巴渠包藏歷年困於無徒爰及吳儔妖謀是趨蜀人白發遄服其誅由是言之蜀何負於君王歟思徒見其鄰於西夷逺於上國誚丘壑之險鄙方隅之僻但分中外之質麗不决正邪之名實胡所據耶成周之盛四海同風冠帶所加古無比隆淮徐連齊魯之軫而有夷伊洛接豐鎬之都而有戎方春秋之尊夏視吳楚猶貉蟲大周宗伯而不數抑又矧於閩中雖今俊乂之所出在昔語言之不通是則與我均為逺服安得妄論其異同然而自差觀之華陽黑水别封畛於堯籍岷山導江歷經營於禹跡秦氏剖符李氷擁節五岐七賦被自古昔而四載所至南止荆揚之域荆揚之民島夷卉服矧又過此以往耶百粵之取始自漢武郡國雖叛衣冠未楚所謂粵人無用章甫常衮化之士乃文舉然則論淺深之時較久近之序烏可與蜀同日而語王莽元舅霍山冡勳遺愛帝壻林甫皇孫許李聨階於黼座封裴接棟於楓宸既同心於肺腑亦託體於親鄰逞螟蝥之毒噬為􅚣蝮於君親是則勢疏者未必孽惡地近者未必誠純我雖逺於國而忠則邇也髙下既别一凸一凹人行成臯三門二郩或壯帝王之形勢或資姦盜之炮烋或王路之攸梗或伏兵之所交正用之則亦在德枳邪憑之則遂為冦巢吾人之心如砥吾人之行如蟻結羶美於一心捐崎嶇於萬里申韓生於中土不免為僻學鄭衛作於中州不免為僻樂九野同列於地何獨非梁益之墟四隅無私於天曷常戾西南之角况乎江行地脉鮮決掃而敗岸星直天狼工弭姦而觸惡肖此正氣挺吾先覺節以遇立文非茍作王褒明君臣之合何武憤福威之削張綱扼腕於跋扈揚子甘心於寂寞相如不數子昻見却謂誦述以阿諛恐吾徒之貽怍才髙則委靡面靦氣直則回邪膽落彼徒嫉於西子殊不慚其鄭璞不意兒曹懵其志行之僻反以居處僻我也且圃植蕙而菜育畦疏禾而莠生梟倫鳯族蜒肖龍蟠君子小人常溷其間古何邦而無佞亦何地而無賢龜蒙孔孟之攸宅冀北唐虞之所營宜丘門之不雜何跖黨之橫行鯀為父而禹子蔡為弟而旦兄導挺節而敦逆奕推忠而杞姦彼為同屬以行異况指一方而槩言吾請與子姑置逺近之殊而托正邪之辨晉取之魏魏取之漢功非定亂位實圖篡思誠晉人言諛而辨辭抑蜀以黜吳志借魏以佞晉魏為髙廟之冦賊蜀實中山之宗姓不然何故進亂世之姦雄而沮先王之枝屬乎况蜀以得賢而王失賢而亡魏以已篡而張以人篡而戕彼賦魏事徒言刑罰之清平胡不言文若之殞命也徒言忠良之聚㑹胡不言三馬之食槽也詞未及已客奮而起獲聞髙義欽服厥㫖嘆草澤之空言不能廷辨於天子𤣥武山賦唐王勃𤣥武東山有道君廟蓋仙人之别府也長蘿巨松稍翳雲日王子御風而遊蓋懷霄漢之舉而忘城闕之戀思欲招洪崖於煙道邀羡門於天路仙師不存壯志徒爾俄而泉石移情秋隂方積松柏羣吟悲聲四起背鄉關者無復顧向時之榮焉嗚呼有其道無其時則知林泉有窮途之哭煙霞有後時之嘆不亦悲乎遂作賦曰陟彼山阿積石峩峩亭亭千里傷如之何唘松關之密䕃攀桂山之崇柯隔浮埃於地絡披浩氣於天羅爾其緑巖開徑蒼岑對室菌軒丹絢蕙場翠密俯泉石之清泠臨風颷之瑟颯仰紺臺而㩦手望清都而容膝於是躡霞光於玉砌步雲岊於金壇懷妙童與玉女想青螭及碧鸞情恍恍而將逸心回回而未安見碧芳之晚晦忘紫洞之宵寒既而霧昏千瘴煙迷四野恨流俗以情多痛飛仙之術寡驅逸思於方外局高情於天下使蓬瀛可得而宅焉何必懷於此山也詞曰已矣哉吾誰欺林壑邊地煙霞失時託宇宙兮此日俟虬鸞兮來期他鄉山水只令人悲萬里橋賦以殊鄉絶邑行役路偏為韻陸肱萬里兮蜀郡隋都二橋兮地角天隅相去而如乖夷貊曽遊而只在寰區倚檻多懷結長悲而莫極憑川試望思逺道以何殊昔者滄海朝宗岷山發跡斯觀理水之要若唘鑿穴之役逮夫東土為陽西邦日益架長虹於兩地客思迢迢浩積水於千秋江流胍胍宇宙綿綿今來邈然結搆應似途程甚偏將暫逰於楚岸欲經疑作徑度於巴川目斷波中過巫峰之十二心馳路半到荆門而五千徒觀夫偃蹇東流崢嶸二邑揭華表以相效刻仙禽而對立俄驚回復潮生而夕月初明孰敢爭先帆去而秋灘正急眇天未之殊方有人間兮異鄉顧盼而層隂動色徘徊而浮柱生光飾丹艧以雖同彼臨淮海度軒車而既異此對銅梁古來幾許行人曽逰此路跨緑岸以長存俯清流而下注寧為雜疑作駐足之所莫問傷心之故復有逆旅傷情臨邛逺行壯鬼製以靈矗壓江流而砥平家本江都羡波濤而自返身留蜀地偶萍梗以堪驚珍重歸遙飄流恨結之子去兮揚桂棹長卿還兮建龍節既風月以相間固音塵之兩絶斯橋也可以濟巨川之往來不可以攜手而相别擊甌樓賦張曙宋玉九辨曰悼余生之不時也甲辰竄身巴南避許潰師郡刺史甚歡接春一日登郡東樓下臨巴江饌酒簇樂以相為娛言間有馬處士來至善擊甌者請即清宴爰騁妙絶處士審音以知聲余審樂以知化斯可以抑揚淫放頓挫匏竹運動節奏出鬼入神太守請余賦之余曰不圖為樂之至於斯酒酣䑛筆乃為賦云器之為質兮白而貞水之為性兮柔而清水投器而有象器藉水而成聲始因心而度曲俄應手以徴情莫不敲簫熠爚撇捩縱橫胡不自匏絲而起胡不從金石而生孰為節奏樂我生平何彼穠矣髙樓燕喜叩寂含商窮𤣥咀徴拂綺井以連騫送楓汀之靡迤嵒隈有雪彪咻而雕虎揚睛潭上無風蛟捷而金虬跋尾目運心語波回浪旋似欲奮而還駐若將窮而復連得不似驚沙叫雁髙栁鳴蟬董雙成青璅鸞饑啄開珠網穆天子紅韁馬解踏破瓊田􅌓眙衡盱神清調古既嗟嘆之不足諒悲哀以為主誓不向單于臺畔和塞葉胡笳定不入宋玉筵中隨齊竽楚舞疾除奮袂曲折縈組潺湲下隴底之泉嗚咽上涔陽之櫓鶯隔溪而對語一浦花紅猿裊樹以哀吟千山月午斯皆從有入無妙動𤣥樞灔颭則水心雲母丁當則杖杪真珠於是發春卉駭靈姝羞殺兮鈿筝金鐸愁聞兮鬼嘯神呼時也曲闋酒闌煙迷霧隔覽故步以躑躅有餘聲而滴瀝臨流而欲去依依轉首而相看脉脉太守曰遘止良辰好樂還淳諷賦已勞於進牘謳歌為序其芳塵余乃歌曰江風起兮江樓春千里萬里兮愁殺人樓前芳草兮關山道江上孤帆兮楊栁津是何貺我兮擊拊眷我兮殷勤回首而漁翁鼓枻凝眸而思婦霑巾夫當筵一曲人生一世何紛揉乎是非何顧慕乎隆替飄纓宜入醉鄉來自識天人之際畫桐華鳳扇賦并序李德裕成都夾岷江磯岸多植紫桐每至春暮一作暮春有靈鳥五色小於𤣥鳥來集桐華以飲朝露及華落則煙飛雨散不知其所有名工繢於素扇以償稚子余因作小賦書於上者也一作書于扇上桐始華兮緑江曙粲鮮葩兮泣清露樹曄曄兮霞舒鳥爛爛兮星布彼嘉桐兮貞且猗當春暮兮英威二字一作發英蕤豈鵷雛兮一作之珍族久一作乂棲託乎瓊林彼零露兮甘且白涵曉月兮灑鮮澤豈青鳥之靈常飲吮乎玉液有嘉穀而不啄有喬松而不適獨美露而愛桐非人間之羽翮逮華落而春歸忽雨散而川寂悵丹穴之何逺想瑶池而已隔爰有妙工圗其麗容宛宛兮若飱珠於芳蘂飄飄兮疑振翠一作羽於光風感班姬之素扇空皎潔兮如霰亦有美人增華㸃絢雀伺蟬而輕鶩南朝畫扇尤重蟬雀女乘鸞而微眄未若繢兹鳥二字一作斯禽於珍箑動凉風於羅薦非欲發長袂之清香掩短一作清歌之孤囀庶玉女之提携則崑墟之𤣥一作􅀈宴乃為歌曰東風二字一作青春晚兮芳節䦨敷紫華兮䕃碧湍美斯鳥一作紫禽兮類鵷鸞其體微兮容色丹彼飛翔於霄漢此藻繪於氷紈雖清秋之已至常愛玩而忘餐五丁力士開蜀門賦以蠻國廓開遂通人俗為韻陳山甫伊山為蜀是曰蠻俗惟天俾秦厥生神人拔長地之贔屭而闢廣岫之嶙峋在昔褒斜未通羌𤏡異域彼為夷國物産難究封疆罕測秦將欲廣其南冠其北張儀於是度其勢量其力假牛之計斯設饋女之功是克蜀王乃命力士闢髙山貪功叨􅀢志疑作忘情險難疑作艱捫峯巒於日側抉􅚣蜮於雲間將以砥嶄崒等躋攀振衣而力抗千嶂攘臂而威陵八蠻俄而白日蕩搖𤣥天忽霍鬼哭神怨風號霧廓怒髮森植雄心震躍灑珠汗以雹散瞪星眸而電落將欲斷煙靄排嵓崿訪巨靈之所拓蹂重岡回絶壑疑夏后之所鑿吁可畏哉砰轟若雷虎視五嶽鯨吞九垓徒見其豁若谷嵽幽若岩隈橫隱嶙直崔嵬大應心踣髙隨手摧江標峻棧之形呀然地裂闕鬬髙峯之色騞若天開巳而後患方唘前心莫遂喧闐兮乍進秦卒邐迤而全收蜀地梯棧無阻關梁有備旋聞五丁死而蠻黨移一徑通而秦人至雖共工之勇將觸也非雄項籍之力將拔也寧同曽未若擘秀嶺駭蒼穹今古攸賴華夷是通羽毛讋死以填谷草樹驚摧而墮空遂使鞭石之帝移山之公壯志難奪莫不慕其英風茅茨賦朱桃椎若夫虛寂之士不以世務為榮隱遁之流乃以間居為樂故孔子達士仍遭桀溺之譏叔夜髙人乃被孫登之笑况復尋山玩水散志娛神隱卧茅茨之間志想青雲之外逸世上之無為亦處物之髙致乃覩余菴室終諸陋質野外孤標山㫄迥出壁則崩剝而通風簷則摧頽而寫石是時間居晚思景媚青春逃斯澗谷委此心神削野藜而作杖卷竹葉而為巾不以聲名為貴不以珠玉為珍風前引嘯月下髙眠庭惟三徑琴置一絃散誕池臺之上逍遙巖谷之間逍遙兮無所託志意兮還自樂枕明月而彈琴對清風而緩酌望嶺上之青松聽雲間之白鶴用山水而為心玩琴書以取樂谷裏偏覺鳥聲髙鳥聲髙韻盡相調見許毛衣真亂錦聽渠聲韻宛如敲調絃乍緩急向我茅茨集時逢雙燕來屢值遊蜂入水開緑水更應流草長階前還復濕吾意不欲世人交我意不欲功名立功名立也不須髙總知世事盡徒勞未㑹昔時三箇士無故將身殞二桃先生知足離居盤桓口無二價日惟一餐築土為室卷葉為冠斫輪之妙齊扁同觀長樂花賦并序蘇頲蜀太守庭際有紫華草秋中始繁英露洗冬早尚直本霜封蕪雜大同於衆卉盛衰小異於羣物余訝而未識吏或告余曰此長虞所賦蜀長樂花也故心暗賞焉因口授書吏遂墨而成作恨不見古人所為得髣佛其㫖爾夫長者以短長之形度其長者一作則至美夫樂者以哀樂之類同其樂者一作則至喜長也樂也吾安得而間之嘉纎植之並用偉令名兮在茲徒見其豐族莽䔿高標璀璨莖丹外而縞中葉縹分以紅貫綴緑頴之重叠索紫㽔之爛漫迫而象之君子其常或微或章聳危冠兮纓若綬默退靜其何望逺以意之佳人欲翔炫炫煌煌重羅綺兮撲瑶翠蹇來思而未嘗匪以幽兮自直匪以直兮自藏匪以晚兮自耀匪以耀兮自强文濁露之均灑庇清舒之泛光本無嫌於散地甘有寓於殊方然則太液初滿上林新霽䒠茸灼爍萬品千計搖瑞色而函芝雜奇葩而轉蕙孰與夫玉堂金闕一作閣之遍一作偏賞白日青雲一作天之特麗嵗不與兮時向闌風蕭蕭兮夜漫漫賔逺鴻於沙塞叫離鶴於江干君曽不見三月華矣蓋林間之槁木千霜殞矣亦庭下之枯蘭懿此常度陵於早寒假春期而不採一作彩雖秋令而不殘衡一作衝雨霰之飛薄任雲山之險艱一作難芳弗珍於靃靡節常慕於檀欒吾則知樹背之奚託惟傾心之可安如後凋之是貴罔獨立其誰觀文學掾起而為亂曰白露瀼瀼何草不黃紫華的的一作灼灼生君之堂彼不伐兮秋自翳時或珍兮君是惠彤庭赫兮朱草駢交屈軼兮友賔連伊榛莽而荒些君曷為兮賦旃題橋賦以望在雲霄居然有異為韻無名氏昔蜀郡之司馬相如指長安兮將離所居意氣而登橋有感沉吟而命筆爰書儻並遷鶯將欲誇其名姓非乘駟馬誓不還於里閭原夫别騎留連鄉心顧望銅梁杳杳以橫翠錦水翩翩而逆浪徘徊浮柱之側睥睨長虹之上神催下筆俄聞風雨之聲影落中流已動龍蛇之狀觀者紛紛嗟其不羣染翰而含情自負揮毫而縱意成文渥澤向疑作尚遙滴瀝空曕於垂露翻飛未及離披且覩其崩雲蓋以立誓無疑傳芳不朽人才既許其獨出富貴應知其自有潛生肸蠁之心暗契縱橫之手於是名垂要路價重仙橋離離迥出一一髙標參差鳥跡之文㫄臨一作鄰綵檻踴躍鵬搏之勢下視丹霄既而玉壘經過金門寵異方陪侍從之列忽奉西南之使乘軺電逝於遐方建節風生於舊地結構如故髙低可記追尋往跡先知今日之榮拂拭輕塵宛是昔時之字想夫危梁蘚剝清墨蟲穿長含氣象久滯風煙幾遭凡目之見嗤徒云率爾終俟壞姿之後至始覺昭然所謂題記數行寂寥千載何搦管而無感如合符而終在驚後起而慕前賢亦丁寧而有待花萼樓賦以花萼樓賦一首并序為韻范崇凱開元中嵗天子築宮於長安東郛有以眷夫代邸之義舊者宮中起樓臨瞰於外乃以花蕚相輝為名蓋所以敦友悌之意也銀榜天題金扉御闕俯盡一國旁入萬里崇崇乎實帝城之壯觀也是時海內賔薦之士咸逰仙署馳神纍日以待問於有司有司盛稱兹樓並命賦之小子庸蔽敢同頌美詞曰惟唐六代盛德被於幽遐彌𤣥都暨丹穴掩扶海於流沙莫不推福祚之攸永極威靈之所加敦本既同夫羲軒之日睦親又比乎棠棣之花裂土苴茅以表慶賜圭分瑞以聨華信可以受無窮之祉而保乂我皇家者哉乃命有司濬池隍繕城郭將崇大壯之義載考方中之作繚垣墻周乎舊宫設井幹而為新閣既集既繩已揆已度望馳道而通禁林走建章而抵長樂攢畫拱以交映列綺忩以相薄金鋪搖吹以玲瓏朱綴含煙而錯落飾以粉繪塗之丹艧飛梁回繞於虹光藻井倒垂乎蓮蕚信神明之保護亦列仙之憑託於是乘輿乃登夫翠輦而建華旒鈎陳警道兮環衛周命期門使接蹕將有事乎娛遊六龍驤首以唘路八駿騰光而夾輈且肅肅以穆穆幸夫花萼之樓然後層軒四敞聖情周顧遙窺函谷之雲近識昆池之樹緑野外疑作初霽入渭北之川原青門洞開覽山東之貢賦亦以崇友悌之德勸農桑之務豈止惟臨鄠杜之郊空指邯鄲之路而巳哉且壯麗難匹光華匪一馮禁掖以孤明隱垂楊而半出赫昈昈以宏敞肅隱隱而靜謐非匠氏之奇工梓人之妙術孰能至於是哉嵗如何其嵗之首花蕚樓兮對仙酒願比華封兮祝我聖君千萬夀嵗如何其嵗始正花蕚樓兮開御營願同吉甫兮頌我聖君億載聲蓋聖人去有欲反無名深宫皓素髙名疑作居穆清觀羣方之樂業朝諸侯而嚮明即知華夷欣慶冠帶混并均五氣之喜叶三光之精嗟乎時難再得嵗不我與跡已混於沉滯心未齊於出處此小子之所以瞻棟梁以自悲仰雲霄而失序梓潼神鼎賦以靈瑞珍寶出為韻盧庾於戲德包生植者不能動彼天之道瑞及飛走者未能感無價之寶故知瑞之大者下及無心之金石德之深者上合不言之𤣥造我國家髙選理物光天順人膺景命闡坤珍由是函谷關㫄靈符出而唘聖梓潼郡內寶鼎光乎取新此鼎者聖人之大寶有國之神器量則𢎞深體乃殊異嶷如斷山之崷一作崇崒屹若巨鰲之贔屭峙其足者可以象二德虛其心者將以含萬類不汲而滿不燃而沸內烹飪以養賢上興雲而作瑞應火木之卦既調鹽梅鏤山川之容且禦魑魅是鼎也豈徒靈感亦有欵識不假雕鐫宛然文字實彼天之所降靈亦吾彥之至異唘五百代之昌符成六萬年之寶位與夫遷鼎郟鄏卜代三十卜年七百者不可同日而議宜書于冊于帝之庭以合明應以昭神靈士有聞而歎曰昔皇帝作寶鼎三秦帝奠神鼎一周之衰也沉泗水而隱藏漢之盛也在汾隂而見出未有能來疑作占聖夀之無疆應人文以純一作終吉竊亦欲負鼎於明主唘心而獻術若能使我徴於有商豈見遺於今日仁夀鏡賦并序史翽天寶初有獻書闕下者言巴蜀之間有石鏡見于巖之半仁壽之字昭然可觀僕深竒之因而為賦主上恢大寶闡鴻休仁風揚而𤣥德布夀星輝而皇化流故得仙靈唘瑞石鏡涵秋無往不形鑒乃侔於止水有鼎而應道可喻於虛舟懿夫化自天鈞質非鎔造亭午光射靈朝曙早來洞穴之九仙對商山之四皓炳昆岫之龍燭倒風壇之竹掃光能照乘不遺罔象之珠跡在幽巖為唘崆峒之道動如秋水之澄皎如寒雪之凝駐清夜之圓月挂長河之片冰其形不由于拂拭其勢豈假於鈎繩君則無心惟德之斯感山非自爾喜神之有憑左猿吟右虎嘯萬籟相聒羣容必召雖復晉有金飾之美魏有銀華之妙何如庸魅而野鹿羞窺愛舞而山雞自照昔之寫刑一作形仁夀見膽咸陽倚玳瑁而稱麗持珊瑚而益光名傳嵗月事著縑緗咸播美於千古孰歸功於我皇鏡為之鑒與明德之合符石類於金惟聖躬之初應可以示後世之千葉可以軌前王之萬乘記事之簡以光良史之書頌美之詞更動詩人之興法天法地之謂仁不騫不崩之謂夀惟仁也故能昭泰惟夀也故能長久萬人咸識鄙石室之仙經六體自然輕漢園之卧栁我大君猶抑而不納謙而不有小人無益於補天庶斯文之不朽蜀江春日文君濯錦賦無名氏粵若姑洗應律勾芒御辰雁橋風暖犀浦花新叠嶂縈郭長楊映津軒車照地士女驚人風土堪樂山川可珍嵗時不殊於荆楚形勝有類夫咸秦晚景彌秀晴江轉春即有卓氏名姝相如麗室織回文之重錦豔傾國之妖質鳴梭靜夜促杼春日布葉宜疏安花巧密寫庭葵而不缺擬山鳥而能悉績縷嫌遲嚬蛾慕疾乍離披而成段或煥爛而成匹言濯春流鳴環乃出於是近深沉傍清泚朱顔始映珍篋方唘其始入也疑芳樹影落澗中少將安焉若晴霞色照潭底奪五雲長風未散泫一作勝百花微雨新洗爾乃曝林崖出泉洞遲日徐轉和風緩送稍辨回鸞全分舞鳳戲蝶時繞嬌鶯欲弄乘春景而方收俟王正而入貢懿其彩色足重鮮明可嘉青為禁栁紅作宫花能使御疑作衛尉縈障夫人飾車郎官居而列宿郡守衣而還家若夫齊紈之與楚練豈並細縠之與輕紗全蜀藝文志卷一
