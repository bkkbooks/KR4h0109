body:
  text: 全蜀藝文志巻十一明周復俊編詩陵廟謁先主廟唐杜甫慘澹風雲㑹乘時各有人力侔分社稷志屈偃經綸復漢留長策中原仗老臣雜耕心未已嘔血事酸辛覇氣西南歇雄圖厯數屯錦江元過楚劒閣復通秦舊俗存祠廟空山泣鬼神虛簷交鳥道枯木半龍鱗竹送清溪月苔移玉座春閭閻兒女換歌舞歲時新絶域歸舟逺荒城繫馬頻如何對搖落况乃久風塵孰與關張並功臨耿鄧親應天才不小得士契無鄰遲暮堪帷幄飄零且釣緡向來憂國淚寂寂洒衣巾蜀相丞相祠堂何處尋錦官城外栢森森映堦碧草自春色隔葉黄鸝空好音三顧頻煩天下計兩朝開濟老臣心出師未捷身先死長使英雄淚滿襟蜀先主廟漢末謠黄牛白腹五銖當復劉禹錫天下英雄氣千秋尚凜然勢分三足鼎業復五銖錢得相能開國生兒不象賢凄凉蜀故妓來舞魏宫前謁先主廟絶句三首張儼投順繼皇業并吞勢由己天命屈雄圖誰歌大風起得股肱賢明能以竒用兵何事傷客情何人居帝京雄名垂竹帛荒陵壓阡陌終古更何聞悲風入松柏武侯廟武少儀執簡焚香入廟門武侯神像儼如存因機定蜀延衰漢以計連吳振弱孫欲盡智能傾僭盜善持忠節輔庸昏宣王請戰貽巾幗始見才吞亦氣吞祠祭畢題臨淮公舊碑楊嗣復臨淮公武元衡也元和初元衡鎮蜀嗣復為節度推官後二十七年嗣復鎮蜀時大和九年也汝士為東川節度使故相唱和汝士曽為蜀帥段文昌掌管也齋莊修祀事旌斾出郊闉薙草軒墀狹塗墻赭堊新謀猷期作聖風俗奉為神酹酒成㘭澤持兵列偶人非才膺寵任異代揖芳塵况是平津客碑前淚滿巾和楊汝士古柏森然地修嚴蜀相祠一過榮異代三顧盛當時功德流何逺馨香薦未衰敬名探國志飾像慰甿思昔謁從征蓋今聞擁信旗固宜光寵下有淚刻前碑巫山廟崔塗雙黛儼如嚬應傷故國春江山非舊主雲雨是前身夢覺傳詞客靈猶福楚人不知千載後何處又為神題濟順王祠在劍州王鐸廣明二年僖宗幸蜀神有陰兵助順見形於桔柏津帝幸其廟解劒贈神盛唐聖主解青萍欲掘新封濟順名夜雨龍抛三尺匣春雲鳳入九重城劒門喜氣隨龍動玉壘韶光待賊平為報山東諸將相格天勲業賴陰兵謁江瀆廟宋喻汝礪坤軸東南傾大江日夜注前驅下洛洙餘濤略吳楚任勢不期勞得意緣所遇水也初無營神哉亮誰主芳蘭沉清華碧藻舒翠縷晨鵠戱野㟁春鳬集深渚均是得所安而神豈私汝古來幾精魄恰此迷所處滛逰不知還沙村失煙樹而我後千載悠然在江滸抱嗇貴無覬於名忌多取冥冥掠岸風滛滛打船雨舞雪窺洪濤開蘋渡前浦再拜謝神况聊復隨所住題先主廟晁公遡天地收覇氣丘原餘閟宫野人相指似旁有若堂封當時大耳兒甚似隆準公夫豈㤀故都﨑嶇巴蜀中劃然成三分正爾阨兩雄武侯抱遺恨秦隴竟莫通獨怜晉昌明千載時始逢坐看永嘉亂蕭條河洛空拜張忠定公祠二十韵陸㳺張公世外人與蜀偶有緣天將靖蜀亂生公在人間厥初大盜興樂禍迭相旋天子輟玉食貴臣擁戎旃生殺出喜怒死者常差肩公曰此何哉從之吾欺天河流觸地軸砥柱屹不遷脅從盡縱捨飛章交帝前上意竟開悟至仁勝兇殘貴臣不極賞追還黜其權安危關社稷豈惟蜀民全後來有阿童握兵事開邉晩策睦州功上公珥金蟬勢張不可禦北鄉挑幽燕神京遂丘墟迄今天步艱時無忠定公孰能折其姦我來拜遺祠喬木含蒼煙死者不可作愀然哀涕澘憤切感虜禍慷慨異公賢春秋送迎神誰為歌此篇謁白帝廟張俞孤山扞江口上有白帝祠橫視天下險萬流皆俯窺古殿鎻神物悲風出陰帷天昏瓦棟折狐䑕亦生威優巫日鼓舞鬼怪争奔馳雷霆巻蛟窟雹火燒松枝入户精魄動有如陰兵隨吁哉漢盜亂海内遂崩離赤龍始潜躍逐鹿過秦時公孫奮神劒定蜀圖安危隴坻開北户荆門啓東陲長驅百萬衆日鬬天下師羣豪挿羽翼與漢争雄雌兩帝不並立興亡良可悲天運雖有在聖賢豈無為昭皇攬英傑襲軌奄重基先主武侯風雲共浩蕩千古餘寒碑威神竟不沒萬里震南夷題白帝廟元不伐京兆元不伐以言罷益昌郡守詣詔獄於鄂渚紹興戊辰五月初八日艤舟瞿塘闗下不獨有象馬之戒水髙灔澦者二十丈道欵白帝祠因告之曰不伐若蠧國虐民貪墨黷貨必見嗇于波神茍忠義是依又何懼焉遂絶維東駚七百里曉泊黄牛溉盡三峽之險明年春復西泝追賦是詩以報神休楚山中到三峽開長江浩浩從西來奫淪巨浸吞萬派灔澦傑立髙崔嵬鯨波囘薄山羊角灘名征鼙摻疊鳴春雷蹴石岩壁勢益狠怒濤駭浪争喧豗舟師絶呌不容瞬風蒲孰敢施檣桅龍驤䝉衝量萬斛梢濆擊旋如枯荄昔聞有神司正直江潭祠宇留山隈羞牢釃斝薦誠懇幽鑒冀䝉神所哀跋柂鼓檝駃東驚忽忽已過巫陽臺巴徼炎瘴晝如霧煬燖赫日昬風霾歘然晴皎射峭壁翠光冶灔無纎埃連姢嵐光落衣袂飛雲容與風䬐䬐祝融之祥古亦有神之報與良豐哉嗟余陷穽豈無謂九死寧知禍有胎觸機直前靡顧後壬人資以成嫌猜燎原之勢既炎烈垂涎膏血如狼豺盼刀陰顧肆舞勇脅肩媚笑如詼俳違道好徑躐禁槖盡網異議為梯媒旋踵已為鬼闞室俄驚白骨到蒼苔人勝自時天亦定肸蠁踈網常恢恢險夷百折堅一節君恩曠蕩天昭囘白帝廟白帝廟神舊傳以為公孫氏以余考之非也公孫氏享國日淺轍迹未嘗至䕫獨遣田戎任滿戍江關岑彭入江關不復為戍守公孫氏無從廟食按酈道元注水經瞿塘灘上有神廟甚靈刺史二千石過其下不敢伐鼓鳴角恐致風雨舟人上水以布裹篙足不令觸石有聲蓋不謂其神為公孫氏瞿塘天下至險必有神物司之但有廟偶連白帝城俗遂從而訛爾余往來三峽皆托神之庇輙為賦此庶來者有所考云淳熙十一年正月晦日西蜀楊安誠道父書蜀江萬壑俱東奔瞿塘喧豗争一門驚濤駭浪建瓴下巔崖仆谷相吐吞朋妖窟宅恃幽阻正晝噴薄陰霾昏靈宫奕奕鎮地險衆瀆稟令川祗尊赤甲後聳黄熊躍灔澦前峙青猿蹲舳艫銜尾下吳楚約束蛟鰐如鷄豚舊傳鼓角致雨雹裹篙不觸撑舟痕綜理脉絡盡西徼帝假之柄攸司存子陽祚國十年近此地未省東其轅連江列炬鐵鏁斷戎滿犇北無留屯江關囘首盡漢幟遺黎何自知公孫血食漢代定不爾但有故壘山之樊子美誤信齊東語感慨勇略招英魂山川之靈載望秩僭偽詎可同時論向來名實久淆溷薦祼無乃瀆俎膰請從酈元為考証神理昭昭斯可原白帝祠冉居常西南割據幾何年長托威靈灔澦前覇氣不垂天數盡神祠猶壓地形偏舟航歲晩方孤客關塞山寒更暮煙欲論興亡愁意緒持盃寂寞酹山川武侯新祠復用前韻王十朋山藏古寺柏青青地重端因蜀相登沙上不聞江石轉人間幾見谷為陵龍蛇樹影揺千尺玉雪花枝吐萬層堪嘆草廬誰復顧凄然香火却依僧武侯祠張震勲業場中託汗青詩書壇上復誰登顧廬可是依昭烈持釣何妨屈子陵力挽狂瀾休轉石功虧累土不成層他年一笑三生夢應愧多情碧眼僧韋南康始生有胡僧往視之謂曰別久亡恙乎韋氏問故答曰武侯後身也吾往與之友故不逺而來因字之武侯見宣室志經秦皇墓魯交祖龍何事苦東巡僊駕歸來塚草新項籍已飛三月火子嬰猶醉六宫春元來滄海殊無藥却是芒碭暗有人自古乾坤屬真主驪山山下好霑巾花卿冡行謝翺山谷云花卿冡在丹陵之東館鎮至今猶有英氣血食其鄉濕雲糢糊埋秋空雨青沙白丹陵東莓苔陰陰草茸茸上聲云是花卿古來冡花卿舊事人所知花卿古冡知者誰精靈未歸白日西廟鴉啄肉枝上啼緜州柘黄魂正飛孟蜀李夫人祠前人春荒曲薄蠶叢土屈狄歸朝辭廟主官家呼母恩許歸劒閣并門無處所一作淚如雨故衣升屋棺四繞出門哭子汴州道囘腸酹酒三致辭巴蜀如歸化啼鳥老身不食追爾魂鹵簿臨門拜上恩過漢武陵明劉成穆歲暮霜殘過漢都武皇陵墓舊荒蕪不將玉匣藏天馬猶使金鐙照野狐賦客詞園清露盡仙翁丹竈白雲孤千年惟有秋風曲渭水長流啼夜烏全蜀藝文志巻十一
