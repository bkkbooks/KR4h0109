body:
  text: 全蜀藝文志卷三明周復俊編詩文王之化行乎江漢之域江有沱詠于二南之先徴之禹貢則岷山導江江别為沱蜀人凡水皆稱江江之漫流皆稱沱至今猶然原夫媵女之見不出窺觀此詩之興即見而起未有身在岐山而逺取江沱家奠酆鄗而遙詠岷蜀者也是江沱之篇為蜀詩之首無疑也豈獨東明臾邪之名見于揚雄之紀中和樂職之詩始于王裦之作乎今志所取凡緣蜀而作者載之其人為蜀産而詩僅存一二者亦載焉其類十有九於類之中又有類焉其人則以世之先後為序當軸時棟表儀里門者咸不敢載以附海虞吳先生文章辨體之例風謡蠶叢國詩四章漢古辭川崖惟平其稼多黍旨酒嘉穀可以養父野維阜丘彼稷多有嘉穀旨酒可以養母惟月孟春獺祭彼涯永言孝思享祀孔嘉彼黍既潔彼儀惟澤蒸命良辰祖考來格日月明明亦惟其夕誰能長生不朽難獲惟德實寶富貴何常我思古人令聞令望譙君黃頌漢無名氏譙君黃仕成哀之世為諫議大夫數進忠言後違避王莽又不事公孫述述怒遣使齎藥酒以懼之君黃歎曰吾不省藥乎其子瑛納錢八百萬得免國人作詩曰肅肅清節士執德實固貞違惡以授命沒世遺令聲大度停民謡出益部耆舊傳王忳事見漢書信哉少林世為遇飛被走馬與鬼語陳紀山頌巴郡陳紀山為漢司𨽻校尉嚴明正直西虜獻眩王庭試之分公卿以為嬉紀山獨不視京師稱之巴人歌曰築室載直梁國人以貞真邪娛不揚目枉行不動身姦軌僻乎逺理義協乎民嚴王思頌漢應季先巴郡嚴王思為揚州刺史惠愛在民每當遷官士民塞路攀轅詔遂留之居官十八年卒百姓若喪考妣義送者齎錢百萬欲以贍王思家其子徐州刺史不受送吏義崇不忍持還乃散以為食食行客巴郡太守汝南應季先善而美之乃作詩曰乘彼西漢潭潭其淵君子愷悌作民二親沒世遺愛式鏡後人栁琮歌益部耆舊傳云栁琮字伯騫蜀人為治中其所拔進皆世所稱鄉里為之語曰得黃金一笥不如為栁伯騫所識豐年歌漢永建中泰山英資元約為郡守屢獲豐年民歌之曰習習晨風動澍雨潤禾苖我后恤時務我民以優饒益部語任文公閬中人善天文益部語曰任文公智無雙益部謡賊來尚可尹來殺我樊守歌益部耆舊傳漢樊智遷為蜀郡太守秩滿民歌之曰樊守來門夜開持節去憂惶懼去思歌吳資遷去民人思慕又歌之曰望逺忽不見惆悵嘗徘徊恩澤實難忘悠悠心永懷灌令歌鍾岏良吏傳瞿瑗為灌令開溝甽田民賴其利歌曰天降神明君錫我慈仁父臨民布德澤恩惠施以序穿溝廣溉灌決渠作甘雨刺李盛謡孝桓帝時河南李盛仲和為郡守貪財重賦國人刺之曰狗吠何喧喧有吏來在門披衣出門應府記欲得錢語窮乞請期吏怒反見尤旋步顧家中家中無可與思往從鄰貸鄰人以言遺錢錢何難得令我獨憔悴巴郡謡漢安帝時巴郡太守連失道國人風之曰明明上天下土是觀帝選元后求定民安孰不可念禍福由人願君奉詔惟德是親思治詩漢末政衰牧守自擅民人思治作詩曰混混濁沼魚習習激清流溫溫亂國民業業仰有修李都護歌江表傳李嚴為都護用法深刻人歌之曰難可狎李鱗甲三節婦歌永初中廣漢漢中羌反虐及巴郡有馬妙祈妻義王元憒妻姬趙蔓君妻華夙喪夫執共薑之節守一醮之禮號曰三貞遭亂兵迫匿懼見拘辱三人同時自沉于西漢水而死有黃鳥鳴其亡處徘徊焉國人傷之乃作詩曰關關黃鳥爰集於樹窈窕淑女是繡是黼惟彼繡黼其心匪石嗟爾臨川邈不可獲王稚子歌漢古辭孝和帝在時洛陽令王君本自益州廣漢蜀人少行宦學通五經論明知法令歷代衣冠從溫補洛陽令化行致賢外行猛政內懷慈仁移惡子姓名五篇著里端無妄發賦念在理寃清身苦體宿夜勞勤化有能名逺近所聞天年不遂早就奄昏為君作祠安陽亭西欲令後代莫不稱傳河內謡王渙為河內令商賈露宿人開門卧民歌之曰王稚子代未有平徭役百姓喜淫豫歌樂府李膺益州記云灔澦堆夏水漲沒數十丈其狀如馬舟人不敢進故曰灔澦又曰猶豫言舟子取途不決水脈故猶豫也樂府作淫豫歌坤元録作冘豫淫豫大如襆瞿塘不可觸南史李白詩五月不可觸猿聲天上哀淫豫大如馬瞿塘不可下樂府淫豫大如鱉瞿塘行舟絶淫豫大如龜瞿塘不可窺類要灧澦歌水經注灘頭白浡堅相持倐忽淪沒别無期附灔澦歌灔澦大如馬瞿塘不可下金沙浮轉多桂浦忌經過鄭樵云天下水之險者惟蜀中之瞿塘及廣西之桂浦為最甚此歌辭所言行瞿塘者準灔澦也行桂浦者準金沙也灧澦歌孝子傳庾子輿扶父柩過瞿塘六月水泛子輿禱而遂平既過泛溢如人歌之曰灧與如牛本不通瞿塘水退為庾公龍床灘謡圖經龍床如拭濟舟必吉龍床倣佛濟舟必沒峽中行者歌宜都山川記云峽中猿鳴至清山谷傳響泠泠不絶行者歌之巴東三峽巫峽長猿鳴三聲淚沾裳巴東三峽猿鳴悲猿鳴三聲淚沾衣杜子美詩聽猿實下三聲淚黃牛歌朝見黃牛暮見黃牛三朝三暮黃牛如故附李白詩巫峽夾青天巴水流若兹巴水行可盡青天無到時三朝見黃牛三暮行太遲三朝又三暮不覺鬢成絲撥穀歌唐李白白帝城邊足風波瞿塘五月誰敢過荆州麥熟繭成蛾繅絲憶君頭緒多撥穀飛嗚奈若何太白此詩有樂府意故附之風謡之後先民謡秦宓傳引􅡵阜之山江出其腹帝以會昌神以建福大飢不飢蜀有蹲鴟大旱不亂蜀有廣漢此四句見古碑廉叔度歌後漢書曰廉范字叔度建初中為蜀郡太守成都民物豐衍邑宇逼側舊制禁民夜作以防火災而更相隱蔽燒者日屬范乃毁削先令但嚴使儲水而已百姓為便乃歌之曰廉叔度來何暮不禁火民安作平生無襦今五袴後漢時蜀中童謡後漢書五行志曰世祖建武六年蜀中童謡是時公孫述僣號于蜀時人竊言王莽稱黃述欲繼之故稱白五銖漢家貨明當復也述遂誅滅黃牛白腹五銖當復晉太康末蜀中童謡江橋頭關下市成都北門十八字其後有李特割據之應唐咸通末成都童謡新唐書五行志曰咸通十四年成都有童謡是嵗嵗隂在巳明年在午巳蛇也午馬也咸通癸巳出無所之蛇去馬來道路稍開頭無片瓦地有殘灰梁太祖時蜀中謡五代史曰劉知俊初事梁太祖後奔蜀王建雖加寵待然亦忌之常謂近侍曰劉知俊非爾輩能駕馭不如早為之所有嫉之者於里巷間作此謡知俊色黔丑生棕繩者王氏子孫皆以宗承為名故以此猜疑之遂見殺于成都黑牛在圈棕繩斷無題五五復五五五五逾重數浮世若浮雲真石一如故與君相見時杳杳非今土右詩見于羅城北門壞碑上有乾符三年髙駢名銜餘字斷缺莫知其為何詩也辭隱義閟故附見民謡之末鬻官謡蜀檮杌韓昭為王蜀偽相鬻官如市時有謡云嘉眉邛蜀侍郎骨月𨗳江青城侍郎親情果閬二州侍郎自留巴蓬涪璧侍郎不惜張王二公歌宋朝類苑張詠王晦叔蜀守之良先張後王惠我赤子俾無流亡又彥博輸田况程戡勝蔣堂成都謡頌𢎞治初洪鍾屈鋭為按察使折獄眀敏犴無留繫民歌之曰洪不支鍋屈不解擔土軍謡正德初流賊倡亂取土官領兵所過殘虐十倍于賊巡按御史王綸舉奏去之其謡曰流賊來梳梳我土軍來箆箆我全蜀藝文志卷三
