body:
  text: 全蜀藝文志卷二十五明周復俊編詩餘唐人長短句宋人謂之填詞實詩之餘也今所行草堂詩餘是也或問詩餘何以繫于草堂也曰按梁簡文帝草堂傳云汝南周顒昔經在蜀以蜀草堂寺林壑可懷乃于鍾山雷次宗學館立寺因名草堂亦號山茨謂草為茨亦述蜀語地名别有蠶茨是其旁證也李太白客逰于外有懷故鄊故以草堂名其詩集詩餘之繫于草堂指太白也太白作二詞為百代詞曲之祖則今之填詞非草堂之詩餘而何放此選蜀志之詞以太白二闋為首云菩薩鬘今本作蠻非菩薩鬘驃國舞女髻飾也李白平林漠漠烟如織寒山一帶傷心碧暝色入髙樓有人樓上愁闌干空佇立宿鳥歸飛急何處是歸程長亭復短亭憶秦娥李白簫聲咽秦娥夢斷秦樓月秦樓月年年栁色灞陵傷别樂逰原上清秋節咸陽古道音塵絶音塵絶西風殘照漢家陵闕清平樂韋莊何處逰女蜀國多雲雨雲解有情花解語窣地繡羅金縷粧成不整金鈿含羞待月鞦韆住在緑槐隂裏門臨春水橋邊河傳前人春晚風暖錦城花滿狂殺逰人玉鞭金勒尋勝馳驟輕塵惜良辰翠娥爭勸臨邛酒纎纎手拂面垂絲栁歸時煙裏鐘鼓正是黃昏暗消魂其二錦浦春女繡衣金縷霧薄雲輕花深栁暗時節正是清明雨初晴玉鞭魂斷烟霞路鶯鶯語一望巫山雨香塵隱映遙見翠檻紅樓黛睂愁女冠子牛嶠錦江煙水卓女燒春濃美小檀霞繡帶芙蓉帳金叉芍藥花額黃侵膩髮臂釧透紅紗栁暗鶯啼處認郎家燒酒名燒春其法始于文君菩薩蠻畫屏重叠巫陽翠楚神尚有行雲意朝暮幾般心向他情慢深風流今古隔虛作瞿塘客山月照山花夢回燈影斜河瀆神張泌古樹噪寒鴉滿庭楓葉蘆花晝燈當午隔窗紗畫閣珠簾影斜門外往來祈賽客翩翩帆落天涯回首隔江煙火渡頭三兩人家江城子前人浣花江上見卿卿臉波秋水明黛睂輕緑雲髙綰金簇小蜻蜓好事問他來得麼和笑道莫多情巫山一假雲僞蜀毛文錫雨霽巫山上雲輕映碧天逺風吹散又相連十二晚峯前暗濕啼猿樹髙籠過客船朝朝暮暮楚江邊幾度降神仙玉樓春避暑摩訶池上作孟昶氷肌玉骨清無汗水殿風來暗香滿簾開明月獨窺人欹枕叉橫雲鬢亂起來瓊户唘無聲時見疏星渡河漢屈指西風幾時來只恐流年暗中換臨江仙牛希濟峭碧參差十二峯冷烟寒樹重重瑶姬宫殿是仙蹤金爐珠帳香靄晝偏濃一自楚王驚夢斷人間無路相逢至今雲雨帶愁容月斜江上征棹動晨鐘其二江繞黃陵春廟閒嬌鶯獨語關關滿庭重叠緑苔斑隂雲無事四散自歸山簫鼓聲稀香燼冷月娥斂盡彎環風流皆道勝人間須知狂客判死為紅顔後庭怨建隆中旭川築城掘得石刻蓋唐人語也唐無名氏千里故鄊十年華屋亂魂飛過屏山矗眼重睂褪不勝春菱花知我銷香玉雙雙燕子歸來應解笑人幽獨斷歌零舞遺恨清江曲萬樹緑低迷一庭紅撲蔌黃鐘樂魏承班池塘烟暖草萋萋惆悵閒宵含恨愁坐思堪迷遙想玉人情事逺音容渾似碧桃溪偏記同歡秋月低簾外論心花畔和醉暗相携何事春來君不見夢魂長在錦江西臨江仙閻選十二髙峯天外寒竹梢輕拂仙壇寶衣行雨在雲端畫簾深殿香霧冷風殘欲問楚王何處去翠屏猶掩金鸞猿啼明月照空灘孤舟行客驚夢亦艱難巫山一段雲李珣有客經巫峽停橈向水湄楚王曽此夢瑶姬一夢杳無期塵暗珠簾卷香銷翠幄垂西風回首不勝悲暮雨灑空祠其二古廟依青嶂行宫枕碧流水聲山色鎖粧樓往事思悠悠雲雨朝還暮烟花春復秋啼猿何必近孤舟行客自多愁戚氏此詞始終指意言周穆王賔于西王母之事蘇軾玉龜山東皇靈嫓統羣仙綘闕岧嶤翠房深迥倚霏烟幽閒志蕭然金城千里鎖嬋姢當時穆滿巡狩翠華曽到海西邊風露明霽鯨波極目勢浮輿蓋方圎正迢迢麗日𤣥圃清寂瓊草芊綿爭解繡勒香韉鸞輅駐蹕八馬戲芝田瑶池近畫樓隱隱翠鳥翩翩肆華筵間作管鳴絃宛若帝所鈞天稚頭皓齒緑髮方瞳圎極恬淡髙妍盡倒瓊壺酒獻金鼎藥固大椿年縹眇飛瓊妙舞命雙成奏曲醉留連雲璈韵響寫寒泉浩歌暢飲斜月低河漢漸漸綺霞天際紅深淺動歸思回首塵寰爛漫逰玉輦東還杏花風數里響鳴鞭望長安路依稀栁色翠㸃春姸此詞眉州舊有石刻愁倚欄三榮道上程正伯山無數雨蕭蕭路迢超不似芙蓉城下去栁如腰夢隨春絮飄飄知他在第幾朱橋說與杜䳌休喚怕魂銷漁家傲彭門道中早發前人野店無人霜似水青燈照影寒侵被門外行人催客起因箇事老來方有思家淚寄問梅花開也未愛花只有歸來是想見小橋歌舞地渾含喜天涯不念人憔悴其二前人獨木小舟烟雨濕燕兒亂㸃春江碧江上青山隨意見人寂寂落花芳草催寒食昨夜青樓今日客吹愁不得東風力細拾殘紅書怨泣流水急不知那箇傳消息臨江仙合江放舟前人送我南來舟一葉誰教催動鳴榔巫山不見水茫茫雲灣才幾曲折盡九回腸買酒澆愁愁不盡江烟也共凄凉和天瘦了也何妨只愁今夜雨更做淚千行其二濃緑鎖窗閒院靜照人明月團團夜長幽夢見伊難瘦從香臉薄愁到翠眉殘只道花時容易見如今花盡春䦨畫樓依舊五更寒可憐紅繡被空記合時歡瑞鷓鴣瑞香東風冷落舊梅臺猶喜山花拂面開紺色深衣春意净水沉薰骨晚風來柔條不學丁香結矮樹仍參茉莉栽安得方盆載幽植道人隨處作香材好事近資州道上無雙堠感懷作别夢記春前春盡苦無歸日想見鵲聲庭院誤幾回消息萬重離恨萬重山無處說思憶只有路傍雙堠也隨人孤隻滿江紅浣花因賦京鏜錦里先生草堂築浣花溪上料飽看階前雀食籬邉漁網跨鶴騎鯨歸去後橋西潭北留佳賞况依然一曲抱村流江痕漲魚龍戲相浩蕩禽鳥樂增舒暢更綺羅十里棹歌來往坐上英賢今李郭邦人應作仙舟想但喧呼落日未西時船休放洞仙歌重九藥市前人三年錦里見重陽藥市車馬喧闐管絃沸笑籬邉孤寂臺上疏狂爭得似此日西南都㑹癡兒官事了樂與民同况值髙秋好天氣不羞短髮不照哀顔聊滿插黃花一醉道物外髙人有時來問混雜龍蛇箇中誰是唐司空圗重陽山居詩滿目秋光還似鏡殷勤為我照衰顔鷓鴣天葭萌馹作即今之施店陸遊看盡巴山看蜀山子規江上過春殘慣眠古驛常安枕熟聽陽關不慘顔慵服氣懶燒丹不妨青鬢戲人間祕傳一字神仙訣說與君知只是頑水龍吟榮南作前人樽前花底尋春處堪嘆心情全减一身萍寄酒徒雲散佳人天逺那更今年瘴煙蠻雨夜郎江畔漫倚樓橫笛臨窗看鏡時揮涕驚流轉花落月月庭院悄無言魂消腸斷憑肩携手當時曽效畫梁栖燕見說新來網縈塵暗舞衫歌扇料也羞憔悴慵行芳徑怕鶯兒見沁園春三榮橫溪閣小宴前人粉破梅梢緑動萱叢春意巳深漸珠簾低卷筇枝微步氷開躍鯉林暖鳴禽荔子枎疏竹枝哀怨濁酒一尊和淚斟憑欄久嘆山川冉冉嵗月駸駸當時豈料如今漫一事無成霜鬢侵看故人强半沙堤黃閣魚懸帶玉貂映蟬金許國雖堅朝天無路萬里凄凉誰寄音東風裏有灞橋烟栁知我歸心木蘭花慢夜登青城山玉華樓前人閲邯鄲夢境嘆緑鬢早霜侵奈華嶽燒丹青溪看鶴尚負初心年來向濁世裏悟真詮祕訣絶幽深養就金芝九畹種成琪樹千林星壇夜學步虛吟露冷透瑶簮對翠鳳披雲青鸞遡月宫闕蕭森琅函一封奏罷自鈞天帝所有知音却過蓬壺笑傲世間嵗月駸駸蘇武慢唐西安湖即今崇慶州前人淡靄空濛輕隂清潤綺陌細塵初靜平橋繫馬畫閣移舟湖水倒空如鏡掠岸飛花傍簷新燕都是學人無定嘆連年戎帳經春邊壘暗凋顔鬢空記憶杜曲池臺新豐歌管怎得故人音信羇懷易感老伴無多談塵久閒犀柄惟有翛然筆床茶竈自適筍輿煙艇待緑荷遮岸紅蕖浮水更乘幽興蝶戀花離小益作前人水漾萍根風捲絮倩笑嬌顰忍記逢迎處只有夢魂能再遇堪嗟夢不由人做夢若由人何處去短帽輕衫夜夜眉州路不怕銀釭深繡户只愁風斷青衣渡臨江仙離果州作前人鳩雨催成新緑燕泥收盡殘紅春光還與美人同論心空眷眷分袂却匆匆只道真情易寫那知怨句難工水流雲散各西東半廊花院月一帽栁橋風漢宫春張園賞海棠作園故蜀燕王宮也前人浪迹人間喜聞猿楚峽學劍秦川虛舟泛然不繫萬里江天朱顔緑鬢作紅塵無事神仙何妨在鶯花海裏行歌閒送流年休笑放慵狂眼看門坊深院多少嬋姢燕宫海棠夜宴花覆金船如椽畫燭酒䦨時百炬輕烟憑寄語京華舊侣幅巾莫換貂蟬月上海棠成都城南有蜀王舊苑多梅花百餘年古木前人斜陽廢苑朱門閉弔興亡遺恨淚㾗裏淡淡宫梅也依然㸃酥剪水凝愁處似憶宣華舊事行人别有凄凉意折幽香誰與寄千里佇立江臯杳難逢隴頭歸騎音塵逺楚天危樓獨倚宣華故蜀苑名栁梢青故蜀燕王宫海棠之盛為成都第一今屬張氏前人錦里繁華環宫故邸叠萼竒花俊客妖姬爭飛金勒齊駐香車何須幕障幃遮寶杯浸紅雲瑞霞銀燭光中清歌聲裏休恨天涯齊天樂左綿道中前人角殘鐘晚關山路行人乍依孤店塞月征塵鞭絲帽影常把流年虛占藏鴉栁暗嘆輕負鶯花謾勞書劍事往關情悄然頻動壯逰念孤懷誰與强遣市壚沽酒酒薄怎當愁釅倚瑟妍詞調鉛妙筆那寫柔情芳艷征途自厭况煙斂蕪痕雨稀萍㸃最是眠時枕寒門半掩其二三榮人日逰龍洞作前人客中隨處閒消悶來尋嘯臺龍岫路斂春泥山開翠霧行樂年年依舊天工妙手放輕緑萱芽淡黃楊栁笑問東君為人能染鬢絲否西州催去近也帽簷風軟且看市樓沽酒宛轉巴歌凄凉塞管携客何妨頻奏征塵暗袖漫禁得梅花伴人踈瘦幾日東歸畫船平放溜桃源憶故人有序前人三榮郡治之西因子城作樓觀曰髙齊下臨山村蕭然如世外豫留七十日被命參成都戎幕而去臨行徙倚竟日作桃源憶故人一首斜陽寂歷柴門閉一㸃炊煙時起雞犬往來林外俱有蕭然意衰翁老去踈榮利絶愛山城無事臨去畫樓頻倚何日重來此風入松前人十年裘馬錦江濱酒隱紅塵萬金選勝鶯花海倚疏狂驅使青春吹笛魚龍盡出題詩風月俱新自憐華髮滿紗巾猶是官身鳳樓常記當年語問浮名何似身親欲寄吳箋說與這回真箇閒人水龍吟前人摩訶池上追逰路紅緑參差春晚韶光妍媚海棠如醉桃花欲暖挑菜初間禁煙將近一城絲管看金鞍爭道香車飛蓋爭先占新亭館惆悵年華暗換黯銷魂雨收雲散鏡奩掩月叉梁折鳳秦筝斜鴈身在天涯亂山孤壘危樓飛觀嘆春來只有楊花和恨向東風滿江月晃重山芳華樓雪前人芳草洲前道路夕陽樓上䦨干碧雲何處望歸鞍從軍客耽樂不思還洞裏仙人種玉江邊楚客滋蘭鴛鴦沙暖鶺鴒寒菱花晚不禁鬢毛斑虞美人咏虞美人草唐無名氏帳中草草軍情變月下旌旗亂攬衣推枕愴離情逺風吹下楚歌聲正三更烏騅欲上重相顧艷態花無主手中蓮萼凛秋霜九泉歸去是仙鄊恨茫茫虞美人和前題宋黃載萬世間離恨何時了不為英雄少楚歌聲起霸圗休玉帳佳人血淚滿東流荒葵野葛吳城暮玉貌知何處至今芳草解婆娑只有當時魂魄未消磨賈氏談録云褒斜谷中有虞美人草狀如雞冠花葉相對益州草木記云雅州名山縣出虞美人革應拍而舞酉陽雜爼云舞草出雅州方物圗贊虞作娛水調歌頭范成大萬里籌邊處形勝壓坤維恍然舊觀重見鴛瓦拂參旗夜夜東山銜月日日西山橫雪白羽弄空暉人語半霄碧驚倒路傍兒分弓了看劍罷倚欄時蒼茫平楚無際千古鎖煙霏野曠岷嶓江動天濶崤函雲擁太白暝中低老矣漢都護却望玉門歸海棠詞前人馬蹄塵撲春風得意笙簫逐款門不問誰家竹祇揀紅粧多處燒銀燭碧雞坊裏花如屋燕王宫畔花成谷不須悔唱關山曲直為海棠也合來西蜀水調歌頭題劍閣崔與之萬里雲間戍立馬劍門關亂山極目無際直北是長安人苦百年塗炭鬼哭三邊鋒鏑天道久應還手寫留屯奏炯炯寸心丹對青燈搔白髮漏聲殘老猶勛業未就妨却一身閒梅嶺緑隂青子蒲澗清泉白石怕我舊盟寒烽火平安報歸夢到家山賀新郎代妓送太守盧申春色原無主荷東君著意看承等閒分付多少無情風與浪那更蝶欺蜂妬算燕雀眼前無數從使簾櫳能愛護到如今巳是成遲暮芳草碧遮歸路看看做到難言處怕仙槎輕轉旌旗易歌𥜗袴月滿西樓絃索靜雲蔽崑城閬府便恁地一帆輕舉獨倚䦨干愁拍碎慘玉容淚眼如紅雨去與住兩難訴浣沙溪瑞香張孝祥臘後春前别一般梅花枯淡水仙寒翠雲裘著紫霞冠仙品只今推第一清香元不是人間為君更試小龍團浣沙溪餞鄭憲前人寶蠟燒春夜影紅梅花枝傍錦薰籠曲瓊低捲瑞香風萬里江山供燕几一時賓主看談鋒問君歸計莫匆匆賀新郎文及翁一勺西湖水渡江來百年歌舞百年酣醉回首洛陽花世界煙渺黍離之地更不復新亭墮淚簇樂紅粧搖畫舫問中流擊楫何人是千古恨幾時洗全生自負澄清志更有誰磻溪未遇傅巖未起國事如今誰仗倚衣帶一江而巳便都道江神堪恃借問孤山林處士但掉頭笑指梅花蕊天下事可知矣鳳栖梧題劍門驛盧氏蜀道青天煙靄翳帝里繁華迢遞何時至回望錦川添粉淚鳳叉斜軃烏雲膩鈿帶香盤金縷細玉珮丁當露滴寒如水從此鸞粧添逺意畫睂學得遙山翠謁金門李好義花過雨又是一畨紅素燕子歸來衝繡幕舊巢無覓處誰在玉樓歌舞誰在玉關辛苦若使胡塵吹得去東風侯萬户巫山十二峯詞元趙孟俯叠嶂千重碧長江一帶清瑶壇霞冷月朧明欹枕若為情雲過船窗曉星移宿霧晴古今離恨撥難平惆悵峽猿聲右净壇峯片月生危岫殘霞拂翠桐登龍峯下楚王宫千古感遺蹤栁色眉邊緑花明臉上紅欲尋靈跡阻江風離思杳無窮右登龍峯松鶴堆嵐靄陽臺枕水湄風清月冷好花時怊悵阻佳期别夢逰蝴蝶離歌怨竹枝悠悠往事不勝悲春恨入雙眉右松鶴峯雲裏髙唐觀江邊楚客舟上升峯月照妝樓離思兩悠悠雲雨千重阻長江一帶秋歌聲頻唱引離愁光景恨如流右上升峯絶頂朝雲散寒江暮雨頻楚王宫殿已成塵過客轉傷神月是巫娥伴花為宋玉鄰一聽歌調一含嚬哀怨竹枝春右朝雲峯雨過蘋汀逺雲深水國遙渡頭齊舉木蘭橈纎細楚宫腰映水勻紅臉偎花整翠翹行人倚棹正無聊一望一魂銷右集仙峯碧水鴛鴦浴平沙豆蔲紅望霞峯翠一重重帆缷落花風淡薄雲籠月霏微雨灑篷孤舟晚泊浪聲中無處問音容右望霞峯芍藥虛投贈丁香漫結愁鳳栖鸞去兩悠悠新恨怯逢秋山色驚心碧江聲入夢流何時弦管簇歸舟蘭棹泊沙頭右棲鳳樓碧水澄青黛危峰聳翠屏竹枝歌怨月三更别是斷腸聲煙外黃牛峽雲邊白帝城扁舟清夜泊蘋汀倚棹不勝情右翠屏峯鶴信三山逺羅裙片水深髙唐春夢杳難尋惆悵至如今十二峯前月三千里外心紅箋錦字信沈沈腸斷舊香衾右聚鶴峯曉色飄紅豆平沙枕碧流泉聲雲影弄新秋觸處是離愁臉淚橫波淡眉攢片月收佳人無力笑難休半整玉搔頭右望泉峯裊娜江邊栁飄颻嶺上雲卸帆回棹楚江濱歸信夜來聞欲拂珊瑚枕先熏翡翠裙江頭含笑去迎君鸞鳳盡成羣右起雲峯巫山十二峯在楚蜀之交余嘗過之舟行迅疾不及登覽近巫山尹王道於峯端摹得趙松雪詞十二首傳之其詞集中不載以樂府巫山一假雲按之可歌也右傳記稱帝之季女名曰瑶姬精魂作草實為靈芝宋玉本此以託諷後世詞人轉加緣飾兹為黷矣重葩纍藻不越此意余愛袁嵩之語謂秀峰叠崿竒構異形林木蕭森離離蔚蔚乃在霞氣之表仰矚俯睇不覺忘返自所履歷未始有也山水有靈亦當警知己于古矣尋此語意使人神逰八極而脫然自濯于曄光溫瑩之外暇日因録松雪詞并附袁語于後以洗名山之誣而識余未登之慊云蘇武慢至正八年夏和虞道張伯雨清露晨流新桐初引消受北窗凉曉經卷薰爐筆床茶具長物恁他圍繞老子無情年光有限只似木人花鳥擬凝雲數朵竒峯曽見漢唐池沼還自笑待老學鱏魚金題玉躞書裏也容身了阿對泉頭布衣無恙占斷雨苔風篠獨鶴歸來西山缺處掠過亂鴉林表舞琴心叠胎仙坐到髙山小全蜀藝文志卷二十五
