body:
  text: 全蜀藝文志卷二十四明周復俊編詩哀挽哀嚴鄭公唐杜甫鄭公瑚璉器華嶽金天晶昔在童子日已聞老成名嶷然太賢後復見秀骨清嚴武傅武中書侍郎挺之子神氣雋爽敏于聞見幼如成人讀書不究精義涉獵而已大賢謂嚴子陵歟開口取將相小心事友生甫與武世契也嘗醉登武牀呼斥其父名而武不忤閲書百紙盡落筆四座驚歷職匪父任嫉邪常力爭武弱冠以門廕䇿名哥舒翰奏充判官至德初肅宗初靖難大收才傑武仗節赴行在宰相房琯素重之及是首薦才略可稱纍遷給事中漢儀尚整肅時武為侍御史戎馬忽縱橫祿山之亂也飛傳自河隴逢人問公卿不知萬乘出雪涕風悲鳴受詞劍閣道謁帝蕭關城河隴劍閣蕭關城事新舊二史皆不載寂寞雲臺仗飄颻沙塞旌江山少使者笳鼓凝皇情壯士血相視忠臣氣不平密論貞觀體揮發岐陽征時肅宗理兵鳯翔感激動四極聫翩收二京二京長安東都也二史皆不載武收復功西郊牛酒再原廟丹青明匡汲俄寵辱衛霍竟哀榮四登會府地既收長安以武為京兆少尹兼御史中丞時年二十二後又遷京兆尹兼御史大夫三掌華陽兵華陽成都也武以史思明阻兵不之官優遊京師頗自矜大出為綿州刺史遷劍南東川節度使上皇誥以劍南兩川合為一道拜武成都尹充劍南節度使入復求為方面拜成都尹在蜀纍年肆志逞欲行猛政威振一方京兆空栁色尚書無履聲羣鳥自朝夕白馬休橫行諸葛蜀人愛文翁儒化成公來雪山重公去雪山輕記室得何遜韜鈐延子荆四郊失壁壘失壁壘言無事戍也此美武能鎮靜也虛館開逢迎堂上指圗畫軍中吹玉笙豈無成都酒憂國只細傾時觀錦水釣問俗終相并意待犬戎滅人藏紅粟盈以兹報主願庶或裨世程炯炯一心在沉沉二豎攖顔回竟短折賈誼徒忠貞飛旐出江漢孤舟轉荆衡虛為馬融笛悵望龍驤塋空餘老賓客身上愧簮纓嚴孝子墓作劉灣至性教不及因心天所資禮聞三年喪女獨終身期下布骨肉恩上報父母慈禮聞哭有卒女獨哀無時前有松柏林荆刺結蒙蘢墓門白日閉泣母黃泉中草服蔽枯骨垢容載飛蓬舉聲哭蒼天萬木皆悲風賈島墓鄭谷水繞孤墳縣路斜耕人呀我久咨嗟重來兼恐無尋處落日風吹鼓子花蘇明允挽詩宋歐陽修布衣馳譽入京都丹旐俄驚返舊廬諸老誰能先賈誼君王猶未識相如三年弟子行喪禮千里鄊人會葬車我獨空齋挂塵榻遺編將閲子雲書豫昔逰雲臺觀謁希夷先生陳搏祠堂緬想其人今追作此詩宋祁仙館三峯下年華百嵗中夢休孤蝶往此言先生善睡一寢逾一月蛻在一蟬空有冢在華山下蕊笈微言祕霄晨浩氣通丹遺舐後鼎林遣御餘風市霧沉荒白餐霞委暗紅岷峨有歸約飛步與誰同憐制置張珏文天祥珏蜀之健將與咱萬夀齊名咱降張獨不降行朝拔授制閫未知得拜命否蜀雖糜碎珏竟不降為左右所賣珏覺而逃被囚入北不肯屈復不知何如氣敵萬人將獨在天一隅向使國不亡功業竟何如挽四川制置使知重慶府張公珏此宋末十忠之一劉塤坤維拓提封形勝古天府血戰五十秋零落餘八柱江南傳箭急誰暇此回顧落日古渝城仗鉞乃甚武天東甑雖墮吾自強支拄渡瀘躬討逆歸來戰彌苦蕭條下夔門機穽伏中路咄咄快敵仇誰與掩壞土哀哉關西雄國亡猶不負同時督軍將腰金插雙虎挽蜀帥張公珏按蜀夔州路南至施州北至漢中府東至荆州府西至重慶府秦置巴郡劉璋為永寧郡先主為巴東郡唐渝州乂南平郡宋朝光宗潛邸升為府前人玉壘雲浮五十秋關西虓將勇無儔三吳甑墮猶堅守八柱唇亡不耐愁瀘水捷收勞騕裊夔門機伏失兜鍪吾君不負吾寧死遺恨誰憐快敵讐至元十二年乙亥夏荆湖諸郡俱歸附蜀之音問不復與東南通制置使知重慶府張玨猶振厲自立招討梅應春以江安歸附珏遣兵收復擒應春至重慶府臠之大兵收取江安所部州郡俱降惟張起岩帥夔與玨共為宋守屹然雙城勢窮援絶屢以虎符招珏珏不從帳下將有勸其降者珏未果將遂畔夜開關納大兵珏率親兵巷戰不勝登舟欲下夔就起岩至中途隨行將士利重賞且念妻子俱巳陷重慶遂執珏歸附終不肯降會應春之子朝燕訴前事復父仇珏遂遇害挽綿漢簡州諸公綿漢簡並屬成都府路潼綿州廣漢涪縣先主分梓郡西魏置潼州隋改綿州唐改金川郡巴西郡復綿州宋朝因之漢州漢蜀郡分為廣漢西漢新都國宋齊廣漢郡後周廢之唐立漢州又漢陽軍復漢州宋因之簡州漢武分蜀郡置犍為郡魏置資州隋置簡州唐置簡州又改陽安郡復為簡州宋因之前人綿漢風酸動殺機北來鐵騎遍驅馳幾千里地弓刀運百萬人家骨肉糜鬼哭神號無限恨蠅蛄蚋嘬有餘悲平生食祿何從避留取香名百世垂大兵分哨入簡州知州李大全死知懷安軍史顯孫避于簡亦死率大兵至漢州通判權州劉當可與一宗室太保率民兵城守大保出城往羅山謁賀靖借兵歸遇大兵見殺遂破城忿而血洗焚蕩死十萬餘家當可與節制邵復知録羅由教授袁拱辰知縣羅君父皆遇害知綿州范辰孫死挽四川制帥陳公隆之成都十六州六十一縣成都府梁州城古蜀國秦置蜀郡漢曰益州晉改成都國宋齊並益州唐改成都府趙宋因之前人狼煙又起錦城邊帥閫謀疏亦可憐先軫元歸應有恨萇𢎞血化豈無寃百身莫贖誰三酬一死真成蓋萬愆遺事如今人不記綱常猶幸立西川辛丑冬元帥率精鋭以攻成都制使陳隆之嬰城固守大兵苦攻不克欲退而都統田世顯聞大安門大兵遂入執隆之先殺其家制使參議蒲東卯而下死者十數人執隆之至漢川俾招都統王夔而隆之止書城破被執四字示之且呼夔勉力堅守元帥大怒手刺殺之事聞贈待制立廟推恩族屬以為嗣知隆州蒲東寅被執不屈死弔曹將軍友聞安知山將軍精悍姿齒齒碎鐡石在昔童稚間但聞飽經術縱橫騁柔翰丹艧間金碧有司塞明詔弊色屈詞伯芹香春水生冠玉侍重席脫落章句陋搜抉窮理窟未及文化成其如王土窄丈夫報主願豈必仕清秩蒼然請去位滿面秋溧冽糾合熊虎羣旌斾揚廣陌正當磨礪間一鼓拔勍敵屯兵沔水源千載斧截截浩蕩排煙雲西極安嵲屼奈何國無人腐儒秉旄鉞賞豫入私門金湯授盜賊公時奮擊爭返遭獻玉刖三軍視馬首痛哭天下璧功成坐齟齬憤怒須插戟中宵按劍起肅肅整羽翮吐氣風雲生搴旗陷堅列貫穿死生地蹀血天地黑勢雖衆寡懸形未雌雄決路窮斷首尾衆盡仍手格豈知龍虎逝黯淡山川色百萬尚震驚嗚呼死諸葛長城但自壞千古痛稠結肉食無逺謀野史有直筆酒酣歌節士皛皛霜日白張萬户夫人貞節元貢師泰白帝樓前巷陌深將軍旌斾正沉沉玉簫聲斷孤鸞曲緑綺絃空别鶴吟豈是人生輕一羽要知妾死重千金春風冢上連枝樹只有韓憑會此心費烈女吟明氏實録劉堪永康費氏女年少十八九擇對無可人真心似瓊玖禮法以防身絲麻常在手至正十七載太嵗次丁酉逆賊從東來旌旗搖北斗三巴數十城皆降不敢後唐姬與薑氏不慙為賊偶費女涕泣悲勤勤告父母人生棄禮義豬狗亦何有我身不如賊我死骨不朽夜深盛容飾自縊後園栁髙義感行人痛心而蹙首平章買奴者左丞韓叔亨低頭奴屈膝拜賊乞餘生不能受白刃空負朝廷恩茫茫天壤間生死義與仁太山與鴻毛孩提知重輕費女生草野烈烈超凡倫二公國柱石棄甲如輕塵芳名與汚迹遺戒百千春弔鄒汝愚卒石城陳獻章少年為意儘峥嶸謫死天涯氣未平舊雨不留花縣榻秋風還閃石城旌兒啼母絶家何處水宿山居路幾程人事每將天不定文章何處博虛名亡弟材同梅山書屋席春淡玄養素寄真如奮翼雲霄佩錦裾玉檢細函收諫草龍驤逺策奠州閭崖山精舍浮青靄浣水茅堂照碧渠天外暮雲悲斷雁西風灑淚獨傷豫大司馬梧山李公徐文華吾受李公知未識李公面嗟公久巳殁緬懷何由見休休好善心卓卓當朝彥美玉瑩無瑕精金嘗百鍊氣概凌秋空巋若靈光見所在樹功勳聲光耀雷電後進賴推轂曽不遺寸善哭張士元有引安磐士元為給舍數月即以封事忤毅皇謫官貴州新添驛者七年皇上登極召復舊官先後歷朝才一考而獨立敢言大禆國是今年秋七月以大禮事同余伏闕下獄既而同杖越十日又同以首事被逮于朝有旨放還而士元竟坐杖不起時禁方嚴弔客無敢至者斯文之痛極矣乃余感知己傷斯文之不可復得痛哭數日作詩志哀七載夷方謫三年諫議班家聲續臺史先世曾為御史封事動天顔弔客何人至秦川有櫬還不才同放逐後死淚潺湲同舍今何在斯人天下無感時看諫草何日奠生芻狐鼠私相慶衣冠勢益孤空餘青史上遺簡載名儒哭毛用成同年有序前人用成豫同年友也徘徊給舍者十五年年過五十不忘忠諫大禮之議杖而死焉旅櫬南行殆餘萬里感泣以之爰作是詩毛公心事有誰知每恨年來未拂衣青瑣禁中啼鳥散碧雞坊外主人非封章未了心猶壯大禮初成願巳違冷雨凄風萬餘里可憐丹旐日南飛鬼謡髙駢築羅城多發掘古冢取甎甃城有滄州守禦指揮使薑知古者當掘一冢夜有鬼嘯于冢上因獻一書辭旨哀切其書曰冥司趙􅭶謹以幽昧致書于守禦指揮端公閣下竊以趙氏之寃搏膺入夢良夫之枉被髮叫天是以有怨必讐無道則見此則流于往史載在前文如􅭶也一介逰魂九泉罔象德不勝饗禱不勝人無廟貌于世間遂湮沉于泉壤自蒙天譴使掌冥司雖叨正直之官未逹聰眀之理未嘗以威服衆唯知以禮作人頃至本朝叨為上相不無濫德敢有害盈今者伏審渤海髙公令君毁􅭶墳闕况􅭶謫居幽府天賜佳城平生無戰伐之讐邂逅起誅夷之釁得不撫銘旌而憤志託觚染以申懷伏希端公俯念無依迥垂有鑒特于萬雉免此一壞儻全馬鬛之封敢忘龍頭之庇謹吟五言四句詩一章後幅上聞不勝望德之至謹白詩曰我昔勝君昔君今勝我今人生一世事何用苦相侵廣政初後主與其妃張太華同輦逰青城宿九天丈人觀中月餘不返李廷圭諫而不聽又數日雷雨大作若失白晝而太華被震殞矣乃以紅錦龍褥裹瘞觀前白楊樹下翌日急趨回鑾悲痛無巳後數年鍊師李若沖因晚霽間步觀側忽見白楊樹下一美人翠睂雪肌仙姿窈窕吟曰一别鑾輿今幾年白楊風起不成眠常思往日椒房寵淚滴衣襟損翠鈿若沖問曰子人耶鬼耶美人斂袵而前曰妾蜀妃張太華也因陪駕逰此被震今幽魂尚滯乞賜超拔若沖于是秋中元令節黃籙齋會中為奠長生金簡生神玉章度生人世若沖後夢太華謝曰妾巳受生人世矣壁間黃土書一絶云符吏匆匆叩夜扄便隨金簡出幽冥蒙師薦拔恩非淺領得生神九卷經蜀主聞之厚賜若沖是後惟花蕊夫人寵冠后宫矣楊藴中以罪入成都獄夜夢一婦人曰吾薛濤之流也頃幽死此室乃贈藴中一絶句玉漏深長燈耿耿東墻西墻時見影月明窗外子規啼忍使孤魂良夜永陳甲字升父隆州人紹興間為蜀帥李公璆之客館于雙竹齋夜見數婦笑語有吟兩絶句者因忽不見曉雨廉纎梅子黃晚雲卷雨月侵廊樹隂把酒不成飲説著無情更斷腸舊時衣服盡雲霞不到迎仙不是家今日樓臺渾不識祇因古木記宣華元戊寅間荆州分域有鬼夜叫云苦也苦幾時泥到襄陽府及早視之凡樹木大小皆泥和畜毛自根泥至分枝處則止後又叫云苦也苦幾時泥到成都府蓋古今未聞之異也草木子昔長寧耕者得銅牌曰小桃源其上有詩云綽約去朝真仙源萬木春要知竊桃客定是會稽人全蜀藝文志卷二十四
