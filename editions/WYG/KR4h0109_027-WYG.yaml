body:
  text: 全蜀藝文志卷二十七明周復俊編表疏狀上漢帝表漢先主臣以具臣之才荷上將之任董督三軍奉辭於外不能掃除冦難靖匡王室乆使陛下聖教陵遲六合之内否而未泰惟憂反側疢如疾首曩者董卓造為亂階自是之後羣凶縱横殘剥海内賴陛下聖徳威靈人臣同應或忠義奮討或上天降罰暴逆並殪以漸冰消惟獨曹操乆未梟除侵擅國權恣心極亂臣昔與車騎將軍董承圖謀討操機事不宻承見陷害臣播越失據忠義不果遂得使操窮凶極逆主后戮殺皇子鴆害雖糾合同盟念在奮力懦弱不武歴年未効常恐殞沒孤負國恩寤寐永歎夕惕若厲今臣羣寮以為在昔虞書敦叙九族庶明勵翼五常損益此道不廢周監二代並建諸姬實賴晉鄭夾輔之福髙祖龍興尊王子弟大啓九國卒斬諸吕以安太宗今操惡直醜正實繁有徒包藏禍心篡盜已顯既宗室微弱帝族無位斟酌古式依假權宜上臣大司馬漢中王臣伏自三省受國厚恩荷任一方陳力未效所獲已過不宜復忝髙位以重罪謗羣僚見逼廹臣以義臣退惟冦賊不梟國難未已宗廟傾危社稷將墜誠臣憂責碎首之負若應權通變以寧靖聖朝雖赴水火所不得辭敢慮常宜以防後悔輙順衆議拜受印璽以崇國威仰惟爵號位髙寵厚俯思報效憂深責重驚怖累息如臨於谷盡力輸誠奨勵六師卒齊羣義應天順時撲討凶逆以寧社稷以報萬分謹拜章因驛上還所假左將軍宜城亭侯印綬辭先主表蜀孟達伏惟殿下將建伊吕之業追桓文之功大事草創假勢吳楚是以有為之士深覩歸趣臣委質已來愆戾山積臣猶自知况於君乎今王朝以興英俊鱗集臣内無輔佐之器外無將領之才列次功臣誠自醜也臣聞范蠡識微浮於五湖咎犯謝罪逡廵於河上夫際㑹之間請命乞身何則欲潔去就之分也况臣卑鄙無元功巨勲自繫於時竊慕前賢早思逺恥昔申生至孝見疑於親子胥至忠見誅於君䝉恬拓境而被大刑樂毅破齊而遭讒佞臣每讀其書未甞不慷慨流涕而親當其事益以傷絶何者荆州覆敗大臣失節百無一還惟臣尋事自致房陵上庸而復乞身自放於外伏想殿下聖恩感悟愍臣之心悼臣之舉臣誠小人不能始終知而為之敢謂非臣每聞交絶無惡聲去臣無怨辭臣過奉教於君子願君王勉之也臨發漢中上後主疏諸葛亮先帝創業未半而中道崩殂今天下三分益州疲敝此誠危急存亡之秋也然侍衛之臣不懈於内忠志之士忘身於外者盖追先帝之殊遇欲報之於陛下也誠宜開張聖聽以光先帝遺徳恢𢎞志士之氣不宜妄自菲薄引喻失義以塞忠諫之路也宫中府中俱為一體陟罰臧否不宜異同若有作奸犯科及為忠善者宜付有司論其刑賞以昭陛下平明之理不宜偏私使内外異法也侍中侍郎郭攸之費禕董允等此皆良實志慮忠純是以先帝簡拔以遺陛下愚以為宫中之事事無大小悉以咨之然後施行必能禆補闕漏有所廣益將軍向寵性行淑均曉暢軍事試用於昔日先帝稱之曰能是以衆議舉寵為督愚以為營中之事悉以咨之必能使行陣和睦優劣得所親賢臣逺小人此先漢所以興隆也親小人逺賢臣此後漢所以傾頽也先帝在時每與臣論此事未甞不歎息痛恨於桓靈也侍中尚書長史參軍此悉忠良死節之臣願陛下親之信之則漢室之隆可計日而待也臣本布衣躬耕於南陽茍全性命於亂世不求聞達於諸侯先帝不以臣卑鄙猥自枉屈三顧臣於草廬之中諮臣以當世之事由是感激遂許先帝以驅馳後值傾覆受任於敗軍之際奉命於危難之間爾來二十有一年矣先帝知臣謹慎故臨崩寄臣以大事也受命以來夙夜憂嘆恐託付不效以傷先帝之明故五月渡瀘深入不毛今南方已定兵甲已足當奨率三軍北定中原庶竭駑鈍攘除奸凶興復漢室還於舊都此臣所以報先帝而忠陛下之職分也至於斟酌損益進盡忠言則攸之禕允之任也願陛下託臣以討賊興復之效不效則治臣之罪以告先帝之靈若無興徳之言則責攸之禕允等之慢以彰其咎陛下亦宜自謀以諮諏善道察納雅言深追先帝遺詔臣不勝受恩感激今當逺離臨表涕零不知所言乞伐魏疏諸葛亮先帝慮漢賊不兩立王業不偏安故託臣以討賊也以先帝之明量臣之才固知臣伐賊才弱敵强也然不伐賊王業亦亡惟坐而待亡孰與伐之是故託臣而弗疑也臣受命之日寢不安席食不甘味思惟北征宜先入南故五月渡瀘深入不毛并日而食臣非不自惜也顧王業不可偏安於蜀都故冒危難以奉先帝遺意也而議者謂為非計今賊適疲於西又務於東兵法乗勞此進趨之時也謹陳其事如左髙帝明並日月謀臣淵深然渉險被創危然後安今陛下未及髙帝謀臣不如良平而欲以長䇿取勝坐定天下此臣之未解一也劉繇王朗各據州郡論安言計動引聖人羣疑滿腹衆難塞胸今嵗不戰明年不征使孫䇿坐大遂并江東此臣之未解二也曹操智計殊絶於人其用兵也髣髴孫吳然困於南陽險於烏巢危於祁連偪於黎陽幾敗北山殆死潼闗然後偽定一時耳况臣才弱而欲以不危而定之此臣之未解三也曹操五攻昌霸不下四越巢湖不成任用李服而李服圖之委任夏侯而夏侯敗亡先帝每稱操為能猶有此失况臣駑下何能必勝此臣之未解四也自臣到漢中中間朞年耳然喪趙雲陽羣馬玉閻芝丁立白夀劉郃鄧銅等及曲長屯將七十餘人突將無前賨叟青羌散騎武騎一千餘人此皆數十年之内所糾合四方之精鋭非一州之所有若復數年則損三分之二也當何以圖敵此臣之未解五也今民窮兵疲而事不可息事不可息則住與行勞費正等而不及早圖之欲以一州之地與賊持乆此臣之未解六也夫難平者事也昔先帝敗軍於楚當此時曹操拊手謂天下已定然後先帝東連吳越西取巴蜀舉兵北征夏侯授首此操之失計而漢事將成也然後吳更違盟闗羽毁敗秭歸蹉跌曹丕稱帝凡事如是難可逆見臣鞠躬盡瘁死而後已至於成敗利鈍非臣之明所能逆覩也乞立諸葛亮廟表督隆臣聞周人懐召伯之徳甘棠為之不伐越王思范蠡之功鑄金以存其像自漢興以來小善小徳而圖形立廟者多矣况亮徳範遐邇勲蓋季世興王室之不壊實斯人之是賴而烝甞止於私門廟像闕而莫立使百姓巷祭戎夷野祀非所以存徳念功述追在昔者也今若盡順民心則瀆而無典建之京師又偪宗廟此聖懐所以懐疑也臣愚以為宜因近其墓立之於沔陽使所親屬以時賜祭凡其臣故吏欲奉祠者皆限至廟斷其私祀以崇正禮上襲魏疏蔣琬芟穢弭難臣職是掌自臣奉辭漢中已經六年臣既闇弱加嬰疾疢規方無成夙夜憂慘今魏跨帶九州根蔕滋蔓平除未易若東西并力首尾掎角雖未能速得如志且當分裂蠶食先摧其支黨然吳期二三連不克果俯仰惟艱實忘寢食輙與費禕等議以凉州胡塞之要進退有資賊之所惜且羌胡乃心思漢如渴又昔偏軍入羌郭淮破走算其長短以為事首宜以姜維為凉州刺史若維征行銜持河右臣當帥軍為維鎮繼今涪水陸四通惟急是應若東北有虞赴之不難諫後主疏譙周昔王莽之敗豪傑並起跨州據郡欲弄神器於是賢才智士思望所歸未必以其勢之廣狹惟其徳之厚薄也是故於時更始公孫述及諸有大衆者多已廣大莫不快情恣欲怠于為善㳺獵飲食不恤民物世祖初入河北馮異等勸之曰當行人所不能為遂務理寃獄節儉飲食動遵法度故北州歌嘆聲布四逺於是鄧禹自南陽追之吳漢冦恂未識世祖遥聞徳行遂以權計舉漁陽上谷突騎迎於廣阿其餘望風慕徳者邳彤耿純劉植之徒至於輿病齎棺襁負而至者不可勝數故能以弱為强屠王郎吞銅馬折赤眉而成帝業也及在洛陽甞欲小出車駕已御銚期諌曰天下未寧臣誠不願陛下細行數出即時還車及征隗囂潁川盜起世祖還洛陽但遣冦恂徃恂曰潁川以陛下逺征故奸猾起叛未知陛下還恐不時降陛下自臨潁川賊必即降遂至潁川竟如恂言故非急務欲小出不敢至於急務欲自安不為故帝者之欲善也如此故傳曰百姓不徒附誠以徳先之也今漢遭厄運天下三分雄哲之士思望之時也陛下天姿至孝喪踰三年言及隕涕雖曽閔不過也敬賢任才使之盡力有踰成康故國内和一大小戮力臣所不能陳然臣不勝大願願復廣人所不能者夫輓大重者其用力苦不衆拔大難者其善術苦不廣且承事宗廟者非徒求福祐所以率民尊上也至於四時之祀或有不臨池苑之觀或有仍出臣之愚滯私不自安夫憂責在身不暇盡樂先帝之志堂構未成誠非盡樂之時願省減樂官後宮所増造但奉修先帝所施下為子孫節儉之教進諸葛氏集表晉陳夀臣夀等言臣前在著作郎侍中領中書監濟北侯臣荀勗中書令闗内侯臣和嶠奏使臣定故蜀丞相諸葛亮故事亮毗佐危國負阻不賔然猶存録其言恥善有遺誠是大晉光明至徳澤被無疆自古以來未之有倫也輒刪除複重隨類相從凡為二十四篇篇名如右亮少有逸羣之才英霸之器身長八尺容貌甚偉時人異焉遭漢末擾亂隨叔父𤣥避難荆州躬耕於野不求聞達時左將軍劉備以亮有殊量乃三顧亮於草廬之中亮深謂備雄姿傑出遂解帶寫誠厚相結納及魏武帝南征荆州劉琮舉州委質而備失勢衆寡無立錐之地亮時年二十七乃建竒䇿身使孫權求援吳㑹權既宿服仰備又覩亮竒雅甚敬重之即遣兵三萬以助備備得用與武帝交戰大破其軍乗勢克捷江南悉平後備又西取益州益州既定以亮為軍師備稱尊號拜亮為丞相録尚書事及備殂沒嗣子㓜弱事無巨細亮皆専之於是外連東吳内平南越立法施度整理戎旅工械技巧物究其極科教嚴明賞罰必信無惡不懲無善不顯至於吏不容奸人懐自厲道不拾遺强不侵弱風化肅然也當此之時亮之素志進欲龍驤虎視包括四海退欲跨陵邊疆震蕩宇内又自以為無身之日則未有能蹈渉中原抗衡上國者是以用兵不戢屢耀其武然亮才於治戎為長奇謀為短理民之幹優於將略而所與對敵或值人傑如衆寡不侔攻守異體故雖連年動衆未能有克昔蕭何薦韓信管仲舉王子城父皆忖已之長未能兼有也亮之器能政理抑亦管蕭之亞匹也而時之名將無城父韓信故功業陵遲大義不及邪盖天命有歸不可以智力爭也青龍二年春亮帥衆出武功分兵屯田為乆駐之基其秋病卒黎庶追思以為口實至今梁益之民咨述亮者言猶在耳雖甘棠之詠召公鄭人之歌子産無以逺譬也孟軻有云以逸道使民雖勞不怨以生道殺人雖死不怨殺信矣論者或怪亮文彩不艶而過於丁寧周至臣愚以為咎繇大賢也周公聖人也考定尚書咎繇之謩略而雅周公之誥煩而悉何則咎繇與舜禹共謨周公與羣下矢誓故也亮所與言盡衆人凡士故其文指不及得逺也然其聲教遺言皆經事綜物公誠之心形於文墨足以知其人之意理而有補於當世伏惟陛下邁蹤古聖蕩然無忌故雖敵國誹謗之言咸肆其辭而無所革諱所以明大通之道也䕫州謝上表為栢都督唐杜甫臣某言伏奉月日制授臣某官祇拜休命内顧隕越䇿駑馬之力冒累踐之寵自數勲力萬無一稱再三怵惕流汗至踵謹以某月日到任上訖臣某誠戰誠懼頓首頓首死罪死罪伏以陛下君父任使之乆掩臣子不逮之過就其小效復分深憂察臣劍南區區恐失臣節如彼加臣頻煩階級鎮守要衝如此勉勵疲鈍伏揚陛下之聖徳愛惜陛下之百姓先之以簡易間之以樂業均之以賦歛終之以敦勸然後畢禁將士之暴𢎞洽主客之宜示以刑典難犯之科寛以困窮計無所出哀今之人庶古之道内救惸獨外攘師冦上報君父曲盡庸拙之分下循臣子勤補失墜之目灰粉骸骨以備守官伏惟恩慈胡忍容易愚臣之願也明主之望也限以所領未遑謁對無任兢灼之極謹遣某官奉表陳謝以聞誠喜誠懼死罪死罪䕫州論利害第一表劉禹錫臣某言伏准元和十二年四月十八日勅諸州刺史如有利害可言者不限時節任自上表聞奏者伏見貞觀中詔許羣臣各上書言利便馬周時布衣遂因中郎將常何獻䇿二十餘事太宗深奇之盡行其事擢周為御史至龍朔中壁州刺史鄧𢎞慶進平索㸔精四字堪為酒令髙宗嘉之亦行其言遷𢎞慶為明州刺史則知茍有見雖布衣之賤逺守之微亦可施用况臣早受國恩徳宗朝忝為御史逮今歴事四朝頻領藩條當陛下至明之時是微臣竭節之日伏以守在遐郡不敢廣有所陳謹准勅上利害及當州公務各别具狀以聞伏乞聖慈俯賜昭鑒䕫州論利害第二表劉禹錫臣某言伏准今年正月五日徳音宜令諸道觀察使刺史各具當處利害附驛以聞者伏惟皇帝陛下睿哲自天纉承列聖善述先志發揚徳音率土人臣不勝慶幸臣䖍奉詔㫖宣示蒸黎伏以華夏不同事宜各異詳求利病謹具奏聞伏乞聖慈俯賜昭鑒伏覽國史竊見開元十八年朝集使至京𤣥宗臨軒親問利害時宣州刺史裴耀卿上便宜事論轉運甚詳竟不行下至二十一年耀卿為京兆尹再以前奏論方見允納比及三年漕運七百萬石省脚費三十餘萬貫當耀卿前不見納必有人非之及後數年方展其效臣假守逺郡敢望言行祇奉詔書或冀萬一伏惟明主擇之謝政刑箴表韋臯辰象在天睿文昭煥體𢎞述作義著箴規發揮刑政之源黻藻皇王之道况理包繫象詞正典謨豈惟炯誡心靈實乃化成天下伏以刑清則功濟化育政治則俗致和平大哉聖言允叶天聽臣職守方鎮宣揚教化仰觀睿藻伏荷時休思欲紀在盤盂周旋佩服不若懸之日月垂範将來是用課率柔翰形於傳寫刋於琬琰之上表於府署之門示文武之楷模為古今之殊觀其碑刋刻已畢見立屋宇謹令修装三本隨狀奉進臣藝能薄劣筆札無功貴竭臣子之誠式揚君父之徳輕塵旒扆伏用兢惶批荅朕以為理之本繫乎刑政頃因退朝偶有製述用錫人極庶叶時中聊以自規豈能建意卿道賛元化志宣大猷爰勒貞珉躬自染翰克盡事君之節益嘉将順之心省閲再三嘆賞無已代李侍郎賀收成都府表呂温臣某言臣伏見髙崇文奏某月日官軍入成都府逆賊劉闢走出見勒兵追捕者臣聞夏震秋落乃觀成物之功善陳有征方見勝殘之理然則殺之所以生之也動之所以綏之也氣和則歳功早就徳盛則廟筭先期無遺鏃而巨冦窮奔不血刃而全蜀底定奔走夷裔鼓舞生靈騰瑞氣而躍祥風披慶雲而捧白日伏以陛下纂臨宸極維新庶政拓跡開統之始作法定制之初而賊闢敢犯天威首干大紀恃嶮與逺窮凶極暴雖禍滛助順誠天道之必然而制勝舉全皆聖謀之自出諸軍既集鋒鏑争先陛下以為方暑用兵觸冒害氣與勦人而欲速寧全衆以功遲遂令緩螻蟻之誅抑貔貅之鋭休養磨礪以須秋期由是感恩而思奮者萬心如一又髙崇文嫉惡太甚殺傷小過陛下推弔伐之義𢎞覆幬之仁兹冦是誅吾民何罪遂令逐北者生致為上脅從者獲則捨之且諭鴻私仍加安慰由是飲澤而向化者十室而九加以聖慈曲被大信有孚當挾纊之時賜戰士悉出内府開食椹之路賞降者曽不踰辰遂使昏迷革心義勇増氣江山自㧞雷雨長驅巨魁假息而逃威士衆順風而捨杖市不易肆巷無驚犬人䝉肉骨户解倒懸旌旗𨗳長養之風金鼓發生成之氣然後知至化能殺睿略無方大典用彰神武可畏全包形器之内有罪必誅旁行天地之間無思不服臣謬膺重寄親奉昌期坐觀氛祲之清目覩鯨鯢之戮手舞足蹈倍萬常情無任慶抃感躍之至請築羅城表髙駢乾符二年夏六月公以蜀土自咸通十一年并十五年兩遭蠻冦攻圍子城廹窄遂具聞奏請築羅城星月戊辰上表曰臣聞杖鉞擁旄顯受専征之寄殿邦守土必尊共理之規冀勵節以輸忠須興利而除害伏以臣當道山河雖嶮城壘未寧秦張儀收蜀之時已曽板築隋楊秀守藩之日亦更増修堅牢雖壯於一隅周匝不過於八里自咸通十年以後兩遭蠻冦攻圍數萬戸人填咽共處池泉皆竭熱氣相蒸其苦可哀斯弊可恤臣前年赴任之日纔過劍門料蠻賊奔逃不敢廻顧先遣走馬入府放出城内戸人莫不懽呼穪見蘇息臣今欲與民防患為國逺圖廣築羅城以示雄閫將謀永逸豈憚暫勞臣深受國恩實思忠藎倘允所奏乞宣付宰臣僉議又表髙駢西川境邑南詔比隣頻遭蠻蜒之侵凌蓋以墻垣之湫隘冦來而士庶投竄只有子城圍合而閭井焚燒更無遺堵且百萬衆類多少人家萃集子城可知危弊井泉既竭溝池亦乾人氣相蒸死生共處官僚暴露老幼流離但言牢城未敢出戰貨財而豈能般輦商旅而空懐怨嗟兼是戎兵同行剽劫賊路不能控扼軍營罕習干戈遂使蒸黎枉遭塗炭臣初到統押便與經營平夷鎮之隄防焉能跋涉大渡河之把截誰敢過從然須更議逺圖以防後患嚴設武備廣築羅城雄壯三川保定千載使冦孽遮圍而不遍軍戎隈倚而無疑旋奉詔書令臣參酌許興版築冀盛藩維遂乃相度地形揣摩物力不思費耗只繫安危趣十縣之人丁抽八州之將校分其地界授以城基運土囊而子來持石杵而雲集大興畚鍤廣備資粮五千堵之周迴川中捍蔽百萬人之築起空裏巍峨日居月諸功成事立金湯既設鐡甕如堅控地道之莫能徒云入冦縱雲梯之强立無計登陴白露屋之凌空躋攀莫及青城山之對峙形勢不如擁門之扄鐍堅牢曲角之規模周密壕深莫跨壁峻難攻外邉埤堄之崇髙内靣欄杆而固護獸頭帖出鴈翅排成覆瓦烟青甃連苔碧縱蠻再至無計重圖此皆仗陛下之睿謀使微臣之剏制鬼神扶助社稷庇庥臣限以守鎮不獲奔詣闕庭無任踴躍屏營之至謹畫圖差副使中散大夫内謁賜紫金魚袋楊徳章節度判官朝議郎檢校尚書兵部郎兼御史中丞賜紫金魚袋裴峴等奉進以聞偽蜀王建草斬陳敬瑄田令孜表馮涓開柙出虎孔宣父不責他人當路斬蛇孫叔敖非因利己専殺不行於閫外先機恐失於彀中臣輒行閫制處斬訖上王建疏馮涓古之用兵非以逞威暴而肆殺戮蓋以安民為先豐財為本湯武無忿怒之師髙光有魚水之士故能應天順人弔民伐罪今自土徳下衰朱梁逞虐雍都洛邑盡是荆榛江南山東各有割據鬭力則人各有力用兵則人各有兵陛下欲以一方之强舉萬全之䇿臣恐陛下之憂不在於秦雍而在於肘腋之下也上災異疏偽蜀李道安倉廪者國之本糧食者人之命固其本則邦寧重其命則人富今粒食中皆生蜂蠆切疑在位貪鄙奪民農時戕害人命故天生災異以為警告又蟲皆曳米而行恐邉鄙不寧干戈忽起饋挽相繼人不堪命伏願少精聖慮與大臣恐懼修省以消災異賀江神移堰牋杜光庭伏覩𨗳江縣令黄璟奏六月二十六日江神移堰事伏以大禹濬江發洪源於龍冢李冰創堰分白浪於龜城𨗳彼靈津資乎民用而涸脛泛肩之誓表則有常若懐山沃日之多崩騰難制立虞墊溺必害蒸黎昨者夏潦勃興狂波未息顧岷江之下瀨便逼帝都當灌口之上㳺遽彰神力於是震霆嶪地白雨通宵驅隂兵而鼓譟連天簇靈炬而熒煌達曙迴山轉石巨堰俄成浸滛頓減於京江奔蹙盡移於硤路仰由聖感仍假英威見天地之合符睹神明之致佑編於簡冊冠彼古今叨奏奨私彌増抃躍謹奉牋陳賀以聞王衍降表臣先人受鉞坤維作藩屏唐室一開土宇垂四十年屬梁孽挺災皇綱解紐不能助逆遂至從權勉徇輿情正王三蜀逮臣纂紹罔敢怠遑自保二疆以安生聚陛下嗣唐虞之業興湯武之師廓定中區奄征不譓梯航畢集文軌大同臣方議改圖便期納欵遽聞致討實抱驚危今則委千里封疆盡為王土冀萬家臣妾皆沐皇恩輿櫬有歸負荆竢罪望廻日月之照特寛斧鉞之誅顒佇徳音以安反側喜我帝祚中興羣妖悉滅待遣蘇張之士來追唐蜀之懽吾皇迥感于蜀皇復禮逺酬于厚禮臣則叨承𤣥造獲奉皇華載馳得靣於天顔戰汗不任於跼地臣無任感恩荷聖踴躍屏營之至諫用兵疏田淳伏見三年以來民頗怨嗟謂陛下求賢失道為政不平重纂組奪女工貴雕鎪損農事法令不信賞罰無誠納諫之心微自滿假馭朽之念漸乖始卒載舟覆舟不可不懼而况北有大敵方藉支禦若失人心其何以濟臣又見頻發士卒逺戍邉庭人心揺動莫測其故家搆異議如臨湯火人且憂駭将何撫寧若夫舉衆興師須明利害况闗大事豈可容易必若金鼔一鳴前鋒稍接一敗一成疾如反掌願陛下先事而計無貽後患今之動静頗渉因循臣不知所發之兵為防邉乎為赴敵乎若云防邊不當驟有徵發若云赴敵則須先决便宜師出無名三軍必怨三軍既怨何以成功以我朝之甲兵擬柴氏之士馬以我朝之将領比柴氏之師帥以我朝之帑藏比柴氏之囷廩至於法律刑名聲明文物彼長此大差于不同須用權奇以謀拒捍若二國交鬭恐未十全况我天府之邦用武之地一夫守隘萬旅無前假使柴師能於野戰攻城奪壘利在平川倘入隘途如無手足願陛下以短兵自固扼塞要衝分布腹心把斷細徑精加號令老彼敵師縱柴氏親來未敢便謀深入以日繼月以時待年敵勢自羸我師彌鋭不折一㦸不失一卒而柴氏自疲信所謂彼竭我盈以逸待困此為上計符合天機孟昶降表臣生自并門長於蜀土幸以先臣之基構得從㓜嵗以纂承只知四序之推移不識三靈之改卜伏自皇帝陛下大明出震聖徳居尊聲教被於遐荒慶澤流於中夏當凝旒正殿虧以小事大之儀及告類圜丘曠執贄奉琛之禮蓋蜀地居遐僻路阻闕庭已慙先見之明因有後時之責今則皇威電赫聖略風馳干戈所指而無前鼙鼔纔臨而自潰山河郡縣半入於提封將卒倉儲盡歸於圖籍但念臣中外骨肉二百餘人髙堂有親七十非逺弱齡侍奉只在庭闈日承訓撫之恩粗勤孝養之道實願克終甘㫖保此衰年其次得子孫之團圓守血食之祭祀伏乞皇帝陛下容之如地蓋之如天特軫仁慈以寛危辱臣復輒徵故事上凟嚴聰竊念劉禪有安樂之封叔寳有長城之號皆因歸欵盡獲全生願眇昧之餘魂得保家而為幸庶使先臣寢廟不為樵採之場老母庭除尚有問安之所見今保全府庫廵遏軍城不使毁傷将期臨照臣昶謹率文武見任官望闕上表歸命奏破施州譚汝翼狀宋林栗臣聞詩書所稱柔逺能邇孔子論政亦曰近者悦逺者來䕫所部州十有五施黔之外是為思州其土世襲而不属於官蓋疆以戎索使捍諸夷内以暨文教外以奮武衛云施有姦民曰譚汝翼以兼并為富以陵脅為彊吞噬無厭包藏不軌交鬬夷落結成疽根二十年間帥守監司莫之能詰其詰之者反得罪於有司膠滋長涵濡孕毒己稔淳熈八年夏六月知思州田汝弼卒譚賊乗罅舉其衆南掠黔江焚田氏之積俘其奴客以自封殖施黔廵尉唯所使令再役跳踉僵尸滿野而溪壑未盈方繕甲兵料丁壯以為大舉而田之嗣息操戈袵革起復其仇踰黔蹂施施人大震扶携奔逸繫踵於塗田次慈求溪限以一水不得度而退方謀濟師譚躡其後戰於太平驛斬首二十有二歸而飲至䇿勲行賞鼔吹道從令於一州州人懾伏無敢後先哆然遂有鴟張虎視之謀臣以庸虚誤分閫寄自閩入蜀罔究端倪秋八月既望方領郡事旬有八日而施檄至詢之民吏喑不敢言懲艾創夷變生肘腋臣亟走一介傳檄三州然後田譚之訟兩造庭下臣即日以其事聞檄施州守臣張遇赴司稟議而以本路兵馬都監傅汝賢攝兵鈐以行部止而印其代之譚賊氣奪東西求援恃其財力可以變亂有司下民皇皇官吏首竄莫知所嚮仰惟陛下深居九重明見萬里之外乃以春正月辛丑親御宸翰付制置使陳峴以及微臣開示謨斷指授方略臣拜手踴躍宣示所部使之激厲咸若陛下靣命而親撫之越三月辛未汝翼潜返於家癸酉奮其螳臂陳於沲河橋施之将士聞變而起小大用命一戰而遂破之渠魁奔竄無所於匿歸命於闕下而一方遂平施之將士與燕之吏民萬口同辭皆曰此天子之功也若元濟承宗則遂其計得何以成蔡功乎已而施人惶遽請以黔江之田盡歸於吏則柔逺能邇近悦逺來之證不為虚語臣謹以辛丑詔書勒之堅珉以垂不朽昧死奏聞乞褒贈江公望張庭堅等疏呂好問臣聞之孔子曰示之以好惡而民知禁書曰王播告之修不匿厥㫖夫惟不匿厥㫖則莫若明示好惡使民知禁而自從也所謂好惡者賞善而罰惡勿任己之私意而已矣臣竊見朝廷近日用人賢不肖雜所以好惡不分是非不别臣謂陛下宜先推明以示四方潜徳隠惡各有所處以定民志有不可緩者元符之末多士盈朝故司諫陳瓘江公望正言張庭堅任伯雨殿中侍御史龔夬等皆以忠直自奮知無不言捐軀徇國不顧妻子其後蔡京趙挺之等得志首加擠陷意欲置之必死不遺餘力巧發竒中衆為寒心賴太上皇仁恕力為保全得免誅戮死亡之後妻子窮困至今未復今蔡京略正典刑而此數人尚在責籍子孫凍餒人人皆憐憫陳瓘已贈諫議大夫任伯雨子得一官外江公望張庭堅龔夬等並未昭叙非所以示好惡而不匿厥㫖也伏望陛下特降睿㫖将公望等並行褒贈仍各官其子孫周恤其家使天下後世為善報國者知所勸勉而姦雄巨惡常有畏懲此誠所宜先也全蜀藝文志巻二十七
