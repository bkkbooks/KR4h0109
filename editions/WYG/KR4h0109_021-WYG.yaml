body:
  text: 全蜀藝文志卷二十一眀周復俊編詩贈送下韓太丞同守成都三首宋范鎮盛府佳招貴嚴宸雅寄深輿題仲舉坐闕掛子牟心漢竹分新契潘花過舊隂當年百里驥方此試駸駸近境連桑陌先遊盛竹林大阮郎中甞任西蜀併将懐舊意持作恵時心􅇨思春生筆清機月滿襟成風錦江曲逥上玉山岑春色草将深春寒栁未隂青天指行棧渌水蕩離襟後乘何為託前旌喻此心南枝倦飛翼憑為寄歸音送鈐轄館使王公程戡歸騎翩翩去路賖鬱蔥佳氣望天涯艱危劍閣三千里恵愛刀州十萬家龍尾道邊瞻日彩鹿頭闗外别春華金明扈從宸逰處休憶連年泛浣花程宻學知益州宋祁墀塗晝對别堯蓂糺縵芝泥襲綬馨三蜀舊臺呼輻寵十連新府夢刀靈雲梯霽日眀鈎棧雨閣蒼苔蝕劍銘只恐廉襦歌未厭熒煌歸應上台星蜀道篇送别府君吳龍圗郭祥正長吟李白蜀道難蜀道之難難于上青天長蛇拜猛虎殺人吮血毒氣何腥羶錦城雖樂不可到側身西望泣涕空漣漣其辭辛酸語勢險有如曲折頓挫萬丈之洪泉世人不識寳玉璞每欲酬價齊刀鉛求之往古疑未有惜㦲不經孔子之手加鑱鎸公今易節帥蜀國為公重吟蜀道篇旌旗翻空度劍閣甲花照雪参林顛雲霞影動谷聲應畫角慢引斜陽懸竹馬争迎舊令尹指公長髯皓素非往年蜀道何坦然和氣拂拂回星躔長蛇深潛猛虎伏但愛雄飛呼雌響亮調朱絃時乎樂哉公之往也九重深拱堯舜聖廟堂論道䕫龍賢撫綏斯民頼良守平平政化公能宣束兵興學有源夲何必早夜開華筵甞聞家家賣釵釧只待㸔舞青春前此風不革久愈薄稔嵗往往成凶年噫呼嘻今我無匹馬安得從公逰盡書政績来中州獻之眀堂付太史陛下請捐西顧憂贈廣都寓舎賢婦二喻詩頼起甞聞趙清獻䘏孤慰亡友至今西蜀人談美不容口二喻出儒家清貧一無有零丁依老姑破屋僧堂後相對誦詩書未甞窺戸牖圭析玉彌方山寒松更茂縣宰初聞名咨嗟為之乆從容語其配夫人曾見否長者二十三次亦十八九青裾長蔽膝荆簮短在首我欲効清獻言不為人取近於吾邑中選壻得豪右夫人相宰意魚蔬薦罇酒屈致二喻来呼名老與夀長曰安壽次曰安老女子當有行詩稱逺父母饑寒日月長蓬蓽風雨漏大喻前致詞洒淚濕衣袖荷徳固已深緘情亦須剖上言親未塟心欲土自負下述妹未笄􅑱􅑱無傅姆還家復獻書自叙貧且陋鉛華世所悅銅臭非吾偶肯效閭閈間碌碌逐雞狗世無梁伯鸞應嫌孟光醜孔明若再生承女甘箕帚陳義一何髙夫人驚拊手至今書藳在光輝射星斗董子慕髙風喜曰真吾婦吾親雙白髮吾弟室未授睠言娣妹賢可以相先後五兩幣雖輕意則千金厚輜軒雙造門觀者競奔走女子尚能爾男兒宜自守重聘或不来豈欲終畎畝畜徳尚未充髙位亦虛受寄語事君者慎勿輕去就上席帥喻汝礪先公御吏如御兵迎刃而解如庖丁掀髯一笑黠吏走蜀中草木知威名伯兄渠渠天下士嵩髙少室之英靈妙齡提書噭閶闔竑議可以諧韶韺昨年兩作益州牧西南惡少不敢行後来繼者有季弟潭潭大度涵滄溟指麾萬事不作意决眥雨電風煙雲南望峨睂西玉壘意氣直欲凌滄溟幅巾笻杖過何許閒邀仲元訪君平小蓬董寳夜深語往往笑倒長庚星㧞劍起舞者誰子杜陵老翁醉不醒生平入眼無俗物胡為見我眼自青武侯廟前有古栢風吟雨歗蛟龍聲我来正欲刳爾腹斲作巨屋丹其楹斲作巨屋丹其楹繪此落落三名卿尚使千載知儀刑喻子作詩如鼎銘送孫正忠臣移成都小漕楊天恵升平芝菌效神竒况乃賢豪用世資人物熈寜中興日風流荆國適同時起家便作三公客乗傳何為九折馳少府但分新賜節石渠猶借舊官儀素心乆辦經綸計妙意前知遇合期聊與西南成勝事暫将清獻續良規橋横萬里重開府水接雙流共去思怊悵参卿無限意道傍索筆強題詩送吏部尚書張公帥成都詩并序朱翌己未九月有㫖謀成都帥三省具所除人以聞皆不許止命選在廷從臣以往衆未及對上曰得一人矣吏部尚書張燾眀練端方可當一面付以便宜勿從中覆且命退與公議公見宰相願行不辭乃以十月六日制下吳蜀相望二萬里水遡瞿塘灔澦陸走䕫峡極天下之險有為公言者公曰上用我何逺之辭何險之畏退理舟楫行日甚近於是士大夫不問識與不識皆謂公宜在朝廷不必往成都成都可他擇才朝廷不可無公也御史中丞具以輿言白上夫内重乆矣一命以上皆以不得仕朝廷為恨公卿出鎮方面類若不得已者其進退用舍士大夫亦不甚留意今公欣然承命無一毫難色而又得士論如此此行有光矣蜀有兩張太守太宗時乖崖公仁宗時文定公兩公名重一時為人君所倚信在蜀最有恵愛蜀人至今祠之今公姓同徳又同名重一時為天子所倚又同恵愛所加能使人乆而不忘懸知其必同也既行祖道西湖上朝士咸為賦詩翌從公逰将三十年䝉公知最深故為詩千字叙公出守大槩且使蜀人知公不減前兩張太守也紹興九年十月二十五日序一代亨衢上明公逸歩超河東書具作圯下老相邀海濶雲垂翼天清斗壓杓三人前鼎甲千佛仰丰標弟子師尊董諸儒稱述蕭西崑収俊乂東壁絶塵囂别乘将離汴輕舟徑指苕湖山縱清美家國正飄揺慟哭天傾柱歸情户見蛸乞祠投里閈招隐向山椒竝海屯千衛披榛拱百僚回鑾須故國負内且今朝光列哀烏位星馳封馬軺賢裾来接武隂沴自潜消香案依丹陛螭坳立紫霄飛鴻九天去歸鶴一聲嘹主上思圗舊王人促見招起居還左史議論鄙南朝大呂聲揚逺𤣥圭質匪雕掖垣裁詔宻禁路賜纓彯滅澆圗興夏廵方首從姚自南瞻尺木直北望𤣥枵玉海千尋浪江南五色鷂壮哉還制手肅爾若秋鵰去國還追信刓章豈易堯光華司馬甲整頓路車鞗國事煩参決廷詢得具條乘時笑乾没許没敢輕佻河洛腥羶裏陵原草木焦青春深仗節夕雨乆乗橇取道先轅楚揚旌轉渡瀟一杯藏萬世九廟正三佋遂使儀知漢将令樂奏韶路迷彪過迹澗涸夜生潮去日春仍淺歸期暑正熇君王喜不寐天下首方翹疏奏中無隐臣生若不聊戴天那忍共得地豈宜驕内治今當亟髙名不敢要銓衡真有託唘事復何遼道直咸推汲謀深肯計蕭定非撝扇羽寜要挿蟬貂褒貶書方舉姦䛕骨合銷懐開真坦坦燕處自夭夭當宁西南顧常懐参井迢徧詢醫國効立遣愈民痟文武資兼禀詩書帥欲驍衆皆可郤縠一以委張昭除目凌晨下行装即日撩被携猶刺刺渉逺乃翛翛帆影三江水車聲萬里橋丈人峯嵂屼神女峡岧嶤石室畫闇淡草堂人寂寥山圍玉壘峻水減石犀遥石表筍雙立銅青柏未凋錦江喧士女樂土混農樵劫堕乾坤壊流横海岳漂惟兹井絡外依舊角弓弨自昔三刀夢多傳五袴謡威餘嚴僕射功比霍嫖姚文定裳尤美乖崖福可徼事今難悉數公亦豈其苖秦地新通棧瞿塘稳泛橈虎貔環外閫耒耜得深穮正可供壺奕随宜列鼓簫蒲鞭束髙閣竹馬戯垂髫好閱相如賦終閑李廣刁奎文天象轉延閣士林標此去廷無愈行聞衆選陶付之樞極運咸仰泰階霄賤子無三徑平生有一瓢老将書蠧槁時作草蟲喓大笑王三刖不求銀十腰古今同閱宙南北縱吹薸已類蜂粘網真成鹿覆蕉屢經九折坂㡬至獨身跳何處地堪避知誰戰敢挑月明三匝鵲巢卜一枝鷯釣瀬長烹鯉窮山飽聽鴞臨書池盡黒就局博嫌么臂有七賢把丹亡九轉燒唯堪貫薜荔未肯殺崇囂賣藥難争價為農或可劭稍能差野葛初未試江珧已罷尋蛩駏欣聞退猲獢誰憐心為米敢有意遷喬過我深披藋追凉薄曳綃狐裘憐晏子縞帶與公僑挽引煩推轂陶甄為置窑清時容潦倒冊府著芻蕘憶昨西湖上随公羽盖飄青山迎晉履綠水泛吴船上相尊仍美将軍筆最豪道争棋屢覆壺響箭呈梟茶乳晴尤發香雲静亦飄沿籬尋嫩菊近岸俯㳺鰷西望天連水羣簮玉及瑶政親連榻坐倐見賜戈琱良月霜楓冷佳晴雪霰消留公巳無策鼎食望加調成都西南大都㑹承平分閫之重與河東北等元祐初文潞公平章軍國重事三省議其因而成都除帥預焉艱難以来獨此方兵旤不作封陲自固東捍秦南蔽吴楚選帥之慎十倍疇昔宜也紹興己未詔以吏部尚書鄱陽張公出鎮朝士之文者咸賦詩送行中書舎人朱公時在冊府既以長篇述公出處大致典麗閎逺且為序數百言載上親擢之本㫖尤謹且備讀者曉然見廟堂西顧為逺外之謀帥其宻勿從容盖如此居無何朱公貽書扵公曰曷刻之以慰邦人異日甘棠之思乎於是蜀士夫咸傳而誦之且為伐石志之而属公之客僊井譚篆䟦之送錢駕部知邛州梅堯臣細雨梅初熟輕寒麥已秋路危趨劍道夢穏過刀州秦粟非吳食巴粳類越疇當壚無復舊試似長卿求次韻許沖元送成都高士敦鈐轄蘇軾移中老監本虛名懶作燕山萬里行坐看飛鴻迎使節歸來駿馬換傾城髙才本不縁勲閥餘力還思治蜀兵西望雪山烽火盡不妨樽酒寄平生寄黎眉州前人膠西髙處望西川應在孤雲落照邊瓦屋寒堆春後雪峨眉翠掃雨餘天治經方笑春秋學好士今無六一賢君以春秋受知扵歐陽文忠公公自號六一居士且待淵眀賦歸去共将詩酒趂流年嘉州寄左綿王虞部石介江山如畫望無窮况蜀昇平嵗屢豐萬樹芙蓉秋色裏千家方響月明中斷霞半渚燕支木零露偏留笙竹叢只欠流杯曲水宴風流未與左綿同左綿新創流杯燕脂板浣牋寄合州徐文職方前人合州太守鬢将絲聞說歡情尚不衰板與歌娘拍新調牋供狎客寫芳辭木成文理差差動花映溪光瑟瑟竒名得只從嘉郡樹燕脂木嘉州出様傳仍自薛濤時有薛濤牋竒章磊磊馳聲價江令翩翩落酒巵㡬首詩成巻魚子有魚子牋誰人唱罷泣燕脂紅牙管好同牀置紫竹笙宜一處施願助風流向罇席杏花况是未離披司空圗有杏花辭文頃在睢陽命名伶唱之楊山人歸綿竹文同一别江梅一度花相逢重為講胡麻火鈴未降真君宅金釰曽盟大帝家道氣滿簮凝綠髮神光飛鼎䕶黄芽青騾不肯留歸馭又駕蒼虬㸔曉霞寄彰明任光祿遵聖前人軒軒任公子本是釣鼇人手把虹蜺竿一舉百萬鈞得鼇謂無用坐巻千丈綸却自絓蚯蚓淺瀬収纎鱗悠悠世上兒不識此有神但将俗士眼不視窮水濵金牛相别呈誠之前人出門相與望橫参露浥幧頭吟逼簮驛在金堆随澗逺路經銅冶入煙深過橋住馬應迴首上嶺聞猿想動心勝事莫過飲酒樂此時銷得各沉吟臨别成都帳飲萬里橋贈譚徳稱陸㳺成都城南萬里橋蘆根蘋末風蕭蕭映花碾草紅車小駐坡驀澗青驄驕入門翠徑絶窈窕臨水飛觀何岧嶤判無功名著不朽惟仗詩酒寛無聊清霜早巳足雉兎微冷便欲思狐貂喜看縷鱠映盤箸恨欠斫蟹加橙椒坐中譚侯天下士龍馬毛骨矜超遥烏犀白紵謫仙様但可邂逅不可招今年一戰馘餘子風送六翮凌青霄美人再拜乞利市醉墨飛落生鮫綃我衰扵世百無用十年不趂含元朝華纓肯傍蕭颯鬢寳帶那束龍鍾腰祝君好去事明主日望分喜來漁樵逰談引類亦細事寄酒且解相如消涪江泛舟送韋班歸京前人追餞同舟日傷春一水間飄零為客乆衰老羨君還花逺重重樹雲輕處處山天涯故人别更益髩毛斑送朱元晦張栻君侯起南服豪氣盖九州頃登文石陛忠言動宸旒坐令聲利場縮頸仍包羞却来卧衡門無愧自日休盡收湖海氣仰希洙泗㳺不逺闗山阻為我再月留遺經得紬繹心事兩綢繆超然㑹太極眼底無全牛惟兹斷金友出處寕殊謀南山對床雨匪為林壑幽白雲正在望歸袂風颼颼朝来出别語巳抱離索憂妙質貴强矯精微更窮捜毫釐有不察體用豈周流驅車萬里道中塗可停輈勉哉共無斁邈矣追前修酬贈王益舜良殿丞梅摯倜儻淵宏未易才三年粉社幸遊陪八吟麗賦憑髙得三咏雕鎸選勝開玉苑早容収樸􅈪蘭池甞許試􅂒􅂒海棠風裏甘棠政只恐星趨節召囬風度幽閒器宇髙暫分明寄握牛刀賈生學贍思儀漢李白才多合繼騷歩武即㸔峩豸角對揚㡬見擲麟毫琴齋頌罷吟䰟逺時夢鈞天醉碧桃到䕫門呈王待制李石手挈東風上水闗鳳書迎日㸔新班五湖家世烏衣巷三峽樓臺赤甲山畫㦸門開春晝永卧龍帳稳海波閒安危大計須公等天定應知即賜環送虞伯生使蜀元吴成季送别因思舊所經秦川花栁短長亭三峯髙附仙人掌萬里先占使者星錦水東流江月白潼闗西去蜀山青當年不盡登臨意待爾重鎸劍閣銘代祀西嶽答袁伯長王繼學馬伯甫三學士虞集棧道年年葺舊摧巳将平易履崔嵬經行闗輔圗中見夢想鄊山馬上来諸葛精神明似日相如情思冷扵灰重思親舍猶南國願托江波去却逥家兄孟脩父輸賦南還前人大兄五月來作客八年不見頭總白五人兄弟四人在每憶中郎淚沾臆我家蜀西忠孝門無田無宅惟書存兄雖筦庫實父䕃弟竊餘澤承君恩文章不如仲氏好叔氏最少今亦老五郎十嵗未知學嗟我何為長逺道諸兒讀書俱不多又不力耕知奈何憂来每得二三友㸔花把酒臨風哦蜀山嵯峨歸未得盤盤先壠臨川側碧梧翠竹手所移應與青松各千尺南風吹雪河始氷兄歸烏㡌何睘睘明年乞身向天子共讀父書歌太平雲山圗為劉伯温監憲賦前人我家成都雪山東公家張掖雪山北吳船誰載鄭廣文起寫崑崙半天白張掖雪融草木長禾生隴畝多牛羊烽火連臺擬樓觀江海微茫秋練光㸔書東觀夜如水太乙然藜照圗史従逰冠帶文武備斐然四郡良家子君不見黄河奔流百谷盈神禹疏鑿中州平極天鳥道雲氣盡惟北有斗西長庚贈楊旭貟外歸蜀省墓明蹇義紫誥初頒煥玉音扁舟重過大江潯峡中綵纜牽春色天外蒲㠶帶夕隂折栁長亭生别思焚黄先壟遂初心故園父老如相問為説叨承雨露深留别京師諸友牟倫行行䇿馬出皇畿古木霜寒獨鳥飛天上故人青眼在蜀中諸弟素書稀秋風故隴雲連棧夜月胡笳露滿衣白髮蕭蕭身萬里不知别後竟何依寄楊留耕先生李東陽峨眉山頭雲氣濃錦官城上花枝紅地靈人傑應時出往嵗吾識留耕翁一從獻策明光殿三世科名眼中見鸚鵡洲前驄馬歸鳳凰池裏祥麟現一品封髙七袠稀烏紗玉帶曳緋衣祗疑天上神仙是若比人間富貴非誰信今人不如古片玉一枝安足數蘇氏竒峯僅有二竇家芳樹纔稱五太史文章祕閣勲少年状元才出羣眼㸔是父復是子此語吾傳揚子雲白頭憂國心尤切剛道承平好時節巳見西川洗甲兵更依北斗瞻京闕𤣥霜彩筆泥金箋為君興寄西南天願山不童花不老一嵗一賦長生篇彭總制濟物西平十詠侯唘忠長鯨翻江江石裂城郭灰飛野流血妖祲迷茫日色昏鬼哭隂沉水聲咽九重震怒天戈揮綸音急下黄金扇元臣身擔社稷寄武夫力奮風霆威吾皇推轂臨軒送錫馬朱旄恩寵重朝野喧騰里市儔岷峨擬獻平西頌羽林寒芒十丈髙光留虎帳明旌旄嚴凝霜凛綠沉甲曈曨日射團花袍栁營白羽謾揮指介胄櫜鞬盡朱紫三宂無依狡兔悲重泉易竭狂鯢死桓桓武騎傑且雄馳驅旋轉如追風㡬年西土暗烏兔老臣㑹有揩磨地黒風吹城地揺軸封豕長蛇走林麓絲鞭投江岷水渾鐡騎揚塵劒闗覆彤弓白羽刀未収伏屍十里横林丘巨靈開山魍魎哭大力撼鬼天吴愁戰雨乖龍恣騰翥敗北妖蠻亂飛絮鳴金息鼓日薄西時見驚烏漫来去廟堂元老一代雄甲兵千萬羅胷中豸冠霜斧震山岳錦袍驄馬馳雷風提兵曉發鹽亭道虎隊奔羊迹如掃堞血平分溪水紅囬輪西蹴岷山倒一出全収百戰功胡床坐嘯氛埃空村氓共記指麾處擬嚴廟貌留遺蹤青陵岡頭矢如破駭鹿驚奔鋒劒挫喧闐鼓角雷聲轟歘忽貔貅電光過斬蛟刺虎壮士威跳崖怒挽狂酋衣血光亂送草梢赤妖䰟暗逐刀頭飛蚩尤旗沉怪魖死露布星奔報天子從此寛紆西顧憂不用三巴散黄紙繡旗畫鼓嚴中軍陸離長鋏冠如雲飛熊怒揉怪獸窟俊鶻横擊驚鴉羣投戈乞降良獨苦但願全生返鄊土草木荒莾迷不知聖世恩波喜重覩白旄油幢時一麾軍威直欲摧峨眉凱歌取次獻金闕平桑先勒燕然碑㡬年豺虎走江國荆棘蓬蒿塞川澤黔黎遭劫血肉枯文武憂時鬢毛白元臣受命殫赤心妖氛迅掃回甘霖閭閻闔郡轉生意桑麻萬頃分春隂太清無雲日亭午擊壤遺民方快覩金錢不惜買醉歸戯㸔兒童競簫鼓星馳驛騎紅塵飛内廷報許班師歸虎賁腰懸白羽箭龍媒首絡黄金鞿隊仗連營自三五随處市廛如安堵青田綠野随耰鋤朱箔紅樓放歌舞經年用兵人不知蜀中父老攀旌旗生祠處處有遺像千秋萬載留遐思天門虎豹嚴九闗臺端宫保平西還九卿竦耳聼章奏百僚囬首驚朝班禁旅傾開虎牙寂直氣凌空裂金石三巴不獨病草書四境行㸔塞烽息聖君注目龍顏開岳靈為國鍾竒才金甌不用覆名姓文昌巳見明三台聖主推恩重延賞奏凱論功示優奨風雲際遇千載竒山斗尊崇萬年仰我公原有戡亂功一時朝野推豪雄齊梁摧墮豺虎絶秦川洗盪烟霾空徳望喧騰帝心喜吉甫周宣正如此彛鼎全収絶代勲翰苑才臣漫青史寄寄庵子李夢陽寄庵子嘗曰人生寄爾然利孰與義安愆孰與美久臭孰與芳永庫部駱子以其所言告於李子李子曰卓哉張子持此於天下誘之能移撼之能動乎能招之來麾之去乎嗚呼張子者足以荷天下之重矣於是作寄寄庵子詩嚶其鳴矣彼何求天下願識韓荆州心須義投神便往萬古不廢江河流張侯崛起西南裔覽輝振翮風雲際鉤陳蒼涼閶闔閉排閽直謁蓬莱帝豸冠峩峩不動紳挺身遂作蘭臺賓竊憤辛裾謂淟涊誓與朱檻争嶙峋巳㸔腰褭狭道路復訝鵰鶚卑風塵霜飛維揚海月落陽行沮洳汾花春還朝衮衣煥日月立仗正色揩星辰行歩既工馬從痩諫草每就鷄将晨餘力猶馳翰墨圃先秦兩漢文心苦壮志真趫劍閣銘張孟陽幽懐緬擬歸田賦張平子握珠響玉豈不足靦顔徒餐竟何補及時願作朝陽鳳不然退與漁樵伍予也綸竿孟諸客心本無他衆莫白李白世人欲殺之蘇軾頻年遭貶斥雷劒雖埋光在天卞玉未剖終為石垂老重逢四海清不才幸免諸公擲思君欲追稽往昔立言輒踐回由迹顔淵季路有田負郭未餓死且自射獵芒碭澤呂廣文四川衡聘前人大雅文衡重名師禮聘遥閣雲寒暑斾棧月引星軺古帝蠶叢國才人駟馬橋好将揚馬軰収取貢清朝送五清先生赴浙江提學歌何景明天台文宿衝紫霄先生捧勑馳星軺越山桃李花萬樹春色早渡錢塘潮憶昨先生遭斥逐漂泊荆湘望巴蜀九江鴻鴈春冥冥七澤龍蛇晝盤曲洞庭天髙急霜霰氷河雪􅀈開燕甸北来驄馬一日聞傾都走識先生面十年卜築楚村墟萬里今瞻漢宫殿當朝門生貴不少先皇學士人猶見金門誰留供奉班銀魚舊錫恩榮宴長安春逥獨囬首翠烟漸入龍池栁薊門禹穴自此探送餞先生百壺酒丈夫轗軻心不疑賢聖流離古来有巳㸔身作指南車况復名髙懸北斗隋珠和壁世珍重眼前㸃毁終難動聖人不乆奏雲門海内近亦求梁棟琴瑟須聆清廟音豫章且待明堂用我聞衡嶽與天参七十二峯江漢南不然信此可棲息無使天柱石鼔空巉巖送楊殿之朝正徐文華岳老跼險難憂心日冲冲氷雪多苦寒裋褐常不充良朋在咫尺早晚寒暄通眷言邁皇邑入覲明光宮聖人垂衣裳萬國咸來同黜陟分幽明車服旌勲庸滑没從兹升赫赫官階崇願子堅晚節固守嵗寒踪兹余滯荒戍徑路同雲封足趼不可行悵望西飛蓬送田國用鎮撫還蜀陶驥燕臺花栁客徜徉蜀國風烟興渺茫玉勒㡬年登劍閣江船五月下瞿塘清樽錦軸髙人共玉笛短簫良夜長年少壮逰輕萬里可容華髮綴清霜正初承陳玉泉代廵邀飲青羊宫柬此奉謝雷賀丹室崔嵬傍郭幽塵襟喜向上清逰青羊自古逢𤣥肆白鶴何年下寳丘鐘鼔頻開千堞曉松筠長鎖四時秋仗君繡斧霜威霽萬象春涵錦水流元日院中登樓自憩前人元日登樓俯碧空錦城春色匝簾櫳早梅乆上蜂鬚嫩弱栁初傳鳥語工四始條風占陸海九天瑞日普蠶叢玉堦履正陽開泰北極遥瞻紫氣籠畱别陳玉泉按院前人玉泉脈脈含晶光驪龍噴洒烏臺霜西征驄馬濯紫韁踏破劒閣成周行雲天墮彩映琳琅三春氷合寒瞿塘予亦仗鉞事西土挹清飲淑消煩腸倐罹萋菲言旋轍相逢忽漫成逺别青羊對酌酒清冽乃知天為離情設初玉泉公出巡子餞之青羊宫未二旬即聞候勘之命今不獲面覯而别故云錦江花栁暄欲爇我有所思附縈結東歸彭蠡夜月明照見玉泉長澄澈全蜀藝文志巻二十一
