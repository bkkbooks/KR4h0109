body:
  text: 全蜀藝文志巻四十明周復俊編記辛唐故翰林學士李君碣記唐劉全白君名白廣漢人性倜儻好縱横術善賦詩才調逸邁往往興㑹屬詞恐古之善詩者亦不逮尤工古歌少任俠不事産業名聞京師天寳初𤣥宗辟翰林待詔因為和蕃書并上宣唐鴻猷一篇上重之欲以編誥之任委之為同列者所謗詔令歸山遂浪跡天下以詩酒自適又志尚道術謂神仙可致不可小官以當世之務自負流離轗軻竟無所成名有子名伯禽偶遊至此遂以疾終因葬於此文集亦無定巻家家有之代宗登極廣拔淹瘁時君亦拜拾遺聞命之後君亦逝矣嗚呼與其才不與其命悲夫全白㓜則以詩為君所知及此投弔荒墳將毁追想音容悲不能已邑有賢宰顧公遊秦志好為詩亦常慕效李君氣調因嗟盛才𡨕寂遂表墓式墳乃題貞石冀傳於後來也貞元六年四月七日記沙門履人書墳去墓計一百二十步古柏記宋田况成都諸葛孔明祠古柏年祀寖逺喬柯鉅圍蟠固凌拔有足異者杜甫嘗作歌段文昌亦作文摹狀瓌竒人多諳誦故老相傳及記事者云自唐李凋瘁及王孟二偽國蠧槁尤甚然以祠中樹無敢剪伐者皇朝乾徳丁卯歳仲夏枯柯復生日益敷茂觀者歎聳以為榮枯之變應時治亂武侯光靈如有意於兹者誠為異哉因命工圖冩備述本末以貽好事者自三分訖今八百餘齡矣王稚子石闕記劉涇西漢循吏稱文翁老於成都其石室在學宫東漢循吏稱王稚子葬于郪縣即今之新都石闕在道旁然石室依古禮殿得不磨滅而石闕獨暴露骨立可憐歴兩漢千三百餘年間一人為古今吏師而遺跡亭亭勢參岷峨氣凛雪山葢宦學者所當拜於下風以幸教彷彿而至有未及知者其不韙如此余訪古石類得秦石犀石笋漢石室石柱石闕凡五物若犀笋與柱無甚損益事而室闕茍不朽則實二人之甘棠也於是新都令王君天常趣古甚力得余説因請大尹莆陽蔡公為稚子作屋書榜以昭昏昏按闕面有𨽻字三十一法度勁古過於鍾梁闕上下有衣冠鳥獸等象僅可辨氣韻精簡過於顧陸并以告來者新繁古楠木記蒲咸臨周公賦鴟鴞之年大風拔木乃命邦人起而築之最為異事然大風拔木天也起而築之人也大木所偃因人而起之當無足怪者孔子定書從而記之示訓戒也元祐八年繁江隆道觀玉帝殿庭有古楠二章分列左右如輔如弼一夕風雷大作偃其左偏者邑宰命匠石取之方執柯伐其枝忽聞軋軋聲乃稍稍起立匠石皆在其上如猿猱然觀者驚駭邑宰降堦俯伏謝罪君子以是知天道之不可誣也校諸金縢兹為尤異葢以不待人力而自起也今五十有一年矣搢紳先生尚能言之若不鑱諸石以永其傳則無以訓戒後代余被命尉兹邑道士詹次淵請書其事因從春秋記異之法月而日之以警不能寅畏上帝者游浣花記任正一成都之俗以游樂相尚而浣花為特甚毎嵗孟夏十有九日都人士女麗服靚籹南出錦官門稍折而東十里入梵安寺羅拜冀國夫人祠下退㳺杜子美故宅遂泛舟浣花溪之百花潭因以名其游與其日凡為是㳺者架舟如屋飾以繒綵連檣銜尾蕩漾波間簫皷絃歌之聲喧閧而作其不能具舟者依岸結棚上下數里以閲舟之往來成都之人於他游觀或不能皆出至浣花則傾城而往里巷闐然自旁郡觀者雖負販芻蕘之人至相與稱貸易資為一飽之具設部隊自將以進原闕景徳大中祥符中有若侍御史張公及之介潔集賢校理王公湜之温恭職方員外張公逵之疏逹其在今慶厯有若虞部員外李公畋之經術翰林學士彭公乗之恬退翰林學士孫公抃之凝重屯田員外陳君希亮户部員外梅君摯殿中侍御史何君郯之直方度支員外郭君輔屯田員外張公中庸之通敏直集賢院李君約之夷曠是皆子雲之徒學其道而得其傳者益州提㸃刑獄度之髙君既葺子雲之居鑱其書又畫其像以及其徒意者使後來觀之知賢人之道有塞有通有絀有伸塞於晦時而通於昭時詘於不用而伸於有用云爾大聖慈寺畫記失名舉天下之言唐畫者莫如成都之多就成都較之莫如大聖慈寺之盛僕昔監市征歴二年餘或晚暇與朋僚游所觀者纔十一二比將漕七年亦屢造焉而未及見者猶大半今來守是邦俾僧司㑹寺宇之數因及繪畫乃得其詳總九十六院按閣殿塔㕔堂房廊無慮八千五百二十四間畫諸佛如來一千二百一十五菩薩一萬四百八十八帝釋梵王六十八羅漢祖僧一千七百八十五天王明王大神將二百六十二佛㑹經騐變相一百五十八諸夾紳雕塑者不與焉像位繁宻金彩華縟何莊嚴顯飾之如是昔之畫者或待詔行在或禄仕兩蜀皆一時絶藝格入神妙至於本朝數多名筆度所酧贈必異他工資費固不可勝計矣其鑄像以銅刻經以石又不可槩舉因有以見蜀人樂善鄉福不吝財施者葢自古而然非獨今日之侈自至德已後冩從官府尹監司而下僚屬等至於今凡三百九十人有經數百年而崇奉護持無毁者又以見蜀人敬長尊賢之心雖久不替噫其可尚也哉四方之人至於此者徒歩游手原闕未伎憧凑集􅡋貨竒巧羅陳如市祗以為嬉戱衒鬻之所闕不知釋子𨽻學誦持演説化導亦無虛日故以藏經大部律僧長闕之數兼列云諸院為國誅僭逆妻任素驍闕家財募士得闕人於數十里之外使人習之而其周舍改遺風餘闕猶足以啟後人闕侈心想其當時車服之盛疾驅明相望道人都震耀其閭里之人傲闕時不知有識者得以指議其哀其子異國嘗有功於蜀而專恣亦甚矣吾以吾之説如此客以客之受業子如此相與詰難久之㑹日暮笑謂闕是游可樂事之然否姑以謂闕未暇究也坐闕笑而罷明日録其言為記八陣圖記劉昉魚復陣磧剏自武侯江流莫移若有神護雖經毁改幾失其真稽之圖經訪諸故老而遺跡隠然尚可見也顧將湮没余心是悼亟令軍士百餘裒石増壘悉還其舊方圓曲直縱横廣狹之不敢少加損焉尚慮他時或復罹前厄刋圖于石用示後人界垣之内縮而計之以丈為分其外則圖山川城郭之勢而不計以度且命作侯祠於城上以俯臨之夔人嵗以人日傾城徙市縱遊八陣之間謂之踏磧是役告成適當是日賔僚咸集酹酒陳詞以落之昔侯嘗擒孟獲獲觀營陣心不服曰若止如是固易勝耳逮至七縱七擒然後以為天威及司馬仲逹觀其軍壘則嘆服曰天下竒才也桓温過此雖能知其為常山之􅉬勢盖未究其妙然能知與否在孔明初何損益余非能知之者姑修故壘以俟來哲云紹興戊辰正月丙寅潮陽劉昉書朐䏰記李燾漢志巴郡有胊䏰縣顔師古注朐音劬杜君卿通典乃作朐䏰音蠢䏰如尹切與師古特異按許叔重説文朐脯挺也其俱切無他義􅓃䏰蟲名漢中有􅓃䏰縣地多此蟲因以為名􅓃如順切䏰大尹切讀如閏蠢君卿葢從叔重而小不同然叔重謂朐䏰屬漢中誤矣類篇承叔重之誤既以朐䏰屬漢中别於䏰字下注朐䏰縣屬巴郡則又承師古之誤遍檢地志漢中實無朐䏰固當以君卿為正然朐當作􅓃不當作朐則君卿猶未及辨考職方者宜辨之閏月一日泊舟雲安之西三十里萬户驛下横石灘上土人云今驛之左右􅓃䏰故地也乾道九年眉山李燾記金魚堡記出皇華州古碑失名子不語怪力亂神而鳯鳥河圖之嘆猶不能免春秋紀異不書祥而西狩獲麟之筆或未之忘何則天之降祥聖人蓋不忍没其實且嗜欲將至有開必先瑞不虛生因人而致昔賢蓋有獲鱣魚而陞顯官覩白鹿而陟華途印龜晤左顧之祥石鵲啟侯封之瑞天機感召不可誣也方雲中常侯之守皇華也下車未幾時和嵗稔簿書獄訟之暇省視城壁度量地勢凡當出戰入守之地必欲事事周宻一無廢弛昔之欠缺者補而足之始之卑隘者纍而大之身先士卒靡憚勞疲躬厲工役不辭寒暑夙興夜寐略無暇時劉越石之枕戈陶士行之運甓曽不是過又病東門以西雉堞不聳女牆之内地歩稍蹙萬一敵攻吾瑕懼莫能敵議欲改圖為萬全計適築填西定逺兩堡未遑也越明年仍嵗豐穰侯乃經營朝天門之上建一大堡使外勢斗絶足以壯窺闞之謨内勢砥平足以嚴矢石之備規模甫定堡未得名㑹夏季朔日治石之工忽來告曰屬有破石霧氣冲天隠出雙魚黃色光潤長不盈尺而鱗鬛悉具合郡趨觀莫不驚詫若吏若民作為歌詩以贊盛美咸謂金魚呈祥非特顯刺史魚符之兆抑祥開創堡之地天意蓋有在也是堡落成請以金魚命之侯曰不然魚化為龍鄉士軒翥之祥也牧人夢魚嵗事豐穰之應也於余何有但嵗豐民樂誠為上瑞堡以是名不亦華乎吏民復進曰人材速化皆賢侯教育之勤年穀順成乃時政和平之驗體有闗係誰實尸之况祥瑞之來難虛其應命名之意不但彰賢侯之徳而皇華形勢之地亦與有千載無疆之休也何以遜為侯曰諾於是金魚堡之名始定竊嘗思之世之人發一誠心則李廣之石可使為虎生一疑心則樂令之弓亦能為蛇此無他誠與不誠之判也今侯孤忠許國善政宜民光輝發越感此嘉瑞其誠開金石信及豚魚治狀班班葢可考矣然侯謙冲退託不有其有此非脗合於范史所謂抑而不當之意乎大郡千里之地而為之長叢州邑之衆而為之牧愛養至誠寓於實政此真斯民非常之瑞乎余嘗讀黄山谷新昌瑞芝亭記有曰使民田畆有禾黍則不必芝草生階庭伏臘有雞豚則不必靈鳯在郊藪又曰黠吏不舞文不必虎渡於河里胥不追擾不必蝗不入境山谷非諱言祥瑞也葢謂政平訟理民安其業則祥瑞開端之地於是乎在吁人知金魚之為瑞而不知實政感通之為瑞知實政感通之為瑞而不知一州之民得太守之為真瑞也可不刻諸堅珉以傳不朽使百世之下聞其風者尚有考焉嘯臺磨崖記李燾真如巖穴峭深佳處未易有也半嶺有石角立或屋其上慿臨極空闊而棟宇廹隘弗稱使榮徳令増廣之圖經謂此孫登嘯臺登隠河北不聞至蜀然古稱嘯獨登善凡嘯者必稽焉雖假託亦宜况登不汚魏晉於道最高稽阮欲為弟子且不可得其神遊八極之表復何所不至區區限以方域則陋矣砌街記范謩天下郡國惟江浙甓其道雖中原無有也太少二城坤維大都㑹市區櫛比衢隧碁布而地苦沮洳夏秋霖潦人行泥淖中如履膠漆既晴則蹄道轍迹隠然縱横頗為往來之患紹興十三年鄱陽張公鎮蜀始命甓之僅二千餘丈後三十四年吳郡范公節制四川為竟其役鳩工命徒分職授任程督有方尺寸有度費出於官而不以及民日廩以食而人競力作未幾告成率一街之首尾立兩石以識廣狹凡十有四街然後所至側布如江浙間雨不乘橇騎不旋濘徐行疾驅俱從坦平父老相與謂曰周道如底其尚見於斯乎昔日單襄公聘宋過陳火朝覲矣而道茀不可行於是歎司空視塗之失職而知其不久子産以乗輿濟人於溱洧而徒杠輿梁弗修孟子曰恵而不知為政夫善為政者緩急有序大小畢舉未有治其急而忽其緩志其大而略其細者而善觀人之國亦必以是公之於蜀藥傷補敗苗耨髪櫛無一不用其力至道路之政世所謂緩且細者亦整治如此百世之下四方之人入其境仰公之賢推此以攷其政績尚可髣髴云淳熈四年四月日記彭州胡氏三遇異人記文同熈寧六年春余寓天彭成都承天僧敏行無演在焉為余言北城有胡氏者名釗字倚天國初時號為高貲修積善行嘗奉事異僧曰王羅漢者置寺住之後有詔俾倚天赴闕捋授以官倚天不願仕辭之在京師出入起居與西還之期王日日預言於其家已而究騐盡合無少差者初倚天去彭在道中以至都下人往往見人被破褐狀貌恠偉常在倚天左右忽問他有不能闕之者以語倚天倚天但笑而不答自知王之於此隂䕶持之爾術士嘗言倚天夀不滿四十倚天過華山謁希夷陳先生先生甚喜久留其居為造藥一鼎使擕歸餌之後教以度世延年之法倚天既歸如其訣行且乆其身枵然若將翩翩隨風而起云鄉人異之一日有晨叩其闗者遣視之不見其人但以杖十七莖倚門而去倚天收之卒不知其所以致之者自後胡氏之門愈盛逮今累世矣倚天至七十八嵗乃卒余因與演詣其家觀其所謂杖與藥者杖非世間所有之木色紺紫堅潤可愛藥如彈丸赤黄有光隠雜寳中其重若金玉余歎曰倚天人不能知其所以然者隂行甚宻矣所以三異人者常相與逢迎如此警動之倚天雖已去世亦自與斯人游風塵外爾豈俗士哉其孫靖為進士端厚純粹為鄉里所稱余因謂無演曰靖佳士也於以見胡氏子孫承籍其祖之光靈慶嗣綿綿無窮極者已無演曰然是可記也自余來興元靖遣人千里致書且求記其事余為記之西岷保障圖記明周洪謨蜀為坤維大都㑹三面鄰蠻僰蕃羌南則夜郎靡莫西南則卭筰都西北則冉駹冉駹有六夷七氐九羌即威茂二州之地也又其西乃為松潘松潘之西北為吐蕃東南雜氐羌種落既繁險阨彌固羣夷據巖嶂以為卭籠碉􅠼善製堅甲勁弩走崖壁捷如猿猱凡蜀民之轉輸松潘者常掠於道其為蜀患從來舊矣然而松潘之所以深入而壘者蓋以據羣夷之奥室而杜其門户故羣夷之不敢覬覦成都者以有松潘也四川都司都指揮使周公貴往嵗奉勅往備其地方蠻酋董布等出没公累能禦之而夷黨刼奪軍餉公又能親督矢石𢷬殱其衆公聞於朝遣使賞勞由都指揮同知而進今秩士君子有繪圖獻之者題曰西岷保障蓋以嘉公之功而繫之曰西岷以松潘在岷之西也雖然蜀徼之要害者莫若松潘松潘既靖則全蜀靖矣是西岷之所以保障者豈非全蜀之保障也哉繼自今尚其益殫乃心益逺乃籌使吾蜀永倚公為長城可也公有勇略善撫士卒自藩憲大夫及閭巷士庶皆稱其賢公之先君子有功太宗朝積官如公今職宣徳間公䕃補成都後衛正統間征麓川孟養有功故擢官都司公不惟克樹忠烈又可謂克紹先美矣公以圖來屬為記故書以歸之全蜀藝文志巻四十
