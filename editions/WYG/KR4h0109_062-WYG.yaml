body:
  text: 全蜀藝文志卷六十二明周復俊編行紀呉船録宋范成大石湖居士以淳熈丁酉五月戊辰離成都泊舟合江亭下合江者乃岷江别𣲖自永康離堆入成都及彭蜀諸郡合于此下新津緑野平林烟水清遠極似江南亭之上曰芳華樓前梅甚多蜀人入呉者皆從此登舟其西則萬里橋諸葛孔明送費禕使呉曰萬里之行始於此後因以名橋杜子美詩曰門泊東呉萬里船此橋正為呉人設余在郡時過此橋輒為之慨然六月己巳朔發家屬舟下眉州彭山縣泊單騎轉城過東北門又轉而西自侍郎堤西行走岷山道中五十里至郫觀者塞途嚴粧盛餙㡩幕相望盖自來無制帥行此路庚午至永康軍崇德廟在軍城西門外山上秦太守李氷父子廟食處也辛未登城西樓其下則皆西戎山矣西門名玉壘闗將至青城當再渡繩橋長百二十丈分為五架橋之廣十行繩排連之上布竹笆攢立大木數十于江沙中輦石固其根毎數十木作一架挂橋於半空大風過之掀舉幡幡然大畧如漁人晒網染家晾綵帛之狀又須捨輿疾步至橋下石塹深數十丈窈然沉碧飛湍噴雪奔出並流橋外則入岑蔚中可數十步兩溪合為一似投大壑淵渟凝湛散為溪灘灘中悉是五色及白質青章石子水色麴塵與石色相得如鋪翠錦非摹冩可具朝日照之則有光彩發溪上倒射巖壑相傳以為大士小現也牛心寺三藏師繼業自西域歸過此將開山兩石鬪溪上攬得其一上有眉目以為寳瑞至今藏寺中此水遂名寳現溪自是登危磴過菩薩閣當道有榜曰天下大峨山遂至白水普賢寺自縣至此步步皆峻阪四十餘里然始是登峰頂之山脚耳甲午泊白水寺大雨不可登山謁普賢大士銅像國初勅成都所鑄有太宗仁宗真宗三朝所賜御製御書百餘卷七寳冠金珠瓔珞袈裟金銀瓶鉢奩爐匙筯果罍銅鐘鼓鑼磬蠟茶塔芝草之屬又有崇寧中宮所賜錢幡及織成紅幡等物甚多内仁宗所賜紅羅紫繡袈裟上有御書發愿文曰佛法長興法輪常轉國泰民安風雨順時干戈永息人民安樂子孫昌盛一切衆生同登彼岸嘉祐七年十月十七日福寧殿御札記次至經藏亦朝廷遣尚方工作闕也正靣為樓闕兩傍小樓使之釘校皆以瑜石極備竒靡相傳純用京師端門之製經書造於成都用碧硾紙銷銀書之卷首悉有銷金圖畫各圖一卷之事經兼織輪相鈴杵器物及天下太平皇帝萬嵗等字於繁花縟葉之中今不復見此等織文矣次至三千鐵佛殿云普賢居此山有三千徒衆共住故作此佛鑄甚朴拙是日設供且禱於大士丐三日好晴以登山乙未大霽遂登上峯自此登峯頂光相寺七寳巖其高六十里大略去縣中平地不下百里又無復蹊蹬斫木作長梯釘巖壁縁之而上意天下登山險峻無此比者余以健卒挾山轎强登以山丁三十三曵大繩行前挽之同行則用山中梯轎出白水寺側門便登㸃心山言峻甚足膝㸃於胷云過茅亭嘴石子雷大小深坑駱駝嶺簇店凡言店者當道板屋一間將有登山客則寺僧先遣人煮湯於店以俟蒸炊又過峯門羅漢店大小扶􅐝錯喜歡木皮里胡孫梯雷洞平凡言平者差可以託足之處也雷洞者路左深崖萬仭蹬道缺處則下瞰沉黑若洞然相傳下有淵水神龍所居凡七十二洞嵗旱則禱於第三洞初投香幣不應則投死彘及婦人彛履之類以棖觸之往往雷風暴發峰頂光明巖上所謂兠羅綿雲亦多出於此洞過新店八十四盤娑羅平娑羅者其木葉如海桐又似楊梅花紅白色春夏間開惟北山有之初登山半即見之至此滿山皆是大抵大峩之上凡草木禽蟲悉非世間所有者昔固傳聞今親騐之余來以季夏數日前雪大降木葉猶有雪漬斕斑之跡草木之異有如八仙而深紫有如牽牛而大數倍有如蓼而淺青聞春時異花猶多但是時山寒人鮮能識之草葉之異者亦不可勝數山高多風木不能長枝悉下垂古苔如亂髪鬖挂岩上垂至地長數丈又有塔松狀似杉而葉圓細亦不能高重重偃蹇如浮圖至山頂尤多又斷無鳥雀盖山高飛不能上自娑羅平過思佛亭軟草平洗脚溪遂極峯頂光相寺亦板屋數十間無人居中間有普賢小殿以卯初登山至此己申後初衣暑綌漸高漸寒到八十四盤則最寒比及山頂亟挾纊兩重又加毳衲駞茸之裘盡衣笥中所藏繫重巾躡氈靴猶凛慄不自持則熾炭擁爐危坐山頂有泉煑米不成飯俱碎如沙粒萬古氷霜之汁不能熟物余前知之自山下擕水一缶來裁自足也移頃冒寒登天仙橋至光明巖炷香小殿上木皮盖之王瞻叔參政嘗易以瓦為雪霜所薄一年輙碎後復以木皮易之翻可支一二年人云佛現悉以午今己申後不若歸舍明日復來逡廵忽雲出巖下傍谷即中雷洞山也雲行勃勃如隊伏既當巖則少駐雲頭現大圓光襍色之暈數重倚立相對中有水墨影若仙聖跨象者一盌茶頃光没而其傍復現一光如前有頃亦没雲中復有金光兩道橫射巖腹人亦謂之小現日暮雲物皆散四山寂然乙夜燈出巖下徧滿彌望以千百計夜寒不可久立丙申復登巖眺望巖後岷山萬重少北則瓦屋山在雅州少南則大瓦屋近南詔形狀宛然瓦屋一間也小瓦屋亦有光相謂之辟支佛現此諸山之後即西域雪山崔嵬刻削凡數十百峯初日照之雪色洞明如爛銀晃曜晨光中此雪自古至今未嘗消也山綿延入天竺諸番相去不知幾千里望之但如在几案間瑰竒勝絕之觀眞冠平生矣復詣巖致禱俄氛霧四起混然一白僧云銀色世界也有頃大雨傾注氛霧辟易僧云洗巖雨也佛將大現兠羅綿雲復布巖下紛郁而上將至巖數丈輙止雲平如玉地時雨㸃猶餘飛俯視巖腹有大員光偃卧平雲之上外暈三重毎重各現黄紅綠之色光之正中虛明凝湛觀者各自見其形現於虛明中毫釐無隠恍如對鏡舉手動足影皆隨形瞬息不見傍人僧云攝身光也此光既没前山風起雲馳風雲之間復出太圓相光橫亘數山盡諸異色合集成采峯巒草木皆鮮妍絢蒨不可正視雲霧既散而此光獨明人謂之清現凡佛光欲現必先布雲所謂兠羅綿世界光相依雲而出其不依雲則謂之清現則難得食頃光漸移過山而西左顧雷洞山復出一光如前而差小湏臾亦飛行過山外至平野間轉徙得得與巖正相直色狀俱變遂為金橋大畧如呉江垂虹而兩旁各有紫雲捧之凡自午至未雲物凈謂之收巖獨金橋現至酉後始没同登峯頂者幕客簡世傑伯鼎楊光商卿周傑徳萬進士虞植于建及家弟成績今日復有同年楊愻伯勉幕客李嘉謀良仲自夾江來甫至而光現丁酉下山始登山時雖躋攀艱難有繩曵其前猶險而不危下山時雖復以繩縋輿後梯下輿去雖着脚既險且危下山漸覺暑氣以次减去綿衲午至白水寺則絺綌如故聞昨暮寺中大雷雨峯頂夕陽快晴元不知也幕客范譽季申郭復中行楊輔嗣勲皆自漢嘉來㑹而不及余於峯頂食後同遊黑水過虎溪橋奔流激湍大畧似雙溪而小不及始開山僧自白水尋勝至此溪漲不可渡有虎蹲伏其傍因遂跨之亂流而濟故以名溪黒白二水皆以石色得名黑水前對月峯棟宇清潔宿寺中東閣秋七月戊戌朔離黑水復過白水寺前渡雙溪橋入牛心寺雨後斷路白雲峽水方漲碧流白石照入肺肝如層氷積雪中藍輿不行峽淺處以入寺飛濤濺沬襟裾皆濡境過清毛髮盡竦寺對青蓮峯有白雲青蓮二閣最佳牛心本孫思邈隠居相傳時出諸山寺中人數見之小説亦載招僧誦經施與金錢正此山故事有孫仙煉丹灶在峯頂又淘朱泉在白雲峽最深處去寺數里水深不可涉獨訪丹灶傍多竒石祠堂後一石尤佳可以箕踞宴坐名玩丹石寺有唐畵羅漢一板筆跡超妙眉目津津欲與人語成都古畵浮屠像最多以余所見皆出此下蜀畫胡僧惟盧楞迦之筆為第一余見此板乃知楞迦源所自餘十五板亡之矣此寺即繼業一藏所作業姓王氏耀州人𨽻東京天壽院乾德二年詔沙門三百入天竺求舍利及貝多葉書業與遣中至開寳九年始歸寺所藏湼槃經一函四十二巻業於每巻後分記西域行程雖不甚詳然地理大略可考世所罕見録于此以備國史之闕業自階州塞西行出靈武西梁甘肅𤓰沙等州入伊呉元用此呉字高昌焉耆于闐䟽勒大石諸國度雪嶺至布路州國又度大䓤嶺雪山至伽濕彌羅國西登大山有蕯瑶太子投崖飼虎遂王健陁羅國謂之中印土又西至庶流波國及左欄陁羅國有二寺又西過四大國至大曲女城南臨熖牟河北背洹河塔廟甚多而無僧尼又西二程有寳堦故基又西至波羅柰國兩城相距五里南臨洹河又西北十許里至鹿野苑塔廟佛蹟最夥業自云别有傳記今不傳矣南行十里渡洹河河南有大浮圖自鹿苑西至摩羯提國館於漢寺寺多租入八村𨽻焉僧徒往來如歸南與枤林山相直巍峯巋然山北有優波掬多石室及塔廟故基西南百里孤山名雞足三峯云是迦葉入定處又西北百里有菩提寳座城四門相望金剛座在中東向又東至尼連禪州東岸有石柱記佛舊事自菩提座東南五里至佛苦行處又西三里至三迦葉村及牧牛女池金剛座之北門外有師子國迦藍又北五里至迦耶城又北十里至迦耶山云是佛説寳雲經處又自金剛座東北十五里至正覺山又東北三十里至骨磨城業館於鰕羅寺謂之南印土諸國僧多居之又東北四十里至王舍城東南五里有降醉象塔闕北登大山細路盤紆有舍利子塔又臨澗有下馬迎風塔度絶􅊤登山頂有塔廟云是七佛說法處山北平地又有舍利本生塔其北山半曰鷲峯云是佛説法華經處山下即王舍城城北山址有温泉二十餘井又北有大寺及迦蘭陁竹園故迹又東有阿難半身舍利塔温湯之西有平地直南登山腹有畢鉢羅窟業止其中誦經百日而去窟西復有阿難證果塔此去新王舍城八里日往乞食㑹新王舍城中闕蘭若𨽻漢寺又有樹堤迦故宅城其西有輪王塔又北十五里有闕爛陁寺寺之南北各有數千寺門皆西向其北有四佛座又東北闕五里至烏巔頭寺東南五里有聖觀自在像又東北十五里至伽闕彌羅寺寺南距漢寺八里許自漢寺東行十二里至却提希山又東七十里有鴒寺西北五十里有支那西寺古漢寺也西北百里有花氏城育王故都也自此渡河北至毗耶離城有維摩方丈故跡闕至拘文那城及多羅聚落踰大山數重至泥波羅國又至磨逾里闕雪嶺至三耶等由故道自此入階州太祖已晏駕太宗即位業詣闕進所得梵夾舍利等詔擇名山修習登峨眉北望牛心衆峰環翊遂作菴居已而為寺業年八十四而終出牛心復過中峯之前入新峩眉觀自觀前山開新路極峻斗下冐雨以遊龍門竭蹷數里歘闕處澗溪自兩山石門中湧出是為龍門峽也以一葉舟棹入石門兩岸千丈巖壁色如碧玉刻削光潤入峽千餘丈有瀑布各巖頂相對飛下嵌根有磐石承之激為飛雨濺珠峽過其前衣皆沾洒透濕又數丈半巖有圓龕去水可二丈以木梯升之即龍門也峽中紺碧無底石寒水清非復人世舟行數十步石壁益峻水益湍亟囘棹舟人云前去更奇以雨大作加飛瀑沾濡暑肌起粟骨驚神􅌶乎其不可以久留也昔嘗闕峩眉雙溪不减廬山三峽前日過之真奇綺及至龍門則雙溪又在下風盖天下峽泉之勝當龍門為第一要之遊者自知未之逰者必以余言為過然其路險峻亂石當道將至峽必捨輿躡草履經營頃步於槎牙兀臬中方至闕口盖大峨峯頂天下絶觀蜀人固自罕遊而龍門又勝絶於山間逰峨眉者亦罕能到非好竒喜事忘勞苦而不憚疾病者不能至闕尋大路出山初夜始至縣中己亥發峨眉晚至嘉州全蜀藝文志卷六十二
