body:
  text: 全蜀藝文志巻二十八明周復俊編書牋與王商書蜀秦宓宓字子勅廣漢綿竹人也少有才學州郡辟命稱疾不徃劉璋時宓同郡王商為治中從事為嚴君平李𢎞立祠宓與書曰疾病伏匿甫知足下為嚴李立祠可謂厚黨勤類者也觀嚴文章冠冒天下由夷逸操山嶽不移使揚子不嘆固自昭明如李仲元不遭法言令名必淪其無虎豹之文故也可謂攀龍附鳳者矣如揚子雲潜心著述有補於世泥蟠不滓行參聖師於今海内談詠厥辭邦有斯人以耀四逺怪子替兹不立祠堂蜀本無學士文翁遣相如東受七經還教吏民於是蜀學比於齊魯故地里志曰文翁倡其教相如為之師漢家得士盛於其世仲舒之徒不達封禪相如制其禮夫能制禮造樂移風易俗非禮所秩有益於世者乎雖有王孫之累猶孔子大齊桓之霸公羊賢叔術之讓僕亦善長卿之化宜立祠堂速定其銘與劉璋牋法正初張松説璋迎先主使討張魯法正銜命正既宣指隂獻䇿於先主令還取璋及先主軍圍雒城正牋與璋曰正受性無術盟好違損懼左右不明本末必並歸咎䝉恥沒身辱及執事是以捐身於外不敢反命恐聖聽穢惡其聲故中間不有牋敬顧念宿遇瞻望悢悢然惟前後披露腹心自從始初以至於終實不藏情有所不盡但愚闇䇿薄精誠不感以致於此耳今國事已危禍害在速雖捐放於外言足憎尤猶貪極所懐以盡餘忠明将軍本心正之所知也實為區區不欲失左将軍之意而卒至於是者左右不達英雄從事之道謂可違信黷誓而以意氣相致日月相選趨求順耳悦目隨阿遂指不圖逺慮為國深計故也事變既成又不量彊弱之勢以為左将軍縣逺之衆粮穀無儲欲得以多擊少曠日相持而從闗至此所歴輒破離宫别屯日自零落雒下雖有萬兵皆壊陣之卒破軍之將若欲爭一旦之戰則兵将勢力實不相當各欲逺期計粮者今此營守已固穀米已積而明将軍土地日削百姓日困敵對遂多所供逺曠愚意計之謂必先竭将不復以持乆也空爾相守猶不相堪今張益徳數萬之衆已定巴東入犍為界分平資中徳陽三道並侵将何以禦之本為明将軍計者必謂此軍縣逺無粮饋運不及兵少無繼今荆州道通衆數十倍加孫車騎遣弟及李異甘寧等為其後繼若爭客主之勢以土地相勝者今此全有巴東廣漢犍為過半已定巴西一郡復非明将軍之有也計益州所仰惟蜀蜀亦破壊三分亡二吏民疲困思為亂者十戸而八若敵逺則百姓不能堪役敵近則一旦易主矣廣漢諸縣是明比也又魚復與闗頭實為益州禍福之門今二門悉開堅城皆下諸軍並破兵将俱盡而敵家數道並進已入心腹坐守都雒存亡之勢昭然可見斯乃大略其外較耳其餘屈曲難以辭極也以正下愚猶知此事不可復成况明将軍左右明智用謀之士豈當不見此數哉旦夕偷幸求容取媚不慮逺圖莫肯盡心獻良計耳若事窮勢廹将各索生求濟門戸展轉反覆與今計異不為明将軍盡死難也而尊門猶當受其憂正雖獲不忠之謗然心自謂不負聖徳顧惟分義實竊痛心左将軍從本舉來舊心依依實無薄意愚以為可圖變化以保尊門與諸葛亮書馬良先主領荆州辟良為從事先主入蜀諸葛亮從徃良留荆州與亮書曰聞雒城已拔此天助也尊兄應期賛世配業光國魄兆見矣夫變用雅慮審貴垂明於以簡才宜適其時若乃和光悦逺邁徳天壤使時閑於聽世服於道齊髙妙之音正鄭衛之聲並利於事無相奪倫此乃管絃之至牙曠之調也雖非鍾期敢不擊節獄中與諸葛亮書彭羕時左遷私情不悦詣馬超超問羕曰卿才具秀拔主公相待至重謂卿當與孔明孝直諸人齊足並驅寧當外授小郡失人本望乎羕曰老革荒悖可復道邪又謂超曰卿為其外我為其内天下不足定也羕退具表羕辭於是收付獄僕昔有事於諸侯以為曹操暴虐孫權無道振威闇弱其惟主公有霸王之器可與興業致治故乃飜然有輕舉之志㑹公來西僕因法孝直自衒鬻龎統斟酌其間遂得詣公於葭萌抵掌而談論治世之務講霸王之義建取益州之䇿公亦宿慮明定即相然賛遂舉事焉僕於故州不免凡庸憂於罪罔得遭風雲激矢之中求君得君志行名顯從布衣之中擢為國士盜竊茂才分予之厚誰復過此羕一朝狂悖自求葅醢為不忠不義之鬼乎先民有言左手據天下之圖右手刎咽喉愚夫不為也况僕頗别菽麥者哉所以有怨望者不自度量茍以為首興事業而有投江陽之論不解主公之意意卒感激頗以被酒侻失老語此僕之下愚薄慮所致主公實未老也且夫立業豈在老少西伯九十寧有衰志負我慈父罪有百死至於内外之言欲使孟起立功北州戮力主公共討曹操耳寧敢有他志邪孟起説之是也但不分别其間痛人心耳昔每與龎統共相誓約庶託足下未蹤盡心於主公之業追名古人載勲竹帛統不幸而死僕敗以取禍自我墮之将復誰怨足下當世伊呂也宜善與主公計事濟其大猷天明地察神祇有靈復何言哉貴使足下明僕本心耳行矣努力自愛自愛荅張駿勸稱蕃書晉李雄吾過為士大夫所推然本無心於帝王也進思為晉室元功之臣退思共為守藩之將掃除氛埃以康帝宇而晉室陵遲徳聲不振引領東望有年月矣㑹獲來貺情在闇室有何已已知欲逺遵楚漢尊崇義帝春秋之義於斯為大再與蕭紀書梁元帝甚苦大智季月煩暑流金鑠石聚蚊成雷卦狐千里以兹玉體辛苦行陣乃睠西顧我勞如何自獯醜憑陵羌奴畔渙吾年為一日之長屬有平亂之功膺此樂推事歸當璧倘遣使乎良所希也如曰不然於此投筆友于兄弟分形共氣兄肥弟瘦無復相代之期讓棗推梨長罷懽愉之日上林静拱聞四鳥之哀鳴宣室披圖嗟萬始之長逝心乎愛矣書不盡言為人與蜀城父老書二首唐王勃蓋聞天地作極不能遷否泰之期川岳薦靈不能改窮通之數豈非賢聖同業存乎我者所謂才榮辱異流牽乎彼者所謂命是以龍驤鳳峙一作翥伊周成翊賛之功含糗羮藜顔冉困棲遲之病或先號而後笑或始吉而終凶事不可量功未可必定知洪濤未接長鯨多陸死之憂曽風未翔大鵬有雲傾之勢池鰌井鮒亦将鼓鱗而輕之田鳩野鸚亦将騫翮而疑之及其衝溟渤接扶搖吹波則江漢倒騰氣則虹蜺掩摩赤岸負蒼天然後知其力焉吁韓信之無津也昌亭之一餓夫耳馬卿之失路也臨邛之一食客耳武不足以服衆文不足以動時長劔屈於無知洪筆淪於不用洎乎雄圖躡運至尊納背水之謀麗藻昇朝天子賞凌雲之作威加海岳聲振廊廟彼淮隂之俠少成都之遺老也又焉能知逺近哉是以鑒物於肇不於成賞士於窮不於達是知卞和之得玉也精存於岸谷之間張華之得劍也氣發於星辰之際夫豈琢磨成器然後知其寳剸斷為能然後知其用哉仰惟鄉耆等並玉山髙族金堤勝侶列子弟於千城耀衣冠於百代或以風雲去國公孫躍馬之年鍾鼎從王諸葛攀龍之日門庭相接雕甍将綺棟連陳機杼相和鳳攝疑作鑷將虬梭交響金漿玉饌食客三千緑幘青裳家僮數百冲襟𦕈識人多江漢之靈麗藻華文代有雲泉之氣北齋開敞南館靈閒詩酒同歸琴書合契忘機得意耻嵇阮之交疎虚席延賓恨原常疑作甞之客少實烟霞之藪澤風月之津梁者乎劉仲文之逺識不以乾沒詣梁城閔仲叔之髙風不以口腹累安邑雖其已沒生氣猶存况乎屬宇宙之明當天下之泰不能俯拾青紫髙視搢紳攀北極而謁帝王入南宮而取卿相脅肩側足求哀鍾釡之間低首俯眉取濟斗升之未嗟乎誠下官所以仰天漢而欝怫臨江山而慷慨者也但時可以未遇道可以未行志願可以未成功業可以未就古之才足以輔王業躡跡屠釣之間功可以濟巨川藏身版築之下百里奚之負販陳湯之丐貸而况於庸者哉此僕所以駿奔於顧盼之餘自致於恩光之末也且夫精誠所感尚動神明意氣相交豈慙車馬倘能投心季子遥存素紵之恩援手應侯先立綈袍之贈豈人之情也能無報乎方今白藏紹序朱律謝期天髙而林野竦候肅而江山静輕蟬送夏驚晚吹於風園旅鴈乗秋動宵吟於露渚絲纊成於南畝秔稻被於東阡時計有儲願履多福下官薄㳺緜載飄寓淹時歡躓相仍憂虞自積陟梁鴻之峻岳何暇長謡臨阮籍之窮途唯知慟哭庶憑賙給以濟漂危輕訴短懐佇流嘉耗又蜀都廣鎮岷墟奥壤山分玉宇水向金陵景貺有期英靈間出榮問休暢幸甚幸甚夫神有可逼渌波驚亡疑作七柱之音道有可符𤣥霜扣九鐘之節豈道窮經祕妙聽察於無聲理實杳㝠𤣥應通於不測波流柱響波無入柱之因霜落鐘鳴霜非扣鐘之具矣况乎言忘意得臭味相求目擊道存神明已接鄭僑之逢吳札無味殊方阮籍之對嵇康自然同志僕雖不敏甞從事於斯矣嘗謂薫蕕不共器梟鸞不比翼是以類乎方者接風雲於千里乖乎類者起山川於一靣抑甞聞之士之生也其跡可擯而道不可藏其身可辱而志不可奪其有拂衣投臂遁形蒼海之隅裂裳裹足獨立髙山之頂量腹而食度身而衣以鍾鼎為芻豢以衣冠為縲絏方欲乗鸞鳳而撫需疑作雲英鞭虹蜺而採煙液其次排玉闕指金門成賈誼之謨樹終軍之䇿因機入務懐素将相之門沐露霑霜擁篲公侯之室然則拾青紫於旦暮取功名於俄頃演文物而動寰中騰聲名而振天下若有官者可謂慙二途矣而歛手長揖强顔髙視低心於蹇躓之辰忍恥於栖遑之日者哉渭濵留釣鷹揚之業未萌淄源滯收疑作牧鴻漸之資蓋寡及其攀窮運接靈期乗雲雷而清八極和隂陽而調萬品則知冥機所運吉凶於倐忽之間𤣥命所移飛伏於斯須之際以日月且至聊復爾耳方今炎颷謝節爽候開辰風髙而宇宙清霜下而亭郊肅歸雲止鴈流曙響於東津落照開虹寫晴規於北岸螢疎夕砌蟬促朝林感序縁情故豐奇賞僕一違秦隴再革炎凉戒行李而無因指歸途而有倦故鄉超曠曾山重複吳宮尚逺頻驚去鷰之心楚峽猶賖已下聞猿之淚徒以風猷未隔道義相存幸承知己之心稍緩他鄉之思一作意昔者虞公再見懸光白璧之間季布一言猶定黄金之諾况乎交已成於杵臼道已茂於金蘭希照窮途逺流嘉貺若使恩裁口腹空留安邑之賓恵闕始終取恨昌亭之客為河東公上西川相國京兆公書李商隠姚熊頃時鬬歐偶在坤維阿安未容决平遽詣風憲當道頻奉臺牒令差從事徃推去就之間殊為未適顧惟弊府託近貴藩雖䝉與國之恩猶在附庸之列仰遵教指尚懼尤違敢遣賓僚徃専刑獄自奉臺牒夙夜兢惶今謹差節度判官李商隠侍御徃以今月十八日離此某素無材効早沐恩憐獲接仁封實惟天幸頗希終始以奉恩光事大之心朝暾是誓其他並附李侍御口述伏惟照察復坦綽書牛藂咸通十四年兵部尚書牛公藂除劍南西川節度使十二月坦綽至雅州差使送書上川主云此時正欲専詣京都懇求朝見論理枉遭讒間隔絶梯航兾與尚書繼好息民朝來暮徃今故假道貴府請於蜀王殿安下三五日即便前進公覽書驚駭乃復書曰十二月二十四日劍南西川節度觀察安撫使守兵部尚書成都尹牛藂致書於雲南詔國坦綽麾下専人遽到示諭忽臨承統押師徒來及近界竊以詔國自為背叛積有嵗年乃出於六詔之微非是西夷之長禹㑹塗山之日不得預萬國之名舜廵方嶽之時不得見五年之幸我大唐徳宗皇帝仁沾動植信及豚魚子育兆民君臨四海憫其傾誠向化率屬來王遂搃諸蠻令歸君長仍名詔國永順唐儀賜孔子之詩書頒周公之禮樂數年之後藹有華風變腥羶蠻貊之邦為馨香禮樂之域豈期後嗣罔效忠誠累肆猖狂頻為妖孽自四五年來侵凌我疆土圍逼我城隍盡以姑務含容不虞搪突遂令凶醜以害生靈况乃毗橋䘮師沲江敗績於何今日不改前非妄設奸欺詐言朝覲輙舉螗螂之臂大興豺豕之心仍搆狂詞乃云假道所要於蜀王殿安下三五日即便前去者且先代帝王之宫也豈外邦蠻貊以居之是必天怒鬼誅殞身喪國以爾欲其䙝凟示彼誡懲况天設華夷國分大小小當事大夷不亂華豈有興動蠻師甲兵侵凌天子藩屏必是坦綽數盡之歳殄滅之秋不然何以不恤其民妄動於衆一旦天子赫怒諸侯㑹兵長驅渡瀘之師深入鑄柱之境必不更七擒七縱即須剪蔓除根當此之時後悔無及坦綽今既離彼巢穴犯我封圻當道已排比戰塲㸃齊戈甲雄師十萬驍騎五千即遂鼔行併令擒戮所差王保誠四十人送書並已囚縶候於軍前用以釁鼓今發遣鄼嚨段首遷二人持此報書望詳覽不具某白上王建求賢書偽蜀許寂許寂㑹稽人梁祖遣将攻荆南趙凝奔蜀寂與之行建聞其名而館之及開國以為左諫議大夫判門下省武成初上書於建曰歴代之君乗時啓運莫不博訪髦士詳求謀畫以武定禍亂以文致康羲故軒皇命六相虞舜舉八元伯禹拜昌言成湯師一徳周有多士文王以寧此歴代之大經求賢之極摯也今百辟之中有謀可以䇿國勇可以盪冦或博究治體或精知化源未擢頴於明庭尚含光於庶位者伏望恢闢門之路開納牖之途親賜顧問以觀其能寘之列位盡其獻納俾官無敗政人無滯才梁聘書王蜀武成二年梁遣使通聘書曰夫唐虞致治遵禪讓之明文湯武開基允人神之至願必有神器是膺皇圖况古今迭代之期英傑興隆之數莫不上關天命下順人心啓王霸之宏基為子孫之大計咸遵軌轍並載簡編且念與皇帝八兄頃在前朝各封異姓土茅分裂皆超将相之尊魚鴈徃來乆約弟兄之契懽盟甚固功業相推俄隔絶於音塵止因縁於間諜以至時衰土徳運應金行雖手足胝胼粗平多難而星辰符瑞謬付厥躬當百辟之羣情極四方之積患受都河洛用荅乾坤尋聞皇帝八兄奄有西陲盡朝三蜀别尊位號復統髙深一時皆駕於推崇兩國願通於情好徵曹劉之徃制各有君臣追楚漢之前蹤甞分疆宇所冀同清夷夏俱活生靈載籍具存恢張無爽去歳密聞風㫖遐慰寤思憤岐隴之猖狂逼褒斜之封徼欲資牽制用速掃除遂委永平軍節度使劉闗特遣行人先𨗳深意旋已徑差精甲将擊妖巢合數鎮之驍雄鼓六師之威勢尋聞退遁殆至滅亡允諧掎角之謀尤得輔車之利近併覽同華奏報皆進呈褒祥書題具悉事機良多嘆沃今専馳卿列備達衷懐重論金石之交别卜塤篪之分山河共永日月長懸瞻佇好音言不盡意今遣光祿卿盧玭閣門副使少府少監李元聊馳書幣専戒道途兼有微禮具在别幅謹白别幅馬一十疋玉犀帶各一雜物藥物等右件藥物等或来從燕市或貢自炎方或馨香能助於薰爐或華妙可資於寳翫光涵星斗藥有君臣願伸兩國之情重固千年之約愧非縟禮粗逹深衷特布檢留幸甚特白蜀荅聘書大蜀皇帝謹致書於大梁皇帝閣下竊念早歳與皇帝共逢昌運同事前朝俱榮倚注之恩並受安危之寄豈期王室如燬大事莫追横流泛灔於八方衰釁凌夷於九廟此際與皇帝同分茅土共統邦家扶危者力既不宣握兵者計無所出某忝列同盟之分幸居平蜀之功所宜治兵甲以固封疆聚征賦以修進貢望星使而經年不至指雲鄉而就日無期逺聞皇帝應天順人開基立極拯生靈扵塗炭示恩信扵豚魚東南之王氣咸歸河洛之殊祥畢至四門盡闢百度惟貞竟無意於興邦止施仁而濟物以此内量分限不在經綸七十州自可指揮八千里半因開拓遂至萬民叶議八國來朝爰徵史䇿之文亦有變通之説且東漢亂離之後三國齊興西周微弱之時六雄競起俱非恃彊逼禪皆以行道濟時雍容於揖讓之前輕重於英雄之内况西蜀開山立國燒棧為謀稱雄雖處於一隅避狄曽安於二帝鼎峙之規模尚在山呼之氣象猶新永言梁蜀之懽合認弟兄之國今䝉皇帝逺尋舊好専降嘉音坦無間諜之嫌再叙始終之約欵慮則春氷共泮開通則東海可歸光榮遽被扵子孫暢遂咸敷扵朝野今則盡焦勞而勵已用勤儉以帥賢常瞻偃草之風以繼用天之道乂䝉厚加賜貺别降珍奇十驥聨鑣六龍並駕稱徳曽參於萬乗呈才皆過扵千金載觀戀主之心益勵懐恩之志寳帶輟異方之貢名香加逺國之珎竒鋒利過於雪霜雅器價齊乎金玉入用多慙於未識捧持方喜於初觀望思而一日三秋仰徳而跬歩千里自此榮遵天路繼遣星槎緘章不候於飛鳶裂帛豈勞於繫鴈忻榮慰嘉併集於此時敬以専使盧卿等廻避陳所志幸望開覽謹白謝信物書右件鞍轡馬腰帶甲胄槍劍麝臍琥珀玳瑁金稜椀越瓷器并諸色藥物等皆大梁皇帝降使賜貺雕鞍􅀈玉堅甲爍金十圍希世之珎六轡絶塵之用槍森蛇檊劍耀龍鋒金稜含寳椀之光祕色抱青瓷之響上藥非蜀都所紀名香從外國稱竒逺有珎華並由恵好謹酬謝而増愧仰渥澤以難勝捧閲品名實慙祇受奏記王建興用文教王鍇王建永平元年作新宮集四部書選名儒専掌其事鍇以建起自戍伍而據全蜀未能興用文教乃作奏記曰伏以羲皇演卦神農造書陶唐克讓是昌禮樂有虞濬哲乃正璿璣禹湯文武功齊天下故能卜世延逺垂裕無窮逮乎六國諸侯力政秦滅墳典以愚黔首遂使聖人糟粕掃地都盡漢承秦弊不武尊文蕭何入闗唯収圖籍文帝修學校舉賢良海内晏然興崇禮義景帝躬履節儉選博士諸儒以備顧問麟書鳳紀填溢於未央玉版金繩充牣於祕府班固曰周稱成康漢稱文景宜哉武宣之世乃崇禮官開金馬石渠之署以議典禮樂府置協律之官以分雅鄭公卿大夫間作扵世或紓下情以通諷諭或宣上徳以盡忠孝孝成之世奏御者千有餘篇獻納論思之盛夐古罕比世祖承喪亂之餘龍驤宛葉去暴誅亂拯溺救焚寛以用人明以率下兵革既息寰海乂寧乃起立太學招致鴻碩羣臣每有奏議必令史官撰集以傳後世數引公卿講論經義夜分乃寐不以為勞孝明師事桓榮躬親文墨朝誦夜講明達過人孝章崇尚文儒有太宗之遺風常於白虎殿㑹集羣儒推演乾坤考合隂陽上申聖人下述品物叅於傳記内别六經若披浮雲而覩天日設華燈而入闇室詔𤣥武司馬班固纂集其事名曰白虎通魏武博覽羣書究心兵法抄略書史名曰節要又注孫子十三篇尤好篇詠動為典則文帝八歳能屬文博覽古今貫穿經史及居帝位益尚謙和坐不廢書手不釋巻晉宣博學洽聞服膺儒教當曹氏中微總攝百揆萬幾之暇未甞廢巻景文之間咸盡儒術宋髙祖豁達大度渉獵典墳討伐之中亦重文墨文帝博涉經史尤善𨽻書每誡諸子率以亷儉南齊髙帝深沈大量清儉寛厚嗜學好文曽無喜愠常曰學然後知不足余恨無老成人得與周孔比徳兼善艸𨽻有飛動之勢梁武該博多聞有文武之畧在位冬月秉火執筆手為皴裂諸子悉有文藝聚書討閲晝夜忘疲元帝好易韋編三絶東閣聚書十四萬巻象牌玉軸輝映廊廡陳武倜儻雄傑過人窮究兵書耽玩史籍文帝留意經典舉動端雅後魏道武立臺省興儒學五經各置博士講問如市塾序成林北齊有文林學館周武帝保定中書盈萬巻平齊所得纔至五千巻置麟趾殿學士以掌著述隋平陳之後牛𢎞分遣捜訪異書經史漸備凡三萬餘巻煬帝於東都觀文殿東西廂貯書寫正副各五十分為三品除祕書所掌而禁中之書任焉唐髙祖一區宇剗革暴隋六合宅心四海歸徳躬行仁義以息亂階太宗神睿聖文天資英武甞在藩邸命博學之士房𤣥齡杜如晦等一十八人為秦府僚佐大較儒術廣聚經史及居帝位隨才擢用於是𢎞文館皆置學士𤣥宗開元五年於乾元殿置修書使召學士張説等讌於集仙殿東廊下寫四部書以充内庫麗正殿置修書使又召學士張説等讌於集仙殿名集賢其修書使為集賢殿學士自是圖籍不獨祕書省𢎞文崇文館皆有之集賢所寫則御書也分為四部一曰甲為經二曰乙為史三曰丙為子四曰丁為集兩京各一本共一萬五千九百六十巻經庫書白牙軸黄帶紅牙籖史庫書青牙軸縹帶青牙籖子庫書紫檀軸紫帶碧牙籖集庫書緑牙軸朱帶白牙籖以為分别以大學士専掌之歴代以來咸有相述廢置㳂革或有差異今但畧舉帝王故事及祕書之職幸冀垂覽焉諫孟昶書辛寅遜寅遜成都人孟蜀明徳二年昶好擊毬左右不敢諫寅遜為茂州録事叅軍上書昶雖不從亦優容之未幾馬蹶太后曰奈何以馳驅為樂貽吾之憂自是稍止臣聞諸召公曰玩人喪徳玩物喪志不作無益害有益功乃成不貴異物賤用物民乃足又曰不寳逺物則逺人格所寳惟賢則邇人安夫心猶火也縱則自焚故文王命周公召公太公畢公輔相太子發太子嗜鮑魚太公不進曰鮑魚不登扵爼豆豈有以非禮養太子哉由此言之飲食必遵禮况起居玩好乎髙祖皇帝節衣儉食恵養黎元化家為國傳之陛下陛下宜親賢俊去壬佞視前代書傳究歴世興廢選端良之士置於左右訪時政得失天下利病奈何博戯擊鞠妨怠政事奔車躍馬輕宗廟社稷昔陶侃藩臣猶投摴蒱於江况萬乗之主乎前蜀王氏覆車不逺矣臣又聞食君之禄懐君之憂臣雖為外官每聞陛下賞一功誅一罪未甞不振衣踴躍以為再覩有唐貞觀之風也今復聞陛下或採戯打毬雖宫禁無事止於釋悶亦可一兩月時為之臣慮積習生常不唯勞倦聖體復且妨於庶務諸司中覆因之淹滯其次奔蹄失馭奄有驚蹶陛下雖自輕奈宗廟社稷何與孟昶書石晉髙祖孟昶明徳三年晉髙祖遣使來聘叙姻親之舊書曰大晉皇帝奉書大蜀皇帝伏自中原多故大憝繼興朱氏不道而皇天不親沙陁背義而蒼生失望不期景運猥屬𦕈躬方鼎足以分疆宜隣好之講睦况有姻親之舊敢交玉帛之懽機務方殷保攝是望蜀主孟昶結河東蠟彈書初蜀土五十州後主昶性慈孝明敏刻九經置貢舉季年求治太過好聚歛宋興宰臣李昊上書以中原乆否今聞真人應運禮宜貢奉如允所請願備行人時信近宻弗納飜聽王昭逺宻議不與宰執商量結援太原其文不委翰苑昭逺自令幕吏張延偉所作畧曰早歳曽奉尺書尋達睿聽丹素備陳於翰墨歡盟已保於金蘭洎傳弔罰之嘉音實動輔車之喜色丸成蠟彈細人垂露由是興師賀遂寧張舍人啓名震宋晁公遡起於真祠授以督府朝士乍聞而嘆息何以遽歸天子尋為之驚嗟夫豈不用兹頒明詔允穆輿情恭惟某官如古争臣負世重望至今表著議論士皆稱切直而盡規大疑謀心及人後雖咨衆忠言逆耳利行誰復似公頃居􅀈路之時亦上漢庭之奏力陳皂棧之性難渉江湖之行果驗其言馬之死過半矣每觀所至獸相食且惡之信為蕃宣之良尤稱慈恵之最未容報政即入告猷某不喜一方之民獨霑九里之潤所願執事等輩盡登輔相之尊遂使今日朝廷再若仁宗之盛謝魏師鶴山梅亨乆生不學蹇蒲栁以先零初度無能用樵蘇之後㸑過辱兩章之秋月見期千里之春風留歸壓於漁舟難捲還於鯨錦恭惟某官拍肩諸老畜眼一人天不椓民將謀及詩書之帥人能揀道恐宜頒條教之科閔六十服戎之夫窘千里餽粮之役我辰安在敢祈牛斗之有神夫子言之或免蟪菌之俱腐云云先生與之言則對參奚避席之疑小子何莫學夫詩武也請卒章之受全蜀藝文志巻二十八
