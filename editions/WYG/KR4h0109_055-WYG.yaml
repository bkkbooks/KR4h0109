body:
  text: 全蜀藝文志巻五十五明周復俊編譜氏族譜費著郫縣何氏漢自何武死後不絶亦幸矣子况載武䘮如北邙山瘞焉廬其下公孫述誅蜀平况以䘮歸郫葬縣東南按史武兄霸弟顯兄弟五人皆有名按志武後曰隨顯後曰包兄弟五人包子攀又皆有名曰英曰宗曰祗雖見之志第曰郫人爾莫知為武後否也按譜武二世孫曰英五世曰宗宗子攀然英見之志在武兄弟前攀父曰包又與譜異或者譜為未詳不然何氏世世有譜當為蜀氏族第一矣然自漢至晉武弟顯之後猶傳如志云亦盛也譜逺不可盡考或居長安或徙江南唐季有乾符進士待詔翰林知節自謂武裔後僖宗幸蜀加知制誥因歸郫卒葬膏澤鄉孫偉登太平興國進士第嘗記景徳寺邑人推為先生七子子孫散居成都崇慶遂閬彭之崇慶永康之導江而武之族蕃矣偉三世孫邦基登元豐第官朝議大夫賞及從子孫又三世俊茂登紹興第徙崇慶者偉從子繼甫繼甫曽孫援登大觀第𤣥孫碩頥預又世利而家成都者曰騰登紹興第至郡守亦自郫徙云王氏王氏曰簡隨唐僖宗入蜀因留蜀四世坦為郫人贈通奉大夫子冕定國覽定國登治平四年第更名覺政和二年以直龍圖閣知桂州討殺溪洞蠻有功進顯謨待制三年乞祠得提舉成都玉局觀卒累贈特進冕子梅以覺蔭補將仕郞覽補登仕郞覺三子曰檝補登仕郞隨覺宦南方充廣西經畧司内機法檄至邕州染瘴卒朝廷以檝死特命長子煥以官煥官至從政郞曰權補將仕郞曰棣補承務郞累官朝奉大夫通判巴州棣子燾將仕郞熹卒於承議郞邵氏邵氏以唐郜城令錫為祖燕其始封也宋初自丹陽聞岷山勝槩來家於岷之陽曰慶餘後三世曰才始登治平第嘗入尚書為郞贈其父仲良為太中大夫子孫皆官長子充官至朝請大夫賞又傳三子贈才官至銀青光祿大夫邵公溥撫蜀帥言丹陽邵公必嘗薦洛邵公雍於神廟溥葢雍之孫故溥講丹陽好待充如兄邵氏在蜀於是為故家矣申氏申氏貫北京蜀廣政中曰幹臣始來青城子孫居郫幹臣四世孫曰起曰宗起累贈朝請大夫有子曰祖錫曰積中同登元豐五年第祖錫終朝奉大夫積中終奉議郞永興軍路提舉學事祖錫子説終宣教郞詵廸功郞積中子銓以臣僚列奏積中孝行特授將仕郞終於雒縣丞孫伯時登淳熙元年進士第終晉原主簿宗始徙温江四世孫曰叔度五世曰叔儉叔懐皆登進士第詹氏詹氏貫邛州安仁曰文舉以子貴累贈正議大夫子曰權登元豐進士第終於巴州權子廷哲廷碩廷彦自邛始遷居郫廷哲終通直郞廷碩終朝請郞廷彦終從政郞廷哲之子𨽻彦之子籲皆登進士第張氏張氏俞隱居岷山七被詔命不赴賜以官又乞回授其父號曰白雲先生大節見國史事見先賢篇俞二子石民楚民登元豐八年進士第官至正奉大夫子曰吉甫以賞終朝奉大夫子伯振又以賞為青城令卒官石民死子雲從孫文叔夏曽孫山父王氏王氏望太原唐末避亂入蜀居郫曰彦生四子次子曰延壽生四子次子曰景又生四子以孝名邑人號王孝子上兩世皆絶而景諸子曰慶祖慶柔慶餘慶宗傳世特盛遂散居成都永康資中富順惟慶宗之後不遷至曽孫隲登大觀第位至郡守𤣥孫曰樸為朝議大夫賞傳至孫它院子孫或賞或第大抵相似也每歳上已闔族無逺近共修祀事於縣東之塋人猶指為孝子家楊氏楊氏居郫縣凡四世生邁始第進士官至左朝議大夫直祕閣主管環慶路經畧安撫司公事累贈父叔淵光祿大夫邁卒累贈宣奉大夫邁子衍朝請大夫邛州曰思成儒林郞乆成二子蕃鄉從政郞萃鄉修職郞思成一子漢鄉將仕郞張氏張氏昔望崇慶之永康門望如初有遷於郫之犀浦鎮其為族望亦稱克尚五子第三子曰礪即遷犀者礪之孫曰天廸曰煥曽孫曰汾曰洙曰漠𤣥孫曰嶧曰岐皆擢進士第又有遷於彭之崇寜者其後視犀浦尤顯而犀浦院以山為行者今傳之曽𤣥矣諸孫尚力學曰吾家三世登科云文氏文氏以丹淵先生同為望同貫潼川之安泰位雖未高以蘇先生軾為友名重當時其文號丹淵集同官西川樂岷山勝概欲家焉不果子孫始來居郫有丹淵集曽孫仔紹興丙子進士青城尉卒四世故書尚無恙新繁彭氏彭氏曰景直唐中宗時為太常六世孫敬先常以左拾遺隨僖宗入蜀家於普州敬先孫濟民携二子由普徙益長子生福次子生乗乗於宋仁宗朝翰林學士國史有傳乗卒三子不克歸國史載乗為萊陽人繁華陽皆𨽻成都而乗實以太平興國八年生於繁見於故待制韓公駒所為跨鼇先生李公新集序曰繁上則彭乗之文辭云福生顯行顯行曽孫登政和二年進士第官至左朝散大夫知彭州贈其父望官至朝議大夫二子極材以蔭補官卒季子傑從子仁徹同年貢於鄉仁徹登第官至文林郞極子亦第進士不待年致仕周氏周氏望汝南入蜀家於繁曰贇之孫頊有隱徳號正晦先生二子曰洙曰淳洙生表權淳生庚庚生尹及申表權尹同登慶厯六年進士第表權後知漢州尹知梓州蘇文忠公軾文定公轍時皆在朝各賦詩送之初李稷使蜀㩁茶為蜀病表權與尹論合與稷異為稷誣奏罷去尹嘗知利州後為侍御史奉使入蜀迎母靣賜五品服還至陕除節荆湖北路後知眉州丁母䘮䘮除入為主客郞中遷考功兼權吏部元祐四年表權再知漢州表權奏改名表臣尹自是出守梓梓漢相望即此時也兩家二大人年又高表臣初知漢州尹知利州父皆及見之朱衣銀章子所遜也表臣三子克冕元尹四子禔禧祁祠元及祠後先登第餘子以賞得官庚弟庾表臣弟表民尹第申庾之子丙吉平申之子禴祉禩丙之子壽松而表民之孫夏卿或以賞或以恩皆在官獨祉典二大州曰劒曰漢仕為顯雙流宋氏宋氏望京兆隨諫官遂以直言得罪流蜀隆山卒葬隆山隆山後以𤣥宗諱改彭山比及四世少長踰二百人及珽譜一作珧入中朝為正議大夫扈僖宗狩復還歴眉彭二州刺史歸瘞彭山子五人號五房宋長子渝生覽一作干覽生祚始居成都之雙流祚二子承榮承慶承榮生堂舉賢良方正成都府府學説書名載國史承慶生文禮以子右賢右仁同登慶厯第後贈朝散大夫右仁生桓桓生京京生衍登科聨四世右賢孫良孺曽孫徳之祖孫又相繼登科徳之嘗為四川類省第一皆文禮之後也熈寜中邑令徐九思表其坊曰叢桂作堂於邑東延壽院繪五世像號叢桂堂邑人榮之有散而居汴居大安客歴陽徙依政者皆祖諌官今居崇慶者又自雙流徙其居汴者即莊闕公延渥之後譜稱延渥後更名渥有女孝章皇后其後譜聞唯彭山雙流依政譜可考子孫文行聞於時者衆獨雙流以𨽻成都故詳鄧氏鄧氏曰元明居梓中江以富名王建繇閬中圍成都元明開帑廪惟建取前後數百萬計建欲官之元明曰不願也願公安輯一方不然兩州皆魚肉矣建欣納官其子宏忠州刺史宏生隆孟蜀時為資州刺史二子曰鎔曰釗釗生文溥文溥生深均順符亂琛又竭高貲且諭諸富人無靳邑人以故保全家頓貧徙雙流以經學誘進後生羣聚至數百人翕然知學有子曰至學益大號二江先生范公鎮為之友榮公百祿從之游以子貴至贈太師琛亦贈太保琛生六子至其一也至四子綰縯縝先後登科綰試禮部為第一季登第時神宗臨軒綰為翰林學士侍唱名至縝綰下殿謝子洵仁洵武從子邰聨唱名於是綰聨謝執政因奏鄧至善教上曰知之於是時鄧氏以為寵綰後除龍圖閣直學士知鄧州改知滁州洵仁尚書右丞洵武知樞宻院洵武子雍亦以侍從終以故賞延子孫為多凡子孫之散居者曰成都曰瀘曰嘉曰廣安曰懐安之古城鎮曰普曰夔而雙流族所未顯者惟二江先生至之兄弟之後亦異矣雍子椿機位至郡守椿念再世名位在宣政童蔡間率太息一日得洵武諫伐燕疏亟乞蜀守汪公應辰識之應辰曰事具國史矣亦為之䟦椿哭先墓下以告蜀土謂為人孫如此皆賢之張氏張氏漢名綱之後綱卒瘞犍為武陽唐大中時有天祺者自武陽徙江源卒瘞後有白檀生墓間號白檀張氏五傳至中理舉逸民不就即拜将作監主簿子曰公謹元祐五年五經出身累贈少師公謹之子深徙雙流登崇寧第累遷夔州路轉運使判官張丞相浚宣撫川陜承制出陟除潼川路提㸃刑獄改轉運副使遷知夔州中書舍人勾濤論馬政力薦深除管川陜茶馬繼除都轉運使以制置使胡公世將議酒法不合改除瀘州因丐祠請老子孫多以賞得官子珏慎孫徽之安之皆郡守張氏張氏先世曰守珪朝奉大夫若訥若愚孫協一再世弟兄登科協為詩有唐人風協一終於宣議郞其弟終茂州别駕郭氏郭氏先世曰絳以至孝有聲州里子卯貢上庠中第官終部刺史秦丞相檜與卯有庠序之舊及當國卯絶弗與通歴相三郡家食凡一十八年晚年號亦樂居士子皆以賞惟明復世其科嘗入為宗正丞知崇慶府除夔州路轉運判官未赴卒孫以祖賞得官曰道子梁氏梁氏七世曰介紹興丁丑進士第三人為校書郞乞彭州歸遷利州路轉運判官兼四川宣撫司叅議官改知瀘州居歳餘民夷便安之詔改瀘南兼安撫一路以旌其能瀘州為一路安撫自介始梁丞相克家薦之有旨詔赴行在道遇病辭得主管冲佑觀再召又辭除知遂寜府未赴卒二子皆得官曰种曰穆從子自類省奏名曰梓李氏李氏系出隴西自敘云七世祖騏隱五季間聞蜀多名山遂挈二子及宗屬自鼎澧入蜀遊􅡠峩棲於雅州之瓦屋世祖廸為儒生其家雙流自曽祖元義元義生文顯文顯生某某亦學道因出遊學放浪山水間不歸其塟也以衣冠三子師尹庾崧鄉庾入太學與四方賢士交獨於李光泰發最厚晚樂善好施予大年甚似之二子嘉謀嘉猷同登第嘉猷好學工詩文官至宣教郞嘉謀嘗入為宗政丞出守二州繼持節作牧又典州云廣都費氏費氏自敘曰大費佐禹平水土有功今其裔也史冊費氏多賢其入蜀莫知何自從常璩華陽志贊先賢曰師義至仁費奉君貽字也貽不仕公孫述佯狂漆身墓今在成都東南則蜀有費舊矣曰禕曰詩墓皆在詩子立孫盛蜀世譜云益州諸費有名位者多詩之後南宋時游為寜蜀郡太守墓亦在雙石闕甚偉廣都北有鄉曰石柱雙指闕也王氏偽蜀有曰宗陶曰叔熊皆為輔佐宗陶之後為廣都房叔熊之後為沙渠鎮房宗陶生曰順初順初有族子曰黃裳舉孟蜀進士第一孫曰韜韜生傳誨傳誨生得珪得璋得珪生惟亮惟古惟亮生襄舉孝亷惟古生二子曰䇿調蒲江簿曰求登熙寜第官雖眉山令而博學為鄉先生求生開開生樞機桓樸植子申之孫士戣士寅士威皆後先登第申之孫士寅又於四川類省第一士寅終右史士戣典州䇿之子曰汝弼孫曰安中曽孫曰行之𤣥孫曰士兖汝弼行之安中士兖亦後先登第行之常於中書門下省檢正諸房公事終直寳文閣沙渠房亦蕃登第相望實𨽻邛州惟雙流葢廣都别名在漢曰廣都隋以諱更為雙流唐兼存之故雙流房日振舊游太學登紹興第三子太猷太川太臨實世其科太川後為四川類省第一太猷典州雖兩邑子孫繁簡不齊族望葢相似也馬氏馬氏族七世曰犍嘗登進士第不克顯曰騏始著騏登紹興進士第執政楊公椿薦之高廟有旨召騏辭召乃發賜對除軍器監主簿孝宗初元遷起居舍人兼侍講權中書舍人有旨權直學士丐祠知瀘州再知遂寜除右文殿修撰再知潼川卒有子覺世其科自郡守召為太府少卿從子興孫亦登第故兩家子孫以賞在官者半張氏張氏族世曰大同登紹興進士第嘗教授成都解官不復出三奉祠祿多著書號淡齋先生子敬修從子聿修皆登科故邑人推為儒家温江文氏文氏自謂漢文翁裔有龜年者唐乾符中明經及第至彰明令孫曰谷為孟蜀侍御史再傳曰大章仕宋為國子祭酒谷兄弟五人一居漢州一居梓一居綿一居邛一居温江云居温江者曰祚有經學邑人師之曽孫詧遂登元豐第積官及贈至中奉大夫二子振道振竒孫人中族子振徳振鷺諸從孫定中安中衡中達之繼世登第自大觀後或賞或恩如之袁氏袁氏以天綱為祖史曰天綱益州成都人也温江西二十里曰淘埧鎮有井號天綱井其裔環居井側有名芝者於鎮建寺有異應費元量楊徽胡叔豺皆蜀賢大夫為之記載芝子孫蕃衍鎮莫能容四世子昌年遂徙温江鴻為廣文館生試中上游縣為立擢秀坊子孫遂連取名第自省大才大明大聲仲午桂凡七人鄉舉中選者又過倍寋氏寋氏祖蹇叔唐有侍臣曰蹇道原從僖宗西隨僖宗謂曰蹇不利東北因更氏曰寋後有居懐安軍金堂曰逢生二子長曰􅀈􅀈生汝明皆登第為金堂聞家次曰綰徙温江子汝礪廸功郎汝能贈承事郎子孫登第者曰克諧曰誼曰騏曰寅望新都沈氏沈氏唐宋有工部郎中穆之隨僖宗入蜀居新都之彌牟鎮穆之世孫卣紹興進士官至朝奉郎知榮州一世孫曰浚明曰震曰恪曰樞十一世孫曰仲巽俊明子震仲巽皆第進士俊民子震官至通直郎仲巽修職郎恪以賞樞以恩皆得官樞廸功郎全蜀藝文志巻五十五
