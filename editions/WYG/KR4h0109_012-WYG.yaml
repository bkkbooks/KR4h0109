body:
  text: 全蜀藝文志巻十二明周復俊編詩亭館上臨水亭唐閭丘均髙館基曽山微羃生花草傍對野村樹下臨車馬道清朗悟心術幽遐備瞻討囘合峯隱雲聯綿渚縈島氣似滄州勝風為青春好相及盛年時無令歎衰老滕王亭子杜甫君王臺榭枕巴山萬丈丹梯尚可攀春日鸎啼脩竹裏仙家犬吠白雲間清江碧石傷心麗嫩蘂濃花滿目斑人到于今歌出牧來逰此地不知還題栢大兄弟山居屋壁二首前人叔父朱門貴郎君玉樹高山居精典籍文雅涉風騷江漢終吾老雲林得爾曹哀絃繞白雪未與俗人操野屋流寒水山籬帶薄雲静應憐虎穴喧已去人羣筆架霑牕雨書籖映隙曛蕭蕭千里馬箇箇五花文卜居前人浣花流水水西頭主人為卜林塘幽已知出郭少塵事更有澄江消客愁無數蜻蜓齊上下一雙鸂䳵對沉浮東行萬里堪乘興須向山陰上小舟西郊前人時出碧鷄坊西郊向草堂市橋官柳細江路野梅香傍架齊書帙看題檢藥囊無人競來往踈嬾意何長田舍前人田舍清江曲柴門古道傍草深迷市井地僻嬾衣裳櫸柳枝枝弱枇杷樹樹香鸕鷀西日照曬翅滿漁梁嚴中丞枉駕見過嚴自東川西川勅令兩川都節制前人元戎小隊出郊坰問柳尋花到野亭川合東西瞻使節地分南北任流萍扁舟不獨如張翰皂帽應兼似管寧寂寞江天雲霧裏何人道有少微星寄題杜二錦江野亭嚴武漫向江頭把釣竿懶眠沙草愛風湍莫倚善題鸚鵡賦何須不著鵕䴊冠侍中腹中書籍幽時曬肘後醫方静處看興發㑹能馳駿馬終須重到使君灘同羣公秋登琴臺髙適古跡使人感琴臺空寂寥静然顧遺塵千載如昨朝臨眺自兹始羣賢久相邀德與形神髙孰知天地遥四時何倐忽六月鳴秋蜩萬象歸白帝平川横赤霄猶是對夏伏幾時有凉飈燕雀滿簷楹鴻鵠摶扶搖物性各自得我心在漁樵兀然還復醉尚握罇中瓢揚子雲墨池即草𤣥所宋宋祁宅廢經池在人亡墨溜乾蟾蜍兼滴破科斗共書殘蠧罷芸猶翠蒸餘竹自寒長楊無可問撫物費長嘆司馬相如琴臺前人故臺千古恨猶對舊家山半夜鸞凰去它年駟馬還死憂封禪晩生愛茂陵閒惟有飄飄氣仍存天地間題琴臺田况西漢文章世所知相如閎麗冠當時㳺人不賞凌雲賦只説琴臺是故基江瀆亭宋祁一翬掀翅壓溪隅吏事初閒此宴居斷岸有時通略彴輕風盡日戰栟櫚雲鴻送目揮絃後手板看山拄頰餘芰碧蒲青來更數江人多識使君旟夏日江瀆亭小飲前人飛檻枕溪光歡言客徧觴暫雲消樹影驟雨發荷香辛臼橙韲熟庖刀膾縷長蘋風如有意盈衽借浮凉錦亭晩矚前人長夏宜髙明緩帶散煩窘憑軒一超然目與天共盡山從雲端見日就林外隱風來草樹披煙生井閭近自公况多暇沖臆無留藴即此可宴居何須事游軫髙亭駐眺招宫苑張端臣前人蜀天向臘寒未極倚檻綿睇亭臯分一萍團紅江上日數蓋淡白樓頭雲杯中竹葉與誰舉笛裏梅花那忍聞願君枉步數相勞他時離緒徒紛紛和浣花亭葛琳井絡西南區成都號佳麗錦城十里外物景居然異傍縈浣花溪中開布金地杜宅巋遺址任祠載經祀按蜀記梵安寺乃杜甫舊宅在浣花去城十里大厯中節度使崔寧妻任氏亦居之後捨為寺人為立廟於其中每歲四月十九日蜀人多遨樂于此自昔歲一逰有亭久摧廢將期汎舟㑹先此留旌騎弗基矧肯構後人莫予嗣冠蓋或戾止風雨亡所庇我公至之初詎肯徇人意柅車集賓組幕天陳燕器茍弗謀髙明胡為革媮敝鳩工度材用奢儉求中制舉從縣官給下靡秋毫費巍然大厦成甚於折枝易藩條息偃暇時律清和際落成及休辰夙駕忻重詣羣嬉逐使轂雜處同蠶市棟宇美可觀席筵陳有次芳樽既罷撤綵舲爰登憇夾岸布緹帟中流喧鼓吹泝㳂煙靄間禽魚共翔戱都人與士女疊足連帷被㺯珠疑漢曲浮觴均洛禊晻晻日將暮熙熙衆皆醉况入武陵源却返塵寰世自是畢遨賞始復專民事農耕士就學商販工居肆蜀邦生齒繁衣食良囏匱三時急耕播寸壤無遺棄兹焉俾暇逸所以慰勤瘁上賴天子心慎重坤維寄既擇邇臣德來秉諸侯瑞且命太史賢出攬澄清轡第務廣教育孜孜布仁惠匪圖亟聚斂規規奉邦計和氣斯涵濡羣生皆茂遂乃躋富壽域共樂昇平治不才備屬僚罔補公家利廕宇幸焉依雅聲慙善繼願比召南篇永歌棠蔽芾逰彌牟王氏園文同短彴踈籬入野扄竹煙松露滿襟清奔湍激險飛寒響弱蔓穿深掛晩英惜去更觀曽畫壁記來重注舊題名門前便是紅塵道誰肯同過洗俗纓張少愚書院前人澗水浸斷橋車馬不得通飛嵐積庭礎秋蘇垂紫茸窗紙爛溪雨簾衣折林風主人殊未歸使我煙景空劒州東園前人羣峯髙擁碧嶙峋亭宇清華氣象新兩岸烟雲先向日一林花木暗藏春溪明夜閣軒窗月風斷晴橋井邑塵好酒滿樽詩滿軸士人曽不倦行人鹽亭縣永樂山叩雲亭前人長江合高峯爽氣左右繞中流望絶巘萬丈見木杪孤亭掲其上隱隱一拳小李君令兹邑邀我升縹緲是時天宇淨晴色洗霜曉萬象滿四隅轉盼皆可了神清壓塵氛志適喜猿鳥人生貴軒豁世務苦紛擾兹焉獲登覽浩思欲飛矯今謂亭我為勝絶此應少願子立佳號光輝飾松蔦因名之叩雲大字榜霞表致爽軒趙汝愚濃陰夾道水流渠吹盡殘花不復餘惟有范家十畝竹青青依舊色侵書錦屏山暮景喻汝礪暝色輕煙罩郡城漁舟燈火倒觀星寒山逺水江村暮自在粧成水墨屏西園辨蘭亭吕大防手種叢蘭對小亭辛勤為訪正嘉名終身服佩騷人宅舉國傳香稻子城削玉紫芽凌臘雪貫珠紅露綴春英若非郢客相開市幾被人言誤一生和李大臨沙石香叢葉葉青却因聲誤得蟬名騷人佩處惟荆渚識者知來徧蜀城消得作亭滋九畹便當入室異羣英非逢至鑒分明説汨沒人間過此生和季之純綠葉纎長間紫莖蜀人未始以蘭名有時只怪香盈室此日方傳譽滿城恩意和風揚馥郁光榮灝露滴清英庭階若不逢精鑒何異深林静處生萬里橋西有僧居曰聖果後瀨錦江有脩竹數千竿僧辯作亭於竹中予與諸公自橋乘舟泝流過之因名亭曰萬里蓋取其發源注海與橋名同而實異因作小詩議之吕大防萬里橋西萬里亭錦江春漲夾堤平挐舟直入脩篁裏坐聽風湍徹骨清運司園亭詩章發成都轉運司園亭蓋偽蜀時權臣故宅也清曠幽静隨在皆有可樂者輒為十詩粗記領略以備它日遺㤀庶幾其詩足以省憶舊逰爾西園古木鬱參天蒼苔下封路幽花無時歇醜石終朝踞水竹散清潤烟雲變晨暮何必憶山林直有山林趣玉谿堂堂緣水得名方沼當其後漪瀾蕩榱桷窗戸挹花柳蟲魚不避人鷗鷺若相友午枕夏簟凉此樂亦奚有雪峯樓曽構壓池塘不僣亦不偪影浮緑水静寒逗雪山色撫檻接修竹連簷引蒼柏注目望長安無奈濃雲隔海棠軒珍葩寄幽島正對孤軒植優柔自俯仰紅緑若組織合酣晴日曛坐久濃香逼池面淨可鑑朝霞莫澄碧月臺蜀地饒夜雨輕陰多蔽天見月月無幾築䑓待嬋娟高疑桂影近俯視雲屋連顧盼已塵外欲挹瑤宫仙翠錦亭楩楠百尺餘排列拱簷際畏日自成陰隆冬寧滅翠虛曠得寂理嬾癖資濃睡誰知官府中獲此沖寂味潺玉亭傍砌釃小渠囘環是流水石蜃此珠涎清響醒人耳風㣲竹影碎月皎波光起䬃爽無塵囂静適心所喜茅菴竹間搆圓菴所向自瀟灑珍禽㺯巧舌宛是居山野嘿坐見真心萬緣盡虛假勿陋尋尺地兹焉息意馬水閣架木浮水中略彴通孤島扶踈倒花影潑剌跳魚小風月所得多經營信云巧隱几寂無人朱欄萃幽鳥小亭化邊一小亭雙跨清渠上規摹雖甚隘幽僻良可賞信依佳木陰未羨大厦廣不足延賞朋擕笻常獨往同前許將尋勝偶出郭芳園路西轉鳥鳴戀故木蘭茁歸新畹質夫新得真蘭植之坐愛花景深行倚笻枝短翳然想林木㑹心不在逺草堂俯玉谿玉谿清且幽從公蹔偃息光景空夷猶浮雲冠員島白日囘方流秪此有光碧何心崑崙洲危樓起城陰乘髙望西極列峯横青天飛雪千里積皓然絶纎塵一攬無邊白莫怪頻東向上有思歸客海棠冠蜀花此軒花尤冠紅雲簇蘂細緑水照葉亂倚籹宫粉聚疊綺霞光散雨淚㸃春風應懷上林怨蜀地山四維益州平如掌累臺鬱臨風坐看月宵上稍出叢木末始發衆籟爽兹焉蹔逰目一攬天地廣闌干竇溜長􅌄窱空埃静修林宻葱翠盡得錦城景雲舒青青色風散蕭蕭影未為夜行人共此晝夜永引泉注清渠潺潺潄寒玉側出閬風遲驟驚江雨速飛瀨乍揚白樛木細涵緑晝夜聲不止肯效楚人哭茨茅以為菴環顧蕭然虛内樂茍自足容丈即有餘旁依條竹宻上翳青松踈勿言此中陋中有君子居飛閣出方池修曲見空莽偏臨花塢近平覺春波長反景澄餘暉夕陰帶浮爽從容觀魚樂不減逰濠上扁然溝上亭左右相映帶修柟列翠幄長松偃髙蓋地偏景逾寛處約志彌㤗誰知坐嘯間心逰萬物外同前豐稷仙山二十四境逺難遍探錦城史君園雅與雲洞參廻光戢一覽紫翠絶西南池映金波浄花霑玉露甘一水從何來應是崑山頂釃成緑玉池虛堂逗清影公退泠然賞悦心非外境魚泳陽光動鳥啼春晝永憑眺在何許樓倚青霄端每來注心目不覺生羽翰終籍好峯影散作銀闕攅隻履西歸客應笑空倚欄文錦初動機晨霞欲敷照香傳雪樓濃影落玉谿倒子美不能賦春工一何妙惟有賞心人相逢祗㣲笑石印魚在屏犀透星入角廼知明月光日用人不覺陟此百尺臺餘念坐消剥洞曉弦望機仙用兹可學簷外列脩木凛凛正人氣有德必有文爛兮五色備豈同夭韶花㺯春張繡被須信輪囷材堪為萬乘器養原在西山如玉抱精白引之落錦渠歴耳不可擇風雨雜鳴球珠璣寫雲液恰似偃谿聲醒悟迷途客覆以潔白茅環以琅玕竹天籟旁鼓笙月沼對鋪玉借問清坐翁此外更何欲笑指博山鑪香飛栢子緑長虹卧松江一葦航大河豈如此安穩無復畏風波幽香萃花島魚藻㫖且多徙倚小欄曲月色透薜蘿東西對孤鶱杖屨可幽歇容光日月來映此自輝徹鱗木張幄翠蜃泉飛玉潔往往得意時宛在廣寒闕同前孫甫外臺富園池兹焉甲西南異花間棠梅良木森楩楠飄飄壺中仙亹亹物外談聯毫賦新詩刻石留翠龕華堂殿去聲方池雅名題玉谿南榮山色逈北牖花光低時聞細泉鳴間或幽鳥啼深宜澹蕩人冥坐窺天倪金穀計浩穰山水志闊契晴空倚危樓快對西山雪胷中浩氣充物外囂塵絶無事坐清吟逺岫窗中列髙軒瞰方池澄波隔鎻窗中島植竒花鮮逾濯錦江水府集羣仙紅雲羃翠幢畫圖入禁庭榮耀知無雙内璫使蜀畫圖以進俗流嗜喧卑世才務髙潔築臺僅喻尋清夜延明月四垂天幕低千里蟾光發幽人澹無事裁賦何清絶森森棟梁材駢空翥鸞鳳危亭構其間曽不礙榱棟簷陰織翠紋砌溜諧清㺯攤飯宜晝眠一枕華胥夢囘環引細泉泉聲漱簷底美哉智者心清通樂去聲流水琤琮戞鳴球淅瀝泛緑綺塵慮無由得何須洗雙耳結茅作禪菴不卑亦不廣地占官府雄盤基才袤丈几席供燕閒松筠助蕭爽座有逍遥公虛中息塵想小閣連雪峯憑欄恣幽玩紅接海棠洲緑對篔簹岸有時開鐏罍波影侵几案何須架長虹然後冲雲漢蕭森玉谿南小亭屹相向使華雙軺車禪境二方丈固將物理齊室隘志自廣松竹周四簷足以備幽賞冠鰲亭錦竹周敦頤紫霄峰上讀書臺深鏁雲中久不開為愛此山真酷似冠鰲他日我重來全蜀藝文志巻十二
