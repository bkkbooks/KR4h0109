body:
  text: 全蜀藝文志巻三十七明周復俊編記戊黄陵廟記節文漢諸葛亮僕躬耕南陽之畆遂蒙劉氏顧草廬勢不可却計事善之于是情好日密相拉總師趨蜀道履黄牛因覩江山之勝亂石排空驚濤拍岸斂巨石于江中崔嵬㠝岏列作三峯平治洚水順遵其道非神扶助于禹人力奚能致此邪僕縱歩環覽乃見江左大山壁立林麓峯巒如畫熟視于大江重複石壁間有神像影現焉鬂髮鬚眉冠裳宛然如彩畫者前豎一旌旗右駐一黄犢猶有董工開導之勢古傳所載黄龍助禹開江治水九載而功成信不誣也惜乎廟貌廢去使人太息神有功助禹開江不事鑿斧順濟舟航當廟食兹土僕復而興之再建其廟貌目之曰黄牛廟以顯神功諸葛武侯廟記唐吕温天厭漢徳俾絶其紐群生墜塗四海飛灰武侯命世實念大極魏姦吴輕未獲心膂胥宇南陽堅卧待主三顧稍晚羣雄粗定必也篲掃是資鼎立變化消息謀成掌中龍戰𤣥黄再得雲雨于是右掲如天之府左提用武之國因山分力與水合勢蟠亘萬里張為龍形亦欲首吞咸鎬尾束河洛翼乎中夏飛于天衢然後魚驅勾吴東入晏海大勲未集天奪其魄至誠無忘炳在日月烈氣未散長為風雷英雄痛心六百年矣於戯以武侯之才知已付託土雖狭國以勤儉富民雖寡兵以節制强魏武既沒晉宣非敵而戎車荐駕不復中原或曰竒謀非長則斬将覆軍無虛舉矣或曰餽糧不繼則築室反耕有成筭矣甞試念之頗賾其原夫民視徳以為歸撫則思虐則㤀其思也不可使忘其忘也不可使思當漢道方休哀平無罪王莽乃欲憑戚寵造符命脅之以威動之以神使人忘漢終不可得也及髙光舊徳與世衰逺桓靈流毒在人骨髓武侯乃欲開季世振絶緒諭之以本臨之以忠使人思漢亦不可得也向使武侯奉主之命告天下曰我之舉也匪私劉宗唯活元元曹氏利汝乎吾事之曹氏害汝乎吾除之俾虐魏偪從之民聳誠感動然後經武觀釁長驅義聲咸洛不足定矣奈何當至公之運而强人以私此猶力争彼未心服勤而靡獲不亦宜哉乃知務開濟之業者未能審時定勢大順人心而克觀厥成吾不信也惜其才有餘而見未至述于遺廟以俟通識唐貞元十四年七月一十五日記諸葛武侯祠堂記裴度度甞讀漢史詳求徃哲或秉事君之節無開國之才得立身之道無治人之術四者備矣兼而行之則蜀丞相諸葛公亮其人也公本系在簡冊大名盖天地不復以云當漢祚衰陵人心競逐取威定霸者求賢如不及藏器在身者擇主而後動公是時也躬耕南陽自比管樂我未從虎時稱卧龍詩曰潛雖伏矣亦孔之昭荆州平心與𤣥徳神交洎乎三顧而許以驅馳一言而定其機勢于是翼扶劉氏纉承舊服結吴抗魏擁蜀稱漢政刑達于荒外道化行乎域中誰謂阻深殷為强國誰謂輕脆勵為勁兵則知地無常形人無常性自我而作若金在鎔故九州之地魏有其七我無其一由僻陋而啟雄圖出封疆以延大敵財用足而不曰浚我以生干戈動而不曰殘人以逞其底定南方也不以力制而取其心服震懾諸夏也不敢角其勝負而止候其存亡法加于人也雖死而無怨徳及于人也雖奕葉而見思此所謂精義入神自誠而明者矣若其人存其政舉則四海可平五服可傾而陳夀之評未極其能事崔浩之說又詰其成功此皆以變詐之畧論節制之師以進取之方語化成之道不其謬與夫委棄荆州不能遂有三郡此乃務増徳以吞宇宙不黷武以争尋常及出斜谷㩀武功分兵屯田謀乆駐之計與敵對壘待可勝之期雜乎居人如適虚邑彼則喪氣我方養威若天假之年則繼大漢之祀成先主之志不難矣且權傾一國威震八紘上下無異辭始終無愧色茍非運膺五百道冠生知曷以臻于此乎故𤣥徳知人之明者倚仗曰魚之有水仲達奸人之雄者嗟稱曰天下竒才度每迹其行事度其逺心願奮短袖以排羣議而文字雖鄙志願未果元和二年冬十月聖上以西南奥區冦亂餘孽罷甿未息汚俗未清輟我股肱為之父母乃詔相國臨淮公由秉鈞之重承推轂之寄戎軒乃降藩服乃理將明帝道陬落綏懐溥暢仁風閭閻滋植府中無留事宇下無棄才人知嚮方我有餘地則諸葛公在昔之治與相國當今之政異代而同灋矣度謬以庸薄獲叅管記隨旌旗而爰止望祠宇而修謁有儀可象以赫厥靈雖徽烈不忘而碑表未立古者或拳拳一善或師長一城尚流斯文以示来裔况如在之嘆終古不絶其可闕乎乃刻貞石庶此都之人存心拜之感云爾銘曰昔在先主思啟疆宇擾攘靡依英雄無輔爰得武侯先定蜀土道徳城池禮義干櫓煦物如春化人如神勞而不怨用之有倫柔服蠻落鋪敷渭濵攝跡畏威雜居懐仁中原旰食不測不克以待可勝允臻其極天未悔禍公命不果漢祚其亡將星中墮反旗鳴鼓猶走司馬死而可作當小天下尚父作周阿衡佐商兼齊管晏總漢蕭張易代而生易地而理遭遇豐約亦皆然矣於戯竒謀奮發美智夭遏吁嗟平立咸受謫罰聞之痛之或泣或絶甘棠勿翦駢邑斯奪繇是而言殊途共轍本于忠恕孰不感恱茍非誠慤徒云固結古栢森森遺廟沈沈不殄禋祀以迄于今靡不駿奔若有照臨蜀國之風蜀人之心錦江清波玉壘峻岑入海際天知公徳音元和四年記忠武侯祠堂記附宋張震漢昭烈以區區一隅當天下三分之二恃有忠武侯而已自操敗赤壁昭烈始收江南以侯督零陵桂陽長沙三郡及昭烈入蜀侯鎮荆州率張飛趙雲泝江而上與昭烈㑹以成平蜀之功其後永安受命嵗在徃反則瞿唐控扼經營之地侯豈特有意于此哉今八陣故基不溺于波流而卧龍屯營乃不復見按晉永平中卧龍始以山名唐䕫州治白帝廟于西郊杜少陵所謂卧龍無首對江濆者也不知自何時併為寺寺故有祠又不知自何時已失之矣侯平生所眷眷者神物且知護之顧人獨不然予是以有感焉盖天下之才不乏其卓然特立功名之㑹者固有之矣至責以大人之事則凛然如恐不及惟所志狭所施陋也三國鼎立爭天下漢號最弱昭烈戰每不勝而四海之義皆歸之吴孫氏以江東伯人材視漢魏為多其取江陵破猇亭功最俊偉然知摧其與而忘用之敵謀蜀則巧謀魏何拙也關羽在荆州攻曹仁于樊操議徙都避之此何與吴事而權寜屈于魏請取羽自效乎彼其志不在天下明矣昭烈以羽故用師于吴兵敗身困摧沮以死蜀之君臣父子讎吴當益甚而若直置不問此豈恝然真忘吴者哉顧所讎者大魏窺神器而竊取之其罪與吴孰重使蜀日夜唯吴是圖則魏偷得自安或者持刺虎之術乗吴後是代魏受禍也嗚呼侯經營天下之略其規模意度與吴相絶如此邪世徒知周瑜吕蒙陸遜破三大敵功在當世鮮儷而侯不過拒司馬懿渭上而止其烈若少貶焉然百世而下望其品以為三代人物者惟侯實當之數君子盖不與也此所謂大人之事豈勉强用力所能致乎三國距今向千載其事之成敗得失人類能言之而吴人于數君子未始有禋享者侯于蜀迺特厚盖自當時固有巷祭野祀者矣朝議以禮不聴卒不能禁迺聴立廟沔陽其傳至今䕫州豈獨忘之侯故第在成都像設甚偉望之儼然猶可想見風烈予始命卧龍寺僧慧璉為侯創祠且繪其像以慰國人之思而紀其大畧使復有文中子者觀之當以予言為然隆興甲申日南至右承議郎充敷文閣待制知䕫州軍州提舉學事兼管内勸農事充䕫州路兵馬都鈐轄兼本路安撫司事賜紫金魚袋張震記移建武侯祠記王十朋武侯故祠在州之南門沿城而西三十六歩無㫁碑遺刻以考其嵗月之始見于圖經者略焉在隋唐時稱白帝城杜少陵詩曰西郊諸葛廟者其地于兹乎十朋莅事之初謁焉徘徊四顧敬想風烈歎廟貌之不稱它事未遑也首葺而新之且書其事于石矣然地卑巷隘混以民居汙渠糞壤溷乎其間臭朽之所蒸蝸螾之所家非所以妥靈而崇祠也門之東去祠一百八十五歩城有臺下臨八陣圖登臺而望則常山之蛇四頭八尾之勢宛其在目北直郡倉倉故永安宮也據爽塏狀如屏宮之北有水曰清瀼瀉出乎兩山之間東入于江又東過灔澦入于峡峡口有山卓然立乎羣峯之外者白鹽也可謂江山之勝矣侯昔經營天下于平沙之上輸忠盡誠受遺立孤于是宮之中江流洶而石如故宫闕廢而地猶存陵谷雖變而精神不亡宜于兩者之間祀之亦侯之志也遂與同僚謀而遷焉地初為節度推官宅徙于它所因其址築而髙之用其材斵而新之為堂五楹廡萬椽南門于臺又門于西通徃来之道像仍其舊新厥丹青冕服用侯又塑關張像翼于左右故祠以婦配非禮也别為室以奉之書史傳于壁之左而削其不公之論書少陵詩于壁之右以諸作者詩文次之乾道三年四月壬午告成詩以祠之詞曰白鹽峙天兮灔澦屹江風雲惨澹兮翺翔卧龍龍千秋兮何之新廟貌兮江之湄前八陣兮後故宫龍兮龍兮神其中望昭烈兮隔清瀼遺廟存兮交精神于恍惚駕虛空兮雲為馭臣東朝兮主西顧魚得水而相忘兮事無今古儼關張于左右兮一龍二虎祠有新故兮侯無重輕舎其故而新是卜兮邦人之情祠合于圖兮自今始事祀不絶兮有如此水城隍廟記唐段全緯陽之理化任乎人隂之宰司在乎神人保于城城保于徳徳者神所慿依也則都邑之主其城隍神之謂乎蜀地土惟塗泥古難版築至秦恵王始命張儀與蜀守張若城成都其環十二里其髙七十尺廨署㕓里畫其下井幹樓櫓森乎上其金椎初作壤頽莫就有大蔡周旋而行俾壘堵依準而立即今城也其神功乎由此而来乃墉洫崇濬啟塞扃固萬雄邐迤一都繁㑹臣明支侍金湯繕完故前年蠻冦卒来戎備無素但擾郊鄙不近闉闍閉關戒嚴即時罷退則扶傾捍患之力其隂靈幽賛之神乎前之舊祠寓託隈偞偏陋偪隘歴嵗滋深是用改度方隅惟新經構去乎幽奥就于髙明其日惟丙戍其辰惟已其卦直巽其宫在西掲署于髙門𢎞敞于正堂丹雘于周墉圖繢于迴廊廟貌如生像容有睟神保是饗永安定位俾夫農無水旱人不夭札屏絶蠻夷阜安閭里䕶乎封域富庶乎億年爰書經始以昭祀事南瀆大江廣源公廟記李景讓戴禮有之曰五嶽視三公四瀆視諸侯古之禮于嶽瀆尚矣在昔夏后氏隨山濬川以畫九州華陽黒水界我庸蜀劒閣之陽益部饒焉岷山導江東别為沱禹績也瀆者曰江曰河曰淮曰濟導積石桐柏沇水凡四流皆發源注海者也唐天寳六載開元神武皇帝加封南瀆為廣源公其三者亞焉漰沛滈汙自峡奔荆且北直東百川㑹同爰及吴楚萬里歸海水府怪神非江不安水物族生非江不全海門二山逆我為滄由岷激沱逺邁無壅斯所謂祗上天而被下土南瀆之為大也壯矣開元皇帝古禮是式詔曰惟夏四月肇辰迎氣太守其率祭官祀南瀆于益州設玉篚及洗罇罍簠簋既舉洎于獻祝進神右跪揚我詞其文曰維某年嵗次某某月朔嗣天子遣某官某昭告于南瀆大江惟神包孕百川朝宗于海光昭潤化徳表靈長今因夏首用率舊典敬以玉帛犧牲粢盛庶品明荐于神尚饗至于今不衰詔之嵗嵗直丁亥距戊寅當大中十二年合一百一十有二嵗越五月朔辛酉日予小臣景讓承聖敬文思和武光孝皇帝詔自御史大夫檢校吏部尚書成都鎮蜀西川又五日戊寅復加檢校尚書右僕射其他如故凡再命皆以兼御史大夫寵焉秋七月庚午乗軺至止遂謁瀆廟惟神盛徳刻諸金石仰瞻榱桷靈爽斯在神惟奉大禹之休得蠶叢魚鳬望帝之勲鼈靈之濬三峡李氷之穿二江嘉而保之沃此黎首水旱不虞于今頼之赫哉成功其可沒耶乃作銘曰滔滔沱江發自岷山浪溢流飛走峡之荆迨及吴楚百川以歸南北東西萬里湯湯電激雷馳水府神宅鮫人陽侯世不可窺南瀆之功載主載張隂烈希夷上戴大禹丕承我唐開元其期先主不造天絶劉宗匪瀆殆而洸洸孔明鞠躬墮星匪瀆不悲念此下民於萬斯年九穀繁滋我来守土敬揚神休以琢豐碑新修江瀆廟碑宋蘇徳祥五行迭用水實居多四瀆朝宗江惟其長八卦之畫也坎之爻冥契北方之數水實主之二儀之判也岷之山騰為東井之精江實出之惟堯之世斯水未治遂有昏墊之虞以嗟方割惟禹之興斯江既道故有納錫之貢以示成功其利萬物也大不可極深不可測而靈潤之功著焉其納百川也則察之無象尋之無邊而靈長之徳昭焉昔者三國連衡吴人擅命六朝割據陳氏稱雄及晉祚之隆也下樓船于玉壘隋基之盛也進戈甲于金陵降孫皓則濟為安流擒叔寳則寂無駭浪得非有道則應無道則否威靈不昧肸蠁斯在若乃方軌十二惟帝之都邑勝兵百萬惟帝之爪牙非富庶無以示國威非漕運無以資邦計語其順流而下委輸之利通西蜀之寶貨轉南土之泉穀建帆髙挂則動越萬艘連檣直進則倐踰千里為富國之資助經邦之略此又妙不可盡之於言事不可窮之於筆也當隋之開皇二年文帝以沈祭之缺禮乃營之以廟貌唐之天寳六載𤣥宗以廣源之美號爰封之以公爵而自梁室暴興蜀人僣命王氏則起之于前孟氏則繼之于後或征或戰越四五朝稱帝稱王垂七十載化風乆隔祠典莫修應天廣運聖文神武明道至仁孝皇帝握乾樞而御極弔坤維而問罪聊施良䇿纔舉偏師未越六旬已平三蜀既而王道坦泰階平四夷八蠻有跋扈者盡為臣妾矣名山大川有隔越者盡入提封矣爰伸昭謝用酬𤣥貺乃下明詔徧立嚴祠有司承制繪様于素頒之于所部長史祗命官蕆其事取之于大壯土木盡其妙丹雘窮其利僝功斯畢列狀以聞我其潔籩豆馨黍稷永享神以明徳神其助造化和隂陽潛祐我之治世式覃睿㫖俾建豐碑臣敢頌皇猷刋之翠琰豈比夫沈于江底杜元凱惟尚功名賦彼江流郭景純但矜詞藻而已哉銘曰江之源兮出蜀之界江之流兮歴吴而大利萬物于南方納百川而東㑹嗟乎盗發于唐兵起于梁神之祀兮乆廢烝甞美哉我宋之昌彼蜀之方神之廟兮復搆棟梁我其享神以蠲潔神其祐我以豐穰勒銘垂裕休無與疆郫縣蜀叢帝新廟碑記張俞水于五行為利害最大四瀆為之原水而江又為四瀆之長其為利害益大矣昔洚水警堯天下昏溺江實為暴民受其害帝乃命禹決江疏河東放于海則天下受其利然後受舜禪讓終陟元后功配天地徳被萬世自水始也故孔子修書述禹之事尤勤備焉繼而歎曰禹盡力乎溝洫吾無間然矣劉定公亦曰㣲禹吾其魚乎然聖人之功大而易法簡而易循因時致治必通其變厥後千五百年蜀有開明氏能振其道故禹之功復興焉在昔蜀有賢主曰望帝獲楚人鼈靈以為相當是時巫山龍戰崩山壅江水逆襄陵蜀沈于海望帝乃命鼈靈鑿巫山開三峡決江沱通綿雒合漢沔濟荆揚然後得陸䖏人保厥命望帝以其功髙讓位而去鼈靈遂稱叢帝號開明氏襲郡於郫故蜀人誦先王功者以開明氏比夏后氏焉其後三百年秦强伐蜀命其臣李氷為守是時江妖為暴沫水淫流沃野嵗災民受其害氷乃誅水妖通水道鑿二山釃二江灌溉千里變凶為沃人賴其利故史氏美氷之功于蜀為大自氷沒後千五百載其功益彰焉大禹大聖人也智極于水用能因天順地永生厥民若叢與氷道不行于周秦而能迹禹之功厚利二蜀非有大賢之業安能至此天水趙公曰予觀蜀之山川及其圖記能雄于九丘者盖乗成水利以富殖之其國故生生不窮然非開明氏則巴蜀魚其民淮漢汙其澤湮禹之力遺後之患憂可弭乎其後復得秦守之事謂其功出開明氏之下而蜀人獨神氷之廟祀史氏雖載氷之後功反使紹聖之烈闇而不耀世祀湮滅予甚懼焉盖所謂曰用而不知遂㤀其本矣按禮祭法聖王之制祀功施于人則祀之能禦大災則祀之能捍大患則祀之若開明氏可謂功施于人能禦大災能捍大患者也予適治兹土而壠墓在邑之南彼民無知古闕祭享非所謂遵明詔存功烈者也康定二年春二月五日始作新廟成益州牧樂安公命辭来祭趙君乃躬執祀事㑹民吏以享之衆始大恱趙君名可度字叔儀治郫有稱觀其所舉可知也銘曰江發坤險堯憂懐襄夏后瘠力其流洋洋巫龍崩山江沈蜀疆開明疏鑿民復其常外通淮漢内殖岷梁利盡西海實惟華陽聖聖同功千載合符㣲聖之力蜀其魚乎江陽之腴郫惟舊都丘墳巍岌拱木號呼血祀不作神何以居新廟奕奕牲牢孔碩民享其文神歆其質舊功克照大患所逖不有博雅孰躋聖匹載徳者言永厥金石大禹廟記計有功聖法天以身任道天作聖以地發祥舜生于諸馮文王生于岐周生異地而治同功乃知上天為生民挺生神聖有開必先皆非偶然者崧髙長發流播雅頌推原本始盖示萬世以不可忘也方册所載禹生石鈕古汶山郡也崇伯得有莘氏女治水行天下而生禹于此稽諸人事理或宜然因人事以騐天心其可考者禹功自汶河圖括地象曰岷山之精上為井絡帝以㑹昌神以建福太史公本紀謂岷為汶故曰汶岷山導江岷嶓既藝天生聖人發神于此而萬世之功亦起于此其可忘哉然而自汶山西山拑江􅀈巫鈐廟絶簫鼓魚菽猶為俚人之社汶以東至于石泉雖縉紳未甞言之甞求其故大抵山川夐邈代逺時移郡邑名號廢置離合而石紐故處莫適主名秦漢而下為國曰冉駹為道曰綿虒為邑曰廣柔其實一也漢靈帝析而郡之曰汶山後周又析而邑之曰汶山唐貞觀八年又析而縣之曰石泉唐以前石泉之名未立譙周陳夀皇甫謐皆指石紐為汶山之地周曰禹生于汶山廣柔之石紐其地為刳兒坪夀曰禹生汶山石紐夷人不敢牧其地自石泉之名其後唐地里志國朝職方書先儒輿地記皆以石紐歸石泉雖莫辨其故然汶山之山曰鐵豹沍水出焉汶山之山曰玉壘湔水出焉石泉之山曰石紐大禹生焉合之則一離之則散處于三邑之近無可疑者石泉始𨽻于茂國朝熈寜割𨽻于綿政和撫戎又陞而軍之禮樂文物日浸月長且謂石紐夷地置而弗論太守趙公元勲世以笑談坐鎮披諜考古将廟祀禹而疑論未釋郡士計有功版曹尹商彦多聞博雅繹究數千年事燦如目撃廟議遂決卜郡左四百舉武比倚層峰江自西来雷奔箭駐發滙于廟下如及本念徳大淵洄翔舞迤邐遶出如朝宗得途廟以門計一十有形麗勢勝神明擁㑹涓剛落成乃烹乃奏芬芳璀燦禮薦樂徹縉紳耆老手抃情激勸九叙之歌歎明徳之逺賢哉禹功于是乎大乃以圖以書以學官李繁暨尹君之文屬記于有功或曰士有一方盡一節論封廟食千里襁負無有誓命如加明刑禹功絶徳誰不闕享而闕廟之功無闕無名禹無闕由焉而不知所以為絶徳也夫使人之靈畏禍于尸祝之間則何以為禹然惟功大徳盛故稱神禹末世乃取臆地咨祈闕計河伯示圖滄水援簡茅怪幻而神之至其祠祀則巫記胼胝之云鳥耕山隂之冢漢祈開母之石晉享黄熊之厲由是觀之闕于闕王汶川之民祠禹闕汶玉石紐置而弗論無足怪者闕曰禮也者反本修古不忘其所由生越之人曰吾禹之㑹稽楚之人曰吾禹之宛委思其人寳其地使汶之人不曰吾禹之石紐是不知天降神地發闕賴也公一舉三善皆得且遐方邃古而惓惓然其在今日逺矣報上之心為何如哉宜請于朝崇載祀典以陟偉績于靈源耿休光于遐裔惟禹之神彌天地布六合于是為反本之祀繫之詞曰有汶惟山誕生帝禹汶水發源降神之所帝指其處以啟神功厥土既敷四海㑹同蠢蠢羣生茫茫萬古豈享其利而忘其故石紐山名石泉之虛近在耳目詎迷厥初禹色山融禹聲汝注長發其祥地靈常聚地秘其靈朝烟夕霏粤嵗三千公其發之乃涓乃卜乃朝乃祀報本反始此方斯址大江西来如揖如頋且路朝宗洋洋東去惟公承宣徳感化行咨詢民瘼究民之生民生于禹禹生于此廟則咫尺心兮逺矣公推是心以仁昌時以撫民夷神人是依前乎數千年其愧于斯後乎億千年其作于斯剏建有夏皇祖廟記張玠至神長存大功必報廟而祀祀而歆亘千萬載顯顯注人心目是崇是敬是興是奉斯不有主張綱維之自邪開闢之初三靈未奠五行猶汨時則洪水横流懐襄滔天民用昏墊弗協厥居惟大禹以神智承命俾乂克底平成之功迹其乗四載别九州刋木濬川導江決漢櫛風沐雨手胼足胝八年于外而後澤者道陵者藝人得平土以居六府孔修三事允治餘風遺澤至于今賴之則所以報之宜何如春秋時劉定公館于雒汭猶思禹之功徳且有㣲禹吾其魚乎之歎矧兹䕫門當四蜀川流之聚合數百源而委之沆漭汜濫又甚他所而巴岡巫嶠崔嵬盤錯壁立骨峙緜亘峻極固塞其衝奔潰洶漏之勢艱虖為力哉已而瞿唐𤓰分灔澦孤蹲千崖蕩磴兩兩却立黄流巨浸帖帖東下環數千里之地既宅既旅既蠶既粒孰知疏鑿功用之至于斯耶有唐杜少陵詩以史名寓䕫日一吟咏不忘其本若曰禹功翊造化曰禹功饒斷石曰江流思夏后之類言意諄複殆不可悉數是其感慨景仰之情發為聲音有不能以自已後之志于時者至此詎得無所懐哉嵗己酉玠被命将漕䕫門居無何復攝郡事率職之外于修廢興闕竊有意而未遑也未幾前制帥趙公以書来言夏后平水之功與天地並今江淮河漢間咸知奉祀䕫門䟽鑿之力尤艱大而廟貌獨無何以示報本之意盍亟圖之僕因考前代有少遺烈在兹土者率有祠奉顧后之丕績冒六合而導江至斯功尤顯茂迺獨無享祭之地誠大闕典于是始為剏建謀乃于江滸之白帝城得隙地十畆髙明虛曠控瞿唐而臨灔澦厥土燥壤勢面陽議以築曰宜哉則命討工役事材用既集未及作而今帥長單公寔来交郡章迺相與言是事且以營造嘱之尋以卜龜未食更嵗始得出幣僦工衆役皆作凡為殿約門及廊廡之屬合百楹乃塗乃堊乃設貌像器用從給不陋不華俾爾邦人與夫来者有以為瞻依享祀之所而其明明之徳猶足以令江神而濟舟楫也昔人論廟祀以為徳厚者流光徳薄者流卑故有萬世之功斯享萬世之祀乃今廟貌之設夫豈荒忽迂誕而莫可質信哉繼自今荐而馨香實而恭敬肩袂相屬于廟庭者雖至于無窮可也杜宇鼈靈二墳記陳臯戰國時蜀災昏墊杜宇為蜀主不能治舉荆人鼈靈治之水既平乃禪以位死皆塟于郫今郫南一里二塚對峙若丘山獨鼈靈墳𨽻净林寺寺僧夷其崇為臺觀隠士張俞懼其遂湮沒請于郡而碑之因置祠其上與杜宇岡勢相及宇之墳尤盤大民菑畬之其来逺矣皇祐壬辰春净林僧死寺籍為田許氏墾甸而鼈靈墳與寺俱化為民畆張俞聞之建言于縣尹虞曹外郎郭公公愀然動色駕而省之明日進士杜常等五十八人以狀理于庭公報曰昔日七國相血生民肝腦塗地獨杜宇亡戰爭之競有咨俞之求以拯斯民雖鼈靈成洪水之功㣲宇不立議其賢則杜宇居多載其烈則鼈靈為大二人嗣興其舜禹之業九之一焉况勤民禦災皆載祀典㣲此則古之聖賢暴于原莽而吾不之知矣于是具不可籍之議聞于郡郡嘉其請俾復其寺訪名僧以主之得景徳寺禪者垂白焉白好静退能禪寂邑人所嚮仰公于是命之因盡域二墳𨽻于寺命刻石志其事庶来者知二人有大造于西土宜與恵無窮皇祐四年九月二十四日記靈泉縣聖母堂記蘇惲靈泉邑北直嚮馳道俯僅一舎地聚落帶鎮市去市徑行越距半里拔秀衆山環列崇阜遭迴嵒嶺瞰若百雉城隅崯岑繚滙崛竦天外緜亘固䕶髙掲雲表由其峰半挺設平崗健盤壯垣方秩千歩中搆佛宮領僧刹迨百室有古褚氏聖母祠堂在焉謹按隋開皇中褚氏名曰信相自江都来本唐安郡青城縣黒水溪人也黄冠草帶幼悟佛心葛帔練裙夙叅法要先遊方外首卜此山端擇勝址芟薙芒枿科樹枯柏塵初地之位創安居之漸偃息禪梵韜祕聲味勤事大雄氏教本為空寂師表日逓月進精一無怠當時所聞見者亦未甚悉而奉之適值嵗歉田稼民傷飢饉則持龍頭小鐺散粥而飼之救拯生聚衆給千萬活病克疲咸告豐飫厥後以圎明相空俗身委化奉之者指其故地置祠塔以歸其靈俗議習傳號曰米母院俄属唐武皇㑹昌嵗削廢天下寺宇斯院與塔亦例除毁時革闕皇太中九載白丞相敏中按節右蜀首謀興建尋得法潤禪師主之仍訪遺基再蕆能事掲崇構堂毁廊廡牙閣闕室之備咸與惟新就刻舊塔石繪其遺像遂設祠焉逮咸通中悟達國師知兀由長安来觀兩蜀名地寓此僑隠亦繼住持因題為聖母院其山亦從而名之唐室下衰荐經王母兩世胙土僣朔期地靈異之應愈新于人救旱乗時灼示為霖之兆拯民布恵尤司及物之仁神變屢聞曽無曠嵗炎宋大中祥符二嵗府主密直任公中正聆其顯迹拜章上聞願錫名額未幾詔下院新瑞應之號至寳元慶厯皇祐之初亢閔時澤蜀土遘厲府主密直張公逸楊公日嚴相同文公彦博端明楊公祭畢諭將校就堂祭請置府佛廟設鐘梵焚獻以祈之匪夕而應甘㴻浃于百里之外農稼稔字蕃固秋成享大年之望洎三殿省丞潘公洞徐公汾劉公永咸出宰是邑軫民告雨来拜祠下皆獲祥應著文賦詩大誌其異邇後動越兩蜀走巴邛繇綿漢梓遂列郡縣鎮凡属愆旱奔来千里請禱于前動皆協應章章然以願從人其神化之若是與夫包山奠宅庸列聖姑之名崧岳升髙亦著啟母之祀可並駕而議其明効祠前舊刋李唐大中時朱道異譔記辭㫖㢲懦頗肆誣誕尤不可詳究觀其統載剏院時禩禱雨應祈之狀咸闕如也院僧惟膺懼其故事湮廢因集其本末請序而申之貴乎聖母之遺烈斯院之所以興盡傳于時不冺余故執筆為録其實新繁縣新建靈應廟記周良翰昔晉楚治兵子玉夢河神求瓊弁玉纓子玉弗與晉果敗楚師楚人歸咎子玉苻堅冦東南㑹稽王道子以威儀鼔吹求助鍾山之神奉以相國之號及堅北望八公山見草木皆類人形若将赴敵者頗有懼色遂以百萬之師敗于淝水河神以瓊弁玉纓敗楚師此固不足道而鍾山之神受相國之封然後助晉師吾亦少之惟我英顯武烈王自東晉以来逮于有宋功徳卓然靈異昭著鏤之金石殆不可以一二數盖助順福善不煩祈禱除邪討逆㨗若影響方黠虜憑陵中原塗炭河朔河東陕西百餘州盡為賊有兵驕乗勝欲来冦蜀者屢矣率皆及門逡巡而不敢進夫三路甲兵非不勁也山川形勢非不險也獨我四川晏然無虞且為朝廷中興根本雖一時將帥盡忠士卒用命以三路較之盖有非人力所能致者實神之威力是賴以今準古豈可與鍾山之神同日而語哉宜國家崇極封爵蜀人嚴侈廟貌以奉祠事盡誠致敬而不敢後也良翰承乏邑事且將及年一夕夢冠而法服者甲而持斧者雖在夢中意其為神君勇義侯也乃亟下氣歛神而拜之而披甲者引導指殿宇廊廡有未就處俄而寤驚駭汗遍體明日語同寮皆云神君祠宇雖因神霄廢宫然未就者十之四五豈有待耶時予方董役灌口相繼部粮益昌盖未暇也將行之夕忽迷悶委頓闔縣之人驚曰前數日神降而附語于人曰吾今所居之殿舊甞奉安玉皇縣令有意為吾改建特不肯出一言耳更數日當自知之今令如此乃知前日之言不妄于是數千百人奔走祠下相與燎香再拜而禱之曰若縣長無恙即士民盡力營建如神之意予俄頃復蘇自此邑人咸願移建乃相與卜地而未得也一日法要院僧繼文有言曰院旁有隙地為人睥睨乆矣願捨為神君廟基冀絶爭訟時衆議紛然莫知孰從神忽現于所指之地衆讙呼曰神意在此不可違也其議遂定然深溝丈餘主事者頗以為憂無何邑民三十一鄉鳴鼔結社千百為羣来助土工者源源不絶不閱月視平地増髙五尺于是富者出財壯者出力巧者出技各捨所有以答神休又有分任廟事者二十餘人或主營造或掌出納皆邑中好事者也經始于紹興四年三月落成于五年之春廣殿長廊挟以樓觀旁有翼殿後有寢堂更衣受釐咸有室處共八十五間清溝横于前大江繚于後喬木脩竹映帶左右氣象雄偉稱王者之居凡自外来莫不咨嗟歎息曰壯哉麗矣敏矣非良邑宰孰使然哉方今征役日繁賦斂百出為邑令者但知從事簿書期㑹間曽何恵愛以及民予視邑人厚顔多矣何以使人樂從勸成如此之速乎得非神之功烈昭著威靈赫然人自歡趨盖非有司所得而與也落成之日民大和㑹士女闐咽簫鼔沸天自是駿奔走執豆籩者無虛日不獨繁上之人也有士人王孝友者自成都挈其家奉三牲之祭于祠下且語人曰予有夙志本詣九曲山忽夢神君若相告戒曰吾今在繁上無勞逺去謹遵神言是以来此且神之功徳施于宗社及于生民所在有祠宇而云居于繁上豈樂斯廟之得其地而安于此耶抑亦鑒邑人奉事之勤而少留也廟成之初予適授代而去邑中士人每有書至未甞不以廟碑為請且曰邑人因公崇建此廟其何以辭耶乃為記其興建之由復作迎享送神詩三章系于其後俾繁人歌以祀焉神之来兮自帝所百靈導從兮前歌後舞駕風馬與雲車兮和鸞鏘而翠旌舉將揮斥于八極兮忽弭節乎此樂土新宫之壯麗兮聊逍遥而容與其一夀宫敞兮白玉堂奏鈞天兮酌瓊漿蕙肴蘭烝兮荐以蘋藻神歡欣兮載色載笑畀斯人兮樂康千秋萬嵗兮俾民不忘其二神之去兮我心悲乗迴風兮載靈旗電掃妖氛兮海波澄静疵癘不作兮年穀順成保我國祚兮亘千萬祀吾人報事兮有隆無替其三時紹興丙辰中秋日記神女廟記馬永卿永卿自少時讀文選髙唐等三賦輙痛憤不平曰寜有是哉且髙真去人逺矣清濁浄穢萬萬不侔必亡是理思有以闢之病未能也後得二異書㕘較之然後詳其本末今按禹穴紀異及杜先生墉城集仙録載禹導岷江至于瞿唐實為上古鬼神龍蟒之宅及禹之至䕶惜巢穴作為妖怪風沙晝暝迷失道路禹乃仰空而歎俄見神人狀類天女授禹太上先天呼召萬靈玉篆之書且使其臣狂章虞餘黄魔大醫庚辰童律為禹之助禹于是能呼吸風雷役使鬼神開山疏水無不如志禹詢于童律對曰西王母之女也受回風混合萬景錬形飛化之道館治巫山禹至山下躬徃謁謝親見神人倐忽之間變化不測或為輕雲或為霏雨或為游龍或為翔鶴既化為石又化為人千狀葱葱不可殫述禹疑之而問童律對曰上聖凝氣為真與道合體非寓胎禀化之形乃西華少隂之氣也且氣之為用彌綸天地經營動植大滿天地細入毫髮在人為人在物為物不獨化為雲雨王母之女者則有合于坤為母兊為少女之說所謂變化不測者則有合于隂陽不測妙萬物之義豈不灼灼明甚哉易之為書與莊子多有合易者隂陽之書以九六為數而南華開巻已有南鵬北鯤九萬六月之說槩可見矣又莊子所載藐姑射之神人大似今之神女是其言曰肌膚若氷雪則有合乎金行之色綽約若處子則有合乎少隂之氣遊乎四海之外則可見乎神之無方使物不疵癘而年穀熟則又見乎秋之成物故郭象注云夫神人者即今所謂聖人也斯得之矣僕因悟易之少女莊子之神人郭象之聖人今之神女其實一也僕然後知神女者有其名而無其形有其形而無其質不堕于數不囿于形無男女相出生滅法故能出有入無乍隠乍顯舉要言之乃西方皓靈七氣之中少隂之靈耳豈世俗所可窺哉且楚辭者文章之大淵藪也而屈宋為之冠故離騷獨謂之經此盖風雅之再變者宋雖小懦然亦其流亞自兩漢以下未有能繼之者今觀文選二賦比之楚辭陋矣試並讀之若奏桑濮于清廟之側非玉所作决矣故王逸裒類楚辭甚詳顧獨無此二賦自後歴代博雅之士益廣楚辭其稍有𤓰葛者皆附属籍惟此屢經前輩之目每棄不録益知其贋矣此盖兩晉之後膚淺鯫生戲弄筆研剽聞雲雨之一語妄謂神女行是雲雨于陽臺之下殊不知雲雨即神女也乃于雲雨之外别求所謂神女者其文踈謬可笑大率如此僕今更以信史質之懐襄孱主也與彊秦為鄰是時大為所困破漢中轢上庸獵巫黔拔郢都燒夷陵勢益駸駸不已于是襄王乃東徙于陳其去巫峡逺甚此亦可以為騐也且文選雜偽多矣昔齊梁小兒有偽為西漢文者東坡先生止用數語破之何况戰國之文章傑然出西漢之上豈可偽為哉噫峡之為江其異矣乎逺在中州之外而行于兩山之間其流湍駛而幽深故無灌溉之利若求之古人是盖逺遁深居之士介然自守利不交物若鮑焦務光之徒今吾儕小人迺敢浮家泛宅沒世窮年播棄穢濁日夜喧閧其罪大矣神不汝殺亦云幸也且峡既介潔清閟如此乃陸海之三神山也是宜閬苑真仙指以為離宫别館誕降爾衆之厚福故凡徃来者既濟矣當于此致謝未濟矣當于此致禱以無忘神之大徳云紹興十有七年二月永卿赴官期道出祠下既以祇謁若有神物以鬱發僕之夙心者因備述之以大闡揚神之威命明辟且為迎饗送神之詩用相祀事繫之碑末曰䕫子之國山曰巫考騐異事聞古初有龍十二騰大虛仙官適見嚴訶吁霹靂一聲龍下徂化為竒峰相與俱至今逸氣不盡除夭矯尚欲升天衢壯哉絶境天下無宜為仙聖之攸居仰惟髙真握珍符鎮治名山奠坤輿昔禹治水何勤劬按行粤至萬鬼區妖怪䕶惜紛恣睢風沙晝晦迷道途神人親御八景輿授禹丹篆之靈書文命稽首受寳圖手握造化幽明樞驅役鬼神纔斯須萬靈恐懼聴指呼巨鑿振響轟雷車回禄烈火山骨殂墾闢頑狠如泥塗岷江東去無停瀦倘非神人協禹謨襄陵正怒民其魚大功造成反清都朝遊閬苑暮蓬壺呼吸日月飲雲腴瀕視濁世嗟卑洿江臯古廟象儲胥神兮幸此留踟蹰自古膏澤常霑濡逮今疲瘵蒙昭蘇巴峡對人貌瘠臞願降豐嵗朝夕餔出入樵採無於莵客舟性命寄須㬰願賜神庥保厥軀徃来上下無憂虞日則居兮月則諸繄嚴奉兮永不渝丞相平襄侯廟記徐閎中紹興二十三年徐閎中記云缺十五字邦家恢復海宇混三分缺二十五字恤險阻缺九字宸颷電迅遂奏愷廟拓勒勲鐘鼎缺十九字丞相平襄侯姜公其人也諸葛孔明甞謂公忠勤時事思慮精審缺十九字以胡塞之要鄧伯苖賦性剛簡宜尤重許可者獨知公而深器異至若缺十八字賴風度雋偉何啻百夫之特實迺萬夫之望是宜整嚴􅆛㹯深入敵境缺十八字歸進圍襄武徐質交陣而潰拔河間狄道師洮三邑殄刺史缺二十二字其髣髴哉然勝負兵家之常自古用兵曷能常勝就其不缺二十二字㑹上邽貴聲援相接也濟爽約不前宜有段谷之敗閒鍾㑹缺三字進表缺十七字之䇿緩不及事宜為文所摧厥後㑹擁大軍長驅而入缺四字列營缺十七字壓境遂破諸葛瞻于綿竹後主趨降其降也譙周反復曲折之謀也于時廷臣缺十六字保家從其謀而甘心焉獨北地王諶忠諌莫伸痛憤自盡訖死無補向使公缺十七字謀迺身先驍銳乗城確守坐困勍敵危國復活一反掌間不足以言容貴缺十七字莫能破轉輸邈絶屢擬班師使艾直薄城二将勢分又非所利漢于此少知缺十八字人渉險㑹以二萬衆留劍閣二主儻數日不降三軍阻飢二将難以反矣缺十八字公語楊儀反旗鳴鼓若将攻敵者仲達退不敢逼于是儀得結陣而缺十九字容髮非公勝筭明敏出竒神速詎能弭患于倉卒耶抑甞謂人有云缺十九字飾取供輿馬取具室無姬媵庭無聲樂財無儲蓄食不過制常以清缺十九字者如彼故其有為者如此及㑹叛魏附公公乃隂圖克復勢誠無缺二十字蘆山圖經縣城公所築也俗號姜城遺址尚存環皆出峭缺一字錯缺二十字為國長慮殆非小補令邑戸六千夷漢混居民風淳質力穡敦本缺二十字明時樂國也萬世固圉之利公之盛徳逺矣哉土人懐公缺二十一字威靈不冺莫不畏而仰之閎中參究載籍缺二字昭烈帝帝系出缺二十字昭烈即位武擔為漢中王志在紹髙光四百年之基理宜稱漢缺二十字夀蜀人且甞事蜀意憚魏晉君子薄之皇朝司馬温公資治通鑑即稱漢以表其實復讀當時楊戲所缺二十字丞相平襄侯掲之又叙公事漢始末刻之堅珉屬以詠意或歌缺一十字奕奕姜姓系宗四嶽尚父興周神謀超卓韜略缺十字危探虎窟身不暇顧黠羌驕侮談笑蕩平連犍缺十字籌非不精愛莫助之謂公黷武曽不爾思營犍抗缺九字允南醇懦識闇事機一唱朋從騰書納璽譙周缺十字成功信天非人能勝運儻荐興公儔冠鄧純誠終始缺八字民心載舒神休是憑瑣才臨政荷神孚祐爰紀豐功此碑泐壊已不可讀其文字可見者僅如此愚恐其愈久將併今可見者而失之因録于左重修先主廟記任淵智力之不勝義也乆矣昔自英雄豪傑乗時崛起有能仗義而行偉然正大指麾號令天下從之雖其不幸不克大有所成就于當時而風烈之餘猶足以聳動後世歴千百載尊仰而懐思之有不能自已者非以義勝故與東漢之季王室陵夷曹氏怙姦賊之資以擅中原孫氏席强大之勢以并江左皆矜尚智力求所非望非有志于王室也海内之士劫于威制雖俛首聴從而心不與之至後世利害不相及則排貶譏笑未始少容惟蜀先主昭烈帝以宗胄之英負非常之志崎嶇奔走經理四方最後伐劉璋遂有蜀漢盖将憑藉髙祖興王之地建立本基然後列兵東向誅有罪而弔遺民以紹復漢家大業其理順其辭直非若孫曹氏之自為謀也當是時丞相忠武諸葛侯實左右之人品意象髙逺英特駸駸乎伊吕之間應變機權本于道徳内脩綜核之政外舉節制之師欲以攘除奸凶混一區宇不負其君付託之意可謂社稷臣矣彼其君臣仗義而行正大如此是以海内之士推與而誠服之舉無異論雖厄于運數屈其逺圖而後世有讀其遺書過其陵廟者未甞不咨嗟流涕尊仰而懐思之也夫義之所在俯仰無愧天地且將直之見信于人亦其理之然哉成都之南三里所丘阜巋然曰惠陵者實昭烈弓劍所藏之地有廟在其東所從来逺矣大殿南向昭烈弁冕臨之東夾室以祔後主而西偏少南又有别廟忠武侯在焉老柏參天氣象甚古詩人甞為賦之廟乆不治風雨摧剥殿廡門牆率皆頺圯破缺像設僅存至或露處紹興二十有八年秋九月蜀當謀帥上親擇廷臣文武兼資可屬方面者得中書舎人王公命以龍圖閣待制制置四川使出鎮成都臨遣甚寵粤明年夏四月公始至用故事謁諸祠奠獻至此顧瞻太息曰有大功徳于蜀人宜莫若昭烈忠武廟貌乃爾亦獨何心亟命有司繕治之鳩工庀材咸有程度以是嵗十月己巳經始落成于明年三月己丑雖號為因舊起費實再造而一新之棟宇宏敞丹雘鮮明堅壯精密足以經乆祠與恵陵皆護以垣墉限禁樵牧築室忠武祠北明潔幽邃有事于神者得以休焉盖舊所基也用工萬一千六百七十有八為錢無慮二百萬木章竹箇取于數百歩商旅之征勞與費民不知焉既成命淵記之淵懼陋不克稱固辭公不許乃冒昧書其事盖甞妄論王霸之說以謂義近王智力近霸竊觀昭烈忠武之所為非深于王道未易明其心于千載上也今公之所學宏逺髙明而尤卓然一以宗王為本甞過公孫述廟笑唾不顧至劉蜀君臣嚴事之如此意固有在非特以欽崇秩祀為牧守之所當先也鎮蜀未幾威徳流聞民夷寜謐視忠武不愧異時志得道行其助恢漢業興三代之禮樂不難矣公名剛中鄱陽人開豁邁徃而克勤庶事綜練周密治蜀之政百廢具舉不獨新此廟之可書也紹興三十年記張飛廟記安剛中漢自建安以来皇綱齊弛神鼎震覆姦雄觀釁實生豕心本初孟徳之徒磨牙厲吻血視生靈期于吞噬不顧遺臭𤣥徳忼慨為國志在援拯一時豪傑徇義蜂起相與提挈共成大事諸葛關張實為之最凛冽威風萬夫之雄荆州之役群盗突来公為後拒畢力盡死以抗羣醜奮髯張目横戈一叱蛇豕異類褫魄逃遯虞淵之日復耀西南繄公之功迄今千載英靈之氣森聳如在廟食百世在禮固宜樂温之山下瞰大江公之神爽實是寓焉自古迄今長載祀典舟行上下與兹士民奔走奉事敢不䖍至九穀嘉生連被原隰舸楫徃返安流無恙隂相之功在國與民天朝累封進爵為王惟是廟宇興建嵗乆行廊爛頽徃来咨嗟力莫能振郡守李公向者趨朝祗謁祠下再拜祈禱厥應如響至郡未幾首議修繕自捐金帛衆趨成之功費雖多了不病民徹去卑陋増飾輪奐開展地基比舊加倍是役也議興于庚午之冬落成于辛未之春惟公既有以利其民矣又有以奉其神民和神安福禄来宜行将以是賀公剛中忝吏是役知之為詳敢具以記白帝廟辯誣記張珖漢室不競王莽擅朝夤縁肺腑遂盗弄神器天人之所不與凡一世之豪傑有志天下者皆得起而誅之公孫帝盖欲誅莽之一人也於漢何罪而近年有蒙帝以僭叛之名者過車不式祠禮不講邦人奔走禘甞事既踰千載矣聞而醜之珖敬為将書表正其事謹按更始二年公孫帝自立為蜀王明年夏四月稱帝改元龍興是嵗漢世祖以蕭王即位鄗南改元建武是為光武皇帝方豪傑羣起時孰不欲八紘身都萬乗而廢興有命神器非人力可争要始終公孫帝初不得罪于漢而盡有益州之地子養一方者十有三年于蜀不得為無功臨陣隕命與其國俱為存亡以誓死不降一念能血食千祀視古神名無所多讓然則其志可謂賢矣光武甞賜公孫皇帝書且曰君非吾賊臣亂子則蒙帝以僣亂之名者其失于考按甚矣珖敬以漢法𨽻大書其榜曰公孫皇帝之祠且敬叙其夲末如右方刻之廟中以一洗其誣帝英爽如在尚其臨鑒此言帝諱述字子陽號成家世呼為白帝廟云乾道七年中秋日晉人張珖書孝感廟記鄭少㣲按今漢州徳陽縣西北四十里有鎮東漢姜詩故宅在焉故號姜詩里治平中知綿竹縣事郭震者謂詩行甚髙宜諱其名白部刺史易之鎮遂號孝泉然廟猶因俗為呼于是開州司理㕘軍白夀朋與鄉之士民列于縣曰姜詩夫婦事跡最詳于漢史所謂舎側湧泉至今不絶民賴灌溉或遇旱厲禱焉輙應其厚俗利人之功居多廟額獨未䝉賜敢請縣乃上之有㫖賜名孝感命至之日稚耋夾塗載舞踴躍争觀為人子若夫者咸欲詩之行在其身也為人女若婦者咸欲龎氏之行在其身也為人父母若舅姑者咸願有子如詩有女有婦如龎氏也則又相與詫于他州之民曰吾鄉雖僻幽而姜詩夫婦乃吾東家子也爾州曽有是耶方且侈上之賜以求稱厥名而故祠庳狭面勢不正像設不嚴靈不妥安瞻祈無所于是通直郎致事張績以義倡焉相其方位而辦奠之凢為屋五十楹益浚其泉流擇旁寺僧之潔勤者莅之𢎞奠肅密千載陳迹一朝如新甚盛觀也廟成七年而紀述尚缺通直公子承議郎上行委少㣲書焉謂變風之際距先王未乆婦人女子茍有片善可稱者遂見美于詩見取于孔子如共姜許穆夫人衛女皆貴者之妻不過以禮義自待不嫁不歸而巳其植節挺操之難感格神明之異實後世賤夫匹婦未肯逺避之也范曄後漢書列女傳十有七而出于蜀者至四人一出南鄭一出廣漢二出犍為如程文矩妻于其子直以人情為之耳盛徳妻于其夫叔先雄于其父殺身成仁固美矣要之不得已而然者若龎氏者事尤較著盖未始行乎危難惟雍容禮法之中遂能感無知之魚革難化之盗使貴而姬姜賤而妾媵皆可黽勉以庶幾萬一讀漢書者未有不聳然而嘆而况臨其魚躍之淵與盗過之里也哉然則龎氏之遇亦不為不幸也通直公有二子上行中行相繼登第事親孝謹清議許其賢餘皆有諸昆之風年今七十餘銀章朱紱偕其夫人板輿徃来二子間鄉人榮之推其所自盖發潜扶教之影響云南康郡王廟記張縯郡邑通祀有功徳于民者盖古制也秦時蜀守氷鑿離堆辟沬水之害溉田以倍萬計相與尸而祝之者今環蜀境漢興守文翁飭厲諸生于學蜀地學京師者比齊魯其後學校官為石室以祀翁至欲周公孔子配秦守以功恵漢守以徳教光明俊偉世傳誦之自是以来凡守之賢者蜀人必以建祠或繪其像天下名鎮未是有也其去蜀逺而地勝受蜀之寄必其要領大人所可倚重者丞相御史徃徃不盡拘以文法政令能専膏澤可下而蜀之人亦以所事于君師者事之安其令而不違故雖去而敬其奉甞猶不敢忘然則蜀視天下其亦可謂敦厚而易至矣唐制用節度使治蜀前後名人相望韋南康郡王在治最乆徳恵最著今蜀人之祠王者秩于土神家有其像而府城内外獨無専祠于禮為不稱今龍圖閣直學士四川制置使内相胡公鎮蜀之明年惟蜀諸路鹽之額浮茶之賦重與夫䕫峡科買金銀之弊垂六十年民力重敝吏隂拱熟視莫一措手公悉審核精考以聞凡所以為民之瘼者不一而足公討理脉絡剥求根株盡變乃止初青羌奴結之未就順也公時方入境増調西兵指授方略扼其首尾制不得肆至是懾服面縛塞下環蜀地數萬里安于静簡雨暘順序年穀屢豐衆政既舉迺講舊典之缺度故宫宇之隙地新庀王祠門屋耽耽廣殿渠渠修廊環擁便坐後列經始于二月之庚子告成于十二月之庚戌土木陶甓圬墁之工凡九千六百五十四費一出于官而民不與知蜀人戴公之徳猶昔之徳王也王祠既建民益忭舞縯以部中守吏入受約束于公府下公命縯記其事辭不獲請縯乃復考王之終始而復于公曰王治蜀二十一年當貞元姑息猜忌之間外能折吐蕃之鴟張以功自結于朝中能撫柔其民二嵗一復使蜀土晏然皆樂其生王之徳于蜀盖如此然王之始進也以隴州假守斬朱泚之使至其末也露章斥王叔文之姦建請憲臣監國朝廷為之増氣大節凛凛皎若日月豈獨書治蜀之功哉且今之蜀猶昔之蜀也王用蜀兵破吐蕃四十八萬衆俘其驍酋靡不如志雖諸葛孔明南定之功無以尚之而往者數嵗間黎雅小夷陸梁山谷吾將士乃巽懦不武乆無尺寸功今始聞其稽顙屈服然則王之折衝英略著于簡䇿之舊者其可不崇大之以昭示来葉公方將奮張王靈洒掃宇縣以成陛下復古之烈宜于王眷然興懐而不置也語未既衆皆起曰子之言然盍遂書之縯以其事敬書于石王諱臯字城武唐史有傳淳熈五年十一月壬申記縻棗堰劉公祠堂記何渉益居三蜀中地廣衍疏衆流以沃民田以塹都邑由是得川名故時汶江跳波刮午門南東注治有子城而無郛郭唐丞相髙公駢之作牧也懲蠻詔張吻擇腴而噬且謂走集宜險因度髙城其外周數十里開包槖以容居民築堤鄣江號縻棗堰折湍勢滙于新城北以休養生聚䕶此土不然句五代遘屯靡皇西略兩僣相繼弗恤弗備皇朝乾徳四載秋七月西山積霖江水騰漲拂鬱暴怒潰堰蹙西閶樓址以入排故道漫漭兩壖汹汹趨下墊廬舎㕓閈浩乎若尾閭横决傍無涯漘思次之旌與交易之質劑離聮渾沄雜百物資儲蔽波而逝獨用畫故民得不為魚開寳改號之初天子輟端明殿學士尚書兵部侍郎劉公熈古帥州始大修是堰約去訖民害招置防河健卒列營便地伺壊隙輙補以故連絶水虞比屋蒙仁多繪像而拜思之與乖崖等自時厥後綿祀八十功忽而嵗經事乆而日遺言言巨防朘薙隤毁升髙遐望江之端頫城大齧如餒鷙鳥恬而勿圖可為駭歎慶厯己酉朝議曩霄歸嘆西邊粗定回顧井絡宜得良帥遂自隴右加今知府文公樞直改轅而来俾厥飢羸使安業乳哺公力勤才敏不以髙簡自飾視劇穴若庖丁解牛匠石運斤幽隂阬蹊燭露夷易巨細疏密莫不曲到一日甞從僚吏詣所謂縻棗堰者左右臨顧推本利害而曰非中山公成都其瀦乎昔者勤勞謂何後者解㢮謂何将利近易知害逺難究哉以吾為尹于兹誠不可遺西人他日戒懼由是大營工犍益庳附薄為數十百年計盤據廣袤罔分隖屬湯湯洪波演漾徐轉堰脊舊有神宇榜曰龍堂俚而且誣義不足訓公以為思人愛樹國風所由著美今中山之徳入人深如是而廟貌弗建實前所闕因易新制厰劉公祠堂其上為里禜水旱報豐穰之所矧自經始公發之既作公巡之已成公落之可謂恵訓不倦功施于民君子矣越踰月渉承檄至府下公具道首尾仍命縷其事將金石刻渉按祭法能禦大菑則祀若劉公者築堰以除民害其禦大菑者與春秋常事不書非常書公増修兹為無窮利其非常者與衆皆曰然遂列言以獻慶厯六年記縻棗堰記楊甲上之淳熈二年吴郡范公以鈇鉞鎮蜀仁行如春威行如秋休養生息人用以寜越明年六月築亭于縻棗堰下雲汀烟渚競秀于前古木脩篁左右環峙相䕃森森亘數十里幽曠清逺真益州之勝槩也又親書扁榜掲之顔間遒勁絶塵得古人用筆意藻繪不加而勝益竒矣又四年四月公始與客集于亭上命其諸生楊甲為之記甲詣轅門上謁以辭不獲退伏念蜀土肥衍由引江溉焉有如波流湍悍則囓渚厓穡事昏墊民且不奠居縻棗堰者殺湍悍之巨防也夷考厥初雖肇于唐髙駢然陴陋易圯不足以陻洪源折逆流逮隆崇基以灑沈澹災引注灌溉膏我粱稻而無汜濫決溢者宋端明殿學士劉公熈古之力也自開寳以迄于今踰二百年而沃野之利溥矣享其利而忘其功不可也斯亭之作無乃章劉公之懿而起蜀人無窮之意乎盖公之政以恵利斯民為急方其弭節奏减蜀之酒課四十八萬緡罷糴關中亦七十六萬斛公所為若是故視有功于民者欣然之色發越眉宇其惓惓于劉宜也甲承命書之使後之登覽者不獨有㣲禹之歎而敬公章善予能之意焉公名成大號石湖居士道徳文章震撼九牧甞使絶域有功矣集于亭之月上詔来錫公命加敷文閣直學士召赴行在所其治蜀之績可知也忠節廟記李騊曽子居武城冦至則去冦退則反子思居衛則曰如伋去君誰與守二子所為不同而孟子以為曽子子思同道豈非曽子之所去子思之所守者耶余觀夏公之死誠有得于子思之守也方王室之亂朝廷紀綱蕩然藩臣跋扈而長蛇封豕强者輙勝天下之人奪氣喪胆卒無豪傑之士慨然特立不待文王而後興者公于此時乃能嬰孤城提弱卒與孟知祥董璋争一日之勝而奮不顧身死之為當時所難而公能行之何者方董孟二蜀連横拒命負固猖獗攻克遂閬稱兵之初衆號十萬旌旗延亘直薄武信公自忠武召還繼鎮此土適蜀兵次明月池而公以騎卒二千勢不相軋乃堅壁深池坐困强敵始自戊寅迄于己巳蜀兵以洞室穴城自夕達旦公亦以驍勁力守曽不少衂不幸食盡勢窮義不茍生眥裂血面竟以死謝方是之時邛雅資眉黎茂刺史請命于蜀不啻奴𨽻而康文通輩亦束手趨成都且語知祥以夏公以死自守必無降意則公大節固已有素非偶然者然而世之議者乃列公為死事而不得與死節者比此尤可歎方王彦章之守中都竟為夏公所擒而死裴約之見殺劉仁贍之病卒皆未有卓然竒節不為敵人所屈如夏公者死節死事何自而分豈不以夏公去梁奔晉為公之疵而不知公之去就亦自有見觀公之戰單廷珪元行欽决莊宗之圍挫王彦章之勇河陽之恵政武信之遺烈至于設庠序以闡文教營雉堞以講武事深沈幾略静以制勝意其忠義自将非若庸人武夫死于無名者昔者張巡之守睢陽勢窮備竭竟詬賊而終使夏公不幸有如張巡彼肯揺尾乞憐為齷齪茍全者耶茍援兵繼来孤壘堅守可以振揚北師鞭撻堅冦二虜之首坐致麾下将見公之功名自此輝赫非特一死而已以其所已為觀其所未為則公之大槩不論可知今夫世之人臨小利害僅若毫髮至有俯仰詞色以為去就况公之守土效死勿去與子思之居衛節守無異而議者乃以死事名之果信然與騊被命出守是邦恭謁祠下痛公之大節既不為秉筆者所知而百載之後復未有顯號以揚公之美請之于朝䝉賜旌忠廟號舊惟郡圃祠堂卑隘湫陋不足以仰副朝廷追顯之意遂議更置度地于東城之隅凡板幹柱礎瓴甓垣墉不取諸民而悉出給于官曽未閱時而殿宇凛然亦以大公之威而竦邦人之視因備述公守土始末且敷揚朝廷所以賜號之意刻之堅珉庶幾可以為公無窮之榮而攄百載湮沒之憤使邦人每過祠下輙曰此夏公之祠也忠義之事吾曹可不勉乎夏公名魯竒字邦傑其始終出處詳之史册此不復書文翁祠堂記宋祁蜀之廟食千五百年不絶者秦李公氷漢文公翁兩祠而已氷為蜀鑿離堆逐悍水以溉民田溉所常及無旱年西人徳之因言氷身與水怪鬬不勝死自是江無暴流蛟蜃怖藏人恬以生故侈大房殿嵗擊羊豕雉魚伐鼓笑籥傾數十州之人人得侍祠奔走鼓舞以娱恱神祝已傳嘏而後敢安公之治蜀開學校以詩書教人澡刷故俗長長少少尊尊親親百姓順賴其後司馬相如王褒揚雄以文章倡張寛以博聞顯莊遵李仲元以有道稱何武入為三公漢家號令典章赫然與三代等蜀有儒自翁始班固言之既詳矣初公為禮殿以舎孔子及七十二子之像殿右廡作石室舎公像于中晚漢學焚有守曰髙䀢能興完之後人又作䀢像進偶公室嵗時長吏率掾属諸生奉籩豆饔醪薦于前䖍跽謹潔一再奠而退辭無不敬信焉氷以功翁以徳功易見徳難知故祠雖偕而優狭異焉嘉祐二年予知益州徃欵公祠至則區位湫湢埃蝕垢蒙不稱所聞大懼禮益懈忽神弗臨享其明年乃占學宫之西攻位鳩工弗亟弗遲作堂三檻張左右序及獻廡大抵若干間布尋以度堂累常以度庭䟽忩以快顯壯闔以嚴閉采有青丹陛級夷瓦密棟强若棘若飛乃肖公像于宁間繪相如等于東西壁本古學之復莫若䀢本今學之盛莫若古樞密直學士蔣公堂故繪二公于宧漏皆配祠焉于是擇日告成于神揖而升簠斝果酒脯脩紛羅而有容可以造䖍趨而降罍鐏巾尊庭燎並施而不慁可以盡儀相者循循任者舒舒禮生于嚴廣靈妥于閒寂故也噫自公以来蜀之人自視若鄒魯宋興名臣巨公踵相逮于朝先帝時巨盗再作亂弄庫兵争劍閣是時蜀豪英無一汙賊者群頑愁窘不容喙而滅非人知忠家知孝使然耶所使然者不自公與傳曰非此族也不在祀典公在之矣則是祠之作願自余而古無俾外息云祠之興同尚之賢則轉運使趙抃及提㸃刑獄使者凡三人賢輔之勤自通判軍州事祝諮以降六人營董之勞自兵馬都監毛永保而下二人咸畫像于西廂列官里于石隂銘曰公二千石兮守大邦冠峩峩兮紱斯皇出有瑞節兮車騎羅石室孔卑兮人謂何新堂翼翼兮耽耽庭廣直兮序巖巖吏奉神兮不譁神来此徙兮此其家儼羣賢兮並陳公所教兮如其仁庖魚挺兮爼肉鮮神来享兮憺宛延公教在人兮無有頗蜀賢不乏兮才日多俗祥順兮孝慈公祀百世兮庸可知治平四年記學射山仙祠記文同龍圖閣直學士趙公抃治平二年夏四月被詔守蜀明年春以上已来遊學射山同民樂也故事有張栢子者甞居此學道以是日成得上帝詔駕赤文於莬薾雲衢翀天闕以去爾後凡其時兩蜀之人如以戒令約不赴而有所誅責者奔走㑹其上詣通真觀禱其神從道士受秘籙以歸一年禍福率指此曰惰與恭之所招致也自昔語如此人益起信逮今逺近以期而至者愈無缺數成都燕集用一春為常三日不脩已云逺甚然各有定處惟此山之㑹最極盛矣太守與其屬候城以出鐘鼓旗斾綿二十里無少缺都人士女被珠貝服繒錦藻繢嚴麗映照原埜浩如翻江華如凝霞上下立列窮極繁麗倘佯徙倚直暮而入公既至嘉遊人之還然復愛其地距城不一舎而孤嶺横出夷陸景氣殊曠絶但謂宫室獨與物不比稱明日召知縣事李君弼賢語之曰此𨽻治下載譜籍實號勝處而摹矩制量諸不如所說奈何議者不咎将属之于守宰與予與君其欲對人不愧中在謀其完矣遂授之宜所以當然者君曰諾公所命弼賢能為之乃調匠度材悉以良法不煩公不傷私未逾時而已云事事矣為三清殿為張先生祠堂為道宫齋館為燕宇便室與凡所以可為之屋者一一無不有亡慮三十楹開咍延連輝顯華昈兀于雲際動于林表誠棲真秘厦而合宴之佳觀也自是日有来者嗟頌顧瞩聚吻而談曰此地不知化為榛墟者凡幾年一日為賢者所經慮芟舊而掲新之詎偶然耶豈神靈所居不可廢待其人而後俾興之耶不然何歴嵗滋乆而無一有所問者耶盍延其傳以附于地志宜矣公因使文同之為紀其桷四年記郫縣漢大司空何公祠堂記侯溥君子治亦仁亂亦仁治亂殊時而君子之仁一也孔子曰殷有三仁焉其以異于迹而同于心乎㣲子之去無以異乎箕子之留而囚辱也箕子之囚辱無以異乎比干之諌而剖剔也先王廟貌去則祀否則絶㣲子不敢留先王大法生則傳否則亡箕子不敢死先王忠義死則得否則喪比干不敢生各有當然耳漢徳中缺而大盗作方作之時蜀郡有三仁焉生焉而仁其惟揚子雲乎死焉而仁其惟何君公乎子雲于漢為給事黄門三世不徙官其受禄也輕其任事也㣲一日遭新莽之變而責子雲以死國是不知道者也詩曰既明且哲以保其身其子雲之謂乎君公起諸生而位三公爵通侯主在與在主亡與亡固其職矣姦憝搆誣卒以捐生詩云之死矢靡它之死矢靡慝其君公之謂乎子雲不死而太𤣥法言垂之萬世猶箕子之有洪範也君公不生而髙名大節千古凛凛猶比干之諌而死也使子雲有君公之位而君公居子雲之地則亦彼死而此生矣生者以文傳而死者以忠傳文可日見忠随世異是以子雲之詞盛于蜀而君公獨未聞焉君公葬于郫綿東漢閱劉蜀歴二晉以至于唐至于五代至于今盖亦乆矣宅兆四周化為畦塍貧夫力耕殆至穿夷所賴以知者特二石柱爾知府大資政趙公聞之惻然曰君公之忠可以磨激萬祀今也食不得以血于廟基不得以鬛于田殆非所以揚厲名教乃籲有司移告于郫俾治厥封俾建厥祠于是著作佐郎趙濬以縣令實職其事先是嘉祐中邑儒何昌禹甞憤居民耰此墓之四周而末如之何因其賣之也而市之至是其姪邁獻其地三百歩有進士某某倡邑之學者復市二百歩以獻昔墓且毁今築以修昔廟未建今宇以祠乃礲石柱鑱識年月乃植嘉木表立畦畛事既集大資政命溥為之記溥伏觀古之君子立身行已太上立天下之所不能立行天下之所不能行其次立而所難立行而所難行其次立所當立而行所當行如君公者盖竊以為得其上焉者矣封其墓建其祠其誰曰不然熈寜六年記范文正公祠堂記家安國公甞曰周漢之興天下為福為夀數百年當時致君者功可知矣周漢之衰天下為血為肉數百年當時致君者罪可知矣考公之時朝廷致君之人喜功畏罪者尤多惟公之望節若南山貴名之起掲如日月亘諸夏之廣盡九夷之陋凡有舌者皆恥不談希文何耶好善優于天下而巳矣善人天地之紀也政教之本也其所以優于天下者能思天下之所不思能為天下之所不為先天下之憂而憂後天下之樂而樂也然知為可憂則先王之澤無不備于世矣知為可樂則一夫之生無不獲其所矣公之憂如是而竟無以解其憂公之樂如是而竟不得享其樂豈成功則天與公疏上壽儀以正君道諌楊太妃不可稱制以立母儀述張華事西晉以諷宰相此天下所不能思也公㕘大政首請天下興學取士先徳行不専文詞减任子以除冗官此天下所不能為也上百官圖以任人材舉縣令擇郡守以固邦本保直臣斥佞人以明國聴復游散去冗僣以厚民力此天下之憂而公先之也西民禍兵公以龍圖閣直學士帥延慶横山靈武勢如腐槁朝廷乃以邠州管内觀察使授公公曰漢御史出案二千石唐御史節度使以軍禮見本朝學士丞郎出臨戎閫節度諸將望風禀律皆由朝廷之重也居内朝近侍之職有彌縫闕失之道若貪厚禄換此外帥體當承迎朝廷指蹤無復議論廟筭得失矣况西華之地知有龍圖老子不知有太尉也竟辭元昊以書窺伺朝廷公惡其僣號斥不為奏自答其說諭以逆順禍福之理元昊卒服公言稱臣請和此國强民息天下知其樂也然則所謂優于天下者數十百年以來非公而能之乎夫人臣之善莫大於興禮樂世有不得其門而入雖房杜之美其如不能何庠序者禮樂之門也得其門知其文矣知其文達其情矣情文備則致君挈國之功言不下帶而禮化行如神矣吾宋聖治迨慶厯僅百年太平之效以文致實景徳祥符之風不減三代而功成治定未暇制作天下之人望禮樂之門不得而入公闢其門使天下由之雍泮之水洗天下之心後進之君子先進之野人㕘軌結轍可以論述制作者與時輩出然考積徳之年天實有所興也成都學宫西南觀教之地二漢以降非善人之迹不存近世宏堂列像迨逾百人皆所遵徳景行熈寜初公仲子丞相純仁漕蜀西南之人始請公像圖之經史閣西廡諸生嵗時謁拜于前以筵戺未稱愧甚乆元祐戊辰寳文閣直學士李公尹蜀誠于應物樂于為善凡可以成法者皆欲舉之客有告曰蜀有學自文翁始本朝郡邑有學自范文正公始天下之為烈者先王之所不遺法施于民者世主之所必報不遺之所以顯仁必報之所以立義事有惻然之仁孑然之義下及于蟲魚草木雖曠代異古且猶不忘况赫然耳目之前明徳輔世及于士民乎願正公祠使天下為善者勸李公樂其請命工成之于禮殿之東與石室對峙焉客喜而歌曰岷山之靈㑹公之英千嵗之聲非雷非霆道徳之澤以保我後生明哲之誠禮義之經百世之廟昭乎日星教化之功地平而天成張忠定公祠堂記楊天恵故贈尚書左僕射濮陽張公為政于蜀乆矣然蜀人奉事如新行臺畏愛如隔信宿盖由今崇寜之乙丑距前淳化之甲午逆數甲子巳一百一十有三年維是城闕之衣冠與市區之翁媪凡幾換易雖其當時駕竹小兒常及公行奉折轅車者亦已繄滅飄為煨塵至于晚年一二遺子弱孫亦復衰落跂跂向盡然後生孺子嵗時念公乃如公初辦嚴欲離軍府時事至比其大父與髙曽行禮意勤渠反更過之此非人情榮古上鬼喜以所聞為勝不覿為神抑亦公之盛徳有所膠固令人不可懈于心故自公在事吏民固已竊圖容表共祠于家飲食必祝蘄無弃我然而比公去治歴年引乆乃未有築宇爼豆之者及樞密直學士公始為廟室附祀典如典禮而龍圖閣學士劉公又從而潔完之它事益光已而星霜流易木石老憊月支嵗拄危就傾仆于是今大尹前戸部尚書虞公過而怪焉曰公蜀召奭也奈何乎忘之言未既有號于衆者曰信也後之矣宜乎公以我為忘也我則非夫其又奚言旦日則相與頓首伏府門下因鈴史具言所以慙負狀願假期日自効虞公遣吏勞苦罷之亟下令華陽如其請且以知縣事李君孟侠董匠事凡為屋七十楹度堂十几竭作十旬百堵用成寢宫閟清牆戸鮮整氣色明喜靈觀忽還又以虞公之徳為與公合也輙繪生祠而置堂中央并取同時部使者一二大人像離列其次于是東蜀楊某聞而竊喜曰甚矣蜀人之愛張公也其好語故事者徃徃旁掇茫昧為神異之傳學士大夫多疑之故弗論特論公始所以平治亂紛終所以化美風俗大抵氣决嚴重如汲黯而不强塞拊循安利如倪寛而不需懦操制英發如趙廣漢而不輕急治體綿密如召信臣而不寒儉故内脩刑政外靖羌夷皆有度程不失尺寸至米鹽估直燕游在所不講若紀律不可輙易昔黄霸居潁川盖八年功乃成公鎮西南凡七嵗治益顯然霸㣲縁飾為竒怪辭畔異路鳳凰神爵疑與上計之奏鶡雀之謬無以異乃公所為則無有是獨就法理為乆逺膏澤所沛慊足後人嗚呼所謂盛徳必有世祀非公之謂耶故論之以告遺民且為迎神詩曲授巫覡俾歌舞焉而并刻之詩曰若有人兮濮上告外趣駕兮焉徃朝嵩洛兮蓐食晡咸柰兮共張蹇颷飛兮電掣即參井兮一方坌劒扉兮俄盖呵力丁兮扶轍倚鹿頭兮徬徨顧其下兮餘鄉水油油兮雲委天與地沓兮耕桑靈之集兮安止休後乗兮山趾父老羅拜兮勤歸問何濶兮音㫖歩空谷兮新宫仰桂楣兮叢叢睇垣廡兮四繚紛采飾兮青紅靈顔愉兮康樂御圓方兮綺錯進巴歌兮歈舞神已汰兮不惡西玉壘兮㣲冥臨岷水兮不驚南靈關兮窈眇與雪山兮為扃靈之懽兮澹蕩更千秋兮一餉決祥液兮天門浸吾人兮泱漭謂君公兮良勞起我壓兮崇朝公行歸兮俯視此赤白兮中霄張忠定公祠堂記王剛中謹按禮經曰有功徳于民則祀之又曰盛徳至善民之不能㤀信哉是言也藝祖受命四方僣叛以次削平乾徳中一舉下蜀首命㕘政吕公餘慶知成都越三十餘年再至率成考績其為治大抵以嚴猛奮厲制其暴以精明果斷摘其姦以公平信義善其俗訟至于庭據案一決悉中其隠百姓驚歎以為神明而不敢犯及受代而去密令寫真封以授僧希白戒之曰後十年即可開及期視之公適化去而訃至矣于是蜀人慟哭罷市置公畫像于天慶觀之仙遊閣建大齋㑹事之如生嵗嵗不絶迄嘉祐已亥府帥侍讀王公素始大建祠于府治之東落成之日人無㓜艾争捧牢酒或喜或泣列拜于庭雖周人之思召公襄人之思羊叔子無以加焉既又取公治蜀斷語可為後世法凡百三十首圖于壁嗚呼公之治可謂有功徳于蜀人而蜀人懐公徳善亦可謂不忘者矣剛中猥以庸陋被命帥蜀兼治成都距公又百六十餘年遐想風績卓乎莫及甞躬奠祠下徘徊周覽惜其歴嵗滋多堂宇且弊乃命即其榱椽梁柱之撓弱而不支者瓴甓堦礎之缺斷而不承者髙甍隆棟風雨之所飄剥者長廊巨壁丹青之已漫滅者悉舉而更新之仍于祠後増接兩廊建堂三間築垣墉以周之而稍植花木于堂北以為士大夫謁祠遊息之所且以稱邦人嚴奉之意繼自今以後若時加修飭俾勿壊則為政者有所矜式而吏民亦恱服而易治是真有補于風教者其可不書以告後之人華陽趙侯祠堂記楊天惠吾里有仁焉銅山趙侯純祐名申錫本故家子有美才數試吏以能聞于人繇州縣三陟奉議郎知華陽縣華陽𨽻成都其治直府城中央戸版夥繁訟獄紛委固倍餘邑又與尹廷四五行臺纚連錯峙勢相關制難于專達趙侯獨富風力敏功緒遇聱認事尤喜為之縣故有沙坎堰不知起于何人凡溉田三萬七百九十畆頗沃美然嵗月猥深官不時省堰寖埋缺江流亦遷去田因以廢夷在草間雖世業者尚棄弗頋而浮客尤輕亡徙不可留以故公租嵗閣一千餘緡省賦嵗閣四百餘緡而私獲之闕在嵗侯至則喟曰曩輸入而今不入曩穫美而今無餘豈終不可為耶為而新之豈不在我由是訪遺迹按故道㕘校圖録訂以耆舊遂相地宜築堤故處髙二十五尺長四百四十尺其址之濶如髙之數用木五百章揵竹二萬箇役夫五萬指不浃旬功告就水即赴溝支分𣲖别油油宛宛釃灌如初時願復故業者願就新㕓者挟牘自言惟恐人先銍耒交起塍壠飭治土膏和美秔稻奮張于是草莱畢溉而洫有賸流人曰是非水泉之利也侯實利我賦租迄入而私有衍藏人曰是非田租之賜也侯實賜我乃即堰側搆新堂乃圖侯像于其中曰使世世子孫無侯忘也間走人過余求為之記余觀魏史起論西門豹不能美鄴田為不仁不知引漳水為不智豹賢令也其治鄴使人不敢欺當時無及焉者亶以一不圖之䝉不仁不智之名後世不以為過及起繼之卒能化舄鹵生稻粱為鄴人所歌誠賢于豹逺甚今侯風力如是功緒如是假令與豹易地與起並時吾知河内之績不在起在侯無疑也非直賢于豹而已頃者侯治㕔廡得斷碑壁下盖前令趙世長種栁詩也其自叙甞從乖崖行栁安轡昇僊橋上随而觀者數千人乖崖號曰此趙公手植也宜呼曰趙公栁人咸應曰然侯讀之及半忽驚寤髣髴其疇昔所為遽拓本示余且言當復種栁以竟趙公故事然侯方從辟書佐漕幕栁之種否未可知余欲寄聲父老幸為侯植五株堂旁勿翦勿伐以永侯愛思宜有益父老其聴余言母忽政和元年記韓忠憲公祠堂記閻灝自侯國為郡縣傳記始有列循吏者固須凛徳讓風迹清慎所居民富既去見思生有榮號殁得奉祀則其章明與日月參光而無窮已也漢元始詔書祀百辟卿士有益于民者蜀郡以文翁九江以召父應詔嵗時郡二千石率官屬行禮而南陽亦為信臣立祠昭然史䇿増媺赤制此典一墜昧沒千載然而有碩徳傑望矜式薦紳厚澤英績周洽民俗丕烜瑰偉自與禮之法施于民以勞定國者合而與心稱願以祈薦饗則此甚盛事可得已耶宋天聖中韓忠憲公以樞密學士諌議大夫鎮成都威靖仁涵内外誠盡方嚴正直動循儀矩中心樂易以教化為首務俗尚悛革安趨夷逵始日官以蜀當有兵變夷大沴為言者朝廷憂之公于陛辭之日二宫諭以占說公俯伏曰願以屬臣既至蜀果大旱炎晹午熾狼顧駭駭素寡儲峙生意潜奪公齎咨惻憂形見顔表遽發倉廪粟及令富室造饘粥以賑救餓殍日自循徃按涖之撫慰噢咻率繇淵誠賴以獲全者不翅千萬始議救災也僚有請限節米價者公曰不可物始翔踊居蓄者固靳嗇以射利祈倍稱之息此令一出環千里之粟閉不至矣姑待之不浃日諸郡之輦餽大至價遂少損公甞于中夕端肅衣冠祈請帝神霖雨如注焦槁以蘇斥絶宴嬉還集疲瘵捐瘠完好武斷縮慄易荒為穰化擾為寜或言張乖崖嵗出米萬斛估于民頗漁庾實白請減之公曰此朝廷所以濡澤逺人為最急者豈可輕議耶因前期倍數以給價之且刻石置倉中示後人不可革之意陽亢寖乆府江幾涸蒔稼將瘁溝澮填閼提封暵然澆潤靡及公遂遣官行視江流訪故老得堰曰九外口未始疏導即命新釃為渠以注之水行徑便均溉諸邑後常修決倚為滋植而利甚豐博蜀之戍兵舊比食淡公損鹽估差等而鬻予之著為定令新繁彭益之交舊匿奸冦賊有閃地黄之號公行剽殺䝉隠逾時公亷知之鉤發逮捕得罪狀誅竄渠支清洗胠箧至今新繁無盗公敦尚儒雅平日誘進文士以倡教育㑹詔秋貢士公戒有司務公其選躬視精覈擢章君陳為舉首章遂登甲科後立朝為聞人餘悉時之髦彦接武以取名第西南文章基此而盛藩㑹讌饗徃皆趨佛宫廡下蕝具湫底庖宰擾雜公飭材于廣庭為㕔事以宏豐鎬之地逺去封割表掲瞻望方隅偉之踰再期㑹以御史中丞召還蜀民慊悁如失慈哺公歸朝尚以邛部蠻馬嵗来鬻于永康經踐山川知道途險夷為蜀後日虞建言願徙即沈黎朝廷從之遂得杜覘伺之便嗚呼何于蜀之恩始終隆隆耶踰三十年袴襦之歌頌不衰天福于遐世象其賢上復用公第三子端明殿學士翰林侍讀學士尚書禮部侍郎公繼治之追功席休踐脩厥猷紹叅神明今昔相照官榮家範古所未有徳威亶白嵗時大和于是耋耆善良㑹千百數擁棨㦸門道前世祀事謂忠憲公之祠不修為蜀之愧願即文翁廟之南宇為一室繪犀日之表而以端明公侍其旁庶西南人事之無窮以大朝廷用世徳之盛其不可辭端明公曰衆之請至矣矧利義無疑遂許之而止其圖已像堂序樸嚴繪事莊潔毅如嶽鎮煥如星辰憑憑威靈萬世瞻仰既已邦人士大夫謂灝竊頖宫之遊日與諸生道古今盛美宜紀其實從金石刻灝再拜受命而系以詩曰惟宋受命繼古聖聖弼臣臯䕫世載徳盛嚴嚴韓公有倬其道方國碩望朝廷元老天聖之末蜀人荐飢公竭恵慈營營百為厚恩春暘凛威秋霜善惡判明納民安康始三十年世象其賢公功愈昭斗奎于天蜀之父老百拜庭下願修公祠以永瞻慕岷盤坤維江紀南國公祠之嚴相與無極漢之文翁宋之韓公邦人永懐穆然清風司馬温公祠堂記張行成故諌議大夫司馬君池以某年作尉郫邑越明年某月生公于官廨字之曰岷以山稱也是嵗諌議君手植松柟各一本于庭迨今凡若而年自諌議之死骨已朽矣公相繼衰落靈亦歸矣而二本之中其一松者亦枯摧矣惟是兹柟蒼蒼雲表人依之尚可想見公初生時也公之遺徳在天下名在後世行業在國史固一代偉人也當其道未合之初天子敬之而不用權臣憚之而不親天下仰之而不齊不獨其身見黜于朝廷波及遺言窮于死後者凡數十載則松之不愛而柟之不録固其宜也邇来世道頓革士風漸回上自朝廷下自黎庶咸知公議之不可破而公之言為不可抑于是朝廷旌其家學士誦其書後生想像其風采而不可得則又丹青肖形以寫瞻慕者無室不有公之道盖大明于天下矣思其人愛其樹又理之必然者于是邑丞李公作堂以嚴公之祭植木以永公之思盖從人望者柟之青青公生在兹邦人是榮祠之翼翼公像在兹後生是式公之道彰矣不假于一柟而兹柟實託公以不朽公之道傳矣不私于一室而兹邑實賴公以不辱柟之喬斤焉而雕惟公之道磨天地而不銷柟之節斧焉而缺惟公之道涸河海而不竭則兹堂之建非以嚴公也乃以為護柟之標榜兹柟之愛非以榮公也乃以榮邑之冠冕堂之毁公不毁也柟則毁矣柟之辱公不辱也郫則辱矣嗟乎郫之民郫之吏繼今而後者其善䕶兹冦莱公祠堂記鄭銓府城之東有廟曰見報司者故太子太師莱國冦忠愍公之祠堂也廟初本澄覺院治平二年賜名正覺勅書存焉院初為十方有禪師曰可居自雲頂来住持因塑公像與雲頂山之神曰利國王者並祠于院之東偏嵗既乆鄉人事之頗著靈異民相與質其曲直報輙如響遂呼為見報司今雖有僧居之而院實廢為廟矣見報司之說頗不經而傳之既乆又不能廢然為善為惡使民知有所報則存之足以示勸戒亦不必廢也紹興甲子廟將壊里人徐復與院僧圓證率好事者再新之改前日之佛宫為莱公之祠萊公始正離明之位前為兩廡其東廡開一位以祠利國王其西廡則増塑神像以居之祠堂之後為齋㕔乃徃時之法堂又改方丈為清逺堂以備僧徒道塲僧房齋庖皆備視前日規模不復然矣復思嵗月寖乆人弗知興起之由屬予記之予既為誌其詳矣按成都古今記正覺院與見報司俱不載惟前記祭祀門有王者八而利國王在焉有公者十而冦莱公在焉前記乃趙清獻公所集當時既載祀典則廟與院不宜俱失續記乃王公時享所修而廟宇寺院門亦不録故鮮有得其詳者春秋之祀官並祭莱公與利國王甚乆又未知自何人始也今述其重修之因以貽来者若莱公之遺徳則有國史在兹不復出也然則生而聰明正直有功徳于民死而祀之固宜况事有足以起人之敬而生其良心亦何嫌而不書之哉顔魯公祠堂記馬存上元中顔魯公為蓬州長史過新政作離堆記四百餘言書而刻之石壁上字徑三寸雖崩壊剥裂之餘而典刑具在使人見之凛然也元符二年余友强叔来尹是邑始為公作祠堂于其側而求文以為記甞謂仁之勝不仁乆矣然有時乎不勝焉命也史臣論公晚節偃蹇為奸臣所擠見殞賊手是未必然公孫丞相以仲舒相膠西梁冀以張綱守廣陵李逢吉以韓愈使鎮州而盧杞以公使希烈其用意正相類爾然數公終無所傷而公獨不免于虎口由是觀之士之成敗存亡豈不有命邪而小人軒然自以為得計不其謬乎吾聞之古之尚友者以友天下之善士為未足又尚論古之人誦其詩讀其書思見其人而不可得則方且招屈子于江濵起士㑹于九原盖志之所願則超然慕之于數千百載之後况公之功名事業已超于人而文學之妙亦不可及顧其名書之所在而祠之此昔尚友之意也甞試與强叔登離堆探石室觀其遺踪而有味于平生則公之精神風采猶可以想見也賈浪仙祠堂記龔鼎唐韓退之善為歌詩導性情一時相從者如孟郊張籍最號友善而浪仙學詩于劉义晚得偕與二子遊頗以才調相推髙雖然觀其風致清澹得之自然誠亦郊籍之儔故後世學者語騷雅之流裔孰敢外三子焉浪仙由長江徙官于安岳而卒于㑹昌三年凡為編次其詩者二人許彬者謂之小集而天仙寺浮屠無可謂之天仙集當時之人有可名者島俱請之讃天仙集傳之既乆反以讃為退之之辭然退之前後二集皆所不載及得李洞句圖序質之然後信其非也浪仙于舊史無傳邇来朝廷新其書遂得附名于退之之後而頃嵗居官者署祠堂于蜀土神廟廡之次今伯氏實佐令長于是邑甞議其堂雜與人居非所宜也而尉有西圃者在唐為主簿之廨址誠將遷其舊備更以繪像無撓邑人于義何有既遂經畫而就之其屋不華而完其地不奥而清越其兩傍封植筠柏鬱然嗚呼浪仙沒距今二百二十餘嵗矣名始著于史冊而其遺貌又得宅于故處廼知士之能蹈善雖日月之逺必有為黼黻其迹者今幸赴其身後之所將有以傳之無窮宜無復恨矣而伯氏逺以書諭俾文其實然而蹈前哲之為啟来者之慕抑所願聞即為取諸昔日所傳而備存之且以示改作之有由也新建宋丞相魏國張公父子祠堂碑記明楊廷和宋丞相魏國張公浚在中興號為賢相初逃張邦昌之議平苗劉之亂其風聲氣節已聳動天下既秉軸毅然以恢復自任誓欲攘夷狄鞠躬以清中原表著天心扶持人紀引用賢俊英材授任四方人才視為進退天下覘其出處為安危忠君體國之誠直與諸葛孔明通于千百載上下雖困于讒忌屢起屢躓功未克就而志不少後厥嗣右文殿脩撰栻頴悟夙成魏公教之一以仁義忠孝之實又嘗逰胡五峯之門其為學惓惓于理欲之分義利之辨朱子與之逰以為卓然先有所見已非其匹學者稱為南軒先生甞㕘賛魏國公諸所綜畫幕中人皆自以為不及魏公寝疾時手書諭南軒曰恨吾不能恢復中原以雪祖宗之恥死不當歸塟先人墓左葬魚復下足矣乃葬之寜鄉溈山之南後南軒卒亦祔葬焉至是盖若干年矣坟墓所在鞠為榛莽土人父老亦鮮有知之者鳯陽胡士裒以明經進士補寧鄉令一年政通人和訪而得之憮然歎曰令凡忠臣烈士有功徳于國家及恵愛在民事蹟昭著者列于其外䕫人共祀墓禁人毁撤若魏公所建立載在信史昭如日月正應共祀之而南軒之學師表百世從祀孔廟達之天下今其祠墓在一日若蕪穢不治非我有司之職而誰也于是亟取責贖之餘建觀其四楹其右則南軒書院又買田四十畆以備時享之用門廡外重以周垣爼豆載陳衣冠動色㑹衡山劉侍御黻持節按蜀過修故恱之既至蜀以告予謂予魏公鄉後學也屬為文刻于神道碑下復檄下廣漢訪其遺𦙍予惟賢人君子之用于天下不患無才而患學術之不足不患無學而患所學之不正甞觀魏公平日之所言如曰人主之學以心為主一心合天何事不濟又曰所謂天者公理而已必兢業自持使清明在躬則賞罰舉措無有不當歸敵讐自服其本原皆自聖賢學問中来非漢唐以下規規之末者比至南軒每進對必自盟于心其言曰此心之發即所存願時加省察而稽古親賢以自輔是即魏公之說也有名臣若仲淹之于純仁韓琦之于中彦呂夷簡之于公著前啟後承其詩書之澤事功之盛皆足以名當時而傳後世若學術議論視魏公之于南軒或有間也尚論于魏公容有責備之意而其大處終不可冺予是以表而出之觀者幸勿以予為齊人侍御君思賢尚友而樂成人之美縣侯為政而急于先務皆可書也故以為記四川制置安公生祠記宋魏了翁恭惟國家承百王之敝㝢縣紛裂藩臣恣睢藝祖皇帝神武所運亂本旋弭以開億萬年無疆之基太宗遹祗前訓卒其成功民生闓懌夷狄順軌真仁休養英廟纂承至熈豐物衆地大而竊儒為姦者乃始變亂典常元祐更化綱目畢舉而紹熈以後黨禍再作極于崇觀政宣戎索弗戒乃底于亂髙皇南狩駿恵先烈𢎞濟大難阜陵繼之勵精圖治志清全彊大勲未集而崇陵享國日淺肆開皇上克念厥紹始初清明率籲郡獻將有志于慶厯元祐之盛者天下延頸企踵以需太平而韓侂胄以居中竊弄威柄矣吳曦乳臭子耳依憑世資出入内閣侂胄既倚為心腹畀掌禁旅雖寵任踰涯而曦之為謀則盖不在是也玠璘拱挺再世為将忌刻少恩志鮮為用徒以積威之餘知有吴氏故曦密侂胄之欲而􅅗通于敵乗時為姦者士大夫繇學禁以来義理亦不競一旦利欲所焮則大官唱聲一口附和牢不可破凡以使命還自虜者例曰虜有内變虜有飢饉設王師一動關河必且響應是則然矣而不思侂胄之逞其私見也凡一時之躐登華要者鮮不出此雖廷䇿進士亦以是為舉首否則擯抑不容矣先是了翁䝉恩召試玉堂力陳其不可卒不見用明年将出師朝廷尚欲託之公言以排異論遂建請宰執侍從兩省臺諌官條具否可来上爰暨管軍咸驛聞詔下中外各以已見條具獨曦不奉詔而遺書韓侂胄曰戒嚴有日忽出條具之命士心惑焉未知攸禀進退遲速願明降出處分彼既不論可否而反持短長欺侮侂胄得書惘然以失而公卿以下素為所心寄恬不知察不知識者已覘其無君之心迨郭倪李爽攻夀泗皇甫斌攻唐鄧雖皆覆軍亡將而還然尚有可庸者而曦悠悠不前不惟蓄温裕之謀盖又出于石晉劉齊之陋䇿元帥既遁王人繼逐東歸之士蔽江而下至是所望以反正者惟蜀人耳志仁蹈道者固足以明人臣之義而潔身勇徃弗顧全軀者依違其間下此者又置不復道方斯時也虜蹂我淮甸壊我襄安蕩揺我江漢顧瞻四方蹙蹙靡騁數州生聚遽隔王化此何時也悠悠風塵莫有能甘心于賊者視其汙衊衣冠割截輿地駸駸然旦異而晡不同不過撫髀太息焉爾矣惟今資政殿大學士安公奮由儒雅獨能周旋其間濡跡以就事部分既定即矯詔誅曦以聞泗州虜聞之以為從天而下也相與胆落神沮謂吾國中有人由是不敢有二心方反書之上也朝論大震上召羣臣計事咸謂無出公右乃為書賜公勉以圖曦報國書未至而㨗聞君臣動色相慶以謂知人拜公端明殿大學士知沔州充州利州西路安撫使恩視執政亡何曦首至闕下詔禮官講行受俘之儀納于武庫凡皆國朝所未有者也猗歟盛哉蜀人于公飲食必祝盖公之祠徧蜀中而公廣安人也和溪縣封山鎮亦公之鄉也頋獨闕焉未有以識髙山之仰其鄉之士曰陳農孫重公之徳乃肖厥像而走廣漢介通守李君炎震欲得余文以識顛末余惟公殊尤絶異之績垂之史冊鏤之玉板被之金石者何可勝數尚安以余言為也而固請弗已則三復其事為之喟然歎曰天之生人乆矣一治一亂非以氣數屈信之變人事昏明之異故反覆摩盪所不容不爾耶然天之愛人也屈于前必有信于後消于彼必息于此使生民之類猶有所依以自立而不至于極弊大壊則以天下固生才以待其定也夷吾不死以康天下絳侯屈意以安劉氏方事之未白也有友如鮑叔有君如髙帝固以是望之彼亦以是自信不疑是惡可强而致然耶賊曦之變公雖以天下為已任始焉自晦原闕全蜀藝文志巻三十七
