body:
  text: 全蜀藝文志巻九明周復俊編詩江山下巫山高齊虞羲南國多竒山别巫獨靈異雲雨麗以桂陽臺重怨一作千里思勿言在可一作可再得特美君王意高唐一㫁絶光隂不可遲同前劉繪高唐與巫山參差鬱相望灼爍在雲間氤氲出雲一作霞上散雨収夕臺行雲巻晨帳出没不易期婵娟似一作以惆悵同前梁元帝巫山高不窮逈出荆門中灘聲下濺石猨鳴上逐風樹雜山如畫一作盡林暗澗疑空無因謝神女一爲出房櫳同前梁王㤗迢逓巫山好一作竦遠天新霽時樹交涼去逺草合影開遲谷深流響咽峽近猿聲悲只言雲雨状自有神仙期同前梁范雲巫山高不極白日隠光暉靄靄朝雲去溟溟暮雨歸巖懸獸無迹林暗鳥疑飛枕席竟誰一作空薦相望日一作空依依同前陳蕭詮巫山映巫峽高高殊未窮猿聲不辨處雨色詎分空懸崖下桂影一作月深澗響松風别有仙雲起時向楚王宫同前唐鄭世翼巫山凌太清岧嶤類削成霏霏暮雨合靄靄朝雲生危峯入鳥道深谷㵼猿聲别有幽棲客淹留攀桂情同前陸敬巫岫鬱岧嶤高高入紫霄白雲抱危石𤣥猿迥挂一作挂迥條懸崖激巨浪脆葉殞驚飈别有陽臺處風雨共飄飄一作飄颻同前李元操荆門對巫峽雲夢邇陽臺燎火如奔電墜石似驚雷天寒秋水急風静夜猿哀枕席無由薦朝雲徒去來同前盧照鄰巫山望不極望望下朝氛莫辨啼猿樹徒㸔神女雲驚濤亂水脉驟雨暗岑一作峯文霑裳即此地况復逺思君同前閻立本君不見巫山高高半天起絶壁千尋畫相似君不見巫山磕匝翠屏開湘江碧水遶山來緑樹春嬌明月峽紅花朝覆白雲臺臺上朝雲無定所此中窈窕神仙女仙女盈盈仙骨飛清容出没有光輝欲暮高唐行雨送今宵定入荆王夢荆王夢裏愛穠華枕席初開紅帳遮可憐欲曉啼猿處説道巫山是妾家同前喬知之巫山十二峯參差互隠見潯陽幾千里周覧忽已遍想像神女姿摘芳共珍薦楚雲何逶迤紅樹日葱蒨楚雲没湘源紅樹斷荆門郢路不可見况復夜聞猿同前沈佺期巫山峯十二合沓一作環合隱昭囘俯眺琵琶峽平㸔雲雨臺古槎天外倚瀑水日邉來何忍猿啼夜荆王枕席開同前張九齡巫山與天近煙景常青熒此中楚王夢夢得神女靈神女去已久白雲一作雲雨空㝠㝠唯有巴猿嘯哀音不可聽同前皇甫冉巫峽見巴東迢迢出半一作半出空雲藏神女館雨到楚王宫朝暮泉聲落寒暄樹色同清猿不可聽偏在九秋中同前李端巫山十二峯皆在碧虛中囘合雲藏日霏微雨帶風猿聲寒過澗樹色暮連空愁向高唐去清秋見楚宫同前張循之巫山高不極合沓一作沓沓狀竒新暗谷疑風雨幽巖若鬼神月明三峽曙潮滿二江春爲問陽臺客應知入夢人同前李沇没天心開地脉浮動凌霄拂藍碧襄王端眸望不及似睹瑶姬長嘆息巫粧不治獨西望暗泣紅蕉抱雲帳君王妬妾夢荆宫虚抱金沉印仙掌紅濤迅激如相助十二獰龍怒行雨崑崙謾有通天路九峯正在天低處同前李賀巫山叢叢髙挿天巴江翻瀾神曵煙楚魂尋夢風颸然曉風飛雨生苔錢瑶姬一去一千年丁香笻竹啼老猿古祠近月蟾桂寒椒花墜紅濕雲間同前陳陶玉峯青雲一作靈十二枝金母和雲賜瑶姬花宫磊砢楚宫外一作列列仙一作仙客八面星斗垂秀色無雙怨三峽春風幾夢襄王獵青鸞不在嬾吹簫斑竹題詩寄江妾飄飄散絲巴子天苔裳玉轡紅霞幡歸時白帝掩青𤨏瓊枝草草遺湘煙同前羅隠下壓重泉上千仭香雲結夢西風𦂳縱有精靈得徃來狖軛鼯軒亦顛隕嵐光􅑨􅑨雷隠隠愁爲衣裳恨爲鬢暮灑朝行何所之江邉日月情無盡珠零冷露墮丹楓細腰長臉愁滿宫人生對面猶異同况在千巖萬壑中巫山高并序宋范成大余舊嘗用韓無咎韻題陳季陵巫山圖考宋玉賦意辨高唐之事甚詳今過陽臺之下復賦樂府一首世傳瑶姬爲西王母女嘗佐禹治水廟中石刻在焉濕雲不収煙雨霏峽船作灘梢廟磯杜鵑無聲猨呌㫁惟有飢鴉迎客飛西眞功高佐禹跡斧鑿鱗皴倚天壁上有瑶簪十二尖下有黄湍三百尺蔓化蚪木風煙昏蘚珮翠帷香火寒靈斿飄忽定何許時有行人開廟門楚客詞章元是諷紛紛餘子空嘲弄玉色朱顏不可干人間錯説高堂夢後巫山高一首前人疑眞宫前十二峯兩峯娟妙翠挿空餘峯競秀尚多有白壁蒼崖無數重秋江潄石半山腹倚天削鐵荒行蹤造化鍾竒矗瑶瓛眞靈擇勝探珠宫朝雲未罷暮雲起隂晴竟日長㝠濛瑶姬作意送歸客一夜收繚仍囘風仰㸔館御飛檝過囘首已在虚無中惟餘烏鴉作使者迎船送船西復東初入巫峽前人鑽火巴東岸摐金峽口船東江岸欲合潄石水多漩皁午二竿日中間一罅天偉哉神禹跡疏鑿此山川瞿唐行七月十九日至䕫子灔澦撒髮不可犯是夜水漲及山腹詰且視灔澦則已在水中土人云此青草薺也可以冒險而入遂鼓棹略其頂而過郡中遣候兵立山上每一舟平安則揺幟以召後舟白鹽赤甲皆峽口大山黃嵌黒石皆峽中至險處入峽西岸有聖泉舟人或向之疾呼曰人渴也泉即迸下一杯許復乾余舟過甚急未之試也前人川靈知我歸有程一夜漲㾗千丈生中流擊檝洶作氣夾岸簸旗呀失聲不知灔澦在船底但覺瞿唐如鏡平鑿峽疏川狠石破號山索飲飛泉驚白鹽赤甲轉頭失黒石黃嵌􅂸命輕草薺増肥無泊處竹枝凝咽空餘情人間險路此竒絶客裏驚心吾飽更劒閣翻成蜀道易請歌范子瞿唐行嘲峽石前人峽山江濵亂石萬狀極其醜怪不可形容舉非世間諸所有石之狀走筆戯題且以紀異峽山狠無情其下多醜石頑質賈憎唾傀狀發笑啞麤類墳壤黃沉漬鐡矢黒或如溝泥涴或如凍壁坼堆疑聚廪粟陊若壊城甓槎牙鏤朽木狼藉委枯骼礧砢包蠃蚌淋漓錮鉛錫縱紋瓦溝壠橫疊衣摺襞鱗皴斧鑿餘坎窞蹴踏力云何清淑氣孕此譎詭跡我本一丘壑嗜石舊成癖端溪紫琳腴洮河緑沈色階􅁽截肪膩泗磬鳴球擊嵌空太湖底偶立韶江側眞陽劖千嵓營道剷寸碧倦遊所閲多未易一二籍朅來兹山下刺眼昔未覿或云峽多材竒秀鬱以積絶代昭君村驚世屈原宅東家兩兒女氣足豪萬國山石何重輕奚暇更融液我亦味其言作詩曉行客十二峯詩望霞峯閻伯敏東皇君來流曉霞暮㸔西北王母家雲華夫人王母女肯爲廟食留三巴翠屏峯秋山黃落春山青不識仙家雲錦屏六銖天衣下拂石香風馥郁朝眞亭朝雲峯山頭行雲自朝朝陽臺暮色連雲霄朝來暮去變雲雨送老行客無囘橈松巒峯舟船揺揺大巫前松間絲蘿望纒綿屏風角轉恰匝背心在山頭人倚船集仙峯緑簔鞋繫青行纒束薪緼火問山田雲間似聽仙佩響蓬鬢拂掠燒畬煙聚鶴峯望夫石女春復秋巴歌初舞隨遨頭夜深九臯清唳響仙禽亦替離人愁净壇峯山頭枝枝竹掃壇舟子竹枝歌上灘炷香上廟擲杯珓但乞如願舟平安上昇峯黃魔白馬功告成雲華夫人朝玉京禹后夏后引音節高低峽船揺櫓聲起雲峯釵頭嫋娜山花枝裙尾舊纈山麻衣朝隨雲起采薪去暮趂女伴穿雲歸栖鳯峯山頭鳯鳴求其凰山前家家背鳯筐竹花結實未忍食刀耕火種五里香登龍峯散而成章合為龍囘風混合游鴻濛舟人上下神女供俗粧鉛粉臙脂紅聖泉峯靈泉一派瑶池分灑落掉石隨東奔楚人但愛香溪水溪邊為有昭君村十二峯古風二十五韻袁説平生酷嗜岩壑姿竒峯怪石貪成癡雲烟變幻瞥眼過張皇戄覔惟憂遲東南名山半遊厯就中所欠巫山竒巫山之峯冠巴峽竒峯十二相參差昔年圗畫嘗一見欲見此山無路之扁舟西泝上三峽千嵓萬壑爭追隨終朝應接不已暇心目洞駭俱忘疲驀然鉦鼓高唐上峯巒二六排旌旗一峯霞彩炯在望一峯展翠開屏帷望霞峯翠屏峯無心出岫雲吐色偃盖平巒松並枝朝雲峯松巒峯僊蹤鶴駕羽衣近壇石瑶臺閶闔低集仙峯聚鶴峯淨壇峯上昇峯白雲一起鳯凰下清泉四合蛟龍嬉起雲峯聖泉峯栖鳯峯登龍峯羣峯角立變態異一一大巧乾坤為外堪擊拊試聲律中含造化分四時天下名山亦多矣未有列岫竒如兹九華一景固天巧惜與江流相背馳南北兩峯喧衆口粧抹却恨同西施何如此峯何限好行行列列横江湄煙雲漠漠出寸碧風雨時時勻黛眉舟人漁子謾囘首騷士墨客勞支頥我來穿水入天去貂裘章甫生塵緇昻頭見此大竒特躋攀不上空嗟嘻吾將欲訪三島登九嶷上蓬萊道山之壁絶泰華終南之嵋飛鳬去舄嘯滄海却來巫峽温前詩次韻錢鏊文昌仙伯天人姿愛山尋勝如書癡忽摩台符歴參井麾幢泝峽春遲遲山靈川后總効職萬壑千嵓俱獻竒就中巫山絶雄勝挿天紫翠相參差神妃來下珮聲逺駐此名地相安之峯旋地轉自前後屹立萬馬如追隨兩山有川幻天巧禹功到此神應疲仰天照眼如疋練舟行電掣飜雲旗迅帆競惜峯巒過艅艎望眼裳褰帷懸崖下有欲落石古木上有參天枝龍登鶴聚仙既集雲昇雨暗天如低從來三峽號至險高牙穩泛如遊嬉揚旌一覽天下勝詞源倒峽知優爲嘗聞竒觀天亦惜遇賢輒與因其時少陵寓此雖窮寂妙語驚人多在兹雕鐫萬象發大閟衙官屈宋聲爭馳公今曳履星辰上調元妙手行將施天教來作東道主歡聲和氣生江湄公來頓覺雪山重青城增氣連峨嵋首驅巫陽入新句一洗前作堪解頥英詞從此遍蜀道迥出塵表無纎緇嘗憂此地難久駐轉首絶景成嗟嘻直欲使拂素練圖翠嶷冩松巒起雲之狀模翠屏栖鳯之嵋終朝誦公有聲畫却來㸔此無聲詩次韻毋丘恪縑素巧貌谿山姿寳藏昔笑虎頭癡何人夜半胠箧去信爲羽化無疑遲魏明不惜萬夫力鑿山累土誇神竒景陽突起芳林苑穀城文石光參差葉公好龍廣射虎大方安能不笑之至人於物特寓目逺象過眼心弗隨我公㸔山正如此肻趂無窮脚力疲胷中五嶽鎮地軸眼底三辰昭旌旗文星仙伯寵分鉞來撫蜀土初褰帷巫山一覽窺妙處冩入長歌賡竹枝坐令十二峯增重已覺氣壓嵩華低太室少室敢輩行小孤大孤何兒嬉岱宗日觀峻徒爾崑崙天柱高安爲出雲作雨均有是泥金鏤玉彼一時所謂造化一尤物不住九華眞在兹中山前言恐遂廢公之妙論已四馳半語尤存大公正蟠胷經濟看設施要令利澤均四海無論山崖與水湄只今蒼生方屬望休戚在公顰伸眉願公更爲天下重所養自養觀諸頥量陂誰復能澄撓徳表居然無磷緇巖石巍巍具瞻在孰不嘆仰聲噫嘻又何必東望瀛南望嶷北有天後之劍嶺西有雲表之峨嵋與公高名並不朽配以今日巫山詩次韻黃人傑文昌老仙絶俗姿愛山成癖非兒癡胷中况自有丘壑檻結瑰異當恐遲坤維謀畧出分閫江山致助爭出竒尋幽選勝上巫峽斷崖怪石懸參差十二峯前弭征楫枝藤直上窮所之雲煙變態千萬狀過眼神動驚天隨人疑躋攀欲力盡公自樂此良不疲瑶華眞妃似風駕風馬盡下揚旛旗層巒好處起蒼壁丹霞望門開赤幃登壇定可拾瑶翠却老未應無玉枝仰天一笑睨廖廓俯視培塿丘陵低頗疑遊龍出飛躍恍若栖鳯猶娯嬉喬松跨鶴逺近集雲雨濟人朝暮為壇維野翠有餘潤泉拖修帛無窮時一經盻睞便改觀陽臺價重當由兹惜哉牙纛不久駐鷁首未轉檣烏馳輕縑素練欲摹冩摹畫難著五采施筆端機杼始濳運悠然寄興滄洲湄章成宻簡繡衣使繡衣翰墨今白眉珠酬玉唱兩相和三嘆盡解騷人頥好刋蒼珉示千古磨而不磷湼不緇紛紛我輩小巫耳健讀數過徒噫嘻待從兩公奠西極安南嶷收關河百二之險劖岷峨萬仭之嵋大書有宋中興頌東還更和巫山詩客有自成都來者傳制帥華學尚書年丈巫山詩輙次韻奉寄許及之巖壑豈是鐘鼎姿出處相較黠與癡我家淛東山水窟閒窺壺中日月遲坎蛙固守井底見鴈蕩㫁云天下竒坐想天柱高突兀便覺穹障排參差歸胡不歸歸未得吾非故吾吾何之南宦祝融常在眼北征太行長相隨每欲拓關令混一其奈意廣憐庸疲故人開府鎭巴蜀大江楊舲張虹旗紀行先要實古錦及境始事蹇赤帷陽侯似知公得句吳榜婁舞下折枝有客傳誦巫山高長安那復紙價低襄王胡爲愛文賦宋玉大以供戯嬉山川本以靈雨祀神明何及䙝凟爲牽牛織女謗自古小姑彭郎訛一時剰喜新篇有如此洗空遣恨從今兹蜀道誰云在天上政譽已逐詩聲馳世情嚮背南北阮人物妍醜東西施願君滄溟恢宇量聽披缾甖居井湄已爲下户代輸額更要全蜀俱伸眉西都父老久延頸關外士卒寛張頥訪尋恐有𤣥尚白流落寧無素染緇規模所至欣濟濟民俗定自臻嘻嘻政成化洽公何疑無人風月鐫峨嵋歸來要著浯溪頌吾上中和宣布詩次韻丁逢半雨半晴山弄姿濕雲吹風不成癡蘼蕪漸徧楚宫碧蒲萄未漲巴江遲西南人尹初渉境山川效職加瑰竒翠屏窺牕故娟妙松巒映帶相參差浮雲擊汰睨青壁靈君一去今安之吟情浩蕩隘宇宙萬景敢云驕莫隨當年楚境半天下孱王醉夢方昏疲珊珊玉佩赤帝女星髾羽蓋蜺旌旗錫符賜榮豈無意侍臣託諷褰幬帷尹今文采繼騷雅夢得詩魂羞竹枝吾行一百八盤上鑽天但覺天雲低荒荒野驛虎豹怒隂隂嶺樹猿猱嬉危登險陟倦三伏口呿背浹嗟胡爲豈知舟行有竒觀山靈秘惜留歸時青簾白舫夙已具芒鞵布襪将從兹胷中丘壑未塵土頭上嵗月從驅馳雖無勝具逐支許尚有樂趣同周施何當投劾便歸去發船打鼓清江湄更催尺一喚公覲同㸔二六浮修眉常山蛇陣想魚復建溪龍焙傾蟇頥攤錢晝浪㸔三老杖藜晩岸尋名緇昔人没嶺寄書帖更歌蜀道先吁嘻未若尹外岳牧中丞疑惠愛春江之赴滄海清明秋月之掛峨嵋盡驅三峽波濤筆第入思齊訪落詩次韻閭丘泳舟行觀山無定姿蓬底兀坐眞兒癡層崖複嶺正雜遝平崗横阜俄逶遲晴嵐參天固競秀深巖挺石尤多竒遥岑浮眉緑㸃㸃飛瀑懸劔鋒差差飽聞巫山妙天下今誦公詩如見之蓬仙來應人間世妙齡便有聲名隨日談經術輔主聖久領國計嗤駑疲共推經邦濟川楫暫建分陜元戎旗百城聽令仰賜履三邉制勝如籌帷長江高唐神女峽萬里崑崙分一枝峯巒森立入霄漢塔廟選勝居高低響山猿啼聲若嘯迎棹鴉舞來如嬉今母分畀神靈職孰去朝暮陽臺爲琅函蘂笈發天秘贊禹治水唐虞時英辭一洗千載陋冩之琬􅓨宜自兹人思傳本快先睹蔡邕石經車馬馳北暢威名被沙漠西奠夷落連黔施帝遣雲軿鎭南極祠宫姑寓江之湄湘君時過鼓瑶瑟宓妃豈復颺蛾眉金闕已侔坐少廣丹經孰授踰期頥野人塵容粗知學素守亦復湼不緇朅來乗軺職飛輓兩見祈穀歌噫嘻疲氓﨑嶇上轉粟舊業荒落南窺疑勞生屢已度劍棧清遊頗念登峨嵋從今崧高雅頌手那數韓子南山詩次韻張縯化工神偉開物姿劖石萬仭不作癡巍峯聳立威鳯舉急峽怒流奔馬遲隱然萬里形勝重信矣四海游觀竒天開疋練勢嶻嶪雲擁列嶂青參差輿圖悚視天設險舟檝競與江東之何年宇宙此盤據逺攬泰華宜肩隨胷吞雲夢盪物表眥决飛鳥忘神疲元戎受任盛節制列艦徑度羅旌旗天香來時滿衣袖講殿幾日辭書幃詞源浩蕩春峽水句律飄揚秋桂枝天門有路穿水底筆力到古羣峯低逺參退之賦山囿下陋樊川娯水嬉吾聞京城南兹爲羣山囿退之南山詩也有神相宅理應爾夢賦靡曼奚其爲流轉不根憐已久高詠取正今逢時昔年飛輓忝將指異境名言猶念兹大篇巨軸窺勝賞赤甲白鹽神坐馳有從絶唱發竒偉衆作絢彩同彰施徳風草偃閫以外觀頌下轉江之湄寧須三年秦漢計行復八彩瞻堯眉慈恩論契肯隔面草堂枉駕忽解頥我方卧雲書自伴公詠入相衣宜緇少須凋瘵盡摩撫大賑倉穀歌噫嘻潼利告旱歉公方大舉荒政㑹㸔丹詔來北闕更上􅡵嶺登峨嵋江江助協此嘉㑹載賡歸冩明良詩次韻李嘉謀道人愛山出天姿自謂計黠人嫌癡獨遊名山㸔不足每得勝處行爲遲誰人能知物外賞世上自有壺中竒一行作吏困汨没便與好境相參差晩兎投林今適願窮猿得木吾何之芒鞋竹杖恣如徃煙蓑雨笠長相隨青山愈好足力盡此意未止駑駘疲路逢行人説大尹正見諭蜀揚舲旗好賢招邀每虛席問俗疾苦時褰帷才華落落清廟器詩筆粲粲珊瑚枝胷吞楚澤八九盡氣壓巫峽羣山低大峯連娟争嫵媚蒼壁徙倚供遊嬉巴東巴峽古所重作雲作雨今胡爲有情飛鳶送迎客無数棹歌來去時昔日畫圖曾見者何意忽此今逢兹邇來豐碑在人口已與流水爭東馳政用中和得大體智出毫末非全施不獨英聲流上國已有詩巻傳江湄狼烽長閒一鼔腹耕隴不見愁生眉都門髣髴記分袂蜀道修阻常支頥持謁見公敢論舊撫髀顧我清無緇樽爼頻開閒共語歌謳聊與民同嘻忽然晨日在東壁但見山月來峨嵋行吟何獨壮三峽在處山靈來乞詩廣溪峽唐楊炯廣溪一峽首曠望兼川陸山路遶羊腸江城鎭魚腹喬枝百丈偃飛水千尋瀑驚浪囘高天盤渦轉深谷漢氏昔云季中原爭逐鹿天下有英雄襄陽有龍伏常山集軍旅永安興版築池臺忽有傾邦家遽淪覆庸才若後主忠佐爲心腹設險猶可存當無賈生哭天池杜甫天池馬不到嵐壁鳥纔通百頃青雲杪層波白石中鬰紆騰秀氣蕭瑟浸寒空直對巫山出兼疑夏禹功魚龍開闢有菱芡古今同聞道奔雷黒初㸔浴日紅飄零神女雨㫁續楚王風欲問支機石如臨獻寳宫九秋驚鴈序萬里狎漁翁更是無人處誅勞任薄功峽中山盧象高唐幾百里雲樹接陽臺晩見江山霽宵聞風雨來雷從三峽起天向數峯開靈境信難見輕舟那可廻過巫峽李頻擁棹向驚湍巫山直下㸔削成從地底峻極出雲端暮雨晴歸少啼猿渇下難一聞神女去風竹掃空壇巫峽曹松巫山蒼翠峽通津下有仙宫楚女真不逐綵雲歸碧落却爲暮雨撲行人年年舊事音容在日日誰家夢想頻應是荆山留不住至今猶得覩芳塵望巫山張喬溪疊雲深轉谷遲暝投孤店草蟲悲愁連遠水波濤夜夢㫁空山雨雹時邉海故園荒後賣入關𤣥鬢夜來衰東歸未必勝羇旅况是東歸未有期巫山神女廟劉禹錫巫山十二鬱蒼蒼片石亭亭號女郎曉霧乍開疑巻幔山花欲謝似殘粧星河好夜聞清佩雲雨歸時帶異香何事神仙九天上人間來就楚襄王酬人貽巴峽圖薛濤千疊雲峯萬丈湖白波分去繞荆呉感君識我枕流意重示瞿唐峽口圖巫山宋曾慥巫山不可見翠岫幾重重雲外藏三島江頭認九峯淡煙迷暝色踈雨浥秋容目斷凝貞路松風傳暮鐘離巫山晩泊掉石灘下李􅌫黃昏風雨阻江濱翠綰羣峯暮色勻一夜子規啼到曉孤舟愁殺未歸人入峽蘇軾自昔懐清賞今兹得縱探長江連楚蜀萬𣲖㵼東南合水來如電黔波緑似藍餘流細不數遠勢競相參入峽初無路連山忽似龕縈紆収浩𣺌蹙縮作淵潭風過如呼吸雲生似吐含墜崖鳴􅌥􅌥垂蔓緑􅆴􅆴冷翠多崖竹孤生有石楠飛泉飄亂雪怪石走驚驂絶澗知深淺樵童忽兩三人煙偶逢郭沙岸可乗籃野戍荒州縣邦君古子男放衙鳴晩鼓留客薦霜柑聞道黄精草叢生緑玉篸盡應充食飲不見有彭聃氣候冬猶暖星河夜半涵遺民悲昶衍舊俗接魚蠶版屋漫無瓦巖居窄似菴伐薪常冒險得米不盈甔歎息生何陋劬勞不自慙葉舟輕逺泝大浪固無諳矍鑠空相視嘔啞莫與談蠻荒安可駐幽邃信難耽獨愛孤棲鶻高超百尺嵐橫飛應自得逺颺似無貪振翮遊霄漢無心顧雀䳺塵勞世方病局束我何堪盡解林泉好多爲富貴酣試㸔飛鳥樂高遁此心甘入峽蘇轍舟行瞿唐口兩耳風鳴號𣺌然長江水千里投一瓢峽門石爲戸鬱怒水力驕扁舟落中流浩如一葉飄呼吸信奔浪不復由長篙捩舵破濆旋畏與亂石遭兩山蹙相値望之不容舠漸近乃可入白鹽最雄高草木皆倒生哀呌悲𤣥猱白雲繚長袖零露如飛毛緬懐洚水年慘慼病有堯禹益決岷水屢與山鬼鏖摧崗轉大石破地疏洪濤巉巉當道山斬截肩尾銷峭壁削下趾連峯斷修腰破處不生草上不掛鳥巢水怪不盡戮下有龍與鼇遼哉千萬年禹死遺跡牢豈必見河洛開峽斯已勞峽口宋肇萬里西南路瞿唐居上游峽分山對立江合水爭流蛟鰐從來患風波自古愁幾時飛兩槳歸去幔㠶秋瞿塘峽陳謙庸蜀諸𦍑水荆吳萬里渾不將崖約束焉免壑崩奔線引温湯浦觴浮雪水源槎程疑欲盡西望氣魂魂氣魂魂見山海經瞿塘峽二首李石我行江南上峽來繫舟夜泊雲雨臺行到西川一萬里杜鵑聲急桃花開花開歸去客在船人道雲安有杜鵑峽山無路續百丈胡獼上樹拊連天峽中前人峽水方中駐歸舟泝蜀門竹枝聲處處梅葉雪村村來去山蠻笑啼號地主恩幸然窮性命不必賦招魂峽山古調詩杜曾濫觴岷山側此江出岷山朝宗蓋自然沸沸出幽竇滔滔成巨川深流疑徹地逺勢欲浮天萬石攅若鬬一流㵼如懸二蜀通貨愽三峽爲防堅上下比入聲艱險徃來爭泝沿衝高濆氣盛轉急洶形圓行人戒仲夏招子尚耆年主舟人謂之長年三老風波雖滅裂灘磧且叢駢湍聲混蠻市漲潣入畬田傍臨股且栗順下目無前浮沫逢槎聚垂瀑依岸穿哀猿藏森上聲聳渇鹿聽潺湲幽勝祠宇宻傾危村舎連寒沙淹宿雨暖溆罩春煙青蕪隨逺曲白鳥戲輕漣常經祗名利舊隱多神仙至清逃鰌鱔極奥容鱘鱣楚臣忠義鬱屈原也巫女威福專巫山廟人多祈祀龍驤戰具敏鯀嗣導功全瞿塘十里闇灧澦一丘偏底柱不足擬吕梁誠浪傳伊予非智者被命徒勉旃尺短糾列郡寸進乗孤船一歩一竿探百丈百夫牽通夕但耿耿終日惟乾乾廢職罹罪罟委命推化甄寄言千金子狂狷可間焉雲安下偶成邵傳輕波颭鴨頭小艇翔燕尾風沙三十程雲水一千里雪盡晩寒輕日長春睡美汀蕪翹碧茅岸樹裹紅蘂江潭清鏡中山入翠屏裏蜀鳥已驚心巴猿猶側耳竹節數名灘桃花騐新水谷鸎歌尚慵檣燕舞何喜落日浪鎔金殘花風翦綺斯遊興最多了不知行止泊雲安下大風驟雨作栢梁體一篇前人晴空赤日飛丹霞扁舟春熱汗且呀寒温之候無乃差朝猶挾纊莫著紗祝融暴横勢莫加驟將炎赫移韶華東皇游冶窮豪奢未終節序還其家忍驚猛吹揚白沙煙雲四起相邀遮空中轣轆鳴雷車樅樅白雨懸亂麻風師雨將相矜夸干力萬槊爭囂譁𤣥旌皂纛何紛葩勢揺兩蜀掀三巴須㬰雨止雷停撾蒼雲掃盡天無瑕恍如脱兔離輕罝囘頭已見羲輪斜山開水盡風色嘉喜翔燕雀嬉魚鰕紅顚白倒粉殘花披張林葉舒草芽隂陽變化誰咄嗟風雲乃爾相喧拏大氣一氣通幽遐彼蒼高逺安能涯倚峯吟望心目賖碧雲千里號啼鵶雲安龍脊灘楊濟洞庭老龍時出沒萬斛舟航俱辟易此龍脊背已鐵石肯逐時好作人日我呼邦人來踏磧恍然如見紅圖出大巫雞卜占雲吉小巫竹枝歌轉激飄石揚沙障江色塵埃何處不相襲摩挲石刻聊偃息恐有老人來横笛雲安下巖杜柬之濤江翻雪巻湖灘晩泊巖扉暫解顔夙有淨縁逢寺善老無生理作僧閒殘雲已斷獨飛雨落日將沈却照山半夜秋聲驚客夢一簾珠貝冷珊珊下巖避暑留題楊邁古寺重來興轉添舟中午暑正炎炎野僧引客登山閣稚子穿雲映水簾熱得清涼身暫健老便閒靜意難厭人間刼火方撩亂法雨何如為普沾下巖唐末有劉道者定州無極人聞道於雲居膺祥師爲開巖第一祖法號道微自鑿石龕曰死便藏龕中不用時日門人奉其命二百年矣來遊者題詩不可勝讀莫能起此開巖者故予作二篇表見之其一用楊子安韻其一用王定國韻黄庭堅空巖靜發鐘磬響古木倒掛藤蘿昏莫道蒼崖鎻靈骨時應持鉢到諸村又寺古松楠老巖虚㙮廟開僧縁蠶麥去官數荔支來石空無心室雲鋪稱意苔若爲劉道者拽得鼻頭廽按部留小詩命男明復同賦郭印地渉雲安境山名燕子龕簾垂㸔急溜蓋偃得修楠牢落前賢蹟光明有佛庵幽禽知客至一一解𤣥談又郭明復道人昔日來開山山鬼悔泣門不關一時梵宇借嵓麓千載絶景歸人間松蘿鬱勃樹旌纛水泉丁東鳴珮環兩蘇寂寞涪翁死杖屨誰與同躋攀僕既與子應賦觀瀑詩矣頃之而定瀑小疏爲水簾驚變態之不窮也復記之以詩張灝朝來雨急飛瀑雄黒雲壓屋江掛虹晩來雨定瀑亦小散作水縷鏘簷櫳垂簷初似玉成綴觸石但見珠跳空嗟哉山泉一物耳朝態暮状不爾窮乃知造物解戲人千變萬化頃刻中吾恐文章要如此好把泉源驅筆鋒嵓下觀瀑早晩異状子文有詩輒次其韻何麒瀑色清明氣猶雄非煙非雲非白虹兠羅綿光透罘罳琉瓈吹影揺簾櫳風吹銀潢洒蒼壁月照玉柱擎青空誰言物象要有盡我覺端倪殊不窮思湧廻翔掀舞時句在縹緲空濛中更将七字冩亭午倚天長劍拖芒鋒水簾虞大博疏水成簾造化功冷光千丈半巖風層霄螮蝀正鋪地蒼海珠璣却墮空天下竒觀更何處騷人幽詠未全工要知出壑爭流意不向三巴直向東遊卧龍山丁謂日長春老職司閒縱轡因尋負郭山花氣半飄青靄外泉聲多在白雲間香燈肅肅嚴僧事鐘梵泠泠爽客顔坐有詩人樽有酒擬抛朝市宿禪關出郊題瀼東人家屋壁二絶馮時行入坐山如屏障捲簾風滿衣襟正是梅花時候怡融渾似春深風引晴雲度去臈催殘葉飛來短景餘寒幾日安排都放花開到䕫州曽慥衆水歸三峽悠悠萬古情白鹽無路到赤甲罕人行西瀼泉尤勝東屯穀有名豐年公事少飽暖荷恩榮䕫州冉居常縹𣺌飛樓壓舊城年年來聽峽猿吟衣裳慣見秋風冷夢寐常愁塞日隂霜露園林千古事波濤鷗鷺一生心秪應庾信頻飄泊且坐江關縁分深䕫州歌簡晁子西王從道白帝䕫州萬古城全蜀東門下相控瞿塘灔澦勢嶄絶赤甲白鹽形澒洞峽雨關雲朝暮征煙葉水花洲渚共少使冥寞减光輝山川草木人誰諷明知風月待組織可笑可笑浪嘲弄逸亭野老泛舟來廹立蒼茫遊覽縱旋提燕拂呵物象試吐清音激鸞鳳江頭一見晁廣文客裏新詩如供奉天生之子映昭代清才突出萬人衆一來道合事襟期有作正須形淮頌下瞰一隅㑹萬景豈無江靈爲供送請君作詩如畫圖收拾形容未宜空清江曲送宋尚徳自峽中囘明詹同清江水清峽水黃清江之上多緑楊浣花女兒立沙際青裙白足如秋霜蜀山雪消十日雨一夜扁舟欲齊樹兩岸猿聲不肯休送君流向峽州去長江萬里圖楊基我家岷山更西住正見岷江發源處三巴春霽雪初消百折千囘向東去江水東流萬里長人今漂泊尚他鄉煙波草色時牽恨風雨猿聲欲斷腸先生原籍蜀中嘉州人因祖仕江左生長呉中遂家焉峽中作安磐水下䕫門灔澦堆一山中斷兩屏開昭君村抱琵琶峽神女祠連雲雨臺側壁倒崖無鳥過古藤昏樹有猿哀懸燈夜泊風波惡賴此深山月下杯全蜀藝文志巻九
