body:
  text: 全蜀藝文志巻五十四明周復俊編譜氏族譜費著杜氏杜翊世以死節顯蜀舊守名其居曰忠義坊葢以勸也事詳見於先賢志矣因其世祖甫來依嚴武武卒甫旅遊衡陽二子宗文宗武留蜀甫卒塟來陽後返塟偃師故元稹誌墓謂孫嗣業終父志或者其家竟未能出蜀也家青城實宗文裔十世孫凖皇祐五年第進士官至朝散郎宰綿竹以卒妻黎携諸孤外氏家成都教子嚴必使世其家第二子即翊世紹聖元年第進士官至朝議大夫通判懐徳軍靖康元年虜㓂作西羌亦張奄至城下凡三旬援兵不至城陷翊世先火其家乃自縊死事聞特贈正議大夫命官其後十人五子慥忱以賞得官孫逸老俊老廷老曽孫光祖大臨以忠義遺澤得官翊世殁時慥棄官走視死所慟幾絶見者皆為流涕遂以䘮招母魂歸葬餘孫自曽及𤣥今為士人指其門猶曰忠義杜云宇文氏宇文氏望河南自得氏以來有譜其以史學傳自唐諫議大夫藉藉子從禮為渠州司馬因家於蜀後徙成都子孫又分六院曰成都曰雙流曰廣都曰綿竹曰嚴道曰閬中三院𨽻成都自司馬至院莫知其世世有從仁者後可譜再世後元又一世從廷從卿又一世從崇從緖從惟繼是子孫行率不類按譜始可類耳雙流院自崇而次始登第曰冊冊登嘉祐第仕郡邑間卒李公大臨為西州顔子子昌齡喬齡昌齡少年登進士甲科神宗朝遷監察御史詔言事如侍御史徽宗初為刑部侍郎子常千宰諸孫伋僎价子震與喬齡之孫仁皆顯价子震任任之子機皆第進士子震典著作兼為郎出總賦淮東晚守潼川价位至兵部尚書出以徽猷學士歴典大藩邑人見其家迭盛凡四世幾百年禨令中成州其諸從兄弟又寖顯賞傳至孫矣廣都院自緖而下凡三世登第曰邦彦邦彦初名褒登元豐第仕至郡相卒子閎中粹中虚中迭登第粹中第在第三後為尚書右丞虚中後為僉書樞宻院事終國信使諡貞愍天下聞其諡哀而敬之時中賜進士第後以直龍圖閣知潼川閎中及其子師尹師臯從子師申師獻孫紹直紹良從孫紹寅紹奕嘗為吏部郞典三州卒紹節典二州今被命紹直自郡守叅議大藩今奉祠紹猷紹彭紹莊今方典州子孫又多傳視雙流亦不勝書也惟成都房自崇至降凡三世始以子樸貴贈官樸登政和第樸族弟谷從子臨望乆望日華孫如石如圭曽孫開仲繼登第開仲今在官積世名位視雙流廣都為顯而科第不愧族望矣綿竹房亦未為顯然緖下孫之紹登第仕元豐間年餘四十與時論不合致其仕號止止先生母舅范公鎮也賦詩敬之司馬公光亦敬之程公珦後守漢州其子顥頥從之游子輝以明經第一及第仕至郡守邦彦與輝同世次視之猶兄弟然粹中時中亦待輝之子思忠猶同母兄弟粹中任思忠以官時中又任思忠之子師孟輝從弟彬登元豐第仕至郡守復自綿竹遷郫子仔仲仔仕至郡相二子猶世其賞仲亦登第是又𨽻成都矣綿竹房牽連得書故畧北劉氏劉再思以御史從僖宗自蜀還京師其子孟温成都孟温以儒傳授成都中三子長璵偽蜀廣政十年補石室教授卒門人共諡寳中先生五世孫處厚始登第四子靖􅔲竑翊􅔲翊世其科處安四子竢端竦竚竢竦亦登第劉氏家法方嚴長身偉貌世世稱之其家家城北異鄉人入北門問劉氏鄉人至謂之長劉然莅民率從厚至臨難其方嚴始見處厚官至左朝請大夫范公祖禹第元祐循吏居之第三靖􅔲皆為張公浚幕客靖議不合流落州縣􅔲受浚令往熙河劉惟輔軍時惟輔軍驕它屬莫往獨靖􅔲往惟輔戰北􅔲為敵所殺後十餘禩河南境復惟輔將屬米知柔等來歸始言狀范公成大榜其所居節義坊為此翊竦賞皆傳端雖不第士從之游甚衆自孟温至是八世今又一傳矣鄉人以其五世不異籍尤義之南劉氏劉氏譜載三世名字卒月日耳四世曰惟正曰惟盛曰惟道始詳惟正之子欽惟盛之子長源後先登進士第欽使湖南官至朝議大夫黻後賜第入館遷户部郞中官至朝請大夫後長源紹興初為監察御史典州除節官亦至朝請大夫兩家子弟賞得官黻弟薿知荆門軍卒子述今典州長源子思學賞今亦傳子參惟道三世孫始登第曰晉或贈或賞而不年者不書北郭氏蜀郭氏衆多而家於北城者人號北郭矣其自敘亦曰出汾陽王有藏汾陽王丹書鐵券可證也譜失其傳今以稹為祖稹生承訜承訜生希朴博極羣書晚精於易人號曰有道先生李公畋為作知命錄希朴前知死知命錄所以作也四子仲曰友直蓄書嘉祐求遺書友直上千餘巻皆祕閣所闕者叔曰友諒季曰友聞友聞經學鄉人號曰北郭先生仲叔氏子孫或家廣都或從唐鄧獨北郭子孫不遷四子逢通選迪逢三子行中剛中閎中選行中迭登元豐元祐第通七子倫師中乆中大中宜中時中由中倫乆中同登元豐第皆居甲科倫最通顯初仕太子學錄繼遷博士出為部刺史凡四十任其提舉江南西路忤蔡京罷其帥潼川奏蠲虚額與都轉運使不合遂致其仕蔭補子孫十有三乆中大觀二年召入冊定勅令後提舉常平河北東路嘗因星變上封事言新開邊皆不毛地小人邀功肆為誕謾書首入邪等罷歸吏部後復為郡守為刺史年裁六十一竟致其仕大中有聲太學上舍以釋褐後召為諸王府記室兼講書守両州持使節事有異政由中擢上舍異等登宣和第後給事中勾以濤薦之高廟題其姓名屏間歴守二州一持使節其學深文亦高政事自儒學出常守簡州人至今思之選五子勉中美中登第廸二子黄中登第三子皆有惠政官皆轉而二子至大夫餘子又多以子貴贈官北郭以中名者凡二十六人大抵多賢也後皆亦復名中之子曰知知之子曰公公之子曰仲仲之子曰叔叔之子曰孫自中而下取科第延世賞典州郡者不乏至以中為行者亦多在官日盛宜哉楊氏楊氏自潼川徙郫自郫徙成都譜實祖唐盈川令炯炯謫梓州司法叅軍遷盈川既卒官還塟潼因家焉盈川十一世孫天惠始家於郫以儒學稱自號回光居士元符末應詔上書入崇寜黨籍生伯詹伯詹遊太學十年不成受世賞四十二年以廸功郞年勞陞從政郞以卒時又謂不成鄉人以其道不行於時而自樂終其身共以靖安先生易其名其成乃如此子祖識家成都登第後不樂仕棲遲州縣間沈公价汪公應辰鎮蜀聞其名辟置幕府自是持節典藩視再世為顯蜀士論世不稱其官稱其徳又諡曰樂行先生三子韶甫第進士諸孫叔寅以賞得官餘皆學城南郭氏自陳來成都居來寨郭氏曰從一亦祖汾陽曰吾蔡州司徒家以子貴贈朝奉郞子溥登大觀第初名將後更今名進士題名中實二名也嘗為樞宻院編修官遷國子監丞出守劒州積官朝請大夫贈至左金紫光祿大夫四子伸似儀儔伸登宣和第儔登紹興第似儀則賞延者伸官至朝請大夫職直敷文閤鎮興元兼安撫利州似儔早死金紫葢伸儀累贈云伸及儀賞及世至似儔之子於是三畏三聘三握三接皆傳又傳至諸孫曰可道曰徳柄今惟徳柄在子孫散居城中城南尤顯亦成都百年故家施氏施氏謂魯施李叔之後唐友諒從僖宗入蜀不歸居岷山下七世孫光祚始居成都碧雞坊又三世庭臣徳修同登宣和第從兄弟也庭臣高宗朝為中書舍人晚居潭州卒徳修嘗除將作簿兼祕書丞出守洋邛二州除簡州卒子次卨次尹皆得賞官次尹官至朝請大夫今傳其子坤之昔登紹興第曰晉卿又徳修從子也庭臣子淵然仲舒登紹興第位至司農少卿遷中書門下省檢正諸房文字子棐又世其科淵然雖不顯以文稱於時初庭臣置田二頃贍宗族之貧徽猷閣直學士胡公寅為之記其族至今頼之家逺矣猶若未出蜀然者比義也楊氏楊最晚出自簡徙成都祖慶安至孫始有登進士第者四世孫承承子景温又世科其盛也四世孫至同薦者十有二是舉登進士第者四又同堂兄弟皆復名以望為行蜀人號四望從望民望最顯從望知蜀州有子曰之言登進士第今知州民望位於朝歴左司郞中移太常少卿出知綿州甫半歳復以太府少卿總蜀賦又移兩節職自直祕閣加直顯謨閣有子曰之復今通判綿州民望有清名又名文章嘗自序其世自四世慶安已上得三世墳墓七世而上無咨考至謂唐宋氏族之學不明譜牒遂廢特起者耻其初微而不志昭穆甚者或求附甲族而過於傅㑹近世言其先者必自唐扈三宗西幸或游至蜀居焉何古之蜀獨無人也且以楊氏之言在華在蜀皆承姓於姬而受氏於晉霍楊韓魏皆姬姓也儻以其支别考證未明則不必慕他郡之盛而必求其遷徙之故也其説詳矣近世以族著者因以附見焉全蜀藝文志巻五十四
