body:
  text: 全蜀藝文志巻五十九明周復俊編碑跋石經碑跋宋胡元質石經云者以俗儒穿鑿經籍疑誤後學而立也漢靈帝時博士試甲乙科争第高下至有行賄改蘭臺漆書經字者諸儒受詔於熹平成刻於光和俾天下咸取則焉碑高一丈廣四尺水經云立石大學其上悉刻蔡邕名隋志有一字石經七種其論云漢鐫七經皆蔡邕書史亦稱邕自書冊使工鐫刻其書畫超詣要非蔡中郎不能到也然遺經今存者體各不同雖中郎兼備衆體而篇章之富未必能辦於一人之手傳稱邕與堂谿典楊賜馬日磾張馴韓説單颺等正定諸經意者當時諸儒同涉筆於其間不可知也然歴年多更變故乆陵遷谷變煨燼剥蝕之餘甚至取為柱礎為砲石者唐初魏鄭公首訪求之十得其一况於今哉兹來少成墜刻於一二故家雖間斷不齊然殘圭裂璧亦可寳也因以鑱之錦官西樓庶幾補古之缺文云爾又張縯石經本末丞相洪公論載於𨽻釋詳矣洪公所未及者今粗見於此唐章懐太子引洛陽記注范曄漢書石經凡四十六碑及高澄遷石經於鄴通鑑所書為五十三碑自東漢厯魏晋宋數百年間洛陽數被兵此碑當有毁者其遷於鄴乃視洛陽記多六焉疑六陽記未詳也碑製高一文廣四尺六經文多必非四十六碑所能盡者宋常山公河南志稱石經凡七十三碑常山公博物洽聞歐陽文忠毎以古今疑事諮之河南所書必有據依矣後周伐齊毁碑以為砲石方髙緯昏亂兩陣勝負之頃猶需孽婦一觀遂以其國輸後周復何有於石經則此碑之殘毁亦宜也貞觀考古止得石經數段傳於今者亦可知其無幾矣蔡邕本傳稱邕自書冊于碑不知何體書今世所傳皆為𨽻體至儒林傳序則云為古文篆𨽻三體書法以相參檢注言古文謂孔氏壁中書以縯考之孔壁所藏皆科斗文孔安國當武帝之世已稱科斗書無能知者其承詔為尚書五十九篇作傳為𨽻古定不復從科斗文邕獨安能具三體書法於安國之後二百年哉漢建武之際杜林避地河西得古文尚書一軸諸儒共傳寳之一軸已為世所珍如此熹平距建武又幾載乃謂六經悉能為古文非事情也或者邕以三體參檢其文而書冊於碑則定為𨽻亦如孔安國之書傳耶儒林傳序疑字有誤者初邕正定六經與堂谿典等數人同受詔六經字體不一當是時書䇿者亦不獨邕也姑識其末以俟博識之君子又宇文紹奕側置給事内胡公以道德文章華我國家其經濟事業似唐李文饒而風節過之方論事上前慷慨激烈動寤淵聽在玉堂鎖闥益攄所學俾贊聖聰訂正國是被寵隆異冠絶在廷公毎以天下自任六經精㣲寓諸日用至於屋壁所藏殘編斷刻收拾無遺常嘆石經𨽻畫最古旁捜博訪合諸家所藏得蔡中郎石經四千二百七十有竒以楷書釋之又得古文篆𨽻三體石經遺字八百一十九並刻諸石永貽不朽按范曄史稱蔡邕自書冊使工鐫刻酈道元注水經亦云光和六年立石於太學其上悉刻蔡邕名則一字石經出於邕筆似無可疑若夫三體石經以儒林傳攷之則其書已出於東漢時水經乃云刻之魏正始中意者魏刻殆以補漢刻遺亡耳漢巴郡太守樊君碑跋趙明誠右漢巴郡太守樊君碑云君諱敏字叔達肇祖宓戲遺苗后稷為堯種樹舍漆徙岐天顧亶父乃萌昌發周室衰㣲覇伯匡弼晋為韓魏魯分為楊充曜封邑厥土河東樹漢之際或居於楚或集於梁君纘其緒華南西疆又云總角好學治穀氏經貫究道度無文不睹於是國君備禮招請濯冕題輿傑立忠謇有夷史之直卓宻之風鄉黨見歸察孝除郎永昌長史遷宕渠令大將軍卒光和之末京師擾攘雄狐綏綏冠履同囊封袂長驅卑走枕北國復重察辭病不就再奉朝聘七辟外臺常為治中諸部從事又云季世不祥米巫凶瘧姦狡並起䧟附者衆君執一心賴無洿恥復辟司徒道辭不往牧伯劉公表授巴郡以助義都尉養疾閭里又辟奮義校尉年八十有四歳在協洽紀騐期臻奄忽藏形其後有銘最後題建安十年二月上旬造他漢碑類多刓缺而此碑獨首尾完好故載其大畧於此所謂米巫凶瘧者謂張角也樊敏碑跋丘常此碑相傳為魏受禪碑為世絶出而此乃建安十年所立又在黄初之前雖暴露中野而字畫醇古文尚可讀豈非所闕遠而人闕知者歟然而千里闕間霖雨之所闕陽之所暴有獸已闕有闕已摧而此碑將仆是可憫也余因扶其既倒植其將仆又為屋以庇之庶幾永其傳也崇寧壬午知縣丘常題樊敏碑跋程勤皇上勵精更化以揚祖宗之大烈屬當京師父老流涕太息思欲復見漢官威儀之時而僕仕於廬山天下最處廼得建安十年巴郡太守樊君故碑於荒山榛莾間亟作大屋覆其上表而出之目其顔曰巴郡太守樊侯之墓嗚呼碑隂所記崇寧壬午距今五十八年而人之任斯邑者皆曰吾鄉人扶倒植仆偶相似然豈物之廢興固有數耶紹興己卯眉山程勤懋傳書跋蘆山縣樊敏碑明李一本右此碑踞於道周迨今幾千有餘歳矣在宋以前訛為魏受禪碑大明一統志云謂其字文漫滅不可考以故惑於聞見者不為注目予捧檄竊禄於兹屢經過焉見其荒於荆榛蝕於莓苔亦謂信然越𢎞治己未仲冬因偕門生白應清駱琰陳宣宋萬全等訪古偶憇其下因束篠為帚拂之倐見字畫隠隠而出皆醇古逈異從者進曰此商彛周鼎復出也殆竒遇乎為磨洗具楮蠟如法摹搨得墨本有三盖以防字畫之同異者考正之然其模糊不可讀者亦過半矣既而歸置軒次遂校以𨽻本叅以衆目就其可識者僅得什之九其疑誤者則傍為㸃注以俟博古者正焉載攷古文苑所紀樊毅樊安等碑亦靈獻中所作其屬辭比事與此文勢相類或者當時子遷之徒為之也夫文選所集皆秦漢以來古文而此碑獨不見録古文苑又為文選而作又不見載毋乃此地僻在遐荒而人不見知歟抑或於聞見之似而不及録歟吁是碑雖不見録於古幸而名不泐壊延有今日得以附入邑志以永其傳亦竒矣匪徒為斯邑之光實斯文之幸也然則世之為志者茍徒據耳之所托而不博厯以致審焉雖有石鼓之文其不至於湮没無聞者幾希矣是月十一日長至蜀忠南李一本識此以類附不叙時代何君閣道碑跋宋洪蜀郡太守何君閣道碑光武中元二年刻此碑蜀中近出東漢八分斯為之首字法勁古意有餘如瞻冠章甫而衣縫掖者使人起敬不暇雖敗筆成冡未易窺其籓籬也唐䕫州都督府記跋㑹昌五年歐陽修余嘗謂唐世人人工書故其名湮没者不可勝數毎與君謨嘆息於斯也如貝靈該繆師愈今人尚不知其姓名况其書乎余以集録之博僅各得其一爾後漢文翁石柱記跋右漢文翁石柱紀云漢初平五年㑹龍甲戍旻天季月修舊築周公禮殿始自文翁開泮宮據顔有意益州學舘廟堂記云按一無此字華陽國志文翁為蜀郡守造講堂作一無此字石室一名玉堂安帝永初間烈火為灾及寺舍並皆焚燎惟石室獨存至獻帝興平元年太守高眣於玉堂東偏復造石室為周公禮殿有意又謂獻帝無初平五年當是興平四字一作當如華陽志名興平元年盖時天下䘮亂西蜀僻遠年號不通故仍稱舊號也今檢范曄漢書本紀初平五年正月改為興平顔説是也治平元年六月十三日書後漢文翁學生題名跋右漢文翁學生題名凡一百有八人文學祭酒典學從事各一人司儀主事各二人左生七十三人右生三十人文翁在蜀教學之盛為漢稱首其弟子著籍者何止於此盖磨滅之餘所存者此耳治平元年六月二十日書跋漢巴官鐵銘此盆色類丹砂魯直石刻云其一闕秦刀巴弓二百五十一永平七年第二十七闕余紹興庚午嵗親見之今在巫山縣治韓暉仲云趙明誠右漢巴官鉄量銘云巴官永平七年三百五斤第二十七前代以永平紀年者凡五漢明帝晋惠帝後魏宣武李宻偽蜀王建惟明至十八年其他皆無及七年者以此知為明帝時物也此銘王無競見遺漢王稚子闕銘跋右漢王稚子闕銘一其一云漢故先靈侍御史河内縣令王君稚子闕其一云漢故兖州刺史洛陽令王君稚子之闕按范曄後漢書循吏傳王渙字稚子嘗為温令而刻石為河内令者盖史之誤渙以元興元年卒然則闕銘盖和帝時立也唐益州學舘廟堂記跋右唐益州學舘廟堂記成都縣令顔有意書撰人題法曹陳玉文學太子詹事待詔𢎞文舘陵州長史而姓名殘缺不可辨集古録直以為有意撰非也碑隂載當時官僚姓名後人題云此記賀遂亮撰未知果是否記文叙述前世遺跡考究同異文詞古雅甚可喜也漢車騎將軍馮緄碑跋碑在宕渠右漢車騎將軍馮緄以范曄後漢書考之史云字鴻卿而碑闕史云初孝亷七遷至廣漢屬國都尉拜御史中丞順帝末持節揚州諸軍事與中郎將滕撫擊破羣賊今據碑自舉孝亷至為廣漢屬國都尉凡十一遷而中丞與都使徐揚二州討賊皆在為都尉前碑云討賊時坐廹州縣正法而史不載又云為隴西太守吏闕不分去官以羗駭動為四府所表復闕拜隴西太守而史但言遷隴西太守爾史云為遼東太守徵拜京兆尹轉司𨽻校尉遷廷尉闕拜車騎將軍以碑考之緄為遼東太守以前常為治書侍御史遷尚書遂為廷尉未嘗拜京兆尹及司𨽻也史云振旅還京師監軍使者張敬承闕奏緄㑹長沙賊復起攻桂陽武陵緄以軍還盗賊復發策免而碑云臨當受封以謡言奏河内太守中常侍左琯弟坐遜位史復拜廷尉時山陽太守單遷以罪繫獄緄考致其死遷故車騎將軍超之弟中官相黨遂共誹韋誣緄坐輸左校而碑云表荆州刺史李隗南陽太守成晋晋漢史作縉太原太守劉瑱不宜以重論坐正法作左校亦皆不合史人云為河南尹時上舊典中官子弟不得為牧人職帝不納拜屯騎將軍復為廷尉卒於官而碑云復廷尉奏中官子弟不宜典牧州郡獲過左右遜位永康元年薨亦當以碑為正碑又云緄諡曰桓而史亦不載余嘗謂石刻當時所書其名字官爵不應差誤可信無疑至於善惡大節則當以史氏為據今此傳首尾顛倒錯謬如此然則史之所載是非褒貶失其實者多矣果可盡信耶漢周公禮殿記跋右漢周公禮殿記者今成都府學有漢時所建舊屋柱皆正方上狹下濶此記在柱上刻之靈帝初平五年立距今盖千年矣而字畫完好可讀當時石刻在者往往磨滅此記託於屋楹乃與金石争夀亦異矣記有云甲午年故府梓潼文君増造吏舍二百餘間按華陽國志有文參字子竒梓潼人平帝用為益州太守不從王莽公孫述光武嘉之疑此記所載即其人也盖光武建武十年歳次甲午云漢馮使君墓闕銘跋右漢馮使君基闕銘云故尚書侍郎河南京令豫州刺史馮使君神道按後漢書馮緄父煥安帝時為幽州刺史而緄碑亦云幽州君之元子此字在宕渠緄墓前雙石闕上知其為煥闕也跋東坡先生書王履道世學公書者衆矣劍拔弩張驥奔猊抉則不能無至於尺牘狎書姿態橫生不矜而妍不束而莊不軼而豪蕭散容與霏霏如零春之雨森踈掩歛熠熠如從月之星紆徐婉轉纚纚如抽繭之絲恐學者未到也題東坡字後東坡居士極不惜書然不可乞毎書者正色詰責之或終不與一字元祐中鎻試禮部毎見過案上紙不擇精麄書遍乃已性喜酒然不能四五龠已爛醉不辭謝而就卧鼻鼾如雷少焉蘇醒落筆如風雨雖謔弄皆有義味直神仙中人此豈與今世翰墨之士争衡哉跋東坡墨迹東坡道人少日學蘭亭故其書姿媚似徐季海至酒酣放浪意忘工拙字特痩勁廼似柳誠懸中歳喜學顔魯公楊風子書其合處不减李北海於筆圓而韻勝挾以文章妙天下忠義憤日月之氣本朝善書自當推為第一數百年後必有知余此論者跋古栢圖陸㳺此圖吾家舊藏予居成都七年屢至漢昭烈惠陵此栢在陵旁廟中忠武侯室之南所謂先主武侯同閟宮者與此略無小異則畫工亦當時名手淳熙六年龍集己亥六月一日陸某識跋中和院東坡帖此一巻皆蘇仲虎尚書所藏鑒定精審無一帖可疑者刻石在成都大聖慈寺中和勝相院淳熈六年六月十七日陸務觀題跋陵陽先生詩草右陵陽先生韓子章詩草一卷得之其孫藉先生詩擅天下然反復塗乙又歴疏語所從來其嚴如此可以為後軰法矣予聞先生詩成既以予人乆或累月遠或千里復追取更定無毫髮恨乃止則此草亦未必皆定本也大歇庵詩一章徐師川作而先生手録之亦足見其無昔争名之病矣故附見卷中淳熈庚子四月二十二日笠澤陸某書跋東坡問疾帖東坡先生憂其親黨之疾委曲詳盡如此則愛君憂國之際可知矣其曰勿使常醫弄疾天下之至言讀之使人感嘆彌日淳熈九年五月乙未甫里陸某書跋東坡詩草東坡此詩云清吟雜夢寐得句旋已忘固已竒矣晚謫惠州復出一聨云春江有佳句我醉墮渺莽則又加於少作一等近世詩人老而益嚴盖未有如東坡者也學者或以易心讀之何哉淳熙九年五月二十六日玉局祠吏陸某書于鏡湖下鷗亭跋三蘇遺文此書蜀郡呂商隠周輔所編周輔入朝為史官得唐安以歸未至家暴卒可悲也淳熙十一年正月十一日務觀識跋東坡書髓成都西樓下石刻東坡帖十卷擇其尤竒逸者為一編號東坡書髓三十年間未嘗釋手去歳都下脱敗甚乃再裝緝之嘉泰三年歳在癸亥九月三日務觀老學庵北牕手記跋關著作行記著作闗公出使峽中風采峻甚仕者人人震慄莫敢仰視某以孤生起罪籍萬里佐州淺闇滯拙自期且汰去而闗公獨厚遇之舉酒賦詩談臺閣舊事忘其位之重也公免歸之明年某以事至卧龍山咸平寺長老惠連言公徃有行記今特刻之石因屬某書其末某曰方闗公之門可炙手時此書伏不出今公歸卧青城山中賔客解散形勢一變而連方刻其書為不朽計嗟乎足以愧士大夫矣乾道七年七日左奉議郎通判䕫州軍州主管學事陸某謹識跋先氏書巖元虞集凉國公勲業聞望著于天下我國家蓍龜也年七十餘閑居金陵又以文章學問為吾道砥柱其得於天而裕於人何其盛哉讀書巖之記序其源委博贍考據鄉里晚生後進盖有不及聞者吾蜀百十年故家舊族若先氏巖者多有之矣安得一一表章於大臣元老之手乎然先氏子孫所恃以不朽者不徒在於巖者矣跋先氏書巖謝端端亦蜀人也流離江漢間幾十餘年矣某山某水不知幾何所讀書巖之記始知先氏之有賢子孫矣端今老矣行於四方欲求一畆之居而不可得吾蜀多異人異書何時扁舟泝江而上從書巖嵐光林影之下求其遺書而讀之庶幾補過以希前修汝礪可尚不吾却也其可感慨也夫跋宋太史楹銘明獻園積邱山之善尚未為君子貪絲毫之利便陷於小人右金華宋太史景濓楹銘盖其引年而歸田里時所作也昔衛武公年九十猶作抑詩以自警即此意歟其門人王紳為予書此予取而讀之悚然若親見大史於前也惕然若親聞太史之言也所謂雖無老成人尚有典型者信乎古語云從善如登從惡如崩可不慎哉今觀紳文章孝友蚤有時望誠可謂青出於藍氷寒於水者矣然於此銘尤當書諸紳而弗忘則非惟無負於太史亦無負於已之所學也特識數語以歸於某且用以自勗跋鮮于樞書諸葛表後惠園鮮于太常伯機胷次無滯迹所書漢丞相諸葛公出師二表真墨筆力遒勁韻度不凡得妙中之妙與趙松雪相伯仲宜其為世所寳余罷朝毎毎披閲心目豁然但恐其墨渝紙弊不能乆有於天地間因命工勒石以惠來學云時成化十三年五月一日識跋釣魚城志後鄒智予嘗觀天下之大勢矣立國於北者恃黄河之險立國於南者恃長江之險而蜀寔江之上㳺也敵人有蜀則舟師可自蜀涪江而下而長江之險敵人與我共之矣由此言之守江尤在於守蜀也元南侵而必自蜀始豈非有見於此與冉氏弟兄受知余玠而首畫城釣魚之䇿王堅張珏且戰且守至死不渝豈非有見於此與向使無釣魚城則無蜀乆矣無蜀則無江南乆矣宋之宗社豈待崖山而後亡哉嗚呼當兹城之成也宋無西顧之憂元無東下之路使賈似道能用汪立使之䇿陳宜中能用文天祥之䇿下㳺與上㳺齊奮内郡與外郡併力天下事未可知也天時不齊人事好乖令人有千古不平之憤牟女打虎賦跋魏瀚粤王化既邈習俗澆薄雖父子兄弟夫婦利害所在不相顧惜甚至戕恩賊義有難言者余遷守兹郡聽讞之際凡悖倫傷恩者靡不開其蔽而通其明全其情而懼以法然固有心革威懾翻然悔悟者而倫理尚未見厚訟獄終未能清豈身敎之政有未至而習染之錮未易新耶僉憲范公追賦牟氏打虎救母詩惓惓以牟女之孝為足重而守令能旌勸為可嘉公復以職在觀風申諭吾民勿使是女專美於前公之究心扶持世敎弭息訟源不特文字之可稱述而已凡在吾民獨不思牟一弱女而孝心激烈捍虎救母奮不顧身况壯而為男子者乎又况讀書明理為丈夫者乎全蜀藝文志卷五十九
