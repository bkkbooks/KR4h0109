  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0109_WYG_022-1a, image: WYG1381/WYG1381-0230c.png}
body:
  text: 全蜀藝文志巻二十二明周復俊編詩雜賦白頭吟古辭皚如山上雪皎如雲間月聞君有兩意故来相決絶一觧平生共城中何甞斗酒㑹今日斗酒㑹明旦溝水頭蹀躞御溝上溝水東西流二解郭東亦有樵郭西亦有樵兩兩相推與無親為誰驕三解凄凄重凄凄嫁娶亦不啼願得一心人白頭不相離四解竹竿何嫋嫋魚尾何離簁男兒欲相知何用錢刀為􅀈如馬噉萁川上髙士嬉今日相對樂延年萬嵗期五解詶宇文少府贈桃竹書筒唐李白桃竹書筒綺繡文良工巧妙稱絶羣靈心圎映三江月彩質叠成五色雲中藏寳訣峨眉去千里提携長憶君成都為客作田澄蜀郡将知逺城南萬里橋衣緣鄊淚濕貌以客愁銷地富魚為米山芳桂是樵旅逰惟得酒今日過明朝蜀人為南蠻俘虜四首雍陶但見城池還漢将豈知佳麗属蠻兵錦江南渡聞遥哭盡是離家别國聲大渡河邊蠻亦愁漢人将渡盡囬頭此中郵寄思鄊淚南去應無水北流越巂城南無難地傷心從此便為蠻寃聲一慟悲風起雲暗青天日下山雲南路出陷河西草長青蕪瘴色低漸近蠻城誰敢哭一時収淚羨猿啼蜀城戰後感事前人蜀國英靈地山重水又回文章四子盛道路五丁開詞客題橋去忠臣叱馭来卧龍同駭浪躍馬比浮埃巳與無妖土那知有禍胎畨兵依漢栁蠻斾指江梅戰後悲逢血燒餘更見灰空留犀厭怪無復酒除災嵗積萇𢎞怨春深杜宇哀家貧移未得愁上望鄊臺蜀國經蠻後寄雍陶馬異酋馬渡瀘水北来如鳥輕㡬年期鳳闕一日破龜城此地有征戰誰家無死生人悲還舊里鳥喜下空營弟姪意初定友朋心尚驚自從經難後吟苦似猿聲獨愁李崇嗣聞道成都酒無錢亦可求不知将㡬許銷得未来愁郭震蜀人賦東郊詩因走京師言蜀将亂後果有李順之變前人今日出東郊東郊如春色青青原上草莫教征馬食資州宴行營回将詩羊士諤几劍盈庭酒滿巵戍人歸日及𤓰時元戎静鎮無邊事遣向營中偃畫旗題鄭處士隱居唐求不信最清曠及来愁巳空數㸃石泉雨一溪霜葉風業在有山處道成無事中酌盡一尊酒病夫顔亦紅浣溪女宋陸㳺江頭女兒雙髻丫常隨阿母供桑麻當户夜織聲咿啞地爐豆䕸煎土茶長成嫁與東西家柴門相對不上車青裙竹笥何所差挿髻􅂱􅂱牽牛花城中妖姝臉如霞争嫁官人慕豪華青驪一出天之涯年年傷春抱琵琶和范舍人永康青城道中作前人風馳雨壓無浮埃驂驔千騎東方來勝㳺公自輩王謝浮社我亦追宗雷􅡵山樓上一倚徙如地始闢天初開廓然眼界三萬里山一蟻垤水一杯世間幻妄㡬變滅政自不滿吾曹咍丈夫本願布衣老矍鑠詎畏蒼顔催君看神君嵗食羊四方處處棄骨髙成堆西山老翁食松麵造物賦予何遼哉逰華山張超谷魯文太華鎖深谷我来真景分有苖皆是藥無石不生雲急瀑和烟瀉清猿帶雨聞幽棲未忍别峯半月将曛卭州東園晚興文同公林時得岸輕紗門外誰知吏隱家鬭鴨整羣翻荇葉乳烏無數墮松花携琴秀野彈流水設席芳洲詠落霞向晚雙親共諸子相将来此樂無涯秀野芳洲二亭國朝自建隆至大中祥符十年垂五十載謝頥素始奏名甫官太守陳逸賞死却王褒五百春資中不見有詞臣今朝忽遇登龍客喜殺西郊謝逸人山居張孝祥松韻笙竽徑雲容水墨天人行春色裏鶯語落花邊脩竹一間屋清泉二頃田了無官府事鷄犬慕登仙代祀西嶽至成都作元虞集我到成都纔十日駟馬橋下春水生度江相送荷生意過家不留非我情鸕鷀䡖筏下溪足鸚鵡小牕知客名頼得郫筒酒易醉夜深衝雨漢州城大祀明蹇義禮嚴大祀肅千官法駕遥臨衆樂攅月轉觚稜分夜景天逥複道散春寒煌煌炬焰分清野靄靄爐煙繞玉壇上帝居歆期賜福慶成明日拜金鑾早朝應制前人龍樓曙色映晴曦冠佩欣欣集鳳池民物萬方均雨露車書一統混華夷祥光映闕春雲粲佳氣浮空曉漏遲寵沐聖恩深似海微臣何以乂雍熙折楊栁晏鐸河橋殘栁半無枝多為行人贈别離羌虜不知蕭索盡月明空向笛中吹拾遺與蕭紀詩梁元帝囘首望荆門驚浪且雷奔四鳥嗟長别三聲悲夜猿答元帝詩蕭紀水長三江急雲生三峽昏願貰淮南罪思報阜陵恩峨眉老人别子歌宋謝翺峨眉有老人奉命過嵩少天風吹西翼冉冉朝夕照濕塵紛墮天髪白更待報有子為異物不待入闕廟慟哭東南雲相望蒼海嶠青鳥年年來寄書久不到南充紀侯廟聞道將軍是邑人扶龍今有幾家村紀侯故里名扶龍寧存夘金死義氣未必丁火灰忠魂周苛一烹後世顯湘潭互出史筆渾湘潭紀侯二子名漢封班史俱兩負負與不負何足論全蜀藝文志巻二十二
