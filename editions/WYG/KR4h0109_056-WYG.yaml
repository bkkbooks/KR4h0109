body:
  text: 全蜀藝文志巻五十六明周復俊編譜噐物譜元費著玉璧玉印各一印文似成信字雍州兵於成都縣獲之衛瓘依周成王歸禾之義以上之相國府魏咸熈元年於是司馬氏宣示百官仍藏之府公孫述起成都自號成家二五之文殆述作也淳于古禮噐也廣漢邡人段祖以獻之益州刺史始興王蕭鑑高三尺六寸六分圍三尺四寸圓如筩銅色如漆甚薄上有銅馬以繩貫馬令去地尺餘灌之以水又以噐盛水於下以芒莖當心跪注淳于以手振芒則聲如雷清響良乆乃絶古所以節樂古鐵鑑一王宗壽字永年建族子得之江源下有篆文十二字宗壽覧照見一青衣小兒坐酒樓上試令人訪之青衣隨至謂宗壽曰何以知我宗壽以實對青衣曰吾失此百年矣知在公處故此盤桓公其還我宗壽出而與之青衣剖腹納長揖而去宗壽有辟穀吐納之術或謂得之青衣今載其篆文云龍宮寳藏神和子鑄永年萬歳銅印一廣政十四年冬十月十五日彭山縣副將頭楊富獲於江㟁印有六面方各寸許皆有篆文兩面共通一竅竅中三虛一實其直可貫其圓有規六面篆文共八十二十分夹其竅六十均在四旁各成文章印過雕鏤有竅面各一十字無竅面各十五字以印進上嚴築作瑞篆記今載其篆文于左一靣天國老君生萬民治中國外國人和璽凡十五字其相對一面云老君授生輔天下國安平受道人長生凡十五字又一面虗無自然明日月辰星光凡十字其相對一面云𤣥女致和氣玉女致天醫凡十字又一面上國僊師天帥老君道成明天地政璽凡十五字其相對一靣云上召吾拜無為大古器九崇寧元年知府王公古修築嚴真觀五月於觀之西南隅凡二日得之丁夘得鼎二喜一缶一鼎有明水喜有丹砂越三日又得喜一缶一虺鼎一鼎有篆文可考又器一如鼎而無文又一如喜而小異又五銖錢千共得器凡九小大異形製作竒古非世所常有因刻其名物於石開封張裕為記刻石具在九器則歸諸天府矣今摹置左方小金印一建炎初盧公法原修治羅城役夫得之以獻公因㑹鄉老出而薄觀有識其文者曰漢破虜羌侯五字字分作三行漢字居其一公以印寄帑紹興十年胡公世將揵於剡家灣張公壽一因取送胡公按漢土德故印章以五成此先漢時物但不知封侯者為何人又虜羗二字連稱亦史冊所未有疑不能明也唐鐵劵二昭宗以賜陳敬瑄田令孜也劵形方如半甑縱長尺餘横廣不及二尺以金為字今在軍資庫但金已剥落無餘字益漫滅間有不可識者敬瑄以中和三年十月受賜令孜以四年十一月受賜僖宗猶在成都明年僖宗還京師後此八年當景福六年四月二人俱為王建所殺據新唐書盖同日死令孜與敬瑄實斵䘮唐室何功之有焉雖冐受此劵卒不可用天道果昭昭乎劵字益就漫滅可惜録其槩左方敬瑄劵文承㫖樂明龜作唐末之號令文章其氣象類如此也其畧曰烹巨鰲者鼎大於滄海斬長鯨者劍倚於青天既立異勲克膺殊寵李晟免其十死子儀成其九功鎮以金鏞賜其鐵劵後來繼者豈在他人又曰致朕身安由卿忠藎前封公爵後錫郡王詢於衆情未惬羣望今賜卿鐵劵舍卿十死瑄鐵劵官宰臣姓名漫滅不可復識田令孜鐵劵文其略曰人臣之績古今莫儔爵位不足以答元勲竹帛不足以紀大節式遵盛典用表殊庸宣賜駱谷扈從定難中興社稷功臣仍恕十死宰臣裴澈敬瑄令孜與建罪等耳敬瑄令孜幸而不成是以建獨曰叛方中和褒敬瑄功時曰子儀曰晟不得專美於前令孜又自有宦者來無此榮也識者謂墓石猶砢石爾無用也鐵劵其不類是乎使無一卷史書君子何無恃哉牋紙譜前人古者書契多編以竹簡其次用練帛至以木膚麻頭敝布魚網為紙自東漢蔡倫始簡太重縑稍貴人遂以紙為便倫宦者也傳多稱其能然受宫掖風㫖謟親貴猶宦者態也智足以創物而亦足以殺身第於文字有功人至今稱蔡倫紙今天下皆以木膚為紙而蜀中乃盡用蔡倫法牋紙有玉板有貢餘有經屑有表光玉板貢餘雜以舊布破履亂麻為之惟經屑表光非亂麻不用於是造紙者廟以祀蔡倫矣廟在大東門雪峯院雖不甚壯麗然毎遇歳時祭祀香火纍纍不絕示不忘本也恩足以及數十百家雖千載猶不忘如此易以西南為坤位而吾蜀西南重厚不浮此坤之性也故物生於蜀者視他方為重厚凡紙亦然此地之宜也府城之南五里有百花潭支流為二皆有橋焉其一玉溪其一薛濤以紙為業者家其傍錦江水濯錦益鮮明故謂之錦江以浣花潭水造紙故佳其亦水之宜矣江傍鑿臼為碓上下相接凡造紙之物必杵之使爛滌之使潔然後隨其廣狹長短之制以造砑則為布紋為綾綺為人物花木為蟲鳥為鼎彛雖多變亦因時之宜紙以人得名者有謝公有薛濤所謂謝公者謝司封景初師厚師厚創牋樣以便書尺俗因以為名薛濤本長安良家女父鄖因官寓蜀而卒母孀養濤及笄以詩聞外又能掃眉塗粉與士族不侔客有竊與之宴語時韋中令臯鎮蜀召令侍酒賦詩僚佐多士為之改觀朞嵗中令議以校書郎奏請之䕶軍曰不可遂止濤出入幕府自臯至李徳裕凡歴事十一鎭皆以詩受知其間與濤唱和者元稹白居易牛僧孺令狐楚裴度嚴綬張籍杜牧劉禹錫呉武陵張祐餘皆名士記載凡二十人競有酬和濤僑止百花潭躬撰深紅小彩牋裁書供吟獻酬賢傑時謂之薛濤牋晚嵗居碧鷄坊創吟詩樓偃息於上後段文昌再鎮成都太和嵗濤卒年七十三文昌為撰墓誌謝公有十色牋深紅粉紅杏紅明黃深青淺青深緑淺緑銅緑淺雲即十色也楊文公億談苑載韓浦寄弟詩云十樣蠻牋出益州寄來新自浣花頭謝公牋出於此乎濤所製牋特深紅一色爾偽蜀王衍賜金堂縣令張蠙霞光牋五百幅霞光彩疑即今之彤霞牋亦深紅色也盖以胭脂染色最為靡麗范公成大亦愛之然更梅溽則色敗萎黄尤難致遠公以為恨一時把玩固不為乆計也濤以牋名可闕乃失身為妓韋尹欲官之叚尹誌其墓焉何哉時幕府闕下闕縱適不闕大扺唐藩鎭不度皆習然也濤固闕公似以濤失云紙固多品皆玉板表光之苗裔也近年有百韻牋則合闕兩色材為之其横視常紙長三之一可以寫詩百韻故云人便其從闊可以放筆快書凡紙皆有連二連三連四售者連四一名曰船牋又有青白牋背青面白有學士牋長不滿尺小學士牋又半之倣姑蘇作雜色粉紙曰假蘇牋皆印金銀花於上承平前軰盖常用之中廢不作比始復為之然姑蘇紙多布紋而假蘇牋皆羅紋惟紙骨柔薄耳若加厚壯則可勝蘇牋也蜀牋體重一夫之力僅能荷五百畨四方例貴川牋盖以其遠號難致然徽紙池紙竹紙在蜀蜀人愛其輕細客販至成都毎畨視川牋價幾三倍范公在鎮二年止用蜀紙省公帑費甚多且怪蜀諸司州縣緘牘必用徽池紙范公用蜀紙重所輕也蜀人事上則不敢輕所重矣此以價大小言也余得之蜀士云澄心堂紙取李氏澄心堂樣製也盖表光之所輕脆而精絶者中等則名曰玉水紙最下者曰冷金牋以供泛使廣都紙有四色一曰假山南二曰假榮三曰冉村四曰竹絲皆以楮皮為之其視浣花牋紙最清潔凡公私簿書契劵圖籍文牒皆取給於是廣幅無粉者謂之假山南狹幅有粉者謂之假榮造於冉村曰清水造於龍溪鄉曰竹絲蜀中經史子集皆以此紙傳印而竹絲之輕細似池紙視上三色價稍貴近年又倣徽池法作勝池紙亦可用但未甚精緻爾雙流紙出於廣都毎幅方尺許品最下用最廣而價亦最賤雙流實無有也而以為名盖隋煬帝始改廣都曰雙流疑紙名自隋始也亦名小灰紙蜀錦譜前人蜀以錦擅名天下故城名以錦官江名以濯錦而蜀都賦云貝錦斐成濯色江波遊蜀記云成都有九璧村出羙錦嵗充貢宋朝嵗輸上供等錦帛轉運司給其費而府掌其事元豐六年吕汲公大防始建錦院於府治之東募軍匠五百人織造置官以涖之創樓於前以為積藏待發之所榜曰錦官公又為之記其畧云設機百五十四日用挽綜之工百六十四用杼之工五十四練染之工十一紡繹之工百一十而後足役嵗貴絲權以兩者一十二萬五千紅藍紫茢之類以斤者二十一萬一千而後足用織室吏舍出納之府為屋百一十七間而後足居自今考之當時所織之錦其别有四曰玉貢錦曰官告錦曰臣僚襖子錦曰廣西錦總為六百九十疋而已渡江以後外攘之務十倍承平建炎三年都大茶馬司始織造錦􅀈被褥折支黎州等處馬價自是私販之禁興又以應天北禪鹿苑寺三處置場織造其錦自真紅被褥而下凡十餘品於是中國織紋之工轉而衣被椎髻鴃舌之人矣乾道四年又以三塲散漫遂即舊亷訪司潔已堂創錦院悉聚機戸其中猶恐私販不能盡禁也則倚宣撫之力建請於朝併府治錦院為一俾所𨽻工匠各以色額織盖馬政既重則織造益多費用益夥隄防益宻其勢然也今取承平時錦院與今茶司錦院所織錦名色著於篇俾來者各以時考之轉運司錦院織錦名色即成都府錦苑玉貢錦三疋花樣八答暈錦官告錦四百疋花樣盤毬錦簇四金鵰錦葵花錦八答暈錦六答暈錦翠池獅子錦天下樂錦雲鴈錦臣僚襖子錦八十七疋花樣簇四金鵰錦八答暈錦天下樂錦廣西錦二百疋花樣真紅錦一百疋大窠獅子錦大窠馬打毬錦雙窠雲鴈錦宜男百花錦青緑錦一百疋宜男百花錦青緑雲鴈錦茶馬司錦院織錦名色茶馬司須知云數多寡以用折隨蕃蠻中到馬無一定之數黎州皂大被緋大被皂中被緋中被四色中被七八行錦瑪瑙錦叙州真紅大被褥真紅雙連椅背真紅單椅背南平軍真紅大被褥真紅雙窠錦皂大被褥青大被褥文州犒設紅錦細色錦名色青緑瑞草雲鶴錦青緑如意牡丹錦真紅宜男百花錦真紅穿花鳳錦真紅穿花毬露錦真紅櫻桃錦真紅水林禽錦鵝黄水林禽錦紫皂叚子真紅天馬錦真紅飛魚錦真紅聚八仙錦真紅六金魚錦秦州細法真紅錦秦州中法真紅錦秦州法真紅錦真紅湖州大百花孔雀錦四色湖州百花孔雀錦二色湖州大百花孔雀錦紀錦裙附録唐陸龜䝉侍御史趙郡李君好事之士也因余話上元瓦官寺有陳後主羊車一輪天后武氏羅裙佛幡皆組繡竒妙李君乃出蜀錦裙一幅示余長四尺下廣上狹下闊六寸上减三寸半皆周尺如直其前則左有鶴二十勢如飛起率曲折一脛口中衘莩蘤軰右有鸚鵡聳肩舒尾闕與鶴相等一禽大小不類而隔以花卉均布無餘地闕道四向五色間雜道上累細鈿㸃綴其中㣲雲瑣結互以相帯有若駮霞殘虹流煙墮霧春草夾徑遠山截空壊墻古苔石泓秋水印丹浸漏粉蝶集作粉蕋塗染盩縆環珮雲隠涯㟁濃澹霏拂靄抑㝠宻始如不可辨别及諦視之條段斬絶分畫一一有去處其繡繪縝緻柔美又不可狀也裏用繒綵下製綫尚如舊兩旁皆解散盖坼滅零落僅存此故耳縱非齊梁物亦不下三百年矣昔時之工如此妙耶曵其裾者復何人焉因筆之為辭繼于錦譜之後俾善詩者賦焉慎按羅泌國名記云書云𦙍之舞衣𦙍夏諸侯國今利之𦙍山乾德三年曰平蜀天寳元年曰𦙍山出舞衣今川錦也由是考之蜀錦之名遐而尚矣天彭牡丹譜宋陸游牡丹在中州洛陽為第一在蜀天彭為第一天彭之花皆不詳其所自出土人云曩時永寧院有僧種花最盛俗謂之牡丹院春時賞花者多集于此其後花稍衰人亦不復至崇寧中州民宋氏張氏蔡氏宣和中石子灘楊氏皆賞買洛中新花以歸自是洛花散於人間花戶始盛皆以接花為業大家好事者皆竭其力以養花而天彭之花遂冠兩川今惟三并李氏劉村母氏城中蘇氏城西李氏花特盛又有餘力治亭舘以故最得名至花户連畛相望莫得其姓氏也天彭三邑皆有花惟城西沙橋上下花尤超絶由沙橋至堋口崇寧之間亦多佳品自城東扺濛陽則絶少矣大扺花品近百種然著者不過四十而紅花最多紫花黃花白花各不過數品碧花一二而已今自狀元紅至歐碧以類次第之所未詳者姑列其名於後以待好事者狀元紅祥雲紹興春臙脂樓玉腰樓金腰樓雙頭紅富貴紅一尺紅鹿胎紅文公紅政和春醉西施迎日紅彩霞疊羅勝疊羅瑞露蟬乾花大千葉小千葉右二十一品紅花紫繡毬乾道紫潑墨紫葛巾紫福嚴紫右五品紫花禁苑黃慶雲黄青心黄黄氣毬右四品黃花玉樓子劉師哥玉覆盆右三品白花歐碧右碧花轉枝紅朝霞紅金紅瑞雲紅壽陽紅探春毬朱嚢紅福勝紅油紅青絲紅紅鵝毛粉鵝毛蹙金毬間緑樓銀絲樓六對蟬洛陽春海芙蓉膩玉紅内人嬌胡天紫陳州紫袁家紫御衣紫蘄黄玉抱肚勝瓊白玉盤碧玉盤界金樓樓子紅右三十一品未詳花釋名洛花見紀於歐陽公者天彭徃徃有之此不載載其著於天彭者彭人為花之多葉者京花單葉者川花近歳尤賤川花賣不復售花之舊栽曰祖花其新接頭有一春兩春者花少而富至三春則花稍多及成樹花雖益繁而花葉减矣狀元紅者重葉深紅花其色與輕紅潜緋相類而天姿富貴彭人以冠花品多葉者謂之第一架葉少而色稍淺者謂之第二架以其髙出衆花之上故名狀元紅或曰舊制進士第一人即賜茜袍此花如其色故以名之祥雲者千葉淺紅花妖􅃩多態而花葉最多花户王氏謂此花如朶雲狀故謂之祥雲紹興春者祥雲子花也色淡佇而花尤富大者徑尺紹興中始傳大抵花户多種花子以觀其變不獨祥雲耳臙脂樓者深淺相間如臙脂染成重趺累萼狀如樓觀色淺者出於新繁勾氏色深者出於花户宋氏又有一種色稍下獨勾氏花為冠金腰樓玉腰樓皆粉紅花而起樓子黄白間之如金玉色與臙脂同類雙頭紅者並蒂駢蕋色尤鮮明出於花戸宋氏始秘不傳有謝主簿者始得其種今花戸往往有之然養之得地則歳歳皆雙不爾則間年矣此花之絶異者也富貴紅者其花葉圓正而厚色若新染乾者他花皆落獨此抱枝而稿亦花之異者一尺紅者深紅頗近紫色花靣大幾尺故以一尺名之鹿胎紅者鶴領紅子花色紅㣲帯黄上有白㸃如鹿胎極化工之妙歐陽公花品有鹿胎花者乃紫花與此頗異文公紅者出於西京潞公園亦花之麗者其種傳蜀中遂以文公名之政和春者淺粉紅花有絲頭政和中始出醉西施者粉白花中間紅暈狀如酡顔迎日紅與醉西施同類淺紅花中特出深紅花開最早而妖麗奪目故以迎日名之彩霞者其色光麗爛然如霞疊羅者中間𤨏碎如疊羅紋勝疊羅者差大於疊羅此三品皆以形而名之瑞露蟬亦粉紅花中抽碧心如合蟬狀乾花者粉紅花而分蟬旋轉其花有大千葉小千葉皆粉紅花之傑者大千葉無碎花小千葉則花萼𤨏碎故以大小别之此二十一品皆紅花之著者也紫繡毬一名新紫花盖魏花之别品也其花間正如繡毬狀亦有起樓者為天彭紫花之冠乾道紫色稍淡而暈紅出未十年潑墨者新紫花之子花也單葉深黑如墨歐公記有葉底紫近之葛巾紫花圓正而富麗如世人所載葛巾狀福嚴紫亦重葉紫花其葉少於紫繡毬莫詳所以得名按歐公所紀有玉版白出於福嚴院土人云此花亦自西京來謂之舊紫花豈亦出於福嚴耶禁苑黃盖姚黃之别品也其花閑淡髙秀可亞姚黄慶雲黄花葉重複郁然輪囷以故得名青心黄者其花心正青一本花往往有兩品或正圓如毬或層起成樓子亦異矣黄氣毬者淡黄檀心花葉圓正間背相承敷腴可愛玉樓子者白花起樓髙標逸韻自然是風塵外物劉師哥者白花帯㣲紅多至數百葉纎妍可愛莫知何以得名玉覆盆者一名玉炊餅盖圓頭白花也碧花止一品名曰歐碧其花淺碧而開最晚獨出歐氏故以姓著大抵洛中舊品獨以姚魏為冠天彭則紅花以狀元紅為第一紫花以紫繡毬為第一黄花以禁苑黄為第一白花以玉樓子為第一然花戸嵗益培接新特間出將不特此而已好事者尚屢書之天彭號小西京以其俗好花有京洛之遺風大家至千本花時自太守而下徃徃即花盛處張飲㡩幙車馬歌吹相屬最盛於清明寒食時在寒食前者謂之火前花其開稍乆火後則易落最喜隂晴相半時謂之養花天栽接剔治各有其法謂之弄花一年看花十日之語故大家例惜花可就觀不敢輕剪盖剪花則次年花絶少惟花戸則多植花以牟利雙頭紅初出時一本花最直至三十千祥雲初出亦直至七八千今尚兩千州家嵗常以花餉諸臺及旁郡蠟帯筠籃旁午于道予客成都六年嵗常得餉然率不能絶佳淳熈丁酉嵗成都師以善價私售於花戸得數百苞馳騎取之至成都露猶未晞其大徑尺夜宴西樓下燭熖與花相映影揺酒中繁麗動人嗟乎天彭之花要不可望洛中而其盛已如此使異時復兩京王公卿相築園第以相誇尚予幸得與觀焉其動蕩心目又宜何如也明年正月十日山隂陸游書牡丹譜胡元質大中祥符辛亥春府尹任公中正宴客大慈精舍州民王氏獻一合歡牡丹公即命圖之士庶創觀闐咽終日蜀自李唐後未有此花凡圖畫者唯名洛陽花偽蜀王氏號其苑曰宣華權相勲臣競起第宅上下窮極奢麗皆無牡丹惟徐延瓊聞秦州董成村僧院有牡丹一株遂厚以金帛歴三千里取至蜀植于新宅至孟氏於宣華苑廣加栽植名之曰牡丹苑廣政五年牡丹雙開者十黄者白者三紅白相間者四後主宴苑中賞之花至盛矣有深紅淺紅深紫淺紫淡黄鏂黃潔白正暈倒暈金含樓金含稜銀含稜傍枝副搏合歡重臺至五十葉面徑七八寸有檀心如墨者香聞至五十歩蜀平花散落民間小東門外有張百花李百花之號皆培子分根種以求利毎一本或獲數萬錢宋景文公祁帥蜀彭州守朱君綽始取楊氏園花凡十品以獻公在蜀四年毎花時按其名徃取彭州送花遂成故事公於十種花尤愛重錦被堆嘗為之賦盖他園所無也牡丹之性不利燥濕彭州邱壤既得燥濕之中又土人種蒔偏得法花開有至七百葉而可徑尺以上今品類幾五十種繼又有一種色淡紅枝頭絕大者中書舍人程公厚倅是州目之為祥雲其花結子可種餘花多取單葉花本以千葉花接之千葉花來自洛京土人謂之京花單葉時號川花爾景文所作賛别為一編其為朱彭州賦牡丹詩有蹄金㸃鬢宻璋玉鏤跗紅香惜持來遠春應摘後空之句今西樓花數欄花不甚多而彭州所供率下品范公成大時以錢買之始得名花提刑程沂預㑹歎曰自離洛陽今始見花爾程公故洛陽人也海棠記序沈立蜀花稱美者有海棠焉然記牒多所不録盖恐近代有之何者古獨棄此而取彼耶嘗聞真宗皇帝御製後苑雜花十題以海棠為章賜近臣唱和則知海棠足與牡丹抗衡而可獨歩於西州矣因捜前志惟唐相賈元靖耽著百花譜以海棠為花中神僊誠不虛美近世名儒巨賢發于歌詠清辭麗句往往而得至慶厯中為縣洪雅春多暇日地富海棠幸得東道主惜其繁艶為一隅之滯卉為作海棠記叙其大槩及編次諸公詩句于右復率蕪拙作五言百韻詩一章四韻詩一章附于巻末好事者幸無誚焉海棠記前人棠之稱甚衆若詩有蔽芾甘棠又曰有杖之杜又爾雅釋木曰杜甘棠也郭璞注今之杜梨杜赤棠白者棠又呂氏春秋果之美者棠實又俗説有棣棠棠梨沙棠味如李無核較是數説俱非謂海棠也凡今草木以海為名者酉陽雜俎云唐賛皇李德裕嘗言花名中之帯海者悉從海外來故知海椶海柳海石榴海木𤓰之類俱無聞於記述豈以多而為稱耶又非多也誠恐近代得之於海外耳又杜子美海椶行云欲裁北辰不可得惟有西域胡僧識若然則賛皇之言不誣矣海棠雖盛稱於蜀而蜀人不甚重今京師江淮尤競植之毎一本價不下數十金勝地名園目為佳致而出江南者復稱之曰南海棠大抵相類而花差小色尤深耳棠性多類梨核生者長遲逮十數年方有花都下接花工多以嫩枝附梨而贅之則易茂矣種宜壚壤膏沃之地其根色黃而盤勁其木堅而多節其外白而中赤其枝柔宻而條暢其葉類杜大者縹緑色而小者淺紫色其紅花五出初極紅如臙脂㸃㸃然及開則漸成纈暈至落則若宿粧淡粉矣其蒂長寸餘淡紫於葉間或三蕚至五蕚為藂而生其蕋如金粟蕊中有鬚三如紫絲其香清酷不蘭不麝其實狀如梨大如櫻桃至秋熟可食其味甘而㣲酸兹棠之大槩也糖霜譜洪邁糖霜之名唐以前無所見自古食蔗者始為蔗漿宋玉招魂所謂胹鱉炰羔有蔗漿是也其後為蔗餳孫亮使黄門就中藏吏取交州所獻甘蔗餳是也後又為石蜜南中八郡志云榨甘蔗汁曝成飲謂之石蜜本草亦云煉糖和乳為石蜜是也後又為蔗酒唐赤土國用甘蔗作酒雜以紫𤓰根是也唐太宗遣使至摩掲陀國取熬糖法即詔揚州上諸蔗榨瀋如其劑色味愈於西域遠甚然只是今之沙糖蔗之技盡于此不言作霜然則糖霜非古也歴世詩人模竒寫異亦無一章一句言之惟東坡公過金山寺作詩送遂寕僧圓寳云涪江與中冷共此一味水氷盤薦琥珀何似糖霜美黄魯直在戎州作頌答梓州雍熈長老寄糖霜云遠寄蔗霜知有味勝於崔子水晶鹽正宗掃地從誰説我舌猶能及鼻尖則遂寧糖霜見於文字者實始二公甘蔗所在皆植獨福唐四明畨嵎廣漢遂寧有糖氷焉而遂寜為冠四郡所産甚㣲而顆碎色淺味薄比遂之最下者亦皆起於近世唐大厯中有鄒和尚者始來小溪之繖山教民黄氏以造霜之法繖山在縣北二十里山前後為蔗田者十之四糖霜户十之三蔗有四色曰杜蔗曰西蔗曰艻蔗本草所謂荻蔗也曰紅蔗本草所謂崑崙蔗也紅蔗止堪生噉艻蔗可作沙糖西蔗可作霜色淺土不甚貴杜蔗緑嫩味極厚專用作霜凡蔗最困地力今年為蔗田者明年改種五穀以息之霜户噐用曰蔗削曰蔗鎌曰蔗凳曰蔗碾曰榨斗曰榨牀曰漆甕各有制度凡霜一甕中品色亦自不同堆疊如假山者為上團枝次之甕鑑次之大顆塊次之沙脚為下紫為上深琥珀次之淺黃又次之淺白為下宣和初王黼創應奉司遂寧常貢外歳别進數千斤是時所産益竒墻壁或方寸應奉司罷乃不再見當時因之大擾販本業者居半乆而未復遂寧王灼作糖霜譜七篇具載其説予采取之以廣聞見全蜀藝文志巻五十六
