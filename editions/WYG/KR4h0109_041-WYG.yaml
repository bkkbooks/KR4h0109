body:
  text: 全蜀藝文志巻四十一明周復俊編記壬前益州五長史真記唐李徳裕益州草堂寺成都記云在府西五里去浣花亭三里列畫前史一十四人節度職不帶尹則帶長史非今賓佐也代稱絶跡余嘗於數公子孫之家獲見圖狀乃知草堂繢事靡不造真者昔巖野㫄求徒聞審像稽山髙舉惟止鎔金孰若記之丹青妙畫神照楚國祠廟魯王宫室洎此邦文翁舊館皆圖歴代卿相燦然可觀雖有慕于前良曾莫究於形似豈與夫年代已逺遺像猶存入虛室而煙霞暫披拂浮埃而瑶林斯覿余以精舍甚古廟貌將傾乃選其功徳尤盛者五人模于郡之㕔事追惟二漢臺閣皆有圖寫黄霸于定國雖宰相名臣不得在畫像之列卓子師徳行君子而在功臣之右今之所取意其在斯乎采色既新光靈可想儼若神對吾將與歸因叙其事詒諸來哲大和四年記張益州畫像記蘇洵至和元年秋蜀人傳言有冦至邊邊軍夜呼野無居人妖言流聞京師震驚方命擇帥天子曰毋養亂毋助變衆言朋興朕志自定外亂不作變且中起既不可以文令又不可以武競惟朕一二大吏孰為能處兹文武之間其命往撫朕師乃惟曰張公方平其人天子曰然公以親辭不可遂行冬十一月至蜀至之日歸屯軍撤守備使謂郡縣冦來在吾無爾勞苦明年正月朔旦蜀人相慶如他日遂以無事又明年正月相告留公像于浄衆寺公不能禁眉陽蘓洵言於衆曰未亂易治也既亂易治也有亂之萌無亂之形是謂將亂将亂難治不可以有亂急亦不可以無亂㢮是惟元年之秋如器之欹未墜於地惟爾張公安坐于其旁顔色不變徐起而正之既正油然而退無矜容為天子牧小民不倦惟爾張公爾繄以生惟爾父母且公嘗為我言民無常性惟上所待人皆曰蜀人多變於是待之以待盗賊之意而繩之以繩盜賊之法重足屏息之民而以碪斧令於是民始忍以其父母妻子之所仰賴之身而棄之于盜賊故每每大亂夫約之以禮驅之以法惟蜀人為易至于急之而生變雖齊魯亦然吾以齊魯待蜀人而蜀人亦自以齊魯之人待其身若夫肆意于法律之外以威劫齊民吾不忍為也嗚呼愛蜀人之深待蜀人之厚自公而前吾未始見也皆再拜稽首曰然蘓洵又曰公之恩在爾心爾死在爾子孫其功業在史官無以像為也且公意不欲如何皆曰公則何事於斯雖然於我心有不釋焉今夫平居聞一善必問其人之姓名與鄉里之所在以至於其長短大小美惡之狀甚者或詰其平生所嗜好以想見其為人而史官亦書之於其傳意使天下之人思之於心則存之於目存之於目故其思之於心也固由此觀之像亦不為無助蘓洵無以詰遂為之記公南京人為人慷慨有大節以度量容天下天下有大事公可屬系之以詩曰天子在祚嵗在甲午西人傳言有冦在垣庭有武臣謀夫如雲天子曰嘻命我張公公來自東旗纛舒舒西人聚觀于巷于塗謂公暨暨公來于于公謂西人安爾室家無敢或訛訛言不祥往即爾常春爾條桑秋爾滌塲西人稽首公我父兄公在西囿草木駢駢公宴其僚伐皷淵淵西人來觀祝公萬年有女娟娟閨闥閑閑有童哇哇亦既能言昔公未來期汝棄捐禾黍芃芃倉庾崇崇嗟我婦子樂此嵗豐公在朝廷天子股肱天子曰歸公敢不承作堂嚴嚴有廡有庭公像在中朝服冠纓西人相告無敢逸荒公歸京師公像在堂載酒亭羣公畫像記失名子雲右蜀人事漢成哀平世歴新室身詘而道不得行子雲沒宋興八十九年矣距今千餘嵗其鄉人之學者森然若林之植于畮其在太平興國中有若諫議大夫田公錫之論議叅知政事蘓公易簡之正大雍熙淳化中有若直昭文館陳公充直史館朱公台符之文雅為何許人其嘗扞大冦以功得封史家略而不書尚或有之至其家世實不知所據杜子美詩曰百花潭北荘又曰百花潭水即滄浪其來久矣非由冀國而得名也吾意蜀人之不忘冀國之功嵗即其祠致禮焉因相與朋聚為樂非謂其為此邦之人及嘗有為僧漂衣之異也而或者因百花潭之名附㑹其説務為誇誕若不足凴况潭在成都為近郊使冀國實生於是寧方節度鎮蜀何至奪其境内之民而妾之豈為民父母之意哉此甚不然者矣客有謂予曰杜子美在蜀與寧同時潭之得名與子美實相後先子又安知其不然寧䟦扈人也何有於境内一女子乎大厯之世朝野多虞干戈兵甲時有所貸而不問重以從事中原未遑他及寧自視疎逺違禮叛律以資聲色之奉以欺朝廷之不知且莫我誰何者盖有所恃而為此也後寧從徳宗狩奉天為盧杞譛死不能保其首領雖曰非罪得非㒺上之報使之邪方寧無恙時驕其嬖妾至馳騁出游以從事窮日之游府尹亦為之至潭上置酒髙㑹設水嬉競渡盡衆人之樂而後返其傳曰此冀國故事也冀國姓任本漢上小家女任媪嘗禱于神祠夢神人授以大珠覺而有娠明年四月十有九日而生女稍長奉釋氏教甚謹有僧過其家瘡疥滿體衣服垢弊見者心惡獨女敬事之一日僧持衣從以求浣女欣然濯之溪邊每一漂衣蓮花輙應手而出里人驚異求僧已不知所在因識其處為百花潭㑹崔寧節度西川微服行民間見女心悦之敗其家納以為妾寧妻死遂為繼室累封至冀國既貴每生日即來置酒其家艤船江上訪漂衣故處徘徊終日後人因之嵗以為常且即寺之東廡作堂祠之余自為兒時於傳聞如此顧未嘗一至其處今嵗之夏以事留成都闕過及是日與二三友觀焉訪冀國遺跡漫無可考獨有吴仲庶所作祠堂記與余昔所聞於為兒時者大抵略同時余猶為疑其説之不然者余按唐書大厯中崔寧鎮蜀入朝留其弟寛守楊子琳自瀘州襲之寛戰力長講計七十三座諸院大藏經計下闕楞嚴院繪佛祖記失名僧惟中字慧雅本𨽻蓬州開元寺後至成都不復其鄉者凡四十年性孤潔與人不妄合精禪律之學善作詩氣格清謹其徒許之與可朋相上下常呼之曰詩伯可朋蜀僧之能詩者兼通吾儒書學者從質其義日滿座下羸形垢面破衣敗履見者不知其中之所有能如是者俗年六十示滅於大慈之甘露道塲慶厯八年乙酉五月九日也前時盡傾其槖中得八萬錢諉其所常往還楞嚴院道人繼舒曰我将去矣生平之餘止此耳其為我命奇工繪佛祖像於爾院之毗盧殿雖然用此被唾罵我不敢辭矣且欲使來者見是相知是心以是知見故能祓除諸妄而冺相忘心我為是功徳之意也道人諾之㑹廣漢劉允文有名於時遂召使圖其事采飾殊絶鋪置有序叩聞傳付宻義相屬一花五葉先後交照信畫評之善品而法苑之勝緣予舊與惟中討論五經大義甚重之畫此時予常觀允文下筆後十七年予自祕閤校理乞侍親得相臨邛郡道人使予記其事嘉祐六年辛丑五月十五日東園芳洲亭書彭州張氏畫記失名蜀自唐三帝四幸當時隨駕以畫待詔者皆奇工故成都諸郡寺宇所存諸佛菩薩羅漢等像之處雖天下能號為古蹟多者盡無如此地所有矣後歴二偽至國初其淵源未甚逺故穪繪事之精者猶班班可見近世所習淺陋寂然不聞其人此亡它盖茍於所利而不自取重其所為之技爾獨天彭張氏能嗣守道人之學用筆設色韻氣標置未嘗輒自奔放惟一謹於良法不為世俗之心所怵誠可尚也予寓彭累月居甚閒暇日與承天僧敏行㳺凡出於張氏之手者觀賞殆徧信乎他人之不能相與較其後先矣敏行乃其俗裔也俊慧通博亦善於此聞予嘉嘆其祖之所為磨石請予道所以然熙寧六年中秋日記文與可畫篔簹谷偃竹記蘓軾竹之始生一寸之萌耳而節葉具焉自蜩蝮虵蚹以至于劍㧞十尋者生而有之也今畫者乃節節而為之葉葉而累之豈復有竹乎故畫竹必先得成竹於胷中執筆熟視乃見其所欲畫者急起從之振筆直遂以追其所見如兎起鶻落少縱則逝矣與可之教予如此予不能然也而心識其所以然夫既心識其所以然而不能然者内外不一心手不相應不學之過也故凡有見于中而操之不熟者平居自視了然而臨事忽焉䘮之豈獨竹乎子由為墨竹賦以遺與可曰庖丁解牛者也而養生者取之輪扁斵輪者也而讀書者與之今夫夫子之託於斯竹也而予以為有道者非耶子由未嘗畫也故得其意而已若予者豈獨得其意幷得其法與可畫竹初不自貴重四方之人持縑素以請者足相躡于其門與可厭之投諸地而罵曰吾将以為韈士大夫傳之以為口實及與可自洋州還而余為徐州與可以書遺余曰近語士大夫吾墨竹一派近在彭城可往求之韈材當萃於子矣書尾復寫一詩其略曰擬将一段鵝谿絹掃取寒梢萬尺長予謂與可竹長萬尺當用絹二百五十疋知公倦於筆硯願得此絹而已與可無以荅則曰吾言妄矣世豈有萬尺竹也哉余因而實之荅其詩曰世間亦有千尋竹月落庭空影許長與可笑曰蘓子辯則辯也然二百五十疋吾将買田而歸老焉因以所畫篔簹谷偃竹遺予曰此竹數尺耳而有萬尺之勢篔簹谷在洋州與可嘗令予作洋州三十詠篔簹谷其一也予詩云漢川脩竹賤如蓬斤斧何曽赦籜龍料得清貧饞太守渭濵千畝在胷中與可是日與其妻㳺谷中燒筍晚食發函得詩失笑噴飯滿案元豐二年正月二十二日與可沒於陳州是嵗七月七日予在湖州曝書畫見此竹廢巻而哭失聲昔曹孟徳祭橋公文有車過腹痛之語而予亦載與可疇昔戲笑之言者以見與可於予親厚無間如此也文湖州竹記呂元鈞君子之智思能過于人則事無巨細皆足以取髙此衆人所以尊仰欽愛之不已也畫者中有擬像而發于筆墨之間茍臻其極則近見羣物之情状逺叅造化之功力自古賢俊往往能之盖取其如此歟與可之于墨竹枯木世之好事者皆知而貴子瞻嘗謂盡得其理固不妄也頃年來成都畫此兩物於嘉祐長老紀師之方丈紀師寳之以誇識者乃西州僧舍勝事之一也與可在文館二十年其才可巨用将老矣尚怐恂一州胷中之藴曽不少露通塞榮悴無一毫羂諸心名教至樂之餘時作墨竹枯木一二以寓其幽懐逺趣真所謂粹静君子也豈特筆墨之間有以過人哉知則語其大不知則語其細知不知於與可何損益耶此可與髙爽眀達者言不可與鄙闇道也徙文湖州木石畫壁記楊天恵鄉丈人石室先生文公近世文藝之雄自其為大布衣即以古文獲重語於天下然壮思鋭甚注射縑素不能休則又於書畫焉發之時将官邛南㑹姻友於郫飲酒西禪之精舍夜艾氣酣䟦燭作此枯木怪石于方丈之壁盖初試手然斷句然筆力天就已自與詩品俱稱第一畫去今五十八伏臘矣其不及知晚幸交公之子冲卿乃克聞之於是假館主者求觀焉歛袵三肅仰而㳺顧徒見老榦聱牙蒼質贔屭㫄枿紐雲下根裂地不知㡬萬年物乃今猶植立楹間謖謖乎如空山臞仙真骨强勁劫壊而不僵岌岌乎如幽林古佛耉膚堅宻閱嵗寒而無恙余心懔然恪之以為公真王摩詰也特變化出沒異耳然世無通宿命者斯言未可出之獨恨託非其地頗為拙目輕題墨漫漫横斜于其上輙大息久之不能去間以告主簿事王君舜選舜選奮曰吾乃能辦此乃并其壁徙置公堂之中央飾以欄楯周䕶極謹某曰社櫟多夀山石耐久物誠有之人亦宜然方文公仕初筵越不過三十許耳胷中磽磽已有此奇是肯從兒女為柔熟耶君視此畫决非世人婉孌之觀其戎輿闕固扇闕過客俗子勿輕與言必審其人氣節不凡乃發視之其畫闕癸已其徙以大觀之庚寅而某為之記莫侯畫像記前人江西莫侯治郫二年有佳政籍然傳西南某聞之舊矣崇寧三年七月某以事免䥫官無所歸或曰盍税邛乎曰不可吾故治其曷可以留或曰盍旋梓乎曰未可吾乏貲其曷可以濟然則奈何曰吾聞莫侯長者吾将寄孥焉是必撫我既行屬嵗旱所過赤日射地黄􅝙勃鬰襲人苖暍死町間榖價翔貴從者病日甚余曰行矣饑飽吾有數後三日進及侯境則道里清寧白水瀲瀲彌望榿葉覆地秔芋人立軒舞翠氣殊不知有雲日若問水瀕人則咸曰此吾大夫之賜也吾邑食岷水支流嵗為堰大者若干小者若干其役夫若干指溉田若干塍故時吏弗省役役弗竭作穿築釃治不皆如律偶一愆雨水輒廞涸故嵗多失稔今侯之來敏於百治而水政尤謹其按行必豫其相視必親其功治凡要科配差次必均或倦怠則執柣臨之夜宿野次與傔𨽻均甘苦故堰之髙厚倍于舊而水之深廣什之凡我所以無旱暵之恐非侯則誰使余曰然名定不虛欲入見為侯道之㑹余有疾弗果然侯聞余來亟遣騎勞苦詢問之如十年舊間率諸僚身存之嵗時賙給有加越明年二月侯秩滿以去邑人固德侯之賜又惜其去恨不能留於是圖侯衣冠於某所将世事之像成又相率環觀而歌舞焉余於昔侯之去其邑也乃述所見以授其人使書諸像左雖然侯之治行豈僅止此哉而余所書止於此詳於所見略於所聞所以傳信也信以傳信則人之得吾文而傳者可以信於其後矣焦夫子碑序周表蜀之故老傳岷山有焦夫子者國初時人忘其名飽詩書以博學化𨗳人故世人稱夫子云夫子貌寢陋且怪長目而廣鼻海口而虯髯癭纍纍絡領下性直率不自飾雖冠帶往往爬痒捫虱腰胯間忽為歌詩則奇言異句有足駭人耳目者今人止能誦其一聨兩輪日月磨興廢一合乾坤夾是非噫豈非所謂古之隠君子歟熙寧中吾鄉賢士文與可遊天彭館倅舍之徐公園盃酒談笑中忽放筆繪夫子之像于學之壁不數筆而成之經嵗既久㡬至冺滅元豐壬戌嵗聶公子因守是郡惜其瀟灑神妙之跡或隠晦不顯遂徙其壁于西湖之凝翠亭焉嗟夫天下之人皆有所好然得其所以好者寡矣與可之於畫也縱横意思類皆山石竹木枯槁古淡之物故其為人也亦愛夫清静奇偉有道之士此真得天下所以好者歟公之遷是畫也使與可在而居貴仕間人必曰有所奉焉耳與可已沒公特重惜之是乃所以為君子也方是時天下之士俯仰㣘好方圓逐物喜事媚要迎合附㑹惟恐不足以赴功公乃恬然不以是為設慮而雍容閒暇獨能好與可之所好實賢于人逺矣豈不尚哉公索記敢直書云左右生圖記李石左右生徒漢石室故事也文翁集蜀士教之分左右兩序記其鄉里姓名而字之刻之石左生若干右生若干典學從事以下若千合若干人其餘固有漫滅不可考者然自有學即有此自漢歴世暨我皇宋蜀學之盛當紹漢得書以補晉唐之缺文寥寥亦復不可見惟煕寧中弟子員至五百時則蜀守蒋堂宻學也自三合法罷學之士益落僅至百五十人至張燾尚書増其員至三百括隠田以廪之然亦嵗去嵗來閱春秋二補試濫食而惰實業者未容盡去學司之籍吏為玩文矣蜀為鄙逺不得與東南士偕集成均獨有隣州隨侍入之法而又以廪入為限不能盡其來可歎也㑹科舉前之一嵗願肄業者衆學官以嵗有限員為守請於兩提舉學事司則願後廪入之不足而無拒其來由是聼以嵗補入之數至八百餘員學官擇其通經有獲者倡率而嚴其日考月書之程於是四蜀之士畢赴相與自愛重多名秀俊又相與分八齋其鄉曲姓名以齒為小錄以請於學官請如漢故事書之為辛巳左右生圖紹興三十一年記唐吴道子畫聖像記先聖為魯司冦時像二本其乗車而羣弟子從者號曰圖立而先師侍者號曰小影世人求合荀卿所謂如蒙倛轉生其真乃摹小影于石而鑱之壁夫聖人盖有不可以見見而聞聞又况以像求耶然學者緣貌觀其道緣形觀其天亦或有所得云全蜀藝文志巻四十一
