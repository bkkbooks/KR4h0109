body:
  text: 全蜀藝文志巻二十三明周復俊編詩道釋附無名石刻二首峨睂山月歌送蜀僧晏入中京唐李白我在巴東三峡時西㸔明月憶峨眉月出峨眉照滄海與人萬里長相隨黄鶴樓前月華白此中忽見峨眉客峨眉山月還送君風吹西到長安陌長安大道横九天峨眉山月照秦川黄金獅子承髙座白玉麈尾談重𤣥我似浮雲滯吴越君逢聖主逰丹闕一振髙名滿帝都歸時還弄峨眉月贈僧行融李白梁有湯恵休常従鮑照逰峨眉史懐一獨映陳公出卓絶二道人結交鳳與麟行融亦俊發吾知有英骨海若不隱珠驪龍吐明月大海乘虚舟隨波任安流賦詩旃檀閣酌酒鸚鵡洲待我適東越相携上白樓鷰子龕禪師王維山中鷰子龕路劇羊腸惡裂地競盤屈挿天多峭崿瀑泉吼而噴怪石㸔欲落伯禹訪未知五丁愁不鑿上人無生緣生長居紫閣六時自搥磬一飲尚帶索種田燒白雲斫漆響丹壑行隨拾栗猿歸對巢松鶴時許山神請偶逢洞仙博救世多慈悲即心無行作周商倦積阻蜀物多淹泊巖腹乍旁穿澗脣時外拓橋因到樹架柵值垂藤縛鳥道悉巳平龍宫為之涸跳波誰掲厲絶壁免捫摸山木日隂隂結跏歸舊林一向石門裏任君春草深贈蜀僧閭丘師兄杜甫大師銅梁秀籍籍名家孫嗚呼先博士炳靈精氣奔惟昔武皇后臨軒御乾坤多士盡儒冠墨客藹雲屯當時上紫殿不獨卿相尊世傳閭丘筆峻極逾崐崘鳳藏丹霄暮龍去白水渾青熒雪嶺東碑碣舊製存斯文散都邑髙價越璵璠晚㸔作者意妙絶與誰論吾祖詩冠古同年䝉主恩豫章夾日月嵗乆空深根小子思踈濶豈能逹詞門窮愁一揮淚相遇即諸昆我住錦官城兄居秖樹園地近慰旅愁往来當丘樊天涯歇滯雨粳稻卧不翻漂然薄逰倦始與道旅敦景宴歩修廊而無車馬喧夜䦨接軟語落月如金盆漠漠世界黒驅驅争奪繁唯有摩尼珠可照濁水源送僧自吴逰蜀盧綸隨緣忽西去何日返東林世路無期别空門不住心人煙一飯少山雪獨行深天外猨聲夜誰聞清梵音送少微上人入蜀前人瓶鉢遶禪衣連宵宿翠微樹開巴水逺山曉蜀星稀遍識中朝貴多諳外學非何當一傳付道侣願知歸送定法師歸蜀楊巨源鳳城初日照紅樓禁寺公卿識恵休詩引棣華霑一雨經分貝葉向雙流孤猿學定前山夕逺鴈傷離㡬地秋空性碧雲無處所約公曽向剡溪逰喜鸞公自蜀歸李洞禁院閉生臺尋師别綠槐寺髙猿㸔講鐘動鳥知齋拂石月盈帚濾泉花滿篩歸来逢聖節吟歩上堯堦贈龎鍊師女人前人家住涪江漢語嬌一聲歌戛玉樓簫睡融春日柔金縷粧發秋霞戰翠翹兩臉酒醺紅杏妬半胷酥嫩白雲饒若能携手隨仙令皎皎銀河渡鵲槗錦城秋寄懐𢎞播上人前人極頂雲兼凍孤城露洗初共辭嵩少雪乆絶貝多書逺照鴈行細寒條狖掛虚分泉煎月色憶就茗林居弔草堂前人杖屨疑師在房闗四壁蛩貯瓶經臘水響塔隔山鐘乳鴿沿苔井齎猿散雪峯如何不見性倚徧寺前松草堂寺在蜀成都文選注李善引梁簡文草堂傳曰周顒昔經在蜀以蜀草堂林壑可懐乃于鍾山雷次宗學館立寺因名草堂亦號山茨盖蜀人謂草屋曰茨成都之郊地名亦有蠶茨今訛為蠶絲矣唐李太白客逰有懐故鄊以草堂名其詩集見于尤氏鄭樵書目可證也杜子美客蜀亦居草堂今人徒知杜之草堂而不知太白之草堂又止知唐之草堂名天下而不知實始于梁矣因綴志詩併及之送僧鸞歸蜀寜親歌詩精外學天子是知音坐夜宫鍾近寜親劍閣深髙名徹西國舊跡寄東林自此棲禪者因師滿蜀吟送隂先生歸蜀張籍日暮逺歸處雲間仙觀鐘唯持青玉牒獨坐碧鷄峯隂洞新生乳澄泉舊卧龍㡬時因賣藥得向海邊逢漫天嶺贈僧元稹五上兩漫天因師懴業緣漫天無盡日浮世有窮年訪仙平都山呂洞賔盂蘭清曉過平都天下名山所不如兩口單行人不識王隂空使馬蹄虚一鳴白鳥出青城再謁王隂二友人口口惟思三島好擡眸巳過洞庭春至真觀三言詩後唐杜仁傑坤所載乾所幬象與形孰朕兆緯五行環二曜四海晏九河導峙而山亦多號神有嶽山有嶠粤仙壇極道妙巉孤撑未易到日出沒見遺照偃東西絶海徼倐光怪来熠燿大龍蟠細螢爝不恒出赴感召笙嘹亮鶴窈窕羽人路屯其要青螺堆玉簮峭左參井右丹竈掲清虛不二竅昔王人往昭告始軒轅末徽廟接柴望咸親燎莽刼灰起天燒摧棟宇失朱縹羣鹿豕雜蓬藋予向為一来弔必甚廢乃大造聖之前賢者紹矧𤣥元語秘奥探逾逺理益耀微是理萬有耗文雖徑實非剽度今来永為詔前蜀楊勛好道術後主以其妖怪戮之西市臨刑有詩具言後主失國聖主何曽識仲都可憐社稷在須㬰市西便是神仙窟何必乘槎汎五湖偽蜀丁元和詩九重城裏人中貴五等諸侯閫外尊争似布衣雲水客不将名利掛乾坤戯仙亭張無盡瀠洄溪水瀉髙灘中有神龍乆屈蟠衆樂妙音時響喨雙娃長袖忽闌珊世間變化無非幻閣上登臨正好觀觀幻見真真亦幻谷花巖草謾憑欄聫句詠小桃源龍旦門前碧醮一溪斜彷彿逃秦處士家石東雨便作武陵溪上㸔春来何處不開花還丹歌爾朱先生欲究丹砂訣幽𤣥無處尋不離鉛與汞無出水中金金欲制時須得水水遇土兮終不起但知火候不参差自得還丹微妙理人世分明知有死剛只留心戀朱紫豈知光景片時間将為人生長似此何不回心師至道免逐年光虛自老臨樽只覺醉醺酣對鏡不知漸枯槁二郎二郎聽我語仙鄊咫尺無寒暑與君説盡只如斯莫戀驕奢不肯去感君恩義言方苦火急回頭求出路吟成數句贈與君九轉丹成厯今古蘇幕遮韓仙姑不憂貧不戀富大悟之人開著娑羅鋪内有真如無價寳欲識真如正照菩提路貪愛心須除去清浄法身真是堪憑據忍辱波羅為妙藥服了一圎萬病都新愈䕫州羅氏園無名道士知君行樂似神仙歌舞相隨四十年方外客来嗟不遇洞房深鎖百花天望江南清源真君金主亮每舉事必決於箕僊後将南牧令童男女二人侍箕傍得詞云纔舉意𤣥象照離宫坎女離男金水盡㡬多鐡騎漫英雄最苦是雲中遼東鶴驚起老蒼龍四海九州沾恵澤狼山影裏弄清風堪作主人公亮覽之不悦問鐡騎漫英雄謂誰耶乃書亮字亮大怒復問汝是誰又書清源真君四字盖灌口神之名贈張浚入蜀宋郭英大漫天是小漫天小漫天是大漫天一從大小漫天後遂使生靈入四川秦山来盡蜀山来日照闗門兩扇開刺史莫嫌迎候逺相公新送陕西回後英罷宣司幹官與通判不赴往普州賣蒸餅為生宴如也閒閒宗師和前韻期望過當復用韵以謝元虞集草堂長憶蜀西郊屢卜歸休自折茅司馬檄傳驚父老少陵詩若入神交山多美竹深宜屋江有嘉魚逺致庖乞得閒身當及早堯時元自有由巢仁夀寺僧報更生佛祠前生瑞竹有懐故園前人聞道故園生瑞竹試從来使問何如蒼筤獨出千叢裏翠節駢生數尺餘比管可吹丹穴鳳長竿莫釣錦溪魚折腰巳向靈氛卜亦説能歸似兩疏聞道故園生瑞竹令人歸興滿江干扁舟不畏瞿塘險匹馬誰云蜀道難杜甫溪頭花匼匝孔明廟裏栢䦨珊新篁題作歸歟字定得臨江把釣竿聞道故園生瑞竹山僧為我重栽培百年雨露餘生息一日風雲㡬往逥壠上枯桑烏萃止城東華表鶴歸来聖恩若許歸田里千石清尊為爾開贈道人簡天碧畫士前人雲氣連山動松聲夾雨寒抱琴穿竹徑留棹寄江湍夕照歸神女春隂帶錦官此生同舊里偏解寫潺湲寄青城道士前人海上别妻子山中求茯苓白虎戯𤣥流蒼龍䕶黄扃燒香招五老行厨庖六丁從子似非逺丹霞粲華星張道士蜀山圖前人碧玉参天是蜀山舊曽飛度歴孱顔松風上接空歌外蘿月長懸合景間試劒丹崖秋隼疾濯纓錦水夜龍閒君家虛靖歸來日冉冉蓬壺為憶還悟空讃三首趙世延水泄人間本不通唐僖西幸蜀塵紅無端横被諸軍士勘破如如老悟空沙界堂堂總法身萬鈞一羽等纎塵不爭鐵笠安頭上惱亂衆生五百春精藍在昔紫雲峯梅菊開時靜應同蝴蝶翩翩桑梓曉朅来繁上揖兹風相傳靜應石象見紫蝴蝶予兒時常聞戊午天兵之攻雲頂也先是宋將姚世安遷漢陽靜應石像于此山嵗秋冬漢繁清涼主僧挈徒悟空定真避亂與靜應同一龕殿城既下將士闗攫財帛先伯元帥公獨取靜應將歸其故里塔院悟空亦復本寺迄今五十三年矣兹按部過繁主院智深前詣曰二大士實先師金湯谷復其故者幸丐一語以耀山門小子不敏感念先伯平昔輕財急義率類乎此其澤被後人多矣夫何敢辭祥符訪張三丰明胡濙交情已乆念離羣獨向山中禮白雲龍送雨来留客住鹿銜花至與僧分疎星出竹昏時見流水鳴渠靜夜聞却憶故人知此隠題詩誰似鮑叅軍附無名石刻二首度世古𤣥歌後周至真觀小蠻橋下相得石碑始青之下月與日兩半同升合為一大如彈丸甘如蜜出彼玉堂入金室子若得之慎勿失蜀道觀中淘井得一碑刻文似賦似賛有隠士言是漢時隂真人所著鍊丹法襍著于子玉碑有物有物可大可乆採乎蠶食之前用乎火化之後成湯自上而臨下夸父虛中而見受氣應朝光功參夜漏白英聚而雪慙黄酥凝而金醜轉制不已神趣鬼驟金歟天年上夀無著于文訣之在口全蜀藝文志巻二十三
