body:
  text: 全蜀藝文志巻十三明周復俊編詩亭館下雲溪宋何耕幽居定何如頗恨未見之主人向我言喜色融雙眉修篁流翠陰寒溪漾清漪領畧非一狀幽妍發餘姿空濛雨亦佳㶑灔晴更竒豈惟二江獨意恐兩蜀稀主人信妙士得此固所宜天公閟好景授受各有時豈無多田翁偃蹇逝莫隨素交懷老蒲秀句紛珠璣安得招歸來為君賦清詩往者不可作後生欲何為公與蒲大受為平生詩友浮翠橋前人隔溪蒼翠各西東架竹為梁路始通缺月罅林凝淨綠斷霞明水落殘紅芒鞋步步幽深處藜杖聲聲屈曲中囘首忽驚橋已逺泠然身御圃田風寒碧亭前人憑欄日日俯清湍洗竹年年斬惡竿十頃琉璃秋色静一林竽籟曉聲寒凉風有意生天末明月無邊照水端誰謂過清難久處愚溪元自不相安逺色閣前人小小樓居著散仙淵明真趣本悠然招呼雲月欄干曲顧揖江山拄杖前獨鳥倦歸翻落日誰家晨爨起踈煙根塵應接無留礙笑殺胡僧面壁禪假山前人空庭幻出小嶙峋假外應須别有真只恐話頭成兩撅若為融攝主和賓蓮塘前人色香無比出西方何物妖狐號六郎手折一枝聊供佛前身定是老柴桑劉遺民為柴桑令在逺法師蓮社中蘭坡前人蘭與髙人臭味同含薫聊復待清風紛紛蕭艾毋相笑爾輩敷榮轉眼空世説云蘭摧蕙折不如蕭敷艾榮龍淵前人門前大江何渺漫昔人飲牛水為乾水乾龍逝亦其理近在咫尺聊泥蟠魚蝦玩侮獱獺笑縱有靈怪誰當看德人問舍壓吾境便爾築室相遮攔坐令異類皆屏伏恃有此耳差少安却紆朱紱去監郡遺我守舍良獨難昨來過門恍如夢龍致此語催歸鞍先生不信反不笑謂我饒舌狂豐干虛舟前人君不見江臯車馬紛相送巨艑峩峩舩載重西南使者解官饟水淺著沙牽不動如君材具豈多得合侍明光參法從胡為淺瀨著虛舟頗肖胷中太空洞問君此意竟安在欲説向人誰與共山林鐘鼎本同轍繫岸截江隨所用八窗窅窅淨無塵一水泠泠清可㺯何當抱被過君眠分破江天幽夜夢㤀機臺太虛生微雲機事日夕繁兼㤀豈不佳尚有㤀者存稽首老龎翁妙處希一言請觀臺上月萬古無昭昏新都驛逺平軒劉望之霜晴木落送歸鞍袖手微吟此慰顏剰欲憑欄招百鳥更煩翦樹出青山晚悲薄禄非三釡賴許清詩見一斑軒有外氏周次元帥蜀時詩看到逺平纔得恨我寧歸臥尺椽間露香亭王灼北渚一帝子洛川一宓妃池有千種蓮平生所見稀纎穠各態度紅白爭光輝我來亭上飲夜久未忍歸翁家採香人但愛香滿衣豈知清露濕團荷㵼珠璣信相院水亭馮時行青天行月地行水水月相去八萬里天公大力誰能移月在水中天作底我心與月明作兩月行本在青天上雖云佛説我别説恐落衆生顛倒想少城城隈佛宫闕客哦水月僧饒舌三峽水寒梅花時起予對月賽此詩從何使君父子遊墨池分韻得名字李燾蜀學擅天下馬王先得名簧如巧言語於道蓋小成子雲最後出振策思遐征斯文大一統歘使聖域清富貴盡在我紱冕非所榮旁皇天禄閣聊亦觀我生懷哉不能歸舊宅荒榛荆寂寞竟誰顧正路今莫行使君蓬萊仙弭節歸赤城門無俗賓客家有賢父兄慨念此耆老不登漢公卿臨池一尊酒尚友千載英并呼嚴與李月旦共細評區區可無憾彼重適我輕朅來成都市塵土汚冠纓古人不可見見此眼自明請為懷古詩玉振而金聲題新繁勺氏盤溪勾昌泰黄塵沒車轂平地得林丘花木風光早陂池煙雨秋不彈長劒鋏甘賦大刀頭九軌利名痼逢君應少瘳從俗鮮所得九牛中一毛强牽麋鹿性要學豹龍韜野服顏常好晴窗首自搔向來誤應聘塵土汚吾袍客至輙命酌為言花已開青山長委髻白骨舊生苔不飲固癡絶能詩宜數來頗憂明日雨紅紫落成堆勝簪不肯黒浮頰故能紅心寄塵埃外春歸杖履中徑松青謖謖庭草碧茸茸無術繫白日年光如轉蓬簡州東溪碧波亭姚孳頼簡池臺兩蜀誇東溪別是一仙家令人却憶康王谷坐看珠簾濺雨花三峽堂二首宋肇林巒十里上巉巗飛檻初憑縹緲間䕫子風煙依白帝夜郎耕鑿雜烏蠻砌横亂石遥臨澗門對高峯近帶山咫尺驚湍吁莫測每令逰子念江關堂下臨灔澦堆初尋磴道踏雲煙漸引茅簷屋數椽江影動揺波面日山光隱見峽中天放懷罇酒凴欄客囘首絃歌蕩漿船要與舟人同此樂移花種竹滿巖前題三峽堂張縯羣山危立接雲天二水東朝㑹百川闕堪輿無此壯崔嵬踈鑿定何年千秋躍馬興亡夢一㸃闕上下闕時有剛風來浩𣺌起余髙興九霄邊諸文賡示前再次韻前人桃李層層媚逺天闕凌雲賦混一長看建武年蜀地雖險不闕用武其闕中原有道謂蜀文章擅天下凡蜀闕先平闕一二考也建隆可老去無知經世用夢歸欲問闕妙語驚頺懶一笑詩壇酒社邊題三峽堂郭明復三峽堂前五月風吳檣蜀柂古來通山如肺附重相掩水似環連去不窮躍馬孤城憐倔强卧龍八陣想英雄憑欄千載興亡事何異邯鄲一枕中題巫山瞻華亭鄧諫從崚嶒玉削三千丈翠潑嵐光冷相向風含太古雲氣長變化溟濛紛萬象陰晴一日具四時天籟壑深虛自響神山娟妙擢羣参錦繡鋪張獻竒狀蟠根積鐵匯百川龍矯蛟飜饒跌宕勢連三楚此開國故壘荒宫帶溪瀼樓臺井邑老風煙環佩清聞駐仙仗竹林風味便讀易久與江山為輩行嗚絃餘暇豁心眼戱著飛闌雲雨上爽明自可達壅蔽野獲又何勞草創政和民氣長似春景逈心平過於掌征鴻明滅志何杳黄鵠追隨意尤放當年李杜經行處太史銀鈎刻青嶂寶刀珠瑟出耕墾曲水纎腰迷草莽牢盆古𨽻雜秦篆飛動閒摹永平様珊瑚交柯炯不蝕髣髴將軍勲業壯英雄繁盛隨流水時有竹枝賡牧唱孔泉文物起騷經國色明妃守孤尚我家峨眉紫翠間為愛竒峯甘蒟醬秋風野水憶絲蓴擊汰夷猶理烟榜江郊亭新成賦詩二十三韻楊咸亨蜀江千里東南傾峽門横鎖千丈鯨吳帆蜀楫過如織府主四海皆弟兄城西門前二十里客去當送來當迎藤梢橘刺宻無路短亭四壁荒榛荆春風淡沲酌客處我陪後乘同郊行碧油紅斾駐沙尾連宵急雨鼓不鳴元戎玉皇香案吏俛仰茆屋無乃輕擘山鞭石相原隰釘頭瓦縫粟縷盈偉哉幻書此竒觀丹楹畫棟光崢嶸山長波迥目力短空濛宜雨髙宜晴危嵐滴翠染牕戸空江倒影翻簷甍天藏地設久相待更為佳處題佳名梁間横陳大手筆龍蛇飛動鬼神驚髙齋百篇子美唱峴首千載羊公情試呼小隊訪新館壯逰始與勝槩并披雲喚月星斗動放舟聞鶴天水明練光渺渺風力壯疊鼓西上帆東征舳艫冠蓋兩嘆息歡謠晝亂通樵聲元戎故是活國手山河指顧風塵清凄凉三峽小游戱樸斵丹黝安足程明堂梁棟要杞梓天關石柱須公擎紛紛故吏萬里外燕雀行慶大厦成賦詩抵掌者誰子夜郎野老楊咸亨次韻單䕫瞿唐一門江水傾羣趨激射隨奔鯨舟車冠蓋湊蜀道孰間張文連殷兄相逢來往問地主太守詎敢㤀將迎白崖候館久茅蕝近即野處披榛荆屏修啓剔作廬舍夙戒里旅遲留行有如授館及郊勞舉國定制誰先鳴錢唐鄙人何所似抵掌自視鴻毛輕食焉抑畏墮偷懦汎觀彼己同虛盈山蹊水滸肆登賞彌嗜傑閣誇崢嶸朋從簪盍得衆雋塵譚冰釋欣初晴鼎新贊我築斯館棟宇不貴朱連薨入門便足庇風雨揭榜却借江郊名時哉蓮幕有嘉客落筆能令風雨驚聯篇累牘溢我目粲花麗藻舒我情人生晤合良快意胡為四美嗟難并日光天際發豐蔀此去可並依離明直排閶闔出灔澦肅肅東首歌宵征循崖履坦夐無阻為君留取能詩聲此榜與詩儻不朽此館想同江水清我來歲月愧銷縮整纓輯屨圖歸程遺名肯復計身後謹慮第虞槃水擎始終感慨遇僚友遂事且喜相須成勉旃功業早期就發軔自是天衢亨次韻何漕司小紅翠亭二首劉士季少陵遺蹟瀼西東端的髙齋在此中今日花枝弄煙雨前時蔬甲卧霜風此地舊為蔬畦根株移取他山翠跗萼輸來别圃紅收拾陽春無盡藏䕫人端説兩詩翁苑在中巴東復東滿城春色一圍中休言小小鶯花界也勝纎纎燕麥風舞袖巻沙空映翠晴牕磨鏡漫晞紅葉成帷幄花成陣壯觀詩壇矍鑠翁控巴臺詩何異閲武弓刀勁利留賓歌舞清妍紅暎連檣燈火翠浮隔岸人煙臺上小留歸客臺前穩繫扁舟三宿翠㣲閣上一程白帝城頭次韻控巴臺詩李訦翠岸紅燈竒語要自江南看来多景齊雲樓下當年使鷁招囘誰道地拘偪仄須知天悶幽妍一段丹青臺閣何人淡掃松煙續和漕司髙齋韻薛紱漢嘉人坦性渠儂嫌我真斗升誰給太倉陳悠悠江漢飄零客落落乾坤老病身心厯百艱彌感奮詩留千古恰清新髙齋髙處齊文熖付與傾心仰止人紅梅閣韓子蒼路入君家百步香隔簾初試漢宫粧直疑夢到昭陽殿一簇輕鈿繞淡黄題紅梅閣仙女南枝向暖北枝寒一種春風有兩般憑仗髙樓莫吹笛大家留取倚欄看遊草堂陳南賓西出秦闗道路長岷峨東望鬱蒼蒼蓬莱三賦舊無敵同谷七歌今可傷茅屋秋髙風瑟瑟布衾鐵冷雨床床浣花溪上應囘首千載令人憶草堂賦四亭詩四章何景明秀地名山出晴忩疊巘羅褰帷入雲霧拂鏡影嵯峨仙客丹梯意樵人白石歌悠然時一眺佳色滿烟蘿右見山中田背北郭曲榭俯通川未羡龎公隠先知沮溺賢驅牛迎社日聽鳥餉春烟閑讀農書罷逍遥策杖前右閲耕舊種三湘岸初移千樹香柰花繁檻雪丹果壓簷霜裊裊生南國娟娟貢玉堂嘉應伯夷並高詠楚臣章右楚頌翠幹盤仙樹西亭烟霧中風簾自馥郁月幌共玲瓏白露棲雙鶴青天下八公獨同招隠曲攀望小山叢右淮隠全蜀藝文志巻十三
