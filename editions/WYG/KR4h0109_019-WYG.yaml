body:
  text: 全蜀藝文志巻十九明周復俊編詩題詠下竹枝宋蘇軾竹枝歌上楚聲幽怨惻怛若有所深悲者豈亦徃昔之所見有足怨者歟夫傷二妃而哀屈原思懐王而憐項羽此亦楚人之意相傳而然者且其山川風俗鄙野勤苦之態固已見於前人之作與今子由之詩故特緣楚人疇昔之意為一篇九章以補其所未道者蒼梧山髙湘水深中原北望度千岑帝子南遊飄不返唯有蒼蒼楓桂林楓葉蕭蕭桂葉碧萬里逺來超莫及乗龍上天去無蹤草木無情空寄泣水濵擊鼔何喧闐相将叩水求屈原屈原死已今千載滿船哀唱似當年海濵長鯨徑千尺食人為糧安可入招君不歸海水深海魚豈解哀忠直吁嗟忠直死無人可惜懐王西入秦秦關已閉無歸日章華不復見車輪君王去時簫鼓咽父老送君車軸折千里逃歸迷故鄉南公哀痛彈長鋏三户亡秦信不虚一朝兵起盡讙呼當時項羽年最少提劒本是耕田夫横行天下意何事棄馬烏江馬垂涕項王已死無故人首入漢庭身委地富貴榮華豈足多至今唯有塚嵯峨故國凄凉人事改楚鄉千里為悲歌竹枝蘇轍舟行千里不至楚忽聞竹枝皆楚語楚言啁哳安可分江中明月多風露扁舟日落駐平沙茅屋竹籬三四家連舂並汲各無語齊唱竹枝如有嗟可憐楚人足悲訴嵗樂年豐爾何苦釣魚長江江水深耕田種麥畏狼虎俚人風俗非中原處子不嫁如等閒雙鬟垂頂髪已白負水採薪長苦艱上山採薪多荆棘負水入溪波浪黒天寒斫木手坼龜水重還家足無力山深瘴暖霜露乾夜長無衣猶苦寒平生有似麋與鹿一旦白髪已百年江上乗舟何處客列肆喧嘩占平磧逺來忽去不記州罷市歸船不相識去家千里未能歸忽聴長歌皆惨悽空船獨宿無與語月滿長江歸路迷路迷鄉思渺何極長怨歌聲苦淒急不知歌者樂與悲逺客乍聞皆掩泣巴女謡唐于鵠巴女騎牛唱竹枝藕絲菱葉傍江時不愁日暮還家錯記得芭蕉出槿籬蜀牋宋文彦博素牋明潤如温玉新様飜傳號冷金逺寄南都豈無意縁公揮翰似山隂萬蝶花宋蘇轍誰唱殘春蝶戀花一團粉翅壓枝斜美人欲向釵頭挿又怨驚飛髩似鴉蜀地海棠前人蜀國天餘煦珍葩地所宜濃芳不隱葉併豔欲然枝襞影分羣蕚均霞㸃萬㽔回文錦成後夾煎燎烘時蜂蕊迎銜宻鶯梢向坐危淺深雙絶態啼笑兩妍姿絳節排煙竦丹釭落帶垂童容鄣畏薄便面到憂遲媚日能徐照暄風肯遽吹蜀少疾風故華愈盛惜歡當晼晚留恨付離披麗極都無比繁多僅自持損香饒麝柏照影次瑶池畫要精侔色歌湏巧騁辭舉尊頻語客細摘玩芳期英韶在前徒矜下里之曲風雅未喪豈繁繫轅之音不圗綴綺靡之辭抑将導敦厚之音耳海棠雖盛於蜀人不甚貴因暇偶成五言百韻律詩一章四韻詩一章附于巻末知我者無加誚焉沈立岷蜀地千里海棠花獨妍萬株佳麗國二月豔陽天叢蕚勻如布修㽔巧似編彤雲輕㸃綴赤玉碎雕鐫瑟瑟光輸瑩猩猩血借鮮淺深相向背踈宻逓勾牽輕蒨重重染丹砂細細研蕊纎金粟拱鬚嫩紫絲拳紅蠟隨英滴明璣著顆穿初莖争裊娜翹榦共蹁躚絶代知無價生香不減􅀢分靈應桂苑鍾粹定星躔木帝經邦相花王入室賢祥颷加剪拂卿靄共陶甄真宰隂推轂勾芒與著鞭不湏憂薄命好為惜流年賛翼施生柄扶持煦嫗權主張韶令正調燮淑威宣和氣髙低洽芳心次第還金釵人十二珠履客三千雲雨迷巫峡風波怨洛川娉婷宜住楚妖冶合居燕綉被通宵展華燈徹曙然横披前檻外半出假山巔暗羡遊蜂採偷輸蟻穴沿痩嫌蛛網織帚怯女蘿纒蓄恨憑誰訊無言只自憐文君酒罏畔揚子草堂前品格生來别風流到老全繁中生悵望衆裏見喧闐暄暖精神出晴明意態便闗闗鶯對語兩兩燕髙騫天上宜封殖人間偶佇延共櫻圍别館與杏擁斜阡清暖簾争巻黄昏幕尚褰低籠金轣􅣗髙映畫鞦韆忽認梁園妓深疑閬苑仙怱怱來蕙圃逺逺别芝田羞隱暝濛霧輕如淡蕩煙乍逢開羽扇初喜下雲軿髣髴回星靨依稀帶翠鈿五銖衣宛轉七寳帳翩翾獨立挨霓節成行列彩旃困宜歆虎枕步好襯金蓮舞定休囘䄂粧濃不傅鉛葢張松鬰鬱茵藉草芊芊馥郁蘭供夢枎疎栁伴眠軀輕彌綽約腰細更便嬛婭姹常顒若幽柔自洒然侍兒羅白芷婢子列芳荃口口濃檀注腮腮薄粉填解圍施葉幄買笑有榆錢旖旎環瑶席婆娑匝玳筵嬌依屏曲曲泣對露㳙㳙南陌輕埃蔽東郊夕照連幾時休縹渺從此識嬋姢是處遺簮珥誰家不管絃妬姬貪恐失戲稚惜何顛折閃搔頭褪擎摐約腕揎戴遮鬟上鳳装壓鬢邊蟬汲引新懽聚消磨宿忿蠲縱觀須倒載命宴必加籩翻曲教歌媛更詞送酒船鄉心須暫解病眼當時痊迢逓來油璧從容住錦韀雅宜交讓目穠與棣棠聨不憤㕘朱槿寜甘混木綿酴醿潜矢色躑躅敢差肩紫柰思投迹夭桃恥備貟梧桐愧金井芍藥濫花磚併壓辛夷俗還宜乙夜看天恩無乆恃人寵莫長專布影交三徑敷榮遍一㕓凝眸方曄曄廻首旋翩翩可忍驚颷挫胡須急景煎珊瑚隨手碎絳雪繞枝旋拂漢霞初散當樓月自圎飄零隨蠛蠓散亂逐漪漣灼灼龜城外亭亭錦水邊抱愁應惨蹙有淚即潺湲午影迷蝴蝶朝寒怨杜䳌物情元倚伏人意莫拘攣擢秀髙羣木稱珍極八埏未開猶脉脉憂落固悁悁别著新文紀重尋舊譜箋共知紅豔好誰辨赤心堅實可陪朱李根宜灌醴泉栽須隣竹柏樹莫繞烏鳶如託膏腴茂當隨富貴遷為多猶底滯因逺尚迍邅客思易成亂心期未省愆畫思摩詰筆吟稱薛濤牋醉目休頻送詩情豈易縁薛能誇麗句鄭谷賞佳篇止感芳姿美那憐託地偏山經猶罕記方志未多傳巧詠憂才竭㝠捜得意填遐陬寡真賞僻境忍輕捐抽秘慚非據探竒敢讓先援毫叙名卉聊用放懐焉海棠石延年君看海棠格羣花品詎同嬌嬈情自富蕭散豔非窮舊縠斑吳苑新羅碎蜀宮錦窠杯裏影繡段隟前烘心亂香無數莖柔動滿叢意分巫峡雨腰細漢臺風盛若霞舒巻鮮於血灑空髙低千㸃赤深淺半開紅粧面朱纔布膏唇檀乍融色焦無可壓體痩不成豐枝重輕浮外苞疎宻閙中難勝蜂不定易入蝶能通答朱公綽牡丹詩宋祁珍蘤分清賞飛郵附翠籠蹄金㸃髩宻璋玉鏤跗紅香惜持來逺春應摘後空玩詩仍把酒悵不與君同新繁縣東湖瑞蓮歌王益火雲爍盡大幕醒水光弄碧涼無聲荷花千柄拂煙際傑然秀榦駢天英天敇少昊偏滋榮宵寒仙露饒金莖嫋嫋飄風起天末緑華璫珮來琤琤觥觴式宴資擊賞何人掞􅇨飛筆精越國亭亭八百里木蘭泛詠稱明媚争如錦水𣲖繁江孤根擢翠葩分膩紫清合曜流霞暉楚臺無夢朝雲飛韓虢佳人新侍寵温泉宮裏賜霞衣赫赫曦陽在東井珍房萃作皇家慶流火初晨復毓靈連壁更疑唐傑盛眇觀熈政集元和嘉糓重榮田野歌髙宗昔慶劉仁表五色卿雲世其少我今取喻進徳流優哉祥蓮出池沼草萊泥滓俱棄捐致君事業殊商皓歸作臯䕫稷卨臣同心一徳翊華勲和梅摯東湖已月湖水平鱗波暗織簫籟聲中有植蓮一萬本紅漪相照摛繁英地靈氣粹不我測雙葩倐如同一莖黄姑織女渡銀漢蜺旗鳳葆羅空青又認英皇立湘渚翠華不返凝怨慕五十哀絃頓發聲駢首低昂泣珠露是時主人集宴喜湖光浸筵霞脚膩朋簮峨峨盡才子椽筆交輝雲􅇨麗酒酣倚欄惜紅輝煙素徘徊縈不飛魏宮甄后晝方寢髣髴有人持玉衣此邑古今無異政室家瘡痏何由慶三年䑕竊例皆然以薪救火火彌盛自公柅車政克和載途鼔腹騰謳歌歌公用心日皎皎不獨于今古應少因感珍芳兩兩開玉貫珠聨開縣沼况我與公髙適道高歌詎襲商山皓嘉謀嘉猷思入陳願将此美歸華勲蜀牋一軸獻太傅同年葉兄司馬光西來萬里浣花牋舒巻雲霞照手鮮書笥乆藏無可稱願投詩客助新篇望日與諸公㑹於大慈聞海雲山茶合江梅花開遂相邀同賞雖無歌舞實有清歡因成拙詩奉呈前人野寺山茶昨夜開江亭初報一枝梅旋邀座上逍遥客同醉花前㶑灔盃秀色霜濃方潤澤暗香風静更徘徊仙姿莫遣常情妬不帶東山妓女來蜀花以状元紅為第一金陵東御園紫繡毬為最范成大西樓第一紅多葉東苑無雙紫壓枝夢裡東風忙裡過蒲團藥鼎髩成絲紫荷車峡山此樂甚多前人緑英吐弱線翠葉抱修莖矗如青旄節草中立亭亭根有卻老藥鱗皺友松苓長生不暇學聊冀病身輕錦帶花東南甚珍此花峡中蔓生山谷前人妍紅棠棣粧弱緑薔薇枝小風一再來飄飄隨舞衣吳下嫵芳檻峡中滿荒陂佳人堕空谷皎皎白駒詩寳相花前人誰把柔條夹砌栽壓枝萬朶一時開為君也著詩收拾題作西樓錦被堆太平瑞聖花前人雪外捫参嶺烟中濯錦洲宻攅文杏蕊髙結綵雲毬百世嘉名重三登瑞氣浮挽春同住夏看到火西流垂絲海棠前人春工葉葉與絲絲怕日嫌風不自持曉鏡為誰粧未辦沁痕猶自宿胭脂十一月十日海雲賞山茶前人門巷驩呼十里村臘前風物已知春兩年池上經行處萬里天邊未去人客髩花身俱嵗晚粧光酒色且時新海雲橋下溪如鏡休把冠巾照路塵清明日試新火作牡丹㑹蜀人以洛中千葉種為京花單葉為川花前人再鑚巴火尚浮家去國年多客路賒那得青煙穿御栁且将銀燭照京花香鬟半醉斜枝重病眼全昏瘴霧遮錦地繡天春不散任教簷雨巻泥沙謝人寄䝉頂新茶文同蜀土茶稱聖䝉山味獨珍靈根托髙頂勝地發先春幾樹驚初暖羣籃競摘新蒼條尋暗粒紫蕚落輕鱗的皪香瓊碎髼鬆緑蠆匀漫烘防熾炭重碾敵輕塵恵錫全來蜀乾崤盞自秦十分調雪粉一啜嚥雲津沃睡清無夢清吟健有神氷霜疑入骨羽翼要騰身磊磊真賢宰堂堂作主人玉川喉吻澁莫厭寄來頻二色芙蓉前人蜀國芙蓉名二色重陽前後始盈枝畫調粉筆分粧處繡引紅針間刺時落晚自憐窺露沼忍寒誰念倚霜籬主人日有西園客得爾方於勸酒宜孫知微畫前人太古竒偉士精思獨於畫馳心入茫昧萬物赴揮灑當時一名重顧陸非爾亞卓哉青城筆妙絶冠天下寥寥九天仗一一若神寫吾恐千載後是終無繼者玉局洞石恪畫仙人四壁喻汝礪真人何年下紫清目睛飄堕如流星至今玉洞通窈㝠蕭然紫室之威靈杖履而來六月望赤臯裂石風淒泠屹然四壁呀欲動神怪夭嬌目喪睛道與之貌非丹青馭風而行誰使令雲飛電掣集帝所超然得意皆天人異哉石子偉丈夫胸中磊磊怪所儲元圃之山帝所居子游其間堕雙鳬不然安知天上有此樂秃筆一掃凌方壺細看毛骨分錙銖偉形傑状人人殊古來列真誰所摹前稱關仝後張圗近之豪者郭忠恕落筆拂戾如奔諸兩公軼蕩不拘束筆力磊砢相劘扶我來慿欄聊一呼隨翁聨軒上清都錦屏山暮景前人暝色輕煙罩郡城漁舟燈火倒觀星寒山逺水江村暮自在粧成水墨屏題龍岩寺石刻文與可墨竹程壬孫風雨勞先别敢辭樽酒深一梢墻上竹留作嵗寒心同前李元應淺梢疎節任蕭郎正向祁寒敵曉霜清興未窮僧已老自餘山色與溪長蜀酒歌陸㳺漢州鵞黄鸞鳳雛不鷙不搏徳有餘眉州玻瓈天馬駒出門已無萬里塗病夫少年夢清都曾賜虚皇碧琳腴文徳殿門晨奏書歸局黄封羅百壺十年流落狂不除遍走人間尋酒壚青絲玉瓶到處酤鵞黄玻瓈一滴無安得豪士致連車倒瓶不用盃與盂琵琶如雷聒坐隅不愁渇死老相如偶過浣花感舊遊戲作前人憶昔初為錦城客醉騎駿馬桃花色玉人携手上江樓一笑鈎簾賞㣲雪寳釵換酒忽徑去三日樓中香未滅市人不識呼酒仙異事驚傳一城説至今西壁餘小草過眼年光如電掣正月錦江春水生花枝闕處小舟横閒倚胡床吹玉笛東風十里斷腸聲浣花賞梅前人老子人間自在身挿梅不惜損烏巾春囘積雪層氷裏香動荒山野水濵帶月一枝低弄影背風千片逺隨人石家樓上貪吹笛肯放朝朝玉樹新蜀苑賞梅前人十里温香撲馬來江頭還見去年梅喜開剰欲邀明月愁落先教掃緑苔跌宕放翁新醉墨淒涼廢苑舊歌臺盛衰自古無窮事莫向昆明嘆劫灰席上作前人緑波畫槳浣花船清簟疎簾角黍筵一幅葛巾林下客百壺春酒飲中仙散懐絲管繁華地寄傲江湖浩蕩天浮世升沈何足計丹城碧落珥貂蟬故蜀别苑在成都西南十五六里梅花至多有兩大樹夭矯若龍相傳謂之梅龍予初至蜀嘗為作詩自此嵗常訪之今復賦此前人昔年曾賦西郊梅茫茫去日如飛埃即今衰病百事嬾陳迹未忘猶一來蜀王故苑犂已遍散落尚有千雪堆珠樓玉殿一夢破煙蕪牧笛遺民哀兩龍臥稳不飛去鱗甲脱落生莓苔精神每遇雪月見氣力苦戰氷霜開羇臣放士耿獨立淑姬静女知誰媒摧傷雖多意愈厲直與天地爭春囘蒼然老氣壓桃杏笑我白髪心尚孩微風故為作嫵媚一片吹入黄金罍綿州録事參軍㕔觀楚公畫鷹少陵為作詩者前人我來訪古涪之濵不辭百㒺冀一真走馬朝尋海㯶館斫鱠夜醉魴魚津越王樓髙亦已換俯仰今古堪悲辛督郵官舍最卑陋棟撓楹腐知幾春巋然此壁獨無恙老槎勁翮完如新向來劫火何自免叱呵守䕶疑有神妖狐九尾穴中國共置不問如越秦此時此物合致用下鞲指呼端在人㑹當原野洒毛血坐令萬里清煙塵老眼還憂不及見詩成肝膽空輪囷龍掛前人成都六月天大風發屋動地聲勢雄黒雲崔嵬行風中凛如鬼神塞虚空霹靂迸火射地紅上帝有命起伏龍龍尾不巻曳天東壮哉雨㸃車軸同山灌水溢路不通連根㧞出千丈松未言為人作年豐偉觀一洗芥蔕胸銅馬歌王灼郫城村民鑿古墓得銅馬高三尺許制作精妙前簡池守景季淵取以歸風雨輙聞嘶聲怪之不敢留移送佛寺紹興丙子予以事至成都黄伯淵見索作銅馬歌君不見武皇逸志凌九垓追風躡影思龍媒魯班門外立銅馬天厩萬匹皆塵埃又不見伏波将軍破交賊歸来殿前獻馬式據鞍習氣殊未衰想見老子真矍鑠兩京飜覆知幾秋只有山河供客愁孤煙落日蠶叢國出此神物於荒丘千年黄壤誰作主猶把歸心泣風雨但恐一朝去無蹤有似豐城寳劍化雙龍張飛刁斗上有八分飛所書也張士瓖天下英雄只豫州阿瞞不共戴天仇山河割據三分國宇宙威名丈八矛江上祠堂嚴劒珮人間刁斗見銀鈎空餘諸葛秦州表左袒何人復為劉杜䳌宋肇暖雲無定半隂晴茅屋紙窗深復明喬木参天竹千莖巴山欲曉風露清杜䳌飛鳴遶江城魚復四月江水生林花落盡空含情瀼東瀼西朝暮聲次韻袁升之遊海雲寺鴻慶院山茶之作蒲瀛山茶兩本上連空叠葉棲枝占佛宫雀尾有金輸紺碧鶴頭無火讓殷紅優於峡茗稱呼異劣與梅花氣候同誰識諸天雨花外道人宴坐雪霜中梅林分韻詩有序杜謹言紹興庚辰十二月既望縉雲馮時行從諸朋舊凡十有五人携酒具出西梅林林本王建梅花苑樹老其大可庇一畆中間風雨剥裂仆地上屈盤如龍孫枝叢生直上尤怪古者凡三四酒行以舊時愛酒陶彭澤今作梅花樹下僧為韻分題賦詩客既占韻立者倚樹行者環繞仰者承薌頫者拾英吟態不一皆可圗畫是行也余被命造朝行事薄遽重以大府衣冠謁報主人饋勞酬對奔馳形神為之俱敝諸公導以斯遊江流如碧玉平野秀潤竹塢桑疇連延彌望民家十十五五籬落鷄犬比閭相親不愁不嗟余散䇿其間葢不知向之疲苶厭苦所在也昔人謀于野則獲閒暇清曠有爽於精神思慮游不可廢如此哉又况所與游皆西州名俊憙事者即詩成次第不以長少以所得韻之後先聨成軸客十有五韻止十四呂義父别以詩字為韻又有首眩詩不成者缺樹字一韵余過沉犀樊允南監鎮税語允南補之諸公又属時行為之序十五人者成都楊仲約施子一呂周輔義父智父澤父宇文徳潜呂默夫杜少訥房仕成楊舜舉綿竹李無變潼川于伯永正法寳印老縉雲馮當可得舊字竹村喜紆徐江雲迷昏晝踟蹰馬上語嫩寒入衣䄂天公惜梅花破臈開未就留以待君來春風本如舊一尊既相属勿辭作詩痩明年用和羮請為使君夀得時字李流謙巾冠堕城府桔橰無停時胸脾貯黄埃空慕林壑姿涎流方外勝秦人望軒羲萬金買閒日駕言一舒眉冒踏衆俊場更從百代師食魚得河魴熊蹯佐其滋西林煙雨村霜條出氷㽔鳥鵲噪寒瞑玉立交參差置尊枎踈下老榦虬蛟馳落蘂不動塵初無犀駭鷄羞我木石資鬭公瓊琚詞深酌起自勸滕莒吾封圻公行對宜温雲霧生攀躋能來玩墟落疋馬却葢麾蟠胸萬螮蝀寰區眇毫絲以兹接羣動白羽坐指撝笑彼豢外者組紱為之鞿它年駟馬還梅花當十圍識此黄公壚下車挽客衣未覺邈山河一醉也大奇得愛字呂及之去城十里南郊外突兀老梅餘十軰玉雪為骨氷為魂氣象不與凡卉對我來窮冬煙雨晦臨風把酒從公酹人言此實升廟堂埋沒荒村今幾嵗清芳不為無人改捐氣何妨本根在瑰章妙語今得公國色天香真有待歸路從公巾倒戴俗物汚人非所愛我公行向日邊歸此段風流入圗繪得酒字宇文師獻平生慕英游望公如山斗一見開心誠已落諸人後龍門豈甄擇大小俱容受聨轡尋勝踐春風倚尊酒惟公對江梅端若同志友土色洗塵沙幽姿出藜莠命客花下坐相與沃醇酎非公無此客譬諸草木臭向晚入深巷蒼根欹甕牖始知水西頭臥梅勝臥栁有客三嘆息此樹驚老醜一笑客誠癡萬法要經乆竒卉如尤物過眼不必有恵我終日香重來香在否但從此理悟那復長搔首念公捧召節修名當不朽艤舟未忍去招尋訪林藪中心甚虚明外慕厭紛糾杖履循古岸細話猶開誘再拜誦公詩一洗芻豢口得陶字楊大光蟠根寄荒絶擢榦空櫹椮鄉來聞妙語剪拂到兒曹垂老猶叵堪開落幾徒勞不謂勤杖屨惠然排蓬蒿尚能領諸生相就醉澄醪真頼旁輝映并覺標韵髙酒闌興未已分韻看揮毫籍湜俱可人㝠捜争過褒乃知天地間一等為賢豪横飛與陸沉亦各繫所遭受命起窮邊國柄行當操盡期如此花曉夕幸甄陶得備和羮用寧不出伊臯百年幾春風勿令心忉忉得彭字于格庭柯臥蒼虬閲世如聃彭朔風破檀蕊零露滋玉英江空人響絶影落千丈清今代文章籙縉雲生齊明躍馬覘春色觴客江上亭三嗅韻勝華霜霰飽曾經及時剥其實可用佐八烹幸因輶軒使錫貢充廣庭王明儻予燭和羮登簋鉶得澤字僧寳印江路嵗峥嶸酸風更蕭瑟發興訪梅花主盟得詩伯孤芳有餘妍初不帶脂澤香度竹籬短影揺谿水碧同時飲中仙著我林下客春槽沸滴紅滿坐喧舉白澆胷獨茗盌臭味曽不隔公今日邊去陛下正前席請看枝頭春中有和羮實反騷試與提不礙心鐡石得今字楊凱蘭亭乆陳迹修竹空自隂龍山亦淒涼鮮花誰與簮英遊曠千載盛事新梅林四海馮黎州未妨鐡石心提携到諸子徧賞江之潯房亭姑射仙玉立何森森謝氏六君子對飲香滿襟西郊訪老龍竒怪尤可欽宛然如先生髙臥嵗月侵從兹飽薫風佳實共鼎鬵正味悅天下妙用無古今去去好著鞭江南春已深得作字呂商隱一樹知獨秀十里方出郭江流浩清泠露氣疑淒薄胡為此行色疲馬外踴躍𤣥冥正擅令植物困揺落身心縱未改佳意乆已惡喜見南北枝粲然秀氷壑千林色暉映百畆香磅礴首破春風荒獨傲清雪虐坐令芳信傳芬菲到羣蕚如一君子信茹連俱有託相期飲此意浩蕩放杯酌更應䕶攀折嘉實須若若終收調鼎功傅巖真可作持問縉雲老一尊笑相酢得梅字馮時行霜朝馬蹄無纎埃錦城城西江之隈金蘭合香俱明來白沙鱗鱗江水洄梅花傍江髙崔嵬人言猶是王建栽豪華過眼浮雲哉下馬酌酒聊徘徊飛英送香来酒杯酒酣疾呼竹籬開走尋屋角如龍梅梅龍雖多此其魁睡龍屈盤肘承胲風欺雪虐封蒼苔孫枝迸出誰胚胎天公撫摩春為囘慎勿變化隨風雷年年開花照尊罍我欲結茅買芋煨與梅周旋送衰頽得花字呂凝之出郭豈憚逺滿城無此花新枝開玉雪老樹臥龍蛇臨水互葱蒨傍籬忽横斜詩聲寫竒怪畫本出槎牙老子晋彭澤諸公賈長沙不尋龍李盟來嗅霜露華杖履穿茒舍壺觴倩酒家飢飡香馥郁醉藉影参差月白鴈成字江清魚可义風流一時勝野意十倍加祇恐天上去迹陳錦江涯歸来馬蹄疾驚飛滿林鵶沈黎使君與客飲王建梅林分韻作詩過沉犀以詩相示闕樹字令漢廣補之樊漢廣墻頭冉冉新陽露忽作玲瓏玉千樹老蛟偃蹇獨避人卷囘飛雪江臯暮何處鳴禽来好音四月枝垂起黄霧摧折霜餘初不懼笑看春光等閒度百年夢幻欲無言吹落吹開豈風故時來薦鼎真偶爾小住疎籬非不遇我知天地絶茫茫無為展轉獨多慮為花悽斷却囘頭爾亦㣲酸若難茹得下字施晋卿郊原宿雨餘雪重雲垂野春信初動揺欲徃豈無駕使君早著鞭問路逢耕者深尋煙雨村共作詩酒社庭荒得老樹氣象自儼雅一笑呼酒來大盆注老瓦最後看枯株何意當大厦夭矯待風雲有年天實假湏知羮鼎調嘉實名用捨我欲夀使君罇罍更傾瀉明朝得楚騷健甚無屈賈君今有賜環詔落九天下蜀江雪浪來棹趂舩人把留滯以諸生斯文要陶冶惟應郢中歌倡絶和自寡更聞督熊兒夜賦燭餘灺它年看無雙聲譽出江夏却笑昌黎公阿買字能寫賦成都碧鷄坊李氏石君事見成都古今記中盖湖石之最大而竒者著名舊矣孫松夀造化小兒斵山骨幾年流落蛟龍窟太湖一碧浸玻瓈瀾吞浪吐窮奔突瑰竒未許困泥沙漂出江臯空㟮屼清寒偃蹇如髙人肯向蓬蒿念埋沒曩聞上苑饒竒珍千形萬状髙嶙峋當年捜索困山海氊包席裹車轔轔規模豈但肖五嶽氣象直欲凌三神一朝戎馬窺城下例隨矢石荒荆榛憐君分落幽人手不逐爾軰汙塵垢首陽寂寞伯夷清瀟湘冷落三閭痩李侯胷中飽雲夢得君不用斯瓊玖館之舊隐與周旋竹士松賔三益友相看一洗名利心眉宇更清元徳秀君今幾世徳未衰霜寒玉立癯而夀咄嗟世眼多嗜好玩形忘理十八九竒章所蓄森琅玕名標甲乙空紛然到溉竒礓髙崒嵂一擲徒為負進錢石君于汝非不厚較其所得無何有願公世濟此君為不朽鴈詩朱乘八月新霜岸草枯數聲哀怨鴈来初憑君試向沙汀看恐帶匈奴二帝書髙宗皇帝聞之嘆曰此人頗有愛君之心彌牟鎮孔明八陣圗詩王剛中我稽八陣圗規模載方冊朅來鎮西蜀䕫門觀叠石賦詩百数字字字究來歴進渉漢川西彌牟鎮之北平原列堆阜灘石同一式細思作者意孔明有深䇿髙岸或為谷灘石存遺跡江海變桑田平原猶可覓故今兩處存千載必一得再歌遂成篇當有智者識題陳去非王摩詰嘉陵圗王安中干戈已暗大同殿管絃猶喧凝碧池别寫嘉陵三百里右丞心事欲誰知邛州青霞嶂青霞嶂與石城山相連張愈霧山環合自雲川户有清溪種玊田萬本桃花不知處幾人曽得問秦年萬安驛張縯勁兵重作付匈奴毆雀毆魚計自踈地入萬安知幾許却憐此邑始囘車縯詠萬安驛明皇幸蜀至此嘆曰一安尚不可得况萬安乎題柯敬仲畫前人予先世居隆州州治之後山石室翁守郡時隆為陵州州事簡時來就吾家拾故紙背作芧蘭竹木之屬所得頗多吾㓜時尚收得數紙今亦亡之丹丘生用文法作木竹而坡石過之近又以新意作墨花甚妙從子悦有眉山學官之行立為作此予愛而賦之昔者老可守陵州守居北山吾故丘太守時來看山雨每畫紙背成滄州老蒲松煙色過重揮霍隂崖交劒矛百年離亂亡故物敝箧江南誰復收新圗篔簹枝葉修使我不樂思昔侯碧鷄祠前杜宇叫五女井上叢篁幽裳梨樹髙青子落碧花翠蔓縈牽牛揚雄無家不歸老蠨蛸蟋蟀寒相求丹丘先生東海客何以見我空山秋蕭條破墨作清潤殘質刋落精英留陂陁重複分細草山石縈紆生亂流眉山學官莫厭冷言歸故鄉非逺遊石田茅屋儻可得萬里欲上東呉舟百花潭深濯新錦持報以比珊瑚鈎題商徳符蜀山圗前人每愛商公寫蜀山蒼崖直下竹林間錦城雨後江沙白劒閣霜餘木葉殷何處揚雄池盡墨誰家杜甫月臨關釣鼇海上天空濶待得仙槎一徃還蜀人鎦夢良效楊補之掀篷圗一首前人錦屏山下花如錦却愛清江野水邊放筆豈能無直榦掀篷方欲鬭清妍最憐半靣欹歌扇更笑輕身障舞筵君看上林千樹雪繁枝何處獨姢姢題王庶山水前人蜀人偏愛蜀江山圗畫蒼茫咫尺間駟馬橋邊車葢合百花潭上釣舟閒亦知杜甫貧能賦應嘆揚雄老不還花重錦官誰得見杜䳌啼處雨斑斑題秋日蜀棠前人野棠青子來青鳥霜日清妍欲近人忽見嬌然紅數蕚劇憐秋色勝於春酒肆明晏鐸半幅青帘栁外斜甕頭春色泛桃花遥思昔換金龜處知是長安第幾家詠栁邊驛前棕樹劉成得雲林秋盡葉齊凋棕樹臨風翠羽揺江上人家欲聴雨故栽濃緑當芭蕉毘橋兩渡盧雍橋斷毘江路殘霞水底天渡邊還有渡莫怪急呼船桂湖夜月前人月白湖光浄波寒桂影繁人間與天上兩樹本同根全蜀藝文志巻十九
