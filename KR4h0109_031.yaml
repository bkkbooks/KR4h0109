body:
  text: 全蜀藝文志卷三十一明周復俊編序集序陳氏集序唐盧藏用昔孔宣父以天縱之才自衛返魯乃刪詩書唐書文粹作定禮述易道而修陳集作作春秋數千百年文章粲然可觀者文粹無者字也孔子歿二百歲而騷人作於是婉麗浮侈之法行焉漢興二百年賈誼馬遷為之傑憲章禮樂有老成人唐書文粹無人字之風長卿子雲之儔瑰詭萬變亦竒特之士也惜其王公大人之言溺陳集文粹並作於流辭而不顯其後班張崔蔡曹劉潘陸隨波而作雖大雅不足然其遺風餘烈尚有典型宋齊已來文粹作之末蓋憔悴矣逶迤陵頽流靡忘返至於徐庾天之將喪斯文後進之士若上官儀者繼踵而生於是風雅之道掃地盡矣易曰物不可以終否故受之以泰道喪五百嵗而得陳君君名陳集作諱子昂字伯玉蜀人也崛起江漢虎視函夏卓立千古橫制頽波天下翕然質文一變非夫岷峨之精巫廬之靈則何以生此故有文粹作其諫諍之辭則為政之先也昭夷之碣則論議之當也國殤之文則大雅之怨也徐君之議則刑禮之中也至於感激頓挫微顯闡幽庶幾見變化之朕以接乎天人之際者則感遇篇存焉觀其逸足駸駸方將搏扶搖而淩太清獵遺風而薄嵩岱吾見其進未見其止惜乎湮厄當世道不偶時委骨巴山年志俱夭故其文未極嗚呼聰明精粹而淪剝貪叨桀驁以顯榮天乎天乎吾始未知夫天焉昔嘗與余有忘形之契四海之內一人而已良友歿矣天其喪豫今採其遺文可存者編而次之凡十卷恨不逢作者不得列於詩人之什悲夫故粗論文陳集有之字變而為之序至於王霸之才卓犖之行則存之别傳以繼於終篇云爾李翰林集序魏皓自盤古劃天地天地之氣艮於西南劔門上斷橫江下絶岷峨之曲别為錦川蜀之人無聞則已聞則傑出是生相如君平王褒揚雄降有陳子昂李白皆五百年矣白本隴西乃放形因家於綿身既生蜀則江山英秀伏羲造書契後文章濫觴者六經六經糟粕離騷粳粃建安七子七子至白中有蘭芳情理宛約詞句妍麗白與古人爭長三字九言鬼出神入瞪若乎後耳白久於峨眉與丹丘因持盈法師達白亦因之入翰林名動京師大鵬賦時家藏一本故賓客賀公竒白風骨呼為謫仙子由是朝廷作歌數百篇上皇豫遊召白白時為貴門邀飲比至半醉令製出師詔不草而成許中書舍人以張垍讒逐遊海岱間年五十餘尚無祿位祿位均常人橫海鵾負天鵬豈池籠榮之皓始名萬次名炎萬之日不逺命駕江東訪白遊天台還廣陵見之眸子炯然哆如飢虎或時束帶風流醖籍曽受道籙於齊有青綺冠帔一副少任俠手刃數人與友自荆徂揚路亡權窆回棹方暑亡友糜潰白收其骨江路而舟又長揖韓荆州延飲白誤拜韓讓之白曰酒以成禮荆州大悅白始娶於許生一女一男曰明月奴女既嫁而卒又合於劉劉訣次合於魯一婦人生子曰頗黎終娶於宋間携昭陽金陵之妓迹類謝康樂世號為李東山駿馬美妾所適二千石郊迎飲數斗醉則奴丹砂撫青海波滿堂不爽白宰酒則樂皓平生自負人或為狂白相見泯合有贈之作謂余爾後必著大名於天下無忘老夫與明月奴因盡出其文命皓為集皓今登第豈符言耶解携明年四海大盜宗室有潭者白陷焉謫居夜郎罪不至此屢經昭洗朝廷忍白久為長沙汨羅之儔路逺不存否極則泰白宜自寬吾觀白之文義有濟代命然千鈞之弩魏王大瓠用之有時議者奈何以白有叔夜之短儻黃祖過禰晉帝非阮古無其賢所謂仲尼不假蓋於子夏經亂離白章句蕩盡上元末皓於絳偶然得之沈吟纍年一字不下今日懷舊援筆成序首以贈皓作皓酬白詩不忘故人也次以大鵬賦古樂府諸篇積薪而録文有差互者兩舉之白未絶筆吾其再刋付男平津子掌其他事迹存於後序易龍圖序宋陳搏且夫龍馬始負圖出於羲皇之代在太古之先今存已合之位或疑之况更陳其未合之數耶然則何以知之答曰於仲尼三陳九卦之義探其旨所以知之也况夫天之垂象的如貫珠少有差則不成次序矣故自一至於盈萬皆纍纍然如絲之於縷也且夫龍圖本合則聖人不得見其象所以天意先未合而形其象聖人觀象而明其用是龍圖者天散而示之伏羲合而用之仲尼默而形之始龍圖之未合也惟五十五數上二十五天數也中貫三五九外包十五盡天三天五天九并五十之用後形一六無位又顯二十四之為用也兹所謂天垂象矣下三十地數也亦分五位皆明五之用也十分而為六形地之象焉六分而幾四象地六不配在上則一不用形二十四在下則六不用亦形二十四後既合也天一居上為道之宗地六居下為氣之本天三幹地二地四為之用三若在陽則避孤隂在隂則避寡陽大矣哉龍圖之變岐分萬途今略述其梗概焉西蜀崇龕陳搏序輿地紀勝序李􅌫東陽王象之儀父著輿地紀勝一書甚巨書成丐余為序且曰吾書收拾天下郡縣山川之精華使人於一寓目之頃而山川俱若效竒於左右以助其筆端取之無禁用之不竭余告之曰昔昌黎韓公南遷過韶州先從張君使借圖經其詩曰曲江山水聞來久恐不知名訪倍難願借圖經將入界一逢佳處便開看然則天下郡縣山川之精華是真名人志士汲汲所欲知也然所撰圖經類多疏略舛訛失之鄙野多矣必得學者參伍考正而勒為成書然後可據也本朝真宗時翰林學士李宗諤等承詔撰諸道圖經凡一千五百六十六卷今其書存者止十之三四甚可惜也然四方一郡一邑隨所至亦各有好學之士收攟記識甚備其目一一見於册府纂録最可稱者如唐麗正殿直學士韋述東西兩京新記及本朝龍圗閣直學士宋公敏求長安河南二志尤為該贍精密今儀父所著余雖未睹其全第得首卷所紀行在所以下觀之則知其論次積日而成政非淺淺者蓋其書比李氏圖經則加詳比韋宋所著記志庶幾班焉使人一讀便如身到其地其土俗人才城郭民人與夫風景之美麗名物之繁縟歷代方言之詭異故老傳記之放紛不出戶庭皆坐而得之嗚呼儀父之用心可謂勤矣然余又嘗語儀父曰古人讀書往往止用資以為詩今儀父著書又祇資他人為詩不亦如羅隱所謂徒自苦而為他人作甘乎儀父笑不答余以是知儀父前所與余言者特寓言耳其意豈止此哉夫昌黎大儒也固嘗云土地之書未嘗一得其門戶且謂古之人未有不通此而為大賢君子方欲退而往學焉意其學也必也窮探力究洞貫本標非若近世膚末昧陋為口耳之習姑以眩人夸俗而已是則昌黎道術文章之盛所以名當代而傳後世者非以此乎蓋聞之凡為士者學必貴於博則無以至於約然其大歸必貴於有用則始為不徒學也蕭何從沛公入關先收秦府圖書故因以知天下厄塞戶口多少之處漢之得天下此亦其大助東方朔劉向皆以多識博極獲備天子訪問為國家辨疑惑豈曰小補其事今見山海經首本朝劉侍讀原父奉使契丹能言古北口松亭柳河道里之迂直以詰虜相與驚顧羞恧卒吐實以告士君子識博至此豈不足以外折四夷之姦心表中國之有人哉是則地里之書至此始為有用之學至若許敬宗之對唐髙宗第能明帝丘得名所自遂過眩其長以矜忲於人此則為士者之所笑而不道者也然則余之所望於儀父者固以朔向及劉侍讀之事豈但以資他人為詩而已乎前言姑戲耳寶慶丁亥季秋三日路史别序費輝輝自夷陵抵衡湘有為輝言廬陵有君子曰羅長源智識𢎞逺所作路史博達該至恨不一日見之以方問族五羊道當繇吉中心幾有星雲之快而猶竊患不偶比屆廬陵何期忽偶紹介得接公於闉闍之外議論粲發間及路史則方錦囊相隨遂獲一覩竒袐然後信所謂五帝之佐無不賢三皇之佐無不聖為不虛語實天下之竒作也豈惟如是而已哉公固自謂我朝之文所尚山谷老泉至於東坡少所甚愛然其發論乃有時而相似又何邪輝竊論之公之立言逺過賈誼而敘述則在莊馬之間班范而下不論也讀封建之論則知先王之制治觀封禪之論則悟聖人之遺意稽小辨之説而父子兄弟之情親知詩之不主於文讀甘誓之説而君臣上下之義明知書之不主於事稽微子三仁之論而隱顯出處之方立知義理之不浮虛稽吳楚書人之説而尊卑內外之分申知春秋之不褒貶至於祝融論樂之作則直與樂記齊上下所謂西漢文章能以文敘事者優為之矣嗟乎不觀論語聖賢之進退無以識三皇五帝之道髙不觀路史變故之紛沓無以見三皇五帝之道大使遂行之不惟得管窺甌舉之徒不敢妄述而裘褐談禪之士亦不敢以誕矣向使漢儒有知伊周非攝之論則無莽卓之禍知大麓非職之説則無曹馬之禍若齊梁有此書則佛老不張唐室有此書則藩鎮不強五代而有此書則十國不狂靖康而有此書則廟社不墟習而讀之固足使亂臣賊子之知懼而可以國家長久禍亂不作矣實五經之鼓吹而諸子之權衡也竊又評之立蕭曹勳業易作羅氏路史難路史之功固不在於禹下輝之孱微無髙銜大具以邀重於人言之有不足信然昔人謂文章自有公議而公亦謂杜甫非詩人識者知公此語則知路史矣丙申六月十五日西蜀費輝序黃帝素問靈樞集注序史嵩昔黃帝作內經十八卷靈樞九卷素問九卷乃其數為世所奉行唯素問耳越人得其一二而述難經皇甫謐次而為甲乙諸家之後悉自此始其間或有得失未可為後世法則謂如南陽活人書稱咳逆者噦也謹按靈樞曰經所言節者神氣之所逰行出入也非皮肉筋骨也又曰神氣者正氣也神氣之所逰行出入者流注也井滎輸經合者本輸也舉而並之則知相去不啻天壤之異但恨靈樞不傳久矣世莫能究夫為醫者在讀醫書耳讀而不能為醫者有矣未有不讀而能為醫者也不讀醫書又非世業殺人尤毒於挺刃是故古人有言曰為人子而不讀醫書猶為不孝也僕本庸昧自髫迄壯潛心斯道頗涉其理輒不自揣參對諸書再行校正家藏舊本靈樞九卷共八十一篇增修音釋附於卷末勒為二十四卷庶使好生之人開卷易明了無差别除已具狀經所屬申明外準府指揮依條申達轉運司選官詳定具書送祕書省國子監今嵩専訪請名醫更乞參詳免誤將來利益無窮功實有自時紹興乙亥仲夏望日史嵩題二江先生文集序馬涓二江先生者宋公承之也宋氏簪笏蟬聨為蜀著姓成都屬邑曰雙流者先生所居也左思賦曰帶二江之雙流故士人以二江先生呼之先生天才絶人結髮稱奇童比遊場屋則雋譽日出逼人一時輩流望其鋒却避不敢前聞先生充舉首則曰允當無異詞既筮仕隨牒州縣上官歆艷其名爭誘以事有盤錯肯綮處須先生為決之皆明徹平允朝廷倚辦常兼數職囊印座右纍纍然人憫其賢勞而先生撥遣暇豫未嘗失簡編筆研吟諷度日常曰世間樂孰與此樂吾將終身焉當元祐六年先生為南省郎涓以晚輩始預賓客之末逮涓從事秦亭而先生持節來於是獲從長者遊以信宿不見為間濶樽酒雍容每聞先生片語隻句如窺豹一斑嘗鼎一臠固願熟觀飫賜而不可但知舉警䇿以驚詫未聞者今先生之殁二十有七年矣始見先生文集玩味尋思欲罷不能蓋嘗廢卷而論之孟子曰源泉混混不舍晝夜盈科而後進放乎四海有本者如是孟子之言固有自然為文者何獨不然先生博學而精擇者也其學之博猶採薪者之見一芥掇之見青蔥拔之故於書無所不讀諸子雜説或出入於聖域者猶冀有得於萬一其擇之精猶齊王之食雞其跖須數十雞而後足其所藴蓄涵釀汪汪乎胸中殆不發不已故下筆輒不休筆端馺沓落紙者皆可詠詠成文鉤章棘句軋軋如抽而後為文也有本者如是豈虛語哉若夫稽往古之是非究當時之利病上以縫補於廷議下以斟酌於風謡此先生之文見於祖述憲章可以維持吾道者也翰寫胸抱形摹物象較重輕於錙銖嫓宫羽於清濁此先生應時之文以靡麗為工者也訓詁深嚴字畫奇崛體商周之盤誥追堯舜之碑碣此先生髙古之文以簡潔為法者也至於宴笑間稗官小説旁搜俯拾附益談業此又文之餘事也淵淵其深渾渾其醇舒徐衍溢而不流激昂蹈厲而不怒逺之則有稽近之則不誣嗚呼其文之雄乎自昔論文者晉有陸士衡之説曰石韞玉而山輝水懷珠而川媚後之論文者無以加此觀先生之文則君子之所養可知矣唐裴延翰有言文章與政通風俗以文移每味此語則益知文之有用於世自非小補而先生之文祇藏於家第為子孫寶祕閲習而不克大流布於時此平日士論之所惜者今既成集可以傳諸無窮故輒敘其梗概庶知音者得以覽其詳焉凡歌行詩賦時議經義論䇿表啓書序紀志及雜述總若干首第為十六卷皆先生之子宏父手自編次宏父博達豪邁克嗣家風詩曰惟其有之是以似之後之人欲知先生父子之懿當以是觀之先生之捐館舍也涓嘗為其行狀以告諸志墓者故先生之世系官爵與其平生出處皆載於墓志副以碑表諡議粲然可考附於文集之後此不復書王君禮詩文集序楊天惠余家弟元符頃與成都王君同佐宕渠縣君於家弟丈人行也家弟以父執事之君家視弟則輩流如也家弟嘗論君近世遺直老氣鯁固危冠淳古遇不可於意雖敵以上必盡言拄之不以一毫假人人有不受無敢牾儻野唯稍引去以故與世聱牙寡合由宕渠歷資中再不得意輒致其事而歸家弟言如此余肅然心憚之去年冬有跨巴馬從野僮徑造余庭自持刺大言我王某也余驚起迎置右座問何自來君言聞子名久特來耳余為設薄具留之留信宿别去後若干月命其子奉平生詩文若干篇授余曰將序以為謁余拜受卒業曰君於詩文深矣體裁質實如其為人而慤詞強句間足自立讀者如若難嘬已乃愔愔有前輩家風味蓋學之祖騷而宗選旁出於傳記故兒時已自能賦有州里名既而落魄無所就日與羣輩處晚年詩多出白語蘄於曉流俗不以鎸琢為工於是君老矣蓋未始求人人亦無求之者而獨有求於余顧余何足以求哉凡其所知姑識於此代作集府尹石刻序楊天惠公頃繇長安遷尹成都卷燮理之具鎮臨外屏回經緯之文設飾行臺如釃河渠以溉尋咫如峙泰岱以出膚寸以故倡治有餘日而賦政無遺功間建羽旄俯同民樂或徙玉帳旁合寶好至於酒酣樂作意氣逸發徹饔緩帶風味餘美輒布善紙臨素壁逰戲翰墨之娛以志燕喜之適凡為詩文題紀若干可謂盛也而巨刻細劖光明磊落上與參墟交輝下與雲山增重蓋公以代言之餘流而為文以𢋫歌之緒别而為詩又以詩文之衍溢而為書故銀鈎玉畫世多有之而西南特為富於是縉紳耆舊識藻火之為美也過者必肅山祇瀆鬼仰圭璧之為珍也護之唯謹某竊亦博購而寶蓄之得三十帙將以其一獻諸公路仰備覽觀而取其副藏諸名山以賁子孫焉且某聞之欲考盛德者必於去焉觀之昔者周公去東山而赤舄所履詠歌無射召伯去南國而甘棠所茇愛思不忘人心同然異世吻合今公道德之光仁義之澤所以被蜀土者與東山南國無異而英詞偉績金石之傳所以遺吾人者亦與赤舄甘棠何以異然以星紀數易閏餘幾更逖瞻巖廊邈在雲漢顧某也無文獨不能效比興之末技寫父兄之遐思乃徒撫奇蹤奉珍笥日與田夫野老雜沓頌歎於玉壘之北此某所以課誦不韙而遺恨亡窮也公開府以某年甲子還朝以某年己巳入禁林升丞弼邁種方隆福祿未央鶴山師友雅言序遊侶鶴山公以髙明俊偉之姿刻意於學不肯隨聲接響躡陳駕虛如求驪龍之珠必下九淵而親攬之乃已故其議論窮極根柢多異乎人匪求異人實能得衆人之所未得也尚憶嘉定十有四載余方家居公致之潼川郡齋同諸友讀易遍考舊説切磋究之一日言前輩賦雪詩欲為人所未嘗道者今觀其語亦豈人説所不能道若周濓溪無極太極乃前無古人耳余因及往歲侍後溪先生先生謂劉侍郎招美勸閲注疏以為不先此而立論恐徒髙明而不實公深然之及公在渠陽大肆其力於經如注疏率三四讀且鈔成編其是若非博考詳説所蓄既厚厥見孔明晚歲披幽抉微掊妄扶正一話之出世竦未聞稅君巽父輯為雅言大略可睹然公之再入勸誦金華嘗過余語今日進講至易之泰吾從旁奏內君子外小人固為泰也第在外而心腹是寄不為外在內而情意不親不為內余擊節稱歎公亦自得今巽父乃不及記則其胸奇之藴未暇遍以語人者亦多矣嗚呼使天假之年而巽父輩終身左右隨聞必録則所以私淑後人者又可勝計哉嘉熙三年十月朔南充遊侣序鶴山師友雅言序稅與權豫登鶴山先生之門蓋歷二紀以先生出入中外間七八年或五六年或三四年每一見則所聞輒一超絶及先生返自南遷起家鎮瀘豫執經從之相携入京登宥府視事洎賜環奉藩以乞夢奠湖海往來永日清夜瞻前忽後先生非聖之書不讀多發先儒所未言昉於甲午夏以浹丁酉春隨所得録之反復玩索如入武庫如遊寶藏如登喬嶽以觀天下斯所謂仰彌髙而鑽彌堅者嗚呼以豫四閲寒暑凡所逮聞如此其富則二三子久相從遊而不離左右者又可想而知哉昔嘗見先生移書蒙齋袁侍郎云某於六經名數文義重下頓工的然見古人所志所學歷戰國暴秦以後無傳焉極於五胡之亂影滅迹絶其間豈無經生學士各隨才分有所建立然騖於髙逺者惟欲直指徑造以步步而行字字而講者為卑近者則又以區區記誦小小辭章為學問之極功所謂合內外貫精粗者百數十年間始有人講尋以發漢唐之所未講又若於實未有所見者勦説雷同為聲利計以病吾道方欲通古今為一書使之有志於道者猶可推原尋流而學未能信不敢容易下筆也嗚呼先生此志未酬而天奪之矣豈不為千載之恨用備録師言揭諸篇端以著先生之志亦因識吾儕小人後死者之悲有宋嘉熙歲在鶉火辰會大火門人巴郡稅與權掩袂書於武林之孤山周易折衷序元趙采易該象數理未作之前其體因象數而立既作之後其理因象數而顯大傳曰河出圖洛出書聖人則之河圖洛書為天地自然之文象數之大原也二圖之象皆九位故伏羲則之畫為長短之九畫成乾坤二卦之小成由乾坤而八卦八卦而六十四卦以左右交互而觀則兩卦得十八畫二九也是為先天圖邵子所謂交易之易也文王則之變伏羲之卦次分上下之二經上卦三十下經三十四以一反一覆而觀除八正卦外五十六卦只成二十八卦上經得十八卦下經亦得十八卦二九也是為後天易程子所謂變易之易也或曰伏羲既因象推數而作先天交易之易矣文王又因象推數而作後天變易之易何哉大傳曰易之興也其於中古乎作易者其有憂患乎夫子蓋謂文王當殷末世憂患而興此易也曷為見其憂患今觀後天反對卦如泰反為否剝反為復晉反為明夷夬反為姤既濟反為未濟舉一二以類推則文王實憂慮天下後世隂陽禍福之相為倚伏治亂安危之相為消長君子小人之相為進退只在一反覆間故示人以用九扶陽而抑隂為君子謀不為小人謀為轉移造化之機此上下經所以皆寓用九之意豈出于聖人之智巧皆倚天地自然之象而加一倍焉耳自古聖王之致治皆用九如舜命九官禹之九功九敘九歌是已是以周公作爻辭于乾卦首發用九之義夫子翼之曰天德不可為首也曰乾元用九天下治也曰乾元用九乃見天則於九曰天則其可過哉過則其亢矣又於大傳三陳九卦以明文王處憂患之道上經取三卦而陳之用一九也下經取六卦而陳之用二九也此夫子因數推理而作十翼也嗚呼易更三聖而象數義理始備自夫子歿千數百年論易者各據已見泥象數者流於詭怪説義理者淪於空寂而聖人憂患作易之旨昧矣至宋有康節邵子推明伏羲文王之卦畫而象數之學著有伊川程子推衍夫子之意而卦畫之理明洎武夷朱文公作本義釐正上下經十翼而還其舊作啓蒙本邵子而發先天雖本義専主卜筮然於門人問答又以為易中先儒舊説皆不可廢但互體五行納甲飛伏之類未及致思耳故愚以為今時學者之讀易當由邵程朱三先生之説泝而上之以會羲文周孔之心庶幾可與言易矣然邵子無易解其説僅見於觀物篇故愚是集以程朱傳義為主而附以鄙見間亦竊取先儒象數變互以資發明雖然俗士口易賢人體易聖人忘易孟子著書未嘗及易邵子以為易道存焉且以為善用易人能用易是為知易嗚呼韋編三絶企東家之無過蠧簡百年慨西伯之有憂愚雖衰老願就有道而正焉後學潼川趙采德亮謹序運氣新書序前人天地隂陽之運往過來續木火土金水始終終始如環斯循六氣相生之序也嵗氣起於子中盡於子中故曰冬至子之半天心無改移子午之歲始冬至燥金三十日然後禪于寒水以至相火日各六十者五而小雪以後其日三十復終于燥金丑未之歲始冬至寒水三十日然後禪于風木以至燥金日各六十者五而小雪以後其日三十復終于寒水寅申以下皆然如是六十年至千萬年氣序相生而無間非小寒之末無所于授大寒之未無所于授大寒之初無所于承隔越一氣不相接續而截自大寒為次年初氣之首也此造化之妙經祕而未發啓玄子闕而未言近代楊子建昉推而得之夫醫家運氣之説惟隂陽大論七篇具存而啓玄子取以補內經醫流之究竟及此者蓋鮮鄧焱景文貫通儒書精専醫伎純厚謹審而篤於學演繹七論條分類别目曰運氣新書經文注義采拾靡遺凡著書欲以明氣運者未有能若是賅且悉也豫又因楊氏所推特表古聖先賢未發未言之奧於其篇端鄧氏此書之行於世也可無毫髮遺漏矣莊子正義序前人莊子內聖外王之學洞徹天人遭世沉濁而放言滑稽以玩世其為人固不易知而其為書亦未易知也魏晉以來注釋奚翅數十雖淺深髙下不同大抵以己見説莊子非以莊子説莊子也錢大中蜀産也淡然朴素好南華經聞清江道士杜充符有唐劒南道士文如海南華正義命其徒徑往繕寫以歸如獲珍器近以示豫豫嘉文氏方外之人乃能獨矯郭氏玄虛之失而欲明莊子經世之用噫不可謂拔乎儔類者哉昔在天寶間玄宗蓋嘗賜見正義十卷宋太平興國八年成都道士任奉古鋟諸木而世不傳講師將為重刻故敘其所以得書之由若夫得意忘言奭然四解進進乎南華真人之逍遙逰師其自知之六經補注序吳澄先聖王之教士也以詩書禮樂為四術易者占筮之繇辭春秋者侯國之史記自夫子贊易修春秋之後學者始以易春秋合先王教士之四術而為六經經焚於秦而易獨存經出於漢而樂獨亡幸而未亡者若書若禮往往殘缺惟詩與春秋稍完而已漢儒専門傳授守其師説不為無功於經而聖人之意則未大明於世也魏晉而唐注義漸廣至宋諸儒而經學之盛極矣程子之易立言幾與先聖並然自為一書則可非可以經注論若論經注則朱氏詩集傳之外俱不能無遺憾也後儒於其既精既當者或未能嚌味其所可取則於其未精未當者又豈人人而能推索其所未至哉豫嘗於此重有慨焉而可與者甚鮮也蜀儒黃澤楚望貧而力學往年初識之於筠今年再遇之於江讀易詩書春秋及周官禮記悉欲為之補注補注之書未成而各經先有辨釋宏綱要義昭揭其大而不遺其小究竟謹審灼有真見先儒舊説可從者拳拳尊信不敢輕肆臆説以相是非用功深用意厚以豫所見明經之士未有能及之者也晚年見此寧不為之大快乎楚望不輕以示人而德化縣令王君乃為鋟梓以傳豫歎美之不足因以諗於學者蓋於諸經沉潛反覆然後知其用功之不易用意之不茍云事韻擷英序前人昔歐陽公蘇老泉王荆國諸人以黯然銷魂惟别而已八字分韻賦詩送裴吳江蘇得而字其詩云談詩究乎而荆國就席擬賦二篇一曰風作鱗之而一曰兩忘我與而滿座駭服宋以前和詩和意不和韻至荆國東坡黃山谷並以用韻竒險為工蓋其胸中蟠萬卷書隨取隨有愈出愈巧故得以相矜尚也倘記覽之博不及前賢則不能不資於檢閲於是有詩韻等書然其間往往陳腐用之不足起人意江州路教授西蜀張夀翁所編事韻擷英削去陳腐之字而皆竒險之韻荆國嘗謂晏元獻公用事的切後見其類藁乃知其有自來纂輯之書亦不為無功也夀翁此編可為賦詩用韻之助其功不既多矣乎置一帙則人人皆用竒險之韻何異於王蘇黃三巨公也哉篆書序前人秦𨽻興而篆書廢漢四百年莫有能者觀於漢代碑刻可見矣三國六朝間亦無聞焉唐三百年李當塗一人而已自秦丞相逮於宋初蓋千年僅有徐騎省以能繼當塗自許何斯學之寥寥也宋人能篆書者頗多於唐蜀魏文靖公至今為人所稱陳伯英魏公鄉人也遊藝之暇及此所書千文體整潔真可上希文靖者夫陳之先世少師公于蘇文忠公如大父行參政公當宋而渡之際以詩名家咸淳季年别院省試春秋第一人伯英季父也一家文學之傳不絶伯英名瑛受朝命為郡教授鶴山雅言序魏文彞伏惟先髙祖秦國文靖公事宋穆陵以正學直道任斯文之寄天下不敢以官氏而稱之曰鶴山先生休光懿德概可想見矣立言垂訓以私淑後人者有九經要義鶴山大全集易集義此三書昔刋于徽之學官已行於世其他如周禮折衷經史雜抄觀物經世説與夫門人所記師友雅言等篇尚藏於家近吳郡金伯祥父即文彞所藏雅言命子鏐繕寫鋟刻諸梓以廣其傳俾宗族鄉黨咸與觀焉何其幸歟是則前輩之紀聞伯祥之好義同為不朽云時至正二十四年龍集甲辰夏五月甲子朔六世孫文彞百拜謹識釋奠儀注序張􅓄禮曰皮辨祭菜示敬道也禮書殘缺釋奠釋菜名義徒存儀文無可考者唐開元禮倣佛儀禮饋食篇節文為詳朱文公謂政和新儀差錯獨於開元禮有取申明至於再三竟格不下身沒之後郡邑放而行之能通其義者鮮矣中原文物肇開四方取則舍魯奚適闕里昔罹兵革宫室荆榛蓋二十年牲殺器皿衣服不備勢使然也而儀章度數固多可議者象設非古也開元禮猶云設席是無象也髙臺巍坐而席地之禮不可見帶劔秦漢冠服之飾也開元禮朝會猶有解劔之席冕服挾劔未之有聞二者之失所從來久矣神位西坐東向尸位也配位東坐西向主人位也自尸禮廢禮家謂自內出者無匹不行自外至者無主不止故立神以配而為主焉開元以後遷神位南面配位猶故也進顔孟南向參列如浮圖老子宫者孔氏祖庭廣記謂金大定四十年所行何所稽乎楹間兩階五齊三酒以四代之器為備物之享也列數瓦缶果為何説尸尊不就洗禮也登罍爵于牀洗者以尸尊自居犧象不錯諸地主人遂不坐實爵簡亦甚矣幣之未薦置諸神位之左示不敢褻陳之階庭與主人俱升則不嚴矣蓋事由草創未之講也豫典教於兹思有以正之顧不學雜服不能安禮而雖善無徵無徵不信乃取朱文公所考訂自儀禮開元禮而下裒為一編命學徒肄習且與講説義數使之入耳會心既知義理之安將不期改而自改併附社稷風雨雷之祀庶幾好禮者有取焉抑禮有本有文是書所載文也習禮之士因文而究其本知交於神明不徒籩豆之事微之顯誠之不可掩也如此則可謂知禮矣若夫器樂冠服之度則又博採諸家之説從其是者訂其失者與此編并藏孔氏俾後來之文獻有足徵云草書集韻序明惠園豫於國政之暇必草書三五幅以暢其情恆以淳化石刻歷代名臣法帖以師以效我獻祖開國於蜀不貴金玉所寶者惟聖賢經籍也自經史以下文章翰墨俱收蓄於內閣一日忽覽書目見有草書集韻取而披閲因字類以知四聲之韻因韻語以識諸家之體如漢宣帝魏少帝以鍾繇羲之過庭伯機等書體勢無不全備然後知草書之源流古人之變化由其形迹而得乎心法之妙矣惜乎久歷年歲苦於蠧魚於是命工重繡於梓以永其傳俾後之學草書者有所取法也是為序全蜀藝文志卷三十一
