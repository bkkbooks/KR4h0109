body:
  text: 全蜀藝文志巻十四明周復俊編詩寺觀遊三學山隋僧智炫秀嶺接重煙嶔岑上半天絶巖低更舉危峯斷復連側石傾斜澗廻流㵼曲泉野荒青草凍春來白鳥傳樹錦無機織猿鳴詎假弦葉宻風難度枝疎影易穿抱裘依閒沼策杖戯荒田遊心清漢表置想白雲邊榮名非我願息意且蕭然遊梵宇三學寺唐王勃香閣披青磴琱臺控紫岑葉齊山路狹花積野壇深蘿幌棲禪影松門聽梵音遽忻陪妙躅延賞滌煩襟𤣥武山聖泉有序王勃𤣥武山有聖泉焉浸淫歴數百千年乘巖泌湧接磴分流下瞰長江沙堤石岸咸古人遺迹也兹乃青蘋緑芰紫苔蒼蘚遂使江湖思逺寤寐寄託既而崇巒左繞石壑前縈丹崿萬尋碧潭千頃松風唱響竹露熏空瀟瀟乎人間之難遇也方欲以林壑為夭厲琴罇為日用嗟乎古今同逝方深川上之悲少長同遊且盡山陰之樂盍題芳什共冩髙情詩得泉字韻曰披襟乘石磴别籍宴深泉蘭氣薫山酌松聲韻野弦影飄垂葉外香度落花前興洽林塘晚重巖起夕煙附和前韻明余子俊予以左都御史成化丙午致政還青神丁未復召起為夏官卿情知衰病不能圖報竊聞孔門家法於義當不俟駕既而道出中江日且未晡因遊覽真靈觀次韻賦此以自見時乃夏之五月望前一日也青鞵布襪陟層巔望道其如未及泉天近尋常塵不到旬當十四月猶絃山花亂落空壇裏野鳥閒啼古觀前老我重來應指日山靈鄭重䕶寒煙又和前韻楊春丹崖翠壁接雲巔𤣥武名山湧聖泉一水靜中拖緑黛萬松深處響冰絃登臨恍訝崑崙頂倡和渾疑太華前緬想昔人増感慨數聲啼鳥度晴煙望牛頭寺杜甫牛頭見鶴林梯逕繞幽深春色浮山外天河宿殿陰傳燈無白日布地有黄金休作狂歌老囘看不住心玉臺觀前人浩刼因王造平臺訪古遊綵雲蕭史駐文字魯恭留宫闕通三峽乾坤到十洲人傳有笙鶴時過北山頭暮登四安寺鐘樓寄裴十前人暮倚髙樓對雪峯僧來不語自鳴鐘孤城返照紅將歛近市浮煙翠且重多病獨愁常閴寂故人相見未從容知君苦思緣詩痩大向交遊萬事慵題武擔寺西臺詩段文昌秋天如鏡空樓閣盡玲瓏水暗餘霞外山明落照中鳥行看漸逺松韻聽難窮今日登臨意多歡語笑同同前姚向開閣錦城中餘間訪梵宫九層連晝景萬象寫秋空天半將身到江長與海通提擕出塵土曽是穆清風同前温㑹桑門煙樹中臺榭造雲空眺聽逢秋興篇辭變國風坐愁高鳥起笑指逺人通始媿才情薄躋攀繼韻窮同前陽汝清浄此遒宫層臺復倚空偶闕三伏外列席九霄中平視雲端路髙臨樹杪風自憐榮末座前日闕池籠同前李敬伯臺上起凉風乘閒覽歲功自隨台席貴盡許羽觴同樓殿斜暉照江山極望通賦詩思共樂俱得詠時豐同前姚康松逕引清風登臺古寺中江平沙岸白日下錦川紅疎樹山根淨深雲鳥跡窮自慚陪末席便與九霄通西蜀淨衆寺松溪八韻兼寄小筆崔處士鄭谷松因溪得名溪吹答松聲繚繞能穿寺幽竒不在城寒烟齋後散春雨夜中平染岸蒼苔古翹沙白鳥明燈分僧影痩光徹客心清帶梵侵雲響和鐘擊石鳴淡烹新茗爽暖泛落花輕此景吟難盡憑君畫入京渠州汧江寺前人退居瀟洒寄禪關髙挂朝簪浄室間孤島暫留雙鶴歇五雲争放二龍門輕舟共泛花邊水野屐同登竹外山仙署金閨虛位久夜清應夢近天顏題凌雲寺司空曙春山古寺遶滄波石磴盤空鳥道過百丈金身開翠壁萬龕燈焰隔煙蘿雲生客到侵衣濕花落僧禪覆地多不與方袍同結社下歸塵世竟如何靈燈寺薛能莽莽空中稍稍登坐看迷濁變清澄須知火盡煙無益一夜欄邊説向僧武擔山寺蘇頲武擔獨蒼然墳山下至泉鼈靈時共盡龍女事同遷松栢銜哀處幡花種福田詎知留鏡石長與法輪圓利州北佛龕前重於去歲題處作前人重巖戴清美分塔起増標蜀守經塗處巴人作禮朝地疑三界出空是六塵銷卧石鋪蒼蘚行藤覆綠條歲年書有記非為學題橋渠州冲相寺崔塗水流花謝兩無情送盡春風過楚城蝴蝶夢中家萬里子規枝上月三更故園書動經年絶華髮春惟滿鏡生自是不歸歸便得五湖煙浪有誰争冲相寺渠州城四十里乃定光佛道塲此詩古老相傳是唐相崔塗僖宗時避亂至蜀所題今無墨蹟存惟定光岩間有題云前進士崔塗由此間眺翌日乃歸宿成都松溪院李洞松持節操溪澄性一炷煙嵐壓寺隅翡翠鳥飛人不見琉璃瓶貯水疑無夜聞子落真山雨曉汲波圓入畫圖塵擁蜀城抽鎻後此中猶夢在江湖題岳池縣集虛觀吕洞賓青蛇煉影月徘徊夜静雲閑尚未來應是有人新換骨暫留踪跡到天台留題飛雲道院前人擕笻來此步飛雲踐滿賓堦緑蘚勻江上同歸共誰去不堪囘首不逢人偶乘青帝出蓬萊劒㦸峥嶸徧九垓我在目前人不識為留一笠莫沉埋凌雲寺二首薛濤聞説凌雲寺裡苔風髙日近絶纎埃横雲㸃染芙蓉壁似待詩人寳月來聞説凌雲寺裡花飛空繞磴逐江斜有時鎻得嫦娥鏡鏤出瑤臺五色霞題仙居觀偽蜀杜光庭往歲真人朝玉皇四真三代住繁陽初開九鼎丹華熟繼躡五雲天路長烟鎻翠嵐迷舊隱池凝寒鏡貯秋光時逢白鹿岩前往應許潛通不死鄉題鴻都觀前人亡吳覇越已功全深隱雲林始學仙鸞鶴自飄三蜀駕波濤猶憶五湖船雙溪夜月鳴寒玉衆嶺秋空歛翠煙也有扁舟歸去興故鄉東望思悠然題都慶雲觀前人三仙一一駕紅鸞仙去雲閑逺古壇煉藥舊臺空處所掛衣喬木兩摧殘清風嶺接猿聲近白石溪涵水影寒二十四峯皆古隱振纓長往亦何難聖母山祈雨詩并序宋潘洞靈池縣東山下有朱真人洞洞北岡嶺連屬逾二十里得褚聖女祠化跡尤異民咸事之予出宰之次月邑中苦旱於是潔誠薦禱希恩於二像之前曽未三日甘雨大㴻民欣其應式歌且忭仰荷明靈之垂祐作詩以記之錦里城東邑高原十六鄉江流分不到天雨降為常益部十縣多引江水溉田咸為沃壤唯靈池疏決不到須候天雨俗謂之雷鳴田節及三春後晴逾兩月强龍乖尋穴蟄魚困入泥藏樹影全虧緑苗姿半吐黄耕夫皆慘戚市户亦蒼忙潛慮寃無雪深疑政有傷推恩慙睿主引咎謝虛皇磬折真人宇星奔聖女堂先時蠲玉饌隔夜浴蘭湯洞口焚香逺山椒作梵長幽誠期必達𤣥應果旋彰雷振南峯下雲飛北嶺傍聲稠喧竹塢勢迫瀉銀潢飃灑連三晝滂沱遍一方稻畦煙漠漠荷沼水泱泱物態涵優渥民情遂樂康洪施周庶品餘潤浹他疆稔歲還堪待陰功詎可㤀明靈何以報奮藻紀遺芳集海雲鴻慶院宋祁地勝祠仍古春餘物徧華山雲時抱石佛雨不萎花嶺挾樓梯峻巖牽殿墄斜淙谿雜環珮怪蔓走龍蛇趺坐僧飛鉢香園客戱沙吾㳺真草草深意寄青霞再逰海雲寺作前人十里雲邊寺重驅千騎來天形歌野盡江勢讓山囘園木濃成幄樓鐘近殷雷斜陽歸鞅促飛蓋冒輕埃遊昭覺寺范鎮炎蒸無處避此地忽如寒松砌行無際石房禪自安鴛鴦秋沼漲蝙蝠晚庭寛登眺見田舍衡茅半不完淨衆寺新禪院前人金地四郊外一來煩慮攄凡逢似仙境鮮不屬僧居岸緑見翹鷺溪清無隱魚殘陽已周覽欲去幾躊躇新繁縣顯曜院梅摯繡地縈囘寳勢長遍逰寧倦徙胡牀譯齋不顧幡風影講席亂飛花雨香苔陣暗連僧榻古蕉旗低映佛窗凉我來懶上東臺上目送霜楸感北堂姚親松檟在院東數里故云和韻王益梵宇蕭條白日長談空揮塵接藤牀雲章酷愛休詩麗蓮柄慵思逺社香石髮雨梳雞苑寂風梭春織鷲山凉刼灰心火銷平盡又聽鐘聲下講堂留題重光寺羅漢院贈憲上人梅摯人盡遊方證佛心師心無著外三乘蓮花結社薪吟逺玉紙抄經舊價騰藥杵半和鈴索響茶煙輕共袖雲蒸我來與話髙僧事冷笑支公學養鷹和王益曉剃吟髭雪半零海牕曽呪鉢龍醒蚤同西竺能持法應笑南僧不㑹經雲氣晝閒侵塵柄蘚痕春老上銅瓶近來禪觀都無語手指餘花滿寺庭留題清凉院王益背倚青風面枕溪濡毫新向壁間題善根不斷金蓮合淨界無塵水月齊㑹啓苾蒭真樂境花開薝蔔逺香畦因思祖塔嘗遊處更在龍盤虎踞西金陵有龍盤虎踞城西偏和梅摯一水明如罨畫溪清凉佳勝古標題香隨講雨天花爛聲入幡風地籟齊暫到已能知覺路縱遊何必理禪畦謝公公退多行樂五里鳴騶出縣西送戴䝉赴成都玉局觀將老焉蘇軾拾遺被酒行歌處野梅官柳西郊路聞道華陽版籍中至今尚有城南杜我欲歸尋萬里橋水花風葉暮蕭蕭芋魁徑尺誰能盡榿木三年已足燒百歲風狂定何有羨君今作峩眉叟縱未家生執㦸郎也應世出埋輪守莫欺老病未歸身玉局他年第幾人㑹待子猷清興發還須雪夜去尋君護國寺詩張天覺薄宦區區可歎嗟寂寥寒館過村家神錐豈向囊中出寳劒聊憑醉後誇就禄勉持毛義檄讀書空滿惠生車掩關不識青春好一夜狂風已落花外大父丞相初登科為雒縣主簿經攝垍窰鎮稅官留詩䕶國寺中令狐監征録以見寄謹再拜追和而記其後何麒傳翁遺墨剰咨嗟四海當年尚一家大老不為今日用小詩徒遣後人誇興來思跨巴滇馬歸去方乘下澤車燕麥葵僧舍裏何如夢得訪桃花此篇以和韻故兩見不以共次為序題雙流保國觀古栢胡宗師孔明廟前古栢竒此木氣象尤過之榦東髣髴煙焰起鐵龍空駕焚一枝真人丹成何所適世傳乘鶴冲天飛求詩道士心彌堅試聽一誦工曹詩清曉坐四天院喻汝礪杳杳天宇凉月墮星亦稀朝輝下簷隙逺色開林扉寂坐無物役隱几或在斯曠焉耳目清擬覺形神歸混世迹若近抱冲心獨微故殿今幾年何人所摹規當時亦姱哉作者良已罷快意取一好於身亮何私不知壯觀地徒使來者悲坐頃又成昔安知今是非龍華大像蓋冀國夫人所作因成兩絶何耕慧性元從戒定薫百花潭水浣僧裙箇中力量真超絶故老尚傳娘子軍生男箇箇欲如娘婦女軍中氣不揚試問争功瞋目士幾人能敵浣花娘普通山距府東十數里青州禪師洪杲道塲也自龍華歸過之棟宇頺落僧徒鄙野良為可惜是夜雨大作因書所聞所見為長韻前人錦城之東山培塿突起伽藍壓山口入門氣象頗不凡在昔規模定非茍黄絹碑詞著眼看侯溥作碑記本末頗詳青州老衲知名久自披榛徑結茅屋不剪霜鬢散蓬首市門有女奉巾盥衣械無花生穢垢府娼道王從師落髪人或譖之於王建建鞫之竟無他至今一轉鶺鴒語蜀人呼鶺鴒為連㸃㸃有問師者云如何是連㸃㸃師云屈指數不及既既無蹤跡故云散作諸方師子吼祖燈寂寞何人繼窣堵岧嶤惟鬼守法席草長深沒膝僧榻屋穿光見斗似聞占籍多衍沃此山寺常住田聞亦不薄合選名緇振頺朽我來不覺三歎息眼底盡空諸所有自開丈室掃塵坌聊寄門眠憇奔走夢囘中夜雨鳴簷卧聽東風寒入牖曉來散步轉山脊好語相呼聞野叟抽芒已見麥飜浪餅餌懸知香隴畆須㬰日影散林樾絢爛春光被花柳僕夫催歸屢不應景物流連寧忍負出山騎馬更躊躇乘暇應須重載酒青羊宫按趙閲道成都記載宫乃老子乘青羊降其地今有臺存焉前人一載官錦城咫尺望琳宫未始得得來正隨役役中今朝弄晴雨䇿蹇隨春風頗愛意象古停驂小從容縹緲百尺臺突起凌半空憑欄俯脩竹决眥明孤鴻信哉神仙宅不受塵垢䝉稽首五千言衆妙一以通靜觀萬物理豈假九轉功區區立訓詁亦哂河上公癡人慕羽化心外乘鴻濛要騎白鶴背往訪青羊蹤暇日與陳楚材遊四天王寺見五髻文殊畫像于廡下剥落可惜遂以告羅宗約參議遷之正法禪院俾長老惠公龕而祠之為詩十四韻書其事前人陳侯招我古寺行破椽老瓦煩枝撑丹青巨壁置廡下大士五髻彯華纓旁風上雨塵土集意象落莫無光晶近前諦視乃名筆妙處不減本與瓊成都名畫多張南本范瓊之筆惜哉此地非所託走卒嘈雜兒童輕西鄰塔廟頗雄偉彌天老惠新主盟撞鐘擊鼔五千指分坐豈無三尺楹何人堪作不請友參謀行解俱圓明從容試以語二士曰此甚易非難成便從游戯出三昧各借一臂相扶擎騰空似赴逺公約散花如入維摩城都人改觀香火肅雨淚膜拜争投誠主人更存好看客永為道伴終生平莫言有我不須你留取眉毛遮眼睛登道觀張浚蒼髯野褐予甚古蘿月桂風誰為貧當戸蛟龍森漢栢隔江鷄犬隱秦人好山如畫能留客寳鼎藏丹不計春更上高亭問𤣥鶴莫教詩眼有纎塵逰三井觀陸㳺三井舊知名暇日偶一訪棟宇壞欲盡基址尚閎壯畫墻皆國工煙雲儼天仗旌旄亞戈㦸佩玉雜弓韔太平實傑作筆落九天上吳生名擅世睥睨未肯讓規模逺有考意象豪不放最竒老癯僊骨立神愈王石格雖少怪用筆亦跌宕兩姝淡蛾眉非復火食狀塵埃久侵蝕風雨無蓋障好事未易逢寧能久亡恙雍洛刼灰餘妙迹盡凋喪斯遊恐難繼佇立増悽愴觀華嚴閣萬僧㑹齋前人拂劒當年氣吐虹喑嗚坐覺朔庭空早知壯志成癡絶悔不藏名萬衲中飯昭覺寺抵暮乃歸前人自墮黄塵每慨然擕兒蕭散亦前緣聊憑方外巾盂淨一洗人間匕箸羶静院春風傳粥鼔畫廊晚雨濕茶煙潛光寮裏明牕下借我逍遥過十年謁凌雲大像前人出郭尋幽山色新徑呼艇子載煙津不辭疾步登高閣却欲今生識偉人泉鏡正涵螺髻綠浪花不犯寳趺塵始知神力無窮盡丈六黄金果小身光相寺范成大峯頂四時如大冬芳花芳草春自融苔痕新晞六月雪木勢舊偃千年風雲物為人布世界日輪同我行虛空浮生元自有超脱地上可憐悲攓蓬曉詣三井觀前人路轉市聲逺寛閒古城東適從紅塵來忽入蒼煙叢槿心傾濃露芋葉飜微風秋陽澹籬落殘暑不必攻野老熟睡𧺫日髙首如蓬官身騎官馬君應笑龍鍾題鶴鳴化上清宫文同秘宇壓孱顏飛梯上屈盤清流抱山合喬樹夾雲寒地古芝英折嵒秋石乳乾颷輪遊底處獨自立層壇青山丈人觀前人羣峯垂碧光下擁岷僊家神皇被金巾坐領五帝衙威靈攝真境俗語不敢譁精心叩殊庭翹首仰紫華願言佩仙籙畢世驅塵邪循奉蘂珠戒期之飛太霞蒼溪山寺前人正午風色髙遂泊蒼溪縣層崖抱林木有寺藏葱蒨出船步危磴隂宻頗縈轉上到金僊家緣空列臺殿修篁間疎桐坐覺炎暑變老僧曉經論言語何貫穿引我上髙閣䦨下俯江面寥寥百里内山水盡竒觀誰謂羇旅中所見皆所願汀州白鳥聚井邑青煙散樂此暮㤀歸踈鐘起嵓畔徙倚下松門尚怪舟人喚資州路東津寺范祖禹山行無晨暮日暝崖谷昬哀猿落客淚永路驚旅魂憑陵高山巔俯視大江奔廻環島嶼合縈轉洲渚屯行雲赴楚天飛鳥下蜀門地遐怪物聚寺古深殿存憶昔李氏末煙塵暗中原姦雄競草竊割據穹海根干戈百年後見此敗屋垣我來屬清秋登覽無俗喧山深虎豹歸水静蛟鼉騫臨風獨笑叱浩蕩欲飛飜逰長松寺宿石門僧舍以石門霜露白為韻得露字楊甲疾風吹輕衣駕我雲脊路人間一囘首驚絶不敢顧烏投虛無底渺渺不知處蜂窠蟻丘垤與世同所鶩試看一蒼莽誰有不平慮尚憐野僧屋佛面荒苔蠧斷崖劃牙吻洶洶崩石怒我來得竒觀拄杖叩巖樹青山有驕色欲回俗容步平生二三子慰我一相遇娟娟松間月幽夕亦可度夜闌更小語風逼遺響去酌君無多酒繼以木蘭露登安福浮屠以高標跨蒼天為韻得跨字前人誰能於虛空千仞擢脩架層梯髙寥寥可歴不可跨疑從地上湧幻手聊一化飛龍送千柱雷雨天一借巍巍大勝妙突兀此其亞道人豈澄觀佛事了閒暇指揮三百尺斤斧隨叱咤當時奮赤手意闊已遭罵後來見竒特世眼一驚詫塹山作平地海闊梁可駕哀哉耳目陋未信猶疑嚇凌高更囘首落日在雲罅蒼蒼野浮樹漠漠水分汊悲凉豪傑窟野冡埋王伯百年眼前是俛仰閲榮謝惟當快飲酒醉聽風鈴夜宿安静觀前人青山轉龍脊矯首西南天上有仙人祠臺殿飛後前下見雲雨興樹色暗平川仙人兩黄鵠一去無歸年向來道上屨人著幾何錢一朝聞羽化悵望空流涎却揮囊中金瓦礫來投捐巖巖化金碧香火通雲煙人間萬事爾旦暮有愚賢而况争奪場轉手分媸妍仙人一囘首破隴與荒阡紛紛不足道哀此區中緣石泉㵼幽澗意寂不肯傳夜聞松風露起坐心寥然朱真人祠前人一濯巖下溪再拜巖中庭清風蕭然來吹我衣上腥仙人芙蓉冠乘月下雲軿山空雜佩響静夜朝百靈似聞客欲去小語猶丁寧肅肅上松栢急以兩耳聽寂寥古壇外但掛斗與星天明恐是夢恍惚遺心形去飲石上水再讀幽人銘青山無行迹露雨松冥冥游呪土寺西臺蒲瀛偶到城西寺人言呪土墳夕陽臺半出秋草徑才分地下無紅粉天邊有碧雲徘徊追往事風急葉紛紛夏日過莊嚴寺僧索詩為留三絶拉舍弟同賦晁公休十里溪橋梵宇新那知陌上漲紅塵老僧苦欲題新句認取維摩是故人病起支離倚痩筇幅巾芒屩竹陰中聞蟬大有新秋意一扇清凉一榻風機杼聲中禾稻肥疇𤓰區芋緑成畦田家樂事今如許何日邊城息鼓鼙雲安玉虛觀南軒感事偶書五首杜東之二儀設爐冶四山塞氛煙豈惟草木焦坐恐土石燃巴峽再不登逡巡又無年流殍竟何歸卒死填溝淵哆吻魏佛貍積粟窺淮壖僥倖逄水旱乘飢擾吾邊小人不及夕妄憂杞國天敢謂赫赫楚而無蒍賈賢古觀久荒凉寂然外人境草木既蓁蕪風雨亦頽隕我來一糞除地淨窗為迥晨光散桐陰夕照落栢影置以六尺牀度此三伏永終朝饜清凉半夜或凄冷客至共浮瓜睡餘獨煮茗遙聞斗筲兒争奪沸蛙黽街頭米價昻汲井費縻綆對我脱粟盤徐餐休祝鯁穉梧殖歲首擢起青琅玕其葉大如掌其陰勻若攤弱幹尋丈展氣已雲霄干期之四五載定足容栖鸞我老無定居僦屋蝸螺跧平生輞川宅面勢胸中盤何當遂誅茆中庭十步寛非無松栢堅未易蒼龍摶種此南窗下醉眠風雨寒嗟余何不辰備極生人凶偶全摺脅范屢脱南冠鍾再醮亦何為孫枝發枯桐鬼猶果求食寧吐殺與豐兩兒如我長無田學圃農鄭忽敢辭昏冗食哀乃翁兹外尚難言二女累喬公荆笄嫁不售誰論德與容㓜也抱竒疾比歲日尫癃亦既就膏肓二豎不可攻而我事奔走過家如狂風豈無浹旬留奈此旦夕舂吞酸一執手别去猶飛蓬心知不再見衰淚紛無從書來報哀訃齎恨歸蒼穹莫聞忍死言藁𦵏蓮花宫為父我安忍為兒汝何逢興言一及此鏃刃戕心胷念我蓄一櫛間關走西東擕持三十年出處靡不同朝梳帶殘月暮理含清風户樞既日運何由生蠧蟲今晨無故折脆響猶春葱物理有定數吾生得無窮即事感百慮撫躬悲一翁空囊乏賸鐵閙市多良工鸞膠隨渺茫秋扇慚初終從渠老齒豁稱我醉顱童至自雲安題淨戒院二首前人山口出雲鳩喚雨三月巴山蒸溽暑濁流來作虎眼文一葉孤舟命如縷道傍綠樹清陰凉中有金仙古道塲去家纔餘二百里且復看此青篔簹出門滿目傷羇旅歸舍還煎碎兒女欲問闍黎借榻眠卧對龕燈淡無語麥芒焦桑椹紫田家夫婦忙欲死死蠶入簇麥登塲夫婦飽煖孰可當道傍書生空有婦不蠶而衣真汝負功名富貴老不來書劒風塵一生悞何時即買百株桑身耕婦織策最良董生莫厭徴租吏蘇子無由黒貂敝題草堂寺前人草堂禪寺北山陲想見鳴騶入谷時猿鶴如懷海鹽令魚龍猶護紹興碑排岩樹老秋來早上殿僧稀曉散遲我亦於今抗塵土臨風慚讀孔璋移題西門外筰橋下觀音院仲昻雨砌風亭長緑苔壁間題字半塵埃城南蕭寺無人跡幾度曽因送客來遊定林院岑象求野濶蓮宫逈樓臺半倚山地連巴峽近門對漢溪灣柏徑松煙濕岩房雨蘚斑白雲邀客至明月伴僧閒經梵喧譁外香燈杳靄間勝遊成邂逅危構喜躋攀世路長何極塵心久欲還輶車正催發緩步出重關逰金泉觀李宏昔時謝女昇天處此日遺蹤尚宛然蟬蜕舊衣留石室龍飛勝地湧金泉碑書故事封蒼蘚殿寫真容鏁翠煙薄暮松巔聽鶴唳猶疑髣髴是神仙下岩寺郭印雲安欣反境小刹為徘徊殿閣隨岩轉軒窗向水開僧雖持鉢出客自艤舟來欲往無留計幽懷亦暢哉過𤣥天觀明定園福地喜重來登臨亦快哉蓬壺連海島雲洞隔塵埃羽客乘鸞去仙人駕鳳囘談𤣥閒坐久欲去且徘徊題𤣥天觀張三丰等門釣罷海中鰲一笑歸來祖晉陶花吐碧桃春正好笋抽翠竹葉還高心懷鳳闕龍鱗㑹身寓龜城馬足勞何必終南論捷徑宦情於我似鴻毛吳永齡千户許載酒請州佐秦侯及諸友遊西岩寺久不踐約秦以詩戯速之依韵同作吳伯通瑪瑙古城北禪房倚嶔巖俯瞰萬里江仰蔭千年杉我昔乘槎行遙望石壁巉青雲路正長蘿徑無緣芟今將航宦海興動東征帆聞君有成約速客勞飛函中宵起待旦秣馬催羈銜言馬出自食大笑將軍饞坦坦秦大夫嘲詩屢題緘調髙更寡和情至元非詀宿玉蟾寺吳廷舉川北湖南一水通生涯半寄祝融峯此身尚逐雲來往又掛玉蟾山上松過千佛巖和察罕亷訪韻劉成穆丹壁蒼巖青鐵楹巖頭古溜苔蘚生千年刻畫魚龍擁白日陰冥麋鹿行金草細揺蘿洞冷玉魚横過石梁清臨流古樹看心折野寺殘碑月二更全蜀藝文志巻十四
