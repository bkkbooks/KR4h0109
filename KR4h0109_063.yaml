body:
  text: 全蜀藝文志卷六十三明周復俊編行紀峩眉山行紀范成大峩眉有三山為一列曰大峩中峩小峩中峩小峩昔傳有遊者今不復有路惟大峩一山其高摩霄為佛書所記普賢大士示現之所自郡城出西門濟燕渡水洶湧甚險此即雅州江之源自嶲州卭部合大渡河穿夷界千山以來過渡宿蘇稽鎮壬辰早發蘇稽午過符文鎮兩鎮市井繁遝類郡懸符文出布村婦聚觀於道皆行而績麻無素手者民皆束艾蒿於門燃之發烟意者熏祓穢氣以為候迎之禮午後至峩眉縣宿癸巳發峨眉縣出西門登山過慈福普安二院白水莊蜀村店十二里龍神堂自是澗谷舂淙林樾雄深小憩華嚴院過青竹橋峩眉新觀路口梅樹埡兩龍堂至中峯院院有普賢閣回環十數峯繞之背倚白崖峯峯右傍最高而峻挺者曰呼應峯下有茂真尊者庵人迹罕至孫思邈隱于峨眉茂真在時常與孫相呼相應於此云出院過樟木牛心二嶺及牛心院路口至雙溪橋亂山如屏簇有兩山相對各有一溪疾步從容則震掉不可立同行者失色郡人云稍遷數里有白石渡可以船濟然極湍險也晚至青城山曰寶仙九室洞天夜宿丈人觀觀丈人峯下五峰峙峻如屏觀之臺殿上至巖腹丈人自唐以來號五嶽丈人儲福定命真君傳記略云姓寧名封黃帝同時帝從問龍蹻飛行之道本朝賜名㑹慶建福官癸酉自丈人觀西登山五里至上清宮在最高峰之頂以板閣插石作堂殿下視丈人峯直墻堵耳岷山數百峯悉在欄檻下如翠浪起伏勢皆東傾一軒對大面山一上六十里有夷坦曰芙蓉坪道人于彼種芎非留旬日不可登且涉入夷界雖羽衣輩亦罕到雪山在西域去此不知幾千里而瞭然見之則其峻極可知上清之遊真天下偉觀哉夜有燈出四山以千百數謂之聖燈所至多有說者不能堅决或云古人所藏丹藥之光或謂草木之靈者亦有光或又以謂神龍山鬼所作其深信者以謂仙聖之所設化也甲戌下五里復至丈人觀二十里早頓長生觀范長生得道處也乙亥十五里登青城縣丙子二十里早頓周家莊十里至蜀州郡圃內西湖極廣袤荷花正盛呼湖船泛之繫纜修竹古木間景物甚野為西州勝處湖中多小菱芡至此始見之丁丑三十里早頓江原縣四十里宿新津縣成都及比郡送客畢㑹邑中借店僦舍皆滿市人以為盛成都萬里橋下之江與岷江合𣲖于此戊寅為送客住一日飯罷發遣令各歸留者尚十五六己卯以小舟至彭山與家屬船㑹即解維午後至眉州城外江即玻瓈江也冬時水色如此方夏潦怒濤漲皆黃流耳辛巳朝送客燕於眉館與叙别壬午發眉州六十里午後至中巖號西州林泉最佳處相傳為第五羅漢諾矩那道場又為老慈姥龍所居凡五里至慈姥巖前即寺也甲申早出山至嘉定日未晡自眉至嘉百二十里中巖其半塗也乙酉泊嘉定壬寅食後發嘉州僅行二十里至王波渡宿蜀中稱尊者為波祖及外祖皆曰波又有所謂天波日波月波雷波者皆尊之之稱此王波蓋王老或王翁也宋景文嘗辨之謂當作皤字魯直貶涪州别駕自號涪皤或從其俗云癸卯發王波渡四十里至羅護鎮百里至犍為縣過縣二十里至下埧宿甲辰發下埧百里至叙州宣化縣百二十里至叙州才亭午叙古戎州也山谷謫居在小寺中號大死菴後人遂作祠堂乙巳發叙州十五里南廣江來合大江通百二十里至南溪縣四十里至瀘州江安縣百二十里至瀘州方申時近城有渡瀘亭不知諸葛孔明的從何處渡或云叙州正對馬湖江馬湖夷入諸夷路當自彼渡也戊申發瀘州百二十里至合江縣己酉發合江二百四十里至恭州江津縣二十里過魚洞宿泥培村庚戌發泥培六十里至恭州自此入峽路大抵西川至東川風土已不同至峽益陋矣辛亥發恭州嘉陵江江自利閬果合等州來合大江百四十里至涪州樂溫縣蒲氏墨舊出此縣大韶死久矣其族猶賣墨不復能大佳亦以價賤故也七十里至培州排亭之前波濤大洶湧如屋不可泊船過州入黔江泊此江自黔江來合大江怒濤水色黃濁黔江乃清冷如玻璃其下悉是石底自成都登舟至此始見清江涪雖不與番部雜居舊亦夷俗號為四人者謂華人巴人及禀君與盤瓠之種也壬子發涪州百二十里至鄷都縣逰仙都觀數十里至竹平宿癸丑發竹平七十里至忠州百十里至萬州宿甲寅發萬州六十里至開江口水自開達來合大江四十里至下巖四十里至雲安軍又十餘里風作水湧泊舟宿乙卯行百四十里至䕫州余前年入蜀以重午至䕫魚復方漲八陳在水中今來水更過之六十四蕝不復得見頗有遺恨峽江水性大惡飲輒生癭婦人尤多前過此時婢子輩汲江而飲數日後發熱一再宿項頸腫起十餘人悉然至西川月餘方漸消散丙辰泊䕫州早遣視瞿塘水僅能漫灔澦之頂盤渦散出其上謂之灔澦撒髮人云如馬尚不可下况撒髮耶是夜水忽驟漲淹及排亭及明走視灔澦則已在五丈以下或可以僥幸入峽而䕫人猶難之丁巳水漲未已遂决解維十五里至瞿塘口水平如席獨灔澦之頂猶渦紋瀺灂舟拂其上以過搖櫓者皆汗手死心面無人色蓋天下至險之地行路極危之時旁觀者盡皆神驚余已在舟中一切付之自然不暇問據胡床坐抬頭處任其蕩兀每一舟入峽數里後舟方續發水勢怒急恐猝相遇不可解拆也帥司遣卒執一旗次第立山之上下一舟平安則簸旗以招後船舊圖云灔澦大如襥瞿塘不可觸灔澦大如馬瞿塘不可下此俗傳灔澦大如象瞿塘不可上蓋非是也後人立石辨之甚詳峽中兩岸高巖峻壁斧鑿之㾗皴皴然而黑石灘最號險惡兩山束江驟起勢不能平余來此水勢適平俗所謂茶槽者水大漲淹沒草木謂之青草齊則諸灘之上水寬少浪可以犯之余之來此水未能盡漫草木但名草根齊亦不可涉然犯難而行不可回首也十五里至大溪口水稍闊亦差遠䕫峽之險矣七十里至夾山縣宿縣人云昨日水大漲灔澦恰在船底故可下䕫峽巫峽則不能却須水退十丈乃可是夕水驟退數丈同行者皆有喜色戊午果水退下巫峽灘瀧稠險湍流洄洑其危又過䕫峽三十五里至神女廟廟前灘尤洶怒十二峯俱在北岸前後映帶不能足其數十二峯皆有名不甚切事不足録所謂陽臺高唐觀人云在來鶴峯上亦未必是神女之事據宋玉賦本以諷襄王後世不察一切以兒女䙝之今廟中石刻引墉城記瑶姬西王母之女稱雲華夫人助禹驅神鬼斬石疏波有功見紀今封妙用真人廟額曰凝真觀廟有馴鴉客舟將來則迓數里外船過亦送數里土人謂之神鴉二十里至東奔灘高浪大渦巨艑掀舞不當一葉或謂渦所使如磨之旋三老挽抬竿呌呼力爭以出渦二十里過歸州巴東縣九十里至歸州未至州數里曰吒灘其險又過東奔連接新城下大灘曰人鮓甕已未泊歸州八月戊辰朔發歸州五里至白狗灘二十里至新灘此灘惡名豪三峽八十里至黃牛峽上有洺川廟黃牛之神也亦云助禹所疏川者廟在大峯峻壁之上有黃跡如牛一黑跡如人牽之云此其人也順流而下黃牛峽盡則扇子峽過此則峽中灘盡矣三十里得南岸平地曰平善埧出峽舟至是皆慶如重生舟師篙工皆有犒賜己巳發平善埧三十里至陜州全蜀藝文志卷六十三
