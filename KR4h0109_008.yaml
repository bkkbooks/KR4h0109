body:
  text: 全蜀藝文志卷八明周復俊編詩江山上附池沼堤堰橋梁登蛾眉山唐李白蜀國多仙山峨眉邈難匹周流試登覽絶怪安可悉青冥倚天開彩錯疑畫出泠然紫霞賞果得錦囊術雲間吟瓊簫石上弄寶瑟平生有微尚歡笑自此畢烟容如在顔塵纍忽相失倘逢騎羊子擕手凌白日觀元丹丘坐巫山屏風前人昔逰三峽見巫山見畫巫山宛相似疑是天邊十二峯飛入君家綵屏裏寒松蕭颯如有聲陽臺微茫如有情錦衾瑶席何寂寂楚王神女徒盈盈盈盈咫尺如千里翠屏丹崖粲如綺蒼蒼逺樹圍荆門歷歷行舟泛巴水水石潺湲萬壑分烟光草色俱氲氛溪花笑日何時落江客聼猿幾嵗聞使人對此心緬邈疑入嵩丘夢綵雲荆門浮舟望蜀江前人春水月峽來浮舟望安極正見桃花流依然錦江色江色渌且明茫茫與天平逶迤巴山盡搖曳楚雲行雪照聚沙雁花飛出谷鶯芳洲却已轉碧樹森森迎流目浦煙夕揚帆海月生江陵識遙火應到渚宫城陪李七司馬皂江上觀造竹橋杜甫伐竹為橋結構同褰裳不涉往來通天寒白鶴歸華表日落蒼龍見水中顧我老非題柱客知君才是濟川㓛合歡却笑當時事驅石何時到海東任慥渠堰志云九㫒口堰其源出于皂江至郫之柵頭别流為溫江口曰九㫒口者實兩江之滙也晏公類要云鄩江一名皂里今在新津㫒音恭野望前人西山白雪三城戍南浦清江萬里橋海內風塵諸弟隔天涯涕淚一身遙唯將遲暮供多病未有㳙埃答聖朝跨馬出郊時極目不堪人事日蕭條野望詩西山白雪三奇戍南浦清江萬里橋按唐地里志彭州導江縣有三奇戍韋臯傳云遣大將陳垍等出三奇西南備邊録所謂三奇營也一本作三年趙氏本作三城當從舊本作三竒戍為是李氏云老杜讀書破萬卷不曽盡見所讀之書則不能盡注其間又用方言如岸溉土銼乃黔蜀人語須是博聞多識野望因過常少仙前人野橋齊度馬秋望轉悠哉竹覆青城合江從灌口來入村樵徑引嘗果栗皺開落盡髙天日幽人未遣回春日江村前人種竹交加翠栽桃爛漫紅經心石鏡月到面雪山風赤管隨王命銀章付老翁豈知牙齒落名玷薦賢中奉觀嚴鄭公㕔事岷山沱江畫圖十韻前人沱水臨中座岷山到北堂白波吹粉壁青嶂插雕梁直訝杉松冷兼疑菱荇香雪雲虛㸃綴沙草得微茫嶺雁隨毫末川霓飲練光霏紅洲蘂亂拂黛石蘿長暗谷非關雨丹楓不為霜秋成𤣥圃外景物洞庭傍繪事功殊絶幽襟興激昻從來謝太傅丘壑道難忘閬水歌前人嘉陵江色何所似石黛碧玉相因依正憐日破浪花出更復春從沙際歸巴童蕩槳欹側過水鳥銜魚來去飛閬中勝事可腸斷閬州城南天下稀偶宴西蜀摩訶池暢甫珍木鬱清池風荷左右披淺觴寧及醉慢舸任從移䕃林簟光冷照流簮影欹胡為獨羈者雪涕向漣漪晦日益州北池陪宴司空曙臨泛從公日仙舟翠幕張七橋通碧水雙樹接花塘玉燭收寒氣金波隱夕光野聞歌管思水靜綺羅香逰騎縈林逺飛橈截岸長郊原懷灞滻陂漾寫江黃常侍傳花詔偏裨問羽觴豈令南峴首千載播餘芳題龍華山郭震昔年曾到此山回百鳥聲中酒一杯最好寺邊開眼處段文昌有讀書臺出古今詩話富順監中巖岑象求瀟灑監城隈聊驅俗駕回世塵飛不到山色翠成堆嘉陵江薛逢借問嘉陵江水湄百川東去爾西之但教清淺清流在天路朝宗㑹有期登郡前山羊士諤洛陽歸客滯巴東處處山櫻雪滿叢峴首當時為風景豈將官舍作池籠逰西湖房琯髙流纒峻隅城下緬丘墟决渠信浩蕩潭島成江湖結宇依回渚水中還可居三伏氣不蒸四達暑自徂雲頂山王擁五色琉璃白晝寒當年佛腳印旃檀藕絲織出三衣妙貝葉經傳一偈難夜看聖燈紅菡萏曉驚飛石碧琅玕更聞鸚鵡因緣塔八十山僧試說看金雞關六言姚孳邛筰兩關壁峙蔡蒙四面屏開雲捧峨眉月出江滚平羌雪來南昌灘在逹州元稹渠江明淨峽逶迤船到名灘拽􅜺遲櫓叟動搖妨作夢巴童指㸃笑吟詩畬餘宿麥黃山腹日背殘花白水湄物色可憐心莫恨此行都是獨行時劒門李商隱峭壁橫空限一隅劃開元氣逹洪樞梯航百貨通邦計鍵閉諸蠻屏帝都西蹙犬戎威北狄南吞荆郢制東吳千年管鑰誰鎔範只自先天造化爐錦江春望髙駢蜀江波影碧悠悠四望烟花匝郡樓不㑹人家多少錦春來盡掛樹梢頭石斛山曉望寄李侍郎一作斛石山薛濤曦輪初轉照仙扃旋擘煙嵐上杳冥不得𤣥暉同指㸃天涯蒼翠漫青青石斛山書事前人王家山水畫圗中意事都盧粉墨容今日忽登虛境望步搖冠翠一千峯逰青城山六言李真春凍曉羈露重夜寒幽枕雲生豈是與山無素丈人著帽相迎題丹景山金華宮僞蜀太后徐氏碧煙紅霧漾人衣宿露蒼苔石徑危風巧解吹松上曲蝶嬌頻採臉邊脂同尋僻境思擕手暗指遙山學畫眉好把身心清淨處角冠霞帔事希夷丹景山太妃徐氏丹景山頭宿梵宫玉輪金輅駐遙空軍持無水注寒碧蘭若有花開晚紅武士盡排青嶂下內人皆在講筵中我家帝子傳王業積善終期四海同漢州三學山看聖燈僞蜀太后徐氏䖍禱逰魂境元妃夙志同寶香焚靜夜銀燭炫遼空泉潄雲根月鐘敲樹杪風印金標聖迹飛石顯神功偶望天涯極臨看日腳紅猿來齊室上僧集講筵中頓覺超三界渾疑證六通願成修偃事社稷保延洪漢州三學山看聖燈太妃徐氏聖燈千萬炬旋向碧雲生細雨瀝不暗好風吹更明磬敲金地響僧唱梵天聲若說無心法此光如有情殘冬客次資陽江王巖淡雲殘雪簇江天策蹇遲回客興闌持鉢老僧來咒水倚船商女待搬灘沙翹白鷺非真靜竹映繁梅奈苦寒阮籍莫嗟岐路異舊山溪畔有漁竿過摩訶池二首宋祁十頃隋家舊鑿池池平樹盡但回隄清塵滿道君知否半是當年濁水泥池邊不見帛闌船麥壠連雲樹繞天百嵗興衰已如此爭教東海不為田春日出浣花前人側蓋天長蕩曉霏暖風才滿使君旗水通江渚容魚樂草遍山梁報雉時場雨滅塵盤馬疾樓雲礙曲進觴遲少陵宅畔吟聲歇杜子美宅在浣花溪上栁碧梅青欲向誰憶浣花泛舟前人早夏清和在晴江㳂泝時岸風搖鼓吹波日亂旌旗醉帟牽湘蔓遊鬟撲絳蕤樹來驚浦進山失悟舟移雅俗西南盛歸軺東北馳此歡那復得拋恨寄天涯避暑江瀆池前人溪淺容篙短舟移覺岸長烟稠芰荷葉霞熱荔支房枝疉三撾鼓杯寒十饋漿便成逃暑醉官事底相妨房公西湖蘇轍酒壓郫筒憶舊酤花傳丘老出新圖北行真勝成都尹直為房公百頃湖錦江思李新獨詠滄浪古岸邊牽風栁帶緑凝煙得魚且斫金絲鱠醉折桃花倚釣船合江舟中作朝公遡雲氣昏江樹春流沒釣磯如何連夜漲似欲送人歸亂石水聲急片帆風力微舟師且停櫓白鷺畏人飛沱江劉望之尚勝三年謫終慙萬里馴極知行路澀可忍在家貧嵗晚沱江緑雲深錦樹新相思肯如月夜夜只隨人浣花溪馬俌浣花溪邊濯錦裳百花滿潭溪水香竇奩散盡有霜㦸草秣匹馬不可當當時濯衣只偶爾豈似取履張子房烈烈遽見蔽此蜀喪亂懷爾徒悲傷年年春風媚楊栁綵纜㛪姌雲霞張溪邊逰冶紅粉娘了不識字空悠揚採花蕩槳不歸去暮隔煙水眠幽芳靈泉山中楊甲何處長松寺雨花雲外臺山從百曲轉路入九關回老檜成龍盡殘柯借鶴來人間斤斧亂風壑夜聲哀寒食逰學射山前人疾風吹沙天茫茫日落未落原野黃山空無人不碌碌路長馬饑不齧足荒臺古林翳雲族何人刳嵒縛層屋當時萬騎填山谷至今拾寶多遺鏃故國山川愁逺目人世悲歡風雨速凌髙舉酒天為蹙手攀巖木扣雲木何人唱我淒凉曲興亡一眼冥冥緑野水平蕪飛雁鶩富順西湖程驤春風楊栁早藏鴉秋水芙蕖晚著花細數一年湖上景天涯行客忽思家逰大隋山郭印我聞大隋名夢寐猶記録得檄天彭道喜氣知可掬出城六十里崎嶇轉江曲山門忽斗上危步倚筇竹崩石帶煙雲異草羅澗谷寂鳥下窺人纍猿時掛木路窮才見寺金碧煥雙目祖師古定光燈冷無人續開公生異世大事如付囑僧言山長隂朝暮雲容蹙兹辰為我晴疊岫堆濃緑虛閣倚秋風一洗塵土俗舉手揖丹景橫身跨白鹿十年勞問訊親到心始足坐久燭漸微借榻雲間宿山寒寐不成忩外泉鳴玉岑公洞前人岑公來避世甲子十周年隋末居此夏屋虛岩豁神芝結乳懸木喬從古種香杳至今傳寄香與客人事見本傳學道能堅忍何人不得仙摩訶池梁蕭摩訶所濬陸遊摩訶古池苑一過一消魂春水生新漲煙蕪沒舊痕年光走車轂人事轉萍根猶有宮梁燕銜泥入水門蜀宮中舊泛舟入此池曲折十餘里今府後門雖已為平陸然猶號水門夏日過摩訶池前人烏帽翩翩白紵輕摩訶池上試閒行淙潺野水鳴空苑寂歷斜陽下廢城縱轡迎凉看馬影袖鞭尋句聽蟬聲白頭散吏元無事却為興亡一愴情離堆行沿江有兩崖中斷相傳秦李太守鑿此以分江水又傳李鎖孽龍于潭中今有伏龍觀在潭上蜀旱支江水涸即遣官致祭壅都江水以自足謂之攝水無不應民祭賽者率以羊嵗殺四五萬計范成大殘山狠石雙虎卧斧跡鱗皴中鑿破潭淵油油無敢唾下有猛龍跧鐵鎖自從分流注石門西州粳稻如黃雲刲羊五萬大作社春秋伐鼓蒼煙根我昔官稱勸農使年年來激西江水成都火米不論錢絲管相隨看蠶市欵門得得酹清尊椒漿桂酒刪羶葷妄欲一語神豈聞更願愛羊如愛人戲題索橋陸遊詩度索臨千仞梯山躡半空前人織簟勻鋪面排繩彊架空染人髙曬帛獵戶逺張罿薄薄難承雨翻翻不受風何時將蜀客東下看垂虹再題青城山前人萬里清逰不暇慵雙旌換得一枝筇來從井絡直西路上到江源第一峯海內閒身輸我佚山中佳氣為人濃題詩試刻巖前石付與他年蘚暈重蜀州西湖荷花正盛開水月登舟亭也湖隂亭外别有白蓮尤奇蜀中無菱至此始見之前人閒隨渠水來偶到湖光裏仍呼水月舟徑度雲錦地誰云不解飲我已荷香醉湖隂玉嬋娟敻立紅粧外何須東閣梅悠然自詩思驚風入午暑水竹有秋意采菱不盈椈興與蓴鱸㑹遙知新津宿魂夢亦清麗中巖去眉州一程諾詎羅尊者道場相傳昔有天台僧遇病僧與之木鑰匙云異時至眉州中巖扣石笋當再相見後果然今三石屹立寶如樓觀前兩樓純紫石中一樓蘿蔓被之傍有瓶峰甚端正山半有喚魚潭慈姥龍所居世傳常雁蕩大小龍湫亦諾詎羅道場豈化人往來無處耶前人赤巖倚玲竮翠邏森成削岑蔚嵐氣重稀間暑光薄聊尋大士處往叩洞門鑰雙撑紫玉關中矗翠雲幄應供華藏海歸坐寶樓閣無法可示人但見雨花落不知龍湫勝何似魚潭樂夜深山四來人靜天一握驚看松桂白月影到林壑門前六月江世界塵漠漠寶瓶有甘露一滴洗煩濁捫天援斗杓請為諸君酌玻瓈江一首戲效陸務觀作玻瓈江頭春渌深别時沄沄流到今秪言日逺易排遣不道相思翻苦心烏頭可白我可去菖花易青君易尋人生若未免離别不如碌碌無知音凌雲九頂即大石佛處初登山時巖壁上悉劖為小佛不知其數山前佛頭灘受雅江之衝最為艱險前人聊為東坡載酒逰萬龕迎我到峰頭江搖九頂風雷過雲抹三峨日夜浮古佛臨流都坐斷行人識路亦歸休酣酣午枕眠方丈一笑閒身始自由戲題方響洞漢嘉廣福院中水洞有聲琅然莫知其所在舊名丁東水山谷易今名且題詩云古人名此丁東水自古丁東至今我為改為方響洞要知山水有清音前人隔凡氷澗不可越衆真微步壺中月徙倚含風玉佩聲何須聽作㽔賓鐵寶現溪雙溪合而一既出巖竇散為此溪叢三藏自西域歸過溪見兩石子鬬攬得其一今藏黑水寺石上有一目端正透底溪以此得名前人粲粲罨畫沙鱗鱗麴塵水朝陽相發揮光景艷孔翠寧聞雙溪號但見縠紋細神魚不謀食終日印潭底躍珠本具眼聊共阿師戲收藏更傳寶一笑落第二婆羅平前人仙聖飛行此是家路逢真境但驚呀神農嘗外盡靈藥天女散餘多異花嵐雨逼衣寒似鐵氷泉炊米硬于沙峯頭事事殊塵世缺甃跳梁笑井蛙七寶巖大峨絶頂白水寺已在山半白水寺上至巖又六十里前人天如碧玉甌下覆白玉盤晶光眩相射我獨居兩閒正視不勝瞬却立聊少安但覺風浩浩骨毛森以寒神仙杳無處寧論有塵寰身輕一槁葉兩腋如飛翰同行挽我衣何往何當還少留作詩去竒哉此憑欄題蜀山圖馬德華翠壁蒼崖峭入天雨餘草木帶春煙錦江東去龍門險劒閣西來鳥道懸丞相舊圖沙磧裏拾遺髙興草堂前回看匹馬經行處似有猿聲到耳邊劒閣圖王景彰劒閣雲棧髙崖峩嘉陵江水揚清波神扃鬼鑿閟幽閣秋風古道無人過今朝日華忽西被宇宙淋灕蕩元氣霆轟颷舉神龍逝山川草木皆生意乃知世道有晦明蜀山萬仞如砥平聖人在上四海清雪山天下髙周洪謨巨靈擘斷崑崙山移來坤維參井間內作金城障三蜀外列碉􅀈居百蠻自昔蠶叢始開國千巖萬谷積寒雪疑有五城十二樓玉色瓏玲界天白光連銀漢霏素虹六月大暑飄寒風俯見五嶽在平地遙窺三島皆冥濛此去石紐無幾許昔鍾靈秀生大禹當時自此導江流至今名垂千萬古眉山天下秀大峩兩山相對開小峩迤邐中峩來二峩之秀甲天下何須涉海尋蓬萊昔我登臨彩雲表獨騎白鶴招青鳥石龕石洞何參差時遇仙人拾瑶草丹崖瀑布連天河大鵬圖南不可過晝昏雷雨起林麓夜深星斗棲巖阿四時青黛如繡繪岷嶓蔡蒙實相對昔生三蘇草木枯但願再出三蘇輩瞿唐天下險兩崖壁立何險巇巴東大江如一絲杜宇神功渺何許堯時餘燼誰復知中流灔澦實挺特如牛如馬夏秋月怒濤掀天萬壑雷巨旋觸石千層雪湯湯東去幾洄灣虎頭狼尾如連環赤甲下映人鮓甕黃牛髙抗鬼門關憶昔英雄割據日插木為梯上絶壁只今四海盡為家鎖江鐵柱存何益巫山天下奇靈鰲一動海水翻三山飄流無定根岱輿忽失十二峯萬里飛墮䕫之門仰挹銀漢洗青翠俯瞰長江似衣帶地森玉笋青雲端天開罨畫彩虹外山間神女棲陽臺芙蓉為貌玉為腮如何朝暮弄雲雨却使懷襄相繼來無乃宋玉善蠱惑託為怪誕荒淫說只今髙崖紫蔓間惟有猿哀聲不絶觀九頂山九頂峯巒插太清西戎屏障倚長城四時積雪舉頭見千里秋毫入眼明天簇蓮華朝白帝地分鰲足奠蒼生我來坐嘯情無限要得憑髙望帝京劒閣圖為王公濟進士題李東陽岷峨山髙連劒閣峽門中開如鬼鑿盤渦濺沫紛欲躍石勢迎流鬬還却驅車入山山路惡水行孤舟陸雙屩古來蜀道難于天信美不及還家樂揮毫作圗圗者誰東吳老翁生好竒胸蟠萬壑筆三峽或有神助非人為昔從此地值奇客直以賞識酬心期江山無情嵗月改白頭再往失路岐王郎年少今已壯仰睇丹梯隔青嶂遺縑斷墨空塵埃我已為子神悲愴酒酣作歌歌始放意氣崚嶒聲跌宕君不見風江播地山蹴空誰復壯逰如兩翁少岷山歌鄭善夫君不聞少岷之山連胃婁雄視四川十二州青天萬古不得到峯回嶂轉無時休劒門峨眉各失勢白帝鳥鼠俯之如浮漚上有許由瓢世人不得用直挂月戶三千秋蒙泉瀉天奔龍湫巴溪湲緩學字流漰騰入汶江萬里滄溟收山中老桂色不滓芝草琅玕爛成綺洞口長回聲利車盤石但坐煙霞侶宋有蘇長公隋有劉仙子採芝斫桂樹長鑱亂雲裏少岷山巉嶒不可攀蘇劉以後人迹復不到乃有曽東石架屋讀易于其間平生負此滄海志少年訪道青城山上餐青城絶壁之流霞下弄岷峨隂壑之潺湲黃熊蒼兕不敢迫猿狖叫嘯情自歡空谷無人行蘭草復翻翻朅去逰人世十載愁朱顔吁嗟乎青山信美蒙泉亦可以洗君耳君胡為乎城市許由之瓢欲何俟終南有捷徑北山有俗軌𤣥猿獨鶴冷眼遙看爾紅塵白馬有何益柴桑不負陶彭澤歸來乎曽東石劒閣行寄總制都憲彭公濟物孫太初太白山人老子輕裘豪且雄挽弓射龍江水中落日半壁翻江赤巫峽明月啼猿狨中原一髮渺何許峨岷萬里來秋風古云劒閣罪真宰盜賊竊據今無同地生度量固人力全活民命天為忠健兒倒戈喜多夢歸來散馬關之東燕然銅柱亦細事致君堯舜臣之功野夫甘守西山餓再見庶物回冲融全蜀藝文志卷八
