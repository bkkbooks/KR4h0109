body:
  text: 全蜀藝文志巻六明周復俊編詩城郭樓閣奉和嚴中丞西城晚眺唐杜甫汲黯匡君切㢘頗岀将頻直辭才不世雄畧動如神政簡移風速詩清立意新層城臨暇景絶域望餘春旗尾蛟龍㑹樓頭燕雀馴地平江動蜀天濶樹浮秦帝念深分閫軍須逺算緡花羅封蛺蝶瑞錦送麒麟辭第輸髙義觀圖憶古人征南多興緒事業暗相親上白帝城前人城峻隨天壁樓髙更女牆江流思夏后風至憶襄王老去聞悲角人扶報夕陽公孫初恃險躍馬意何長蜀城春望崔塗天涯憔悴身一望一沾巾在處有芳草滿城無故人懐材皆得路失計自傷春清鏡不堪照鬢毛愁更新覽蜀宫故城作宋祁國破江山老人亡岸谷摧鴛飛今日瓦鹿聚向時臺故苑猶霏雪荒池但劫灰頳遺糊處壤闔記數殘枚恨月窺林下悲風覓隴來依城狐獨速失厦鷰裴回廢社纔存樹隂垣自上苔有情惟杜宇長為故王哀觀古魚鳬城在温江縣北十五里有小院孫松夀野寺依脩竹魚鳬迹半存髙城歸野壠故國靄荒村古意憑誰問行人謾苦論眼前興廢事煙水又黄昏白帝城宋肇江雨霏霏白帝城秋草未枯春草生古來戰壘如雲横萬里瞿塘斷人行至今三峽路峥嶸時清不見更屯兵荒凉廢堞沒春耕但見牛羊日西平白帝城曽慥白帝城頭路逶迤一徑遥髙堂臨峽口暴水沒山腰隔岸魚施網横江鐵貫橋神妃翻覆手願賜雨連宵白帝城陳謙漢家郡國奄方與天覆尊臨北斗居躍馬建旌何草草縮蛙緣井共區區千年雲雨忘遺堞萬里山河鎮卧廬悽惻渭營生雨急永安宮址最先墟樓閣登成都白莵樓晉張載重城結曲阿飛宇起層樓累棟出雲表嶢櫱臨太虛髙軒唘朱扉迴望暢八隅西瞻岷山嶺嵳峩似荆巫蹲鴟蔽地生原隰殖嘉蔬雖遇堯湯世民食恒有餘鬰鬰少城中岌岌百族居街術紛綺錯髙甍夾長衢借問揚子舍想見長卿廬程卓累千金驕奢擬五侯門有連騎客翠帶腰吴鈎鼎食隨時進百和妙且殊披林採秋橘臨江釣春魚黒子過龍醢果饌踰蟹蝑芳茶冠六清溢味播九區人生茍安樂兹土聊可娱登錦城散花樓唐李白日照錦城頭朝光散花樓金窻夾繡戶珠箔懸瓊鈎飛梯綠雲中極目散我憂一作愁暮雨向三峽春江繞雙流今來一登望如上九天遊白帝城最髙樓杜甫城尖徑異旌斾愁獨立縹緲之飛樓峽坼雲霾龍虎睡江清日抱黿鼉逰扶桑西枝封斷石弱水東影隨長流杖藜歎世者誰子泣血迸空迴白頭南充韓士英曰杜子美登白帝最髙樓詩云峽坼雲霾龍虎卧江清日抱黿鼉逰此乃登髙臨深形容疑似之状耳雲霾坼峽山木蟠挐有似龍虎之卧日抱清江灘石波盪有若黿鼉之逰余因悟舊註之非其云雲氣隂黯龍虎所伏日光圓抱黿鼉出𦢊真以為四物矣即以杜證杜如江光隠映黿鼉窟石勢参差烏鵲橋同一句法同一解也蘓子赤壁賦云踞虎豹登虬龍攀棲鶻之危巢俯馮夷之幽宫亦是此意豈真有烏鵲黿鼉虬龍虎豹㢤晩夏登張儀樓呈院中諸公段文昌重樓牕户開四望劒煙埃逺岫林端出清波城下迴乍疑蟬韻促稍覺雪風來併起鄉闗思銷憂在酒盃同前姚向秦相架羣材登臨契上台槎從銀漢落江自雪山來灑曲親流火凌風洽小杯帝鄉如在目欲下盡徘徊同前温㑹危軒重疊開訪古上徘徊有舌嗟秦策飛樑認楚材雲霄隨鳳到物象為詩來欲和闗山意巴歌調更哀同前楊汝士從公城上來秋近絶纎埃樓古秦規在江分蜀望開逺山標宿雪木席本寒灰陪賞今為忝臨歡敢訴杯同前李敬伯層屋架城隈賓筵此日開文鋒摧八韻星分應三台望雪煩襟釋當歡逺思來披雲霄漢近暫覺出塵埃同前姚康登覽值晴開詩從野思來蜀川新草木秦日舊樓臺池影揺中座山光接上台近秋宜晩景極目斷浮埃散花樓張祜錦江城外錦江頭囘望秦川上軫憂正值血魂來夢裏杜鵑聲在散花樓越王樓詩并序宋樊紹述綿之城帝猲􅀈掀明威瀰石硝馳涪瀨左凌凌紅䄺簮天地送行癸壬且掬跎踢千西北蟠紅􅀈青越王正欲為樓重軒疊飛門明忩蒙傘蹇蹇予始登謂日月昏曉可窺其背雷電合風雲遘霜辛露酸星辰介行神鬼變化草木􅀈繡髻御簔芰皆可察極縈視其江帶又極視其土崗斷暴逺近山嶮若閿之東皇天原開見荆山我可黄河矙然為曲直淚雨落不可掩因口其心曰無害苦其目果星星過歸尚悲不能解重為詩以釋益不可顧謂郡中諸君能無有意綴以華艷其念蓄云危樓倚天門如􅂒星辰宫榱薄龍虎怪洄洄繞雷風徂秋試登臨大靄屯喬松不見西北路老懐益凋窮石瀨薄濺濺土山杳窮窮昔人愴為逝所適酡顔紅今我茲之來猶校成嵗功輟田植科畝游圃歌芳叢地財無取厚人室安取豐既乏富庶能千萬慚文翁北樓宋祁少城西北之髙樓此地蒼茫天意秋驚風白日忽已晩落葉長年相與愁極塞雲物自惨澹趨林烏雀時啁啾纓上朔塵久不洗安得手弄滄江流西樓夕坐前人炎氛隨日入岑寂坐遥帷倦鶩昏投浦驚蟬夜去枝桂華兼月破槎影帶星移珍重窻風好羲人即此時陪孫之翰大博登成都樓張俞齪齪古之人傷心廣陵廢遂絃蕪城歌半夜一揮涕蕙紈隨草衰藻黼歸塵翳魂石歛丘封歌堂從水逝薫光杳沈滅吞恨徒千嵗我懐吴蜀國旤亂若符契目覽臺殿墟心感君王世干戈日馳逐狼虎争吞噬山河寳天塹城闕巍地肺霸力不久炎倐忽如焚薙空餘萬雉城岌倚寒雲際麋鹿玩苹隂狐狸棲棘衛江漢含嗚咽岷峨抱迢逓荒村煙火遥落日寒風厲因知市朝人自古悲興替散花樓喻汝礪濯錦江邊莎草濃散花樓畔天芙蓉蜀山疊疊脩門逺誰把丹心問李鄘唐討淮蔡李鄘籍帑藏以獻由是諸道皆助軍費自鄘倡之樓上醉歌陸游我游四方不得意陽狂施藥成都市大瓢滿貯随所求聊為疲民起憔悴瓢空夜静上髙樓買酒捲簾邀月醉醉中拂劒光射月往往悲歌獨流涕剗却君山湘水平斫却桂樹月更明丈夫有志苦難成修名未立華髪生芳華樓賞梅前人素娥竊藥不奔月化作江梅寄幽絶天工丹粉不敢施雪洗風吹見真色出籬藏塢香細細臨水隔煙情脉脉一春花信二十四縱有此香無此格放翁年來百事惰惟見梅花愁欲破金壺列置春滿屋寳髻斜簮光照坐百榼淋漓玉斝飛萬人辟易銀鞍過不惟豪横壓清􅋯聊為詩人洗寒餓犍為江樓范成大河邊堵立㸔歸篷三老開頭暮欲東漲水稠灘連峽内淺山浮石似湘中無人驛路榛榛草有客江樓浩浩風種落塵消少公事賸裁新語寄詩筒縣令師永錫同年能詩西樓獨上前人竹日駐微暑松風生早秋閒尋來處路獨倚静中樓老景驅雙轂鄉心挽萬牛相隨木上坐脚底亦雲浮西樓秋晩前人樓前處處長秋苔俛仰璿杓又欲囘殘暑已隨梁燕去小春應為海棠來客愁天逺詩無託吏案山横睡有媒晴日滿忩鳬鶩散巴童來按鴨爐灰冬至日銅壺閣落成前人走遍人間行路難異鄉風物雜悲歡三年北戶梅邊暖萬里西樓雪外寒已辦鬢霜供嵗籥仍拚髀肉了征鞍故園雲物知何似試上東樓直北㸔萬景樓在漢嘉城中山上登覽勝絶殆冠此州予令盡工作圖以歸山谷來游時但有安樂園未有此樓也前人左披九頂雲右送大峨月殘山剰水不知數一一當樓供勝絶玻瓈濯錦遥相通指揮大渡來朝宗川靈胥命各東去我亦順流呼短篷詩無傑語慚風物賴有丹青傳小筆仍添詩客倚欄㸔令與山川相映發龍彎歸路遶烏尤棟雲簾雨邀人留若為喚得涪翁起題作西南第一樓别後寄題漢嘉月榭陸務觀所作同年謂王子蒼萬景嘉州酒名湖亭明月湖也在州治前方作旗亭月榭正直大峨取太白峨眉山月之語以名傍有一岩景趣尤佳子蒼欲作樓未果前人隠吏詩情卜築幽同年惜别勸淹留試傾萬景湖亭酒来㸔半輪江月秋川路雖長猶共此夜船空載且歸休碧巖勝處頻囘首好事誰能更小樓制勝樓王延禧䕫子城新築長江便作壕欲兼諸面敵故起北樓髙即舊基仍峻因時力不勞青天纔咫尺翠壁似周遭近照東西瀼遥分上下牢百蠻歸指掌三峽見秋毫帝道方無外皇威到不毛三鈎閑夜鎖圗經三鈎鎮置鎖水即今舊州是也八陣縱春遨䕫民每嵗人日逰八陣磧守土慙非稱提兵亦謬叨經營皆使指備豫本戎韜功乏為山助名加制勝褒登臨欲吟咤深愧杜陵豪制勝樓李濤畫省容臺記並遊相思相望㡬登樓路長久歎音塵絶事變還驚嵗月流合侍鈞天終雅奏却穿巴峽㸔横舟欲酬嘉恵須新語老覺枯腸不奈捜登制勝樓次韻閻蒼舒百牢闗下古䕫州坐鎮休餘只倚樓赤甲白鹽齊意氣葛巾羽扇獨風流夜閒警柝抛金鎖春樂熙臺醉玉舟化國舒長公事少眼中萬象固神捜白雲樓程之才鬻熊城郭遶蒼崖萬疊煙嵐亦壮㢤平地窺覦心未惬重樓徙倚眼初開披襟風月争新入剖月江山破迥來日落三峩知處所雲浮雙闕欲崔嵬胡牀不愧庾公興奕簟還思杜老才更待擕衾盡清景夜深欄檻逼昭囘仁夀寺閣程公闢半天鐘鼓宴峥嶸早晩晴隂景旋生湖暖水香春載酒月寒雲迥夜聞笙金鼇破海頭争並玉鷺排煙陣自横我是蓬萊東道主倚欄先占日初明合州望黔樓義光江上望黔樓望中煙靄浮微凉生户牖新雨過汀洲逺岫千重疊清波萬里流此時何限興囘首寄羣鷗彭州南樓文同百尺壓城端飛簷欲上搏湖光揺埤堄山影轉欄干秀野含春構喬林擁暮寒囘頭大岷雪十仞玉㠝岏歸雲閣明安磐山腰飛鳥囘樹杪泉聲落尋幽醉不歸更上歸雲閣全蜀藝文志巻六
