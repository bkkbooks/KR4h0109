body:
  text: 全蜀藝文志總集類提要臣等謹案全蜀藝文志六十四卷明周復俊撰復俊崑山人嘉靖庚戌進士江南通志作名後淑者誤也是編乃其為四川按察司副使時博採漢魏以降詩文之有關於蜀者類為一書包括網羅極稱賅備所載如宋羅泌姓氏譜元費著古器譜其書多不傳於今又如李商隱重陽亭銘義山文集亦失載皆可以備考核諸篇之後復俊亦間附辨證如漢初平五年周公禮殿記載洪適隸釋並載史子堅隸格詳略異同彼此互見非同他地志之泛泛采托者至若曹丕告益州文與魏人檄蜀文僞詞虛煽顛倒是非於理可以不録然此志搜羅故實例主全收非同編録總集有所去取善惡並載亦未足為復俊病惟篇末不著貶駁之詞以申公義是則誠疏耳乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀全蜀藝文志原序俊嘗疑孔明者夙稱三代之遺才伊周之流亞也扶翼英主毗贊皇烈亦既庶幾哉成允成功矣一時宫府建屬號稱得人關壘橋梁靡不繕治至於八陳唘圖木牛創製皆訏謀𤣥逺理思神密雖後祀千載罕有儷焉而史官獨未之立時如秦子敇輩則敷述允章藻麗辭理非無良史之才蓋俟夫河洛海甸之廓清而後蘭臺玉堂之𢎞啓斯為志耳夫國之有史也經事緯道秩類宣倫馳輝於來葉式正於羣生諒乎盡制作之妙而流聲金石協天人之統而幽贊神明者矣可忽乎哉總志之編以代史也慨蜀之有土自神禹導江叢帝開國山谷崇深區域延廣其間事變沓積視它郡為殷英賢文筆擬上國尤盛是知蜀不可以無志猶國不能以無史也是故首紀帝后而立極配體昭焉次之以藩封而疏潢錫壤渥焉次之以監守而分畫慎固崇焉次之以名宦而授鉞載其光焉次之以郡縣而分茅禀其責焉若乃經略贊皇王之業雜志慎揚遏之幾藝文以參隂陽之祕而其本末煥然章紀列矣然而天垂日映懸符東觀之篇秋皎春溫式體西臺之令辟之搜剔山海至寶弗克駢收而懸黎明月其庶摛光揚質矣俊也少有四方之志每悅蜀都賦劍閣銘太白子美篇章以洎司馬淵雲諸作而孔明故墟遺蹟思一登覽焉恨未能也兹乃躬履其地日誦其遺文而獲以論其世則其為幸不已多乎嘉靖壬寅夏四月朔旦按察司副使周復俊撰
