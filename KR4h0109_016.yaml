body:
  text: 全蜀藝文志卷十六明周復俊編詩紀行琵琶峽梁簡文帝由來歷山川此地獨回邅百嶺相迂蔽千崖共隱天橫峰時礙水斷岸或通川還瞻已迷向直去復疑前夕波照孤月山枝斂夜煙此時愁緒密熒魂逝九遷遂州南江唐陳子昂楚江復為客征棹方悠悠故人憫追送置酒此南州平生亦何恨夙昔在林丘違此鄉山别長謡去國愁宿空舲峽青樹村浦前人的的明月水啾啾寒夜猿客愁浩方亂洲浦寂無喧憶作千金子寧知九逝魂虛聞事朱闕結綬騖華軒委别髙堂夢集作愛窺覦明主恩今成轉蓬去嘆息復何言再使蜀道眇眇葭萌道蒼蒼褒斜谷煙壑爭晦深雲山共重復古來風塵子同眩望鄉目藝閣有儒生軺車倦馳逐青春客岷嶺白露搖江服嵗月鎮羇孤山川俄集作長反復魚逰戀深水鳥逰戀喬木如何别親愛坐去文章國蟋蟀鳴户庭蠨蛸網琴筑下江向䕫州天明江霧歇洲浦棹歌來渌水逶迤去青山相向開城臨蜀帝祀雲接楚王臺舊知巫山上遊子共徘徊蜀道後期前人客心爭日月來往預期程秋風不相待先至洛陽城曉行巴峽王維際曉投巴峽餘春憶帝京晴江一女浣朝日衆雞鳴水國舟中市山橋樹杪行登髙萬井出眺回二流明人作殊方語鶯為舊國聲無多山水趣稍解别離情赴犍為經龍閣道岑參側徑轉月壁危梁透滄波汗流出鳥道膽碎窺龍窩驟雨暗溪谷歸雲網松蘿屢聞羌兒笛厭聽巴童歌江路險復永夢魂愁更多聖主幸典郡不敢嫌岷峩初至犍為作前人山色軒楹內灘聲枕席間草生公府靜花落訟庭閒雲雨連三峽風塵接百蠻到來能幾日不覺鬢毛斑早上五盤嶺前人平旦驅駟馬曠然出五盤江回兩岸鬭日隱羣峰攢蒼翠煙景曙森沉雲樹寒松疏露孤驛花密藏回灘棧道溪雨滑畬田原草乾此行為知已不覺蜀道難自巴東舟行經瞿塘峽登巫山最髙峯晚還題壁李白江行幾千里海月十五圎始經瞿唐峽遂步巫山巔巫山髙不窮巴國盡所歷日邊攀垂蘿霞外倚穹石飛步凌絶頂極目無纎烟却顧失丹壑仰觀臨青天青天若可捫銀漢去安在望雲知蒼梧記水辨瀛海周遊孤光晚歷覽幽意多積雪照空谷悲風鳴森柯歸途行欲曛佳趣尚未歇江寒早啼猿松暝己吐月月色何悠悠清猿響啾啾辭山不忍聽揮䇿還孤舟宿巫山前人昨夜巫山下猿聲夢裏長桃花飛緑水三月下瞿塘雨色風吹去南行拂楚王髙丘懷宋玉訪古一霑裳早發白帝城前人朝辭白帝彩雲間千里江陵一日還兩岸猿聲啼不住輕舟已過萬重山桔柏渡在昭化杜甫清冥寒江渡駕竹為長橋竿煙濕漠漠江水風蕭蕭連笮動嫋娜征衣颯飄颻急流鴇鷁散絶岸黿鼉驕西轅自兹異東遊不可要髙通荆門路濶㑹滄海潮孤光隱顧盼遊子悵寂寥無以洗心胸前登但山椒飛仙閣前人土門山行窄微徑緣秋毫棧雲闌干峻梯石結構牢萬壑欹疏林積隂帶奔濤寒日外淡泊長風中怒號歇鞍在地底始覺所歷髙往來雜坐臥人馬同疲勞浮生有定分飢飽豈可逃嘆息謂妻子我何隨汝曹利州南渡溫庭筠淡然空水帶斜暉曲島蒼茫接翠微波上馬嘶看棹去栁邊人歇待船歸數藂沙草羣鷗散萬頃江田一鷺飛誰解乘舟尋范蠡五湖煙水獨忘機雲安李羣玉灘惡黃牛吼城孤白帝秋水寒巴字急歌迥竹枝愁樹暗荆王館雲昏蜀客舟瑶姬不可見行雨在髙丘遊蜀鄭谷所向明知是暗投兩行清淚雨前流雲橫新塞遮秦甸花落空山入閬州不分黃鸝驚夢曉唯應杜宇信春愁梅黃麥緑無歸處可得漂漂愛浪遊題嘉陵驛武元衡悠悠風斾繞山川山驛空濛雨似煙路半嘉陵頭已白蜀門西更上青天駱谷章孝標捫雲裊棧入青冥鞿馬鈴騾傍日星仰踏劒稜梯萬仞下緣水岫杳千尋山花織錦時聊看澗水彈琴不暇聽若比爭名求利處尋思此路却安寧春日遊嘉陵江劉滄獨泛扁舟映緑楊嘉陵江水色蒼蒼行看芳草故鄉逺坐對落花春日長曲岸危檣移渡影暮天栖鳥入山光今來誰識東歸意把酒間吟思洛陽宿蒼溪館前人孤館門開對碧岑竹窗燈下聽猿吟巴山夜雨别離夢秦寨舊山迢遞心滿地莓苔生近水幾株楊栁自成隂空思知己隔雲嶺鄉路獨歸春草深曉發唐求旅館侯天曙整車趨逺程幾處晚鐘斷半橋殘月明沙上鳥猶在渡頭人未行去去古時道馬嘶三兩聲舟行夜泊䕫州前人維舟鏡靣中回對白鹽峰夜靜沙堤月天寒水寺鐘故園何日到舊友幾時逢欲作還家夢青山一萬重發邛州寄友人前人茫茫驅一馬自嘆又何之出郭見山處待船逢雨時曉雞鳴野店寒葉墮秋枝寂寞前程去閒吟欲共誰過黃牛峽張蠙黃牛來勢瀉巴川叠日孤舟逐峽前雷電夜驚猿落樹波濤秋恐客離船盤渦逆入嵌空地斷壁髙分繚繞天多少人經過此去一生魂夢怕潺湲入蜀劉義望空問真宰此路為誰開峽色侵天去江聲滚地來孔明深有意鍾㑹亦何才信此非人事悲歌付一杯赴資陽經嶓峽漢水所出元和三年已授此官羊士諤寧辭舊路駕朱轓重使疲人感漢恩今日鳴騶到嶓峽還勝博望至河源題劒門李德裕竒峰百仞懸清眺出嵐烟迥若戈回日髙疑劒倚天參差霞壁聳合沓翠屛連想是三刀夢森然在目前出蜀門歐陽詹北客今朝出蜀門翛然領得入詩魂遊人莫道歸來易三不曽聞古老言初入漢州韋莊北儂初到漢州城井邑樓臺觸目驚松檜影中旌斾色芰荷風裏管絃聲人心不似經離亂天意何知却太平三日醉眠金鴈驛臨岐無限眼波橫蒼溪縣寄揚州兄弟元稹蒼溪縣下嘉陵水入峽穿江倒海流憑仗鯉魚將逺信鴈回時節到揚州題天苴驛僞蜀太后徐氏為尋靈境散幽情千里江山暫得行却恨烟光看未足便驅金翠入龜城題天苴驛太妃徐氏翠驛紅亭近玉京夢魂猶自在青城比來出看江山景儘被江山看出行萬州自此後登陸州號南浦郡宋范成大晨炊維下巖晚酌檥南浦波心照州榜雲腳響衙鼓前山如屏墻得得正當户西江朝宗來循屛復東去此萬州形勢也惟親歷者當知此言之工官曹倚巖棲市井喚船渡瓦屋仄石磴猿啼閙人語剔核杏餘酸連枝茶賸苦窮鄉固瘠薄陋俗亦寒窶土人賣杏皆先剔其核取仁以為藥也土茶甚苦不簡枝葉雜茱萸煎之營營謀食艱寂寂懷甎訴昔聞吏隱名今知吏隱處邡驛前人暮雨連朝雨長亭又短亭今朝騎馬怯平日繫船聽竹葉垂頭碧秧苖滿意青濃疇方可望客路敢遑寧遂寧府始見平川喜成短歌前人峽之西遂之東更無平地二千里惟有髙山三萬重不知誰人鑿混沌獨此融結何其工我本吳江弄水月忽來踏遍西南峰不知塵界在何許但怪星辰浮平空直疑飛入蝶夢境此豈應有行人蹤今朝平逺見城郭云是東川軍府雄原田坦若看掌上沙路淨如行鏡中芋區粟隴潤含雨楮林竹徑凉生風將士歡呼馬蹄快康莊直與錦里通半年﨑嶇得夷路一笑未暇憐飄蓬新津道中前人雨後郊原淨村村多好音宿雲浮竹色清溜走榿隂曲沼擎青蓋新畦藝緑針江天空濶處不受暑光侵峩眉縣縣出符文布婦女人人績麻且行且觀田家束蒿燃于門口為香氣以迎客前人窮鄉未省識旌旄雞犬歡呼巷陌騷村媪聚觀行績布野翁迎拜跽燃蒿泉清土沃稻芒早縣古林深槐癭髙珍重里儒來獻頌盛言千載此丘遭過江津縣不暇梢船前人西風扶櫓似乘槎水濶灘沈浪不花夢裏竹間喧急雪覺來船底滚嗚沙䕫門即事自東川入峽路至恭州便有癭俗夾岸山悉庳下入䕫界山皆傑然連三峽䕫水不可飲取之卧龍十里之外雲安麴米春自唐以來稱之今䕫酒乃不佳前人峽行風物不堪論袢暑驕陽雜瘴氛人入恭南多附贅山從䕫子盡侵雲竹枝舊曲元無調麴米新篘但有聞試覓清泠一杯水筒泉須自臥龍分刺濆淖前人濆淖盤渦之大者峽江水壯則有之或大如一間屋相傳水行峽底遇暗石則濆起已而下旋為渦然亦未嘗有定處或無故突然而作叵測也舟行遇之小則欹傾大則與齎俱入險惡之名聞天下峽江饒暗石水狀日千變不愁灘瀧來但畏濆淖見人言盤渦耳夷險顧有間仍於非時作未可一理貫安行方尉縠無事忽翻練突如湯鼎沸翕作茶磨旋勢迫中成窪怒霽外始暈已定稍安慰倏作更驚眩漂漂浮沫起疑有潜鯨噀勃勃駭浪騰復恐蟄鰲抃篙師瞪褫魄灘户呀雨汗逡巡怯大敵勇往决鏖戰幸免與齎入還憂似蓬轉驚呼招竿折奔救竹笮斷九死船頭爭萬夫石上牽旁觀兢薄氷撇過捷飛電前余叱馭來山險固嘗遍今者擊楫逝豈復憚波靣澎澎三峽長颭颭一葦亂既微掬指忙又匪科頭慢天子賜之履江神敢吾玩但催叠鼓轟往助雙櫓健涪州江險不可泊入黔江檥舟前人黃沙翻浪攻排亭濆淖百尺呀成坑坳窪眩轉久乃平一渦尉帖千渦生篙師絶叫驅川靈鳴鐃飛渡如奔霆水從岷來如濁涇夜榜黔江聊濯纓玻瓈徹底鏡靣清忽思短棹中流橫釣絲隨風浮月明邡道中文同驅馬下遙川殘陽促晚鞭髙林夾廣道亂水入平田村落晴如畫桑麻晝起烟飛鴻正南下歸意滿雲邊過朝天嶺前人雙壁相參萬木深馬前猿鳥亦難尋雲容杳杳斷鴻意風色蕭蕭行客心山若畫屛隨峽勢水如衣帶轉巗隂生平來往成何事且倚鈎欄擁鼻吟月下船行入資州范祖禹憶昨卧碧山蒼蒼叢桂間白雲為屏石為枕緑蘿長挂明月間忽來輕舟泛江水山月隨人還在此白鷺驚飛宿靄間青山倒卧蒼波底此時孤棹發中流川后倚波聽棹謳不學子猷中夜返欲乘明月向資州過瀘江亭虞允文映水林巒影顛倒濟川舟楫勢峥嶸東行萬里欲乘興更待一篙春水生䕫州一首郭印䕫子巴峽衝風物異蜀境城居板作屋江汲地無井四郊乏平原冡墓緣山嶺人傳蚯蚓瘴俗飲茱萸茗女婦盡背籃老弱多垂癭試問何所因食彼山泉冷嵓棲固不少亦有長細頸似聞此土人其性皆悍獷胸中忿畜者甕盎成項領是說理有之云胡不自省我來適夏初端坐愁日永况經六七月官舍如沸鼎有雨未沾濡蔬茹空盤皿清泉不敢喫僅免河魚梗投紱歸去來吾鄉等箕潁發成都劉望之落拓平生載酒行如今憔悴鬢絲生無金得買青樓笑空負閒愁出錦城欲洗羇愁只自醒郫筒酒好信虛名江陽春色論千户價比西州却未輕一夜孤舟浪打頭不容客夢到滄洲誰言江上煙波急未抵歸心一半流廣都道中作李新萬花織籬凡幾曲繡屏處處圍茒屋家貧張户無羅幕東風吹開莫吹落居人應笑行客癡春去春歸總不知琅璫驛今之上亭鋪邵清叔弄臣寧復解輸忠偶契琅璫一語中富貴易忘貧易感西來方憶曲江公暑行憩新都驛陸遊細細黃花落古槐江臯不雨轉輕雷長空鳥破滄洲去落日人從緑野來散䇿意行尋水石脫巾髙卧避氛埃羇遊每羡端居好看月房湖又一回早發新都驛前人喔喔江村雞迢迢縣門漏河漢縱復橫繁星明若晝愛凉趣上馬未曉閲兩候髙林起宿鳥絶澗落驚狖寺樓插蒼壑沙泉潟幽竇我行忽萬里坐嘆關河富官如廣文冷面作拾遺瘦今年曷歸哉勿落春鴈後自漢州之金堂過沈氏竹園小憩坐間微雨前人修修萬竹壓康莊碧玊椽圍一尺強雪節煙梢誰暇賞馬蹄車轍可憐忙帽邊忽墮吹香句肘後舊傳醫俗方更覺清遊天所惜坐來飛雨度橫塘馬上微雨前人三日觸毒暑衣垢背汗浹今旦殊蕭然凉雨吹醉頰瘦松無橫枝蠧竹少全葉渚蓮乃可念汝泣如放妾豈惟人意適我馬亦振鬛逺村有歸人清溪爭晚涉彌牟鎮驛舍小酌前人郵亭草草置盤盂買果烹蔬便有餘自許白雲終醉死不論黃紙有除書角巾墊雨蟬聲外細葛含風日落初行遍天涯身尚健却嫌陶令愛吾廬九月十日如漢州小獵於新都彌牟之間投宿民家前人適從邛州歸又作漢州去天低慘欲雪遊子悲嵗暮十年辭京國匹馬厭道路野火炎髙岡江雲暗空戍角弓寒始徑霜鶻飢更怒邂逅成小獵尺箠聊指呼北連武侯祠南並稚子墓合圍蹙窮鹿設伏截狡兔壯哉帶箭雉耿介死不顧吾寧暴天物戰法因得寓黃昏過民家休馬燎裘袴割鮮盛燔炙毛血灑庭户老姥亦復竒訊掃邀我駐丈夫倘未死千金酬此遇自廣漢歸宿十八里草市前人月黑叩店門燈青坐床簀飯粗雜沙土菜瘦等草棘泰然均一飽未覺異玉食我豈兒女哉口腹為怨德古人恥懷祿不仕當力穡從今扶犂手終老謝翰墨過笮橋道中龍祠小留前人江邊龍祠何年作白浪花中插朱閣朝暾漸上宿霧收喜氣已動晨霜薄我來倚闌一悵然蘆花滿空如栁綿安得身為雙白鷺飛上灘頭却飛去玻瓈江眉州共飲亭前人玻瓈江水千尺深不知江上離人心君行未過青衣縣妾心先到峨眉隂金尊共釂不知曉月落煙渚天橫參車輪無角留不住馬蹄不方何處尋空憑尺素寄幽恨縱有緑綺誰知音愁來只欲掩屛睡無奈夢斷聞疏砧瑞草橋道中作在眉州經年簿書無少暇欵段今朝欣一跨瑞草橋邊水亂流青衣渡口山如畫老翁醉著看龍鍾小婦出窺聞婭姹荒陂吹笛晚呼牛古路倚梯晨採柘殘花零落不禁折香草丰茸如可藉郵亭慈竹筍穿籬野店蒲萄枝上架功名垂世端有待利欲昏心喜乘罅羇窮自笑豈人謀閒放每欲從天借草根蟲語祇自悲風裏蓬征安稅駕祖師補處浣花村㑹傍清江結茅舍豐橋旅舍作在西門我是山林人心期在塵表出門消底物兩屫萬事了羣兒何足愠為爾常悄悄今朝山中路更喜相識少三義市人醉爭席豐橋逆旅留饋食小婦髻鬟髙一尺梭聲軋軋當户織栁林酒家小樓桃花如燒酒如油緩轡郊原常自遊微倦放教成午夢宿酲留得伴春愁逺塗始悟乾坤大晚節偏驚嵗月遒記取清明果州路半天髙栁出青樓自成都回元虞集還鄉思速去鄉遲王事相縻敢後期里父留看題壁字山僧打送捨田碑胡桃筇竹南方要盧橘枇杷上國知此日君親俱在望徘徊三顧欲何之過黃陵廟李于村黃陵廟前湘水緑天寒漁郎唱巴曲沙棠舟上月蒼蒼翠蛟白蜃江茫茫似聞清愁五十柱萬里鴻飛楓葉暮神鴉翻舞祠門開珠裳玉䄂霑莓苔𤣥猿晝啼蘿薜影赤鱗夜去芙蓉冷北渚淚痕斑竹紋南風哀思蒼梧雲山頭古桂秋露碧山下江流豈終極荒凉揭車雜杜蘅靈風自吹煙霧旌輕帆晚向芳洲泊聊薦蘋羞奠蘭酌沅有汜兮湘有沱洞庭水落生層波裴回獨詠騷人歌山行明胡子昭銼秣尋芳徑携壺上翠微路危行客少山濶見人稀古廟存臺址荒神著蘚衣山雞元不慣驚起舍前飛人道山行好山行最寂寥緼袍鈎棘刺草履踏松茅古木參天秀岩泉浸石橋道人驚破膽虎嘯白猿號永寧道中吳伯通步出長淵向鴈西山川渾似浣花溪渠渠活活泉聲細澳澳青青竹色齊客路欲迷惟信馬人家不見但聞雞惜無杜老林中住還訪荒亭共醉題秋林驛楊廷和桃花溪水繞山流半是金沙湧作洲瘠土幾灣剛有麥平林一望更無楸驛舊名楸林鎮改今名去木從秋絃歌雅俗從今換土人舊少讀書者桑柘生涯不外求好寺欲遊遊未得賞心聊寄驛前樓鹽亭縣前人幾畨寓宿鹽亭縣耒得閒情一賦詩土俗舊從張老變縣人舊多氐語自張隱翁始變之髙山曽受杜陵知杜詩髙山擁縣青溪深野水流雲氣雪壓寒條帶玉枝夜向德星橋上望仰髙鄉衮有餘思德星橋嚴舊居鹽亭道中前人成都此去未為賒土俗看來亦自差驛卒裹糧多橡茅鹽亭煮井半泥沙雲中石路依山轉澗外畬田趂木斜剛到富村風景别竹林松徑是人家隆山道中前人西水褰裳渡梯石上雲嶺護持集衆力牽送引修綆盤旋幾百折歷覽可千頃鳥飛皆下風雲過欲摩頂髙樹小於拳溪田望如井念此僕夫勤塗泥沒雙脛慚愧我何功勞人當自省猿山道上前人古店北來皆鳥道驅馳今日又猿山軟莎歇馬蹂新碧老樹盤蛇蝕舊斑直上有天通逺近周圍無路可躋攀勞人我亦勞神久一見郵亭一解顔百節驛八十里劉端萬峯回合鎖重關車馬蕭然驛吏閒春夜不眠啼鳥靜一溪流水響潺潺松坎驛二首前人九十春光欲暮八千客路初行宇宙有人憂世江湖何事忘情乍雨乍晴天氣半花半鳥風光客子相看不倦詩人髙詠何妨播南吟七首前人荒草猶傳李白城夜郎憔悴若為情半生豪氣隨烟水千古詩名煥日星水交箐裡有猿啼聽罷令人思欲迷聞說近來多虎跡行人莫到日頭西百折羊腸一徑危林深長見日光遲三坡險處君須記正是行人滴淚時小箐南頭大箐鄰箐中林木不知春從來鬼魅多依石自是豺狼怕近人何人喚此老青岡亂石磨牙險更長百杵杵來行不到直教行客為心忙石虎關髙似劒門戈矛森立勢雄吞行人過此應須恐虎嘯猿啼白日昏又向南溪入箐來一聲長嘯虎羣猜凌空石笋柴關上却使行人望眼開舟曉朱琉鸂鶒將雛護石根莓苔綴纜雜衣痕幾椽茅屋生春色無數桃花燒野村祈嵗鄉儺簫鼓咽坐風舟子嘯歌喧蓬窗興劇誰憐我幾㸃青峰映緑尊全蜀藝文志卷十六
