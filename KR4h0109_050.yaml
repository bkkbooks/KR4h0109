body:
  text: 全蜀藝文志卷五十明周復俊編雜著誄哀辭祭文弔紀信文唐盧藏用維年月日某官名恭弔漢忠臣將軍紀信公曰皇綱圯兮帝紐頽王風悲兮霸道衰天運促兮周以復秦德棄兮漢業開何項王之贔屭作驅除於雲雷豈淵海之飛蕩資拔山之偉才於是左契歸楚羣雄奉職皇矣漢祖獨負其直矧滎陽之圍城兮既孤而逼偉將軍之天誘兮矯奪其識彼見危而授命兮亦各有時考振古以為觀兮罔恢帝基感將軍之憤兮壯大義之在兹仰前修以砥節顧車回而馬遲嗚呼身既焚兮業既昌楚歌絶兮漢道光君不旌兮史不揚功不録兮殁不傷奄孤墳以載葬抑千祀而為荒皇周敷訓兮澤及枯胔伊豫寡德兮忝宰兹地奉宣嘉猷兮懼尸厥位思將軍兮允忠且義託神交於萬古兮實獲心志乃斫石於他山兮式幽墳以昭賁詞曰攝提貞兮奉揚仁風跋涉草莽兮祠弔紀公善彼勇兮殺身為忠九原不作兮豫將焉同金石刻名兮千萬歲魂魄光烈兮為鬼雄白雲先生張少愚誄宋蒲氏芝少愚之妻高視往古哲士實殷施及秦漢餘烈氤氳挺生英傑卓爾逸羣孰謂今世亦有其人其人伊何白雲隱君嘗曰丈夫趨世不偶仕非其志祿不可茍營營末途非吾所守吾生有涯少實多艱窮亦自固困亦不顚不貴人爵知命樂天脫簪散髮眠雲聽泉有峯千仞有溪數曲廣成遺趾吳興高躅疏石通徑依林架屋麋鹿同羣晝逰夜息嶺月破雲秋霖灑竹清意何窮真心自得放言遺慮何榮何辱孟春感疾閉户不出豈期遂往英標永隔抒詞哽噎揮涕汍瀾人誰無死惜乎材賢已矣吾人嗚呼哀哉張愈字少愚益州郫人祕書郎辭官歸隱居青城山白雲溪杜光庭故居六召不應性樂山水遇有興雖數千里輒盡室往遂浮湘沅觀浙江升羅浮入九疑買石載鶴以歸杜門著書未就而卒妻蒲氏名芝賢而有文為之誄云樂善郭先生誄楊天惠孟子論士以為入而獨善其身則仁義忠信樂善不倦出而私淑諸人則孝弟忠信誨人不倦如此人者蓋古之所謂天民君子而今之所謂鄉先生者也以余觀於樂善先生豈其人耶先生諱某字長孺自言本虢叔後虢與郭聲相似故轉為郭其遷徙入蜀初莫詳也今為成都人曾祖諱某大父諱某世以晦德相光逮皇考益力學為文詞知名於鄉先生幼讀父書盡傳其學皇考蚤世先生執喪如成人喪除猶有餘戚奉母夫人極謹身率妻子約衣粗食操井臼以養無懈時間遇親疾輒憂恐緼火結帶晨夕侍不去疾平乃已先生家居陋甚然徒步出入里閭人望之常辟易其耆壽以先生篤於親故多遣子弟持脯幣助給太夫人滫瀡裘葛費先生得之不以一錢私妻子悉歸親所數奉甘脆美好物親欲必供未嘗以有亡為解親沒先生哀毁骨立畚土成墓廬其旁三年遂菜食終身先生鮮兄弟獨從兄存尤困憊先生輟食飲饋之比其疾革有老父稚女在先生趨告之曰兄母憂某能為兄身任之即日迎館于家既辦喪與葬竟奉其父如父已殁送如禮撫女如子已長聘以時異時先生從祖父母及叔父母皆無後委棺客土先生傾所有舉四喪葬高原春秋奠享必及無闋舅有孤兒體下不立先生携歸教畜為娶婦有子母黨之祀賴以無絶先生氣體夷粹侃侃似不能言遇人無貴賤磬折下之然其中端挺不倚終日劇談無駁雜戲慢半語故鄉人之善者親附其不競者尊憚之平生惟好書無他嗜丹鉛㸃勘筆不去手自經史百氏之書浮屠黃老之教下暨陰陽地理醫卜之藝吐納煅煉之術皆研盡其妙有易解十卷書解七卷老子道德經解一卷三教合轍論闕卷蔬食譜一卷歌詩雜文十卷以為立身揚名莫如孝作孝行圖守節高蹈莫如隱作高逸圖善惡之應猶影響作陰德雜證圖各為之論述傳於其徒時朝廷設八行科求篤實尤異之士鄉老喜相語曰吾里有人矣於是合千百人狀先生美行于縣于府以卜數府縣以禮延置鄉校將薦諸朝會先生病卒年若干實某年月日也娶張氏生一子某登上舍第二女未嫁以某年月日葬某鄉里其友人楊匯曰自古賢者殁有易名請諡曰樂善先生而東蜀楊天惠誄以文之凡先生之獲於人者其斯而已矣顧不已薄哉然以聖可為子而彊為善頗能自將要必能起其家者則天之報先生其亦奚薄哉誄曰嗚呼先生肫肫於食貨而安矻矻於為善而樂若猶可及然至其用貧以裕子而親以施于人而我皆無憾焉是不可及已弱無固壯無專老無在死無餘此元次山所以哀紫芝者顧某於先生亦云嗚呼先生其果可以戒塗之淫佞也夫其真可以配古之卓行也夫房季文誄前人季文房氏名彪曾祖諱某父諱某偕以邁德為成都聞家自豫假館於其家園季文從豫學文最開敏有精識然不樂效書生作應用之詞尤羞與鄉校少年伍豫曰子親之髮垂領矣日望子速化叵若何季文蹶然起為一再試學官皆異等後三年訪豫於郫文益工行益峻潔又一年從豫府城之客舍則勝言翛翛逼人豫曰子何自得此季文曰彪比師耆而友謙之二子皆大士也請介以交於先生豫曰固願之然恐難致耳季文曰彪能致之居有間二子不來豫問故於原父原父曰前闕日季文死矣某拊髀呼失涕實某年月日也於是其母若兄將以是歲月日葬之某鄉某里而乞銘於豫豫弗忍銘也故誄之以遺之季文妻某幾歲誄曰豫頃疑仲尼聖之盛也頗遺耻於少賤既老而後集成六經怪子雲賢之尤也仍竊悔於少作蓋晚而後覃經顧闕子乃交臂於壯齒而童烏驟談𤣥於稚齡斯已竒矣然造物者闕既其實而司命者忍復隕其英吁嗟季文子豫無以唁若矣請問諸泱漭之庭寧魂辭張商英熙寧元年六月壬戌有星隕于張氏之宅是夕也豫兄殿中侍御史次功卒明年二月乙酉葬于雙流縣之甘泉鄉從父塋禮也兄敏悟出於天禀弱歲通五經善綴文是時祿寺府君自三江之新穿徙居于江原之金馬有鄉先生號為碩儒次功就學歲餘曰才有餘而道不足不可以為吾學府君異之以一壥購書千餘卷資其讀次功閉户刻苦力學或半歲不識肉味年十八鄉書送至禮部後五年為解頭遂釋褐調南平决曹掾非其志也乃嘆曰大丈夫進無竹素之功退無千古之名何以出人益發憤而大窮古人之道胸中所藴􅀈淪滃渤而不能自禁於是溢為文彩頃刻千字感槩以吐其憤浩蕩以快其思曠達以踈其情清苦以斂其氣至於時之理亂民之利病曉然洞見其本末而計謀識慮常在人意之表前後封章十餘上諸公聞其名以賢良方正科薦者五六人以臺諫館閣薦者數十人自南平更典秭歸獄遷襄州穀城縣令改東觀即監閬州稅遷祕省丞太常博士今上即位遷田曹員外郎以近臣薦其鯁正有先識之明擢為殿中侍御史正色言事不顧時忌方將大出所有以澤當世不幸以憂去職感疾而卒嗚呼次功之名暴於天下之耳目播於多士之詠歌記録其章疏議論藏於祕府其文章流落溢於好事者之巾箱其始終大槩具於豫之行狀今其葬也內不瘞志而外不揭表次功之名亦可以萬世矣故為辭以寧其魂辭曰遵邑門以西出兮蓊莽乎甘泉之野甓九壤而為室兮閴密乎黝無晝夜慨俊邁之永息兮逐霜筌而奄謝遺紛垢以探𤣥兮杳未窮夫上下斂清氣以歸藏兮賁轜車而曉駕感湔流之噫咽兮抱遺恨而東瀉鴻靈澒其罔物兮遞有無以更化惋人世之飄游兮孰悲咷之自暇砥才刃以反戕兮彎智弧以卻射甘大患而役形兮髙不覩夫太華修途邈其無隩兮驥足憊而莫跨大空蕩其亡隈兮鴻羽摧而已下既明哲之是畀兮胡壽年之弗假䀌凉宗之薄祐兮踤百罹以豫嫁蠧五內以寸裂兮涕浪浪而橫灑涕與血盡兮可奈之何伊人往矣兮遺我實多犖犖伊人兮其儀峨峨冠姬服孔兮躪雄蹈軻安貧力學兮一志無他晨炊不紹兮恬事絃歌鸞鶱鶴翥兮匪駕匪鴚躟馳䂄視兮弗䁲莫佳切弗蹉􅀈劊譎詭兮􅀈相謬訛柄停浩氣兮㪺斟太和舍塿躋衡兮去潢泳河鏜韶嗄鄭兮掐蘅刌莪雄文煥爛兮乾象森羅武庫抽鐍兮霜寒萬戈突為層崖兮漲為巨波呼號蕩海兮獰蛟戰鼉堂堂徑氣兮不撓不阿孤篁挺節兮危松擢柯狒脣狐貌兮毅然詆訶豪焰浡浡兮青穹上摩妙齡升冠兮俯陟賢科扼居下僚兮珠潛于螺嗤誚彼已兮胡食其禾捐生取義兮感歎汨羅忠憤自許兮沽求則那皂封瀝血兮志念時疴議論端確兮不磷于磨如廣指的兮如乘診瘥名擅海內兮價重鑾坡朝劉大對兮勇過廉頗安能俯首兮塵壒婆娑熙寧之主兮軒道虞德寤寐正人兮心虛席側濯濯羣公兮推挽先識僉俞允諧兮超置言職霜簡稜稜兮豸冠觺觺言行俱危兮不訐不愎綱愔高造兮曩謂司直髙步跨古兮烈無難色抉開肺腑兮揠出丹臆寧同江葦兮漩止濤逼渾首可殊兮語不可默一軀胡恤兮誓於報國囊裝靡釋兮日傒南殛虎嘯于山兮貆匿于棘皂鵰戛雲兮梟鵂攛翼旦聨寶珂兮伏覲宸極一言感悟兮天衷太息隆棟巨礎兮行睨厥力謂可近侍兮獻替失得奫奫素畜兮臯夔益稷匪徒藻翰兮鈒繪紩織方圓設施兮大噦悃愊如丹伏蒲兮如藩批敇噓吸淳風兮薰沐動植挹清浣汙兮拄强㩍踣布序萬曜兮躔南舍北昴暈潛白兮衝妖喪黑㥾忸勍虜兮扱衽匍匐沒煙為疆兮朱耶就纆志遙器邈兮皎皎不惑車擊輠摧兮蘭燔香熄笑言在耳兮音容或或于庭于牆兮誕謾莫測嗚呼哀哉母垂白兮子勝裳死者佚兮生者傷慘聚首兮號素堂哀聲苦兮白晝黃魯而存兮智而亡天乎何辜兮遘此不祥感神祗之不妥兮畏山嶽之摧岡駟黃螭以仚舉兮訴豫懷乎彼蒼彼蒼祕其冥造兮愍豫心之搶攘假宵夢以諄諭兮漏靈機之渺茫呀九閎以洞闢兮進豫趾乎玉廂曰地行之泯懵兮徒紛紛其吾殃三才剖而殊體兮吾獨宰乎陰陽蒸和融潤兮噴燠呵凉六氣欲叶兮三辰欲光元精遺以墮世兮孰吾弼而還相豈而世之寶才兮吾固亦珍乎畯良忽形開以寤興兮諒神理之不荒茍詰施於善惡兮奚顔短而跖長嗚呼哀哉維昔吾考兮志操逸羣顚沛於善兮革家以文質衣而餼賔客兮市田而購典墳門惟蓬茅而賢轍常滿兮廪乏甔石而義聲四聞肆吾兄之肯構兮為時卿雲攬芳桂以飄纓兮釋南畝之耕耘嗟人事之反覆兮何變故之糾紛天澤方連於星驛兮薤聲已咽於鄉枌悲豫才之短耗疏促兮其曷以就先志而嗣清芬念獲終於正命兮豫又烏能效宋玉之招魂嗚呼哀哉世衰俗薄兮仁義不施機功競騖兮化為澆漓已矣乎長往兮蛻去如遺歸如返寂兮又奚其悲戢收精爽兮隱于大儀嫓元朴以長存兮縱陵谷之改移勿降為賢人哲士兮憂患生於有知勿瑞而為騶虞鸑鷟兮嘷豺狼而噪鳶鴟勿秀而為紫芝朱草兮山草占春以離離勿堅而為黃金白璧兮繞指耀鋼而誇功矜竒嗚呼噫􅐵兮萬古有畸不知其人兮視此哀辭祭王岐公文范鎮維鎮與公官事多同若一臂交常相依從公進於用鎮退居窮罙十六年公譽自充方遂平生奄忽以終自豫退居人事隔絶侍從常僚不復通謁惟公每歲遇上元節置酒開樽笙歌間闕道應闕窮歡闕悅自顧耄耋年七十八茍在人闕能幾日月今公此闕所恨闕劣不能酹别祭李舍人文大臨前人惟靈諒直果敢著于平生於朝盡忠於人盡誠伊余與公自幼相從闕景祐中朅來之東同年登科四紀于今白首一節金玉其心近闕去冬詩筒見貽三老唱酬歡如塤篪江山之興共得其時余雖勉招計方覽窺凶訃之來肝腸摧悲潁昌寓居道逺人疲遣致薄奠公其鑒之祭范蜀公文蘇軾嗚呼仁宗在位四十二年畦而種之有得皆賢既歷三世悉為名臣今如晨星存者幾人孰如我公碩大光明導日而升燦焉長庚死生契濶公獨壽考天實耆之以殿諸老二聖嗣位仁義是施公昔所言略行無遺維樂未和公寢不寧樂成而薨公往則瞑凡百君子願公無極胡不萬年以重王國責難之忠愛莫助之嗟我後來誰復似之吾先君子秉德不耀與公弟兄一日之少窮達不齊歡則無間豈以閭里忠義則然先君之終公時在陳宵夢告行晨起訃聞先友盡矣我亦白髮聞公之喪方食哽噎堂堂我公豈其云亡望公凛然猶舉我觴同前蘇轍公之少年初以賦鳴挾䇿以東氣和而平微見圭角人人自驚宋氏伯仲典司衆盟見公所為屣履以迎自毁其文以致公名士滿太學莫之敢爭公之中歲始以諫起堯老將傳未有立子羣公欲言以目相視公獨發之自詭以死帝知其忠始怒終喜復有繼者實蹈公軌公亦自信卒老言事公之末年終以節聞國有蟊賊當之以身力言不從遂致為臣開門接士不怨不憤羣枉既消衆屈當伸有欲援之同撫我民公笑稱病誓不復振凡世之人有一於是翹然自名足以為貴公有其三豈不卓偉位雖顯融有不盡忠嵩隗之間潁潩之側有廬可安有田可食顧惟平生篤志鐘律樂成既上疾亦告革嗚呼昔我先人公蚤知之白首相歡往事莫追軾方在朝公舉諫官卒以獲罪初無一言轍來自東復館于門曾患之不恤而惟義是敦今共云亡無復斯人代趙端明祭范蜀公文馮山大賢於人景星鳳凰不出則已出則為王者之嘉祥有目者爭先覩之為快及其不復見也識與不識共惜乎人之云亡方公妙齡起于華陽風流文彩相如子昻及為從官而慷慨論議揚雄李固不足以比方使中州之豪傑視蜀青襟之子而不敢詒慢者由公為之主張白首玉堂而不自如聊卒歲而徜徉先請老于耆年遂濯纓於滄浪踵越相之遺風輕二疏以粃糠方元祐之訪落登耆明而贊襄凡天下之大老雜遝至于廟堂詔書旁午而不起乃引禮以抗章完始終而無虧孤高岌如太行衮繡在前而弗之顧獨友乎仲元與蜀莊嗚呼未老而歸數十年流輩零落者殆盡而公方傲睨乎林泉忽新樂之方上梁木壞於璧田乾坤倐其安往騎箕尾而上天其不發為卿雲甘露以輝潤乎萬物則將結為精金美玉而發見於山川悲夫自昔登門屬居某後束書從師公則誨誘義兼姻婭子舍維友宦逰窮年去德滋久謂言于公當享上壽杖履從公志或可就云何一别遂不我有我欲哭之天高地厚人亡師表國失耆舊江漢竭靈岷峨隕秀千里致奠豆肴巵酒言出涕隨公其聞不代許內翰祭李侍制文前人維公金馬碧雞西南之珍奮起江漢儷蹤淵雲秉筆立朝嫓詞皇墳熙寧之初英彥鳬藻孰不紆餘以自襮褾公獨守官不少低繞拂衣西還便欲請老岷山之前有田一㕓圖史自適樂全乎天嗟豫鼎來異獲親賢須公疾間當奉周旋云何不淑館舍是捐嗚呼性命之理在公已通昔生非有去亦無從公雖偃然人則懷公一樽一奠聊與人同祭寶月大師宗兄文蘇轍轍方志學從先君子東遊故都覽觀藥市解鞅精舍時始見兄頎然如鵠介而善鳴宗黨之故情若舊識屈信臂項閲歲四十性直且剛纎惡不容與人盡言口如病風惟我兄弟不見瑕疵行有利病勢有隆汙始終一意不為薄厚交逰之間蓋未始有昔我之東師則有言逰宦如寄非可久安意適忘歸憂患所由亟還于鄉泉石可求我志師言未返而顚師亦不待與化俱遷遣舟與榮萬里來訃開紙失聲悔恨無所彈指西望卯塔既成臨絶之言求我以銘自我竄逐憂病相襲緝綴清風得一忘十追懷曩好徒有此心心則不忘而病未能收淚語舟歸酌流水一生一死誠則無已祭白帝廟文何逢原白帝子陽氏維公孫生於西方扶風茂陵耻臣新莽擊滅宗城遂據益州帝其民人四七之際赤伏再興十二為期殄我金行背城以死允也國君異安樂公喪邦保身扞關之顚巋然古城廟食其中威靈具存旄頭法駕御如羣臣環佩結裾繪畫錯陳遐想盛時文物聲明蠶叢魚鳬豈帝之倫我懷英風酹以斯文休哉白帝千古益尊祭漢先主昭烈皇帝文明獻園維洪武二十四年歲次辛未十二月二十八日敢昭告于漢昭烈皇帝漢丞相諸葛忠武侯曰龍興雲從君明臣良曠千載而一遇何會合之不常曰若稽古實惟成湯三聘莘野承筐是將咸有一德革夏為商歷嬴秦而兩漢孰能襲其遺芳偉中山之帝胄當羣雄之擾攘噓炎焰於寒灰時三顧於南陽情交歡於魚水言靡間於關張保岷峨控荆湘三分天下開拓封疆信同心而協力視當代而有光豫丕仰於休風幸開國於是邦覩閟宮之頽圯歎古柏之荒凉命我將士繚以垣墻屹棟宇之崔嵬煥丹青之焜煌新規模於今日聚精神於一堂告厥成功我心孔臧遣官致祭釃酒刲羊惟帝與侯神其洋洋祐我蜀民降福穰穰祭杜子美文獻園維洪武二十六年歲次癸酉十二月某日遣官以牲醴之奠致祭于草堂先生杜公曰先生距今之世數百餘年而成都草堂之名至今日而猶傳豫嘗縱觀乎萬里橋之西浣花溪之側尋草堂之故址黯衰草兮寒烟是以不能無所感也於是命工構堂闢地一㕓扁舊名於其上庶幾過者仰慕乎先賢然人之所傳者先生之遺編也而豫之所羡者蓋以先生一飯之頃而忠臣愛國之惓惓雖其出巫峽下湘川固不戀戀於此而先生之精神如水之在地無所往而不在焉爰矢辭於翰墨寫豫心之悁悁臨風釃酒尚其來旃祭韞玉山文獻園維洪武二十八年歲次乙亥八月某日遣成都右護衛指揮同知李遵以牲醴之奠致祭于韞玉山之神曰山者石之所自出而石者地氣之所凝結也今欲命工匠動雲根分翠巘之巉岩鑿蒼苔之磊落以為邦家之用而爾神司之用是遣使致祭以告于兹山之靈俾人匠之衆陸運車輸履險如夷默加庇佑式昭靈貺伏惟神其鑒之全蜀藝文志卷五十
