body:
  text: 全蜀藝文志卷四十八明周復俊編論説辨考述議四子講德論漢王褒褒既為益州刺史王襄作中和樂職宣布之詩又作論名曰四子講德以明其意焉微斯文學問於虛儀夫子曰蓋聞國有道貧且賤焉恥也今夫子閉門距躍專精趨學有日矣幸遭聖主平世而久懷寶是伯牙去鍾期而舜禹遁帝堯也於是欲顯名號建功業不亦難乎夫子曰然有是言也夫蚊虻終日經營不能越階序附驥尾則涉千里攀鴻翮則翔四海僕雖頑嚚願從足下雖然何由而自達哉文學曰陳懿誠於本朝之上行話談於公卿之門夫子曰無介紹之道安從行乎公卿文學曰何為其然也昔寧戚商歌以干齊桓越石負芻而寤晏嬰非有積素纍舊之歡皆塗覯卒遇而以為親者也故毛嬙西施善毁者不能蔽其好嫫母倭傀善譽者不能掩其醜茍有至道何必介紹夫子曰咨夫特達而相知者千載之一遇也招賢而處友者衆士之常路也是以空柯無刃公輸不能以斫但懸曼矰蒲苴不能以射故膺騰撇波而濟水不如乘舟之逸也衝蒙涉田而能致逺未若遵塗之疾也才蔽於無人行衰於寡黨此古今之患唯文學慮之文學曰唯唯敬聞命矣於是相與結侶攜手俱遊求賢索友歷于西州有二人焉乘輅而歌倚輗而聽之詠歎中雅轉運中律嘽緩舒繹曲折不失節問歌者為誰則所為浮遊先生陳丘子者也於是以士相見之禮友焉禮文既集文學夫子降席而稱曰俚人不識寡見鮮聞曩從末路望聽玉音竊動心焉敢聞所歌何詩請聞其説浮遊先生陳丘子曰所謂中和樂職宣布之詩益州刺史見太上聖明股肱竭力德澤洪茂黎庶和睦天人並應屢降瑞福故作三篇之詩以歌詠之也文學曰君子動作有應從容得度南容三復白圭孔子睹其謹戒太子擊誦晨風文侯諭其指意今吾子何樂此詩而詠之也先生曰大樂者感人密深而風移俗易吾所以歌詠之者美其君術明而臣道得也君者中心臣者外體外體作然後知心之好惡臣下動然後知君之節趨好惡不形則是非不分節趨不立則功名不宣故美玉藴於碔砆凡人視之怢焉良工砥之然後知其和寶也精鍊藏於礦朴庸人視之忽焉巧冶鑄之然後知其幹也况乎聖德巍巍蕩蕩民氓所不能命哉是以刺史推而詠之揚君德美深乎洋洋罔不覆載紛紜天地寂寥宇宙明君之惠顯忠臣之節究皇唐之世何以加兹是以每歌之不知老之將至也文學曰書云迪一人使四方若卜筮夫忠賢之臣導主志承君惠攄盛德而化洪天下安瀾比屋可封何必歌詠詩賦可以揚君哉愚竊惑焉浮逰先生色勃眥溢曰是何言歟昔周公詠文王之德而作清廟建為頌首吉甫歎宣王穆如清風列于大雅夫世衰道微偽臣虛稱者殆也世平道明臣子不宣者鄙也鄙殆之纍傷乎王道故自刺史之來也宣布詔書勞來不怠令百姓遍曉聖德莫不霑濡龎眉耆耉之老咸愛惜朝夕願濟須臾且觀大化之淳流於是皇澤豐沛主恩滿溢百姓歡欣中和感發是以作歌而詠之也傳曰詩人感而後思思而後積積而後滿滿而後作言之不足故嗟歎之嗟歎之不足故詠歌之詠歌之不厭不知手之舞之足之蹈之也此君子於君父之常義古今一也今子執分寸而罔億度處把握而却寥廓乃欲圖大人之樞機道方伯之失得不亦逺乎陳丘子見先生言切恐二客慙膝步而前曰先生詳之行潦暴集江海不以為多鰌鱓並逃九罭不以為虛是以許由匿堯而深隱唐氏不以衰夷齊恥周而逺餓文武不以卑夫青蠅不能穢垂棘邪論不能惑孔墨今刺史質敏以流惠舒化以揚名采詩以顯至德歌詠以董其文受命如絲明之如緡甘棠之風可倚而俟也二客雖窒計沮議何傷顧謂文學夫子曰先生微矜於談道又不讓乎當仁亦未巨過也願二子措意焉夫子曰否夫雷霆必發而潛砥震動桴鼓鏗鏘而介士奮竦故物不震不發士不激不勇今文學之言欲以議愚感敵舒先生之憤願二生亦勿疑於是文繹復集乃始講德文學夫子曰昔成康之世君之德與臣之力也先生曰非有聖智之君惡有甘棠之臣故虎嘯而風寥唳龍起而致雲氣蟋蟀俟秋吟蜉蝣出以隂易曰飛龍在天利見大人鳴聲相應仇偶相從人由意合物以類同是以聖主不遍窺望而視以明不殫傾耳而聽以聰何則淑人君子人就者衆也故千金之裘非一狐之腋大厦之材非一丘之木太平之功非一人之略也蓋君為元首臣為股肱明其一體相待而成有君而無臣春秋刺焉三代以上皆有師傅五伯以下各自取友齊桓有管鮑隰寧九合諸侯一匡天下晉文有咎犯趙衰取威定伯以尊天子秦穆有王王廖由由余五羖攘却西戎始開帝緒楚莊有叔孫子反兼定江淮威震諸夏勾踐有種蠡泄庸尅滅強吳雪會稽之恥魏文有段干田瞿秦人寢兵折衝萬里燕昭有郭隗樂毅夷破強齊困閔於莒夫以諸侯之細功名猶尚若此而况帝王選於四海羽翼百姓哉故有賢聖之君必有明智之臣欲以積德則天下不足平也欲以立威則百蠻不足攘也今聖主冠道德履純仁被六藝佩禮文屢下明詔舉賢良求術士招異倫拔駿茂是以海內歡慕莫不風馳雨集襲雜並至填庭溢闕含淳詠德之聲盈耳登降揖讓之禮極目進者樂其條暢怠者欲罷不能偃息匍匐乎詩書之門逰觀乎道德之域咸潔身修思吐情素而披心腹各悉精鋭以貢忠誠永願推主上𢎞風俗而騁太平濟濟乎多士文王之所以寧也若乃美政所施洪恩所潤不可究陳舉孝以篤行崇能以招賢去煩蠲苛以綏百姓祿勤增奉以勵貞廉減膳食卑宫觀省田官損諸苑疏繇役振乏困恤民災害不遑逰宴閔耄老之逢辜憐縗絰之服事惻隱身死之腐人悽愴子弟之縲匿恩及飛鳥惠加走獸胎卵得以成育草木以時零茂愷悌君子民之父母豈不然哉先生獨不聞秦之時耶違三王背五帝滅詩書壞禮義信任羣小憎惡仁智詐偽者進達佞諂者容入宰相刻峭大理峻法處位而任政皆短於仁義長於酷虐狼摯虎攫懷殘秉賊其所臨蒞莫不肌栗懾伏吹毛求疵並施螫毒百姓怔忪無所措其手足嗷嗷愁怨遂亡秦族是以養雞者不畜狸牧獸者不育豺殖木者憂其蠧保民者除其賊故大漢之為政也崇簡易尚寬柔進淳仁舉賢才上下無怨民用和睦今海內樂業朝廷淑清天符既章人瑞又明品物咸亨山川降靈神光耀暉洪洞朗天鳳皇來儀翼翼雍雍羣鳥並從舞德垂容神雀仍集麒麟自至甘露滋液嘉禾櫛比大化隆洽男女條暢家給年豐咸則三壤豈不盛哉昔文王應九尾狐而東夷歸周武王獲白魚而諸侯同辭周公受秬鬯而鬼方臣宣王得白狼而夷狄賔夫名自正而事自定也今南郡獲白虎亦偃武興文之應也獲之者張武武張而猛服也是以北狄賓洽邊不恤冦甲士寢而旌旗仆也文學夫子曰天符既聞命矣敢問人瑞先生曰夫胸奴者百蠻之最強者也天性憍蹇習俗桀暴賤老貴壯氣力相髙業在攻伐事在獵射兒能騎羊走箭飛鏃逐水隨畜都無常處鳥集獸散往來馳騖周流曠野以濟嗜欲其耒耜則弓矢鞍馬播種則扞弦掌拊收秋則奔狐馳兔穫刈則顛倒殪仆追之則奔遁釋之則為冦是以三王不能懷五伯不能綏驚邊杌士屢犯芻蕘詩人所歌自古患之今聖德隆盛威靈外覆日逐舉國而歸德單于稱臣而朝賀乾坤之所開隂陽之所接編結沮顔燋齒梟瞷剪髮鯨首文身裸袒之國靡不奔走貢獻歡欣來附婆娑謳吟鼓掖而笑夫鴻均之世何物不樂飛鳥翕翼泉魚奮躍是以刺史感悶舒音而詠至德鄙人黭淺不能究識敬遵所聞未剋殫焉於是二客醉于仁義飽于盛德終日仰歎怡懌而恱服蜀山詩紀論宋羅泌嗚呼山川設險此天地之所以限疆界也嗟人之生離聖且智其精神固有限劑而動地之不可極今古同也奈何多欲之君溪心壑志貪以取敗然後百罅啓而天地閉矣豫讀揚雄蜀紀而感夫蜀之所以通中國者夫蜀之為國富羡饒沃固自一天壤也西畨東漢北秦南廣一障之隔自生民以來君君世紹蜀不知有中國而中國亦莫知有蜀五帝以來羈縻服外蜀固不為中國少而中國亦不為蜀不足也建安王時蜀王貪婪求欲無厭故秦惠得以圖之飾妖嬈之女劖怪誕之牛以誘其衷而後褒斜之路棧矣以故秦人得蜀之資而遂併天下自是蜀山不閉莫有其有至于今為中州則貪求之所致也一自中國之有蜀也故不可謂之無利也然而風動之辰常先他國而綴靈府一或入保則無復中國之所有者是其為國固鬼神之所作也豫既讀蜀紀而感夫蜀之所以通中國者及讀陳子昻之疏而又幸蜀之不通於吐畨也夫吐畨之於蜀猶昔日秦之於蜀也方其拿唐之兵大戰則大勝小戰則小勝幾十載矣未嘗亡一旅也以薛仁貴郭待封彪武之將屑十萬士衆於大非之用一甲不歸以李敬元劉審禮廊廟之宰辱千八萬衆於青海之上竟不能俘一醜而關隴為虛可謂強矣然其羡垂全蜀之珍如是之久而不得食者徒以山川之阻絶而障塞之不通也胡為議者欲以梁鳳巴蜓之兵開蜀道繇雅州以討生羌而襲吐畨夫羌人固未易討而昔者東漢之所繇喪敗者也嗚呼其亦幸而不成歟萬一生羌可破而蜀道遂開則蜀之瑶庫自此轉而西美使我而得吐畨其財固不足以裕國其地固不足以穡也而徒戮無辜之民竭有常之帑以徇之爾其或得之而得以穡亦其異於釋近熟而創逺業乎又何異於舍己之田而藝人之田者也况已之田舍矣而他人之田未及藝邪昔者漢之武帝好大而喜功使者張騫乃反誇以西域之冨於是嘬兵以爭之四十年間中都之財賦夏國之生靈略盡於西域矣非不得其地也得朔方之郡而自不能以耕也非惟不能耕也得朔方之生而棄上谷漁陽之熟以豫故矣其所以危士臣以締怨者得大宛良馬數十而已使齊楚之巨擘怨而交訟所爭亦不啻是一何默邪嗟乎武之轍既覆於前矣而隋之裴矩又闕西域之圖蕩煬帝之侈心於是親出玉門闕伊吾且末而關右蕭然始恃盛強卒歸狼狽此魏公之所以傷之者也顧不韙歟豫常言之滇渤漲此天地之所以限東徼也惡溪沸海此天地之所以限南徼也惡溪在濶多厲毒氣中者溫吨嘔泄逾年腳輒腐弱其魚多鰐沸海常沸尤多惡於溯云炎淵貢者經之陷河懸度之設乎西自罽賔西行厯大小頭痛山赤土身熱之坂宋膺異物志云山皆在渠搜之東疏勒之西冬月過之必有痛頭身熱吐逆之患驢畜皆然夏日則死山有毒藥氣之所為又有闕池盤道經三十里又經烏秺四百里右縣度山只尺之路下臨不測法顯記在盤陀西南今蔥嶺冬夏有雪即佛書言雪山者道有毒龍犯之輒飈闕飛礫過者少全瀚海沙子之設乎北此天地之所以遮西而制北者也沙子在契丹後彌數千里乃昔女真滅大遼其臣大石林牙契其子二晝夜逾沙子立之數十年粘罕莫能近云激障霧於東維東南瘴霧冒者多死其病如疫而重聞到七孔迸血故南方有大小法場之號今越嶲有瘴氣中之有耳看人人死看木木折口鬼隟本山瘴之氣者也界黑水於南極黑水在梁雍間涉者則脛黝黑泄流沙於西陲裴矩西域記自髙昌東南去瓜州千二百里並沙磧乏水草四面茫茫蓋西周之栁中路也又有一路自栁中縣南行經大海之東又東南度磧入伊川即裴所謂伊吾路今使郵所至髙昌從武威西北有捷路度沙磧千餘里四面茫然不可凖記行者惟一又蓄骸骨驢駝糞為志大雪即不能行或道見宫宇忽聞歌笑從之者多不反蓋魑魅也當宜未西北沙中夏則熱風為患惟老駝知之將作則聚鳴而擁其鼻口不則危斃今髙昌客旅皆由伊吾道決弱水於北滅此天地之所以界四維也出陽關至於甸路經陷河伐􅀈至中乃得度弱水亦阜河之類羽毛皆沈今川廣之界亦惟一小河淖池而深今古不得度蓋亦弱也八荒之內奚有奚無八荒之外何窮何止古之聖人一視同仁為吾臣與為狄人臣奚以異是故人得其君則已矣請試舉一隅以憲之方升明之一年倭王奉表以條其祖之勛謂東西之所服者二百九十有六國是固海東之國也倭王之所服者也其所不服者幾什伯君其盡制歟東毛人等五十五國西服衆夷六十六國度北海北九十五國一云二百二十六國支顯西遊道其所記亦數百國此于甸以西國也支顯之所知者也其不知者又不知其幾也知猛法盛之録曇勇道安之傳審至之國不十三四五百大延四域之使魏氏四道之賓所奏之國亦不闕此世之未嘗聞者也是數千里者固俱樂土也其地可謂逺矣而其人亦未嘗有能道天之涯地之角者惡乎貪而不已邪有海國説見餘論慮亂者穿其頥志逺者刺其目黃帝堯舜非不能服逺也而所守者域服之外一無所事其在周公亦不過曰詰爾戎兵陟禹之迹而已夫禹聲教暨于四海而其制中國若是截也舜投四凶於四裔羽山乃今海州崇山乃今澧州幽州則今遼東而三危乃今渭水之源繇今視之皆為近地齊之伐山戎此特北平之地而當時已譏其逺伐韓愈之貶潮陽可謂逺陋闕育之首張掖固已窮僻而今更為內地放臣遷客遂至編𨽻朱崖沙門島且猶以為未逺豈堯舜之心哉伊尹四方之令狗國豹胡亦不過三十有八國來者不可距往者不爾追又曷嘗勞吾萌宣吾府而奉之哉意先王之政教其施於中國者蓋詳矣推先王之政教以治中國則禹之所制不為少矣不繇先王之政教則禹之所制猶將不異於戎狄彼以逺略誇後世而不詳乎其內者是豈禹之心也哉末世之君不知古者之所以為國而以貪求速敗豈禹闕惑邪嗚呼其亦不聞蜀漢隋氏之事則已矣少有所知有不為之寒心哉八陳論李昭玘兵陳之事有不可以言者有不得不言者衛靈公在諸侯之任當以守法為職不當問陳有不仁之資宜以修德為務不宜問陳然且問之此孔子所以不對也所謂不可以言者也然孔子不對衛靈公之問將以立教爾至其自謂則曰我戰則克其請伐罪則曰以魯之衆加齊之半宜可克是則使孔子中天下而立定四海之民其行兵用師之際必有道矣其不肯驅烏合無律之民以用之立死之地決矣當是時也兵陳之事將習之不暇而况於言乎此所謂不得不言者也世之不善講學者恥於戎事之不知則未嘗不以孔子闢衛靈為藉口彼不知孔子之闢其旨有在而文事必有武備乃吾儒之所當言儻曰吾知道而已兵非吾之所知其不當問者闢之以此而當問者亦闢之以此是無乃拘而害事也哉儒者之於天下亦何所用也哉今夫古之用仁義之師者莫如武王為王者之佐者莫如太公為武王太公者疑若專以曲直老壯為定計凡覆殺之機布設軍勢之事當絶弗道而其六韜之書乃有鳥雲山兵鳥雲澤兵等篇其所以較勝負利害之際者甚詳豈武王太公至是而變仁義為譎詐也直以為德之不懷則兵之必用則凡所以御兵制敵之道不可不講之耳然此尚有可諉者曰六韜非太公之書蓋戰國相傾之士借太公以為市者至於詩書為帝王之遺迹豈復有可諉者耶而有扈之役則曰左不攻於左汝不恭命右不攻於右汝不恭命御非其馬之正汝不恭命牧野之誓則曰今日之事不愆於六步七步乃止齊焉不愆於四伐五伐六伐七伐乃止齊焉宣王征徐方之詩亦曰綿綿翼翼不測不克又何敦陳整旅之不能廢也夫左治其左右治其右六步七步之旅進不可不同心四伐五伐六伐七伐之擊刺不可不併力與夫綿綿以為竒而使敵不測翼翼以為正而使敵不克自帝王之時已然而書與詩載之未嘗以為恥後世之士乃獨恥言之豈非好名而不適實之弊哉蓋聞古之制陳其名不一有以三才名者日月星辰斗杓一左一右一迎一背謂之天陳丘陵水泉亦有左右前後之利謂之地陳用車用馬用文用武謂之人陳此三才之辨也有以五時名者春為牝陳刀為前行夏為方陳戟為前行季夏為圓陳矛為前行秋為牡陳劍為前行冬為伏陳楯為前行此五時之辨也有以四獸名者使商人為前兵象白虎使羽人為前兵象玄武使徵人為前兵象朱雀使角人為前兵象青龍此四獸之辨也有以五行名者水之直金之方火之鋭木之曲土之圎此五行之辨也凡若是者因類制名固不可殫數而八陳之圗尤為異同若所謂一方二圎三牝四牡五衝方六車輪七罘罝八鴈行是一八陳也若所謂金木水火土天地人又一八陳也若所謂車箱洞當金車一中黃土鳥雲鳥翔火折衝木龍騰却月水鴈行行鵝鸛天車輪地虎翼人又一八陳也紛紜異口其無定論如是至於天地風雲龍虎鳥蛇以是八物制為八名兵家者流於此多歸焉則八陳之定論亦有在矣然是八物者亦信其所從名之當否耳考其根柢陳之所以八者自有所祖述蓋其法肇於黃帝具於成周而變化於諸葛孔明非諸葛孔明之獨能為是也昔黃帝潛通八卦而建一都之法默會九天而設三軍之制是以周公則而象之以九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都自九夫之井至于四縣之都而得乎一都之法又以五人為伍五伍為兩五兩為卒五卒為旅五旅為師五師為軍自五人之伍至于五師之軍而合乎三軍之制至於孔明則又上探黃帝之微意下采成周之遺法因而循之與道神之革而化之與時宜之而陳法備焉故其制為八陳自九夫為井而演之從橫皆八而有八八六十四陳者所以通乎八卦也立為三軍自五人為伍而演之周旅皆九而有九九八十一陳者所以會乎九夫也然則孔明之所祖述者可謂深且逺矣非與夫古人之精神心術流通為一者疇能爾哉李興曰推子八陳不在孫吳木牛之竒則非般模謂木牛非出於般匠之遺其説誠是若求八陳於孫吳之書則孫吳之書固無有也是不知孔明之祖述在彼而不在此也愚故曰肇於黃帝具於成周變化於諸葛孔明之獨能為是也嗚呼八陳之法黃帝既以北逐獯鬻南平蚩尤戡黎於坂泉省方於崆洞底定萬國旁羅七曜周公既以誅紂伐奄膺戎狄懲荆舒而孔明又以此平定南中響震關輔斬王雙走郭淮殺張郃以成鼎足之勢則其明效大驗已可見矣後世之言兵孰不欲得其遺法而師承之然昧其法者莫如晉之桓溫明其法者莫如唐之李靖此又不可不知也壘石八行行去二丈此其為武侯之遺迹真與偽皆未可知而桓溫幸僚屬之不識遽欺之曰此常山蛇勢也夫常山蛇者在兵法謂之率然擊其首則尾至擊其尾則首至擊其中則首尾俱至考之陳勢特曲直一陳勢耳烏在為八哉且武侯所祖在黃帝周公而溫信於率然之説比之李興謂不在孫吳者尚或有愧故曰昧其法者莫溫若也唐太宗問李靖曰卿所製六花陳出何術乎靖曰臣本諸葛亮八陳法也大陳包小陳大營包小營隅落鈎連曲折相對古制如此及為圗陳之夫驅馳於戎馬之間識兵形陳法者莫如太宗而靖有六花之制乃不知其所出必待剖喻明白而後悟則靖之於八陳深矣又非守其緒餘糟粕者之比也愚故曰明其法者莫靖若也雖然論其深妙固未易以立談判考其大綱則不過竒正二字而已蓋古之制軍合萬二千五百人而為軍其為伍者一千一百二十五其為兩者二百五十十取三焉而為竒其餘也以為正四竒四正而八陳生焉是其分陳之數有竒有正也回旋九攢以象天四平正列以象地散渙邪直以為風前大後鋭以為雲天地風雲四者陳之正也延邪綿直以為龍蟠前合後開以為虎翼彌蔓散洽以為鳥翔回屈包羞以為蛇蟠龍鳥虎蛇四者陳之竒也是其布陳之形有竒有正也天子上將居中而不動疑兵遊軍出沒而無常是其用陳之勢有竒有正也乃若陳行之疏陳戰之密其人之列面之相向背之相承陳間容陳隊間容隊曲間容曲前禦其禦後當其後左防其左右防其右行必魚貫立必鴈行長以衛短短以救長回軍轉陳以前為後以後為前進無速奔退無遽走雖絶成陳雖散成行四頭八尾觸處為首先動為陽輕疾猛厲其勢險其節短後動為陰持重固密不動如山其倐忽幽暗神出鬼沒千變萬化而不可致窮則又所謂竒正之相生如環之無端者八陳之制如此然則為今日計將欲誅不庭戡亂略可不務乎雖王者之兵鼓之以道德征之以仁義有征無戰善師不陳也而其不幸有頑然不服者以是為權謀之助非小補也嗟乎物不終靜故受之以動當純坤用事則陰疑於陽而飛龍野戰當大朴既散則聖道並起而戎馬生郊則有力吞八荒爭截九有而生民之類騷然不寧黃帝於此順殺氣以作兵法文昌以命將而又制為陳法以貽後代豈得已者哉蓋所謂生道殺民威不軌而成文德也而後世經生儒士爭非之并與孔明之祖述者黜焉一日乘以倉卒之變而有抗衝之事其將若之何然非黃帝孔明者既以大繆而法之不守德之不修專以嗜殺自封殖為事者其為生民之禍亦豈細故耶故鄭之魚麗鵝鸛魏之鶴列晉之三行楚之二廣二孟徒以逞一己之欲而挈赤子於肝腦塗地耳其得罪於君子不亦甚乎孔子所以不對衛靈公而孟子亦嘗闢善陳善戰為民賊者豈非為此等慮者哉夫仁義權謀後世不可偏廢一於仁義則拘而不通專於權謀則浸入於詐而無以自反於正區區之慮每及乎此故力陳武侯八陳之美以謹後世之武備而又闢魚麗鵝鸛之屬以發孔子爼豆之意焉八陳圖説范孫夔州八陳之磧聞天下歷千有餘年至今存於峽口之江浦往時每過其下惑於傳聞眩於目擊終莫得其説今蒙恩從宦於此始得以暇日登崇臺而縱觀之臺髙而磧平纍石粲然一一數之而無差於是推尋其意而為之説曰陳法之大要方圎竒正而已爾武矦之法前為八者八皆東嚮其勢直而方後為十二者二皆南北嚮其勢曲而圓方者所以為正也圓者所以為竒也夫竒者正之餘李靖所論握竒文是也方圓相生竒正相救而陳法無餘事矣然則前為八者八後為十二者二何也曰此分數之法皆以八計之是以為八陳也前為八者八總而計之為八八六十四後有十二者二總而計之為三八二十四凡為八者十一絶長補短而三分之以其二為正而以一為竒合為八八矣古八陳之法其别凡八李筌隂經以為常山之勢者是也武侯之法為陳者一而已非古八陳也然而為常山之勢者固自若桓溫之言近之矣若武侯之所以為八者未知溫能悉之否也五人為伍五伍為兩萬二千五百人為隊二百五十十取三而為竒者古也武侯之法八八六十四為正三八二十四為竒是止一取三焉以為竒則精於古矣夫竒正也方圓也陰陽也一而已矣方者其隂圓者其陽也前為方者八八六十四後為圓者三八二十四絶長補短大概三隂而一陽其在易二陰而一陽為震倍之四隂而二陽為臨嗟乎武侯之意儻取諸此乎古者用竒之法或取於中或列於左右或伏於後處於中者李靖之握竒是也列於左右者淮隂侯與楚戰垓下之勢也伏於後則武侯之法司馬遷書言漢與楚決勝垓下淮陰侯自以三十萬當之髙帝在後孔將軍居左費將軍居右絳侯柴將軍又在皇帝後淮陰侯先合不利却孔將軍費將軍縱楚兵不利淮隂侯復乘之楚以大敗史傳之紀軍陳未有詳於此者淮陰侯與髙帝絳侯柴將軍所居之軍正也孔費二將列於左右者竒也淮陰侯喜以弱致人故其為竒者列於左右將佯却而後勝武侯節制之師使為竒而將出於左右者常匿於後以固其軍正兵既有所恃而竒兵唯無出出將不可禦此司馬仲達之所避而終身不敢與戰也然武侯之法密矣五運六氣論王當五運六氣之説不見於儒者之六經而見於醫家之素問夫素問乃先秦古書雖未必皆黃帝岐伯之言然秦火以前春秋戰國之際有如和緩秦越人輩雖其精於醫其察天地陰陽五行之用未能若是精密也且夫寒暑燥濕風雨者天之陰陽三陰三陽上奉之木火土金水者地之隂陽生長化收藏下應之而五運行於其間即五行之化氣也天數中於五戊居之地數中於六已居之戊巳土也化氣必以五六故甲巳化土而居於其首土生金故乙庚次之金生水故丙辛次之水生木故丁壬次之木生火故戊巳次之此化氣之序也地之三陰三陽亦五行爾獨有二五行之妙理也蓋木王於東火王於南金王於西水王於北而土王於四維戊附於戌而在乾已附於辰而在巽而未之對衝在丑故辰戌丑未寄王之位也未在酉南其卦為坤其時為長夏以其處四時之中呂氏月令謂之中央土此土正王之位也春木生火秋金生水冬水生木而夏火制金生氣絶矣惟土王於西南然後以火生土以土生金四時之序循環不窮然火方王於午土遽王於未則火氣必耗故君火以名其氣溫而未熱相火以位與太陰同處未申之間奉君令以行暑氣於是火不耗於土不屈於金故丙盛則庚伏此火所以獨分君相之位也天氣始於甲地氣始於子子甲相合命曰嵗立曰行四周而為二紀天以六為節故氣以六期而為一備地以五為制故運以五嵗而為一周運統一嵗於四時之表氣分六位於一嵗之中風雨燥濕寒暑其應有候其至有期然用以占焉往往不效非素問之無驗用其説者知常而不知變故也凡物理有常必有變雖天地之運動往來消息盈虛可以逆其必然者常也若其變則無所不至可知而不可必也嘗試即其常而言之五太之運是為太過其至先時五少之運是為不及其至後時惟平氣則不疾不徐其至以時大略如此火運上臨少陰水運上臨太陽木運上臨厥陰金運上臨陽明土運上臨太陰謂之天符木運臨卯火運臨午金運臨酉水運臨子土運臨四維謂之嵗會五太與在泉氣同謂之同天符五少與在泉氣同謂之同嵗會若是者其氣和土運上見少陽金運上見厥陰謂之運刑夫若是者其氣乖此皆五運之常也主氣各居一步厥陰主初少陰少陽次之太隂陽明又次之太陽主終六位不遷客氣與嵗推移子嵗太陽之水為初丑嵗厥陰之木為初迭相往來而少陽之氣為初乃在太陰之後半嵗以前司天主之半嵗以後在泉主之其大略如此若其情則有相得與不相得之分若其位則有順有逆相得者木火相臨火土相臨之類也不相得者金木相臨火水相臨之類也父臨子則順木居少陽之位是已反此則寒水居金位斯逆矣君臨臣則順君火居少陽之位是已反此則相火居君火之位斯逆矣此皆六氣之常也及論其變則有正有邪於是有變有勝有復有鬱有發有承當時而行者正也非時而行者邪也當時而行其退則為變非時而行其至則為勝其救則為復抑而不伸則為鬱鬱而怒起則為發陵其所勝則為淫極而必反則為承假如太角之化為啓折而變為推拉太徵之化為煊燠而變為炎烈正化之為變者然也少角木氣不足清勝而熱復少微火氣不足寒勝而雨復邪化之正復然也寒甚而無陽焰是為火鬱而無淒清是為金鬱抑而不伸者然也水鬱而發則為氷雹土鬱而發則為飄驟鬱而怒起者然也風淫所勝則克太陰熱淫所勝則克陽明陵其所勝者然也相火之下水氣承之濕土之下風氣承之極則有反者然也然摧拉之變不應普天悉皆大風炎烈之變不應薄海悉皆燔灼清氣之勝不應宇宙無不明潔雨氣之復不應山澤無不蒸溽鬱也發也淫也承也其理皆然凡此者其應非有候其至非有期是以可知而不可必也其應非有候則有不時而應者矣其至非有時則有卒然而至者矣是故千里之逺其變同者有之百里之近其變不同者亦有之即其時當其處隨其變而占焉則吉凶可知况素問所以論天地之氣化者將以觀其變而救民之疾也夫大而天地小而人之一身五行之氣皆在焉天地之氣有常無變則人亦和平而無災天地之氣變而失常則疾厲之所從出也是故木氣勝則肝以實病脾以虛病火氣勝則心以實病肺以虛病此醫者所以致察儒者不得其詳也至於官天地理陰陽順五行使冬無愆陽夏無伏陰春無淒風秋無苦雨和平之氣行於兩間國無水旱之災民無妖孽之疾此儒者所當致察醫家未必能知也素問亦略言之矣五行之精是為五緯與運氣相應有嵗星有畏星以察其行之逆順而占其吉凶然必由德者福之過者罰之則是運氣之和平而為休祥有德者召之也運氣之乖戾而為災眚有過者致之也雖然其説略而未詳吾儒之經則詳矣洪範九疇始於五行中於皇極終於五福六極聖人建極於上以順五行之用是以天下之民有五福而無六極有五福皆可以康寧矣無六極皆免於病疾此其道固有行乎運氣之外者是謂大順成周之時嘗見之由庚之詩作而陰陽得由其道華黍之詩作而四時不失其和由儀之詩作而萬物各得其宜此建皇極順五行使民有五福而無六極之驗也是故素問方伎之書而洪範則聖人經世之大法也知有素問不知有洪範方技之流也知有洪範不知有素問儒者何病焉封建論栁稷封建之法諸儒論之備矣其大端有二泥于古者以三代之制為可復達乎變者以嬴秦之法為當守雖有得失要非至論也夫天下之不可兼得者勢與權而已矣勢之重者則當損其權而不可假借以益其勢權之重者則當抑其勢而不可崇長以助其權二者惟人主得兼之而他人莫可使與在昔之明聖所以操握天下之大分而不可以告人者也彼所謂封建者或以王室之懿親或以公家之勳閥其勢之重固已貮於天子而蓋夫天下者矣乃列壤而君之官屬惟其所制戎賦惟其所徵刑賞號令惟其所施以勢若彼以權若此則強與亂相成嫌與逼相屬求其奉法守分如周之伯禽漢之劉蒼者固不易得也王者制天下顧可僥幸萬一而恃之以為久安之計耶余故曰二者皆未及其至也然則孰為至抑求其無弊而已矣昔者舜之處象也使吏代之治而納其貢稅則優遊於冨貴之樂而無歉上之恩以浹而下之亂自消君之疑不生而臣之祿有終是非特因其不肖而為之抑求其無弊而全之耳後世謂舜之處象因其不肖而為之也抑求以不肖望其親為嫌而卒乃陷其親於大惡而不能救周公之于管蔡是也向使周公之於管蔡如象之於有庳則何至於殺之囚之降之也與其殺之囚之降之而不赦孰若不任以事之為得也或者曰王者之封建蓋將公天下於同姓異姓之賢使各私其民而共戴王室也如舜之法則賢者無所施而周召為棄材矣是不然方周公使管蔡之監殷也豈不以為此吾之親而可依以無患者而管蔡之振振然良公子未聞有顯過者也而卒乃挾叛人連諸侯以危社稷夫人臣之惡莫大於叛逆而管蔡則為之蓋匹夫無道惡止於殺人而王侯犯分必至於凌上其權與勢使之然者使象居管蔡之地又安能晏然而已耶周召之賢固所當用而用之必不為國家之禍者然求之後世餘千百年如周之元聖者幾人如召之敬德者幾人繼此復千百年吾知求一人而不可得也以千百年所無之一人而以之待千百人之人雖愚者亦知其舛也固必如周召之元聖敬德而後可用如管蔡之中材則不可用而况如象者乎或者又曰三代之君皆古聖人也而為法者此其弊何也是又不然蓋凡法之立而行之久也則一利一害出為法之善者其利多其不善者其害大乘其後者乃斟酌其利害而更之而不能無弊也屢其後者又斟酌其利害而更之而亦不能無弊也屢更屢易而後知古人之得失而良法出焉是非知之所不及而謀之所未盡也勢使然也夫舜之法達權與勢而行之無弊者通乎此豈獨可與議於封建也哉杜宇鱉令辨宋羅泌按諸蜀記杜宇末年遜位鱉令鱉令者荆人也舊説魚鳬畋于湔山仙去後有男子從天隳曰杜宇為西海君自立為蜀王號望帝徙都於郫或瞿上自恃功髙諸王乃以褒斜為前門熊耳靈關為後户玉壘峨眉為城郭江潛綿絡為池澤汶山為畜牧南中為園苑時鱉令死尸隨水上荆人求之不得至蜀起見望帝以之為相後禪以國去之隱於西山民俗思之時適二月田鵑方鳴因號杜鵑以志其隱去之期一云宇禪之而淫其妻恥之死為子巂故蜀人聞知皆起曰我望帝也杜甫每每起歎所謂杜宇曽為蜀帝王者據風俗通等鱉令化從井出既死尸逆江至岷山下起見望帝時巫山壅江蜀地洪水望帝令令鑿之蜀始陸處以為刺史號曰西州自以德不如令從而禪焉是為蜀開明氏年號萬通生蘆保亦號開明時武都出五力士輔之開明子孫八代都郫九世至開明尚始去帝號稱王始成都自開明五世開明尚始立宗廟於蜀則猶在五帝時以今蜀記望帝逺記周襄王至鱉令王蜀十一代三百五十年當始皇時號蜀蘆子霸王夫始皇時蜀滅久矣史記言錯伐蜀蜀王開明拒戰不利退走武陽獲之樂史云在彭山縣則是張儀滅之也鱉水名也字一作鱉音别縣在牂牁集韻音幣而刺史乃秦官故王充劉知幾以子雲之記杜魄荆尸為妄鱉令亦作鱉靈墓在郫西五里天隳人訛為天回巴國考王象之山海經云西南有巴國又云昔太皥生咸鳥咸鳥生乘釐乘釐生后昭是為巴人郭璞注云巴之始祖事寰宇記周武王伐紂巴蜀之蜀髳微預焉尚書牧誓云及庸蜀羌髳微盧彭濮人注云髳微在巴蜀巴之名已見於此巴志云武王克殷封其宗姬於巴爵之以子春秋魯桓公九年巴子請與鄧為好莊公十八年伐楚文公十六年巴與秦楚共滅庸哀公十八年巴人伐楚敗於鄾又曰庸蠻叛楚楚莊王伐之七遇皆北唯禆鯈魚人實逐之杜曰禆鯈魚三巴今魚復縣也巴志云戰國時蜀既稱王巴亦稱王巴志亦云周慎靚王五年蜀王伐苴侯奔巴巴為求救於秦秦惠王遣張儀司馬錯救苴巴遂伐蜀滅之儀貪巴道之冨因取巴執巴王以歸置巴蜀及漢中郡蜀國考前人按世本山海經揚雄蜀王本紀華陽國志諸書皆言蜀之先肇於人皇之際至黃帝子意娶蜀山氏女生帝嚳後封其支庶於蜀歷夏商周始稱王者縱目名蠶叢次曰柏灌次曰魚鳬其後有王曰杜宇杜宇稱帝號望帝時有荆人鱉令死其尸隨水上荆人求之不得鱉令至汶山下忽復生見望帝帝立以為相時巫山壅江蜀地洪水望帝使鱉令鑿巫山蜀得陸處望帝因禪位于鱉令號開明遂自亡去化為鵑鳥故蜀人謂子鵑為望帝自開明而上至蠶叢凡四千嵗自開明而下五葉有開明尚治立宗廟尚書牧誓所謂庸蜀者即此也通鑑慎靚王五年巴蜀相攻擊俱告急於秦秦使張儀司馬錯伐蜀滅之貶蜀王更號為侯後以其地為蜀郡華陽國志云開明氏凡王蜀十二世四川風俗形勝考前人利盡西海秦司馬錯云利盡西海而天下不以為貪岷山之地上為井絡帝以會昌神以建福杜宇之主以褒斜為前門熊耳靈關為後户玉壘峨眉為城郭江潛綿絡為池澤汶上為畜牧南中為園苑河圖括地象巴蜀廣漢土地肥美有江水沃野山林竹木蔬食果實之饒西漢地理志地近秦雍風聲氣習本自一家西漢志國富民殷寶貨無求於外漢龎統説蜀先主曰益州國冨民殷户口百里寶貨無求於外今權借以定大事蜀有自然之險晉書段灼傳惟蜀之強擁抱岷梁斗絶諸夏為一方唐王徽羅城記蜀形勝之地也南控蠻蛋西扼戎羌元徽之集蜀地濶千里郡列五十城户口至多士卒之衆可以揮汗成雨吐氣成雲唐胡曽回雲南牒蜀之為邦天文井絡輝其上地理岷嶓鎮其域五嶽華山表其陽四瀆汶江出其徼蕃衍三州土廣萬里固乾坤之靈囿華陽國志蜀之為國與巴同囿華陽國志引蜀志井絡垂耀江漢遵流泉源深盛為四瀆之首同上沃野千里號稱陸海華陽國志青城峩眉為坤維之巨鎮同上秦定六國輒徙其豪俠於蜀同上其封值坤故多斑綵文章君子精敏小人鬼黠與秦同分故多悍勇在詩文王之化被乎江漢之域秦豳同詠故有夏聲同上跨躡犍牂枕倚交趾蜀都賦緣以劒閣阻以石門同上演以潛泳浸以綿雒同上蜀之絲枲織文之富衣被天下歐陽公喜雨亭記神禹為蜀人江漢為蜀望張俞上蜀帥書曰大江出蜀之西徼乃生於西羌石紐其地也故神禹為蜀人江漢為蜀望而明公之治滔滔江漢盡在土宇民惟循柔喜文而畏兵田况四蜀蕃夷圖序蜀當西南陬曰輿坤坤文為臣故世有方正柔靜之士意者岷峨蘊精江漢時克生其人乎范鎮序蜀山考前人金陵隨筆云蜀人繪蜀山作六圖一曰峩眉去嘉峩眉縣百里為六山之最自白水寺登山初二十里有石磴可登又二十里多無路以木為梯行三兩里方著實地又二十里有雷洞始到光相寺則峩眉絶頂其上樹木禽鳥多與平地異天氣尤不同九月初已下雪應綿衣絮衾用盡而終夜燃火山上水煮飯不熟飰食皆從白水寺送上所謂光相錦雲天燈陰雪不見一曰青城山中有六道宫丈人觀上清宫為最五宫觀皆在山之麓五里至上清又至成都山則為半山至大面山則為山之巔大面山後即老人村不可通矣一曰錦屏今閬州城南五山峙立江南如屏有浙間山川之狀有讀書巖乃陳堯叟兄弟讀書之地一曰赤甲白鹽在今夔門灧澦之兩岸水流其中而兩山束之大率如蜀之門户一曰劎門關古所謂劍關之險有大劍小劍之號往往山皆北向有劍鋒之狀而道出兩山之間有關使以司之一曰巫山今夔州巫山縣之東十二峰不是一面生江繞此山周遭十二峯故人繪為一圖爾蜀水考前人四瀆唯江最大發於岷經夔荆達揚而入於海此江之原也外自蜀而言江之外其水有七出於綿之神泉曰綿水出於什邡之章洛山曰洛水分流於永康之湔堰者湔水綿水自綿竹至紫巖山經德陽洛水自什邡入雒湔水經導江崇寧九隴濛陽亦入雒三水皆合於雒自雒經懷安簡資富順至瀘與江水會總曰內水發源於江油之清川經綿潼遂東至於合曰涪水發源於沔之青泥嶺經大安利閬果至合於涪水會曰嘉陵水發源於小巴嶺經巴蓬之伏虞西南以至於渠曰巴水出萬頃池經明通又至渠與巴水合曰渠水巴渠二水既合經廣安新明至合於嘉陵涪水會以達於渝而江始大此七水與江别合之大略也若分流出夷中入中國以附於江者有三曰青衣曰羊山曰馬湖青衣出崍山經嚴道洪雅夾江而下羊山出鐵豹嶺經漢源至嘉定之南與青衣水合入於江馬湖自夷都流至敘亦入於江又有出於郡邑之山澤者則自岷峨而下沿流以至於夔不勝其衆其大者如盛山之萬頃池則釃流有四一入于渠三入於夔惟漢水出嶓冡與江分流由漢金趨襄至江夏大别山始與江合此蜀衆水接連荆楚源流之大略也眉山李􅌫序又按輿地記云洮州有禹貢西傾山後名西強山吐谷渾主阿豺尚邦西強山觀墊江源問於群僚曰此水東流東有何咨由何郡國入何水也其長史曽何曰此水經仇池過晉夀出宕渠始號墊江至巴郡入江度廣陵會於海阿豺曰水不知吾雖塞表小國而獨無所歸使通宋獻其方物宋少旁豺為澆河西傾之北則洮水所出北流入河山川形勝述附彭韶蜀之地南撫蠻獠西抗吐蕃上絡東井岷嶓鎮其域汶江出其徼以褒斜為前門靈關為後户峩眉為城郭南中為苑囿緣以劍閣阻以石門而越負秦地大且要誠天府之國也揚子雲益州針曰巖巖岷山古曰梁州華陽西極黑水南流秦作無道三方潰叛儀兵征暴遂國於漢拓開疆宇恢梁之野列為十二光羡虞夏牧臣司梁是職是圖經營盛衰敢告士夫集記云禹别九州八曰華陽黑水惟梁州岷嶓既藝沱潛既道蔡蒙旅平又曰岷山導江東别為沱漢地理志言蜀郡湔氐道禹貢岷山在西徼外江水所出東南至江都入海過郡凡行七千六百六十里按岷山在茂州直西北最後蕃曰列鵝村其村有岷山山之右有嶺曰鐵豹則分水之上源也水二派其一西南入尖囊大渡河其一正南入溢村至石紐過汶川則禹之所導江也鐵豹一名羊膞蓋夷語不同耳任豫益州記言江出羊膊嶺經甘松至灌千餘里是也大抵蜀之山近江源者通謂之岷山峰連岡屬千里不絶今俗謂青城為岷山者以此續記云凡曰岷嶓該衆山言也凡曰沱潛該衆水言也蓋蜀山之居左者皆曰岷山居右者皆曰嶓水出於岷者皆謂之江出於嶓者皆謂之漢或謂之漾或謂之沔出於江而别流别而復合皆謂之沱出於漢而别流别而復合皆謂之潛古今論岷嶓沱潛者衆矣然參差不齊莫得其真者蓋由不知蜀山之居左者皆得為岷蜀山之居右者皆得為嶓而獨指茂州之汶山為岷山金牛之嶓冡為嶓隘矣今按左右之説别無考證而嶓冡又改𨽻陜西兹以成都郡內山川之可名者紀焉井泉池石亦附於後成都周公禮殿聖賢圗考元費著至聖文宣王廟在子城內南門之東前漢文翁學宫故址後漢獻帝初平元年甲戌太守髙瞬瞬音審俗誤為眣距今慶元戊午凡一千四年舊號周公禮殿殿制甚古低屋方柱柱上狹下廣與今異制左柱有髙瞬修學舍記凡三百四十二字其文紀漢初平五年按史初平止四年次年改為興平今尚云爾者豈是時天下方亂道梗不通或未知朝廷改元爾殿有板龕護先聖像丘文播畫山水龕後有板壁黃筌畫湖灘丘畫今亡獨黃畫存殿之壁髙下三方悉圗畫上古以來君臣及七十二弟子像世傳晉太康中太守張收之筆收子載即銘劍閣者也東晉王羲之有帖問蜀守云知有漢時講堂是漢何帝時畫三皇五帝以來備有畫又精妙甚可觀彼方能畫者欲因摹取以廣異聞則此畫當在永嘉前疑非出於張收又按元豐郭若虛圖畫見聞志漢文翁學堂在益州昔經頽廢髙瞬復繕立圖畫古今聖賢之像及瑞物於壁抑東漢以前人物髙瞬時所作至收輩遞增益之歟嘉祐中王公素命摹寫為七卷凡一百五十五人為成都禮殿聖賢圖紹興中席公益又摹寫於石經堂凡一百六十八人按續記可辨識姓名者一百七十三人今貌像宛然者一百四十九人僅存髣佛者三十一人姓名存者六十五人今仍紀續記姓名于左盤古伏羲神農蒼頡沮誦黃帝少昊髙陽祝融髙辛堯舜禹咎繇稷契伯夷夔湯伊尹傅説太王王季太伯文王太顛閎夭散宜生南宫括武王太公周公成王召公仲山甫宣王管仲子産李氷老子孔子顔回閔損冉雍冉耕家語作冉有蘧瑗冉求端木賜卜商樂咳仲由有若宓不齊原憲商澤曽參南宫韜史記作南宫括公冶長言偃公西針家語作公西減顔髙家語作顔刻公西赤樊須宰豫髙柴任不齊漆雕開顔噲冉孺漆雕徒父家語作漆雕徒榮旗家語作榮祈淡臺滅明奚容針家語作奚蒧琴牢廉瑀施之常公伯寮秦商秦非后處家語作石處石作蜀家語作石子蜀邽巽家語作邽選巫馬施家語作巫馬期廉潔梁鱣燕伋孔忠商瞿上家語作商瞿鄭國曹恤公晳哀家語作公西哀壤西赤家語作穰駟赤顓孫師原元籍家語作原子籍公肩定家語作公肩漆雕哆家語作侈曽點史記作蒧公孫勾兹家語作公祖兹步叔乘左人郢家語作左郢顔無繇家語作無由司馬耕顔祖家語作顔相申儻家語作申績秦祖伯虔顔辛塢單家語作懸亶叔仲會公孫龍冉季秦冉公良孺狄黑蕭何張良叔孫通陸賈漢文帝曹誼文翁漢武帝董仲舒公孫𢎞倪寬司馬相如王吉蕭奮戴勝匡衡王尊李強莊君平劉向揚雄漢光武鄧禹張堪張湛桓溫劉平鍾興第五倫廉范班固黃昌种皓馬融李膺髙瞬陳實服虔陳紀鄭玄諸葛亮龎統董和費詩譙周鍾繇王肅羊祜張華杜預王濬夏侯湛喬智明范廣王尊謝安桓石虔楊祖識諡議宋遊桂故知遂寧府童川楊公卒蜀之士君子交相弔哭皆失聲門人相與私諡曰樂行先生先生之道齋心服形修之杳冥發於言動施之家以及於居官為政皆本乎齋心之學自其先世率以文行相承抱負竒崛恬默然守道祖回光先生父靖安先生蓋三世至樂行優遊饜飫玉潤金聲德氣所鍾動中武象其為人和而不流中立而不倚庸言之信庸行之謹不怙上以陵下不由下以援上正已而不求於人其事親冠帶而養居家治官喜怒不形於色教其子以其平居不以言素髙於文棄之而專篤於行通達於天下之故而泯然常若不足以發年已七十才得一見人主雍容沖洽有大臣之言老為童顔居若處子望其容貌使之意消樂行云者取孔子孟軻之言名之也孔子曰知之者不如好之者好之者不如樂之者所謂樂者此也孟子曰居天下之廣居立天下之正位行天下之大道得志與民由之不得志獨行其道所謂行者此也先生位不副其德然樂乎其所自樂行乎其所得行稱斯諡矣桂誠不敏無以議先生然竊以為先生之樂行其發見於英華者似曽子曽子曰君子所貴乎道者三動容貌斯逺暴慢矣正顔色斯近信矣出辭氣斯逺鄙倍矣是言也先生有焉先生諱祖識世孫其字也桂以誘生出先生之門敢以斯議合門人為諸如右銘諡皆刻之碑傳於世全蜀藝文志卷四十八
