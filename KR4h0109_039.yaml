body:
  text: 全蜀藝文志卷三十九明周復俊編記庚墨池凖易堂記宋何涉道昧於叔世而白於盛時迹毁於無知而伸於有識蓋其常爾揚子雲厯漢哀平新莽際號為名儒聲光馮馮雖千百年亡輒衰貶有宅一區在錦官西郭隘巷著書墨池存焉後代追思其賢而不得見立亭池端嵗時來遊明所以景行嚮慕入魏晉李唐其間興衰如蠓薨薨如蠅營營侵晦歡譊之聲未窮而氏姓俄變獨子雲之宅巋然下據不被廢徹亦足以信其材度藝學為世所仰也王德數盡中原潰喪王建由草竊進攘蜀土僣立稱號用淫虐暴恣以成其一切固不暇識所謂揚子雲果何人也宅與墨池垣入官界為倉庾地至知祥昶世及皇朝仍而弗革淳化甲午李順冦始亂放兵燒掠隆隆積廩化為灰阜賊平主者因其地改創營塢以休飬卒徒環堵儒宫彌益汙辱慶厯丁亥今相國集賢文公適為是都尹有中興寺僧懷信詣庭言狀公歎惋纍日命吏尋遺址畫疆以還其舊然屋已名龍女堂池復堙塞淟涊時方議疏葺而公遽迫入覲事用中寢明嵗戊子提刑司田郎高侯惟幾乘間獨至都荒圯渺莽咨嗟久之且言子雲八十一首十三篇逮它針頌其辭義奧逺山生澤浸上與三代經訓相凖士大夫不通其語衆指以為孤陋用其道反絀其迹如聳善救俗之風將墜地弗振何退諭賢僚名卿斂俸餘以圖經構知尹直樞密程公學據閫奧人推宗師扶乘颷流敦尚名義聞而説命取良材充助其用都人士逮田衣黃冠師雖平時叛吾教訓他説以自誇者亦欣歡忘劬來相是役辨方審曲率有意思直北而堂曰凖易繪子雲遺像正位南嚮諸公儀觀列東西序池心築層臺置亭其上曰解嘲前距午際軒楹對起以須宴會曰吐鳯竒葩雜樹移植交帶垂苕森列氣象藹藹三月晦凡土木黝堊之事畢成君子謂高侯是舉也扶既廢補久闕其激勸風旨雖古人不過矧夫資識端亮學術雄富若導積石引長河愈久愈洪無枯涸慮文章麗密據法裁詖若衣藻火以退塗服故舉動建置皆可師小子不文承命恐悚謹為之記時慶厯八年揚子雲宅辨碑記高惟幾前書傳揚雲之先揚侯逃於楚巫山因家焉楚漢之興也揚氏遡江上處巴之江州即犍為郡漢建元末領江陽今圖經有揚雄宅並洞洞前刻揚雄像此即揚侯爾以雄名最顯後人慕之苐稱曰揚雄宅與像逮此存焉今為道宫而揚季官至廬江太守漢元鼎間避仇復遡江上處岷山之陽曰郫有田一區宅一㕓禹貢曰岷山之陽至於衡山孔安國曰岷山江所出在梁州南衡山江所經在荆州李膺益州記曰岷山去成都五百里有岷山縣江源所起也故其西之八十里江之南石紐禹所生處而班氏謂岷山之陽曰郫採托之誤耳且岷去蜀郡五百里郫去成都四十里則郫不在岷山之陽明矣蜀郡故關內中興寺即西漢末揚雄宅南齊時有僧建草玄院以雄於此草太玄也蜀記曰草玄亭即揚雄草太玄所也宅在州城西北二里二百八十步揚氏蜀王本記云蜀之地本治廣都樊鄉後徙居成都秦惠王遣張儀定蜀築成都而縣之今州子城乃龜城也亦儀所築縣經曰縣在子城西北二里一百步今草玄亭廢址乃其宅去縣僅二百步與二説符矣益州圗經有揚雄坊而郫無揚雄宅郫亦不載揚氏遺事是知季五世傳一子世世為成都人也宅豈郫乎矧郫與岷殊不相涉史氏務廣載備言捃掇之舛固亦有焉豫因辨其誤意泥古者止以班史岷陽之郫有宅為然漢州莊真君卜臺記郭印真君姓莊氏名遵字君平蜀隱君子也事略載漢史雜見於叢書説者尚多弗著按益州記漢州鴈橋東有真君卜臺高丈餘有通仙井真君常潛迹變通時從山中出啓肆賣卜又故老相傳州地勢南高而北下多火災真君鑿井㕓間上憲七星杓指南方以厭勝之則真君之德隂被廣漢尤厚自昔至今越千百年卜臺既已隳落井之應輔星者堙塞久矣比嵗郡人往往逢災應或疑焉今太守王公憂民之憂乃如其説汰故堙井於是災燀不作民皆安堵一日過卜臺下顧其陋甚尋加修築繪真君像其上前臨通道蔽以短垣蓋使邦人無忘真君之德也既成屬某記之某謂卜筮聖人之事所以極數知來洞照吉凶大槩使人知所趨避而已後之日者乃復求售其術假禍福以簧鼓一世豈聖人之意哉觀真君寄迹於此也有邪惡非正之問則依蓍龜為言利害與人子言依於孝與人弟言依於順嗚呼亦異矣真君靈迹蜀諸郡皆有之其拔宅升仙出入於通仙井事今蓋無所據至卜臺七星井則遺迹俱在可考不疑故並書之李太白故宅記楊遂先生諱白字太白事迹已具范傳正姑孰碑及李陽冰文集序矣夫蛟龍能神於雲雨不能為人用鳯鳥能瑞於王者不能為人畜而先生以天成之才能神於為文異人之表能瑞於當世始投袂而來竟解組而去所謂不能人用與人畜也爍哉儲星精參絡屬開元天子御宇日久天下無事聿修文教卷四溟而袂寰宇頓八紘而羅英傑先生拖屐劍閣西入長安天子聞其名欣若有得召見之日前席禮之延於金鑾待如僚友自是疇咨若采潛俾草奏造膝説辭人莫知者恩隆寵洽王公嚮風不浹日而聲烜于華夏亦先生之遇代之盛也夫有高世之德則訕謗者伺其隙有超人之行則妬嫉者窺其釁故士無賢與不肖女無美與醜睹先生以興歎也值非常之時遭非常之主宜必立非常之事建非常之功以開元之盛非謂無時矣以玄宗之明非謂無主矣然而青蠅之營營棘樊斯止貝錦之萋斐豺虎可投賈誼既疏崔駰亦棄豈非得時不難得君難得君不難立事難立事不難建功難故功難成而易敗事難就而易毁者歟先生所以卷舒無悔吝趨舍有進退遂乃北遊燕趙東訪梁宋南憩郢楚周流數十載思與喬松遊而餌金丹為事爾繇是縱情肆志劉伯倫之傲世也賦詩寓懷阮嗣宗之窮途也學仙養生嵇叔夜之邁俗也觀其才思駿發浩蕩無涯組繡史籍粉繪經典若鼓號鐘而鬼神雜沓闢武庫而劍戟森羅而又縹眇悠揚迥出風塵之外不作人間之語故當時號為謫仙人焉如蜀道難可以戒為政之人矣梁甫吟可以勵有志之士矣猛虎行可以朂立節之子矣上雲曲可以化愚夫之懵矣懷古可以革澆風之俗矣其餘所作雖以感物因事而發終以輔世匡君為意自西竄夜郎南流江左坎壈頓躓飄泊羈屑悲夫僕嘗論蜀中自古多出名人才士其尤者漢則司馬長卿王子淵揚子雲唐則陳子昂暨先生耳長卿遇武皇之重終卧病而間子淵獲宣帝之好亦無用於世子雲會王莽之亂復貧困而卒子昂憤文章之壞一變古道又以貶而退先生振風雅之綱再革今弊竟以放而去噫天厚其才而薄其命乎不然以褒貶聖賢毁譽今古主隂者厄之乎又不然以才學富多器識俊茂司命者黜之乎是烏可知也抑此數子千百年後莫不聳慕宗為楷則亦可謂拔乎其萃者矣先生舊宅在清廉鄉後往戴天山讀書今舊宅已為浮圖者居之僕少賢先生之文每為太息辛卯謫蒞斯邑因暇披莽挈侣來尋嗟乎城郭皆是丘陵如故其人已往其迹空在遼海玄鶴尚千載而却歸蒼梧白雲竟一去而不返為銘勒石置之金田其辭曰岷山之精上為金星母乃夢協先生以生厥名暨字則而象之出風塵表標天人資詞源學派若泄尾閭自古王佐欲致唐虞謂豫弗起蒼生其如遂來京師荃芬蘭藹天子詔我金鑾賜對禮為前席千載一會王公卿士莫不傾蓋英聲雷飛鞫于區外有始有卒其惟聖人孰謂誰來我思奉身稽顙丹陛願乞骸骨天子從之出蒼龍闕鶴翔青漢雲歸碧天緬追安期邈尋偓佺夕餌瓊葉晨潄玉泉放情肆志養吾浩然詩吟千首酒飲百船西浮南沈夫何繫焉龍首山前涪江之涘先生一去宅留故里數變喬木幾千人世草蔓荒蹊棘蘿廢址鄉人故老猶話厥美吁哉先生不為不遇余也何如拂衣自去蓬萊金闕崑崙珠樹定往遊否孰知其故悠悠我思傷心日暮杜工部草堂記趙次公六經皆主乎教化而詩尤關六經之用是故易以盡性而情性寄寓之詠則詩通乎易書以導事而事變之逹則詩通乎書詩興而禮立樂成無詩則禮樂無以發揮詩亡而後有春秋有詩則春秋無復勤聖人之筆削然則詩之旨其不大乎故孔子刪詩之後而為二百四十二年之褒貶孟子尤長於詩而有七篇之書其與風雅明教化無異也自孔孟微言之既絶而詩之旨不傳區區惜别已失於漢駢麗委靡又失於六朝唐自陳子昂王摩詰沉涵醇隱稍為近古而造之猶未深其明教化者無聞焉至李杜號詩人之雄而白之詩多在於風月草木之間神仙虛無之説亦何補於教化哉惟杜陵野老負王佐之才有意當世而骯髒不偶胸中所藴一切寫之以詩其曰許身一何愚自比稷與契又曰致君堯舜上再使風俗淳此其素願也至其出處每與孔孟合尚憐終南山回首清渭濱則其遲遲去魯之懷勳業頻看鏡行藏獨倚樓則有皇皇得君之志晚依嚴武未愜素心枉駕再顧赴期肯來禮數非不寬也而卒未免於嫌忌致同袍有蜀道難之悲我公以甫氣誼之同神交於今日而况閭閻有揖遜之風松竹無荒蕪之歎在甫所得為多則甫之精爽凛然宜安新宫之爽塏而樂之矣儻甫無恙其遇公也受知之篤始終不渝嚴公視之得無作乎彼之疇昔論詩孰與今者刻詩之意也天下後世由是識曲阜之履愛甘棠之木誦其詩以知教化之原豈不自我公發之耶重修杜工部草堂記楊廷和成都草堂唐杜子美舊居之地也堂屢廢矣輒新之者重其人也子美出處具在本傳堂之興廢亦各有紀載不復以云今日之舉則巡撫都御史鍾公蕃倡其議巡按御史姚公祥主其成而鄭公𢎞協其謀也既成成都府同知吳君廷舉以書與圖來屬豫記之蓋翹然而起臨於官道者為門門之後為祠三楹遺像儼然春秋之所有事焉者也祠之改作鍾公實委郡僚任之于時以公帑無羡餘未遑其他他日姚公往視之則以為他之不葺又遺後人以恤是其責在我再令郡中檢括所藏仍以兩巡院所設入者益之藩臬諸公亦各助之十一於是他不治者並手偕作祠後為書院楹如祠之數屋其左右各稱是引水為流橫絶其後橋其上以通往來于其前門焉榜曰浣花深處進于是則草堂也堂故在院之前來遊者雜然歡譁弗嚴也姚公乃令易置之院後隙地盡以屬之堂而規制益宏矣堂之左右亦各為屋三楹其東則選釋氏之徒居之以奉祠之香火其西則禮神之器與延賔之具皆貯焉繚以周垣廉隅有截又其東偏為池引橋下之水注其中菱蓮交加魚鳥上下相樂也名花時果雜植垣內盆池楚楚離列其間其外則樹以榿栁象子美之舊也經始於𢎞治庚申之春落成於其年之秋財不費而功侈民不勞而事集凡此皆吳君圖之而受之姚公者也夫世稱子美者槩以為詩人愚嘗不滿於是以為詩道之成極於子美而子美之重於人者則不獨詩也唐三百年間文章之士毋慮數千百人而祠於後者僅可指數李白之於潮州是其表著者他若襄陽之孟亭建州之梨山之類則有知有不知者矣而子美之草堂夫人皆知之是獨以其詩而已哉蜀自先秦以來上下數千年間古今通祀者才數人若秦之李氷漢之文翁孔明宋之張詠皆以功德流逺比於甘棠是以蜀人若是其慕之也而子美徒以羇旅困窮之人軒然與之並是誠不獨以其詩也蓋子美之為人孝友忠信大節俱備讀其詩考其素履一一可見至若許身稷契則亦自其所能為者言之觀其舜舉十六相身尊道何高秦時任商鞅法令如牛毛之語則其出處亦略可知史家不能得其所存而疑其議論漫謂之高而不切志其墓者亦不過稱之為文先生耳於乎此何足以知子美哉不知於當時而知於後世一世之短百世之長子美之名若草堂雖與天地俱存可也今日諸公之舉尊賢厲俗其於風教豈曰小補之哉諸公之於蜀皆有風烈可傳於後記為草堂作也故不具述記既勒石自成都府檢校崔塘而下其姓名皆列之碑隂修夔州東屯少陵故居記于唐大厯中少陵先生自成都來夔門蓋欲下三峽道荆襄以向洛陽漸圖北歸始至暫寓白帝既而復遷瀼西最後徙居東屯質之於詩皆可考峽中多高山峻谷地少平曠獨東屯距白帝五里而近稻田禾畦延袤之百頃前帶清溪後枕崇岡樹林蔥倩氣象深秀稱高人逸士之居少陵於是卜築焉厭囂塵而樂幽勝蓋詩人所以為吟詠風月之地夔州之詩多至四百餘篇計當一草一木盡入詩句中矣少陵既出峽其地三易主近世始屬李氏少陵手書之券猶在至子襄頗好事講求故迹復置高齋用涪翁名少陵詩意創大雅堂臨溪又建草堂繪其遺像歷嵗滋久屋且頽圯弗治券亦為有力者取去而前賢舊隱幾為荆榛之墟慶元三年春連帥閬中毋丘公漕使蘇臺錢公暇日聮轡訪古歎高風之既逺而故居之弗葺無以致思賢尚德之意因李氏子欲析居母丘公捐金市之而歸諸官為田一十一畝有竒繚以短垣樹以嘉木齋與堂之欹腐撓折者從而增葺之架為慿軒闢為虛牖開新徑以直溪而東屯之景地深窈幽邃與昔寓居之日無異錢公又跨草堂創為重閣移置少陵像於其上憑欄一望則平川之綺麗四山之環合若拱若揖與賔主相領略蓋東屯至是遂為夔州勝處嗟夫少陵始進三賦明皇竒其才嘗召而欲用之故其詩有主上頃見徵之句已而齟齬不偶流落頓挫故其詩有青冥却垂翅之句少陵抱負竒偉許身稷卨欲少出所學以自見於世而卒不遇憔悴奔走於羇旅之間可歎也雖然少陵之詩號為詩史豈獨取其格律之高句法之嚴蓋其忠義根於中而形於吟詠所謂一飯未嘗忘君者是以其鏗金振玉之聲與騷雅並傳於無窮也少陵避地入蜀其寓居之處同谷有草堂浣花亦有草堂皆官自葺之有以見其勿剪勿伐之意獨東屯不然誠夔門之闕典也夫地固以人重而物之興廢有時今帥漕二公獨能興四百年之遺址而更新之明示好尚丕變雅俗實權輿於此則是役也豈徒為遊觀設哉慶元三年十二月初一日朝奉郎權通判夔州軍州兼管內勸農事借緋于記淵樂堂記楊天惠吾蜀有達伯曰木鴈先生生岷峨之崖長卭崍之墟出入於脂膏遊俠之窟而其心泠然獨追正始永和之人而師友之然其拔起甚苦其擢置甚厲其造端甚鋭其收績甚勝金寒玉暖五十有餘年而後得寄祿第七品賦秩四百石闢五畝之宅治百塍之田於是稍斥隙土築小堂焉名之曰淵樂會將致為臣歸老於其家間以書戲其友東蜀楊天惠曰豫癯儒也暴享此得無有物瞰之因書韓公示兒詩曰始我來京師止携一束書辛勤三十年以有此屋廬夫經之勤營之劇悴形忍性磨以寒暑而偶有獲焉此韓公詩之所以飾喜而豫欲記之亦以志難也唯是名堂之意頗有以而或者未即曉之今夫淵明嗜酒樂天亦嗜酒淵明工詩樂天亦工詩凡語故事者夫人知其然乃豫所以千載尚友之意殆不其然也子盍忖豫心而試發之天惠伏書嗢噱曰富哉名乎吾有以索夫子之意矣夫論人者無論其人而論其人之天按淵明以微故輒行而樂天以直言屢黜是其過人已逺甚然尚非其巨者也晉宋之交新故糅分朝而南暮而北未見有堅明不二者也獨淵明消搖前去無所回其迹牛李之禍簪笏僨路朝為卿而暮為囚未見有脫遺無預者也獨樂天耿介中立無所蹈其瑕璺者先生所以取二子寧是耶抑非耶于時天惠董役通濟江上腹藁雖成竊自疑其言之強鄙弗敢出也行且謀以身承教共定其當焉而病莫之前後一年先生自大邑力疾歸坐堂上委衣冠而嬗豫聞之抵几哭曰嗟乎無與定吾文矣蓋鍾期死伯牙破琴而不復鼓然徐君亡季札挂劔於其墓而去二人豈以生死寒久要之盟哉吾意先生精爽超徹決不澌盡時撫鶴翎過城郭猶當問記之有亡也輒憶枯思之遺餘稍補輯之以授其子俾置諸堂右合江園記蔡逮合江園唐尹韋忠武作後因其亭為樓閣臺榭參植美竹異卉薈翳參差而春芳夏隂波光月輝以時獻狀無不可愛故為成都園亭勝迹之最嘉時暇日方伯刺史與其賓寮名勝登臨燕衎傳觴授簡以極其歡幾與東平之溪堂山隂之蘭亭爭長也而吕正愍之記實刻在石夫地因人而重則是園蓋可知矣然園可娛官官之人未必皆材又屬公府尚簡重燕遊闊疏因弗以治樓欹亭陊花竹翦刜荒穢蕭條可念其無恙者獨長江茂林耳淳熙二年春李唐來為是官入其寺傷焉欲善其隳圯而病其資會提點刑獄晉原李公兼漕領府事唐白其故公亟出緡錢材甓畀以庀事址之墟者屋之宇之仆者起之楹桷牖户上覆旁障之腐而決者易而新之弗廢其舊而加壯焉而又補藝花竹叢條暢茂咸復其故園之壞而葺者數矣莫若今日之壞甚而葺之力而成之敏也非獨唐能張其官實惟晉原公逹所以為政雖職併事叢而細大必舉頥指如意致其下盡力焉他視此可知也工之訖宜有以志逮將如吳會艤舟亭下唐請書其事喜為之書是年記勾氏盤溪記李石君子之於物也物之而已不以為身之纍也不以為纍雖天地之大吾能物之一以為纍如飲食衣服皆反為身病故必以吾之一身以較其大小輕重而為之等級身外之物泛然來悠然去以身為量而君子之物備矣且一丘一壑所須甚微而係物甚大以身取給可也不則連甍阡陌並絡包山絶江障林蔽麓造巧飾浮使他人視之以為玩已因之以為病何益哉嗚呼斥桑麻之用以種桃李飾茅茨之用以充藻繪如齊雪宫之麗如梁金谷之富一山之植非纍牛不致一花之種非兼金不集又求所以牣其中者非聲色不娛非絲竹不樂此桀紂之惡不至是也傳曰非人其物惟德其物君子嫓身以對物不以物為身之纍果如此哉吾友繁江勾君友于之作盤溪非茍於作也樓以藏書堂以教子亭以賦詩榭以置酒且誓曰俗子汚我不汚門凡士凂我不凂室清風肅户明月贊席抱琴之童挾卷之子照映几杖之側倘佯筆硯之間吾乃今知勾君之志於物以為盤溪之取亦多矣吾嘗過勾君問其所以作之之説曰吾學不適於時用官不逮於世資聊以盤溪之尚易其平生謬用之心望望外物乘除消長不既汰矣乎他人往往以斜川見誑吾甚不樂得一語以洗其侈名之謗足矣余天彭倅罷徒步過之門生何夔趙鶚從君欣然迎客謁記許之十年又以書來復許之不三月君今亡矣因書君生平語以志挂劔之義盤溪記范仲芑始豫先君試吏新繁稱邑中勾氏多人士曰友于字信卿名者鋭於學有當世意已而試有司數不合晚乃得官主閬中簿度不能酬其素却棄官去脫遺世事寄意間適其所居有溪環繞清徹可挹因取唐人李願太行之谷曰盤者以名其溪沿溪下上沙澄而谷岌土腴而植蕃躋攀曲折視著屋穩處為堂為亭為軒為菴為寮掩映相望至者如行圖畫中纍甓為洞窮之而深治涉為航浮之而安架虛為橋即之而通悉旁緣昌黎序中語托其意而揭之扁榜經營之初物色自獻騁望之際面勢咸得嘯歌俯仰觴酒杖屨盡一溪之勝而胸中梗槩始披於此矣豫童時侍先君已聞君賢仲兄齊叔又與君通昏姻而盤溪之名往往流於士大夫之聽思一往遊以足於登覽而未暇也繫官於朝君書來以圖相示屬豫記之豫惟山林富貴二者莫或得兼富貴而或羞焉求人以塗之人恕我不可得而山林之樂茍多取之尚不為貪人情常以自恕擅壑專林而不知止者有矣然自漢以來柴桑輞川僅以一二名於天壤他皆泯滅至不得其處則凡致意於煙霏草木之間而人品或非者此又可以欺世也歟惟君深於學問持滿而未發既其入仕精力未及於衰視世之夸華悠然無以易之處隂息影休其轂而不悔非徒以枯稿宿名也是可書望岷亭記張俞凡為亭觀池臺於得勝之地則雖無山川而曠無江海而間况郫城據岷之陽繚江宅川自古都邑故有叢亭之勝山海備焉今邑大夫安定胡君自江南來聳兹遊觀然憾尚有餘勝鬱而未暢會方牧廣平公命作縣之重門門臨間田盡歸蕪穢植為西園遂作大亭號曰望岷是亭西至岷山百里而近蟠地鬱天萬峰連延終古孕碧擁臨三蜀其望伊何春雲始波崑柔閬藹涵蔚瀛海火宇無隂萬木交蒸重巖沓嶂倚雲峨氷秋空凝輝秀卓天骨朝陽夕月異態殊色寒日慘烈時見城闕青城天闕各岷之一山耳三峰含光隱射天末崑有第一第二峰及大面是為三峰此望岷之大槩也故君子望之則目益加明形益加靜心益加清斯可以脫拘攣之域入道義之庭清淨無為而治功日成矣茍使小人望之則目若加盲心若加昏俯仰悲戚蹙其本生有若越人之視章甫海鳥之聞鐘鼓豈其性哉俾之違義冒利入於刑死則欣然自謂登蓬萊棲崑崙之不若也奚肯謂峨山之尚可望耶然則岷峨之靈秀亦烏為小人而設也以一山而推天下之理則君子小人之道亦若是焉而已爾胡君字希逸強明公潔治遂無訟且觀前宰長樂馮君道元修叢亭之事復大修之又特作斯亭可以見志某遂為文以示愛山之君子合江亭記吕大防江沱自岷而别張若李冰之守蜀始作堋以揵水而闊溝以釃之大溉蜀郡廣漢之田而蜀以富饒今成都二水此江沱支流來自西北而匯於府之東南乃所謂二江雙流者也沱舊循南湟與江並流以東唐高駢斥廣其穢遂塞縻棗故瀆始鑿新渠繚出府城之北然猶合於舊渚渚旁合江故亭唐人宴餞之地名士題詩往往在焉久茀不治余始命葺之以為船官治事之所俯而觀水滄波修闊渺然數里之逺東山翠麓與煙林篁竹列峙于其前鳴瀨抑揚鷗鳥上下商舟漁艇錯落遊衍春朝秋夕置酒其上亦一府之佳觀也既而主吏請託其事余以為蜀田仰成官瀆不為塘埭以居水故陂湖漢漾之勝比他方為少儻能悉知瀦水之利則蒲魚菱芡之饒固不減於蹲鴟之助古之人多因事以為飾俾其得地之利又從而有觀遊之樂豈不美哉兹或可書以視後蓋因合江而發之逸心亭記章察粵若緱山積秀耀真胄於千齡淮水澄源煥清風於百世紀其貴盛則同日分為五列侯稱彼才華乃當時號曰三珠樹折仙枝於奕葉流英槩於遐方隱顯雖殊卷舒一致即太原王君表正鍾其緒矣君幼而雅於好尚壯而多聞交遊必賢談笑惟義逮乎知命於所居東偏創園亭以適性蹊分桃李愛其若君子之芳馨隂茂松筠賞其若志士之節操凡植竒葩異實咸資興詠或燕遊嵇阮以樂天和或集會荀陳以聲名教飲不逮乎沉湎言必盡乎切磋由是四方輶車望風而至千里多士慕義而來君必盱衡倒屣勤勤拳拳聞義必行從善為樂一日僕息鞚林下晤語樽前屬君操觚求亭之號乃本其事題曰逸心固資日休之義也偉乎君其儲詩書以尊道勵絃誦以傳家則慶延後昆美紹先德莫之京矣又何必塵生羅襪珠貫歌喉方謂之樂歟會有浴沂之士朋簪而來遊是亭觀是説能無優之哉少休亭記劉涇自成都趨陵簡如在蜀必由靈泉過分崠其山周數百里高大阻險以石次第為梯暑雨冬雪則馬不進僕亦以病告欲少休於中半而巢乏方丈之地行者患焉余簡人也持以告縣令黃君曰有走世路而至老不自言勞者人或相以安逸則輒怒怨負其走愈疾顧何物使之今行者之困於險也馬思伏櫪僕無偷安各念寢處欲少休其勞生而君有地百里不遂與之覆載此為失仁智又害其良心甚矣奈何君持以告轉運使晉陵胡公具興劉公曰此非特令之能事也於是度財力以人意所在為館舍過客得止大庇其下烏乎行者之區區名與貨也其心欲少休焉則可與之不可拒也方寒暑憊倦暴其體膚正於反復中而乃處隂靜得樂地由是惚然知其妄行將賦歸而求家則雖匹夫婦之惠亦仁政也無使居者有不出户之見則并在高位君子笑而請名曰少休亭紹聖二年記待鶴亭記李流謙聖泉故濬儉舉一邑無觀遊之地獨妙通祠側有蘭若曰興福在外慿高為亭可臨緑野市井廬落雲煙草樹田洫溝塍參錯蔽虧畢陳乎其前一睇千里來登者神豁氣夷心目俱爽最名邑勝處昔人榜之望錦以錦官城可跂而望也蘭若久荒圯梟狐窟巢如逃屋亡家一僧衰癃無徒屬色頗凄涼故亭與之偕廢椽脫棟搖壁壞甃裂瓢囊之瘠往往舍焉環其地翠柏數十株亭之倚以為勝者亦半於斧斤紹興壬午嵗元日邑令楊公過焉顧瞻久之曰是去真棲不一弓地汚穢乃爾其何以安歸語邑尉李流謙相視一嘆明日興福僧來言曰智海老不能有是亭久矣考之舊刻之建不知何時崇寧改元嵗在壬午宰某君者以葺祠之餘材新之今嵗復壬午意者𡨕數之符亭當惟祠之歸願併其地使黃冠掌焉智海本心也公曰可哉吾敢專適流謙詣府遂具其事俾白大尹王公亦欣然可乃呼道士王行直付之且屬其興修之役公首捐廩粟倡其僚各輸斗石食衆工凡邑子及客子之樂施者聽而不強又親為指畫自真人殿左廡破壁為門代翳夷阻架溪而梁之疊石而上凡一百二十有二級以逹於亭之舊而加葺焉支補其壓漏灌洗其漫漶垢汙而徙所謂茅茨者于其後於是氣象騫奮超拔異疇昔自廡望之橫橋如畫石磴如梯空亭縹眇山巔如飛來隆岡伏坡為之扶衛草木朋附若奔若迎殆與真祠聫為一氣祠初無客館客至亡所舍至是始有托足休駕之所皆滿意焉屬役於四月而落成於七月公聞民事輒來督視不啻治已之林囿臺池者未訖役流謙授代去既數月公書來曰亭成矣子實贊我可無一言紀嵗月流謙曰亭微矣然公意所屬徒以老仙蜀人之所尊事而是祠也數家之所更建舍舊圖新極于至誠故視唾其地如唾其面精念冥感至使闍黎自託於不能願以是獻而大尹王公恭承密音既克新華棟事上之恭久而益嚴凡便於祠者亡不開具是以斯役不勞而濟此皆可書望錦舊榜於祠不類也易之曰待鶴昔仙人丁令威蘇耽皆仙去化鶴以歸舊傳殿廷之柏故有鶴來安知非老仙而莫識也於斯亭也願與諸君待之公名先進字用之永康人古君子而今循吏云紹興二十二年九月日記劔州重陽亭記吳師孟治平二年夏四月二十有五日師孟從蜀帥南陽公次劍州是日會於東園之見溪亭公未至郡將揖賓慿欄而語見東山一峰特竦千仭衆小山迤邐卑附如奔走如侍從茂林蒼崖煙靄蒙密有一亭焉冠於山側碧瓦鱗差朱欄霞明長溪清潯流影不去二車太博扶風馬君淵仰而指其巘曰豫與太守張侯頌他日於是得異處焉乃唐刺史蔣侑所建重陽亭商隱序而銘之者也亭圯以來不知幾許年豫嘗登訪其址西首俯瞰一郡之境矗矗高下叢於目前捫其碑辭尚可省讀會前官伐木將以構豫廨舍之後堂豫得即其材而新是亭當以歲月識其興廢敢屬以記師孟退而考義山之銘乃宣宗大中八年所纂大中距今二百一十有二年矣其間豈無好事之人一出口以憐其亭之廢乎將雖有好事之意而但以治郡惟簿領是先當途惟勞餞是經遑恤是耶噫融結以來兹溪山者實此州之勝至蔣侯方建是亭寂寥榛蕪踰二百餘載暨扶風君乃與張侯力起其廢是知溪山景物無情於人者也含清藴秀如有道之士充然內足安其所守無待於外何嘗欲人之愛耶古今之人或愛或否亭之興廢有時而溪山之景自若也烏能有毫髮之損益於其清且秀邪自古至唐自唐迄今僅偶得二真賞耳自今以往庸詎知人之愛否亭之興廢更幾許年而復值其人歟是嵗六月晦日朝奉郎尚書職方員外通判閬州軍州兼管內勸農事上輕車都尉賜緋魚袋吳師孟撰劔州再建重陽亭記康海豫聞劔州山水舊矣後見李義山重陽亭銘言刺史蔣侑治郡三年事得人從乃大鏟險道緄石見上平可容考上車四軌建為南北亭以便勞餞又亭東山號曰重陽以醉風日則劍州山水亦勝矣而蔣君在郡能有暇日以山水自娛又得名士大夫詠述其事播美於當時遺馨於後世其胸襟意度固亦非凡者矣正德乙亥武陵李君來知劔州踰年政成百姓咸若于是廣教化之道表廢墜之迹高城濬池練兵飭備敶禮義示軌則吏就典列俗無曲議乃歷覽奧曲窮索靈祕得兹亭之址焉於是與二三士大夫謀曰夫禮義者世之大間而佳勝者地之雋腴二者不可不示來兹也豫既建兼山書院以示學者而又表武侯之廟旌死節之人使庶位有守後賢克循其于禮義之事則庶幾矣佳勝如此亭湮而罔知者將數十百年今幸求得之得而弗治非所以闡靈祕發坤珍也于是滌穢芟草復斯亭焉畚鍤始興即得義山碑於宿莽之下吳職方記言曰自古至唐自唐至今僅二賞耳詎知亭之廢興更幾許年而復值其人歟然職方又詎知今日之有李君也李君言亭近枕聞溪逺挹五華前對漢陽左秀巖亭卧龍城郭樓臺俯在懷抱與職方之記略同至於長溪清潯流影不去則吾亦神坐亭上久矣劔士薑文粹玉潔者豫舊友也能道李君之事因以書托豫記云亭崖畔有石刻古重陽亭四字𨽻大書之為宋張珖筆豫益躍然恨不能即從諸君子遊也自豫記之已不知諸君子遊而樂樂而詠者將若干畨尚欲文粹為吾録寄之以觀李君之暇日比蔣君何如當亦更為李君賦之矣夫關中名區勝壤不可以計數安得有賢如李君者少為表章之以快吾意更不知豫能待而見之否也李君名璧字白天𢎞治乙卯廣西舉人詣深履厚故篤意古道如此亭成於戊寅之夏明年正德十四年已卯夏六月十又八日庚辰滸西山人武功康海記潄玉巖記宋喻汝礪自古常言天不負人吾初不甚信吾曩遊太學不啻六千三百日知古所謂屈原賈誼揚雄韓愈栁宗元輩吾亦頗識其面目及得一第則枯冷羞澀幾笑破人口比來山中持手板謁上官奔走匍匐作主簿少府模樣燕居作樂則搖口吻弄語言以恱貴人而覔所謂舉狀者嗟乎其局促如此則天果不負人邪然飽聞閬中竒山川而賢士大夫最多亦復把酒自慰一日登錦屏繫舟嘉陵江步至占星巖徘徊縱觀倚老松卧怪石往往摩腹一笑然是三境之遊須廢吾一日糧吾不得與女旦暮相從也惟毋丘氏潄玉巖近在牆壁外乘興步履從小奚奴直謁賢主人脫衣散髮坐巖復酌酒賦詩相與作物外笑樂酒醉發狂即呼天大呌曰天乎真不負喻汝礪矣吾嘗謂富樂之士不能放意於江山松竹之樂而山川怪竒煙雲竹石詩酒風月唯遺逸未遇之人始得兼而有之故天地雄偉不凡之處天所以資賢人而舒其憂愁之思者也吾零落荒山鬱鬱無聊賴有錦屛嘉陵之雄偉占星潄玉之勝所謂閬之四竒者吾皆得而有之他日解官視吾破囊無復新井縣一物驅老髯獨負四物以歸朋遊故舊從吾覔閬中土物吾則與之飲酒取吾詩而歌之則是四境者不移足而在几席間矣當使鄉人之老者執爵而言曰吾鄉素乏佳山水公持此以歸敢為公夀且為吾鄉人賀故人之老者揚觶而言曰吾家素貧無一箇錢汝今得此以歸請為吾族人賀而後之好事者當呼為四竒先生云全蜀藝文志卷三十九
