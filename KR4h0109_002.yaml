body:
  text: 全蜀藝文志卷二明周復俊編賦二灔澦堆賦宋蘇軾世以瞿唐峽口灔澦堆為天下之至險凡覆舟者皆歸咎於此石以余觀之蓋有功於斯人者夫蜀江㑹百水而至於䕫瀰漫浩汗橫放於大野而峽之小大曽不及其十一茍先無以齟齬於其間則江之逺來奔騰迅快盡鋭於瞿唐之口則其嶮悍可畏不啻於今耳因為之賦以待好事者試觀而思之天下之至信者唯水而已江河之大與海之深而可以意揣唯其不自為形而因物以賦形是故千變而有必然之理掀騰勃怒萬夫不敢前兮宛然聽命唯聖人之所使豫泊舟乎瞿唐之口而觀乎灔澦之崔嵬然後知其所以開峽而不去者固有以也蜀江逺來兮浩漫漫之平沙行千里而未嘗齟齬兮其意驕逞而不可摧忽峽口之逼窄兮納萬頃於一杯方其未知有峽也而戰乎灔澦之下喧豗震掉盡力以與石鬬勃乎若萬騎之西來忽孤城之當道鈎援臨衝畢至於其下兮城堅而不可取矢盡劒折兮迤邐循城而東去於是滔滔汨汨相與入峽安行而不敢怒嗟夫物固有以安而生變兮亦有以用危而求安得吾說而推之兮亦足以知物理之固然巫山賦蘇轍過瞿唐之長江兮蔚巫山之嵳峩雲孤興其勃勃兮北風慨其揚波山嶔崟而直上兮越至神女之所家峯連屬以十二兮其九可見而三不知蹊遂蕪滅而不可陟兮𤣥猿黃鵠回顧而鳴悲覽松柏之青青兮紛其若江上之菰蒲維其大之不可知兮有橈雲之修柯蔓草蒙茸以翳兮飛泉潔清而無沙亭亭孤峯其下藂木交錯而不明兮若有美人慘然而長嗟斂手危立以右顧兮舒目逺望恍然而有所懷儼峩峩其有禮兮盛服寂寞而無譁臨萬仞之絶險兮獨立千載而不下顛追懷楚襄之放意肆志兮泝江千里而逺來離國去俗兮徘徊而不能歸悲神女之不可以朝求而夕見兮想逰步之逶遲築陽臺於江干兮想氛氣之參差惟神女之不可以求得兮此其所以為神湛洋洋其無心兮豈其猶有懷乎世之人朝雲蔚其晨興兮暮雨紛以下注變化倐忽不可測兮俄為鳥而騰去忽然而為人兮佩玉鏘以琅琅愛江流之清波兮安燕處乎髙唐彼蛟龍之多智兮尚不可執以罝罦髙丘深其蒼蒼兮恍誰識其有無鑿二江賦狄遵度嗚呼吾聞魚鳬氏以降秦太守之前蜀之為國不知幾千萬年方二江之害被兹土以禹之功不是施兮嗟後來亦奚言彼民之昏溺兮無乃得之於天不能遷土而改宅兮其流漂亦誰寃徑崖挺以中亞兮激狂瀾而右旋橫騖折走莫知其所之兮吼穹谷而下穿蛟鼉鱉蟹訝以相濡兮何允蠢而緣延嘬膚吮血沸以咀嚼兮咸飲腐而飽膻雈蒲菱芡紛以相被兮汙百頃之良田土不藝而民無所食兮孰與奏其艱鮮民之害固不可終極兮歷百千萬世天乃授之以賢曰噫中國之無人遂使民至於此焉天之生斯民兮故使之食飽而居安降巨菑以漂之兮天之意不然水性固就下善利兮决之則宣濬九川而距四海亦奚艱且九載之孜孜民不憚苦而訴煩蓋因利而為利兮勞之在先不忍一勤其力兮乃至騖萬世而害弗捐胡不浚發其利源剷削其害根巨崖剖以罅裂兮砉頽乾而陷坤怒石奮以交墜兮吁電走而雷奔蕩重淵以傾覆兮喪百怪之精魂雲轉霧溢盤薄蹙蹐兮注壑于其間寂寥散漫肆以長往兮若氣散於坯渾決其餘以旁溉兮居其側數百頃皆膏腴之上珍民降丘而下宅兮若蟻聚而蜂屯則幾年幾世之積害一日刷去兮不啻捐芥而蕩塵嗚呼蜀之為國非地之中宜乎蠻貊之雜處魚鱉之與同有李侯者至然後别類於水物有仲翁者至然後同洽於華風然則今所棟宇而處衣冠而嬉皆二公之所翳若李侯之事固所莫得而繼彼仲翁之教亦何憚而弗為嗚呼以禹之功至大至神括六合以橫被疇有存而勿論胡兹為害獨不得聞無乃力所不洎兮抑亦遺其功於後人而今而後乃知民未得所欲事或有不利先世所未暇除去聖人所未及裁制茍有志於生民皆吾人之所事若曰茲事體大必聖人而后為則小子也不敢與知述賢亭賦并序閻苑黃星既殞火井重炎孔明志在電掃荆揚席卷許洛布四頭八尾於平沙之上乃昔人臨流感嘆之所余慕其風烈而述其德業因名斯亭曰述賢考其陳法則方以八環而為九馬隆遵之以破賊圓以六包而為七李靖遵之以平蠻蓋戰守處畫部伍節制所重者制勝而有餘所忽者敗亡而莫救此古名將所以稱美也且益州分應井絡僻在西南而武侯以區區之蜀蒞政效忠董武立信貫許國之精誠仲命世之勇略令施風雨挾纊而溫律嚴斧鉞不寒而栗方其鷹揚上國虎視中原驍將聞風而奪心壯士望塵而破膽擁精鋭之衆者堅壁受辱稱骨鯁之臣者仗節包羞玩敵於股掌之上措勝於談笑之間比昔賢則過之責斯人而備矣余搆亭於此俾其登之者識常山蛇勢知天下奇才壯雄圖之不朽想英風而猶在嗚呼天假其年則禮樂可興天命有歸則智力無用大筆方籌長星遽墜陵谷已遷尚有典刑蠻夷雖逺不忘武備况今夏賊干常遼人稱號冠帶遺民雜穹廬之種漢唐故地混茹毛之俗而受鉞登壇専長之寄者節制可忽耶祕殿華閣當方面之權者勤勞可繼耶今步遊灘上鑒前賢作古賦以述其始終使䕫人嵗時歌之不無感慨焉雖然孔明當躬耕之時處布衣之賤儻不遇三顧之主安能成七擒之功噫自古英雄之士時命不過其名湮滅而無聞者惜哉賦曰三分率土姦賊陸梁孔明布石於平沙之上髙步於大江之傍志馳許洛欲掃荆揚按井字九宮之法本河圖八卦之祥縱橫魚貫曲折雁行雖云蛇勢實曰龍驤其始也荷寫誠於傾蓋遂感激而褰裳應雲龍之隱隱信魚水之洋洋其終也酬三顧而不爽縱七擒之所長資一時之談笑播千載而芬芳况夫才兼管樂政黜申商曹氏父子襲申商法蜀則冬日魏則秋霜蜀民暖於布帛魏人困於豺狼於是并聲東下響應西方折曹氏之牙角挫仲達之鋒鋩至今秦隴耻其巾幗梁益詠乎甘棠論髙節則勝棲巖之入夢鄙負鼎之干湯推治體則蕭何為政之咳唾子産遺愛之粃糠量行事則用兵如晉文之示信教民如周誥之成章觀施設則肩輿羽扇以節金鼓木牛流馬以代梯航遵節制則馬隆以八陳用於晉李靖以六花顯于唐宜其斬王雙而走郭淮殺張郃而辱宣王吁哉飲渭之龍隨天數而已沒吞吳之蛇如寶氣而難藏所以餘威逺振遺跡尤彰忠義撫劒而嘆息英雄沾襟而感傷戎夷懷德而縞素士民追昔而蒸嘗余徘徊灘上不見鵝鸛變變龜蛇央央但覺雙魂失宅三甲負芒瞿唐風急起波聲之嗚咽巫峽雨散連天際以凄凉縱使秦雲變色魯日回光意與草木同朽皆無益于興亡宣和二年十月十五日魏陵閻苑述北客賦趙奭之北客宦逰巴楚歷三峽之險而抵永安故區地勢近瘴兩見盛夏官居民廬皆在山麓鑿地數百尺而不及泉故市無井里無醫藥客患之而勉同市人飲諸瀼水苦滓穢引之間谷而懼虺毒俄有老叟謂客曰漕府廉臺有二井焉泉冽而甘盍往汲之客曰使者公庭閽人嚴守而應接有時甚非羇旅所敢妄干叟莞然而笑曰子胡不采之風謡質之行事善利濟衆初不禁也客于是拜其言感其意而往汲焉迄今逾年暑無疸暍之苦而得以安居是使者之惠也輒賦其事而抒素云其辭曰北客命駕陵彼崔嵬南逰巴楚實仕于兹歷白帝之區域睋赤甲之嶮巇瞰灧澦之出沒峙瞿唐之崔巍觀楚國之絶塞悼蜀宫之故基客喟然嘆曰昔窮兵百戰用武之地也仰而無覩但見林莽蓊鬱屺岵岝峉巘雲獠煙霮䨴一色三時豫和炎夏為厄逢辰久安用夏變貊葳嵬連郛龍勢蛇迹官府民廬棧阜構麓八家無井而不能革客患之而同市人臨瀼津雜滓穢汲黃大奫涊之流泪人精神乃訪之厜㕒臨嶙峋之曲千人挈壺百冗潄玉清清汵泠而氷數雪沃未幾有叟呼于列曰子曽不知不毛之瀘自此塗出葶薴叢滋虺蝮潜匿炎毒之厲而是生百疾溪流可酌而中有沙蝨實大梁之公子胡不自衛而反蹈其失客謀于叟為之奈何貧如顔回而有飲瓢之樂曠如孺子而有濯纓之歌叟豈能溉我以甘露濡其旱禾叟于是逡巡若避赧然變色僕遊塵世安有神術徒知夫西有漕府東有廉臺方布天子之仁澤救世之旱灾烏能祕一滴之清泄坐視游子之炎埃客釋然解疑僕僕駿馳中涓斂袵下氣以道使者之德音自云汲之引之周浹旁及而閽無夜閉雖負年以逝濯類抱罋而為隧請觀夫易卦曰井養不窮兮收而勿幕又稽之老氏曰幾于道兮善利萬物散為四海之惠不止匹夫之恤噫鼴鼠飲河而不過滿腹鷦鷯巢林而不過一枝茍足各有其極雖多亦奚以為故蘭臺之風不及于罋牖而楚子作賦西江之水罔濟于轍鮒而波臣見譏客于是慨然感慨頽然下拜明既能哲佩以為戒信乎君子之淡以成久而不壞神女廟賦朝公遡漢武帝既封泰山之五年臨朝而歎曰朕念元元之民未蒙休德周覽中土以施惠澤而南方以逺故獨弗及也朕甚憫焉是冬詔發佽飛羽林之士簡車騎之衆盛清道之儀天子御雕玉之與服龍文而駕魚目擊蒲梢而驂躡雲至于盛唐望九疑登天柱薄樅陽而出休于琅琊天子大悅作盛唐樅陽之詩命協律都尉延年歌之以觴羣臣酒未半天子戚然不懌時東方朔枚臯侍因進曰陛下不懌臣敢請罪帝曰朕適琅琊之上忽然雲興其氣甚異因感髙唐之事聞楚陽臺之山下有神女旦為朝雲暮為行雨朕心慕之異時諸方士嘗言仙者非求人主人主求之乃可致今巡逰天下冀一覩列仙之屬而莫獲焉殆朕之德不如楚王能有所遇也是以不懌朔跪曰楚王諸侯耳有臣宋玉善為微詞感動神女見夢于王臣嘗笑之玉安知神女若臣者乃知之上意乃解命謁者給朔札使為之賦朔即獻辭曰徑西郊之綿邈兮積閬風之崇基繚玉墉以千里兮右翠水而左瑶池崑崙層峙以嵳峩兮弱淵周流而逶迤中龜臺之清都兮嵦洪敞而甚治粲洲房與𤣥室兮罨浮雲而上齊諒豐隆列缺之矜工兮斧雷霆而斫之疏懸黎以代礎兮瑩結緑而飾墀虞淵倒景而下射兮光夕激以交馳萃飛仙之游遨兮餌若英而咀瓊枝戛叢霄之靈璈兮歌白雲而忘歸狀愈樂而不可殫兮非羽輪其莫窺帝九靈之少女兮其名曰瑶姬受素書于紫清兮含洞隂之華滋習玉瑛而厭處兮乘回颷以長辭大章屏翳為之奉轡兮乘蒼虬而駕白霓馭八景之玉轄兮曵紛綸之雲旗統靈氣而輕舉兮朅鸞奏而鴻飛涉巨溟之層波兮將攝乎南箕聆夢澤之雄爽兮漭天水之相圍介青丘而澶漫兮奄髙唐以冥迷忽意樂而延佇兮弭絳節以徘徊弆丹笈授夫神禹兮靖九土而安柔祗下民懷斯遺烈兮即石化而為祠象瓊光之華闕兮搴辛夷以為楣翔藻棟以乘虬兮列藥房而張薜帷羣峯連卷而十二兮爛雲屏而揚輝儼坐於正甲兮貌渥飾而具宜沐蘭澤而含芳若兮被桂裳而繡衣爛黼收之豐麗兮淡聨姢之修眉肅容華之拱侍兮紛環珮之陸離神武蹲而抱關兮夕夾陛以文貍𤣥猿悲吟以度曲兮女媧待歌而舞馮夷三足烏往來為之使兮訊東華之靈妃迹逍遙乎中區兮亮素節之靡移鼻祖祝融之裔子兮竊息媯以荆尸蠱文夫人于前兮後又奪鄖陽子之妻豹舄斃淹而攘內兮蜂目暴卒而蒙訾黑要挾夏而與居兮於莵盜䢵而遂孳世朋淫而上蒸兮嘗見刺于湘纍橫下臣繄宋玉兮揆暴厲之不可規稱先王常與靈遊兮薦枕席而嬖私今胡為而復遇兮意託諷于微詞唘後世之瞽惑兮誑魄化而為之曰媚而服焉兮則與夢期宜聖覽之孔昭兮獨超悟於昨非厲皇荒德而慢神兮禍源起乎龍漦悼衛蒯之失國兮艾猳實發其亂機屛宓妃而却玉女兮幸後王之三思朝山堂賦前人吾行半天下兮閲重關乎西南之坤北有萬夫莫開之劍關兮東有嶮過百牢之䕫門外聨六詔作屏兮中貫三巴而為垣梯磴鈎連莫知其際兮儼嵯嵯峋峋逺宛延相屬而赴望兮髙蔽遮乎日星臨以白帝之神秀兮誠衆山之所尊有美一人眷顧此方兮實柱下史之耳孫髙四海以視營兮時樹羽江濆屹三峽之鎮其穹然兮翼山四面而駿奔唘物色分留之祕兮欣所遇之畢陳擇勝㑹以還縹眇之飛觀兮廪老氣九州之傾觀萬川猶知宗海兮雖九土莫得而堙則羣峰之起伏綿延兮至是而亦必有所臣奚興感於此義兮蹇顔堂而正名彼負固之非無意兮髮有時或上衝乎冠巾惟漢中興已受天命兮而成家乃欲爭帝而亡新吾直欲鏟赤甲白鹽之叠嶂兮洗蒼藤翠木之幽昏恐此復其偶然兮綢繆牖户以逆消侮豫之下民歡五更之鼓角兮聲悲壯印殘夜之山月兮樓空明諒身雖去國萬里兮心未嘗一日忘君嗟乎名堂之意髙矣為慨然而賦之尚庶幾起九原於東屯瀼西之詩人也八陳臺賦并序劉望之余與客登䕫子城望八陳圖感忠武侯之行事恨世議者之弗獲於斯也作賦以悲之其詞曰靄孤臺之巋然臨千步之沙場石離離其班班紛棲鴈之未翔山暝黑而更惡水雖波而不揚淡徙倚其不去含鬱紆之內傷是何以使之然哉客或告之在漢之亡有人超然卧鄧南陽甚似阿衡樂未渠央感大耳之至意姑黽勉而徂征又似子房初未有意隆凖之老也及其既作亦不能已手胼足胝夙夜赤子忽一龍而一蛇蓋亦未可以優劣計大兵初來雷電下空璋孱小兒孰嬰我鋒駐師江郊坐向必東搜我卒乘取彼凶殘中原有狐憑陵宫墻我不往取髙帝在天衆謂卯金之不可相而况夫子之賢也運去道窮嘔血繼之非公實愚愚者不知自古聖賢亦行其義道之不濟已知之矣相夫子之所立固已無窮而不資彼丕操父子鳥雀犬彘之竊食雖甚饜而不害其驚疑愍世俗之隘陋徒顧瞻而涕洟請舉酒以酌公混一笑於江麋灧澦堆賦薛紱蜀江匯而赴峽勢迫抑而騰掀當江之衝有堆屹然爰停我橈徘徊覽觀有㑹余心乃知大禹所以浚川而不去此者匪特以殺水之怒而四瀆之長江存灧澦河存砥柱則聖人之意亦將有所寓焉夫形而上者謂之道形而下者謂之器器者物之物道者物之先先乎物者在人則存乎心者也所以宰制乎萬物豈一物所得而肩彼堆斯江彼柱斯河在物之石而器之下也然洪水滔天不為之移狂濤卷空不為之動潦盡漲涸岌乎貞堅亘宇宙而長存閲陵谷之變遷而人之所以先乎物者乃誘於知乃逐於物利之趨如水斯下欲之熾如火斯燃曽莫得以止遏者反兹石之不若又安可不推其原縱而忘反兹固弗道制之無方愈蕩而偏禁而絶之者昧乎倫類空而妙之者荒無徑躔嗚呼無廬而居無畔而田卒窮露而奚歸寧耕穫而有年曷不觀於兹堆乎彼惟居其所者屹而固也然後可以障狂隤之流川茍失其所而昧其居吾知此心之不傳其居伊何曰則自天理雖微而難明實天命之固然自視聽言動之間以及於君臣父子之懿物必有則理不可遷切而思之講而明之習而察之謝而根之潢潦挹有本之源泉眇乎其微深乎其囦物有萬變事有萬理察乎其微者卓然而不可易然後可以蔽乎天地而關乎聖賢必真知也而後其行也果必力行也而後其知也全敬恭朝夕奉而折旋兹孔孟之所以不倦不愠不怍者豈蹈白刃之勇者所可得而言嗚呼人心之危匪石而人欲之勝甚於水吾觀兹堆而有感于天則之嚴是以憂講學之怠而述之於篇資州獻白龜賦以泰平將洽神物效靈為韻唐獨孤申叔皇帝在位十五載西人獻異龜於王庭匪青黑以飾體特潔白而成形融彩可嘉且不溷於五色呈祥有異詎止齊乎四靈蓋以我皇行化無外止戈偃武人綏道泰升至德於𤣥穹降殊祥於神蔡且夫龜者禀先知之異白者表司殺之方豈天異興威于有截俾臣下授命而無將西土是生實西方而主義被甲以至猶帶甲以來王不然何以皧焉代切净也純容皎素甲皓霜華而浹洽炯玉質輝金精疑雪彩之清貞泳靈沼而氷靜息泰階之砥平足使孟津之鱗耻捷乎素鬛越裳之雉羞奮於翹英矧乎禀殊姿體異貌陋三足之為美匪六眸以是效其用也或協聖人之心其動也克符知者之樂然後知戲朝之虎不足徴御鈎之狼不足云一作神蓋官韻彼駒來思徒稱皎皎爾獸至止虛擅諄諄未若兹瑞德無與鄰應天之命昭皇之仁非櫝中之毁棄不蓮上以因循將順乃𤣥穹以呈其貺曷思乎緑水而返其身則彼寧王有遺元緒之屯又安得而比倫嚮非我皇從道不咈必將混於介族詎得分為理物宜乎冠異紀首靈篇且無使其湮鬱枸杞賦并引宋史子玉史子分教劍庠之明年目眚踰月廢卷默坐客有告之曰兹土之宜杞根實繁産諸泮林尤腴而美揆之本草明目養神盍試其味尋命僮僕則取之不竭食之既厭而昏者開翳者鮮矣於是作而嘆曰是物也不假種植沾濡雨露芬敷自榮其功效足以回光返照如此况出於輔之翼之長之養之者豈不足以備明時采擇哉有感而為之賦曰當春用事肝怙勢而驕厥火彌壯用弗利乎眸紫珍兮塵漫望舒兮雲浮尉之平之濯之泠之計屢施而罔功書既展而復收其誰巧運乎金箆抑將乞諸其龍湫者也客莞爾而笑曰泮宫耽耽靈根萃止匪藻匪芹强名曰杞或云羊乳亦曰狗忌其效伊何未易殫紀于以安神于以輕體至於瑩秋之神而爛巖電之光則又其效驗之細者也子居是問左抽右取不費一錢多取其數餐厥英還爾明為子之計不亦近而易行乎應之曰廣文一寒飯嘲不足信如子言載采盈掬因以比離婁之目且不負將軍之腹豈不魚熊之兼得又何必空縻乎廪祿於是叱畦丁戒僕夫搜諸荆棘之場探諸榛莽之區則叢然而遂油然而達或壓枝以駢出或附趾而簮碧隨取隨足不耘不植蔓延布滿夭矯挺特有如蒙頂之苗而搶之始露有如楚畹之香而芽之方茁至若仙仗飛空髣佛驂鸞夀幹通靈時聞吠厖幸則髙人逸士襲其馨而挹其味不幸則樵夫野叟㸑之弃而斧之戕也於是小摘荐至大烹可期錯落琉璃之碎青葱雨露之滋憫寒庖之屢空笑盛饌之莫知燎南山之煤嬰西澗之水潔蠲瓦缶酌中火劑登爼過熟噴香霧之蒙茸舉箸頓空覺餘糝之滑美混甘苦而爽口逼寒凉而液齒知再飯之幾加陋八珍之鮮味朝焉咀英暮焉茹脆曽不論乎韭菘又何數乎蓴䜴殆不可無此君於一日又何拘乎去家之一思惜乎首陽之夫貪采薇而遂足商巗之老厭啖芝而遂止秦人之炙夫何太俗相如之渴胡不嗜此哉巳而心體舒逸神情爽塏湧真水於玉池爛夜光於銀海客不豫欺遜而謝之荷神農之知音悵離騷之偶遺雖則一草之微無庸多談感物悟理斯有可觀彼弗種而然矧種之者乎彼弗養而然矧養之者乎所以菁莪誦育才之樂棫朴歌官人之能行有枝葉可使莠之亂苖仁在乎熟深懼茅塞子之心維杞維梓扶而養之一薰一蕕疏而别之自本自根種而茂之孝弟忠信培而植之師友淵源灌而溉之先王遺言饜而飫之散柯布葉日積月長摩厲青冥直干霄漢股肱心膂無施不可如此則劍山之植物豈但收近效於眸子瞭焉而巳哉劍陽學官史子玉校藝益昌與豫聨事暇日出示所作枸杞賦豫讀數過因思前輩文字率不茍作東坡賦茶而有取於骨鯁山谷賦苦筍而有感于忠言大概一物之微一理寓焉此騷人之所以深其思也子玉之作豈徒以詞藻相尚欲使承學者因物悟理自枝葉而見本根其意婉哉子玉刻之泮林以為士子之勸豫謂士子文所當重之而泮林一草木尤宜愛護云開禧三年七月益昌郡丞潼川謝艮跋對青竹賦并序宋黃庭堅余楚産也閲東南之竹多矣未嘗聞對青竹者也嘉州僧從之包封見貽藝之而成乃初識之惟範圍之內有知之物一無窮無知之物一無窮一耳一目不能遍攬也况六合之外者乎感而賦之美哉斯竹黃質墨章如出杼軸織文自當解甲稅枯金碧其相嵗寒在躬又免斫烹彼其文章之種性不可致詰刳心而求之不可得劚根而求之不可得匪人匪天有物有則惟其與蓬蒿共盡而無憾余亦不知白駒之過隙苦筍賦前人僰道苦筍冠冕兩川甘脆愜當小苦而反成味溫潤縝密多啖而不疾人蓋苦而有味如忠諫之可活國多而不害如舉士而皆得賢是其鍾江山之秀氣故能深雨露而飽風煙食肴以之唘道酒客為之流涎彼桂斑之與夢永又安得與之同年蜀人曰苦笋不可食食之動痼疾令人萎而瘠子亦未嘗與之言蓋上士不談而喻中士進則若信退若眩焉下士信耳不信目其頑不可鐫李白曰但得酒中趣勿為醒者傳憫相如賦楊天惠祖重黎之洪懿兮系中山之蟬聨食岷峨之舊德兮飲江漢之靈源皇既私卿以多技能兮卿又附益之以師友之傳招湘均使侍書兮麾藺卿為我驂綜藝文之要妙兮申劍術之雄妍載而之四方吾將鼓行諸公之間視騎郎之多冗兮義不辱於周旋顧嚴鄒之差强人意兮聊步武於梁垣惟才髙之寡合兮以其遭遇之難靡嵗月於官學兮嗟不耦而空還徑千里而一歇兮跂喬木於故山殆而朅來第如臨邛兮存故人之間關起握手相勞苦兮意懇懇而拳拳彼汚令之體苛兮矜縟禮之闌單慨非余心之所悅兮矧駔儈之與同盤强要卿以俱行兮卿固已薄其所以然摽使者于門兮出告之以不閒何隆初而殺終兮卒俯首而從旃彼遷虜何為者兮竊東向於肆筵紛臭處之逼人兮笑言訝以更歡豫意卿食不下咽兮奚宴安乎未歡酒參半而奏音兮四座寂以無喧嗟輦下之遺直兮固淟涊而不鮮嫮冶容而亡賴兮偎自成乎哀彈懿長離之文章兮非鸞皇其誰匹曷伻鴆以為媒兮即游梟而接翼棄朝陽之顯敞兮集此榛莽之蒙密也吐竹梧之芬馨兮爭羶腥之飲啄也度將雛以授意兮吾固不審卿之所謂也卿縱懷彼梟以好音兮吾恐彼梟之終弗類也既么麼又不材兮曽何足以溷箕帚之役决帷薄而夜奔兮毁帨䄜而不入卿胡偭然不自喜兮安受此蠱蝕豈其不禁杯杓兮恍沈冥而不自克寧卿意之易敗兮移氣體於終食人固醉而誤醒而悔兮庸何傷於好德怪卿初弗定此計兮後又狂騖而不復入不慚鄉杖者之善罵兮出不羞賢牧伯之餘澤厭儒衣之巨麗兮襲𨽻人之䙝服雖雜作而忘劬兮蔽泥水以為飾悵遷虜猶不堪其憤兮卿獨何施施眉目始吾嘉卿之好音兮殆將以禮乎自持進有虞之雅操兮紹尼父之聲詩胡中道自絶於前修兮乃陷而入于桑濮之為終吾偉卿之能賦兮工譎諫而不怒攝侈汰之瀾翻兮卒歸之于王度唁卿躬之不蚤正兮尚何以禁切于人主嗟乎操行之不得兮躪終古而增汙挽天河以自􅀈兮吾恐垢氛之不能去亂曰邛山迤邐邛水悠兮日跳月踔郵千秋兮巋然遺宇庇沈湫兮浮魂蟄魄尚想遊兮我欲堙井剗梧楸兮死者可作庶無尤兮孰是人斯而有是醜兮尚俾來者毋罹此垢兮憫相如賦宋鄭少微韙長卿之絶塵邈下視于屈宋思眇眇以入微辭蔚跂而易貢鶩八紘之津涯括動植而錯綜擢篆籀于重泉幹形聲而罄控當其奮翼巴庸前無古人拾厄灰之斷簡搜屈壁之遺文紛齊魯之老師徒騁辨于說鈐蛻筆土梗鼻端運斤専兔園之右席麾鄒枚于嚬呻顧天西之櫟社悵夜錦之未晨念絃歌之石友暢落魄于情親夫何嫠人之艷艷兮感熠耀之宵光曯綺疏以託誠兮佩徽音而曷忘嗟父母之不聰兮昧彼都之丰臧盼星河之照闈兮徑遡洄而往從縉紳先生而為此歟凉德汙行既不勝誅誾誾烈女世未乏諸足不下堂步中瑀琚紉幽蘭以為裳兮鈿美玉以為車豈無泳漢之遊女兮亦有采桑之秋胡秉周禮以律身兮諒氷雪之難渝禆化國之隂教兮飾家道之權輿爾弗安于正吉兮蒙惡聲于簡書訪舊壚于故老莽榛蕪之離離眢井乃貪泉之戒修梧實曲木之規渴者勿汲暍者勿栖噫嘻余觸類取譬操觚默維滔滔儒服相逺幾希摟處子者迷忠義之大間窺鄰墻者暗富貴之危機吁雁幣之聘媒妁之辭墦間之夫河間之婦等亡羊耳未容勝負又奚獨料理十日卜之與典午邪苦櫻賦并序何耕余承乏成都郡丞官居舫齊之東有櫻樹焉本大實小其熟猥多鮮紅可愛而苦不可食雖鳥雀亦棄之感而賦之始余至于官居盼兹樹之特奇幹擁腫以上達條枎疏而下披䕃舫齊其有餘知封植之幾時或告豫以含桃出饞涎而流頤意薦廟之珍果必甘滋之若飴幸一熟之得嘗指麥秋以為期忽春事之已晚訝子結之獨遲初瑣碎以破蕾漸育稠而著枝聊攀摘以適口乃苦澀而顰眉類置膽于越國異茹薺于周詩謝芳液之津津空殷紅之纍纍誤來集之衆鳥誑無知之羣兒感人事之大繆為纍欷而齎咨或名美而實乖或表盛而裏虧或色厲而內荏或迹公而情私鷙翰假于鳳鳴羊質混于虎皮佞似聖以疇測姦託儒而莫窺莽恭儉以竊國卯博辨以僵尸談仁義其可樂視所履而舛馳儼衣冠于民上為賈豎之不為方滔滔以皆是奚一木之足悲八陳圖賦元楊維楨遐哉邈乎蠺藂故墟劒閣崢嶸兮石棧縈紆車不得而運馬不得而驅非王業之所基兮徒抗險乎中都帝中山之苖裔兮乃猶厄此斗隅黃星射乎宋野兮强猘狺乎江之東偉伏龍之感激兮起左顧乎隆中允識時之俊傑兮吞餘子于一空圖八陳以用武兮必先天而獨得六十四之成算兮本馬圖之全畫三十二之岐分兮妙隂陽之互宅天地衝軸兮風雲盤辟龍飛鳥逝兮蛇蟠虎翼撓之無跡兮運之無方進退不愆兮出沒靡常奇不失于正正兮怪不越于堂堂伏至動于至靜兮寓能柔于能剛喻以常山之蛇勢兮曽未測其望洋巴之水兮砯崖折壁峽之濤兮風霆礔礰彼箕張而翼布兮曽不轉其磈石非神物之隂衛兮孰萬夫之捍力想貔貅之對壘兮指白羽之一麾運縱擒于掌握兮算不出于八奇賊之望而走兮甘巾幗之受雌按渭濵之所屯兮實鼎國之王師自風后之有圖兮肆獯蚩之赫伐逮尚父之六韜兮佐牧野之黃鉞孫吳馬之剽掠兮徙生靈之肉血鄙敗事于腐儒兮彼譙生其又何法兹八陳之猶覺兮軼軒轅與天姥曰流馬與木牛兮又神機之所造歘中營之告變兮哀夫人之奪蚤訖黃芒以當天兮掩炎精之皓皓嗚呼西望岷峨兮南泝錦江山川相繆兮地老天荒歌梁父兮釃吾觴招謫仙兮呼子長訪魚復之砂磧兮弔新都之戰場雖武無用于今之時兮亦以發吾文之氣剛連雲棧賦明楊廷宣己卯之嵗時方冬矣臘云暮矣余年過賈生學慚董相怔怔營營內不自定由是謀邁于行載言北征擔簦負笈陟岵跋阻攝穹隆控青雲扣天閽順風而稱曰肇𤣥黃之既判兮乃陽浮而隂槖嗟大塊之茫茫兮孰川排而山鑿帝既設此靈險兮余總丱聞乎棧閣肆皇圖之廣運兮都形勝乎燕漠眇蠶叢之建國兮隅星分乎井洛連秦帶蜀方五百里兮繚咸陽以為郭阻褒斜之艮隆兮擁岐斄之巨壑推隆理與替墜兮亦槩聞乎往索良既䇿羽以絶望兮委回祿以煙灼何退身而鷙擊兮思駕馭乎帝略迄超漢而蹶楚兮遂用建夫三恪陽中路以回車兮紛不爽于髮膚白發歎而長嗟兮意深諷乎彼夫憤儀圖之詭祕兮誑金牛以為諛憫漢帝之遵駕兮忍蛾眉而西趨侈御愛之仙蹕兮瘁萬乘之玉軀蓋其危也足以駊騀巨麗而其致也不亦為禦侮之天區夫山本其奧也石備其崇也水出其蒙也盤紆突兀岑崟嵂崒澒洞深涯蓊蔚茀鬱天之所生也地之所産鳥不得而翔獸不得而逸四時變化剛柔錯摩交構乎其中終始乎其內其雲則黤䵳􅼀黯雯曇衣被膚寸漸深侯于本末逺視極黲邇之則黚䵤于石黦于深谷靉靆淹留氛氲隱天羃幕屯需落落寞寞異于常態其雨則津津汋汋石潤林響瀑布滴珠滿壑盈瀨霑濕霮䨴與地潜通豁徑注流煙樹瀰濛松膏林沐淖濘局蹐病于逆旅其風則飄􅀈􅀈䬍轉山循谷料峭觱發䬆䬑批亢巽二乘虛峻峯髙颲平坻微􅂒􅂒落木寒颸切肌石尤激射打頭周回延歷萬象莫之可捕其日則黯淡蔽虧斜景過雲東谷西隅窺于中天曀㫱晦冥翳􅧵􅀢難未嘗昭晰其風俗之所習土地之所宜余故得并吞其所經歷包舉其所問答而囊括其語焉于是有五德公子𨗳余以喬關兮嵌雲路之巃嵸據嶟崿之扼塞兮羅萬象于景從聳㠝岏之崨嶫兮怯衣繡之乘驄盤七曲而腸回兮眗髙目之􅀈朦瞰龍江之窣窣兮瀉白練之霓虹余既登此絶嶺兮瞪乎前觀藐乎後視拾級坎凛連步錯愕怔忡悸駭倦臨色勃久而後定乃渡木閣馳青橋涉凌兢而惘􅀈兮列御風而憑空惻身穽而撇捷兮足秦法之重重㠧飛棟巇巉崕兮矻浮柱而增崇截王孫之便給兮碥碨礧而青葱靄雲樓與霧蜃兮比朝暮之仙蹤橇不足以為術兮憫征夫之溟濛儂鞠躬而進登兮殆郭駝之形容馳丹梯下峻阪兮擬抱甕之忡忡亦既身倦而神罷兮乃偃息乎崖中訊往路以前山兮越馬道與武關嵾嵳㟟路逼側狹隘騎不得方人不得比吁嗟乎其赤帝之所興首咸陽以入關兮降子嬰而要盟羽不得而爭驅兮適目兹以為兵故稱名為劉埧兮意非此莫之與京因是以益逰乎奧屏兮閲千古之芳林於是有凌煙大夫挺瓌梧負霄漢迓余而言曰翳前林之矗矗兮豈非皇華之岐嶷楸檜障以蔽天兮鵾南溟之翼施旎龍之蹇兮雜遝糾㑹之標枝蕩日月以枎疏兮幹輪囷而參差杞强梁而麗霄兮樗擁腫而鴟夷楊郅偈而膚敏兮柳垂身而委隨節美秀而喬修兮紛篁籦之陸離目極望而攢暝兮何摧嗺而鬱伊悲落木之蕭蕭兮恣行人之淅炊風雨晦而濤起兮響萬壑之隆墀余稔逰此窐窖兮窺管天而冥疑馳豫章之絶幹兮駕鄧圃之平騎悵梁棟之齷齪兮雖牛山其何為彼其衆夥之富山桃石榴橪柿苦李小棗楟奈楂梨梬栗斂朱榮祕生意錯綜懸岩潛隱乎其中不可殫述由是踰三坌窺姜嶺山益進而㠍岌樹益窈而縱橫憶岐豐之盛瑞播覽德之美名於是有緑襟使者麗質修儀且逡且巡其氣也愒其志也憐翋􅢣直前櫽括以此山之靈昔寶雞之耀羽兮托千里之峭嶸惟樊籠之我求兮窮巖窔而多縈彼蒼鷹羅鸗紛修翎兮屬玉交青鸊鵜駕鵝晨風子規鸂鶒鸕鷀白練沙雞錦胸繡臆纍黔啄兮羌有萬而難并鵲占嵗而音妙兮鳥散聚而時鳴鸖宿霧而懷寶兮鴠呼類而為盟雉招搖而曵尾兮鳩思婦而藏聲鸛獨立而不懼兮鷫依稀而將迎鴻漸逵而自得兮雁遞比而從兄其它角毒之屬又未可以須㬰傾蓋而語班荆而坐對也聊舉虎豹羣而晝哮兮黃熊慢而遷延狼跋胡而恣逰兮豪豬放而盤旋猱嫵媚而先後兮㕙兔逸而長便狻猊茁而豐茸兮麋鹿呦而雲眠鼬鼯幻而􅹿躚兮狐貉衛而自賢余因聽此富擬上林靡邁長楊公子王孫有智不能以施㔋磻羅穽有術不能以張王良何以歆趙主造父何以御周蹄徒縻思於行李噫何補於攀躋既騁草凉之墟復皆東河之西尖巒叉呀隘若虎關凌遲委蛇下若抎鳥崔嵬嶱嵑守若扼吭宋代之賢所以遏元兵而漠北之雄終不能向南鄭而窺也可不謂之壯哉天地設險髙則為山深則為水山之所峙水之所流余又見夫𤣥冥先生之為費也濺洶濤泛瀇漾出崎嶇走􅀈漲隨余馬而奔流諒余行而相望岌岌乎譎哉詭哉滔滔乎泓哉瀼哉南通沔漢北入汧渭粵衆派之泛濫兮觴礫碌之倣徨經逶邐而迅駛兮礐慫恿而鏗鏘崒震電之憑怒兮巆萬夫之阿房砥中流而濆潰兮沸枉尋而滵湯霈幃蓋之溰溰兮恍白鷺之翺翔凛三軍之旋凱兮搖甲胄之鐵裝撼韶濩之夜􅀈兮奮馮夷之擊瓽灑雲根之溜篆兮濯白玉之琳琅邁蝌蚪之瀺灂兮袖太史之籀藏三江駭而奔鯨兮穀洛鬬而非常瓠子決而訇湃兮呂梁隘而飛浪未有似此之崛岉翻湓豗觸騰驤况其時也竺寒凝嶺沍凍呵僵氷崖珠絡雪巘瑶光人思挾纊之主屋存䝍瘃之霜皓皓皚皚堅堅强强此亦過客之壯麗奇觀也瀟灑拂鬱滌汔腎腸喜溢眉睫樂忘故鄉已而望秦塞之渭縈瞻太華之麗麓水東去而長辭翠漸微而山促嗟乃平原之易地豈非前代之雄都乎余乃擊離懷於山水寄餘情於巴蜀障庾規之塵窮阮宗之躅薊門煙月蘆溝曉昱輝煌乎帝里蓬萊乎京屋世態無常天時又速余於是復冬往而春來兮殫未盡之芳踪忽寒暄之易劑兮訝風景之靡同嵐開障麗石淹灘渾鱅鱔出沒鰬魠􅔢黿喁喁族族别孕鮞鯤獺入水而肆捕豺同岩而懷吞余始驚夫昔者之遁而今者之溫故夫路蓊薈以彌深山爛漫而舒容百和異香徐來應風蘅杜茝蘭緑蕙幽蘺蘼蕪蒥荑山椒蓀萇有質無名列不可窮藁本射干石芥茈薑溫韭香菜赤根水芹豐蔚之盛何其隆歟若夫寶藏之興太守夜懷六奇反間熠爚繁光生乎古壙類乎石國則鳳山之産也黑金巧冶積薪而鼓鍛鍊成剛許子之所耕而晉國之所賦近代求猿伐木被荆又有夜光布網網牽百里則安山之竒也玉版雲英非濤非倫燦如白雲膩如滑肌咸陽不足論其價山隂不足供其資西蜀賴焉三秦給焉則武關之藝也伊所居之棟宇兮樹板屋以層甍隨凸凹以偨傂兮無風雨之暴傾飯土鉶如上古兮燃松膏以為明性剛徑以質朴兮讓齊魯之蜚英挑雲水於上山兮燒石田以為耕播穜稑以有秋兮兼芋橡與蔓菁其官府之所寓舍則譙樓麗棟盛鶴搖鈴重門雙闕井幹華桯黝堊壁飾後寢前㕔無菑無害庖食具精勞乎逺人達乎帝廷其衣冠之耀則祿不易常用其武辨間以流官統以方面毋暴毋忝考其勤倦撫其民人而庇其所縣嗚呼皇風清穆兮四海無虞山川奠安兮草木茂殊我生值此兮何德之腴余去故鄉千里兮獨褦襶於兹嵎以髙山為知己兮以流水為鍾期以喬木為朋友兮以道路為針規名不見成功不可知手胼足胝化不轉移揚雄為之解嘲崔駰為之達辭齊師幾北卞玉屢齎惟守道以自全恐辱已而為嗤余故得假息於姒狄之館沉酣於吏部之天先生見而㖤㗅使者候之以長吁大夫腹非於其側公子反唇而揶揄噫嘻何吾子之倥偬兮勞不憚於僕痡荷一往之是訴庸再來之可乎彼一握以為笑亦焉知吾之為吾匪區區之宦轍抑以覽聖世之皇圖未敢擬司馬之逰不亦異博奕之徒非聞子言孰策余駑言以足志竊效漢儒乃相與忘形共賦於開山之途全蜀藝文志卷二
