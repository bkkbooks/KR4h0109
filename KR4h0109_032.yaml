body:
  text: 全蜀藝文志卷三十二明周復俊編序下贈送遊覽入蜀紀行詩序唐王勃總章二年五月癸卯余自長安觀景物于蜀遂出褒斜之隘道抵岷峨之絶徑超𤣥溪歷翠阜逮彌月而臻焉若乃採江山之俊勢觀天地之竒作丹壑爭流青峰雜起陵濤鼓怒以伏住天壁嵯峨而橫立亦宇宙之絶觀者也雖莊周詫吕梁之險韓侯怯孟門之峻曾何足云蓋登培塿者起衡霍之心游溝澮者發江湖之思况乎窮覽勝事足踐靈區煙霞為朝夕之資風月得林泉之助嗟乎山川之感召多矣余能無情哉爰戒文律用宣行唱編為三十首投諸好事焉晚秋遊武擔山寺序前人若夫武丘仙鎮吳王殉歿之墟驪嶠崇基秦帝升遐之宅雖珠衣玉匣下賁窮泉而廣岫長林終成勝境亦有霍將軍之大隧回寫祁連樗里子之孤墳竟開長樂豈如武擔靈嶽開明故地蜀夫人之葬迹任文公之死所岡巒隱隱化為闍崛之峰松柏蒼蒼即入祗園之樹引星垣於杏嶂下布金沙棲日觀於長崕傍臨石鏡瑤臺玉甃尚控霞宫寶剎香壇猶分仙闕雕櫳接映臺疑夢諸之雲璧題相暉殿寫長門之月美人虹影下綴虬幡少女風吟遙傳鳳鐸羣公以玉津豐暇傃林壑而延情錦署多想巖泉而結興於是披桂幌歷松扉梵筵霞屬禪扃煙敞雞林俊賞蕭蕭鷲嶺之居鹿苑仙談亹亹龍宫之偈于是金方啓序玉律驚秋翔風四面寒雲千里層軒回霞齊萬物於二體綺席乘雲窮九垓於一息碧雞靈宇山川極望石兕長江汀洲在目龍鑣翠轄駢闐上路之遊列榭崇闉磊落名都之氣眇眇焉洋洋焉信二蜀之竒觀也昔者升高能賦勝事仍存登嶽長謡清標未逺敢攀盛烈下揆幽襟庶旌西土之遊逺嗣東平之唱云爾綿州北亭羣公燕序前人下官一作客人間獨傲海內少徒志不屈於王侯身不絶於塵俗孤吟五嶽長嘯三山昔往東吳已有梁鴻之志今來西蜀非無張載之懷况乎踐名場携勝友風月無幾琴酒俄乖半面十年一别千里何少府故人攀桂撫金石而論心韓法曹新餞班荆臨江湖而執手離亭北望煙霞生故國之悲别館南開風雨積他鄉之思于時蒼雲寡色白日無光沙塵起而桂浦昏鳬雁下而蘆洲晚傍鄰蒼野霜封橘柚之園斜枕碧潭直斷芙蓉之水既而登臨惜别驂駕少留季札何人親逢贈縞子荆不敏思掛傾城惆悵北梁揖琴臺而漸間徘徊東道思錦署以行遙嗟乎人事乖矣江山逺矣請命離前之筆為題别後之資五際飛文想羣公之不讓一言有贈知下筆之有神宴梓州南亭詩序盧照鄰梓州地池亭者長史張公聽訟之别所也徒觀其巖嶂重復川流灌注雲忩綺閣負繡堞之逶迤澗户山樓帶金隍之繚繞信巴蜀之竒制也時鳳扆多閒上得和平之政鯷瀛有截下無交爭之人以公寄切上僚故久無州將連四千石之重任總十萬井之雄班職逾劇而道彌高位逾崇而德彌廣市獄無事時狎鳥於城隅邦國不空且觀魚於濠上賔階月上橫連蜷之桂枝野院風歸動葳蕤之萱草則有明珠愛客置芳酒於十旬羽服神交契仙遊於五日圓潭寫鏡光浮落日之津雜樹開帷彩綴飛煙之路藤蘿杳藹挂踈隂以送秋鳬雁參差結流音而將夕百年之歡不再千里之賀何嘗下客恓惶暫停歸轡高人賞玩豈輟斯文咸請賦詩六韻以見志云爾七日綿州泛舟詩序前人諸公迹寓市朝心游江海訪竒交於千里惜良辰於寸隂常恐辜負琴書荒凉山水於是脫屣人事鳴棹川隅言追挂犢之才用卜牽牛之賞邉生經笥送炎氣以濯纓郝氏書囊臨秋光而曝背似遇緱山之客還疑星漢之游願駐景於高天想乘霓於縮地繁絲亂響凉酎時斟戲翔羽於平沙釣潛鰓於曲浦乘流則逝不覺忘歸咸可賦詩探韻成作送遂州紀參軍序孫逖遂州參軍紀公吾友雲將之令弟也敏於行志於道克修人彞允副兄朂噫周公之𦙍紀為其首天祚明德必將有後不然何棣華之可久也選曹舉善羣吏須才九霄始搆一命而傴穆卜吉日遄征畏途緬躋岷峨遐涉褒漢宿息巖險波臨湍悍仗信不栗載義必亨方暴忠臣之志固無垂堂之責爾之寡兄克施有政是則是效念兹在兹祛利則覦心永隔逺嫌則荒言自絶故雖邛僰之産巴蜀之饒不潤脂膏誰謗薏苡懋厥丕德時惟哲人羣公贈言要僕題序送王侍御赴劍南序陶翰國家既誅邛莋之遊魂收滇池之陳地以蠻陬君長尚未即序徼外新國約非甚堅將若宣王風布中興必候才英矣監察御史王公志標徑節天假異能秉心而忠義必聞多方而文武不墜我中丞鮮于公以功名立破城江南關啓而虜不敢窺城峻而敵不敢守者皆以匡時之策伏橫行之氣不然者豈有夕舍一尉旦磨集作麾三軍盱衡於不毛之間决勝於大荒之表取廷評者浹月登憲府者周星繡衣照于江源風霜掃于劍壁斯不足畏矣中朝名雅嚮義趨風餞筵傾誠翰墨紛矚百壺追送來登董原之野萬嶺蒼然更繞華陽之國余以授簡敢無斯文送孟大入蜀序前人襄陽孟浩然精朗竒素幼髙為文天寶年始游西秦京師詞人皆難其曠絶也觀其匠思幽妙振言孤傑信詩伯矣不然者何以有聲於江楚間嗟乎夫子有如是才如是志且流落未遇風塵謂天下無否泰無時命豈不謬焉翰讀古人文見長楊羽獵子虛賦壯哉至廣漢城西三千里清江夤緣兩山如劍中有微徑西入岷峨有竒幽皆感子之興矣勉旃故交不才以文投贈送張𤣥武序元結乙未中詔吳興張公為𤣥武縣大夫公舊友河東柳潛夫裴季安扶風竇伯明趙郡李長源河南元次山將辭宴言悉以言贈上有勤仁惠恤勞苦之風下有惜離異戒行役之諭一作論元子聞之中有所指國家將日極太寧垂休八荒故自近年兵出滇外訂者或曰西南少疲是以天子特有命也將天之命斯未易然於戲蜀之遺民化於秦漢紀古之道其由未知無置一作智此焉一有故字姑取廢也如德以涵灌義以封植其教遲逺其人迎喁至乎不可固未必也則曰保仁以敦養流惠以懷恤知其所勞示其所安無以醜之當可然也潛夫聞之中興不樂歎曰吾嘗與朋友有四方之異不甚感人如今之心多問其故對曰嗟嗟子能有是言也吾故感焉行有規矣無曰我年四十多哉無曰我時祿位下哉公乃復曰當不失於二公之意為異年觀㑹之方也已敢戒行役敢自清慎終不貽朋友之憂何如於是醉歌中堂極樂而已諸公有贈遞相編次送李彛宰新都序任華宗室後進有以學術辭藻著稱者彞也少好學通九流百家之言善屬文頗有大節去年制舉不捷無何以書歷抵二相國論安邉術由是召試西掖凡數十百人彞與莊若訥髙郢同入髙等何垂翅於制舉而奮翼於西掖哉蓋道之屈伸命之通塞各有時也執政以彞大人在蜀故授新都以榮之彞豈不欲高步臺省時時與朝廷羣公談笑所以俯就逺縣蓋為大人屈耳秦雲滿天倐聚忽散與子分飛亦爾也古人别逺貴於贈言子昔為什邡令蓋鳴琴不下堂而理今領新都則異於彼焉蓋以廬井灰於焚爇之後氓庶瘡於刀箭之末樹立存育洪惟艱哉況奔衝填凑晝夜風雨誅求供應旬晦山嶽其親庶務則宜戴星而出戴星而入焉其接賔客則宜一沐三起一飯三吐焉此朋友之望也如月照雪峰花明錦江當有新詩時復寄來念之哉李生送張都督赴嘉州序于邵伊人之平康由我以専達否則政弛人何賴焉在昔漢宣永懷至理思與二千石之良者共之貞深一作竟探其元以化天下非道熙涉降理際天地一作人則不可膺是高選尚書左僕射冀國公審才以底用論定而後請將欲更蘇息復整齊且如張公無出其右繄受授則為憯怛彼嘉陽之人所益多矣况學致廣大心自精微議道置法若示諸掌一舉雲翼三十為郎分兵領部義然後取公以之才大時論用少以今之多艱乎謂用大則用之大用小則用之小在我而已抑無懵焉良月撰吉輕舟既具長空青冥未有黃落緹騎百從載旌而前戈矛生風左右如舞且犀灘古地熊阜外虞通波萬里并客攸攝其無以易者盍思無邪耶嘗寮為心望此行矣大幕邀餞三軍助較一作教樂只君子如何可忘而後利涉信宿人歸父母其顔渥丹下令如春受教賜知常謀始不浹年而國賦足軍實倍啓迪恢達為諸侯雄德政序鄭藝臣嘗讀唐書竊覩太宗每以為將致治平必先仁誼得賢則理失人則危可鑒格言足徵邃古豈不以化馴易服威束難齊哉然農戰交修德刑共舉將亂也其政必暴將弊也其風必佻將圖九合之威亦賴五臣之佐茍虞害衆莫若任賢視今可以知昔矣高祖皇帝以汴賊弒君唐朝絶嗣左袒罕聞其歸漢同聲皆倣於吠堯上下相蒙酣為醉國寰區之內億兆無依競陳推戴之誠願正君臣之位難違衆欲遂啓丕圖戡禍亂而俟中興協㑹盟而歸大國為蜀之帝報唐之恩明孝皇帝受命之六年天清地寧珠連璧合肇修人紀於變時雍至若皇墳帝典之精河圖洛書之奧步驟於羲軒之際損益於文獻之間不然何其盡善盡美之如是也遂使蠻夷向化吳越輸珍麟鳳效祥草木呈瑞矧復英賢間出俊乂羅生上猶以為未也方且側席勤求登用才哲循名責實較德論功沮勸有謀黜陟不濫鑿乾締構允歸睿作之功夀國陶鎔必有挺生之佐式扶昌運對越上𤣥由是中外文武將相公卿洎庶尹庶史各率厥職奉若天㫖越正月武德軍將校吏民緇黃耆艾等列狀詣護軍使請以節度使徐廷瓊德政上聞願勒碑記且以借留為請上憂勤庶政以百姓為心凝旒稱歎者久之謂翰林學士藝云朕司牧元元將開夀域使國內郡縣治行皆如梓潼朕何憂哉大吏久於官古之道也況衆欲之乎朕既俞其請矣卿為我托其懿實播無窮之聞以塞民望微臣奉詔恐懼叙曰臣聞龍飛九五山川效雲將之靈鵬擊三千風水運波臣之化雖復同心同德雅資十亂之功乃聖乃神永賴八元之佐內則臯䕫協贊外則方召專征神謀且貞師律具有兼膺注意宜屬宏材此我皇帝之御宇也不顯帝圖顧兹天力四神踐雪五老飛星投綸負鼎之人爭伸𢎞業委輅請纓之士競奮深機蕙帳空而明月常孤蒲輪至而清風自激猗歟偉歟雖居宣武之間未若我朝得人為盛也其或家連戚里身陟齊壇益揚謙損之風靡見驕矜之色功超賈鄧政邁黃韓有若武德軍節度使徐公斯可謂一時之英也公名廷瓊字敬明東海剡人即國之元舅也世緒標竒門風襲煥鎮為峰鼎用作雄鋩父子則貴比金張兄弟則政同魯衛騰八龍之聲價齊二鳳之羽儀阮竹皆芳田荆并茂金相玉印各炫晨葩虎節師壇共觀晝錦徒思遍舉抑亦倦談公王父唐京兆武功縣令追封尚書左僕射太師高平王政績頻彰勳華早振自激封侯之志夙膺濟世之名西晉殊功榮聨邸第南朝雅望顯並官婚貽謀各著于承家致用皆光其佐命朱輪華冕豈獨推恩甲令門風實先種德遞傳奕葉孰與提衝歷佐昌朝宜鍾異氣公中含靈秀大爽炳靈幼挺英姿夙彰雅操禀說禮敦詩之教藴經文緯武之才欲紹家聲早參戎右敵國相吞之候决在毫釐隂符必勝之機制於掌握雕戈寶鼎門崇八命之榮玉帳金壇神授六韜之妙故能名高大國業嗣良弓輕鎮北之無文恨征南之不武圮橋靈叟謂謀略之可傳汶水神翁知功名而必立自繼膺睿眷兩踐渙符四封無刁斗之音千里有袴襦之詠政成剖竹擁重執金掌領孤兒每警巡於晝夜扈隨大駕逺鎮定於邉陲才復六飛將分雙節上以郪城奧壤潼水名區粵自艱難久罹瘡痏獄市無寄杼軸皆空羣盜猖狂幸冦恂之去日遺黎憔悴望郭伋之來時不有改張何其俾乂爰求賢帥式重雄藩乃授公武德軍節度使公攬轡遄征下車畢理彈壓豪驁封植疲癃究本尋源提綱振領害於人者雖大必去利於人者雖小必行嘗謂人曰法者政之要也不可以不峻其隄防禮者教之本也不可以不謹其律度食者民之命也不可以不勤其稼穡兵者戰之器也不可以不肅其號令率是四者盡其一心上可以翼衛朝廷下可以儀刑藩翰吾得之矣爾其觀焉公以管內數多亡命姑務偷生久聚雈澤常為虺蜴狡穴皆依於窮谷妖巢各恃于幽林化之不悛來而復叛郡邑虞其蹂躪路岐苦於􅀈􅼈公密運良籌嚴申軍令盡投私罟皆挾禍胎益其戎兵誡其彊吏商旅無滯貢奉罔艱王尊申京兆之威龔遂去潢池之患勞徠罕倦蕩析咸歸動有常規賞無橫費上勤時貢下贍軍須月未及其授衣士已欣於挾纊賑其匱乏釋彼愁顔幸夜犬不驚宵魚自放哀矜庶獄慎恤惟刑赭衣盡伏其神明丹筆立分其情僞絶加等之聚斂革無名之征徭平衡不謬於錙銖嘉量罔欺於圭撮公又仰稽前古俯瞰遺踪思棗祇闢地之謀味韓浩屯田之計膏腴靡棄黍麥頻豐夢果應於牧人利可資於寡婦貢賦加倍獻奉相望又嵗别進軍食因沃潤之鄉置牢盆之務商徒繁㑹官帑委輸檢吏通民機能制用矯時阜俗儉以率先貫天錢而已靡星文認寶氣而已有劍闕文來奏入課連最聞薤本可留足表富人之術芋區難並咸知濟物之方公以鳴社嘉辰繞樞令節祈聖夀於莊嚴之地祝宗祧於降誕之期自捨俸金於惠義寺構華嚴大閣向者公府未完軍衛莫稱於是載修輪奐别創規模庭架虹梁門羅虎㦸層樓燕賀偏增鼓吹之雄廣厦翬飛益動旌旗之色路當衝要地控都畿使車晝夜以交馳候館往來而宿餉每傾公帑用飫賓筵休聲洽聞靈貺昭感紫芝三秀黃犢並生天唯發祥地不愛寶迥掩得禾之異果符登麥之文歌德詠仁言將不足含和吐氣樂固難名大矣哉公之問俗觀風阜財述職焉可得而稱也爵賞既行中外同嘉遂册拜中書令趙國公加食一千户通前五千户公嶽降標竒星精禀異溫如圭璧郁若椒蘭智合韜鈐言無鈎距運籌决勝荀攸可比於良平仗鉞祓威謝艾足同於方召研機照理植操資忠允武允文多材多藝軍中講學馬上注書揮刀則立覩飛泉盤弰則惟聞折樹而又貴不自滿謙而益光饗士投醪延賔比飯帳下之犀渠貝胄咸感吮癰樓中之螓首蛾眉寧矜笑躄金閨密行簮組美談里巷相觀風雲動色宸𠂻夙注寵詔已行致門境之允諧固本朝之是衛况家豐懿戚治陟殊尤心膂連營蓄雷霆於北落股肱重鎮寄柱石於東川克副分憂合膺異渥宜其珉麗德瑩檢圖功懋績著擁旄化行偃草比屋而乞留侯霸呌閽而願借耿純詎可使螭首翠碑未披文而相質麟臺彩筆不寫照以傳神臣志慕陽秋工非潤色仰遵睿㫖敢述殊勳曾無少女之詞預怯中郎之鑒所冀陵遷谷變尚窺沈水之文地久天長永覩生金之字謹為銘曰金行啓運鼎業鑿乾麟御瑞紀鳳舞昌年層潤浩注國祚遐延光凝寶匣福靄祥編上哲繼文皇圖增煥得一踐羲登三轢漢懿綱牢籠大爐真觀宗社還資微明接旦大虛寥寥中貫元精麗物為瑞麗人為英英英徐公為國而生脂膏不染獄市不驚智勝兵强化行民附屢立竒功繼膺寵數帝念徐公聿齊其務乃眷梓潼并有饒賦公至若何時雨雱𩃱枯苗擢穎涸轍騰波摧奸禁暴劉弊止訛襁負而至動植興歌八政何先以食為天卧鼓勤農免胄服田耒耜接肘臺笠摩肩閭閻風靡稼穡雲連衆害既去纎惡皆除頒宣化育慎恤刑書徽纏自朽囹圄常虗輕徭薄斂政協蒲蘆老安少懷逺至邇肅風雨時若家給人足户溢版籍賦登公牘儲峙孔多貢輸相屬神明之正誰為之師公之俱美福祿攸宜位隆鳳沼恩注龍墀梓人頌德天子嘉之爰命荒虗奉揚馨烈揚子神疲江生思絶涪水東注銅山西揭帶礪無期永旌賢哲送彭學士序彭名乘華陽人宋范鎮蜀當西南陬曰輿坤坤為文為臣故世有方正柔靜之士作西漢時司馬相如始以文章顯而後王褒何武揚雄事業著於篇唐陳子昂用古道振而時文於變意者岷峨藴精江漢蓄靈須其時克生其人乎祥符四年宋興五十二載矣是邦人新去兵革之苦始漸聲教之學而隴西集仙公以道藝行誼登王府主上紹休總秉權綱獨觀昭曠恢大同之化罷三互之法遂有普慈之授焉縣令前驅弩䪍甚寵子弟師教檄文聿修里有冠蓋之華家連序孰之盛議者謂文翁玉堂子雲書臺興儒以來未有侈於今日者已蓋聖人用一賢出一令觀悅之道其利博哉昔楊仲伯教生徒上名録者三千魯仲康選高第至郡守者數十異時立本朝議外廷絲綸王言潤色神化則西州士夫未量其教育也南荆領軍非久留之地故略而無述送馮樞密還朝詩序前人茂州羌漢冉駹之遺也距成都十舍而遙雖羈蜀郡縣而不以中國之法治之故其叛服不常緩則盜邉急則嘯聚自昔然也熙寧九年春圍茂州劫略吏民殺官兵劍南諸城騷然震驚夏四月乃詔資政殿學士諫議大夫馮公自渭徙成都以鎮撫之蜀人聞公之風舊矣歡喜踊躍迎擁於道公既至則一切鎮以無事憂者釋然駭者晏然隴畝市里按堵帖息王師徂征以畏以懷嵓居澗飲悉復故處乃賦田器給種食以振業之莫不稽顙厥角洗心易慮要神而誓曰自今以往不復敢干王略矣公以為武威即申文教不可後也崇飭學校以紹文翁之隆講明中和以追王褒之盛宣恩德問病苦方且與蜀人相安從其俗以為遨嬉㑹未暇皇而蜀人亦欲偃公之休恃以涵養以永嵗月冬十月即拜公給事中知樞密院事圖舊德以急親賢也於是蜀之在官者及其學士大夫相與采民之言作為歌詩序引以獻曰公其不終惠吾蜀而遂東邪又曰公雖東當澤天下於何而不終惠吾蜀也凡若干篇以美以歡以致其誠愛歉然若猶以為未也干旄之詩曰彼姝者子何以畀之其是之謂乎公且從容上前日道其詩之所云興民之利而除其害則衆君之作豈特贈離紀别之為哉蓋有以補治道而致和理也送益牧王密學朝覲序張俞虎豹伏於山林鯤鯨遊於江海夫以搏擊蕩躍之性據淵險勢勝之場固其宜矣一旦虞焚其澤漁絶其流則狂顧駭羣震溢山海毛介之族雲擾電逝豈罟網之設能制其暴哉况鳴弦張機動危其性彼聞跫然之音則有覆車觸舟之患矣豈暇翔擇而後處耶牧民者亦然益為西南之都㑹外戎內華地險物侈俗悍巧徑機發文詆窺變怙動湍涌焱馳豈其性哉守之者非其道也往嵗三困盜臣之暴故其民翻然得計自爾三十載或政失其養則緣隙乘險欲躡前弊而復其怨得非駭逸之過乎是以詔教服御與天下異樞密學士太原公既持其節鎮其地運方略以適其欲宣上德以滋其生緩征賦以豐其財肅刑以平其枉逮二年黎俗淳阜獄訟寂寥和氣休聲溢於道路俞遂作蜀侯賦政詩以歌之今我侯以旗節朝于京師俞適在岐陽且聞侯之去蜀其國士大夫曰兵曰民咨嗟瞻嘆千里不絶好文雅者又競為詞章惜侯之行且頌其用信謂君子為龍為光有始有卒者也俞雖流冗不能忘乃作詩一百六十言又為序以為送元侯藴神略仗鉞靜坤維道冠九州牧情通八國夷金城全失險鳳鳥此來儀印佩涵星斗牙兵肅虎貔旄頭沈怒角彗尾滅長旗號令招文物功庸煥鼎彞言朝紫微座行陟上台司嶽峻神靈氣風清衮職詩雙旌浮日轉四牡逐飇馳馬首壺漿滿梯空劍閣危玉鸞鳴漢目珠珮照秦姬過陜懷棠樹經周歎黍離節函龍夭矯詔檢鳳葳蕤霽聳浮雲閣春流象璧池巖廊通夢想海㝢識雍熙回眷西南國行謠滿荔支送趙大資再任成都府詩序文同上五年秋七月丞相以成都守臣當更具所以宜往者名氏陳於上前曰是其職序才業皆可以稱其任惟上之所擇者上凝神久之且曰今海內之蕃域號為至重者舉莫若吾之全蜀壤土衍沃民俗豐夥外之則八國種落賴之以綏輯內之則四道郡邑倚之以康靖得人而重固異他所須智略沈辨威惠肅給厭輿論之所與慰遐陬之所欲者始為其人矣我有耆哲宛在東土是嘗屢以仁愛明恕撫吾西南之民其民懷服其信厚逮今未聞有輒敢一日忘者此將煩之再涖於彼其謂往制無循襲丞相奉上㫖乃聖慮所及度越常議選委良帥以遺井絡逺人蒙慶不勝至幸於是以資政殿大學士召公於營丘大斾過詔趣見上衆悉謂公輔臣必以逺辭既對便坐獨奉天語雍容啓問移漏纍刻惟以願得亟裝出都門并驛臨治以副上之所以待下之意訖不以私請自免以圖便安遂行上褒嘉之馳使勞諭眷委之厚無與為較先是公二紀之中臨於蜀蜀人既聞公來男呼於道女歡於竈皆曰我之匙筯安於食而枕簟樂於寢者不圖今日復因於我公也公既至簡條目去苛異刷滌梗垢磨蕩昏瞀羣疑革而冰消大擾息而波澄未逾月而梁岷之下晏然已為樂國矣同昔者嘗聞之於公曰夫感物患乎有心有心則接於物也泥而不博臨理貴乎無欲無欲則燭於理也明而不暗泯諸妄慮照以正見則天下之治安有所謂齟齬而難治者哉蓋公素事如此以為身術故入匡巖廓出殿巨屏曽不以內外為輕重而一以其所無事者為政治之本凡取知於君而獲愛於民者其將繇此者與同常欲有所論撰以紀公之休懿㑹赴官興言道出門下公因授以送行詩一篇俾同為之序乃述上之所以復用公於蜀與公之所以得蜀人之歡心者題其篇首詩自韓魏公而下凡若干章云熙寧六年上元日謹序代送席帥序楊天惠上即位之七年詔以吏部侍郎席公為顯謨閣直學士知成都府公少遊蜀道登鹿頭望雪嶺沿雁浦尋江源倣徨周覽山川形勢而得其豪傑耆舊主名與其風謠氣俗之詳及是命固樂與西南為不朽事既練日即引道而蜀人亦以公名卿子清毅有故家風度必能舉廣漢遺烈倡方面之治於是開府之日小大趨令民各順聽亡所抵牾老奸宿惡閉門束手念自淬厲求為柔人而益利兩道二十餘州水藝火耨山行野負之氓咸足生理抃喜盈望如公戶摩撫而人勞苦者蓋公設施百未一二而治功已如此矣公遂勤成之行之不變凡幾年治益進功益章天子以公名實相應果可用不疑也亟下璽書召焉方坐宣室開延英從容賜對天下事因空紫樞闢黃閣以時贊授無不宜者回視前日風憲之拜銓衡之遷猶不足淹步武況牧伯之寄岷益之逺是尚能延駢馭耶某節下小丈夫也試吏小邑幸得操簡書受約束於幕府公不知其亡狀時賜之坐訪所欲言某亦􅍀然思自單竭陳義未竟公必知其所以然至乃未言而蒙識察不竭而承知遇士大夫竊怪之而公處某常自若也今公還朝廷某賤不及從迎計嵗時不即獲侍如出帡幪暴露於外如去清隂何恃而安雖然鼎鉉之材當為巖扉重圭瓉之器宜為宗廟珍以一方不可獨留也某小子寧能久怙耶用是自决無限望秋風已壯嚴召方急某願公以天下之重自重而不敢有所祈謹抗手抑首遷延而辭避送成都席帥序王賞席公治蜀之五年詔書移鎮平凉賞送别於升仙橋上而言曰契丹大國也中國奉幣交歡為兄弟靈夏小國也臣服於中國大國富强其勢為難動為中國之患大小國迫蹙其勢為易危為中國之患小然契丹自澶淵講盟慶厯再和之後北邉無狗吠之驚者百有餘年夏人自元昊以來服叛不常五路宿兵而內引百羣為助敗兵蹶將困於飛挽者纍世而不息此其故何也今日契丹破滅議者謂西方可傳檄而定是亦弗思耳以前日之勢觀之為患大者反無足憂為患小者乃深可畏無足憂者易亡則知深可畏者為難取也大抵國大則有所恃而不戒位分太嚴而上下不交法令太急而百姓不附故其强易弱國小則無所恃而常懼其軍民之勢猶一家也相恤相救謀慮日深故其弱難犯平凉四面無險阻號用武地若朝廷無深入之計為守而已則可若欲求朔方故地則為執事者不可不慮古之人欲謀人之國者必有素定之䇿伍員之於楚分兵以肄之充國之於先零持久以服之夫無謀人之智而使人疑之拙也有報人之志而使人知之殆也事未發而先聞危也況夏人今有脣齒之憂耶為今之策匿影撤備使之勿疑焉而後可以有為也賞將有深於此者而未敢言焉送符制置被召序何耕二十五年冬上召四川制置使符公於成都明年春命始至公以次付使事府事理裝戒行日於是賓佐掾史雜然相與懷公之德惜公之去往往有不懌者獨其客何某揄袂奮臂抗聲於衆曰公召宜也已後矣公早揚俊聲雄辭大篇甲乙上庠繹史翻經强記洽聞貴而彌専老而不休於時為耆儒登車澄清擲伏糾貪風烈巖巖嚴而不殘徘徊巴蜀十有餘嵗最後以太府卿總四路之賦國用以饒軍無乏食厥功茂焉於時為材使者蜀道謀帥帝難其人峻秩西清命公往臨剔蠧治荒公不敢偷田婦販夫知公勤勞於時為賢方伯今天子總攬萬幾躬行福威舊德名人登用無遺者万俟公來自沅州至之日拜右僕射魏公沈公相繼起逺外位政府公視數公皆一體人也顧安能鬱鬱久居此乎與其利専於一方孰若澤被於天下與其擁旌仗鉞為蕃宣保障之用孰若垂紳搢笏有謀謨規誨之益故曰公召宜也而吾徒尚何以戚戚然兒女悲為哉雖然蜀父兄有蓄念於此久矣不敢徹聲於天子而敢私布於下執事公其聽之否乎自秦丞相當國逐蜀士如棄梗無一人綴文石之班望屬車之塵者或曰謂其輕而黨同丞相惡之故弗用嘻亦甚矣百步之內必有茂草而謂蜀之人人人皆輕人人皆同也不幾於誣乎兩蘇公兄弟也伯氏以言語得罪瀕死不悔而其季淵靜木訥出於天性蜀國范公與溫國司馬公平昔議論無一不同至論樂律則終身不能相合也其不輕不同者亦可概見矣或曰蜀地踈逺丞相忌之故弗用此又非也宰相之用人當問其賢不賢豈當計其踈不踈逺不逺耶今有橫木於道當舉以十夫之力則取諸吾鄰里鄉黨而足矣至於當舉以千萬夫之力則取諸塗之人可也而必曰吾之父兄子弟焉吾之鄰里鄉黨焉則木之橫於道者沒世不行尋常天下之大過於橫木亦逺矣而宰相方且惟踈逺之務去嗚呼殆哉蜀父子竊竊然不能忘情於是者有以也夫側聞万俟公頻年於外涉艱阻知情僞甚熟悉今其還宜必有至公甚盛之觀以懲創前弊慰安羣心者而沈公亦嘗為政於梓於䕫所至有惠愛既去人思之今公又自蜀以往天下其意者將振蜀人於二三公之手乎未可知也公既見天子於殿陛上退而與万俟公魏公沈公論天下事孰通孰利孰病其能漠然無一語於蜀哉蓋非今日庶政一新公道廓開之秋則公雖有欲言之心而不可以言非公與沈公在蜀日久凡觀民風考論人物之詳則蜀人雖抱無窮之恨而不敢以告語曰日中必熭操刀必割蓋言時之不可失也公行矣嘗試為蜀人圖之送牟秉常先生序明周洪謨豫叙郡人物自漢以來見史傳者固非一人惟宋程公許忠信孝友出於天性史深褒之特以抗直不阿故屢遷華秩而輒屢斥然而公許始終一節不變所守雖古直躬之君子蓋不過焉今秉常先生公許里人也其才敏逮公許而直諒亦似之永樂乙朱舉進士入翰林為庶吉士五經諸子百家之書靡不讀而過目輒成誦一時輩行皆多其博洽自以為不可及暨授監察御史彈劾無所避未幾有忤權貴銜之中以法謫戍遼東繼徙張掖棲遲乎沙漠不毛之地二十年于今矣邉帥以下皆器重之先生砥礪日閲經史至忘寢食暇則賦詩草書故其詩益工而草益精近嵗為邉帥所薦始復其冠帶仍給事邉閫頃之以公務來京師既而與故交留詩别搢紳大夫和之者凡若干首兹復以使至乃集詩而俾豫序之嗚呼先生久詘矣信孟子所謂困心衡慮而又甚焉者也豫讀先生之詩未嘗不為之於邑而觀者或誚其悲悽之至殊不知三百篇之可以怨者皆出其性情之正而無尤焉先生之詩亦猶是爾古之君子內舉不避親外舉不棄讎安得若人者起先生於荒陲乎况今上勵精致理下詔求賢不棄側陋倘有薦者則束帛之徵在旦夕焉因書此以識别全蜀藝文志卷三十二
